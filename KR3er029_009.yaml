body:
  text: 卷九外科諸症癰疽夫癰疽瘡癤者皆由氣血不利喜怒不時飲食不節寒暑不調使五臟六腑之氣怫鬱於內以致陰陽乖錯氣血凝滯而發也亦有久服丹石燥熱之藥熱毒結深而發為癰疽也夫此疾多生於膏粱富貴之人以其平昔所食肥膩炙爆安坐不勞嗜欲無節以致虛邪熱毒內攻煎熬氣血而成也癰者壅也大而高起屬乎陽六腑之氣所生也其脈數浮疽者沮也平而內發屬乎陰五臟之氣所成也其脈沉數瘡者其總名也癤者有頭小瘡也經云諸痛癢瘡皆屬心火蓋心主血而行氣若氣血凝滯夾心火之熱而生癰疽之類也然所感有淺深故所發有輕重大小之不同也六腑積熱騰出於外肌肉之間其發暴甚皮腫光軟侵表廣大者癰也五臟風毒積熱攻注於肌肉其發猛惡初生一頭如痞㿔白色焦枯觸之而痛應心者疽也熱發於皮膚之間是以浮腫根小不過二三寸者癤也夫癰生於六腑若燎原之火外潰肌肉疽生於五臟沉澀難療若陶室之燧內潰骨髓癰則易療惟難將息而遲瘥疽則難療而易痊復夫諸瘡之中惟背疽疔瘡最為急症其次莫如腦疽腸癰喉癰之類亦其急者也至若瘰癧懸癰痔漏諸瘡之類其症可緩而治也又有疥癬膁瘡風疳之類雖云俱屬瘡類而其輕重緩急自有不同夫癰疽之疾須要察其虛實冷熱輕重對症用藥無失先後次序凡人年四十以上頭頂鬢頤背膂腰脅或筋骨之上所視不見之處稍有瘡癤便不可輕易待之若視之怠慢以為常疾每見從微至顯喪命者多矣便宜速治庶幾得救譬之救火初起則易救至於燎原之勢不可撲滅矣其理亦猶是也凡瘡未破毒攻臟腑一毫熱藥斷不可用若已破潰臟腑既虧飲食不下一毫冷藥亦不可用此先後次序之要訣也夫瘡有五善七惡不可不辨若動息自寧飲食知味一善也便利調勻二善也膿潰腫消色鮮不臭三善也神彩精明語音清朗四善也體氣和平五善也如煩躁時嗽腹痛渴甚泄利無度小便如淋一惡也膿血大泄焮痛尤甚臭惡難近二惡也喘粗短氣恍惚嗜臥三惡也未潰先黑入陷面青唇黯便汙者四惡也肩項不便四肢沉重五惡也不能下食服藥而嘔食不知味六惡也聲嘶色脫唇鼻青黑面目四肢浮腫七惡也更有氣噫痞塞咳逆身冷自汗無時目眩耳聾恍惚驚悸言語顛倒皆是惡症五善見三則善七惡見四必危五善並至則吉而安七惡全見必危而死矣審症虛實訣一凡大按乃痛者病深小按便痛者病淺按之處陷不復者無膿按之處陷即復者有膿不復者可消若按之都牽強者未有膿也按之半軟者有膿也又手按上下不熱者無膿若熱甚者有膿凡覺有膿急當破之無膿但氣腫若有血慎之慎之不可針破也用諸拔毒之藥敷散四圍堅中軟者此為有膿審也一邊軟亦可有膿都堅者此為惡核或有氣也都軟者此為有血血瘤也當審堅軟虛實為要若堅疽積久後若更變熱偏有軟處當軟處切不可針破也軟疽者溫暖裹衣置之若針灸刺破不可療也雜忌須知一凡病時忌怒忌疑慮忌身體不潔人來看忌魚羊鵝肉燒酒面食生冷瓜果醃藏等物瘡口斂百日後不作渴症方可入房用藥治法一凡癰疽等項大瘡毒初起一二三日內即服飛騰神駿膏此藥治瘡初起至將潰之際俱可服服後汗出惡毒盡皆發散腫立消其效如神如瘡已潰爛勿服如無神駿膏初起即服槐花酒或千金消毒散二三劑患處即用灸法灸之瘡初出至七日內或灸七日外不可灸瘡未及灸初起即以蔥蜜膏或以金蟾膏貼之即消至四五日腫痛未消用芙蓉膏敷之立效敷至六七日作膿將潰未潰之時不得妄破用替針丸頻點瘡頭自然皮破出膿瘡自初起至此膿將出未出之際即服真人活命飲一二劑瀉下膿血其瘡潰爛用豬蹄湯洗淨以三神膏搽之內服千金內托散以托瘡毒出外間服蠟礬丸以護膈膜二藥相兼服之勿間不計其數再看潰爛流膿不止此氣血衰憊脾胃虧損肌肉不生瘡不斂口用豬蹄湯洗淨將生肌散搽上外貼神異膏內服十全大補湯兼進八仙糕久服自愈好後再服加減八味丸可以絶根庶幾再生若平日無瘡時皆預服之尤為防患於未然也以上治法俱要依次第而行未有不奏效者皆豫百發百中之良法也一論飛龍奪命丹乃外科惡毒第一方也方見後諸瘡一論癰疽發背瘰癧鼠癧氣癧等症此專門之方其效捷如奔馬飛騰神駿膏麻黃二斤去節取一斤淨杏仁四兩熱水泡去皮尖用砂鉢搗爛又入水同搗澄去濁渣用清汁防風去蘆四兩地骨皮去骨淨四兩甘草四兩木鱉子去殼十四個頭髮一把溫水洗淨燈草大一把黑鉛一塊上熬膏法不用柴燒用白炭五十斤大鐵鍋一口將前藥入鍋內注清水二三桶煮至五六分看藥水濃時藥渣濾起藥水另放缸注又將前渣入鍋內再入水一二桶又熬至五六分藥汁又注前汁內如前法三次去渣將前二次汁並作一鍋煎至干去黑鉛頭髮燈草三味不用其味香甜瓷罐收貯五年不壞遇病每服三錢好熱酒調膏臨臥服厚被蓋出大汗為度徐徐去被不可被風吹次早用豬蹄煨以汗後恐致虛人以此補之以復元氣好酒調服隨人酒量以醉為度汗出立愈此治瘡毒欲起至潰破時前後皆可服神效一論凡人初覺患癰疽發背已結未結赤熱腫痛即用灸法先以濕紙覆其上立視後其紙先干處即是結疽頭處取大蒜去皮橫切三文錢厚安在頭上用大艾炷於蒜上灸之三次換一蒜片復灸痛者灸至不痛不痛灸至痛方住最要早覺早灸為上方發一二日者十灸十愈三四日者六七愈五六日者三四愈過七日則不可灸矣若有十數頭一處生者用大蒜搗成膏作餅子鋪瘡頭上聚艾燒之亦可若背上初發赤腫內有一粒黃如粟米者即用獨蒜切片如前法灸之次日去痂膿自潰矣一論凡癰疽發背一切無名腫毒初起蔥蜜膏生蔥豬膽汁一個傾石鉢內共搗成餅貼患處日換三四次即消金蟾膏治症同前生白礬末五錢加麝香一分取活蝦蟆一個去肚腸同搗爛如泥四圍留頂出氣不過一夜即愈一論發背及一切腫毒不問已成未成但焮痛者槐花酒槐花四五兩炒黃乘熱入酒二杯煎十餘沸去渣熱服其毒即消神效一論癰疽發背及一切無名腫毒疼痛醫所不識初起壯盛人宜用黑白牽牛各一兩捶碎好酒一碗煎八分露一宿次日溫服大便下膿血即愈一論初起一切惡瘡腫痛丹瘤瘰癧疔腫魚口五發癰疽初覺一二日便如傷寒頭痛煩渴拘急惡寒四肢沉重恍惚悶亂坐臥不安皮膚壯熱大便閉結小便赤澀等症並治妊娠勿服千金消毒散連翹二錢黃芩一錢當歸尾一錢金銀花一錢五分皂角刺一錢赤芍一錢天花粉一錢牡蠣一錢防風大黃芒硝麻黃各一錢上銼一劑酒水各半煎服一論腸癰便毒疔癰疽初起即消已腫即潰血從大便中出瘡潰後勿服加減真人活命飲又名千金內消散當歸尾酒洗一錢五分赤芍一錢白芷一錢木鱉子去殼一錢穿山甲三大片蛤粉炒金銀花三兩乳香殭蠶天花粉皂角刺大黃各一錢栝蔞仁去殼二錢沒藥五分甘草節五分上銼一劑水酒煎服一論癰疽發背腫痛如錐刺不可忍者頓時即止芙蓉膏芙蓉葉黃荊子各等分為末上二味入石臼內搗極爛用雞子清調敷患處留頂如煙起此方用在未潰之先或將潰之際一治癰疽發背已潰爛者三神膏萆麻子仁一合陳醋一大碗鹽一撮上三味置鍋中用槐條攪成膏先將豬蹄湯洗淨或米泔水洗淨用雞翎續續掃上其皮即皺其肉即生一論諸瘡惡毒發背癰疽痛不可忍者此藥能衛護內膜驅解諸毒自然內消加味蠟礬丸黃蠟一兩枯白礬一兩乳香一錢沒藥一錢雄黃二錢上為細末用蠟熔化為丸硃砂為衣如梧子大服五十丸視瘡上下蜜水送下一論癰疽瘡癤皆由氣血凝滯風毒壅結此藥發散外邪流行氣血排膿止痛生肌長肉之劑當用於五六日間已潰未潰而作痛者宜服之加味千金內托散黃耆鹽水炒人參當歸酒洗川芎白芍酒炒白芷防風川朴薑炒桔梗官桂栝蔞仁去殼金銀花甘草節上銼每服一兩水煎入好酒半盞去渣溫服日進二三服之後瘡口有黑血出者及有汗出此藥之功也不問症候猛惡未成者自散已成者即潰矣痛甚加乳香沒藥倍當歸芍藥一論癰疽潰後須當大補血氣和脾胃托毒外出實為切要凡膿血出多陰陽兩虛此藥有起死回生之功但不分經絡不載時令醫者當觸類而長之可也或見腫平痛寬遂以為安漫不知省無補接調養之功愈後虛症復見因而轉為他病而危劇者多矣收功萬全湯黃耆蜜水炒二錢五分人參一錢白朮去蘆炒一錢白茯苓去皮一錢當歸身一錢五分川芎七分白芍酒炒七分懷熟地黃一錢官桂三分白芷三分陳皮五分甘草三分防風五分上銼生薑一片水煎溫服如作渴加麥門冬五味子如煩躁加生地黃麥門冬如有痰加薑製半夏如泄瀉加厚朴薑炒如小便不利加澤瀉如怔忡不寐加遠志酸棗仁炒胸膈不寬加厚朴薑炒楂肉上方治癰疽發背諸瘡毒潰膿後毒氣已盡氣血虛弱不長肌肉不合口膿清欲作餘症宜之一論患癰疽發背出膿後脾胃虧損不思飲食或嘔吐泄瀉四肢沉困無力八仙糕人參去蘆茯苓去皮乾山藥芡實去殼蓮肉去心不油白朮去蘆米泔浸過一宿切片微炒各四兩白糖霜一斤白粳米二升水淘淨磨極細末上將藥末米粉糖霜和一處搓揉極勻篩放籠內竹刀劃成小片蒸熟入鍋再焙乾任意食之可也斂瘡止痛生肌散宮粉火煅黃色黃柏各一錢黃連乳香沒藥孩兒茶各五分上為末摻瘡上並治下疳黃水熱泡等瘡一論癰疽發背潰爛便要此湯蕩洗豬蹄湯當歸赤芍白芷羌活露蜂房生甘草各五錢一方加黃芩上細銼看瘡大小用藥如瘡大加料用之先將獖豬前蹄兩隻一斤只用白水三升煮軟將汁分兩次撥去上面油花並下面渣肉每次用藥一兩投於汁中再用文武火煎十數沸去渣以故紙蘸藥湯溫溫徐徐薄揩瘡上死肉惡血隨洗而下洗淨以布帛拭乾貼膏藥仍避風忌人口氣吹之洗瘡切不以手觸者一論一切惡瘡癰疽發背等症此藥能退腫毒去死肉有膿無頭用此點頭自然皮破出膿替針丸人言為末入鍋內上蓋明礬燒不響為度一錢硇砂五分巴豆十粒乳香三分沒藥三分白雄丁香七分上為細末麵糊為丸如豆大用時以溫水磨化頻點瘡頭上神效替針散用木鱉子川烏二味磨水以雞翎刷瘡上留口大一處出膿如藥水干再刷上不一時即穿一論治癰疽發背發項發腦等大毒不拘已潰未潰俱用此敷貼如腫毒未潰通敷自消如已潰將此敷周圍腫焮處其破口處以神異膏貼之每日換兩三次不許見風神效二合消毒散文蛤捶碎炒黑色為末三兩六錢輕粉研三錢黃柏去皮密炙為末二兩寒水石煅為末一兩上末合為一處用新涼水一半蜂蜜一半調合不稀不稠如瘡毒尚未開將腫處遍敷之用棉紙覆於上但干即以水掃之朝夕更換二次如夏月或午時再換一次亦可若已破將此藥敷於周圍焮腫處正有膿破口處用神異膏滿貼之不必留口亦一日三換一論癰疽發背潰爛又不生肌肉用此立效但此方用之不可太早合口收功散血竭一錢乳香沒藥輕粉龍骨各一錢五分赤石脂二錢硃砂海螵蛸各五分上共為細末散在瘡口上即生肌肉一論癰疽發背諸瘡毒不拘已成已潰未潰者皆可用之諸毒甚者每日換二三次中毒換一次其藥力方能勝毒諸瘡潰膿後不長肌肉不合口者神效神異膏歸尾五錢川芎五錢赤芍二錢生地黃四錢防風羌活白芷玄參黃耆各五錢官桂三錢桃仁四十九個杏仁四十九個木鱉子十四個何首烏三錢牛蒡子五錢穿山甲四錢蜂房三錢蛇蛻二錢大黃二錢黃柏二錢亂髮男者一團如雞子大槐柳皮四十九節每長一寸上用麻油三斤四兩將藥入鍋內浸春五夏三秋七冬十日以桑柴文武火煎油黑色以穿山甲浮起黑為度絹濾去渣再熬油滴水成珠陸續下黃丹十四兩柳條攪不住手成膏軟硬得所再下乳香沒藥各三錢血竭三錢真降香末三錢次冷定下麝香末二錢水浸二三日去火性攤用一論癰疽瘡瘍痊後及將痊口乾渴甚舌或生黃及未患先渴此腎水枯竭不能上潤以致心火上炎水火不能既濟故心煩躁作渴小便頻數或白濁陽痿飲食不多肌膚漸削或腿腫腳先瘦服此以生腎水降心火諸症頓止及治口舌生瘡不絶加減八味丸懷生地黃半斤好酒拌砂鍋內蒸半日搗膏山藥一兩石棗淨肉四兩酒蒸搗膏桂心去皮澤瀉切片蒸焙乾白茯苓去皮牡丹皮各五錢遼五味子二兩五錢上為末入棗膏加煉蜜少許丸如梧子大每服六七十丸空心鹽湯送下一凡人晚年久服加減八味丸不生癰疽諸毒不患消渴等症一患癰疽之人雖云有熱皆因痛而得之愈後發渴及先渴而後癰疽非八味丸不能治一人病癰疽多有愈後發渴而不救者治之惟八味丸最效疽安而渴者服此則渴止疽安而未渴者預服此丸則永止渴氣血壯盛或未疽而先發渴服此不惟渴止疽亦不作一人平日口乾作渴因飲酒食炙爆補劑房勞凡若此類過多致令腎水枯竭不能制心火故有此症後必有疽發也宜先服八味丸以絶其源及癰疽後服此尤有益也一論癰疽發背諸瘡出膿潰爛日久不愈飲食少思身體倦怠口舌乾燥或寒熱往來驚悸少睡以補中益氣湯去柴胡加蒼朮麥門冬神麯五味黃柏少睡加酸棗仁瘡肉生遲加白薇一錢肉桂五分如膿多或清倍加參耆歸術一加味十全大補湯治癰疽潰後補氣血進飲食實為切要凡膿血出多陰陽兩虛此藥有起死回生之功但不分經絡不載時令觸類而長之可也或見腫平痛寬遂以為安漫不知省無補接調養之功愈後虛症復見因而轉為他病而危劇者多矣附骨疽丹溪曰附骨疽者皆因久食厚味及勞役與酒後涉水得此陽滯於陰之症也又曰環跳空痛不止生附骨疽以蒼朮為君佐以黃柏之辛行以青皮冬加桂枝夏加條芩體虛者加杜仲牛膝以生甘草為佐作大料煎入薑汁食前飲之痛甚者恐前藥十數劑發不動少加麻黃一二劑又不動者恐疽將成急掘地坑以火煅坑通紅沃以小便令患者赤體坐於坑中以席或棉衣圍抱下體使熱氣熏蒸腠理開氣血通暢而愈一論瘡生腿外側或因寒濕得附骨疽於足少陽經分微侵足陽明經堅硬漫腫行步作痛或不能行內托黃耆湯柴胡連翹肉桂大力子黃耆當歸尾黃柏升麻白芷甘草各八分上銼水酒各一盞煎至一盞食前溫服一治附骨疽黃連消毒飲黃連羌活各一錢黃柏黃芩藁本防己桔梗歸尾各五分生地黃知母獨活防風連翹各四分黃耆人參甘草陳皮蘇木澤瀉各二分上十九味切作一劑水煎服一老人年七十因寒濕地氣得附骨疽於左腿外側少陽膽經之分微侵足陽明經分闊六七寸長一小尺堅硬漫腫不辨肉色皮澤但行步作痛以指按至骨內大痛與此藥一服即止次日堅硬腫消而愈一論頑瘡惡毒年久不愈以有附骨在內先用貝母煎濃湯洗淨刮去腐肉用刀撥去附骨或用蜣螂腦子五六個搗爛敷上其骨即出然後用人言五釐研細末入黃銅燈盞內用好醋一小盞慢火熬干收起過三日即生出銅緑來研極細用雞翎蘸藥掃瘡上即痛出水腐肉去淨然後用後藥珍珠象牙膏楚黃賓江傳珍珠用豆腐一塊切兩片將珠鋪在內兩片合住縛定入水煮三炷香為度研細末一錢象牙末一錢天花粉末五分宮粉末一錢白蠟一錢香油五錢上共合一處入碗內重湯煮化澄成膏紙攤貼患處神效一治諸瘡大疼痛不辨肉色漫腫光色名曰附骨癰又治瘡口久不合酒調服三生散露蜂房蛇蛻亂髮洗淨各等分上三味燒灰存性研末酒調服一錢七分臀癰丹溪曰臀癰者臀居小腹之後在下此陰中之陰道遠位僻雖曰太陽多血氣氣運不到血亦罕來中年後尤慮患此才有腫痛參之脈症但見虛弱便與滋補血氣可保終吉若無滋補之功其禍多在結痂之後或半年以來乃病多致失手慎之慎之一論足太陽經中左右尺脈俱緊按之無力屁臀生癰堅硬腫痛大作內托羌活湯羌活黃柏酒炒防風藁本歸尾各二錢黃耆一錢五分蒼朮米泔浸連翹陳皮甘草炙各五分肉桂三分上銼一劑酒水同煎空心溫服以衣覆蓋患處使藥力常行不可去衣腸癰丹溪曰腸癰常作濕熱積久入風難治千金謂腸癰妄治必殺人其病小腹重強按之則痛小便如淋時時汗出復惡寒身皮甲錯肚腹緊急如腫之狀脈數者微有膿也巢云洪數已有膿脈若遲緊者未有膿甚者腹脹大轉側有水聲或繞臍生瘡或膿自臍出或大便膿血急服蠟礬丸酒下兼進後方一論腸癰便毒癰疽初起即消已腫即潰血隨大便中出宜用千金內托散方見癰疽即加減真人活命飲一論肚內生癰及癰疽惡毒宜用內消沃雪湯當歸身白芍黃耆甘草節射干連翹香白芷貝母陳皮皂角刺乳香沒藥穿山甲天花粉金銀花木香青皮甚者加大黃上銼酒水煎服祕方是世所奇投之如神一論腸癰脹痛不安或腹滿不食小便赤婦人産後虛熱多有此疾但疑惑間便不服服亦無害視其右關脈芤者是也薏苡仁二兩牡丹皮一兩栝蔞仁一兩上銼一兩水煎一方加川芎桃仁一婦人腹痛如錐刺每痛至死不敢著手六脈洪數此腸癰毒也用穿山甲炒白芷貝母殭蠶大黃上銼一大劑水煎服打下膿血自小便中出即愈後再無患宜少食煎炒熱物一治腸癰日久潰爛出膿腹內刺痛不可忍者用鐵打一尺長三稜針將鴨腸一條貫針在內將鴨腸曲轉輕輕送入糞門內送到痛處方是瘡癰之處即將鴨腸扯動針尖出刺破其毒膿隨針而出用手重按痛處膿出盡而愈此祕法也囊癰丹溪曰囊癰者濕熱下注也有作膿者此濁氣順下將流入滲道因陰道或虧水道不利而然膿儘自安不藥可也惟在善於調攝耳又有因腹腫漸流入囊腫甚而囊自裂開睪丸懸挂水出以烰炭末敷之外以紫蘇葉包裹仰臥養之一論癰疽入囊者曾治數人悉由濕熱入肝經處治而用補陰藥佐之雖膿潰皮脫睪丸懸者皆不死一方用野紫蘇葉面青背紅是也焙乾為末敷之如燥者以香油調敷囊無皮者外以青荷葉包之其皮自生也懸癰一論懸癰此瘡生穀道外腎之間初發甚癢狀如松子四十日赤腫如松治遲則破而大小便皆從此出不可治矣國老湯用橫紋大甘草一兩截長三寸許取出山澗中流水一碗不用井水河水以甘草蘸水文武火慢炙不可性急須用三時久俟水盡為度劈視草中潤透卻以無灰酒二碗煮至一碗溫服一日一服半月消盡為度將軍散大黃煨貝母白芷甘草節上為末酒調空心服虛弱加當歸一半一論肝經濕熱玉莖患瘡或便毒懸癰腫痛或潰爛作痛小便澀滯或睪囊挂龍膽瀉肝湯龍膽草酒拌炒黃澤瀉各一錢車前子炒木通生地黃酒炒當歸尾酒炒山梔炒黃芩炒甘草上銼一劑水煎空心服瘰癧瘰癧屬血氣痰熱必起於少陽一經不守禁忌延及陽明大抵食味之厚鬱氣之積曰風曰熱皆此二端扼引變換須分虛實實者易治虛者可慮此屬膽經主決斷有相火且氣多血少婦人見此其月經如期不作寒熱者易治積久轉為潮熱危矣自非斷欲食淡神仙不治也一論瘰癧者經所謂結核是也或有耳前後連及頸項下連缺盆皆為瘰癧或在胸前及胸之側下連兩脅皆為馬刀手足少陽主之獨形而小者為結核續數連接者為瘰癧形長如蛤者為馬刀也一論繞項起核名曰蟠蛇癧延及胸前及連腋下者名曰瓜藤癧左耳根腫核者名曰串袋癧右耳根腫核者名曰蜂窩癧一論瘰癧馬刀生耳前後或項下胸腋間纍纍如珠者未破已破皆治消毒化堅湯當歸一錢黃耆一錢白芍一錢玄參六分天花粉六分連翹一錢五分柴胡一錢黃芩五分牛蒡七分龍膽草四分升麻七分桔梗一錢陳皮八分羌活七分薄荷四分海昆布七分甘草四分上銼一劑生薑煎服一方加甘草節知母貝母海藻更佳升陽調經丸升麻八錢葛根五錢芍藥二錢煨連翹五錢黃連五錢黃芩酒炒五錢生黃芩四錢黃柏酒炒五錢桔梗五錢歸尾二錢三稜酒炒三錢莪朮酒炒膽草酒洗甘草炙各五錢夏枯草五錢上藥稱一半另研為末煉蜜為丸如緑豆大每服一百二十丸白湯下一半作飲片每服五錢水煎服半月即痊一論久患瘰癧流注以致血氣兩虛懷抱抑鬱飲食少思或四肢患腫肉色不變或日晡發熱或潰而不愈久不愈者益氣養榮湯黃耆炙人參白朮去蘆炒各一錢五分當歸酒洗川芎白芍炒懷生地黃炒陳皮香附貝母各一錢柴胡地骨皮桔梗甘草各五分上銼一劑水煎食後服如有痰加橘紅如脅下刺痛加青皮或木香如午後有熱或頭微眩加黃柏炒如膿水清倍人參黃耆當歸如女人有鬱氣胸膈不利倍香附貝母如月經不調加牡丹皮當歸一論瘰癧兼諸瘤皆治抑氣內消散當歸川芎白芍炒白朮去蘆炒青皮白芷半夏薑炒陳皮桔梗羌活獨活厚朴薑炒防風黃芩烏藥香附檳榔各一兩蘇子一兩五錢沉香三錢木香人參粉草各五錢上銼水煎溫服十餘服即消若再發照分兩製為末酒糊為丸如梧子大每服五十丸酒送下一論瘰癧未破在左為瘰癧宜內消調經散山東李西嶺傳升麻葛根龍膽草黃連桔梗連翹黃芩黃柏莪朮三稜甘草各五分當歸尾白芍各三分上銼水煎服稍虛加夏枯草有痰加天花粉知母各五分少陽加柴胡四分一論在右為馬刀瘡未破宜柴胡通經湯柴胡連翹歸尾甘草黃芩鼠黏子三稜桔梗各二分黃連紅花上銼一劑水煎熱服一論瘰癧已破者補中勝毒湯黃耆一錢人參當歸生地黃熟地黃白芍陳皮各三分升麻五分柴胡五分連翹一錢防風甘草各五分上銼水煎熱服一治瘰癧並頸項結核或腫或痛宜夏枯草水煎食後頓服一方用夏枯草一把水煎三次去渣熬成膏貼患處立消一治瘰癧元氣無虧用此以去之若癧既去而不收斂服前益氣養榮湯若元氣怯弱宜先補後服癧毒以後仍服前湯度無他疾此方治瘰癧未成者消已潰者斂元氣壯者可服必效散南硼砂二錢五分輕粉一錢麝香五分巴豆五個去皮心用白檳榔一個斑蝥四十枚去頭足用糯米炒熟去米上研極細末取雞子二個去黃用清調藥仍入殼內以濕紙數重糊口入飯甄蒸熟取出曝乾為末每服五分生薑酒炒五更初調服如覺小腹痛用益元散一服其毒俱從大便出一治遠年鼠癧瘡神方千捶緑雲膏松香半斤熔七次濾去渣乳香一錢五分沒藥二錢五分血竭一錢銅緑二錢半杏仁去皮二錢孩兒茶三分萆麻子去殼二兩麻油二兩乳汁二盞上為細末合作一處同乳汁麻油攪勻捶搗千下成膏用絹上藥貼患處一婦人患瘰癧久而不愈或以為木旺之症不宜於春預用散腫潰堅湯腫硬益甚余以為肝經虧損用六味丸補中益氣湯至春而愈此症若肝經風火自病元氣無虧可用散堅瀉青之劑若肝自虧損或水不生木用六味丸若金來剋木須補脾土生腎水若行攻伐則脾胃傷而反致木剋土矣一婦人項核腫痛察其血氣虛實先以必效散一服去之更以益氣養榮湯三十餘劑補之而消蓋此症初起而血氣虛弱者先用益氣養榮湯待其氣血稍充乃用必效散以去其毒仍用補藥無不奏效若已成膿者即針而補托之氣血復而核不消者服散堅之劑倘不應而氣血如故仍以必效散養榮湯又不應灸肘尖肩髃二穴用千捶緑雲膏自愈若氣血壯實不用追蝕亦能自腐用藥以腐之者便易於收斂耳若血虛而用追蝕不惟無益適以取敗凡不慎飲食七情者不治疔瘡夫疔瘡者由四時迭更陰陽交變此二氣互相激怒必成暴氣然暴氣卒然大風大霧大寒大熱若不能避而遇襲於皮膚入於四體傳注經絡遂使腠理結滿陰陽二氣不得宣通遂成疔毒但疔毒之名有十三種必發於手足間生黃泡其中或紫色有一帶紅線道直入者用針於線處刺去毒血水針時以知痛出血為妙否則紅線入腹攻心必致危困凡治疔毒先以麵漿水飲之吐則是不吐則非也大抵脈洪而數者難愈也一治疔瘡惡毒神效飛龍奪命丹方見諸瘡一治疔腫及無名瘡毒掐頭去白水以蔥頭搗敷神效一治無名腫毒疔瘡手指無故生蛇頭指腫痛不可忍有紅筋入心者蜈蚣二錢雄黃一錢歸尾土赤芍白芷梢各二錢上銼為末頭生酒煨服神效一論一切惡毒疔瘡諸般無名腫毒及四時傷風傷寒憎寒壯熱無汗初覺者趙府小靈丹乳香沒藥輕粉血竭硃砂川烏尖草烏尖細辛巴豆霜蟾酥麝香減半上為細末糯米糊為丸如黃米大雄黃為衣每服十三丸小兒五七丸用蔥白三根劈開入丸在內細嚼好酒送下以被蓋出汗避風婦人有孕不可服一論一切疔瘡惡毒腫痛神方類聖散川烏草烏蒼朮細辛白芷薄荷防風甘草各五錢為上細末蛋清調塗患處留頂一凡患疔瘡癰疽癤毒此藥能令內消去毒化為黑水從小便出萬無一失不可輕視知母貝母白芨半夏天花粉皂角刺金銀花穿山甲炒乳香各一錢上銼一劑用無灰酒一碗煎至一半去渣只作一服溫服不得加減再將渣搗爛加過秋芙蓉葉一兩搗爛用蜜調井花水和敷瘡口上如干再用蜜水潤濕過一宿自然消不必用第二服藥也忌發物一人腳面生疔形雖如粟其毒甚大宜峻利之藥攻之因其怯弱以隔蒜灸五十餘壯癢遂止再灸片時乃知痛更用膏藥封貼再以人參敗毒散漸愈夫至陰之下道遠位僻且怯弱之人用峻利之劑則藥力未到胃氣先傷虛虛之禍有所不免不如灸之為宜便毒便毒一名騎馬癰此奇經衝任為病而癰見於厥陰經之分野共經多血又名血疝或先有疳瘡而發或卒然起核疼痛而發皆熱鬱血聚而成也初發宜疏利之即散或膿後如常用托裡內補之藥一論便毒是厥陰經濕熱因勞倦而發用射干三寸以生薑煎食前服得利二三行立效射干開紫花者是一論便毒極效方追毒散當歸尾赤芍白芷金銀花天花粉各一錢白殭蠶炒六枚木鱉子十個穿山甲二片大黃三錢芒硝二錢一方加五靈脂更妙上銼一劑好酒煎露一宿五更熱服厚蓋發汗利一二行即愈其硝黃待群藥煎將熟方入再二沸用之一方加射干去芒硝一論魚口便毒方神異散金銀花天花粉木鱉子各二錢甘草三分連翹黃芩各八分山梔子七分穿山甲炙二片皂角刺三錢木香五分大黃三錢上銼一劑酒水煎空心服一治便毒腫痛神方徐完愚傳大黃全蠍蟬蛻殭蠶穿山甲土炒成珠白芷梢貝母當歸尾各二錢上合一帖水煎後加入大黃再煎二沸去渣入好生酒同服如未散加蜈蚣一條同煎服一治魚口瘡方用豬膽一枚投熱酒一碗溫服即內消一治魚口便毒方上為末黃酒調下一治魚口便毒方陳雲嶽傳殭蠶炒三十六個穿山甲土炒二錢蜈蚣二條大黃三錢甘草節一錢杏仁去皮尖一錢五靈脂二錢全蠍一個皂角子炒一錢金銀花一錢上銼一劑酒水各半煎服下疳下疳瘡乃男子玉莖生瘡皆因所欲不遂或交接不潔以致邪毒浸漬發成瘡毒日久不愈或成便毒或損爛陽物多致危篤又魚口瘡妒精瘡皆其類也俗云疳瘡未已便毒復來生也妒精瘡此蓋因婦人陰中先有宿精因而交接虛熱熏蒸即成此疾初發在陰頭如粟類拂之甚痛兩日出清膿作白孔蝕之大痛婦人有生於玉門內正似疳蝕瘡不痛為異耳消疳敗毒方防風六分獨活六分柴胡一錢五分連翹七分荊芥七分黃柏八分知母七分黃連七分赤芍九分蒼朮七分赤茯苓九分木通九分龍膽草九分甘草三分上銼一劑燈心二十四寸水煎空心服如有便毒量人虛實加大黃一二錢煎服一治下疳痛不可忍如神宮粉煨五錢冰片二分水銀三分用錫三分制上為細末摻瘡上一治下疳潰爛珍珠燒存性片腦人手指甲足指甲燒成灰各一分血餘燒成灰二分上為細末摻患處一熏下疳方皮硝一碗乳香雄黃孩兒茶各五分上入小壇內外用牛糞火煨壇熱其硝自化熏至晚上使以心口涼為度一治陰頭上疳瘡何和宇傳五倍子燒灰存性一錢七分硃砂七分孩兒茶五分冰片五分輕粉二分五釐水銀二分上共為細末撒患處如從一邊爛起加狗骨燒灰二分如從周圍爛起加鱉殼燒灰二分一治疳瘡祕方八寶丹乳香沒藥孩兒茶紅褐子灰海蚆焙一個珍珠炒象牙煨龍骨煅各五分上為細末先用米泔水洗瘡拭乾摻上神效一疳瘡膿清不結痂不合口久不愈者用六味地黃丸加黃柏知母麥門冬四五劑而愈一治疳瘡用黃柏去皮以豬膽汁炙透為末摻瘡上一治陰囊上生瘡用甘草煎水溫洗卻用腦茶末敷之一治陰頭生瘡用溪港中螺螄入乾鍋內煅過先以溫水洗五七次後以此藥敷之一治妒精瘡用大田螺兩個和殼煅過存性為末加輕粉敷之一治外腎生瘡用緑豆粉一分蚯蚓屎二分水研塗干又敷一治腎臟風發瘡疥用紅椒去目水浸半日和生杏仁研爛擦兩手掌掩外腎極效一治下部生濕瘡熱癢而痛寒熱大小便澀食亦減身面微腫用馬齒莧四兩研爛入青黛一兩再研勻敷上一治下疳瘡白礬一兩黃丹八錢熬飛紫色上研為細末以溝渠中惡水洗過拭乾敷上一治蠟燭發神方鐘乳石二分硃砂三分珍珠二分琥珀一分五釐片腦二分五釐上為細末每用土茯苓四兩豬蹄三隻煎水三碗早間服一碗調前藥末四釐午間服一碗調前藥末四釐晚間服一碗調前藥末四釐一日服三次共一分二釐十日服盡其瘡必愈其豬蹄隨用之忌動風發物牛肉燒酒最忌之神良之祕方也楊梅瘡夫癘瘡者一名楊梅瘡因形相似乃氣受之故堅實凸起又名棉花瘡血受之其形扁拓而潰又名果子瘡亦類其象而俗呼之也北又曰天泡瘡皆一名異而實同源治療當別自致者重傳染者輕蓋自致者必因淫欲太妄以致陰處起火及縱口恣味三焦皆熱精竭血結遺滯諸經而成者也俗傳以母豬犬羊肉雞鯉毒物發出謂毒盡殊不知在火上添油矣又有怕露出而求速效者過服敗毒散則傷五內胃氣毒益陷伏以藥線熏臍致使出不能出收不能收廷潰不能杜絶手足心皮枯似白鵝掌風及後筋骨疼痛風塊惡候皆未獲良治而然也凡遇此患托裡解毒湯外用千里光明湯頻頻洗浴大效托裡解毒湯當歸一錢五分赤芍一錢五分川芎生地黃連翹黃芩防風各一錢黃連酒炒二錢荊芥穗七分苦參酒炒羌活薏苡仁各一錢皂角子十個防己一錢木瓜五分生甘草二分土茯苓一兩濕者四兩上銼水二碗煎至一碗溫下渣再煎服虛弱人加人參一錢自生者加黃柏一錢牛膝一錢獨活一錢宜服二十帖每帖煎三次一日服一帖千里光明湯青木香黃連黃柏黃耆荊芥防風苦參蒼耳子蛇床子羌活升麻麻黃甘草各五錢雞腸草焙冬青葉焙上作一劑用布包水煮於無風處服此煎藥即以此湯浴洗涼了又加熱藥湯煮熱者實洗微汗拭乾十日後不必頻洗其藥渣併入煎藥渣再洗雞腸草一名千里光明草又名九里明俗名藤枯賣其葉梢尖而歧開花白色處處有之一治楊梅瘡初起先服防風通聖散十餘劑後服此收功永無後患十全丹云萊弟驗雄黃硃砂乳香沒藥孩兒茶當歸白芷丁香槐角各一錢輕粉用花椒一錢煎水調蒸八分上為細末飯為丸如緑豆大每服三十丸土茯苓湯下一治楊梅瘡先服防風通聖散加紫草一兩同煎服後服此良十九服驗白蘚皮二兩皂角子一百二十個防風二兩細辛一兩三錢川烏一兩草烏二個罌粟殼四兩上銼十劑每一劑用土茯苓一斤豬肉半兩同煎服一治楊梅瘡黃左川傳連翹四兩金銀花四兩牙皂二兩杏仁二十四個蟬蛻二十一個肥珠子三十一個冷飯糰一斤上俱銼用酒拌炒作十帖水煎服一治楊梅瘡毒黃仰溪傳金銀花一兩五錢青藤歸尾皂角刺五加皮白蘚皮各二兩上銼分作十二劑每劑用土茯苓十二兩水煎服先服通聖散一治楊梅瘡南塘侄驗漢防己七錢槐花二錢五倍子四錢上三味為末用土茯苓半斤研爛豬肉半斤切碎共作一服用酒煮熟連渣並肉通服一治楊梅瘡良方胡云齋傳歸尾牛膝黃芩大黃各一兩三錢木瓜一兩金銀花二兩二錢皂角刺八錢蟬蛻五錢土茯苓二錢上銼分作十帖每帖用紅棗白果皂角子各十枚蔥白三根水煎臨晚服忌緑豆一治天泡瘡神方用鐵鏽釘釅醋磨濃搽瘡上立已一論凡人患楊梅天泡棉花等瘡致成一切難狀之疾或楊梅瘡爛見骨經年不收口者或筋骨疼痛舉發無時或遍身疙瘩不消或手足皺破出血或遍身起皮發靨好一層起一層或赤癱白癱鵝掌風癬或皮好骨爛口臭難當及年久臁瘡不愈一切頑瘡惡毒並皆神效通仙五寶湯鍾乳粉三分大硃砂琥珀冰片珍珠各一分五釐上為細末用白飛麵炒三分共一錢二分分作十二帖每一日一帖用一分用土茯苓一斤水煎十二碗每清晨用半碗和服共十二碗一日俱要吃盡不可別用茶湯一日一服有不盡劑而愈者有終劑而愈者如病重未愈須再服一料忌雞鵝魚牛羊發物及房勞一忌楊梅風塊作腫作痛及癰疽瘰癧毒並一切無名腫毒黑虎膏草烏四兩南星半夏大黃各二兩五倍子三兩同緑豆五兩共炒焦乾薑五錢薑黃一兩黃柏一兩上為細末共和勻用蔥汁米醋調成膏貼患上時常以蔥醋潤之毋令乾燥其膏一日又取下加些新的復研再貼以消為度一楊梅瘡愈後遺癬毒一層一層頑皮癢不可當牛油柏油香油黃蠟各一兩熔化待溫入後三味銀硃一錢五分宮粉一錢麝香五分上為末入內和勻先將火烤癬令癢抓破擦上藥再烤再擦如神一治楊梅瘡不論遠近先服防風通聖散十數劑後服此丸收功神效輕粉孩兒茶糯米飯芝麻各一錢上共搗為丸作一百個每早茶下十丸忌葷鹽一治楊梅瘡雄黃二錢真輕粉一錢杏仁去皮尖三十個上研為細末入杏仁再研如泥用雄豬膽汁調搽瘡要先洗淨拭乾搽藥二三日效疥瘡夫疥與癬皆熱客於皮膚之所致風毒浮淺者為疥也毒之深沉者為癬也多因風毒夾熱得之疥發於手足或至遍身癬則肌肉癮疹或圓或斜或如苔蘚走散內藏汁而外有筐曰乾癬苔癬風癬濕癬四者莫不有蟲者治癬去風殺蟲是也一論風瘡疥癬癮疹紫白癜風赤遊風血風臁瘡丹瘤及破傷風在上部者加桔梗一錢在下部者加木瓜牛膝各一錢如濕氣成患而在下去蟬蛻殭蠶祛風敗毒散枳實赤芍前胡紫胡各五分荊芥薄荷牛蒡子獨活蒼朮各六分殭蠶連翹各七分川芎羌活各八分蟬蛻甘草各三分上銼一劑生薑三片水煎服一熏疥如掃銀硃一錢雄黃一錢木鱉子一個好攛香一錢艾葉三錢上五味為末以紙卷條陰陽瓦盛熏兩腿腕以被蓋之留頭面在外先以布包裹二便一治熏瘡疥蟲瘡花椒雄黃蘄艾上三味共為末將紙卷簡放被內熏之一洗疥如神防風荊芥馬鞭草白礬花椒苦參野菊花上銼水煎湯洗神效一治疥如神徐金坡傳大楓子五錢水銀渣三錢樟腦一錢五分上用油核桃同搗爛絹帛包擦疥上一熏疥妙方油核桃去囊一半留一半搗爛入苦參末八釐攪勻仍合一處放瓦上火燒煙燻之即已一掃光又名玉繡球治諸瘡疥癩大楓子肉四十九個杏仁泡去皮四十個二味同研花椒去子四十九個白礬生用另研二錢水銀三錢茶葉另研末一錢樟腦二錢另研以上三味同研輕粉一錢上和勻再研聽用先以槐柳桃楮桑五木枝煎湯洗疥拭乾將前藥量疥多少用柏油入鹽少許乘熱和藥擦上一日搽三次忌羊雞魚豬頭等物一治乾疥瘡香油四兩花椒一兩熬至焦黑研爛入大楓子去殼七個輕粉三錢硫黃一錢人言三分為末入油內搽之十香膏白礬炒輕粉水銀雄黃川椒去子炒樟腦各一錢檳榔一個研末杏仁四十個去皮同研大楓子去皮肉四十個另研上共和勻用柏油八錢俱入乳鉢內研至不見水銀星為度丸如彈子大待瘡疥癢將藥丸於患處滾過一治遍身風癢生瘡疥土蒺藜湯洗之一治老人生皮風疥瘡瘙癢藜蘆根為末脂油調搽即愈一鼻聞香疥瘡後山李懷嚴傳大楓子三十個朝腦三錢研細水銀一錢研至不見水銀星為度後入油核桃仁七個上共一處再研用粗碗盛在內用紙蓋口勿使泄氣用時擦手心內以鼻聞數日即已或擦亦可癬瘡一風癬膿疱疥癩血風諸瘡腫毒歸尾一錢五分赤芍黃芩黃連黃柏各一錢大黃三錢防風八分金銀花苦參各一錢木鱉子去殼一個上銼一劑水煎露一宿五更服若腸風臟毒下血去木鱉子加槐花一錢一治一切癬瘡瘙癢甚者胡粉另研雄黃另研硫黃另研各一錢五分大草烏三錢生用斑蝥一錢砒霜五分全蠍梢三錢麝香五分上為細末先用羊蹄根蘸醋擦動次用藥少許擦患處一治乾癬不瘥天南星草烏各一個生用上為末用羊蹄根搗勻和調塗一治遍身頑癬大楓子四十九個川槿皮二兩斑蝥去翅足五個川椒輕粉各一錢杏仁三錢海桐皮二錢上共為末河水井水各一碗浸一夜蘸汁擦之一治癬瘡效方萬嵩鶴傳用馬蜂窩一個仰放炭火上用枯礬末漸漸填滿下面火炙令焦為末蠟腳醋調塗癬上即愈一切疥癬癩瘡及諸瘡不能收口者立見收口魚腥草曬乾為末為主雄黃一錢木鱉子去殼一個銀硃一錢艾葉不拘多少上為末紙卷燒煙燻患處立效一治疥癬瘡板血風痛癢神效孫方李存吾傳大楓子去殼四十九個蛇床子二錢木鱉子去殼念個川椒二錢枯礬輕粉水銀各二錢朝腦一錢上為末柏油搗勻先將椒艾湯洗令淨癢時抓破患處擦之大效一治牛皮癬極癢抓爛牛腳爪燒灰存性為末香油調搽立效一治癬瘡用扉針磨極尖快當癢時於癬瘡上各刺百針血出盡鹽湯洗之未愈再刺再洗禿瘡白禿之候頭上白點斑剝初似癬而上有白皮屑久則生痂疸成瘡遂至遍頭洗刮除其痂頭成瘡孔如箸頭大里有膿汁出不痛而有微癢時其內有蟲甚細微難見九蟲論亦云是蟯蟲動作而成此瘡乃自幼小及長大不瘥頭髮禿落故謂之白禿也宜以後方治之一治禿瘡方藜蘆二錢枯礬苦參五倍子各二錢上為細末香油調搽一治禿瘡方臨穎楊子登傳仙人垢即埋葬過人棺板底上垢膩也研爛不拘多少上用鯽魚以香油煎熟去魚將油調仙人垢塗禿上一錢厚一二次即愈一治禿瘡先用水洗令淨用燒酒和芥末調塗患處立已一治禿瘡膽礬三錢乳香二錢沒藥二錢紫草五錢食鹽三錢木柏油一錢油同草鹽煎久下前三味剃頭方搽一治頭瘡如神云松弟驗紫草沒藥淮鹽各三錢炒木柏油二兩膽礬一錢石乳二錢樟腦二錢上為細末柏油調勻先將頭髮剃淨再洗令淨擦藥一日搽一次神效一治小兒白禿瘡黃柏皮五分枯礬一錢五分硫黃韶粉輕粉各一錢上為細末臘月豬油調日擦三次又用大蒜每早揩白處一治禿頭瘡用鯽魚一個重三四兩去肚腸以亂髮填滿紙裹燒存性雄黃二錢共為末清油調敷先以盡洗拭後用藥又方以苦楝皮燒豬脂調敷癜風紫癜風白癜風乃因心火汗出及醉飽並浴後毛竅開時乘風揮扇得之扇風侵逆皮腠所致宜服胡麻散或追風丸外以洗擦藥滌之一論紫白癜風並癬及面上灑㾴又名粉㾴面刺俱可服之胡麻散胡麻子赤色扁者佳另研五兩白芷二兩何首烏防風升麻威靈仙各二兩蔓荊子一兩五錢甘菊花一兩苦參酒炒三兩川當歸川芎藭酒炒牛蒡子微炒另研荊芥穗薄荷葉片黃芩各二兩白蒺藜三兩白芍酒炒二兩黃連酒泡一日炒二兩上為細末每服三錢食遠服秋分後至春分白酒調服用米糊細丸食遠白湯下亦可追風丸何首烏荊芥穗蒼朮米泔浸焙苦參各四兩上為細末好肥皂三斤去皮弦子入砂鍋內水熬成膏和為丸如梧子大每服五六十丸空心溫酒或茶送下最忌一切動風之物一治白癜風用雄雞腎白果仁搗爛擦患處一治汗斑方白蓮花半夏上各等分為末飛麵糊為丸如彈子大用六安茶擦之一治紫癜風白癜風即如今汗斑之類白附子雄黃密陀僧上各等分為細末用帶皮生薑自然汁調以茄蒂蘸藥擦之即愈一治紫白癜風神方雄黃二錢雌黃硫黃白砒白礬並用透明者佳各二錢上共為末每用時先一浴令通身出汗次以搗生薑拌藥布包患處擦之良久以熱湯淋洗一治白癜風方用杜蒺藜子生搗為末作湯服之每服三錢癘風夫癘風者天地殺物之風燥金之氣也故令瘡而不膿燥而不濕燥金之體澀故一客於人則榮衛之行滯令人不仁而麻木也毛落眉脫者燥風伐其榮衛而表氣不固也遍身癩疹者上氣下血俱病也諸痛屬實諸癢屬虛癘風之癢固多有蟲而衛之虛不可誣也是症也以潤燥之劑主之白花蛇血氣之屬也用血氣之屬以驅風豈不油然而潤乎然其性中有毒同氣相求直達癘風毒舍之處豈不居然而效乎皂角之性善於潔身則亦可以潔病苦參之性善於去熱則亦可以去風昔人治以防風通聖散此方乃汗下之劑也非榮衛虛弱者所宜今以玉屏風丸更之則黃耆可以排膿補表防風可以利氣疏邪白朮可以實脾而補肌矣補氣瀉榮湯黃耆當歸生地黃黃連各三分人參二分黃芩四分連翹升麻各六分甘草一錢五