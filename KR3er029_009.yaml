錢攪勻用生酒調服一敷諸瘡腫未破者蝦蟆一個先以石灰炒過後將蝦蟆剁爛同研如泥用綿帛攤上貼患處自破一治諸瘡惡毒臁瘡疔瘡搭手背瘡等瘡蔥白一斤馬齒莧一斤石灰一斤上三味濕搗為餅陰乾為細末貼瘡即效一外消腫毒方豬苦膽三個生薑半斤取自然汁好醋一盞上三味合和一處以好京墨磨濃抹腫處立消一治外科諸毒腫痛初起未破用連須蔥數根用稻杆燒過半熟搗爛入蜜二匙再搗勻成餅敷患處立消內服白礬熔化為丸硃砂為衣每服三錢用蔥酒送下汗出立止一治無名腫毒用家園生地黃敷之立已一切無名腫毒瘡癤樹上馬蜂窩二錢壁錢扯破一錢乳香沒藥孩兒茶各八分雞肫皮一錢上各為末蠶繭扯破一錢攛香三根共鋪綿紙上卷作筒線纏蘸入香油點著照患處立消如腫盛加艾少許一治諸般惡毒腫痛不可忍者一枝煎白芨天花粉知母牙皂乳香金銀花半夏穿山甲酥炙貝母各一錢五分上銼一劑酒兩鍾煎一鍾溫服汗出立愈一切瘡毒腫痛成膿用火罐拔三次即將膿水拔出而消散矣洪寶膏天花粉三兩赤芍二兩白芷薑黃各一兩上為細末茶調敷之此藥一涼而已能化血為水涼肌生肉去死肌爛肉及能破血退腫又能止痛出膿或用三分薑汁七分雞清調敷能使血退薑汁性熱能引血潮故血破散而後成膿如熱盛瘡毒恐隨干又痛赤腫不消者用雞清調敷取其難乾如湯燒療亦同也一敷治一切腫痛如神鐵箍散南星草烏白芨白蘞白薇黃柏天花粉吳茱萸白芷各一兩芙蓉葉二兩上為末用雞清調敷一治血風瘡並濕熱生微其形如釘高起寸許者追風解毒湯連翹黃連黃芩黃柏防風荊芥羌活獨活殭蠶全蠍蒺藜金銀花威靈仙歸尾甘草赤芍上銼各等分水煎服一治血風疥癬蟲瘡癩瘡痛癢發熱等症徐完初試驗大楓子去殼一兩樟腦五錢水銀二錢輕粉一錢核桃肉十個上共研爛為丸如彈子大放手掌心揉擦其瘡自已連擦四五次以愈為度或將藥擦瘡上亦可一治軟瘡癤毒久不能開口疼痛不可忍者巴豆用線穿燈上燒存性為末放瘡頂上以膏藥貼之即潰一治坐板瘡琯四九兄傳花椒一錢炒胡椒七分枯礬一錢人言一分上為末柏油調搽一治坐板瘡痛癢經年弗愈中州傅愛泉傳人言一分密陀僧三分硫黃二錢石膏一錢五分上為末生豬油調搽患處一治瘡口難斂及多年惡瘡百方不瘥或痛焮起不已者馬齒莧擂罨如泥敷周圍立效一治諸瘡毒臭爛不堪聞者雄黃生白礬上等分煎湯洗之一治濕撓瘡方黃蠟白蠟銅緑黃丹童女發各一錢上用香油二兩入銅杓內熬入藥同煎將紙折作十數層入鍋內熬貼瘡一治凍瘡用茄子根濃煎湯洗並山雀兒腦髓塗之一諸處凍瘡久不瘥年年發不歇先癢後痛然後腫破出黃水不止用雄雉黃一枚搗爛黃蠟各等分清油減半同於慢火熔熬調搽患處如治手腳痛瘡用橄欖燒存性為末入輕粉油調塗上一治頭上風瘡腫痛臭爛用包銀硃粗紙煙熏發內蟲即死而愈一治蛇頭指用雞子開一竅將指入內待蛋化水又換一個如此三枚即已一手足患纏爪黃腫痛作膿不可忍者用藠加石灰捶爛敷上立已一蛇頭指痛不可忍臭不可聞用蜈蚣一條焙乾為末豬膽汁調塗一又指無名腫毒痛不可忍者白芨一錢蟾酥三分上共和一處用雞清調塗當時腫消痛止一治血風瘡石膏硫黃百草霜上各等分柏油調搽一治肥瘡黃水瘡紅棗燒灰枯礬黃丹宮粉松香各一錢銀硃三錢上為細末濕則摻之干則香油調搽一治腳上諸般瘡毒膏藥方水銀一錢沒藥五分新瓦焙乾黃丹五錢細茶三錢大楓子十個去蘆輕粉一錢黃蠟五錢石乳香五分瓦焙片腦三釐真麻油一盞上藥俱研極細末篩過用黃蠟麻油同煎用文武火慢慢煎熔成膏稍冷方下片腦再煎一刻取退用細嫩油紙薄抹隨瘡大小為度不宜太闊二日一換每帖用後藥煎水洗淨瘡口方貼大黃苦參黃柏蒼朮防風金銀花艾葉茶葉上各等分煎湯洗瘡口一多年頑瘡久不愈者並諸瘡不收口者黃蠟二兩黃丹四兩輕粉乳香沒藥血竭孩兒茶各一錢上為細末先將真麻油半斤煎至滴水成珠下黃蠟化開再入黃丹就起離火方下諸藥攪勻入罐收用一翻花瘡及似花之狀胭脂貝母各三錢胡粉一錢五分硼砂沒藥各二錢上為細末先用溫漿水洗淨後敷之一月蝕瘡蟲或生小耳內胡粉炒微黃枯山礬黃丹煅黃連輕粉胭脂各三錢麝香少許上為末以漿水洗之拭乾後搽藥上麻油調敷即愈一腳生雞眼作痛者以燖雞湯剝洗效一腳指縫白爛者用鵝掌黃皮燒存性為末敷之如水出用飛黃丹入花蕊石粉摻之一治腳脛上生瘡腫痛頑毒潰爛久不已隔紙膏陳雲嶽傳枯礬三錢密陀僧三錢龍骨煅三錢黃丹水飛三錢上用油紙將布針刺孔桐油調摻上貼患處一治軟癤方用牛膠將滾水泡軟貼患處中留一孔出氣久之自落一人纍年遍身瘡疥風癢熱毒苦楚難禁豫制此或服之永不瘡疥妙不可言當歸酒洗一兩白芍乳汁炒二兩懷生地黃酒洗二兩防風去蘆二兩熟地黃酒蒸二兩川黃柏鹽水炒一半童便炒一半各一兩知母去毛酒炒二兩白朮用壁土炒一兩土茯苓六兩苦參去皮炒四兩甘草一兩上為細末用豬肚一個好酒四壺文武火煮爛搗成藥末為丸如梧子大每服五十丸酒送下忌雞魚牛羊肉一治瘡疽久不愈黃耆一兩當歸一兩五錢白芍二兩白茯苓一兩白芷三錢川芎二兩厚朴五錢官桂七錢陳皮一兩炙甘草一錢上銼薑棗煎服膏藥一治一切風寒濕氣手足拘攣骨節痠疼男子痞積婦人血瘕及腰脅諸般疼痛結核瘰癧頑癬頑瘡積年不愈腫毒初發楊梅腫塊未破者俱貼患處肚疼腹痛瀉痢瘧疾俱貼臍上痢白而寒尤效咳嗽哮喘受寒噁心胸膈脹悶面色痿黃心疼氣痛俱貼前心負重傷力