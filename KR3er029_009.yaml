錢黃蠟三錢朝腦二錢五分乳香一錢沒藥二錢冰片一分上為末先以豬油同二蠟化開入群藥末調攤貼之一杖瘡潰爛生蛆用皂礬煅過為末乾摻其內蛆即死折傷夫折撲墜墮皮不破而內損者必有瘀血若金石傷皮破血出或致亡血過多二者不可同法而治有瘀者宜攻利之若亡血者兼補行之或察其所傷有輕重上下淺深之異經絡氣血多少之殊惟宜先逐瘀血通經絡和血止痛後調氣養血補益胃氣無不效也大凡傷損不問壯弱及有無瘀血停積俱宜服熱童便以酒佐之推陳致新其功甚大一論跌傷骨折用藥一釐黃酒調下如重車行十里之候其骨接之有聲初跌之時整理如舊對住綿衣蓋之勿令見風方服藥休移動端午日製一釐金大梁孫都督祕傳神效木鱉一個新瓦上焙乾巴豆一個去殼半夏一個生用乳香五分沒藥五分自然銅火煅七次水淬七次用些須上為細末每服一釐好酒送下不可多用多則行瘀太過反傷正矣一被打傷重惡血攻心或木石壓死並跌繃傷從高墜下跌死氣絶不能言語取藥末便急劈開口以熱童便灌下一方用苧麻燒灰調酒服一凡跌傷打傷腫痛不可忍者以生蔥搗爛熱罨之甚妙一傷肢折臂者即將折處湊上搒定用好酒一碗旋熱將雄雞一隻刺血在內攪勻乘熱飲之仍將連根蔥搗爛炒熱敷上包縛冷再換亦治刀刃傷痛與血不止一折傷先用止痛法白礬為末每用一匕沸湯一碗化之以帕蘸熱尉傷處少時痛止然後排整筋骨貼藥一治傷損焮痛紅腫屬熱毒者並接斷濟陰丹天花粉三兩薑黃白芷赤芍藥各一兩上為末濃茶調搽患處一治跌打傷損骨先用手扯伸後用小奶雞一二隻搗爛搽上外用杉木板夾之次日再換取效如神一論打撲傷損至重大小便不通瘀血不散肚脹膨脹上攻心腹悶氣至死者此藥逐下瘀血方可服補損藥大成湯大黃二錢芒硝二錢枳殼二錢厚朴一錢當歸一錢桃仁一錢蘇木一錢紅花五分木通一錢甘草少許上銼水煎溫服一論從高墜下惡血流於脅下痛不可忍復元湯柴胡五錢當歸六錢穿山甲土炒二錢桃仁去皮五十個紅花二錢栝蔞仁二錢大黃酒浸一兩甘草二錢上銼一劑水二盞酒一盞煎八分溫服以利為度一論墜墮挫閃氣血凝滯攻刺腰痛羌活桃仁湯羌活蒼朮米泔浸當歸尾玄胡索桃仁去皮紅花牛膝去蘆蘇木酒炒破故紙炒小茴香酒炒乳香官桂上銼一劑半水半酒煎服一治跌撲傷損真牛膠一兩干冬瓜皮一兩上二味銼碎入鍋內同炒焦枯存性為末每服五錢好酒一杯調熱服後仍飲熱酒二三盞厚蓋得微汗痛即止一宿接完如初極效一論跌撲所傷為敷涼藥或人元氣虛寒腫不消散或不潰斂及痰毒堅硬不痛肉色不變久而不潰潰而不斂或筋攣骨節一切冷症並治回陽玉龍膏草烏一錢炒南星一兩炒乾薑一兩炒白芷一兩赤芍一兩炒肉桂五錢上為末蔥湯調搽熱酒亦可一治跌撲傷損蟹二隻連殼搗爛好酒二碗煎去渣服渣敷患處一治打撲青腫疼痛用青果核磨水頻掃患處其青腫立退一論打撲跌損傷牙咬刀傷出血諸般毒腫出膿後肌肉不生痛不止者止血定痛生肌散乳香三錢沒藥三錢血竭二錢黃丹飛過五錢白芷二錢五分龍骨火煅三錢軟石膏炒去火毒一兩朝腦少許上為細末瓷器盛每以摻患處血止痛定肌生一治傷損等症失血過多或因克伐氣血耗損惡寒發熱煩躁作渴八珍湯人參白朮白茯苓當歸川芎白芍熟地黃各一錢甘草炙五分上銼薑棗水煎服一治被人打傷筋骨跌撲傷氣血虛弱宜服萬病無憂酒方見補益一治打撲損傷落馬墜車一切疼痛乳香定痛散乳香沒藥川芎白芷赤芍各一兩生地黃牡丹皮各二兩甘草五錢上為細末每服三錢溫酒並童便調下一治風損如神膏謝醫風傳用生薑蔥白二汁好醋各一碗下黃丹半斤同熬又下香油四兩再入桐油四兩熬至滴水成珠不散下黃丹一兩再熬成膏入麝香五分貼風損如神破傷風夫破傷風者有因卒暴傷損風襲其間傳播經絡致使寒熱更作身體反張口噤不開甚者邪氣入臟有因諸瘡不瘥榮衛虛弱肌肉不生瘡眼不合風邪亦能外入於瘡為破傷風之候有諸瘡不瘥舉世皆言蘄艾為上是謂熱瘡而不知火熱客毒逐經諸變不可勝數微則發熱甚則生風搐或角弓反張口噤目斜亦有破傷風不灸而病者因瘡著白痂瘡口閉塞氣壅於陽故熱易為鬱結熱則生風也古方藥論甚少以此疾與中風同論故不另立條目惟河間論病同傷寒症治通於表裡分別陰陽有在表有在裡有在半表半裡者在表宜汗在裡宜下在表裡之間宜和解不可過其治也故表脈浮而無力者太陽也脈長而有力者陽明也脈浮而弦小者少陽也若明此三法而施治不中者鮮矣但中風之人尚可淹延歲月而破傷風始雖在表隨即轉里多致不救大抵內氣虛弱而有鬱熱者得之若內氣壯實而無鬱熱者雖傷而無害也一論破傷風邪初在表者急服此藥以解之稍遲則邪入於裡與此藥不相合矣羌活防風湯羌活防風藁本川芎白芍當歸地榆細辛甘草各一錢上劑水煎熱服一論破傷風在半表半裡急服此湯稍緩邪入於裡不可用矣和解湯羌活防風川芎菊花麻黃石膏前胡黃芩細辛枳殼白茯苓蔓荊子甘草各五分薄荷白芷各二錢半上劑水煎熱服一論破傷風邪傳入里見舌強口噤項背反張筋惕搐搦痰涎壅塞胸腹滿悶便溺閉赤時或汗出脈洪數而弦也宜導之通里湯川芎羌活黃芩大黃各二錢上銼水煎溫服臟腑通和為貴一論風傷腎而腰痛者或左右痛無常處牽引兩足宜用五積散加防風全蠍三個方見中寒一論破傷風及金刃傷打撲傷損並癲狗咬傷定能定痛生肌五真散天南星為防風所制服之不麻防風上各等分為細末破傷風以藥敷口然後以溫酒調下一錢如牙關緊急角弓反張用藥二錢童便調下打傷欲死但心頭微溫以童便灌下二錢並進二服癲狗咬破先口噙藥水洗淨用棉拭乾貼藥更不再發無膿大效一治破傷風初覺有風急取熱糞堆內蠐螬蟲二三個用手捏住待蟲口中吐出水就抹破處身穿稍厚衣裳待少時瘡口覺麻兩脅微汗出立效如風緊急速取此蟲三五個剪去尾肚內黃水自出塗瘡口再滴些少熱酒飲之汗出立效爛草房上亦有此蟲一治破傷風五七日未愈已至角弓反張牙關緊急服之神效蟬蛻去頭及足淨五錢上為末用好酒一碗煎滾服之立蘇一治破傷風奪命丹川烏火煨去黑皮一兩雄黃一錢上為末蔥汁為丸如蓮子大每服一丸用蔥葉一片將藥裹內火微燒嚼爛黃酒下衣蓋汗出立愈灸法治破傷風及瘋犬咬傷方見灸法一治破傷風牙關緊急立效散雄黃香白芷上各等分好酒煎服如牙關緊者灌之即活湯火凡遇湯火所傷切勿用冷水冷物冷泥蓋熱氣得冷氣則卻深搏燜入筋骨慎之慎之先以鹽水和米醋調塗瘡上又以醋泥塗之仍用醋塗不絶暫救痛苦一面急搗生地黃醋調敷瘡上直候疼止雖厚至數寸亦不妨一治湯燙被火燒破瘡毒疼痛三方俱效一方用大黃末蜜和塗之立愈一方用雞子清磨京墨塗之上用三層濕紙蓋之一方用生白麵為末香油調掃瘡破處不拘時一治湯火傷板刷上豬毛不拘多少焙乾燒灰存性研細末真香油調量患處大小周圈厚敷於上中留一孔一日一人慢慢圍籠如敷急速及不留口則潰而有疤痕矣一治湯燙火燒此藥止痛解毒生血清涼膏生地黃二兩黃連梔子白芷各一兩蔥白十根上銼細用香油四兩煎至地黃等焦黑濾去渣再煎入黃蠟五錢火熬蠟化傾瓷盆內以雞翎掃瘡上一治湯燙火燒瘡家園生地黃旋取新者搗取自然汁入香油黃蠟少許砂鍋內熬成膏以雞翎掃敷瘡上一治湯火燒傷用水磨炭末塗或磨土朱塗或用真桐油塗一方用蕷頭切開水磨濃漿敷之立效一方用黃柏為末香油調搽立已蟲獸一癲狗咬方斑蝥一日二日三日至七日止用七個七日外記日每日一個至百日雄黃二錢麝香三分小兒不用亦可或用二三釐滑石五六錢或二兩亦可上俱觀人稟氣虛實用糯米一勺與斑蝥同炒以赤為度斑蝥去頭尾翅足各為細末每帖用一二茶匙酒調服如不飲酒米湯亦可服藥去毒物從小便中出或口吐出都是大小塊子毒出後於瘡口下去三寸灸三壯效先吃香油一碗次用油洗瘡口又砂糖水調塗仍服砂糖水一兩碗一被虎傷用生葛根汁服並洗傷處或白礬末納瘡口痛即止一被騾馬咬用馬鞭草燒灰油調敷之一百蟲入耳用鹽汁灌之或蔥汁尤良或豬油少許炙香置耳邊亦出或蘆管入耳內口吸之蟲隨出一癲狗咬傷番木鱉即馬錢子磨水吃即看腦頭頂有紅頭髮急宜扯去一蠍螫方硃砂雄黃膽礬上各等分麝香減半端午日取蝦蟆新蟾酥和為丸一擦立止一癲狗咬傷神方斑蝥去翅足七個香附七分上共為細末作一服燒酒調下如腹痛不可忍者吃豬肉湯一兩口解之即止不一時小便毒下來即已避鑼鼓風十七日一蜈蚣入耳以雞肉置耳邊自出一蜈蚣咬痛不可忍用燒紙卷緊燒煙燻咬口立止一方用紡線根擂酒吃立止一蜈蚣咬痛不止獨蒜摩螫處痛止又宜烏雞糞水調塗之又蜒蝣研敷之一蛇咬雄黃五靈脂白芷貝母上各等分為末每服二錢熱酒調服又以白礬用滾水泡化洗傷處神效一蛇咬端午制雄黃白礬生研上各等分為末熔黃蠟為丸如桐子大每服七丸熟水送下一雄蠍螫人痛在一處雌蠍螫人諸處牽痛但將蝸牛搗爛塗傷處毒即解散蝸牛食蠍故也手浸冷水痛亦止一治蠍螫天南星三個膽礬五錢上用焰硝半斤化成水入二味末攪勻滴成錠子每遇蠍螫擦之立愈又治牙痛用燒酒入此錠少許漱口數次即止一治蛇傷用半邊蓮研生酒吃凡被所傷將棉帛扎住勿令氣上行服藥後即當解云不然則所傷之處必潰爛矣一瘋犬咬人急於無風處以冷水洗淨即服韭菜汁一碗隔七日又一碗四十九日共七碗百日忌食魚腥終身忌狗肉方得保全否則十傷九死一瘋犬一日咬三人止一人用此方得活親試有驗一用膽礬敷患處立愈一闢蚊蟲法鱉蓋土炒楝花芫花苦參藜蘆川芎上共為末棗肉為丸日燃之又方用黃鱔骨同鋸末卷作筒煙燒之一闢蚊蟲方用鰻鱺魚乾者於室內燒之即化為水矣一凡蛇入七竅劈開蛇尾納川椒數粒以紙封之其蛇自出更煎人參湯飲之或飲酒食蒜以解內毒如被蛇咬食蒜飲酒更用蒜杵爛塗患處加火於蒜上灸之其毒自解凡毒蟲傷並效一金貓闢鼠法椿樹葉冬青葉絲瓜梗葉上各等分每四季燒煙熏於堂上鼠遠避一年燒四次一治蟲入耳用貓尿滴耳中即出取貓尿以生薑擦鼻其尿自出或用麻油滴之則蟲死難出或用炒芝麻按之亦出更不如貓尿之速也一治百蟲入耳搗韭汁灌耳中即瘥又宜川椒末一撮以酢半升調灌耳中行二十四步即出又宜火尉桃葉卷之取塞耳立出又宜蔥汁灌耳中一治蟻入耳用穿山甲燒存性為末水調灌之即出一百蟲入耳不出以雞冠血滴入耳中即出一蜒蝣入耳地龍一條納蔥葉中化水滴耳中其蜒蝣亦化為水一黃蜂螫以熱酒洗之立效或用清油搽上即愈一闢壁蝨臭蟲用蜈蚣燒煙燻之一方青鹽水浣洗床帳永絶其迹
