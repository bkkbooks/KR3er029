body:
  text: 卷六頭痛頭痛短澀脈病乖浮滑風痰必易解寸口緊急或短或浮或弦皆主頭痛夫頭者諸陽所聚之處也諸陰至頸而還惟足厥陰有絡上頭至顛頂其脈浮緊弦長洪大者屬風熱痰火而致也其脈微弱虛濡者屬氣血兩虛必丹田竭而髓海空虛為難治也其有真頭痛者脈無神而腦中劈痛其心神煩亂為真頭痛也旦發夕死夕發旦死蓋頭痛暴起者如鼻塞發熱惡寒乃感冒所致也其曰頭痛者有虛有火有痰厥有偏有正其偏於左邊頭痛者宜小柴胡湯加川芎當歸防風羌活其偏於右邊頭痛者補中益氣湯加白芷獨活蔓荊子酒芩其眉稜處痛者二陳湯加酒炒片芩羌活薄荷其腦頂痛者宜人參敗毒散加川芎藁本酒炒黃柏木瓜紅花酒炒大黃一論一切頭痛主方不問左右偏正新久皆效清上蠲痛湯當歸酒洗一錢小川芎一錢白芷一錢細辛三分羌活一錢防風一錢菊花五分蔓荊子五分蒼朮米泔浸一錢麥冬一錢獨活一錢生甘草三分片芩酒炒一錢五分上銼一劑生薑煎服一左邊痛者加紅花七分柴胡一錢龍膽草酒洗七分生地黃一錢一右邊痛者加黃耆一錢乾葛八分一正額上眉稜骨痛者食積痰壅用天麻五分半夏一錢山楂一錢枳實一錢一當頭頂痛者加藁本一錢大黃酒洗一錢一風入腦髓而痛者加麥門冬一錢蒼耳子一錢木瓜荊芥各五分一氣血兩虛常有自汗加黃耆一錢五分人參白芍生地黃各一錢一論年深日近偏正頭疼又治肝臟久虛血氣衰弱風毒之氣上攻頭腦而痛頭眩目暈怔忡煩熱百節痠疼腦昏目痛鼻塞聲重項背拘急皮膚瘙癢面上遊風狀若蟲行及一切頭風兼治婦人血風攻注頭目昏痛並皆治之追風散防風去蘆一兩荊芥穗一兩羌活五錢川芎一兩白芷五錢石膏煨一兩全蠍去頭尾五錢白殭蠶炒二兩白附子炮五錢天南星炮一兩天麻五錢地龍五錢川烏炮去皮尖一兩草烏炮去皮尖一兩雄黃二錢五分乳香二錢五分沒藥二錢五分甘草炙一兩上為細末每服五分茶湯調食後臨臥服清頭目利咽膈消風化痰一論痰厥頭痛其症眼黑頭旋噁心煩悶氣短促上喘無力以言心神顛倒目不敢開如在風雲中頭苦痛如裂身重如山四肢厥冷不得安臥此乃胃氣虛損停痰而致也半夏白朮天麻湯黃柏酒洗二分半乾薑炒二分澤瀉白茯苓去皮天麻黃耆蜜炒人參蒼朮米泔浸炒各五分神麯炒白朮去蘆炒半夏薑炒陳皮各八分麥芽炒七分上銼生薑三片水煎熱服可一劑而愈一論頭痛偏左者屬血虛火盛也加味四物湯當歸川芎生地黃黃柏酒炒知母酒炒蔓荊子黃芩酒炒黃連酒炒梔子炒各等分上銼一劑水煎溫服風盛加防風荊芥一論頭痛偏右者屬痰與氣虛也黃耆益氣湯黃耆蜜炙人參白朮去蘆陳皮半夏薑汁炒當歸酒洗川芎藁本甘草炙各五分升麻黃柏酒炒細辛各三分上銼一劑薑棗煎服一論頭左右俱痛者氣血兩虛也調中益氣湯黃耆蜜炒人參甘草炙蒼朮米泔浸炒川芎各六分升麻柴胡陳皮黃柏酒炒蔓荊子各三分當歸六分細辛二分上銼一劑水煎溫服一論偏正頭風一切頭痛諸風眩暈頭目昏重都梁丸香白芷切碎曬乾為細末煉蜜為丸如彈子大每服一丸荊芥穗臘茶細嚼下一論眉稜骨痛者風熱並痰也選奇湯羌活防風各二錢酒片芩一錢五分冬月不用或甚者炒用半夏薑汁炒二錢甘草一錢夏月生冬月炙上銼一劑水煎食後服一論雷頭風者頭痛而起核塊也頭面疙瘩惡寒發熱拘急狀如傷寒升麻湯升麻蒼朮米泔浸薄荷葉各等分上銼水煎服一談侍御但頭痛即吐清水不拘冬夏吃薑便止已三年矣余作中氣虛寒用六君子加當歸黃耆木香炮薑而瘥一論頸項強急筋痛不能回顧者烏藥順氣散加羌活獨活木瓜一治偏正頭痛頭風羌活細辛白芷川芎蔓荊子薄荷防風甘草各等分上為細末每服二三茶匙白湯調下一人頭痛發熱眩暈喘急痰涎壅盛小便頻數口乾引飲遍舌生刺縮斂如荔枝然下唇黑裂面目俱赤煩躁不寐或時喉間如煙火上衝急飲涼茶少解已至於死脈洪大無倫且有力捫其身烙手此腎經虛火遊行於外投以十全大補加山茱萸澤瀉牡丹山藥麥冬五味附子一劑熟睡良久脈症略減三四再以八味丸服之諸症悉退後畏冷物而痊一治頭風腫痛偏正不拘用艾捶爛鋪紙上將筷捲成筒次將黃蠟熔化灌入筒內以滿為度如左邊疼將藥燒煙入右耳右熏左即安一論半邊頭痛祛痛膏防風羌活藁本細辛菊花各五分南星草烏白芷各一錢上為細末用連須蔥一把洗淨同前藥搗成膏銅鍋頓熱量痛大小以油紙攤藥貼痛處周圍以生面糊封之再用干帕包定其痛即止一方加菊花獨活各一錢五分草烏一錢麝香一分鬚髮醫者所論人鬚髮眉雖皆毛類而所主五臟各異故有老而須白眉發並白者或發白而鬚眉不白者臟氣有所偏故也大率發屬於心稟火氣故上生須屬於腎稟水氣故下生眉屬於肝故側生男子腎氣外行上為須下為勢故女子宦人無勢則亦無須而眉發無異於男子則知不屬腎也明矣婦人無須無血氣乎岐伯曰今婦人之生有餘於氣不足於血衝任之脈不榮唇口故須不生宦者其須獨去其故何也曰宦者傷其宗筋血泄不復皮膚故須不生天宦未嘗被傷其須不生其故何也曰天宦稟賦不足宗筋不成故須不生天下第一烏須方閣老高中玄傳五倍子一斤擇整個者個個捶破去蟲土擇粗者如黃豆大次者如赤豆大又次者如緑豆大分三樣入新鍋內炒如栗殼色以青濕布包之以腳踏成餅曬乾為末錫罐盛貯築實封口勿令泄氣聽用紅銅末半斤淘去皮土見清水令乾入鐵鍋內炒大熱傾入酸醋少半碗拌勻濕透再炒入醋七次研為末籮過以棉紙另包聽用白礬四兩為末另包皂礬四兩為末另包白芨四兩切片焙乾切為細末紙包上每遇染須時量須之多少用藥如五倍子九錢銅末一錢八分白礬白芨皂礬各九分再加食鹽九分共入於碗內再研極細入小銅杓內以濃茶滷調如稀糊放木炭火上徐徐熬之不住手攪勻熬成稠糊為度預先以肥皂水洗淨鬚髮待乾以抿子挑藥乘熱敷須鬢上用油紙兜住外用烏帕包裹至頂解衣護枕而睡至半夜驗藥將干以手搜去殘藥如干甚用茶滷濕潤去藥至天明洗面略洗須鬢如麵皮上有黑處以指蘸油塗摩即用軟紙擦去油迹染後仍以香油少許潤之即明黑可觀先一月染上四次後半月染一次永不露白野狐倒上樹尚書劉三川傳黑鉛四兩汞二錢先將鉛化成汁後入汞凝成葉子煎成錢樣外用鐵絲穿作二三串聽用再用大瓷罐一個入無鹽好醋三碗將鉛錢入罐內懸於醋上離醋二指內泡卷柏二個鴨嘴膽礬四錢用瓷碟封口蓋之再用黃泥封固夏月日中曬七日冬月粳火煨七日出罐底摘一孔出醋不用揭起碟來掃下藥霜來用脂皮包住收之臨用藥時將鬚髮以溫水洗淨就濕再用脂皮包手指拈藥霜黏在鬚髮上自然黑到根神效切忌香肥皂水洗烏須方刺史周如梅傳宮粉一兩二錢五分白礬二錢白石灰二錢樟腦二分麝香二分輕粉三分真百草霜八分水銀一錢先將鉛一錢化開入水銀結成砂子上為末用鹹水和熬滾塗鬚髮上約半炷香即洗去青雲獨步丹烏須黑髮延年益壽赤白何首烏共一斤黑豆三升半煮拌浸何首烏一晝夜去汁後將豆拌首烏木甑蒸浸五次當歸身酒洗三兩赤茯苓半斤用牛乳浸過煮乾白茯苓半斤用人乳浸過煮乾補骨脂鹽酒炒四兩甘杞子酒浸焙三兩菟絲子半斤酒浸蒸搗餅焙乾懷牛膝甘草水泡四兩懷生地黃酒浸入砂仁三錢同蒸乾為末真沒藥一兩五錢去砂上忌鐵器曬乾為末煉蜜為丸如梧子大每服三十丸空心酒下午間薑湯下臨臥鹽湯下忌三白造酒烏須方本府麥推府傳懷生地黃四兩大當歸二兩小紅棗肉三兩淨赤白何首烏各一斤煮水制過地黃勿犯鐵器生薑汁四兩麥門冬去心一兩胡桃肉三兩甘枸杞二兩蓮肉三兩土蜜三兩上先用酒洗淨地黃將何首烏水去渣入地黃煮俟干再用薑汁水煨乾為度便將地黃搗爛以一官鬥糯米水十二斤作酒曲藥如常俟酒漿來方以水調勻地黃入酒糟內過三日去糟將前藥切片入絹袋中懸酒罈內筍殼包封毋令出氣放鍋內煮三炷香為度後以酒罈埋土中三宿去火毒任意飲三五杯烏須祕方用龜尿研墨塗須烏立時要取龜尿亦有法豬鬃刺鼻龜即尿烏須祕方用馬蝗蜞尋起數條紙包要用時將雞血或豬血將螞蝗入血內令食飽針出血同龜尿同研墨濃塗鬚髮上可烏一月乃烏須第一方也烏須神妙方本府蘇通府傳五倍子炒黑為末銅末一錢白芨末八分食鹽三分訶子末三分沒食子末三分白礬三分黑礬三分細辛末三分上為細末熱茶調稀重湯煮入黑礬再煮面上生花搽須上油紙裹立黑烏須狐貍倒上樹周賓崇傳自蜀中得來山茄要選頂黑者收約有八九升來去蒂以夏布包洗去漿水將山茄扭自然汁四五碗入上好好墨四五錢打碎黑礬四五錢二味俱入山茄汁內貯新瓦罐中每用將竹片蘸藥汁於須鬢上自尾倒上切莫黏肉上則洗不去矣一論烏須生發良方蒲公英摘淨切四兩血餘洗淨四兩青鹽四兩上用瓷罐一個盛蒲公英一層血餘一層青鹽一層鹽泥封固春秋五日夏三日冬七日桑柴火煅令煙盡為度候冷取出碾為末每服一錢清晨酒調下一儒者因飲食勞役及惱怒鬚髮脫落余以為勞傷精血陰火上炎所致用補中益氣加麥門冬五味及六味地黃丸加五味鬚髮頓生如故一男子年二十頂發脫盡用六味地黃丸不幾日發生寸許兩月復初面病難經云人面獨能耐寒者何也蓋人頭者諸陽之會也諸陰脈皆至頸項中而還獨諸陽脈皆上至頭而足陽明胃之經起鼻交頞中入齒中俠口環唇倚頰車上耳前過客主人穴其或胃中風熱或風熱乘之令人面腫或面鼻色紫風刺癮疹或面熱面寒隨其經症而治之一論面寒者陽明經虛寒也升麻附子湯升麻葛根白芷黃耆各七分大附子炮七分人參草豆蔻各五分益智仁三分炙甘草五分上銼一劑連根蔥白二根水煎服一論面熱者陽明經風熱也升麻黃連湯升麻葛根各一錢五分白芍七分川芎四分薄荷荊芥各三分蒼朮八分半黃連酒洗五分酒芩六分犀角四分半白芷二分甘草五分上銼水煎食後服一論面上瘡者上焦火也清上防風湯防風一錢荊芥五分連翹八分山梔五分黃連五分黃芩酒炒七分薄荷五分川芎七分白芷八分桔梗八分枳殼五分甘草三分上銼一劑水煎入竹瀝同服一論面唇紫黑乃陽明經不足也升麻白芷湯升麻防風白芷各一錢芍藥蒼朮各三分黃耆人參各五分葛根一錢半甘草四分上銼一劑薑棗煎服宜早後午前服取天氣上升於中使陽達於面也一論面上粉刺者肺火也清肺飲連翹川芎白芷黃連黃芩荊芥桑皮苦參山梔貝母甘草上銼水煎臨臥服一點痣方以巴豆七個石灰等分為末以鹹水搜在盞內藏糯米於巴豆石灰內候米爛將痣用針撥動以米膏點之絶三日不洗自然脫落一起字出青方礦石灰紫蓼灰各一錢苦參五錢鹼一錢加百草灰辣蓼灰各一錢上為末水調寫字上有泥起拂去再上一出刺青方馬肉不拘多少盡令蒼蠅飽食作壞生蛆出曬乾為末以針挑動青處摻藥其青自出一抓破面皮用生薑自然汁調輕粉擦患處便無痕迹一洗面方每早以漱口水吐在手掌中洗面久久自潤粉刺自消一治赤紅爛臉水銀柏油蠟各一錢共搗塗之一治面上齄鼻酒刺方雄黃一錢硫黃五分鉛粉一錢上共為末乳汁調塗晚上敷次日溫水洗之如此三次去矣耳病兩寸脈浮洪上魚為溢兩尺脈短而微或大而數皆屬陰虛法當補陰抑陽左寸洪數心火上炎兩尺脈洪者或數者相火上炎其人必遺精夢交兩耳蟬鳴或聾耳者屬腎而開竅於少陽之部通會於手三陽之間坎離交則聚氣以司聰以善聽也關於腎而貫於腦內經曰五臟不和則九竅不通其耳鳴耳癢耳聾者皆屬腎虛水不上流清氣不升所致也從補益門治之其壯年及小兒耳腫耳痛耳聤乃三陽風熱壅遏所致也宜升陽散火湯加黃柏知母晚間兼服金花丸可矣一論思慮煩心而神散精脫於下則真陰不上泥丸而氣不聚故耳鳴耳重聽及耳內癢安神復元湯黃耆蜜炙一錢五分人參一錢五分當歸酒洗一錢五分柴胡一錢升麻五分黃連酒炒一錢黃芩酒炒一錢黃柏酒炒三錢知母一錢防風一錢蔓荊子七分麥門冬一錢茯神一錢酸棗仁炒一錢五分川芎一錢甘草五分甘枸杞子一錢五分上銼一劑圓眼肉三枚水煎服一論勞聾氣聾風聾虛聾毒聾久聾耳鳴勞聾者勞火鼓其聽戶也氣聾者經氣塞滯於聽戶也風聾者耳熱閉其聽戶也虛聾者氣血虛耗而神不用也毒聾者膿血障礙妨於聽戶也久聾者病非一日邪氣壅塞也凡有是聾者勢必耳鳴故總系其耳鳴也千金補腎丸當歸酒洗白芍酒炒懷熟地黃酒蒸黃耆蜜炒人參白茯神山茱萸酒蒸去核牡丹皮澤瀉菟絲子酒製石斛蛇床子肉蓯蓉乾薑桂心大附子炮去皮臍巴戟去心遠志去心細辛甘草各二兩石菖蒲一兩防風一兩五錢羊腎二枚共二十三味西園公加山藥二兩殊效上為細末煉蜜為丸如梧桐子大每服十五丸加至三四十丸鹽湯送下一論虛火上升痰氣鬱於耳中或閉或鳴痰火熾盛或憂鬱痞滿咽喉不利煩躁不寧通明利氣湯蒼朮鹽水炒一錢白朮去蘆炒一錢川芎八分陳皮鹽水浸二錢香附童便炒二錢黃柏酒炒二錢梔子仁炒一錢貝母三錢生地黃薑汁浸一錢黃連一錢半酒浸豬膽汁炒玄參酒洗二錢木香五分檳榔一錢甘草炙四分黃芩一錢半酒浸豬膽汁炒上銼二劑生薑水煎入竹瀝同服一論陰虛火動而耳聾或鳴者六味地黃丸見補益依本方加黃柏知母石菖蒲遠志去心屢驗一治耳鳴主方黃連黃芩梔子當歸陳皮膽星各一錢龍膽草香附各八分元參七分青黛木香各五分乾薑炒黑三分上銼一劑生薑三片煎七分入元明粉三分痰盛加五分食後服如作丸子加蘆薈五分麝香二分為末神麯糊為丸每服五十丸淡薑湯送下如腎虛耳鳴者服六味地黃丸一論耳主風者耳腫作痛牙關緊急乍寒乍熱飲食不下是也射干散苦竹吳紹源傳升麻桔梗射干昆布連翹甘草上銼水煎熱服汗出立愈並治面腫牙痛咽喉痛神效一治耳鳴如流水聲耳癢及風聲不治久成聾生烏頭一味掘得乘濕削如棗核大塞耳中旦易一次夜易一次不三日愈一論塞藥治耳聾殊效石菖蒲一寸巴豆一粒去殼全蠍一個去足尾上為末蔥汁為丸如棗核大綿裹塞耳即通一論塞藥專治耳聾或因病因氣及感風邪而聾者若年老而聾者不治蚯蚓去土陰乾為末七分麝香三分用蔥切寸許塞藥於內左聾塞右耳右聾塞左耳左右俱聾兩耳俱塞即效一治耳聾通靈丹安息香一錢五分桑螵蛸一錢五分阿魏一錢五分硃砂五分萆麻子仁七個巴豆仁七個獨蒜七個上為細末入二仁與蒜同研為丸如棗核大每用一丸綿裹入耳內覺微痛即去一論聤耳生膿並黃水紅棉散枯白礬五分干胭脂粉二分半麝香少許片腦一分熟爐甘石五分上為末先以棉杖子展干膿水另將鵝翎管子送藥入耳底一方用蛀竹粉易礬甘石亦效一治耳卒腫出膿水用枯礬為末以筆管吹耳內日三四次或以棉裹塞耳中一治上熱耳出膿汁甘草炙升麻木通赤芍桑白皮炒生地黃前胡赤茯苓蔓荊子甘菊花各等分上銼薑棗煎服一治人耳如蟬鳴服四物湯耳鳴益甚此元氣虛損之症五更服六味丸食前服補中益氣湯頓愈此症若血虛而有火用八珍湯加山梔柴胡氣虛而有火四君子湯加山梔柴胡若因怒即聾或鳴實用小柴胡加芎歸山梔虛用補中益氣湯加山梔午前甚用四物加白朮茯苓久用補中益氣午後甚用地黃丸一論治人因怒耳鳴吐痰作嘔不食寒熱脅痛用小柴胡合四物加山梔茯苓陳皮而瘥一論耳鳴因虛火妄動心神不寧以益氣湯去升麻參耆加半夏茯苓川芎白芍竹茹黃柏黃連天麻蔓荊子細辛一論耳中常鳴生地黃截塞耳數易之以瘥為度一法以紙裹灰火中煨之用良一治耳痛肺火盛腎氣虛以四物湯四錢黃柏三錢童便煎空心服一寡婦耳內外作痛不時寒熱脈上魚際此血盛之症用小柴胡湯加生地黃以抑其血而愈又項間結核如算珠寒熱用加味歸脾湯加味逍遙散調補肝脾而愈六味丸方見補益補中益氣湯方見內傷八珍湯方見補益四君子湯方見補益小柴胡湯加味逍遙散加味歸脾湯方俱見婦人虛勞一專治耳內常鳴耳聾獨勝丸川黃柏去皮八兩人乳拌勻曬乾再用鹽水炒絹包上為細末水糊為丸如梧子大每百丸空心以鹽湯送下一治耳內腫痛膿血出枯白礬末入麝香少許吹耳中日三四度或棉裹塞耳中立瘥一治耳聾細辛為末熔黃蠟為丸如鼠糞大棉裹塞耳中立瘥又以灸耳前陷中七壯一治氣道壅塞兩耳聾聵用甘遂如棗核大棉裹塞耳中卻以甘草放口內隨嚼又宜生蔥白塞耳內頻換即通鼻病右手脈浮洪而數為鼻衄流血左手脈浮緩為傷風鼻塞鼻流清涕夫鼻者肺之候時常和則吸飲香臭矣若七情內郁六淫外傷飲食勞役之過則鼻氣不能宣調清道壅塞即為病也為衄血為流清涕為瘡瘍為窒塞不通為濁涕不聞香臭此皆臟腑不調邪氣鬱於鼻而清道壅塞矣寒則溫之熱則清之塞則通之壅則散之可也一論肺熱鼻流濁涕壅塞不通又治鼻不聞香臭神愈散細辛白芷與防風羌活當歸半夏芎桔梗茯苓陳皮等十味等分銼和同三錢薄荷薑煎服氣息調勻鼻窒通一治腦漏防風荊芥獨活連翹藁本辛夷甘草細辛牙皂石菖蒲上銼水煎服如數服未效可將後藥三味為末棉裹塞鼻內即效一論鼻流濁涕不止者名曰鼻淵乃風熱在腦傷其腦氣腦氣不固而液自滲泄也蒼耳散白芷一兩辛夷仁蒼耳炒各一錢五分薄荷五分上銼水煎服一論鼻中流出臭膿水名曰腦漏辛夷散辛荑花一錢黃耆一錢人參一錢五分當歸一錢白芍二錢川芎一錢白芷一錢細辛八分黃芩酒炒一錢甘草六分上銼一劑燈心三十根水煎食遠服一治顙疳或鼻疳乳香五分沒藥五分孩兒茶一錢雞䏶胵焙黃色一錢上為末擦患處一老人鼻中流涕不幹獨蒜四五個搗如泥貼腳底心下用紙貼之其涕不再發一男子酒齄鼻雄豬膽每日早以好酒調服一個不過半月如舊一治糟鼻驗方用硫黃為細末甚者加草烏同為末以酥油調稀塗患處如覺痛苦用梔子煎湯服之或洗藥處即愈一論鼻赤久不瘥用大黃芒硝檳榔等分為末水調敷患處三四次洗淨以新銀杏去殼嚼爛敷於鼻上不過五七次即如舊一治赤鼻檳榔為片將茄汁浸曬一二次為末面上紅纍硫黃以人乳浸滿碗傾入湯鍋煮乾先須用唾濕鼻方抹藥末一論鼻淵頭眩清泥丸斂神湯人參防風麥門冬去心當歸頭枯芩酒炒川芎黃連酒炒各一錢蔓荊子八分升麻三分生甘草二分明天麻製半夏各七分上銼水煎食遠服腦漏者加蒼耳子二錢黃耆一錢一論鼻流涕久而不愈乃成腦漏必因虧損元陽以致外寒內熱甚則有滴下腥臭之惡者也知保養服藥方可漸次許痊加味防風湯防風一錢片芩酒炒一錢五分人參白芨各一錢麥門冬去心二錢生甘草五分知母一錢炒白芍一錢懷生地酒洗一錢黃柏酒炒一錢黃耆一錢黃連酒炒一錢當歸頭百合各一錢上銼水煎食遠溫服一論鼻涕長流名鼻淵也當歸川芎白芷人參白茯苓蒼耳子香附子各一錢天竺黃三錢防風秦艽荊芥薄荷麥門冬蔓荊子甘草各等分上為細末煉蜜為丸如梧子大每服三四十丸米湯送下效一男子面白鼻流清涕不聞馨穢三年矣用補中益氣湯加麥門冬山梔而愈一論色欲太過虛損白濁鼽出清涕如泉湧者補中益氣湯方見內傷依本方加黃柏知母白芷細辛藁本五味子白菊辛夷蒼耳葉水煎溫服一論肺虛為四氣所幹鼻內壅塞涕出不已或氣息不通或不聞香臭川芎白芷細辛藁本防風木通辛夷仁甘草上銼水煎服一治鼻中肉贅臭不可近痛不可搖以白礬末加硇砂少許吹其上頃之化水而消與勝濕湯合瀉白散二劑此係厚壅濕熱蒸於肺門如雨霽之地突生芝菌也一治鼻中肉贅用藕節有毛處一節燒灰存性為末吹患處即瘥一治血熱入肺名曰酒齄鼻此方主之苦參淨末四兩當歸淨末二兩上和調酒糊為丸如梧子大每服七八十丸食後熱茶送下一治鼻疳爛通鼻孔余治陳都憲夫人患此得效鹿角一兩白礬一兩俱放在瓦上隔火煅過人頭髮五錢在燈火上燒過上為末先用花椒湯洗淨摻藥於疳上三四次即愈如瘡不收口用瓦松燒灰存性研末乾摻之即收一人酒齄鼻紅赤余用此方晚服用六味地黃丸全料加當歸二兩苦參四兩空心服不兩月而愈金花丸黃連二兩枯芩二兩黃柏二兩梔子一兩大黃二兩酒蒸九次桔梗白粉葛各二兩上為細末水法為丸如桐子大每服七八十丸白溫水送下口舌脈左寸洪數心熱口苦右寸浮數肺熱口辛左關弦數而虛膽虛口苦洪甚而實肝熱口酸右關沉實脾胃有實熱口甘兼洪數者口瘡或為重舌木舌脈虛者中氣不足口舌苦服涼藥不愈者宜理中湯夫口舌之為病或為重舌木舌為糜爛生瘡之類經云肝熱則口酸心熱則口苦脾熱則口甘肺熱則口辛腎熱則口咸有口淡者胃熱也口臭者乃臟腑臊腐之氣蘊積於胸臆之間而生熱沖發於口也口瘡者脾氣凝滯加之風熱而然也治當以清胃瀉火湯方之此正治之法也如服涼藥不已者乃上焦虛熱中焦虛寒下焦虛火各經傳變所致當分別而治之如發熱作渴飲水口瘡者上焦虛熱也補中益氣湯主之如手足冷肚腹作痛大便不實飲食少思口瘡者中焦虛寒也附子理中湯主之如晡熱內熱不時而熱作渴痰唾小便頻數口瘡者下焦陰火也六味地黃丸主之如食少便滑面黃肢冷火衰土虛也八味丸主之若熱來復去晝見夜伏夜見晝伏不時而動或無定處若從腳起乃無根之火亦用八味丸及十全大補湯加麥門五味更以附子末唾津調搽湧泉穴若概用涼藥損傷生氣為害非輕一論心肺蘊熱口瘡咽痛膈悶小便淋濁不利清金導赤散黃連六分黃芩一錢五分梔子二錢木通二錢澤瀉二錢生地黃四錢麥門冬三錢甘草八分上銼一劑生薑三片水煎食後頻頻服之一論上焦實熱心胃二經之火而作口舌生瘡腫痛者並咽喉牙齒耳面腫痛皆效清胃瀉火湯連翹桔梗黃連黃芩梔子乾葛各七分元參升麻生地各一錢薄荷五分甘草三分上銼水煎頻頻溫服一論飲酒過度舌本強腫言語不清此脾虛濕熱以益氣湯加神麯麥芽乾葛澤瀉一論上焦虛熱發熱作渴飲食勞役則體倦此內傷氣血而作口舌生瘡者宜補中益氣湯方見內傷依本方加麥冬五味子一論中焦虛寒手足冷肚腹痛大便不實飲食少思而作口舌生瘡者以附子理中湯方見中寒依本方一論晡熱內熱不時而熱作渴痰唾小便頻數而作口舌生瘡者此下焦陰火也以六味地黃丸方見補益依本方一論如食少便滑面黃肢冷而作口舌生瘡者此火衰土虛也以八味丸方見補益依本方一論若熱來復去晝見夜伏夜見晝伏不時而動或無定處而作口舌生瘡者若從腳起乃無根之火也以八味丸及十全大補湯方見補益依本方加麥門冬五味子一論口瘡臭氣穢爛久而不瘥者黃柏五錢青黛一錢五分為末每用一錢於舌上津咽下一論口瘡用黃連川椒等分為末每少許搽瘡上噙漱良久以涼水漱咽咽喉有瘡加孩兒茶一治口舌生瘡加味陰陽散黃連乾薑青黛孩兒茶各等分上為末每用少許搽患處立效一方用五味子為末摻瘡上即愈一治口瘡良方徐杏莊老師傳生白礬一錢硃砂二分上共為末敷上立愈一論口舌生瘡咽喉腫痛咳嗽痰涎清聲潤肺寬膈除熱上清丸黃濱江傳百藥煎四兩薄荷淨末四兩砂仁二兩訶子桔梗甘松各五錢寒水石二兩元明粉五錢硼砂五錢片腦五分上為末甘草熬膏丸如梧子大每服三五丸茶送下一論口瘡連年不愈者此虛火也玄門丹天門冬去心麥門冬去心玄參各等分上為細末煉蜜為丸如彈子大每服一丸噙化下一人口內如無皮狀或咽喉作痛喜熱飲食此中氣真寒而外虛熱用加減八味丸而愈一人舌腫舒出口外舌者心之苗又脾之經絡連舌本散舌下其熱當責於心脾二經所謂熱勝則腫也當用萆麻子去殼紙裹捶出油透紙作捻燒煙燻之而愈本草云萆麻主浮腫惡氣取油塗之葉主風腫不仁搗蒸敷之則其能解風腫內熱也可知矣一人胃弱痰盛口舌生瘡彼服滾痰丸愈盛反瀉不止惡食倦怠此胃氣被傷也豫以香砂六君子湯數劑少可再以補中益氣湯加茯苓半夏而愈夫胃氣不足飲食不化亦能為痰補中益氣乃治痰之法也若虛症而用峻利之劑豈不危哉一人脾胃虛服養胃湯枳朮丸初有效而久反虛口舌生瘡勞則愈盛此中氣虛寒用理中湯少愈更以補中益氣湯加半夏茯苓而安夫養胃湯香燥之劑也若飲食停滯或寒滯中焦服則燥開胃氣宿滯消化最為近理使久服則津液愈燥胃氣愈虛胃氣本虛而用之豈不反甚其病哉亦有房勞過度真氣衰敗或元氣不足不能上蒸中州不運致飲食不進以補真丸治之若丹田之火上蒸脾土脾土一和中焦自治飲食自進何口瘡之不愈哉一人舌青黑有刺乃熱劇也良由思慮過度怒氣所得病者要將舌來土壁上貼之方好豫制此方即效清心散赤茯苓去皮一錢酸棗仁一錢麥門冬去心一錢遠志甘草水泡去心五分黃連一錢胡麻仁一錢枳殼去穰八分小木通八分小甘草二分上銼水煎溫服一男子口臭牙齦赤爛腿膝痿軟或用黃柏等藥益甚時或口咸此腎胃虛熱以六味丸治之悉愈一治口瘡喉痛牙疼妙藥陳上余傳硼砂一錢孩兒茶二分雄黃二分青黛七分胡黃連三分冰片一釐玄明粉二釐上共研末搽上一香薷治口氣甚捷蓋口臭是脾有鬱火溢入肺中失其清和甘美之意而濁氣上干故也一補舌唇方賈蘭峰傳用鮮蟹燒灰每二錢用乳香沒藥各二分半塗之即生肉如去多唇舌用川烏草烏為末攤紙一條以涼水調合貼之即不覺痛可用刀取如流血以陳石灰塗之愈後舌硬用白雞冠血點之即軟一生舌方以活蟹一個炙乾為末收之如遇此患敷上合口即已一治舌上腫硬以百草霜海鹽等分為末井花水調敷患處又宜真蒲黃末頻摻舌上內以黃連一味煎湯服之以瀉心火一治舌長過寸研冰片敷之即收一治舌無故出血如泉槐花炒為末摻之即止一治舌忽脹出口外俗云蜈蚣毒用雄雞冠血一小盞浸之即縮入一舌吐不收名曰陽強一舌縮不能言名曰陰強一男子舌常破而無皮狀或咽喉作痛服清咽利膈散益甚豫以理中湯治之乃愈繭唇內經云脾氣通於口又云脾之榮在唇蓋燥則干熱則裂風則腫寒則揭若唇腫起白皮皺裂如蠶繭名曰繭唇有唇腫重出如繭者有本細末大如繭如瘤者或因七情動火傷血或因心火傳授脾經或因厚味積熱傷脾大要審本病察兼症補脾氣生脾血則燥自潤火自除風自息腫自消若患者忽略治者不察妄用清熱消毒之藥或用藥線揭去皮反為翻花敗症矣一論肝經怒火風熱傳脾唇腫裂或患繭唇柴胡清肝散柴胡黃芩炒各一錢黃連一錢五分山梔七分當歸一錢五分川芎六分生地黃一錢升麻一錢二分甘草三分牡丹皮一錢五分上銼一劑水煎食後頻服若脾胃弱去芩連加白朮茯苓一論陰虛火動唇燥裂如繭濟陰地黃丸熟地黃四錢山茱萸酒蒸去核二錢乾山藥三錢遼五味子四分麥門冬三錢當歸酒洗三錢肉蓯蓉二錢甘枸杞子三錢甘菊花三錢巴戟肉三錢上為細末煉蜜為丸如梧子大每服百丸空心白湯送下一論中氣傷損唇口生瘡或齒牙作疼惡寒發熱肢體倦怠食少自汗或頭痛身熱煩躁作渴氣喘脈大而虛或微細軟弱補中益氣湯人參黃耆蜜水炒甘草各一錢五分白朮去蘆當歸橘紅各一錢柴胡升麻各五分上銼一劑薑棗煎服一論唇素燥裂生瘡用橄欖燒灰為末以豬油調塗患處立已一論冬月唇乾血出用桃仁搗爛豬油調塗唇上即效牙齒右寸關脈洪數或弦而洪腸胃中有風熱齒痛尺脈洪大而虛者腎虛主齒動搖疏豁相火上炎而痛夫牙齒者乃骨之萃也骨乃腎主之則諸經血脈津液皆潤澤清涼矣蓋血旺則涼涼即骨堅固血虛則熱熱則齒浮動人之上唇人中之下牙屬腎脈下前齒屬任脈其兩頤上下及環口皆屬乎陽明二經故牙床屬土牙齒猶如木栽土上土涼則根固土熱則齒搖牙即骨也骨不能痛其痛者牙齦筋肉也人食梅多者牙即矬麻痿而不能力嚼者非木酸制土耶其牙齦肉脫胃火也牙疏脆者腎之相火也經曰諸痛癢瘡瘍皆屬心火緣心火之下陰精承之若承之不缺何痛之有其牙患之名有風牙蟲牙牙疳牙宣蓋由於火之不齊也故熱則生風風字有蟲又曰血遇火則沸而出牙宣也熱兼外邪則腫痛真陰未成而熱熾者曰疳乃潰塌之速凡為治者保腎水者知其本清胃火者知其標疏風邪者知其權蓋風藥善通經開腠則是火鬱宜發之義耳修養家常食淡些則血不凝戒慎厚味甘辛香辣則不積火治牙至藥不效時熱之積也蓋因縱欲而陰虛嗜味以為補而益增其火其目下嗜欲之節乃為後邊晚景不甚苦於牙也稟陽明火多者易作牙病也凡用椒薑巴豆蓽茇性熱辣者擦而定痛雖快於一時實乃資邪益深矣戒之戒之其小兒牙疳牙痛者恣以甘嗜以味而不知節厚其衣重其棉而不知攝乳兒作疳者母之遺熱也烘焙床被夜暖圖於睡寐況臟腑真陰未成所以為害暴也固不可不留心究明於斯矣經云腎衰則齒豁精固則齒堅一論一切牙齒腫痛皆屬胃經火盛多辛熱厚味及服溫暖之藥過多以致胃熱上下牙痛牽引頭腦而熱其齒喜冷惡熱者加味清胃散當歸尾二錢生地黃三錢牡丹皮三錢升麻四分黃連六分加防風一錢五分荊芥一錢軟石膏三錢上銼一劑水煎服若牙顴額半邊痛者加防風羌活白芷細辛若牙齦脫而出血者加扁柏葉黃芩荊芥梔子若虛損人牙痛者加黃柏知母人參甘草若滿口浮而痛不能力嚼者加連翹元參芍藥小兒牙疳者乳母服加天花粉元參白芷醇酒厚味唇齒作痛或牙齦潰爛連頭面頸項作痛者並加犀角連翹甘草胃氣齒痛加草豆蔻細辛防風羊脛骨灰去牡丹皮一論胃有實熱齒痛或上牙痛尤甚者涼膈散連翹梔子各三錢大黃四錢酒蒸芒硝一錢黃芩三錢薄荷八分知母一錢五分升麻四分石膏三錢黃連六分甘草八分上銼一劑水煎頻服一論風牙疼痛草烏二錢米泔水浸去皮炒焦細辛一錢全蠍梢五錢洗去臊白殭蠶五條炒去絲冰片上研勻搽患處開口流涎內服清胃散一治風牙腫痛保牙散軟石膏一兩川烏三錢草烏三錢花椒三錢上俱生用為末擦牙漱口吐之立已一陳省齋遇一道人治牙痛如神巴豆去殼三枚真川椒七粒上先將川椒略焙為末次入巴豆同研極細入紅米飯些須搗研為丸如黍米大每用一丸貼痛處一陳恕軒治牙痛不可忍者花椒炒胡椒白礬半生半枯食鹽炒上各為末合和同研每少許擦痛處吐涎即止一治風冷齒痛白芷細辛良薑蓽茇川椒香附蜂房炒上各等分為細末擦牙搐鼻一治牙痛方黑豆一兩炒鹽六錢花椒五錢生薑六錢連須蔥六錢艾六錢上白水煎漱口吐去一論牙屬腎骨之餘不作痛作痛者乃陽明經之火也血壅牙根齒齦浮起作痛也宜清胃火為主其牙齒疏脆剝削漸覺齒稀牙蛀去乃屬腎之真陰虧欠牙不堅實宜服六味地黃丸滋陰清胃固齒丸善治牙痛自能固齒山藥末一兩牡丹皮末一兩黃柏酒炒為末二兩黃連酒炒為末一兩升麻二兩當歸末酒洗一兩元參末一兩乾葛末一兩上用知母一兩山楂肉二兩煎濃湯去渣淨汁煮葛粉為糊又用秈米飯一盞研爛和葛粉同又研勻調以上八味末為丸如緑豆大以水飛過硃砂為衣曬乾每服三錢食後白湯送下要忌一切厚味薑蒜椒辣各等物一治胃經虛熱齒牙作痛者補中益氣湯方見內傷依本方加熟地黃牡丹皮白茯苓白芍一論齒動作渴屬脾胃虛弱陰火熾盛者補中益氣湯方見內傷依本方加酒炒黃柏知母一治每勞心則齒縫腫而不能咀嚼此元氣虛弱也補中益氣湯方見內傷依本方一論齒浮作痛耳面黑色口乾作渴日晡則劇此脾虛也用益氣湯加減八味丸而愈一朱工部午後有熱遇勞遺精其齒即痛此脾腎虛熱先用補中益氣湯六味丸更以十全大補湯而愈一男子齒浮作痛耳面黧色口渴日晡則劇脾虛弱也用補中益氣湯加減八味丸而愈一男子口臭牙齦赤爛腿腳痿軟或用黃柏等藥益甚時或口咸此腎經虛熱余用六味地黃丸而瘥一男子每遇發熱牙即浮腫此足三陰虛火用加減八味丸而不復作一論腎氣虛寒牙齒作痛面色黧黑精神憔悴腳膝無力飲食少思或痰氣上升小便頻數齒不堅固或口舌麻悶畏飲冷水以八味丸數服而安一治胃中客熱牙疳出血口臭齒齦腫痛腐爛甘露飲枇杷葉三錢石斛三錢黃芩二錢枳殼一錢天門冬三錢生地黃熟地黃山茵陳麥門冬各三錢甘草八分上銼水煎服一李小園患滿口牙齒疼痛潰爛動搖飲食不下乃牙疳也諸醫不效忽遇一道人傳方一擦即愈川椒炒一錢半銅青一錢硼砂一錢上三味為末每少許擦患處流涎立已一治牙疳根內臭爛黑色有蟲作痛雞內金即雞肫內粗皮陰乾一具白芷二錢銅青一錢麝香一分上為細末以溫鹽水漱口貼患處即愈一治牙疳臭爛久不愈白硼砂二錢白枯礬一錢蘆薈五分青黛三分輕粉三分雄黃二分冰片一分上為細末候睡去時以竹管引藥吹在牙疳上或以雞翎掃敷之一論牙痛或腫風牙蟲牙動牙長痛不可忍宋知府傳馬蜂窩白蒺藜花椒艾葉蔥頭荊芥細辛白芷各等分上銼散醋煎口噙良久吐出即瘥一治牙痛蟲蛀不已諸藥不效者救苦丹蟾酥三分銼細乳汁少溶化於器內雄黃二分細辛二分冰片二分上將酥乳調和細細納蛀牙孔內或痛牙齦縫中口中痰涎任流出之內服加味清胃湯一方治蟲牙腫痛用雄黃二分麝香少許搽於蟲孔中蟲死則痛止一方治風牙蟲牙作痛用黃蜂窩一個以花椒填滿其竅以白鹽一錢封口燒存性入白芷羊脛骨灰各一錢同研為細末先以清茶漱口淨然後以藥擦之及敷痛處如有蟲蛀孔作痛以少許塞孔中立驗固齒明目烏須黑髮良方牙痛胃火厚味所起齒痛腎虛房勞過矣補腎牙牢清火痛止節欲甘淡何疾下愈經驗良方擦牙固齒明目烏髮香口潤體久而用之其妙無比何首烏黑豆拌蒸一次牛膝拌蒸一次四兩旱蓮草四兩槐角黑豆煮汁拌蒸四兩懷生地黃酒拌砂鍋內蒸一日至黑二兩骨碎補刮去皮毛炒七次一兩五錢青鹽二兩沒食子公母成對二兩上共為細末每早擦牙滾水咽下能用於鬚髮未白之先可免染須之勞烏須黑髮固齒牢牙牢牙固齒烏須黑髮祕方臨川劉云來傳沒食子四錢青鹽二兩細辛二錢地骨皮二兩熟地黃二兩破故紙炒四兩上共為細末每早擦牙良久滾水咽下擦牙烏須方本縣丁族傳白茯苓去皮細辛牙皂燒成灰存性五倍子炒黑各等分上為細末頻頻擦牙日久須白者轉黑一擦牙固齒牙宣口臭烏須烏髮吏部吳繼疏試效旱蓮草炒乾切碎半斤香附米四兩上二味入砂鍋炒黑存性為末擦牙一固齒烏須王鬥嶽傳青鹽炒一兩槐角子炒一兩牡丹皮酒洗一兩破故紙酒炒七錢細辛酒洗五錢熟地黃酒浸一日曬乾一兩沒食子三錢百藥煎二錢上共為末每早擦牙咽下一擦牙防齒患取青槐枝捶半碎半斤水四碗煎二碗去渣入好鹽一斤煮乾更將鹽炒研細擦牙溫水漱口吐水洗目明目固齒眼目左寸脈洪數心火炎上也關弦而洪肝火盛也右寸關俱弦洪肝木夾相火之勢而來侮所不勝之金而制己所勝之土也夫天運拂經則兩曜薄蝕人身違和則兩目眵昏是眼目之在人猶日月之麗天明則其常而昏則其變也一身之中惟目最貴重臟腑之精華萃焉血脈之宗會系焉東垣曰按陰陽應象論云諸脈皆屬於目又曰目得血而能視五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑睛血之精為目窠之總絡氣之精為白眼肌肉之精則為約束裹擷筋骨血氣之精而與脈並而為系上屬於腦後出於項是故瞳子黑眼法於陰白眼赤目法於陽故陰陽合德而為精明也是以五臟六腑十二經脈三百六十五絡其血氣皆稟受於脾土上會於目而為明故目者心之使也心者神之舍也若精神亂而不守卒然見非常之怪邪中其精則精散則視岐昏一物為兩也因事煩擾飲食失節勞役過度致脾胃虛弱心火大盛則百脈沸勝血脈並行經云天明日月不明邪害空竅是也董院使云目之首尾赤睛屬心其滿眼白睛屬肺其烏睛圓大屬肝其上下肉胞屬脾而中間黑瞳一點如漆者腎實主之是隨五臟各有證應然論其所主則瞳子之關係重焉何以言之目者肝腎外候也肝取木腎取水水能生木子肝母腎焉有子母而能相離者哉故肝腎之氣充則精彩光明肝腎之氣乏則昏蒙眩暈烏輪赤暈刺痛浮漿此肝熱也膽生清淚枯黃繞睛此肝虛也瞳人開大淡白偏斜此腎虛也瞳人焦小或帶微黃此腎熱也又曰白睛帶赤或紅筋者其熱在肺上胞下胞或目唇間如疥點者其熱在脾又曰眼者輕膜裹水照徹四方溯源反本非天一之水而目孰為之主宰乎析而論之則拘急牽揚瞳青胞白癢而清淚不赤不痛是之謂風眼烏輪突起胞硬腫紅眵淚濕漿裹熱刺痛是之謂熱眼渾而淚胞腫而軟上壅朦朧酸澀微赤是之謂氣眼其或風與熱並則癢而浮赤風與氣搏則癢澀昏沉血熱交聚故生淫膚粟肉紅縷偷針之類氣血不至故有眇視胞垂雀眼盲障之形淡紫而隱紅者為虛熱鮮紅而兼赤者為實熱兩眥呈露生胬肉者此心熱血旺白睛紅膜如紙傘者此氣滯血凝熱症瞳人內湧白睛帶濕色浮而赤也冷症瞳人青緑白睛枯稿氣沉而濁也眼熱已久復為風冷所乘則赤爛眼中不赤但為痰飲所注則作痛肝氣不順而夾熱所以羞明熱氣蓄聚而傷胞所以胞合劉河間曰在腑則為表當除風散熱在臟則為里當養血安神如暴失明昏澀翳膜眵淚斑入眼此風熱也一云斑入眼此肝氣盛而發在標也宜表散以祛之如昏弱不欲視物內障見黑花瞳子散大皆里也血少神勞腎虛也宜養血補水安神以調之觀在前諸公所論治療之法大概以涼肝清心調血順氣為先不可固執水能生木之説而偏補養蓋腎水惡燥設遇虛證亦不過以當歸地黃等藥潤養之輕則溫補之可也況夫脾能發燥肝亦好潤古方率用杏仁乾柿飴糖沙蜜為佐果非潤益之意乎抑且脾者諸陰之首目者血脈之宰也故脾虛則五臟之精氣皆失所司不得歸明於目矣心者君火也主藏神明宜靜而安相火代行其令相火乃胞絡之火主百脈皆榮於目既勞役妄動又因邪氣所並而損血脈是故諸病生焉翳目者雖宜養血安神又當兼理脾胃乃良法也至於退翳一節尤關利害夫翳起於肺肺家受熱輕則朦朧重則生翳有曰真珠翳狀如碎米者易散有曰梅花翳狀如梅花者難消雖翳自熱生然治法先退翳而後退熱者謂熱極生翳若先去赤熱則血為之凝而翳不能去其有赤眼與之涼藥過多又且滌之以水不反掌而水凝眼特一團水耳水性清澄尤不可規規於點洗緣其喜怒失節嗜欲無度勞役眼力泣涕過傷凌寒衝風當暑冒日不避煙火飲啖辛辣此皆患生於臟腑者也專事點洗可乎哉在乎察受病之因究標本之理推明運氣以調之斟酌藥飲以平之患者又能靜坐間居澄神息慮節飲食戒色欲專內視簡外觀愛惜目力則無有不安者矣一論暴發眼腫如桃並赤眼痛澀難開者祛風清熱散當歸尾二兩赤芍二錢川芎一錢五分生地黃三錢黃連六分黃芩二錢梔子三錢連翹三錢薄荷八分防風一錢五分荊芥一錢羌活二錢桔梗八分枳殼一錢甘草八分白芷梢一錢上銼一劑燈草七根水煎食後服腫痛甚加大黃芒硝風熱加蔓荊子牛蒡子烏珠痛加天麻川烏生用三片犯眼加蒼朮硃砂眼生翳障加白蒺藜眼目被人打傷青腫加大黃如杖瘡腫痛未破作憎寒壯熱或打重血氣攻心加大黃桃仁如打撲傷損內重瘀血不散加大黃桃仁服之立愈一論治眼暴發赤腫瞼高苦痛不可忍者救苦湯連翹桔梗紅花細辛各二分當歸身夏月減半甘草炙各一錢蒼朮米泔浸龍膽草各一錢四分羌活太陽升麻陽明柴胡少陽防風藁本黃連生地黃黃柏黃芩知母各三錢川芎六分上銼一劑水煎臨臥服一治火眼赤眼暴發腫痛不可忍者黃連黃柏生白礬各三分上銼膠棗一枚煎水半鍾洗之立消一洗暴發爛弦風眼用皂礬不拘多少瓦器盛於三伏內曬之至白色須曬十餘日方好再入黃連末十分之一每用少許水和紙隔洗眼立效一治眼暴發腫痛用白礬枯過為末每用三錢生薑去皮取自然汁調如膏抹紙上令患人閉目將藥貼眼睛上燒一炷香盡痛即止用溫水輕輕洗去神效一外治火眼腫痛用青礬炒三錢黃土六錢皆為細末井花水調作兩餅如眼睛大先將眼用水洗淨次用紙貼眼上後用餅貼紙上令病人仰臥用水潤餅如干再潤兩三時即已一治眼暴發赤腫痛淚隱澀難開用大黃末新汲水調塗兩眉正上頭兩腦水潤之須臾腫消痛止一治如前症用黃連末五錢薄荷二錢半為末用雞蛋清和隔紙塗眼上良久干則以水潤之即效一論凡眼疾暴發新久腫痛痛不可忍者皆緣心家火起所致也並治一應障翳等疾光明丸李中山傳生地黃白芷羌活獨活甘草薄荷防風荊芥木賊甘菊花草決明黃連黃芩黃柏大黃連翹桔梗各五錢歸尾川芎各三錢上藥十九味為末煉蜜為丸如緑豆大每服三五十丸白滾湯送下早晚各進一服一論暴發眼瀉火升陽湯黃耆八分人參七分甘草五分柴胡一錢五分梔子二錢菊花二錢枳實一錢六分甘枸杞子當歸川芎各三錢黃芩二錢升麻一錢五分薄荷二錢藁本二錢生地黃三錢龍膽草一錢上銼一劑用水一鍾酒一鍾煎至一鍾臨臥服渣再用水三鍾煎至一鍾溫服即愈如未全愈將第三次渣用水一鍾煎至半鍾溫服忌魚雞一論內障眼得之脾胃元氣虛弱心火與三焦皆盛飲食失節形體勞役不得休息故上為此症也沖和養胃湯黃耆一錢五分人參一錢炙甘草一錢五分當歸酒洗一錢白朮去蘆一錢白芍酒炒六分白茯苓三分柴胡七分升麻一錢羌活一錢五分防風五分黃連七分黃芩七分乾薑一分五味子二分上銼一劑水煎稍熱服一論肝主目肝受熱則不能視血弱則肝氣無以榮養肝氣有虧則有花也久視艱澀大眥赤色者此血不足肝之失養也迎風有淚腎之虛也黑睛有翳不散此亦因勞受風血弱不能行也宜服此藥補肝血滋膽水益腎氣大有殊功家傳養肝丸羚羊角鎊另研五錢生地黃酒浸熟地黃酒蒸肉蓯蓉酒洗甘枸杞子防風去蘆草決明炒菊花羌活當歸酒洗沙苑蒺藜炒各一兩楮實子炒五錢羊子肝小肝葉煮焙乾為末上為細末煉蜜為丸如梧桐子大每服五十丸加至七十丸至百丸早鹽湯下午茶下臨臥酒下不飲酒人當歸湯下即補肝重明丸去赤芍甘草一論素稟虛弱勤勞眼目昏暗當歸酒洗一錢五分白芍酒炒一錢川芎一錢黃柏人乳汁炒一錢生地黃二錢龍膽草酒洗四分密蒙花五分白朮去蘆一錢人參五分知母人乳汁炒一錢茺蔚子一錢黃芩酒炒七分上銼一劑水煎服一論病目用涼藥過多以致隱澀難開防風七分黃耆一錢炙甘草五分蔓荊子三分當歸五分白芷三分升麻七分柴胡五分上銼一劑水煎服一論日晡兩目緊澀不能瞻視者此元氣下陷也補中益氣湯方見內傷依本方倍參一論腎水枯竭神光不足眼目昏暗此壯水之主以制陽光壯水明目丸熟地黃一兩二錢山藥一兩二錢澤瀉八錢山茱萸酒蒸去核一兩二錢茯苓去皮一兩川芎二錢牡丹皮八錢當歸酒洗一兩生地黃五錢蔓荊子一兩甘菊花五錢黃連五錢柴胡三錢五味子五錢上為細末煉蜜為丸如梧桐子大每服四五十丸用好酒調服一論遠年近日爛弦風眼翳障青盲腫痛百病點眼仙方臨州馬伏所傳蕤仁三錢淨去皮將竹紙碾去油方入藥用筆筒捲紙將葉鋪紙上重層卷碾珍珠二分五釐生用綿紙包打碎碾琥珀二分生用紙包打碎碾爛熊膽一分五釐生碾碎牛黃一分生用麝香半分生用片腦一分五釐生用蜂蜜三錢五分用慢火煨化濾去渣上先稱眼藥罐次加蜜稱後入藥攪以上藥八味調勻點睛一論暴發風熱時行火眼神效紫金錠陳省齋祕傳川黃連四兩銼為粗末將井花水十鍾浸兩三日入鍋煎至三鍾去渣再熬至半鍾下水膠一錢二分溶化調後藥為錠銅緑五錢輕粉二錢宮粉三兩上共為細末將黃連汁調為錠陰乾用時將井花水磨加熊膽五分冰片二分尤妙一論兩目翳障爛弦風熱昏蒙色眼皆治光明散爐甘石用上好的四兩珍珠四錢上二味用竹紙包定將新傾銀紫泥罐為餅包石珠在內為丸外用熊膽一錢硼砂二錢火硝三錢研末為衣再用紫泥罐包裹曬乾用炭火煅煉以七根線香為度煉四炷香用童便淬之浸黑色為妙又煉根半香以好醋淬之再煉根半香歇火聽用前煉過末藥一錢加熊膽一分火硝一分為極細末點眼其效如神一論遠年近日內障青盲雲翳推移火眼暴發迎風流淚怕日羞明肝腎虛損等疾點之悉愈能治七十二種眼疾能醫二十年目不明者惟有瞳人反背而睛散者不治仙傳珊瑚紫金膏薛巡兵祕傳白爐甘石南方出名羊腦爐甘童便浸七日用灰火硝銀砂鍋內煅投入童便內共十日曬乾細研一兩麝香揀淨去皮細研五分黃丹高者名丹滾水飛過三次曬乾細研為細末一兩海螵蛸即烏賊魚骨剝去皮甲殼火炙過細研一錢乳香光明者入砂鍋內微火炒出其煙研細末二錢沒藥光明者入砂鍋內微火炒出煙細研二錢白硼砂明淨二錢細研青鹽去泥土細研五分片腦細研三分上將前七味各研細末稱足合入一處入鉢內再研細極無聲後入麝片二味再研調勻將蜂蜜用細袋濾過熬蜜滴水成珠夏老冬嫩春秋酌老嫩之間用蜜調藥令稀稠得所瓷器內封固不可泄氣點眼神效一人兩目作痛服降火去風之藥兩目如緋熱倦殊甚余用十全大補湯數劑諸症悉退服補中益氣湯兼六味丸而愈復因勞役午後目澀熱倦再用十全大補而痊一人年二十素嗜酒色兩目赤痛或作或止兩尺洪大按之微弱余謂少年得此病目當失明翌早索途而行不辨天日衆皆驚異余將六味丸料加麥冬五味一劑頓明一人目赤不明服祛風散熱藥反劇而重聽脈大而虛此因勞心過度飲食失節用補中益氣加茯神酸棗山藥石棗五味頓愈又勞役復甚用十全大補湯加前藥漸愈卻用補中益氣湯加前藥而痊一儒者日晡兩目緊澀不能瞻視此元氣下陷用補中益氣倍加參耆數劑而愈一論眼病之後微有上熱白眼紅多眵淚每疼痛而隱澀難開此苦寒太過而真氣不能通九竅也故眼目昏花不明以補中益氣湯去參朮陳加防風白芷蔓荊子一論內障眼得之元氣脾胃虛弱心火與三焦俱盛飲食失節形體勞役不得休息故上為此症也以益氣湯加黃連黃芩乾薑五味去陳皮一論諸般翳障攀睛胬肉內障青盲等症益府祕傳撥雲龍光散蕤仁五兩去粗殼取仁用溫水浸去嫩皮膜尖心用上好白竹紙包裹捶去油以盡為度用五錢牛黃二分五釐白磁砂即好白細瓷器四五錢重用頭酸醋一碗將瓷器以砂罐盛貯放炭火內燒紅先投入醋內以七次為度又用童便一碗燒紅投內以七次為度又將醋童便合一碗又燒紅投入以七次為度先將磁研煉以水澄清用中間陰乾五分好珍珠八九分將雄雞一隻以珠入雞肚內過一宿然後殺雞取珠用豆腐蒸過用五分硼砂二錢五分琥珀五分真熊膽三分以瓷瓦盛放火上煨去水用二分五釐煉硇砂三四分將冷水一碗以火煮乾為度用一分當門子一分丁香一分海螵蛸水煮過六七次二分冰片一分人龍用男人孩子口內吐出食蟲即用銀簪破開河水洗刮令淨陰乾二分上精製一處細研任意點眼盲者復研一治血氣虛損眼目昏暗此壯水以制陽光有誤服寒涼之過黑暗全不通路以十全大補湯加沉香大附子白豆蔻東垣謂目能遠視而不能近視火盛而水虧也法當補腎六味地黃丸主之目能近視而不能遠視有水而無火也法當補心定志丸加茯苓主之又曰不能近視晨服地黃丸不能遠視臥服定志丸是以通手足少陰經也是以知不能近視者腎水虧火盛也不能遠視者心血不足也定志丸遠志去心石菖蒲各二兩人參一兩白茯神三兩加白茯苓一兩上為細末煉蜜為丸硃砂為衣每服二十丸米湯下六味地黃丸方見補益喉痹聲啞痄腮兩寸脈浮洪而溢者喉痹也脈微而伏者死內經曰一陰一陽結謂之喉痹一陰者手少陰君火心主之脈氣也一陽者手少陽相火三焦之脈氣也二脈並絡於喉氣熱則內結結甚即腫脹腫脹甚則痹痹甚則不通而死矣夫推原十二經惟足太陽則下項其餘皆湊於喉嚨然內經何獨言一陰一陽結為喉痹蓋君相二火獨勝而熱中絡故痛者速也余謂一言可了者火也故十二經中言嗌乾嗌痛喉腫頷腫舌本強皆君火為之也惟咽痹急速相火所為也夫君火者猶人火也相火者猶龍火也人火焚木其勢緩龍火焚木其勢速內經之言喉痹則與咽舌其兩間耳然其病同於火故不分也後之醫者各詳其狀強立八名曰單乳蛾雙乳蛾子舌脹木舌脹纏喉閉走馬喉閉熱氣上行故傳於喉之兩旁近外作腫以其形似是謂乳蛾一則為單二則為雙其比乳蛾差小者名謂之喉閉熱結於舌下復生小舌子名曰子舌脹熱結於舌中舌為之腫名曰木舌強而不柔和也熱結於咽喉腫繞於外且麻且癢腫而大者名曰纏喉風喉痹暴發暴死者名曰走馬喉風此八種之名雖詳若不歸之火則相去遠矣其微者可以咸耎之若其大者以辛散之今之醫者皆有其藥也如薄荷烏頭殭蠶白礬朴硝銅緑之類至於走馬喉痹何恃此乎生死人反掌之間耳其最不誤人者無如砭針出血血出則病已易曰血去惕出良以此乎昔余治一婦人木舌脹其舌滿口諸醫不愈余以銀針小而鋭者砭之五七度腫減三日方平計所出血幾至盈斗余昔又治一男子纏喉風腫表裡皆作藥不能下余用涼藥灌於鼻中下十餘行外用拔毒散敷之陽起石燒淬與伏龍肝各等分細末之以新水掃百遍三日熱始退腫始消又嘗治一貴婦喉痹蓋龍火也雖用涼劑而不可使冷服為龍火宜用火逐之人火者烹飪之火是也乃使曝於烈日之中登於高堂之上令家人攜火爐坐藥銚於上使藥常極熱不至太沸通口時時呷之百餘次其火自然而散此法以熱行寒不為熱而插格故也大抵治喉痹用針出血最為上策但人畏針委曲旁求瞬息喪命凡用針而有針創者宜搗生薑塊調以熟白湯時時呷之則創口易合銅人亦有灸法然痛微者可用速者恐遲則殺人故治喉痹之人與救人同不容少待內經火鬱發之發謂發汗咽喉中豈能有汗故出血者乃發汗之一端也後之君子毋執小方而曰吾藥不動臟腑又妙於出血若幸遇小疾而獲效不幸遇大病而死矣毋遺後悔可也一論喉痹危急死在須臾牙關緊閉病人大指外邊指甲下根不問男左女右用布針針之令血出即效如大勢危急兩手大指俱針之其功尤效一論治不測急慢喉痹腫塞不通開關神應散盆硝研細四錢白殭蠶微炒去嘴八分青黛八分蒲黃五分麝香一分甘草八分馬勃三分片腦一分上各為細末稱足同研極勻瓷瓶收貯如有病症每用藥一錢五分以新汲水小半盞調和細細呷咽如是喉痹即破出血便愈如不是喉痹自然消散若是諸般舌脹用藥半錢以指蘸藥擦在舌上下咽津唾如是小兒一錢作為四五服亦如前法用並不計時候勃一名馬疕菌也虛軟如紫絮彈之紫灰出狀如狗肝生濕地園中久腐處主惡瘡馬疥敷諸瘡以蜜拌調呷治痹咽痛一咽喉腫痛痰涎壅盛初起或壯盛人上焦有實熱者可服清咽抑火湯連翹一錢五分片芩一錢梔子一錢薄荷七分防風一錢桔梗二錢朴硝一錢黃連一錢黃柏五分知母一錢玄參一錢牛蒡子一錢大黃一錢甘草五分上銼一劑水煎頻頻熱服聞生過楊梅瘡者加防風山豆根二兩一論虛火上升喉內生瘡喉閉熱毒最能降火滋陰滋陰降火湯當歸一錢川芎一錢白芍一錢二分川黃柏蜜水炒一錢生知母一錢懷熟地黃一錢五分天花粉一錢生甘草一錢加元參二錢白桔梗去蘆三錢上銼一劑水煎入竹瀝一盞溫服一論喉痹腫痛聲啞不出飲食不下陰虛相火上炎咳嗽痰喘潮熱虛勞等症內服此藥外用神仙通隘散吹之即愈滋陰清火湯懷熟地黃一錢山茱萸酒蒸去核一錢白茯苓去皮一錢山藥一錢澤瀉一錢桔梗二錢元參一錢牡丹皮一錢黃柏用蜜水炒一錢天門冬去心一錢麥門冬去心一錢甘草一錢上銼一劑水煎溫服外用硼砂一味噙化咽下降痰消毒如神一論咽喉腫痛屬素虛弱者或服涼藥過多而作瀉者皆可服清上養中湯小甘草桔梗各二錢元參當歸黃芩各一錢陳皮去白白朮去蘆白茯苓去皮麥門冬去心連翹各八分人參防風金銀花各八分上銼一劑水煎食遠頻服有痰加貝母一論咽喉腫痛不能言語或吐或瀉或不食或四肢冷痹但可進藥無不愈者此從治法也通關散炙甘草一錢五分人參白朮去蘆白茯苓去皮桔梗各二錢防風七分薄荷五分荊芥乾薑炒或加大附子炮各三分上銼水煎頻頻與服一論喉痹雙單乳蛾風腫吐咽不下死在須臾治一應喉痹之總司也山豆根為末用熊膽和為丸用雞胵皮陰乾研末為衣如緑豆大每用一丸放舌上徐徐咽下即愈一治喉風等症起死回生散蜈蚣三錢炮存性膽礬一錢全蠍三錢炒存性蟬蛻一錢焙存性殭蠶去絲嘴一錢炒穿山甲麩炒三錢蟾酥一錢乳香五分川烏一錢上為細末每服一錢五分或二錢小兒每服一分或六七釐用蔥頭搗爛和藥酒送下出汗為度如口不開灌服忌豬羊油雞面七日一論單乳蛾雙乳蛾喉風喉痹腫痛水漿不入死在須臾賓崇周姻家試驗膽礬一錢五分硼砂一錢八分雞內金制過二錢枯白礬二錢百草霜三錢以衆末黑為度上各為細末用絹羅過用中指盛藥按上患處入噙令痰多去後用薄荷湯漱口如甚將鵝翎削尖刺破用藥按上或用鵝毛蘸醋帶藥刷上滿口刷攪引痰出盡即愈一方加熊膽五分更效一論喉風腫痛幾死雙橋周姻家屢驗茶子霜梅釅醋上三味研爛去渣將藥汁蘸掃咽喉即時吐痰而愈一論喉痹腫痛湯水不下死在須臾用此一吹即活牛黃二錢硼砂一錢雄黃三分上為細末每用一分五釐吹入喉內即愈一論喉痹腫痛車左源傳效鬱金一錢雄黃五分巴豆肉去殼四個兩個生用兩個用豬油包裹燈上燒熱存性上為末三味攪勻每用一分二釐入竹筒內吹患處小兒用六釐一治喉閉風閉難治者豬牙皂角一條用蜜調和水煎如急立服緩則露一宿尤妙倘如口緊者撬開灌之將危者即蘇一治喉風危急用大黃為末竹筒盛之安青魚膽七個入末待乾研末聽用遇患喉痹吹入鼻中或喉中立效一論時氣纏喉入喉腫塞水穀不下牙關緊閉不省人事神應散雄黃枯礬藜蘆生用牙皂炙黃上各等分為末每用豆大一粒吹鼻內吐痰神效一論喉痹乳蛾咽喉腫痛湯水不入死在須臾之急巴豆去谷搗為末入細辛末少許同研勻卷在紙內中間剪斷如左患塞右鼻如右患塞左鼻孔中雙腫左右相替塞之咽喉立開如神一論喉痹腫痛水漿不入死在須臾扶滿劉匯昆傳先用皂角細辛為末擦牙次用陳鹽松菜燒灰霜梅肉生艾葉擂爛同扎於筷頭上蘸喉數次吐痰盡即食百沸湯食後用米粥調服一治咽喉腫痛百藥煎硼砂甘草生白礬各等分上四味為細末每服一錢食後用米湯調細細呷下一論纏喉腫痛皂角為末用醋調塗外頸上干則易其乳蛾即破而愈一論喉風腫痛不可忍者霜梅五個或七個去核白礬一兩研爛用好醋一碗入藥同煮以礬化為度待溫用筷扎綿繳齒上下至喉先繳牙外自外而繳至舌下自舌下又繳至舌上繳至喉其痰自然湧出痰帶絲者即愈無絲者絲斷不治一論喉痹壅塞不通用紅藍花搗絞取汁一小鐘服之以瘥為度如冬月無濕花可浸乾者絞取濃汁如前服之有效一論咽喉腫痛吹喉散周印池傳牙硝一兩五錢硼砂五錢雄黃二錢殭蠶一錢冰片二分上為細末每用少許吹喉立效一治咽喉腫痛水吞不下用青鹽白礬硼砂各等分為末吹患處有痰吐出而愈一治咽喉腫痛水漿不入死在須臾用真蟾酥為末用筷頭點入對嘴上即時消散其效速如風一論久嗽喉痛小太平丸人參二分五味子三分天門冬去心五分麥門冬去心二錢玄參八分徽墨三分上為細末煉蜜為丸噙化下痰甚加貝母一論勞役過傷忽咽喉腫閉不省人事喘促痰湧汗出如水肢體痿軟脈浮大而數此飲食勞役無根虛火上促也補中益氣湯方見內傷依本方加肉桂頓蘇一論咽喉腫痛口舌生瘡勞則愈甚此脾肺氣虛膀胱有熱也補中益氣湯方見內傷依本方加元參酒炒黃柏知母稍愈去知柏加山藥山茱萸一論咽喉腫痛服涼藥過多或過勞痛愈甚此中氣虛熱也補中益氣湯方見內傷依本方加炒芩連一論積熱上攻痰涎壅塞喉痛聲啞腫痛難禁上宮清化丸內閣祕傳黃連去毛六錢桔梗去蘆六錢山豆根四錢粉草四錢薄荷葉一錢白硼砂六分上為細末煉蜜為丸如芡實大時常噙化一論喉痛有痰聲啞薄荷二兩細茶一兩白硼砂七錢烏梅肉二十一個貝母二錢冰片三分孩兒茶五錢上為細末煉蜜為丸如皂角子大每噙化下一論聲啞甘草烏梅桔梗烏藥上銼水煎溫服一治出聲音方訶子炮去核一兩木香一兩甘草五錢上銼水煎入生地黃汁一合再煎數沸放溫分六服每食後日進半料一論聲嘶失音鐵笛丸當歸酒洗一兩懷熟地黃一兩懷生地黃一兩天門冬去心鹽炒五錢黃柏蜜炒一兩知母五錢麥門冬去心鹽炒五錢玄參三錢白茯苓去皮一兩訶子五錢阿膠炒五錢人乳一碗牛乳一碗烏梅肉十五個甜梨汁一碗上為細末煉蜜為丸如黃豆大每服八九十丸訶子湯下蘿蔔湯亦可一治失音用槐花新瓦上炒熟懷之隨處細嚼一二粒久久自愈一治失音用生白礬煉蜜為丸服效一治聲啞失音不出用豬板油切爛入蜜內重湯煮熟食之一論痄腮腫痛防風荊芥羌活連翹牛蒡子甘草各等分上銼水煎服外用赤小豆末醋調敷恐毒氣入喉難治一方用石灰不拘多少炒七次地下放七次醋調塗腫處立愈一論痄腮疙瘩腫痛及吹乳南薄荷三錢斑蝥去翅足炒三分上為細末每服一分燒酒調下立消服藥後小便頻數服益元散一服一治卒喉中生肉以棉裹筷頭蘸鹽指肉上日六七度易一人患喉閉以防風通聖散治之腫不能咽此症須針之無奈牙關已閉遂刺少商穴出血口即開更以膽礬入患處吐痰一二碗許仍投藥乃愈嘗見患此疾者畏針不刺多斃少商穴在手大指內側去爪角如韭葉許一人喉閉腫痛寒熱脈洪數此少陰心火少陽相火二經為病其症最惡惟刺患處出血為上因彼畏針先以涼膈散服之藥從鼻出急乃願刺則牙關已緊不可針遂刺少商二穴以手勒去黑血口開仍刺喉間治以前藥及前吹喉散吹之頓愈又以人參敗毒散加芩連牛蒡子玄參四劑而平經曰火鬱發之謂發汗出血乃發汗之一端也河間云治喉之火與救火同不容少怠嘗見喉閉不出血喉風不去痰以致不救者多矣每治咽喉腫痛或生瘡毒以荊防敗毒散加芩連重者用防風通聖散一男子口舌常破如無皮狀或咽喉作痛服諸涼藥愈甚余以理中湯一劑乃可一人腳發熱則咽喉作痛內熱口乾痰涎上壅此腎經虧損火不歸經用補中益氣加麥冬五味及用加減八味丸而愈一人患喉痛日晡益甚此血氣虛而有熱用八珍湯而愈後每入房發熱頭痛用補中益氣湯又加麥冬五味及六味丸常服後不復作一丹溪先生云咽痛屬血虛用四物湯加竹瀝陰虛火上炎者必加玄參氣虛加人參竹瀝又云咽喉腫痛有陰虛陽氣飛越痰結在上者脈必浮大重取必澀去死為近宜人參一味濃煎細細飲之如作實症治之禍如反掌此發前人之未發救無窮之夭亡但此一方宜斟酌用之看症按方不可泥執也一人因怒氣大叫將下腮脫落任掇不上衆視束手余以烏梅捶餅塞於兩腮坐牙盡頭空處張口流涎須臾隨手掇上補遺一治喉痛如生毒物並單蛾喉嚨並治用巴豆半夏各等分將此兩味用頂好醋放小罐內煎熟取巴豆半夏一起研末用麻布包做數粒如豆子大以前醋浸之取一粒含在喉痛處至熱又換別粒含之直至吐瀉而後已即以稀粥補之而愈忌冷水豬油一利膈生津止渴清音常用之藥也烏梅一兩蘇州薄荷葉四兩上為細末白糖霜四兩蜜為丸如芡實大每用一丸噙化一治喉風咽痛雙單乳蛾薑師周傳烏梅去核竹籤插在蜒蝣身上陰乾取燒灰存性為末點患處立愈一治咽喉腫痛生瘡聲啞危急之甚及治虛勞聲嘶喉痛神仙通隘散賈蘭峰祕方白硼砂二錢孩兒茶一錢蒲黃六分青黛一錢牙硝六分枯礬六分白滑石一錢片腦二分黃連末五分黃柏末五分上為細末吹喉中立效一治喉中熱毒腫痛喉閉乳蛾等症清上丸熊膽一分雄黃五分硼砂一錢薄荷葉五錢青鹽五分膽礬少許上為細末煉化白糖為丸如芡實大臥時舌壓一丸自化入喉神效一治聲音不出真蘇子一兩訶子三個杏仁三十個百藥煎二兩上為末每服二三錢熱酒調下一治欲好聲音用杏仁一升熬去皮尖酥一兩蜜少許為丸如梧子大空心米湯下十五丸一治失音皂角一條去皮子蘿蔔三個切片水煎服之不過三服能語聲結核結核者火因痰注而不散鬱結堅硬如果中核或在頸脅或在手足或在頸項或在臂在腋如腫毒不紅不痛不作膿不必潰發但令熱氣散核自消大法宜二陳湯加竹瀝多服為效梅核氣者窒礙於咽喉之間咯之不出咽之不下如梅核之狀者是也始因喜怒太過積熱蘊隆而成癘痰鬱結致有斯疾耳治宜導痰開鬱清熱順氣加陳皮半夏川芎香附山梔黃芩枳殼蘇子之類是也如老痰凝結不開以咸能軟堅之藥海石是也一論咽喉結核成塊如核桃者腫硬疼痛兩腋下俱有及頸項腫硬頭不能轉消解散南星三錢半夏二錢薑炒陳皮二錢枳實一錢桔梗八分前胡二錢柴胡八分黃連六分白附子八分連翹三錢赤芍二錢防風一錢五分獨活二錢莪朮一錢木通二錢蘇子三錢白芥子二錢蔓荊子二錢甘草八分上銼生薑燈草煎服一論不問男婦遍身疙瘩成塊如核不紅不痛皆痰流注而成結核也醉翁仙方海上異人傳白頭翁一斤去葉用根分作四服每一服四兩用酒煎一日三服二日服盡而已一祕方治症同前效不可言萆麻子一斤去殼用肉放入公豬肚內酒煮肚爛為度取去萆麻子曬乾為末用前爛豬肚搗千餘下為丸酒送下一日服三次一論婦人遍身痰核不痛不紅不腫內消之劑陳皮二錢半夏二錢白茯苓三錢當歸三錢川芎一錢五分白芍二錢枳實一錢黃連六分香附二錢桔梗八分龍膽草三錢連翹三錢防己二錢羌活二錢柴胡八分甘草八分上銼生薑三片水煎服一論結核渾身手足俱有如胡桃者並治胸中胃脘至咽門窄狹如線疼痛者此風痰氣熱所致也開結導痰湯陳皮一錢半夏七分枳殼一錢枳實七分桔梗五分前胡五分黃芩一錢香附童便浸三分威靈仙七分荊芥七分羌活七分木香七分檳榔八分殭蠶二分射干七分甘草七分上銼一劑生薑三片水煎服一論痰核氣核痄腮疙瘩及吹乳等症內消散朱賓湖得效南薄荷三錢斑蝥去翅足三分炒上為細末每服三分燒酒調下立效服之後小便頻數服益元散以烏雞子清丸如緑豆大每服一丸茶下加至五丸卻每日減少一丸減至一丸後每日服五丸治瘰癧名內消丸一論痰核方庠生石介伯傳歸尾一兩赤芍梢一兩五錢連翹一兩藁本七錢五分細辛八分羌活一兩獨活一兩防風一兩五錢荊芥八分小川芎六錢薄荷一兩白芷梢一兩桂枝一兩甘草節六錢赤芍一兩上為細末每服二三錢食後酒調服一論痰核在喉嚨上下左右或生在兩腋下並治瘰癧庠生敏所兄傳防風一兩五錢山茨茹一兩穿山甲七錢射干二兩紅內消二兩白芷梢一兩烏藥一兩連翹一兩車前子一兩漢防己二兩何首烏二兩牛蒡子薄荷各一兩金銀花桔梗各一兩五錢獨活一兩殭蠶一兩半夏一兩赤芍一兩五錢夏枯草二兩皂角刺二兩小川芎一兩當歸尾一兩甘草五錢上銼一劑水煎食後服有潮熱加黃芩柴胡各五錢一男子素善怒忽項微腫漸大如升用清痰理氣而大熱作渴小便頻濁余謂腎水虧損用六味地黃丸補中益氣而愈亦有項脅等處大如升斗或破如菌榴不問大小俱治以前法必多服以愈為度補遺神效治痰癧妙方陳柘所傳天花粉三兩昆布酒洗八錢貝母一兩炒殭蠶一兩五錢全蠍酒洗五個炒黃連五錢知母一兩蒲公英二錢陳皮一兩青皮炒一兩歸尾七錢黃芩酒炒一兩梔子一兩五錢紅花五錢土木鱉去殼十個穿山甲土炒一兩連翹去心一兩五錢海藻酒洗一兩半夏枯草一錢五分上將十七味君臣藥分為十劑其蒲公英夏枯草每服各照數用白水煎臨服時加濃酒一杯同服一治痰核金星膏蘇九寧傳金星鳳尾草一兩五錢實竹葉一兩蔥白三十二根側柏葉一兩五錢上用香油一斤浸藥一日用火熬看藥焦黃為度用棉布袋濾去渣仍入鍋內熬熟油一斤淨入頂好鉛粉三兩用竹攪勻文武火熬看煙起黑色再入鉛粉四兩著四五十下鍋仍用竹不住手攪勻滴水成珠取起放在地上再攪去火毒一治痰核氣核陳出實傳黃芩一錢五分枳實一錢蘇子貝母連翹各一錢海藻香附各七分桔梗白芥子各八分甘草三分上銼水煎食後服一治痰氣核用柏子仁一斤曬乾為細末每用末二兩又將天門冬連翹心各用一兩為末入小布口袋內將白水酒兩小瓶煨熟窨二三日食後每服一碗半月內即消一治痰氣核頸大戴雷門傳牛蒡子五分枳實三分殭蠶五分防風桔梗黃芩連翹各八分貝母一錢海藻水洗金銀花枯礬各一錢夏枯草八分上銼一劑白水煎食後服一治痰核心泉侄傳用黃泥作窩入生礬四兩鹿角蛇一條在窩內陰乾火煅化為末每用服一分用溫酒調服立消一治項後側少陽經中疙瘩肉色不變不問大小及日月深淺或有赤硬腫痛生山藥一排去皮萆麻子二個去殼上二味研勻攤帛上貼之如神一治梅核氣加減四七湯蘇梗八分陳皮一錢五分厚朴八分南星二錢半夏二錢茯苓三錢枳實一錢青皮二錢砂仁八分益智仁一錢五分白豆蔻八分神麯炒二錢檳榔一錢上銼生薑煎服癭瘤夫癭瘤者多因氣血所傷而作斯疾也大抵人之氣血循環無滯癭瘤之患如調攝失宜血凝結皮肉之中忽然腫起狀如梅子久則滋長癭有五種曰石肉筋血氣是也瘤有六種曰骨脂石肉膿血是也治法癭瘤二者切不可針破針破則膿誤漏則殺人惟脂瘤可破去脂粉即為異不可輕易余將瘤癭之分於後醫者宜審辨之則不誤也消癭湯海藻洗龍膽草海蛤粉各二兩通草昆布燒存性枯白礬松蘿各一兩半夏二兩五錢麥曲一兩五錢白芷一兩上為末每服五錢酒煮忌甘草蝦魚豬肉五辛諸毒等物又要吞礬蠟丸一論治癭瘤癰疽便毒惡瘡久漏不愈者經驗礬蠟丸白礬用生四兩為末黃蠟二兩溶化衆手為丸如梧子大每服三十丸空心白湯下一論內府祕傳方治癭氣海藻熱水洗淨昆布洗淨海帶海螵蛸海粉飛過海螺醋淬甘草少許上如項下搖者用長螺頸不搖用圓螺各等分為末煉蜜為丸每夜臥時口中噙化一丸功效不可言也一論系瘤神方兼去鼠奶痔及瘤同用芫花根洗淨帶濕不可犯鐵器須於木石器中搗取汁用線一條浸半日或一宿將線系瘤經宿則落如未落再換一線不過三次自落用龍骨訶子赤石脂各等分為末敷瘡口即合如無根用芫花泡水浸線系鼠奶痔依法用之無一不效一論洗瘤祕方用七指草名金鳳花一料煎水頻洗夏用鮮春秋冬用干煎水洗一治癭驗方沉香乳香丁香木香藿香各一錢五分上用臘月母豬眼七個同藥配好酒煮三炷香露一宿連藥焙乾為末煉蜜為丸如白果大每臨臥噙化一料效一治頸下卒結囊欲成癭者海藻一斤洗去咸酒浸飲之加昆布等分研之煉蜜為丸如杏核大含口中稍稍咽下一治癭消塊神效開結散沉香木香各一錢橘紅四兩珍珠四十九粒入砂罐內以鹽泥封固煅赤取出曬豬靨子肉四十九枚用豚豬者生項間如棗子大上為末每服一錢臨臥酒調徐徐咽下患小三五服大者一劑愈忌酸鹹油膩滯氣之物須用除日於淨室修合肺癰寸口脈數而實者肺癰也其脈短而澀者自痊脈浮大者難治夫肺癰者由寒熱之氣內舍於肺其氣結聚之所成也蓋因調理失宜勞傷血氣風寒得以乘之寒生熱風亦生熱壅積不散遂成肺癰咳而腦漏右脅隱痛二腳腫滿咽乾口燥煩悶多渴時出黃唾腥臭狀如糯米粥難治有熱而嘔者不可治嘔膿盡而止自愈若嘔吐膿黃色腥或帶粉紅色者即肺痿也大抵脈細而沉裡虛而變症矣一論咳嗽吐膿血腥臭不可聞者肺癰也黃耆蜜水炒防風金銀花忍冬藤金沸草牛膝桔梗各等分上用鴨一隻縊死破開入前七味藥於鴨肚內用好酒煮盡為度吃鴨藥渣曬乾為末酒調服後服淨膿湯淨膿湯此湯吃鴨後宜服甘草四兩銼作大帖用水煎頓服如納不得吐出之服後化痰止咳丸白礬二兩枯的百草霜一兩上二味為末清水為丸每服三五十丸人參五味各三錢煎湯送下作三日用一論治肺虛用白鴨一隻去內臟用薏仁杏仁各一兩入鴨腹中飯上蒸熟去藥只吃鴨肉大能補肺一論肺癰吐膿腥臭用黃豆一粒豫病人口嚼不覺豆之氣味是肺癰也一論肺癰薏苡仁略炒為末糯米飲調服入粥煮吃亦可或水煎服當下膿血而安保肺丹方見癭瘤凡治肺癰必將此藥間而服之以護膈膜不致潰透心肺最為切當即礬蠟丸用蜜水送下肺痿寸口脈數而虛者肺痿也肺痿之證久咳不已汗下過度重亡津液大便如爛瓜如豕脂小便數而不渴渴者自愈欲飲者欲瘥此由肺多唾涎沫而無膿者肺痿也一論肺痿咳嗽其證辟辟燥咳胸中隱隱而痛脈弱無力薏苡仁散當歸白芍黃耆人參五味子麥門冬桑白皮黃芩百部薏苡仁上銼生薑煎服心漏一論胸前心口有孔常出血水者謂心漏也鹿子丸嫩鹿茸去毛酥炙微黃大附子炮去皮臍鹽花各等分上為末棗為丸空心酒送下每三十丸一論脅下生漏瘡如牛眼狀膿水不止用鹽少許安牛乳內後取牛耳中垢以敷瘡上即瘥如不用鹽即牛耳不癢難取其垢其諸漏瘡外用蒜切片放瘡上將艾灸之不過數次即愈一論漏瘡血水出不止蛇皮燒灰三錢五倍子龍骨各五錢川續斷五錢乳香三分上為末津唾調敷患處立止
