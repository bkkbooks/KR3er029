body:
  text: 卷四補益脈法氣虛脈細或緩而無力右手弱血虛脈大或數而無力左手弱陽虛脈遲陰虛脈弦真氣虛脈緊男子久疾氣口脈弱則死強則生女人久病人迎強則生弱則死夫人之正氣不足曰虛復縱嗜欲曰損致病之因有六焉一曰氣二曰血三曰精四曰神五曰胃氣六曰七情憂鬱六氣委和則各司其職曰無病失養違和陰陽偏勝剋剝則諸病生焉夫氣乃肺之主血乃肝藏之精乃腎之主神乃心之主飲食乃脾胃之主七情則七神主之凡應事太煩則傷神喋談朗誦飢而言多則傷氣縱欲想思則傷精久視鬱怒則傷肝飲食勞倦則傷脾久行傷筋久立傷骨久坐傷肉此五勞七傷之屬也其有稟賦素薄之人又兼斫喪太早者真陰根本受虧腎水一虧則火必勝勝則克肺金肺主皮毛則腠理不密鼻不聞香臭火炎痰升而致咳嗽甚致腎水枯竭肺子能令母虛是也金水既病則五臟六腑皆為賊此火乃內出之火宜補精血而火自退當服五仁斑龍膠丸培復精神之聖藥也夫鹿者得先天氣質之厚又食靈苗之精故曰壽牲角乃衆體之首一身精華所聚者也方名五仁者黃精參杞之類是也男女虛弱之病服之以復真元非此不能故斑龍膠丸為血肉上品之良劑善斡旋心腎資填五內益精神充氣血滋益於一身兼以參杞門冬鮮地骨皮等為佐配以八物湯如干咳嗽痰中見血者加以二門冬牡丹知母五葉制柏其卻病延年之功誠在斯矣世俗補陰丸以知母黃柏為主者但可施於壯盛人縱欲相火之多者可矣若虛損不足之症已成者及五十歲外人服之則元陽精氣何由而生又人輒以人參肺熱還傷肺之説將以人參為虛損人之忌物者蓋不究心於本草經耳參本味甘微寒善補五臟安精神健脾胃生津液況素問言虛者治以甘溫乃萬世不易之定論也彼何期後學泥書所注肺熱還傷肺之句惑焉則可説體壯人患內外感並積熱固結於膈宜清涼滌導言之若概以虛損虛火痰嗽及氣虛中滿者妄議人參為不可用是惑世人陷於不壽甚矣一論元氣虧損脾胃虛弱飲食少進或肢體腫脹或大便不實面瘦而黃或胸膈虛痞痰嗽吞酸等症四君子湯人參二錢白朮一錢五分白茯苓去皮二錢甘草炙一錢上銼一劑薑棗煎服加陳皮名異功散加半夏陳皮名六君子湯去茯苓加乾薑名理中湯一論心血虧損肝脾腎血虛發熱或晡熱甚頭目不清或煩躁不寐胸膈作脹或脅作痛等症四物湯當歸酒洗懷熟地黃各三錢白芍酒炒二錢川芎一錢上銼一劑水煎溫服一論氣血虛弱惡寒發熱煩躁作渴或不時寒熱眩暈昏瞶或大便不實小便赤淋或飲食少思或小腹痛等症宜用八物湯又名八珍湯即四君子湯合四物湯是也一論凡人元氣素弱或因起居失宜或因用心太過或因飲食勞倦致遺精白濁盜汗自汗或內熱晡熱潮熱發熱或口乾作渴喉痛舌裂或胸乳膨脹或脅肋作痛或頭頸時痛或眩暈眼花或心神不寧寤而不寐或小便赤淋莖中作痛或便溺餘瀝臍腹陰冷或形容不充肢體胃寒或鼻氣急促或更有一切熱症皆是無根虛火宜服後方十全大補湯人參二錢白朮一錢五分白茯苓三錢當歸二錢川芎一錢五分白芍一錢熟地黃三錢黃耆二錢肉桂五分麥門冬二錢五味子三分甘草炙八分上銼一劑生薑棗子水煎溫服一論年老房有少艾致頭痛發熱眩暈喘急痰涎壅塞小便頻數口乾引飲遍舌生刺縮斂如荔枝然下唇黑裂面目俱赤煩躁不寐或時喉間如煙火上衝急飲涼水少解已濱於死脈洪大而無倫且有力捫其身烙手此腎經虛火遊行於外投以十全大補湯加山茱澤瀉丹皮山藥麥門冬五味附子水煎服熟寐良久脈症各減三四再與八味丸服之而愈一論中氣不足肢體倦怠口乾發熱飲食無味飲食失節勞倦身熱脈洪大而虛或頭痛惡寒自汗或氣高而喘身熱而煩或脈微細軟弱自汗體倦少食或中氣虛弱而不能攝血或飲食勞倦而患瘧痢或瘧痢因脾胃虛而不能愈或元氣虛弱感冒風寒不勝發表宜用此代之或入房而後感冒或感冒而後入房亦用此湯急加附子或瀉痢腹痛急用附子理中湯此方能治一應諸症誤用攻擊之藥太過以致元氣脾胃虛損之極病已垂殆用之實有起死回生之效宜此補中益氣湯方見內傷一論經云壯水之主以制陽光夫人之生以腎為主人之病多由腎虛而致者此一方天一生水之劑無不可用若腎虛發熱作渴小便淋閉痰壅失音咳嗽吐血頭目眩暈眼花耳聾咽喉燥痛口舌瘡裂齒不堅固腰腿痿軟五臟虧損盜汗自汗便血諸血凡肝經不足之症尤當用之蓋水能生木故也此滋水化痰之聖藥血虛發熱之神劑也又治肝腎精血不足虛熱不能起床加大附子肉桂各二兩名八味丸又治腎陰虛弱津液不降敗濁為痰能治咳逆又治小便不禁收精氣之虛脫為養氣滋腎制火導水使機關利而脾土健實宜此六味地黃丸懷生地黃八兩要真懷慶生乾地黃酒洗淨入砂鍋內蒸黑為度如病胃弱畏滯再加生薑汁拌勻再蒸半晌取出用手掐斷入後藥同搗成餅今市賣熟地黃皆是用鐵鍋煮過則不可用者矣山茱萸酒蒸剝去核取肉曬乾四兩懷山藥四兩白茯苓去皮三兩牡丹皮去土三兩澤瀉去毛三兩上忌鐵器將藥精製稱為一處入石臼內搗成餅曬乾或微火焙乾或碓杵或石磨為細末煉熟蜜一斤加水一碗和為丸如梧桐子大曬乾用瓷器收貯每服三錢空心鹽湯酒任下忌三白腎水不能攝養脾土多吐痰唾薑湯下加麥冬五味名八仙長壽丸腰痛加鹿茸木瓜續斷消渴加五味子諸淋瀝倍茯苓澤瀉老人夜多小便加益智仁去澤瀉茯苓減半老人下元虛冷胞轉不得小便膨急切痛四五日困篤垂危者倍澤瀉遺精去澤瀉虛火耳聾加黃柏知母遠志石菖蒲小兒遺尿加破故紙益智仁人參肉桂小兒鶴節加鹿茸牛膝人參小兒解顱頭縫開解不合亦加人參小兒稟賦腎經虛熱耳內生瘡或肌肉消瘦骨節皆露名節疳加鹿茸牛膝各一兩五味子四兩若顱解不合牙齒不生眼睛不黑腿軟難行最宜此藥一論大補元氣培填虛損之聖藥也即六味地黃丸依本方再加五味是也五子益腎養心丸甘枸杞子四兩柏子仁二兩覆盆子二兩楮實子炒二兩沙苑蒺藜子麩炒二兩上共十一味為細末用蜜八兩入斑龍膠先煉次入浮小麥粉四兩芡實粉四兩水調亦入膠蜜同煉熟和藥再杵千餘下為丸如梧桐子大每日服百丸淡鹽湯送下一論腎虛不能制火六味地黃丸主之腎非獨水也命門之火併焉腎不虛則水足以制火腎水虛則火無所制而熱症生矣名曰陰虛火動河間氏所謂腎虛則熱是也令人足心熱陰股熱腰脊痛率是此症老人得之為順少年得之為逆乃咳血之漸也地黃茱萸味厚者也經曰味厚為陰中之陰故能滋少陰補腎水澤瀉味甘鹹氣寒甘從土化咸從水化寒從陰化故能入水藏而瀉水中之火丹皮氣寒味苦辛寒能勝熱苦能入血辛能生水故能益少陰平虛熱山藥茯苓味甘者也甘從土化土能防水故用之以制水藏之邪且益脾胃而培萬物之母也一論腎虛移熱於肺咳嗽者六味地黃丸主之有足心熱內股熱腰痛兩尺脈虛大者病原於腎虛也地黃茱萸味厚者也味厚為陰中之陰故能益腎腎者水藏虛則水邪歸之故用山藥茯苓以利水邪水邪歸之則生濕熱故用澤瀉丹皮以導坎中之熱滋其陰血去其邪熱則精日生而腎不虛病根既去咳嗽自寧矣一論下消者煩渴引飲小便如膏六味地黃丸主之先有消渴善飲而後小便如膏者名曰下消懼其燥熱漸深將無水矣故用此方以救腎水地黃茱萸質潤味厚為陰中之陰故可以滋少陰之腎水丹皮澤瀉取其鹹寒能制陽光山藥茯苓取其甘淡能療消渴一論渴而未消者用八味丸主之此即六味地黃丸加附子肉桂是也渴而未消謂其人多渴喜得茶飲不若消渴之求飲無厭也此為心腎不交水不足以濟火故令液亡口乾乃是陰無陽而不升陽無陰而不降水下火上不相既濟耳故用附子肉桂之辛熱壯其少火用六味丸益其真陰真陰益則陽可降少火壯則陰自升故灶底加薪枯籠蒸溽稿禾得雨生意維新惟明者知之昧者鮮不以為迂也一論腎間水火既虛小便不調者八味丸主之腎主水火主二便司開合腎間之水竭則火獨治能合而不能開令人病小便不出腎間之火息則水獨治能開不能合令人小便不禁是方也以肉桂附子之溫熱益其火以地黃茱萸濡潤壯其水火欲實丹皮澤瀉之鹹酸者可以收而瀉之水欲實則茯苓山藥之甘淡者可以制而滲之水火既濟則開合治矣一論腎間水火俱虛者八味丸主之君子觀象於坎而知腎具水火之道焉故曰七節之旁中有小心小心少火也又曰腎有兩枚左為腎右為命門命門相火也相火即少火耳夫一陽居於二陰為坎水火併而為腎此人生與天地相似也今人入房甚而陽事愈舉者陰虛火動也陽事先痿者命門火衰也真水竭則隆冬不寒真火息則盛夏不熱故人樂有善藥餌焉是方也地黃茱萸丹皮澤瀉山藥茯苓六味丸也所以益少陰腎水附桂辛熱物也所以益命門相火水火得其養則二腎復其天矣一論陰虛於下令人嘔甚者六味丸加鹽湯送下諸陽氣浮無所依從故嘔咳氣上喘此陰虛於下而令孤陽上浮耳是方也地黃茱萸質潤味厚可使滋陰丹皮澤瀉氣味鹹寒可制陽光山藥茯苓味甘而淡可使調下一論腎氣熱則腰脊不舉骨枯而髓減發為骨痿宜六味丸加黃柏知母主之腎者水藏無水則火獨治故令腎熱腎主督脈督脈者行於脊裡腎壞則督脈虛故令腰脊不舉骨枯髓減者枯涸之極也腎主骨故曰骨痿是方也地黃茱萸味厚而能生陰知柏苦寒能瀉火澤瀉丹皮能去坎中之熱山藥茯苓能制腎間之邪王冰曰壯水之主以制陽光此方主之一論入房太甚宗筋縱弛發為陰痿八味丸主之腎坎象也一陽居於二陰為坎腎中有命門之火焉凡人入房甚而陽事作強不已者水衰而火獨治也陽事柔痿不舉者水衰而火亦敗也丹溪曰天非此火不足以生萬物人非此火不能以有生奈之何而可以無火乎是方也桂附味厚而辛熱味厚則能入陰辛熱則能益火故能入少陰而益命門之火地黃茱萸味厚而質潤味厚則能養陰質潤則能壯水故能滋少陰而壯坎中之水火欲實則丹皮澤瀉之酸鹹可以引而瀉之水欲實則山藥茯苓之甘淡可以滲而制之水火得其養則腎宮不弱命門不敗而作強之官得其職矣一論腎勞背難俯仰小便不利有餘瀝囊濕生瘡小腹裡急小便赤黃者六味地黃丸加黃柏知母主之腎者藏精之臟也若人強力入房以竭其精積久則成腎勞腎主精精主封填骨髓腎精以入房而竭則骨髓已枯矣故背難俯仰前陰者腎之竅腎氣足則能管攝小便而溲溺惟宜腎氣怯則欲便而不利既便而有餘瀝是失開合之常度也腎者水藏傳化失宜則水氣留之而生濕熱水氣留之故令囊濕生瘡也小腹裡急者此乃是真水枯而真火無制真水枯則命門之相火無所畏真火無制故灼膀胱小腹之筋膜而作裡急也便赤黃亦皆火之所為地黃茱萸味厚者也味厚而為陰中之陰故足以補腎間之陰血山藥茯苓甘淡者也甘能制濕淡能滲濕故能去腎間之陰濕澤瀉丹皮鹹寒者也咸能潤下寒能勝熱故足以去腎間之濕熱黃柏知母苦潤者也潤能滋陰苦能濟火故足伏龍雷之相火夫去其灼陰之火滋其濟火之水則腎間之精血自生矣一論氣短有痰小便赤澀足根作痛尺脈浮大按之則澀此腎虛而有痰飲也用四物送六味丸而已一論六味地黃丸專補左尺腎水之藥八味丸既補左尺腎水兼補右腎相火之藥少年水虧火旺宜服六味丸老年水火俱虧宜服八味丸況老年腎臟真水既虛邪水乘之而為濕熱以作腰痛足痿痰唾消渴小便不禁淋閉等症非附桂之溫散而能治之乎一論八味丸治下元虛憊心火上炎渴欲飲水或腎水不能攝養多吐痰唾及男子消渴小便反多婦人轉胞小便不通一養生書曰立秋後宜服張仲景八味丸治男子虛羸百病衆所不療者一論命門火衰不能生土以至脾胃虛寒而患流注鶴膝等症不能消潰收斂或飲食少思或食而不化或臍腹疼痛夜多漩溺經云益火之源以消陰翳即此方也又治婦人脬轉小便不通殊效八味丸懷生地黃用酒蒸黑八兩山茱萸肉酒蒸去核山藥各四兩白茯苓去皮牡丹皮各三兩肉桂且三分厚者去皮方能補腎引虛火歸源大附子一兩半重者切四片童便浸火焙乾各二兩澤瀉三兩上忌鐵器共為細末煉蜜為丸如梧桐子大每服八十丸空心滾湯送下一治腎臟虛弱面色黧黑足冷足腫耳鳴耳聾肢體羸瘦足膝軟弱小便不利或多或少腰脊疼痛用八味丸加鹿茸五味子名十補丸一論凡有人不耐勞不能食冷或飲食脹大便不實或口苦常破如瘡服涼藥愈甚或盜汗小便頻數腰腿無力或咽津或呼吸覺冷入腹或陰囊濕癢或手足覺冷或面白或黧黑或畏寒短氣以上諸症皆屬虛甚八味丸主之此丸用附子有功夫附子一物大辛熱除三焦痼冷六腑沉寒氣味徑悍有回陽之功命門火衰非此不補附雖有毒但炮製如法或用防風甘草同炒或童便久浸以去其毒復將地黃等味同用以制其熱潤其燥緩其急假其克捷之功而駕馭剽悍之勢則雖久服亦有功而無害惟在善用之而已若執泥有毒果有沉寒痼冷之疾棄而不用其能療乎觀東垣八味丸論則昭然矣一論諸虛百損五勞七傷滋腎水降心火補脾土添精補髓益氣和血壯筋骨潤肌膚聰明耳目開心定智強陰壯陽延年益壽此藥性味溫而不熱清而不寒久服則坎離既濟陰陽協和火不炎而神自清水不滲而精自固平補之聖藥也加減神仙既濟丸尚書劉春罔方楝參去蘆二兩嫩鹿茸酥炙二兩肉蓯蓉酒洗三兩枸杞子酒洗二兩茱萸酒蒸去核取肉二兩懷山藥二兩遼五味子二兩石菖蒲去毛二兩嫩黃耆蜜炒二兩川巴戟水泡去心二兩川黃柏酒炒二兩知母去毛二兩柏子仁二兩懷熟地黃酒蒸二兩菟絲子酒蒸搗餅曬乾二兩天門冬去心二兩當歸酒洗二兩麥門冬去心二兩遠志甘草水泡去心二兩小茴香鹽酒炒二兩白茯神去皮木二兩懷生地黃酒洗二兩川杜仲去皮酒炒二兩川牛膝去蘆酒洗二兩上為細末煉蜜和熟棗為丸如梧桐子大每服百丸空心鹽湯送下或酒任下忌三白一論此方主滋養肝腎補心血利足膝實肌膚悅顏色真衛生之良藥也歸茸丸懷熟地黃酒蒸四兩懷山藥酒浸二兩茱萸酒蒸去核二兩白茯苓去皮二兩牡丹皮一兩懷牛膝去蘆酒洗二兩當歸酒洗二兩大附子炮去皮臍二兩嫩鹿茸酥炙四兩澤瀉一兩遼五味子四兩官桂二兩上為細末鹿角半斤酒打稀糊為丸如梧桐子大每服五十丸空心鹽湯溫酒送下一論五仁斑龍膠專治真陽元精內乏以致胃氣弱下焦虛憊及夢泄自汗頭眩四肢無力此膠能生精養血益智寧神順暢三焦培填五臟補腎精美顏色卻病延年乃虛損中之聖藥也五仁斑龍膠法鹿角連腦蓋骨者佳自解者不用去蓋用生淨五十兩截作三寸段新汲淡泉井水浸洗去垢吹去角內血腥穢水盡同人參五兩天門冬去心皮五兩麥門冬去心五兩甘枸杞子去蒂八兩川牛膝去蘆五兩五品藥以角入淨壇內注水至壇肩用筍殼油紙封固其口大鍋內注水用文武火密煮三晝夜足時常加入沸湯於鍋內以補乾耗取出濾去渣將汁復入闊口砂鍋內煎熬成膠聽用和藥末其角去外粗皮淨者為細末名之曰鹿角霜也仙傳斑龍丸滋補中之聖藥鹿角霜鹿角膠柏子仁另研菟絲子酒炒懷生地黃酒蒸黑各十兩上為末先將鹿角膠瓷器內慢火化開卻將膠酒煮糊和藥搗二千下為丸如梧桐子大每服五十丸淡鹽湯下酒亦可長生固本方人參甘枸杞子懷山藥遼五味子天門冬水潤去心麥門冬水潤去心懷生地黃懷熟地黃各二兩上銼片用生絹盛之煮酒三十斤將箬封壇口放鍋內水煮壇水不過壇口以米百粒放箬葉上候氣熏蒸米熟住火埋土出火毒飲之此藥甚平和治勞疾補虛弱烏鬚髮忌蘿蔔蔥蒜食之與地黃相反令人易白髮肉面不忌亦忌蒙豆飯一論人乳能益心氣補腦髓治消渴勞怯及風火症老人尤宜可揀年幼壯盛潔淨無病婦人之乳飲之一論治諸虛百損五勞七傷用人乳兩盞好酒半盞入銀鏇或錫鏃器內蕩滾每五更服一論主壯元陽益真氣助胃潤肺宜用補精膏牛髓搗爛去粗胡桃肉去皮杏仁去皮人參各四兩山藥薑汁拌蒸熟去皮八兩紅棗去皮核半斤上將杏仁胡桃肉棗子山藥四味搗為膏用蜜一斤煉去白沫與牛髓同和勻入瓷罐內重湯煮一日空心以一匙用酒或白湯化服下一論治傷寒汗吐下後及行倒倉法吐下後與諸症用攻擊之過以至元氣耗憊用此補之韓飛霞曰人參煉膏回元氣於無何有之鄉王道也又肺虛嗽亦有人參膏補之如肺虛兼有火邪者人參膏與天門冬膏對服之最妙人參膏人參去蘆不拘多少切片入砂鍋內放淨水文武火熬幹一半傾入瓶內將渣又煎又如前並之於瓶凡熬三次驗參渣嚼無味乃止卻將三次所煎之汁濾去渣仍入砂鍋內文武火慢慢熬成膏如人參一斤只好熬成一碗足矣及成膏入碗隔宿定有清水浮上亦宜去之只留稠膏每服二三匙清米湯漱下白朮膏白朮要好雪白者去蘆油不用淨一斤入砂鍋內水熬三次取汁濾去渣再入砂鍋內文武火慢慢熬至三碗入蜜四兩又熬成膏入瓷罐收貯封固埋土七日然後取之每服四五匙不拘時米湯調服善補脾胃進飲食生肌肉除濕化痰止泄瀉茯苓膏大白茯苓堅硬者不拘多少去黑皮為細末用水漂去浮者漂時用白滾水如和麵之狀令藥濕方入水漂澄取下沉者用淨布扭去水曬乾復為細末再漂再曬反復三次再為細末每末一斤拌好白蜜二斤令勻貯長瓷罐內籜皮封口置鍋內桑柴火懸胎煮盡一日抵晚連瓶坐埋五穀內次早倒出以舊在上者裝瓶下舊在下者裝瓶上再煮再入五穀內反復三日夜次早取出埋淨土定七日去火毒每早晚用三四匙吃嚼少許將白湯送下補虛弱治痰火殊效延壽丹用白茯苓十斤淨鍋內煮一夜曬一日去皮切片調真蜂蜜二斤蒸三炷香曬乾再加蜂蜜再蒸再曬如是三次為細末煉蜜為丸如梧桐子大每日三四十丸溫湯送下久服大補殊效地黃膏真懷慶大生地黃一斤酒洗令淨加麥門冬去心四兩貯砂鍋內入水熬幹一半傾入瓷罐內又入水又熬如是三次將汁濾去渣用文武火慢慢熬至三碗入蜜四兩又熬至膏入瓷罐內封固入土埋去火毒取出每服二三匙空心白湯點服能補腎水真陰填髓固精生血烏髮枸杞膏甘枸杞子一斤放砂罐內入水煎十餘沸用細絹羅濾過將渣擠出汁淨如前再入水熬濾取汁三次去渣不用將汁再濾入砂罐內慢火再熬成膏入瓷器內不可泄氣不論男婦早晚用酒調服能生精補元氣益榮衛生血悅顏色大補諸虛百損延年益壽一論此膏能鎮玉池存精固漏通二十四道血脈鎖三十六道骨節主一身之毛竅貼之血脈流暢龜健不衰精髓充盈養精聚神壯陽助氣固下元氣透三關乃通行之道老人貼之夜不小便大人精不泄補益虛損延年益壽至珍至寶又治男子下元虛冷小腸疝氣痞疾單腹脹滿並一切腰腿骨節疼痛半身不遂貼三日神效婦人子宮久冷赤白帶下久不坐胎産後戰腸風貼之三日神效千金封臍膏內閣祕傳天門冬生地黃熟地黃大鱉子大附子蛇床子麥門冬紫梢花杏仁遠志牛膝肉蓯蓉官桂肉豆蔻菟絲子虎骨鹿茸各二錢上為末入油一斤四兩文武火熬黑色去渣澄清入黃丹半斤水飛過鬆香四兩熬用槐柳條攪滴水不散為度再下硫黃雄黃硃砂赤石脂龍骨各三錢為末入內除此不用見火將藥微冷定再下膃肭臍一付阿芙蓉蟾酥各三錢麝香一錢不見火陽起石沉木香各三錢俱不見火上為細末入內待藥冷下黃蠟六錢貯瓷器盛之封口放水中浸三日去火毒取出攤緞子上或紅絹上亦可貼之六十日方無力再換又方加乳香沒藥母丁香此方其效如神太和丸飲食勞役所關非細飲食失節損傷脾胃勞役過度耗散元氣脾胃損傷元氣衰竭乃成內傷諸病難治保合太和預防無慮大補諸症專進飲食清痰降火解鬱消滯養氣健脾王道之劑不問老幼男女通治白朮去油土炒四兩白茯苓去皮二兩懷山藥二兩蓮肉去心皮二兩當歸身酒炒四兩白芍藥酒炒二兩陳皮一兩川黃連薑炒一兩山楂去子一兩枳實麵炒一兩半夏湯泡切片薑炒一兩神麯炒一兩香附用童便炒一兩木香五錢龍眼肉一兩炙甘草五錢人參五錢白豆蔻去殼五錢嫩黃耆蜜水炒用一兩上為細末荷葉如掌大者煎湯下陳倉米半鍾煮稀粥和為丸如梧桐子大每服百丸食後臨臥米湯送下年幼壯者去參耆坎離丸治燈窗讀書辛苦學問易忘精神昏倦妙不可言思慮房欲人為所纍思慮過度心血耗散房欲失節腎水枯瘁腎水一虛心火即熾釀成勞瘵雜症難治防其未然坎離既濟補髓添精調榮養衛聰耳明目定神安志滋陰降火百病皆治日誦千言不忘所記龍骨火煅五錢遠志甘草水泡去骨一兩白茯神去皮末一兩石菖蒲去毛五錢龜甲炙酥五錢酸棗仁炒一兩當歸身酒洗一兩人參五錢麥門冬水洗去心用一兩天門冬水淨去心一兩生地黃酒洗二兩熟地黃酒蒸二兩山茱萸酒蒸去核一兩川黃柏去皮酒炒一兩五味子一兩柏子仁一兩山藥一兩甘枸杞子一兩知母去毛酒炒一兩上忌鐵器精製合為一處石臼內搗成餅曬乾磨為細末煉蜜滴水成珠每蜜一斤加水一碗調和前藥為丸如梧桐子大每服三錢清晨空心鹽湯下或酒亦可節欲忌三月長春不老仙丹治諸虛百損五勞七傷滋腎水養心血添精髓壯筋骨扶元陽潤肌膚聰耳明目寧心益智烏須黑髮固齒堅牙延年益壽壯陽種子卻病輕身仙茅酒浸洗四兩山茱萸酒蒸去核二兩白何首烏同赤首烏制各四兩川萆薢酒洗二兩赤何首烏米泔浸洗捶碎如棗核大入黑豆同蒸三日極黑補骨脂酒炒二兩黃精酒蒸四兩大懷生地黃酒洗淨掐斷曬乾二兩大懷熟地黃用生地黃酒浸洗碗盛放砂鍋內蒸一日極黑掐斷曬乾二兩巨勝子二兩懷山藥二兩甘枸杞子二兩天門冬水潤去心二兩麥門冬水潤去心二兩白茯苓去皮人乳浸曬三次二兩遼五味子二兩小茴香鹽酒炒二兩覆盆子二兩揀參二兩嫩鹿茸酥炙二兩懷牛膝去蘆酒洗二兩柏子仁二兩青鹽二兩川杜仲去皮酒炒二兩當歸身酒洗二兩川巴戟水泡去心一兩菟絲子酒洗淨入砂鍋酒煮爛搗成餅曬乾二兩肉蓯蓉酒洗二兩川椒去目微炒一兩遠志甘草水泡去心二兩鎖陽炙酥三兩陰虛火動素有熱者加川黃柏酒炒二兩知母酒炒二兩紫河車一具用壯盛婦人首生男胎先將米泔水洗淨次入長流水中再洗新瓦上慢火焙乾上忌鐵器精製稱和一處石臼內搗成餅曬乾磨為細末用煉蜜為丸如梧桐子大每服三錢空心酒下忌三白如虛甚用後八仙斑龍膠化為丸乃補益妙方也八仙斑龍膠人參天門冬去心懷生地黃酒洗懷熟地黃酒蒸麥門冬去心懷牛膝去蘆用各五兩甘枸杞子白何首烏赤何首烏以上俱銼咀片各八兩老鹿茸燎去毛截二寸長劈兩片水洗淨二十兩上將藥均入大砂鍋內熬汁五次將渣濾淨再熬至五碗則成膠矣每服銀茶匙二三匙好酒調化空心服或酒化膠為前丸尤佳萬病無憂酒常服能除百病理風濕烏髭鬚清心明目利腰腎健腿膝補精髓療跌撲損傷筋骨和五臟平六腑快脾胃進飲食補虛怯養氣血當歸五錢川芎五錢白芷五錢白芍一兩防風七錢五分羌活二兩荊芥穗五錢地骨皮五錢牛膝五錢杜仲炒一兩五錢木瓜五錢大茴香五錢破故紙一兩五加皮一兩五錢威靈仙一兩鉤藤一兩石楠藤一兩烏藥五錢紫金皮一兩五錢自然銅火煅木香乳香沒藥甘草炙各五錢雄黑豆二兩上共二十五味調勻用繒布為囊盛之無灰酒一大壇入藥在內春秋五日夏三日冬十日後取酒溫飲之或晨昏午後隨量飲之能去風活血養神理氣其味佳如飲一半再加好酒浸飲妙延壽甕頭春又名神仙延壽酒周藩宗正西亭傳仙方也天門冬去心一兩破故紙一兩肉蓯蓉麩炒一兩粉草一兩牛膝去蘆一兩杜仲麩炒一兩大附子水煮五錢川椒去目一兩以上八味為末入曲內同和糜淫羊藿一斤米泔水浸仙靈脾俗名羯羊脂一斤拌淫羊藿同炒黑色當歸四兩頭紅花一斤搗爛曬乾白芍一兩生地黃二兩蒼朮米泔水浸炒四兩熟地黃二兩白茯苓四兩甘菊花一兩五加皮四兩地骨皮四兩以上十二味銼咀片絹袋盛貯鋪缸內縮砂蜜五錢白豆蔻五錢木香五錢丁香五錢以上四味後用煮酒為末用上藥共二十四味共五斤四兩用糯米二斗淘淨浸一日夜又淘一次蒸作糜取出候冷用細面末四斤同天門冬等八味調勻卻將淫羊藿等十二味貯於粗絹袋置缸底將前糜拍實於其上然後投上品燒酒四十斤封固七日榨出澄清方入壇加砂仁等四味固封重湯煮三炷香埋土中三日能出火毒每日量飲數杯一七日百竅通暢渾身壯熱丹田微癢痿陽立興切忌醉酒飽食行房一論長春酒大補氣血壯筋骨和脾胃寬胸膈進飲食祛痰涎行滯氣消酒食除寒濕等症長春酒方尚書劉三川傳黃耆蜜炙人參白朮去蘆白茯苓去皮當歸川芎白芍熟地黃官桂橘紅南星半夏薑炒蒼朮米泔水浸厚朴薑炒砂仁草果仁青皮去穰檳榔丁香木香沉香五味子藿香木瓜石斛杜仲白蔻殼薏苡仁枇杷葉桑白皮蜜炙神麯炒麥芽炒甘草炙上各件制了淨稱三錢等分為二十包每用一包將生絹袋盛之浸酒一斗春七夏三秋五冬十日每日清晨一杯甚為有效呼吸靜功妙訣人生以氣為本以息為元以心為根以腎為蒂天地相去八萬四千里人心腎相去八寸四分此腎是內腎臍下一寸三分是也中有一脈以通元息之浮沉息總百脈一呼則百脈皆開一吸則百脈皆合天地化工流行亦不出呼吸二字人呼吸常在心腎之間則血氣自順元氣自固七情不熾百骸之病自消矣每子午卯酉時於靜室中厚褥鋪於榻上盤腳跗坐瞑目不視以綿塞耳心絶念慮以意隨呼吸一往一來上下於心腎之間勿急勿徐任其自然坐一炷香後覺得口鼻之氣不粗漸漸和柔又一炷香後覺得口鼻之氣似無出入然後緩緩伸足開目去耳塞下榻行數步偃臥榻上少睡片時起來啜粥半碗不可作勞惱怒以損靜功每日依法行之兩月之後自見功效不鍊金丹且吞玉液呼出臟腑之毒吸採天地之清太上玉軸六字氣訣道藏有玉軸經言五臟六腑之氣因五味熏灼不和又六欲七情積久生病內傷臟腑外攻九竅以致百骸受病輕則痼癖甚則盲廢又重則傷亡故以六字氣訣治五臟六腑之病其法以呼字而自瀉去臟腑之毒氣以吸字而自採天地之清氣以補之當日小驗旬日大驗年後萬病不生延年益壽衛生之寶非人勿傳呼有六曰呵呼呬噓嘻吹也吸則一而已呼有六者以呵字治心氣以呼字治脾氣以呬字治肺氣以噓字治肝氣以嘻字治膽氣以吹字治腎氣此六字氣訣分主五臟六腑也凡天地之氣目子至巳為六陽時自午至亥為六陰時如陽時則對東方勿盡閉窗戶然忌風入解帶正坐叩齒三十六以定神先攪口中濁津漱煉二三百下候口中成清水即低頭向左而咽之以心送下候汩汩至腹中低頭開口先念呵字以吐心中毒氣念時耳不得聞呵字聲聞即氣粗乃損心氣也念畢仰頭閉口以鼻徐徐吸天地之清氣以補心氣吸時耳亦不得聞吸氣聞即氣粗亦損心氣也但呵時令短吸時令長即吐少納多吸訖即低頭念呵字耳復不得聞呵字聲呵訖又仰頭以鼻徐徐吸清氣以補心亦不得聞吸聲如此吸者六次即心之毒氣漸散又將天地之清氣補之心之元氣亦漸復矣再又依此式念呼字耳亦不得聞呼聲如此呼者六次所以散脾毒而補脾元也次又念呬字以瀉肺毒以吸而補肺元亦須六次次念噓字以瀉肝毒以吸而補肝元嘻以瀉膽毒吸以補膽元吹以瀉腎毒吸以補腎元如此者並各六次是謂小周小周者六六三十六也三十六而六氣遍臟腑之毒氣漸消病根漸除神氣漸完矣次看是何臟腑受病如眼病即又念噓嘻二字各十八遍仍每次以吸補之總之三十六訖是為中周中周者第二次三十六通為七十二也次又再依前呵呼呬噓嘻吹六字法各為六次並須呼以瀉之吸以補之愈當精虔不可怠廢此第三次三十六也是為大周總之為一百單八次是為百八訣也午時屬陰時有病即對南方為之南方屬火所以卻陰毒也然又不若子後巳前面東之為陽時也如早起床上面東將六字各為六次是為小周亦可治眼病也凡眼中諸症惟此訣能去之他症亦然如病重者每字作五十次凡三百而六腑周矣乃漱煉咽液叩齒如初如此者三即通為九百次無病不愈孫真人云天陰霧惡風猛寒勿取氣也但閉之扶桑至寶丹扶桑扶桑高拂云海東日出氣氤氳滄海變田幾億載此樹移根今尚存結子如丹忽如漆緑葉英英翠可捫濯磨入鼎即靈藥芝木區區未許群葉兮葉兮願玉汝緑陰裡面有桃源胡僧曰蠶食吐絲結成錦繡人食生脂延年除咎蓋嫩桑之葉性本和平不冷不熱生於效野之外懼為蛇蠍所沿須擇家園中嫩而存樹者採數十斤洗以長流之水摘去其蒂曝於日中以干為度復取巨勝子為臣煉蜜為丸如梧桐子大日服二次約可百丸白開水下三月之後體生軫粟此是藥力所行慎勿驚畏旋則遍體光潔如凝脂然服至半年之後精力轉生諸病不作久服不已自登上壽老人服之步健眼明又能消痰生津補髓添精功效不細老人一論年高之人陰虛筋骨柔弱無力面無光澤或暗淡食少痰多或喘或咳或便溺數澀陽痿足膝無力者並治形體瘦弱無力多因腎氣久虛憔悴盜汗發熱作渴並皆治之八仙長壽丸大懷生地黃酒拌入砂鍋內蒸一日黑掐斷慢火焙乾八兩山茱萸酒拌蒸去核四兩白茯神去皮木筋膜牡丹皮去骨各三兩遼五味子去梗二兩麥門冬水潤去心二兩乾山藥益智仁去殼鹽水炒各二兩上忌鐵器為細末煉蜜為丸如梧桐子大空心溫酒調下或炒鹽湯調服夏秋滾湯調服腰痛加木瓜續斷鹿茸當歸消渴加五味子麥門冬各二兩老人下元冷胞轉不得小便膨急切痛四五日困篤欲死者用澤瀉去益智諸淋瀝數起不通倍茯苓用澤瀉去益智夜多小便加益智一兩減茯苓一半治虛火牙齒痛浮治耳聵及腎虛耳鳴另用全蠍四十九枚炒微黃色為末每服三錢酒調送下早晨空心服一論此膏填精補髓堅骨強筋萬神具足五臟盈溢髓實血滿神識高邁夜無夢想瓊玉膏人參揀好者去蘆十二兩真懷生地黃十斤洗淨搗取其汁白茯苓堅白者去皮及筋膜二十四兩最佳白沙蜜五斤上將參苓為細末忌鐵器蜜用生絹濾過地黃取自然汁去渣同藥一處拌和勻入瓷器內封固淨紙二十餘重密封入重湯內煮用桑柴火煮六日如連夜火即三日夜取出用蠟紙數重包瓶口入井內去火毒一伏時久再入舊湯內煮一日出水氣取三匙作三盞每晨以二匙溫酒調服不飲者白湯化下臞仙曰豫所制此方加沉香琥珀各五錢其功效異於世傳之方乾咳嗽者有聲無痰者也火乘於肺喉嚨隱隱而癢故令人咳病原於脾者有痰病不由脾故無痰易曰燥萬物者莫熯乎火相火一熯則五液皆涸此乾咳嗽之由也生地黃能滋陰降火蜜能潤燥生津損其肺者益其氣故用人參虛則補其母故用茯苓又地黃白蜜皆潤燥而人參茯苓甘而屬土用之以佐二物此水位之下土氣乘之之義乃立方之道也一論陽春白雪糕方見內傷凡年老之人當以養元氣健脾胃為主每日三餐不可缺此糕也王道之品最益老人保生雜志彭祖曰美色妖麗嬌姿盈房以致虛損之禍知此可以長生陰符經云淫聲美色破骨之斧鋸也世之人若不能秉靈燭以照迷津仗慧劍以割愛欲則流浪生死之海害生於恩也書曰年高之人血氣既弱陽事輒盛必慎而抑之不可縱心恣意一度一泄一度火滅一度增油若不制而縱欲火將滅更去其油秦醫和視晉侯之疾曰是謂近女室非鬼非食惑於喪志公曰女不可近乎曰節之靈樞曰元氣者腎間動氣也右腎為命門精神之所合愛惜保重則榮衛周流神氣充足書曰恣意極精不知惜虛損身也譬枯朽之木遇風則折將潰之岸值水先頽苟能愛惜節情亦長壽也抱朴子曰才不逮強思之力不勝強舉之傷也甚矣強之一字真為戕生伐壽之本夫養生賴乎飲食然使醉而強酒飽而強食未有不傷生者況欲乎欲而強元精去元神離元氣散戒之書曰飲食過房勞損血氣流溢滲入大腸時便清血腹痛病名腸癖又曰大醉入房氣竭肝傷男人則精液衰少陽痿不舉女子則月事衰微惡血淹留生惡瘡又曰忿怒中盡力行房事精虛氣竭發為癰疽恐懼中入房陰陽偏虛自汗盜汗積而成勞遠行疲乏入房為五勞月事未絶而交接生駁又冷氣入內身痿面黃不産一金瘡未瘥而交會動於氣血故令金瘡敗壞忍小便而入房者得淋病莖中疼痛面失血色致胞轉臍下急痛死書云時疾未復犯房者舌出數寸而死痼冷丹溪曰人之一身貴乎陰陽升降和平無偏若有偏勝即為之患痼冷之症由人之一身真陽耗散脾胃虛弱加食冷物有傷脾胃固結其寒於臟腑不散以至手足厥冷畏冷憎寒飲食不化嘔吐涎沫或大腸洞泄或小便頻數治法宜暖下元兼理脾胃又有肺虛而畏寒者令人咳嗽尤當詳而治之一論陰症身靜而重言語無聲氣少難以喘息目睛了了口鼻冷氣水漿不入大小便不禁面上惡寒有如刀刮先用蔥尉法方見中寒次用理中湯加味理中湯大附子麵包煨去皮臍人參白朮去蘆炒乾薑炒肉桂陳皮白茯苓去皮各等分甘草減半炙上銼生薑三片棗兩枚水煎熱服一論陽症歸陰陰囊縮入手足厥冷腹痛脹滿冷汗大出脈或洪弦固陽湯黃耆蜜水炒人參各一錢白朮去蘆炒二兩白茯苓去皮二錢乾薑一錢炒白薑一錢炒良薑一錢腹痛倍用厚朴薑汁炒一錢大附子泡一錢上銼一劑水煎熱服一脫陽症多因大吐大瀉之後四肢逆冷元氣不接不省人事或傷寒新瘥誤與婦人交小腹緊痛外腎縮入面黑氣喘冷汗自出須臾不救先以蔥白炒令熱尉臍下次用附子兩個去皮熏一兩正白朮去蘆炒去油乾薑炮各五錢木香二錢五分上銼每劑五兩水煎服須臾再一服一方用蔥白連須六七根研爛熱酒調服外用炒鹽尉臍下氣海勿令氣冷一治陰症手足厥冷急用三仙散大附子炮去皮臍官桂乾薑炒各等分上共為細末每服三錢滾酒調服即愈一論陰症腹痛身冷宜回陽散硫黃四分胡椒六分上為細末每服三分燒酒調服一治陰症祕方用硫黃化開傾入井水內取出為末飯為丸如梧桐子大每服三錢溫酒調下一治陰症用魚鰾一個燒存性胡椒四十九粒為末熱酒調下又方用黑豆不拘多少鍋內炒熟乘熱以好酒淬之就以蓋住勿令泄氣候溫飲酒大效一治陰症腹痛手足厥冷陰縮用朝腦二三錢滾酒調服用枯白礬以水調塗兩手相合於大腿內夾之良久汗出即愈一治陰毒手足厥冷脈息沉細頭痛腰重兼治陰毒咳逆等疾川烏頭乾薑等分為粗散炒令轉色候冷再搗為細末每服一錢水一盞鹽一撮煎取半盞溫服一治陰症用大艾炷灸臍中預將蒜搗汁擦臍上後放艾多灸之其臍上下左右各開一寸用小艾炷灸之五七炷為度如玉莖縮入於內速令人捉定急將艾丸如緑豆大放在馬口灸二壯其莖即出仍用加味理中湯主之一論陰症小便縮入腹內用極肥壯母雞一隻快刀將脊上急急劈破用手扯開連毛帶屎合放病人肚臍上令人用足跴雞上須臾熱透小便即出一論因女色成陰症者宜之用回陽膏白礬煮三錢黃丹二錢乾薑五錢母丁香十個胡椒十五六枚上為末用醋調得所以男左女右握藥搭臍上蓋被出汗即愈一治陰症最效方芥菜子七錢乾薑三錢上為末水調作餅貼臍上手帕縛之放些鹽以尉斗尉之數次汗出為度又將病人小便攀陰莖往上盡頭處用艾炷灸七壯神效一治陰症不能服藥不得汗出者回陽散丁香乾薑乳香沒藥胡椒各三錢上為末每用三錢以唾調塗在兩手心安於兩膝間以手帕縛定用綿被蓋之其汗自出一緊陰及大小便不通小芥菜子半碗為細末黃丹一撮臘醋燒滾調糊攤臍上以紙蓋住熱如火不妨以一炷香為度將藥去了用青布沾水涼之如忍得熱不用水更妙一緊陰用胡椒乾薑各二錢為細末唾津調塗自己手心綿紙蓋按陰戶上側臥效斑疹脈多沉伏或細而散或絶無滑伯仁曰脈者血之波瀾故發斑者血散於肌膚故脈伏脈陽浮而數陰實而大火盛在表故陽脈浮數下焦實熱故陰脈實大夫斑有色點而無頭粒者是也疹浮小有頭粒者隨出隨收收則又出者是也非若斑之無頭粒者當明辨之若斑發赤紅為胃熱若紫而不赤者為熱甚如紫黑者為胃爛故赤者半生半死黑色者九死一生大抵鮮紅起發稀朗者吉紫黑者難治雜黑斑爛者死也凡斑欲出未出之際宜先以升麻湯透其毒脈虛加人參食少而大便不實加白朮斑已出不宜再發者斑不可汗斑爛者不宜下如脈洪數熱甚煩渴者人參化斑湯一論陽毒赤斑口出狂言吐膿血乃熱毒蘊於胸中而發斑宜以升麻湯升麻二錢犀牛角屑射干人參生甘草各一錢上銼一劑水煎溫服一論只因內熱發出皮膚如蚊蟲之齧不宜汗下但清熱降火涼血氣為要若斑黑為不治之症宜用人參化斑湯人參三錢石膏一兩知母二錢五分當歸紫草茸白茯苓去皮甘草各三錢上銼一劑水煎服一論氣分有熱發斑者宜用柴胡湯柴胡三錢黃芩二錢半夏薑炒二錢人參一錢紫草二錢黃連二錢茯苓二錢甘草二錢上銼一劑生薑煎服一論血分有熱發斑者宜當歸散當歸三錢赤芍二錢生地黃三錢黃連六分紅花八分石膏二錢上銼一劑水煎服一論癮疹因風熱客於肌腠氣血積阻而成也宜加味敗毒散羌活獨活前胡柴胡當歸川芎枳殼去穰桔梗茯苓人參各五分薄荷甘草白朮防風荊芥蒼朮米泔水浸赤芍生地黃各五分上銼一劑薑棗水煎溫服此因感冒風濕以致發斑者服之良驗一論斑者如胭脂點而不起粒者是也紅斑可治紫斑十活其一黑斑十無一生如有斑見宜服解毒化斑湯牡丹皮生地黃木通歸尾遠志甘草湯泡去心犀角以乳汁磨下一二錢紫草茸知母牛蒡子茜根甘草生帶梢者穿山甲炒成珠研末一錢上用水煎藥調下山甲末並犀角汁同服發熱夫發熱者非止一端雜病中俱有發熱醫者宜照各門治法治之蓋病有虛實寒熱之不同豈可一律而治耶一論傷寒發熱是寒邪入衛與陽氣交爭而為外熱陽氣主外為寒所薄而失其職故為熱其脈緊而有力是外之寒邪傷衛也治主外宜服九味羌活湯方見傷寒一論傷暑發熱是火邪傷心元氣耗散而熱邪入客於中故發為熱汗大泄無氣以動其脈虛遲而無力是外之熱邪傷榮也治主內宜服清暑益氣湯方見中暑一論內傷發熱是陽氣自傷不能升達降下陰分而為內傷乃陰虛也故其脈大而無力屬肺脾宜服補中益氣湯方見內傷一論陰虛發熱是陰血自傷不能制火陽氣升騰內熱乃陽旺也故其脈數而無力屬心腎經曰脈大無力為陽虛脈數無力是陰虛宜服清離滋坎湯方見勞瘵一論大病後氣血兩虛遂成勞怯潮熱往來盜汗自汗或無汗燥熱世俗更以柴胡地骨皮往往不效其病愈甚一論男子血虛有汗潮熱者以人參養榮湯方見後一論男子氣虛有汗潮熱者以補中益氣湯方見內傷一論血虛無汗潮熱者以茯苓補心湯方見婦人虛勞一論氣虛無汗潮熱者以人參清肌散方見後一論女子血虛有汗潮熱者以茯苓補心湯一論氣血兩虛無汗潮熱者以逍遙散方見婦人虛勞一論發熱咳嗽咯血以人參五味子散骨蒸者五蒸湯清骨散以上皆治勞熱之聖藥也方俱見後一論男婦四肢肌表發熱如火烙此病多因血虛而得之或胃虛遇食冷物抑遏陽氣於脾土之中火即上越宜用升陽散火湯升麻葛根白芍羌活獨活人參各五分柴胡八分生甘草防風炙甘草各三分上銼一劑生薑煎服忌寒涼生冷之物一論夜則靜晝則發熱者此熱在氣分也宜小柴胡湯方見傷寒依本方加梔子黃連地骨皮一論晝則靜夜則發熱者此熱在血分也宜四物湯方見補益依本方加梔子黃柏知母黃連牡丹皮柴胡一論晝夜俱發熱者此熱在氣血之分也宜四物湯方見補益合小柴胡湯方見傷寒依本方加五味再加黃連山梔仁一劑而安一論子午潮熱者加減逍遙散當歸二錢白芍二錢白朮一錢五分茯苓三錢柴胡八分甘草八分胡黃連六分麥門冬二錢黃芩二錢地骨皮三錢秦艽三錢木通二錢車前子三錢燈草十根上銼水煎服一論一應發熱憎寒非雜病發熱者此邪在半表半裡也宜用柴苓湯小柴胡湯方見傷寒五苓散方見中暑二方相合是也一論積勞虛損四肢倦怠肌肉消瘦顏色枯稿汲汲短氣飲食無味也人參養榮湯人參三錢當歸二錢陳皮一錢五分蜜炙黃耆二錢桂心五分白朮去蘆一錢五分白芍二錢酒炒熟地黃三錢白茯苓三錢去皮五味子四分遠志八分去心甘草炙八分上銼薑棗煎服一論男婦氣虛無汗潮熱者宜用人參清肌散人參二錢白朮一錢五分白茯苓三錢去皮當歸二錢赤芍二錢柴胡八分半夏二錢葛粉二錢甘草八分上銼薑棗煎服其藥服之自愈一論虛勞潮熱咳嗽紅痰盜汗宜人參五味散黃耆二錢人參三錢白朮一錢五分白茯苓三錢當歸二錢熟地黃三錢桔梗八分地骨皮三錢陳皮二錢前胡二錢柴胡八分五味子四分枳殼一錢桑白皮三錢甘草八分上銼生薑烏梅半個水煎加知母二錢一論男婦五心煩熱骨蒸勞熱宜清骨散人參一錢赤茯苓五錢柴胡二錢蓁艽五錢生地黃二錢熟地黃二錢薄荷七分胡黃連五分上銼一劑水煎溫服一論發熱口乾小便赤澀夜則安靜晝則發熱此症在氣分也清心蓮子飲方見赤白濁一論男婦肌肉燥熱目赤面紅煩渴引飲日夜不息其脈洪大而虛重按全無內經曰脈虛血虛脈實血實又名血虛發熱症象白虎若誤服白虎必死此病因飢餓勞役而起宜服當歸補血湯嫩黃耆蜜水炒一兩當歸酒洗二錢上銼一劑水煎溫服一人虛勞發熱自汗諸藥不能退其熱者服當歸補血湯一劑如神一沈大尹不時發熱日飲冰水數碗寒藥兩劑熱渴益甚形體日瘦尺脈洪大而數時或無力王太僕曰熱之不熱責其無火寒之不寒責其無水又云倏往倏來是無火也時作時止是無水也法宜補腎用加減八味丸不月而愈一男子七十九頭痛發熱眩暈喘急痰涎壅塞小便頻數口乾引飲遍舌生刺縮斂如荔枝然下唇黑裂面目俱赤煩躁不寐或時喉間如煙火上衝急飲涼水少解已瀕於死脈洪大而無倫且有力捫其身烙手此腎經虛火遊行於外投以十全大補加山茱萸澤瀉丹皮山藥麥門冬五味附子一鍾熟睡良久脈症各減三四再與八味丸服之諸症悉退後畏冷物而痊一儒者發熱口乾小便頻濁大便祕結盜汗遺精遂致廢寢用當歸六黃湯二劑盜汗頓止用六味地黃丸二便調和用十全大補湯及前丸兼服月餘諸症悉愈一人年近四旬忽發潮熱口乾喜飲冷水求醫治以涼藥投之數服罔效四五日渾身沉重不能舉止四肢強直耳聾譫語妄言眼閉不省人事六脈浮大無力此氣血脾胃虛損至極余將十全大補湯去地黃白芍加熟附子一服須臾病者睡口鼻痰響人咸以為服桂附參耆之誤余曰此病藥交攻不必憂疑也又強進一服過一二時許即能轉身動止次日連進數劑則諸病次第而潛瘳矣此病從脈不從症而治之也一人發熱煩渴或頭痛因服發散藥反增喘急腹痛自汗如雨日夜囈語余意此勞傷元氣誤汗所致其腹必喜手按詢之果然與十全大補湯加熟附子一錢服之熟睡久而不醒舉家驚惶及覺諸症頓進再劑而痊凡人飲食勞役起居失宜見一切火症悉系內真寒而外假熱故肚腹喜暖口畏冷物此乃形氣病氣血既虛屬不足法當純補元氣為善治者矣六味丸十全大補湯俱見補益八味丸亦見補益勞瘵脈數而虛又兼緊澀骨蒸勞熱盜汗咳嗽必殞其軀非藥可除夫陰虛火動勞瘵之疾由相火上乘肺金而成之也傷其精則陰虛而火動耗其血則火亢而金虧人身之血猶水也血之英華最厚者精也不謹者縱其欲而快其心則精血滲涸故臟腑津液漸燥則火動熏肺而生痰因其燥則痰結肺管不利於出故咳而聲干原乎精乏則陰虛陰虛則相火行於胃而變為涎也二火熏膈則痰涎逆上胃脘不利則多嗽聲蓋痰因火動嗽因痰起痰之黃厚者為有氣可治狀如魚涎白沫者為無元氣難痊然斯病之起非止過欲而已或五味之偏或七情之極或勞役之過耗散元氣損傷脾胃氣血虧損臟腑虛弱六脈沉細微澀而數百病由是次第而生蓋腎水一虛則相火旺動相火上炎則克肺金肺受火邪所克所以為咳為嗽為熱為痰為喘息為盜汗為吐血為衄血為便血尿血為四肢倦怠為五心煩熱為咽乾聲啞為耳鳴眼花為遺精便濁為蟲脹腫滿為一應難狀之症治者宜滋腎水養心血扶元氣健脾胃以培其本降相火清濕熱化痰涎潤肺金以治其標宜以清離滋坎湯補中益氣湯河車地黃湯太平丸瑞蓮丸寧嗽膏白雪膏之類宜對症選用慎毋執泥蓋此病非一朝一夕之故其所由來者漸矣然治之大非一方藥所能療焉宜以上諸方對症投之功不可以間斷效有難於速期久則腎水上升相火下降火降則痰消嗽止水升則氣足神完水火既濟又何疾之不愈哉又須病者堅心愛命絶房勞戒惱怒息妄想節飲食廣服藥以自培其根可也萬一毫分不謹則諸症迭起縱廬扁復生亦難為矣可不慎乎一論因房欲過度而成陰虛火動勞瘵之症發熱咳嗽吐痰喘急盜汗五心煩熱吐血衄血咽喉聲啞夜夢泄精耳鳴眼花六脈沉數而澀清離滋坎湯懷生地黃一錢熟地一錢麥門冬去心一錢當歸酒洗一錢白芍酒炒一錢懷山藥一錢牡丹皮六分炙甘草三分天門冬去心一錢白茯苓去皮一錢山茱萸酒蒸去核一錢白朮去蘆土炒一錢澤瀉炒五分黃柏蜜炒五分知母五分上銼薑棗煎溫服痰盛加竹瀝薑汁熱盛加童便人乳同服盜汗加黃耆蜜水炒酸棗仁炒嗽甚加五味子痰盛加貝母栝蔞仁熱盛加骨皮心下怔忡恍惚不寐加遠志去心酸棗仁炒遺精加龍骨牡蠣煅胸中不爽加陳皮泄瀉加蓮肉陳皮去知母黃柏吐血衄加犀角玄參氣虛加人參陽虛加熟附子咽瘡喉痛加桔梗玄參一論虛勞發熱口乾咳嗽吐痰喘急自汗四肢困倦無力不思飲食大便泄瀉肚腹蠱脹腫六脈浮數無力是也加減補中益氣湯黃耆蜜炒一錢人參一錢白朮去油蘆炒一錢五分當歸酒洗一錢白茯苓去皮一錢陳皮六分白芍酒炒一錢蓮肉一錢懷山藥一錢甘草炙三分半上銼薑棗煎服痰盛加薑製半夏嗽甚加五味子口渴加麥門冬腹脹加厚朴薑炒胸痞加枳實麩炒泄瀉加炒黑乾薑嘔吐加薑炒半夏腫滿加豬苓澤瀉木通憎寒發熱加柴胡元氣下陷加升麻元氣虛憊加熟附子肉桂一論年少之人稟賦薄弱不能謹慎斫喪太過以致腎水枯竭相火妄動而成陰虛火動之症渾身發熱咳嗽吐痰喘急上壅夜多盜汗五心煩熱日輕夜重吐血衄血尿血便血咯血唾血肺癰肺痿咽瘡聲啞口乾發渴耳鳴眼黑頭眩昏沉蠱脹腫滿小便淋瀝夜夢遺精足膝痠軟肌肉消瘦四肢困倦飲食少思血虛發熱之聖藥也河車地黃丸懷生地黃先將酒洗令淨再入酒拌勻粗碗盛坐放砂鍋內重湯蒸半日取出加酒再蒸至極黑為度再入生薑汁拌勻慢火焙乾八兩山茱萸酒蒸去核取肉四兩懷山藥四兩白茯苓去皮筋膜乳汁浸曬三次牡丹皮去骨澤瀉各三兩上忌鐵器為最細末用頭生胞衣一具男用男胎女用女胎長流水洗淨瓷碗盛放砂鍋內用文武火蒸一日極爛入臼內杵如泥入藥再杵千餘下為丸如梧桐子大每服百丸空心白湯送下腎水不能攝養脾土多吐痰唾薑湯送下或用斑龍膠酒化開為丸尤妙如病人大便乾燥口乾作渴此相火太旺加黃柏酒炒知母酒炒麥門冬去心五味子各一兩同丸服一論虛勞久嗽紅痰肺痿肺癰臥不倒床嗽聲不絶者宜用噙化太平丸天門冬去心麥門冬去心知母去毛貝母去心款冬花杏仁去皮各二兩當歸酒洗生熟地黃黃連阿膠蛤粉炒成珠各一兩五錢蒲黃一兩京墨一兩桔梗去蘆一兩麝香少許白蜜四兩南薄荷葉一兩上為細末煉蜜為丸如彈子大臨臥濃煎薄荷湯先灌漱喉中細嚼一丸津液送下一論陰虛火動吐血咯血咳嗽痰涎喘急大斂肺氣止咳化痰定喘之聖藥也如神寧嗽膏天門冬去心八兩杏仁泡去皮尖四兩貝母去心四兩百部四兩百合四兩款冬花五兩紫菀三兩上以上俱為細末長流水煎三次入飴糖八兩蜜一斤再熬又入阿膠四兩白茯苓水飛去筋膜四兩曬乾二味入前汁內調勻如糊成膏每服三五匙一論治虛勞脾胃虛弱不思飲食泄瀉等症宜參苓白朮散理氣健脾丸方見飲食治男婦虛勞肚腹脹痛泄瀉不止咳嗽吐痰上喘痞悶陽春白雪糕方見內傷治虛勞百病可兼前湯丸進之大有補益一論虛勞發熱痰咳喘汗泄瀉腹痛脾虛虛弱飲食少思骨瘦如柴宜瑞蓮丸乾山藥炒二兩蓮肉去心膜皮二兩白朮去蘆土炒三兩芡實去殼炒二兩揀參二兩白茯苓去皮一兩陳皮一兩白芍火煨酒炒一兩粉草炙五錢上銼細末用公豬肚一個洗淨水煮爛搗和為丸如梧桐了大每服百丸米湯送下一論此膏能治五勞七傷諸虛勞極元氣虛損脾胃虧弱養血和中寧嗽化痰退熱定喘止瀉除渴真王道之劑也調元百補膏張尚書傳當歸身酒洗四兩懷生地黃二斤懷熟地黃四兩甘枸杞子一斤白芍一斤用米粉炒人參四兩遼五味子一兩麥門冬去心五兩地骨皮四兩白朮去蘆四兩白茯苓去皮十二兩蓮肉四兩懷山藥五兩貝母去心三兩甘草三兩琥珀一錢三分薏苡仁用米粉炒八兩上銼細末和足水十斤微火煎乾再加水十斤如此四次濾去渣取汁文武火熬之待減去三分每斤揀淨熟蜜四兩春五兩夏六兩共熬成膏每服三匙白湯調下吐血加牡丹皮二兩骨蒸加青蒿汁童便各二碗同熱服之一人足熱口乾吐痰頭暈服四物黃連黃柏飲食即減痰涎益甚用十全大補加麥門冬五味山藥山茱而愈一男子年十六夏月作渴發熱吐痰唇燥遍體生疥兩腿尤多色暗作癢日晡愈熾仲冬腿患瘡尺脈洪數余曰疥腎疳也瘡骨疽也皆腎經虛症針之膿出其氣氤氳余謂火旺之際必患瘵症遂用六味地黃十全大補不二旬而諸症愈瘵症俱用前藥而愈抵冬娶妻至春其症復作父母憂之俾其外寢雖其年少謹疾亦服地黃丸數斤煎藥三百餘劑而愈也一余嘗聞士子讀書作文辛苦最宜節欲蓋勞心而不節欲則火動火動則腎水日耗水耗則火熾火熾則肺金受害傳變為勞此固深知讀書之苦洞得病情之由而患者不可不知所預防也一陰虛火動發熱煩躁服諸藥不效者非童便不能奏效益氣湯去柴升加生地赤茯苓白茯苓天冬麥冬赤芍五味黃柏地骨皮知母貝母銀花柴胡龜板一若熱來復去晝見夜伏夜見晝伏不時而動或無定處而作口舌生瘡者若從腳起乃無根之火也以八味丸十全大補湯加麥門冬五味子一治陰虛火動五心煩熱用七八歲無病童子小便去頭尾用白色者一盞或食前或食後服之每日二三次服之降火滋陰最速童便紅黃者勿用若誤服傷脾胃而作泄瀉慎之一儒者形體魁偉冬日飲水自喜壯實余曰此陰虛也不信一日口舌生瘡或用寒涼之劑肢體倦怠發熱惡寒余用六味地黃補中益氣而愈一治勞瘵陽旺不倒用皮硝不拘多少放勞宮即手掌心內兩手合住自化其陽自痿病愈用起陽法好燒酒和黃泥塗陰毛際處一日其陽即起一方治陽旺用絲瓜小藤搗爛敷玉莖陽即倒矣一方痿陽用經霜絲瓜不拘大小白馬尿浸一日陰乾為末每服三錢空心白酒送下一方縮陽法馬蝗蜞一曰馬鱉尋起九條入水養之至七月七日取之陰乾稱有多少入麝香併合衣香三樣一般多研為細末用蜜少許為餅遇陽旺時即將少許擦左腳心即時陽痿過日復旺又擦一論勞者勞於神氣傷者傷於形容飢飽過度則傷脾思慮過度則傷心色欲過度則傷腎起居過常則傷肝喜怒悲愁則傷肺又風寒暑濕則傷外飢飽勞役則傷內晝感之則傷榮夜感之則傷衛榮衛經行內外交運而各從其晝夜始勞於一一起為二二傳於三三通於四四干其五五復犯一一至於五邪乃深藏真氣自失使人肌肉消神氣弱飲食減行步難及其如此則雖有命亦不能久也攝養良針養生之術凡百有節人之壽夭在乎調攝一有所偏百病俱發五勞七傷損傷氣血釀成陰虛痰咳喘熱脈來澀數病成虛怯猶樹根枯治當補接斡旋元氣滋陽枯竭神醫妙手庶免夭折病者心堅嚼釘咬鐵調攝經年藥餌千帖妄想要息房勞要絶惱怒要除飲食要節欲犯絲毫噬臍莫及洗心滌慮謹遵成法雲林格言非為浪説卻病延年千金祕訣一羊城馬伏所昔遘沉疴諸醫罔效召豫治愈遂成莫逆之交萬曆庚戌夏乃郎年二旬余素稟清弱酷嗜酒欲頻年遭驚駭至今遂成虛勞之恙召豫至診其六脈弦數無力其症潮熱憎寒盜汗如雨時微痰嗽手掌熱而手指冷心驚悸而夢遺以上諸症皆系腎水枯竭心血乾涸相火上炎熏克肺金元氣受傷脾胃虧損而臟腑氣血皆耗憊矣余治以十全大補湯看病加減施治用地黃丸壯水之主以制陽光加歸麥酸志以補心血用瑞蓮丸白雪糕以補元氣脾胃每日如此服之如彈天平一般不可偏勝倘萬有一偏則病劇不可復救藥矣何也若偏於補陽藥多則陽旺而陰愈消相火愈熾則咽喉腫痛生瘡聲啞之症可立而待矣若偏於補陰藥多而用地黃當歸泥滯脾胃不運而為痢瀉腫脹喘滿等症生焉所以用藥不可偏勝有如此矣余將前四藥服之旬日頗有微效分付病家執此以往調攝期以歲年投劑積以千百度可免危而就安也余緣有司召遂暫離而去殊料病家欲速即愈更醫不審病由誤認為陽虛輒投烏附參耆之類數服諸症消減一家欣然而反罪余用歸地之過遂連進補陽之藥不半月而陽火愈熾則喉痛聲啞諸症出矣病之至此雖日進歸地數斤亦無用矣醫者至此急進人乳童便以遏其火將脾胃復憊以致上熱未除而中寒復生泄瀉之病又作若兩斧之伐一枯樹不數月而告終矣籲醫者不悟妄治之失病家不悔欲速之瘥可勝嘆哉補遺神仙粥山藥蒸熟去皮一斤雞頭實半斤煮熟去谷搗為末入粳米半升慢火煮成粥空心食之或入韭子末二三兩在內尤妙食後用好熱酒飲一二杯更妙此粥善補虛勞益氣強志壯元陽止泄精神妙一論男子勞傷而得瘵疾漸見疲瘦並傳尸勞瘵宜服還元酒獖豬腰一對用童便兩盞無灰酒一盞以新瓦甕貯之密封慢火煮熟至終夜五更初溫熱飲酒食腰子病篤一月效平日瘦怯者亦可服蓋以血養血全勝金石草木之藥如吐血加繡針草根二兩最效一治骨蒸勞熱方生地黃一斤搗取汁三度搗絞汁盡分再服若利即減之以身涼為度如勞瘦骨蒸日晚寒熱咳嗽喘急用生地黃汁三合煮白粥臨熟入地黃汁攪勻空心食之一論治虛勞咳嗽痰喘自汗用公豬肺不見水用銀簪剮爛加莧菜子在內蒸爛五更醒時細嚼下一治骨蒸勞咳嗽痰及腸風下血傳尸勞蟲並蟲咬心痛用鰻鱺魚三斤如食法切作骰子塊入鍋內用酒兩盞煮後入鹽湯於中食之一論傳尸勞瘵有傳染滅門者用鰻鱺魚白水煮食之用骨燒煙燻病人除根一論治傳尸勞病乃有蟲百物思吃者用此方百發百中白梗萆麻子淨仁一兩為末乳香沒藥各五分石膏一錢蔥三根上用豬肝心肺一付莫下水將藥和作一處灌入豬肺眼內管口用線扎住用五十斤桑柴慢慢文火煮爛不拘時食之一論久嗽痰火方生薑汁生藕汁白果汁蘿蔔汁梨汁荸薺汁以上各汁七錢入砂鍋內火熬加白糖霜四兩再煎數次下蜜二兩再煎入豬油二錢同煎成膏聽用白茯苓去皮二兩白硼砂一兩五錢白朮去蘆油一兩上為細末入前煎成膏攪勻為丸如芡實子大每用一丸噙化五更時再進一丸以愈為度一論血虛肺燥皮膚坼裂肺疾咳咯膿血吐血喘急咳嗽失音等症又云去積聚風痰補肺潤五臟三蠱伏尸除瘟疫輕身益氣天門冬膏天門冬每料用十斤或五斤先用溫水洗淨揀過再用半溫水浸一時即去水則待軟透至骨去皮心搗碎每斤先入水五碗同煮一半乾卻傾出濾去汁再入水再煎再濾汁如此三次將三汁一同熬成膏再入蜜四兩慢火熬成膏埋土三日去火毒每服二三匙不拘時白湯送下吐血一切諸失血症脈沉小身涼者生脈大身熱者死吐後脈微者可治吐衄後復大熱脈反躁急者死夫人身之血名曰榮榮者謂榮潤於身之物也血生精故血充則力強體健顏色青為血虛色赤為血熱白色氣血兩虛血屬陰陰乃陽之守也陰有質者則陽氣得以倚附焉陰精一虛則諸火炎炎衆液沸騰妄行矣夫人之五內心生血脾統血肝藏血猶水也中和則循經調暢寒則凝滯熱則湧射惟小兒不知冷熱衣被過厚亦致客熱則鼻中衄也鬱熱結於陽明之經故傷寒鼻流血名曰紅汗邪隨而解矣治法不同其男婦陰血皆繫於心脾君相二火協動以致妄行而成血症其先天真陰不足者欲雖不淫亦作斫喪精竭而論相火暴熾衝上血湧諸絡管而來鮮者宜涼補之劑止之瘀者不可用京墨及十灰散三七等劫藥阻塞惟清涼引血歸元補益滋陰降火乃為良策也一論吐血皆因虛火妄動血得熱而妄行此方主之涼血地黃湯犀角乳汁磨臨服入藥內或銼末煎四分生地黃酒洗一錢牡丹皮二錢赤芍七分黃連酒炒一錢黃芩酒炒一錢黃柏酒炒五分知母一錢玄參一錢天門冬去心一錢扁柏葉三錢許茅根二錢上銼水煎入後十汁同服一吐血成塊者加大黃一錢桃仁十個去皮尖研如泥衄血加梔子沙參玄參溺血加木瓜牛膝條芩荊穗地榆倍知柏便血加黃連槐花地榆荊穗烏梅善酒者加葛根天花粉十汁飲藕節甜梨茅根韭菜蘿蔔家園生地黃沙蜜竹瀝童便京墨磨藕汁上十汁合作一處不見火入前湯藥半鍾頻頻服之不可間斷服至血止再服後滋陰清火湯同服一治吐血不止神方家園生地黃半斤洗淨搗爛扭汁生大黃末一方寸七錢許上煎地黃汁三沸下大黃末調勻空心服溫飲一小盞一日三服血即止一治吐血咳嗽上喘心慌脈洪火盛死在須臾家園生地黃北人呼為婆娑奶遍地有之取來洗淨搗汁半鍾白童便半鍾二味合一處重湯煮一沸溫服立效一論吐血覺胸中氣塞上吐紫血者此上焦積熱也宜桃仁承氣湯方見傷寒一治諸失血韭菜連根洗淨石臼內搗爛入童便用布扭去渣重湯煮蕩令熱濁者居下不用止用清者或單服或入藥服俱好或調百草霜二錢服之血止效一論吐血衄血宜用滋陰清火湯當歸二錢川芎五分赤芍七分生地黃一錢五分黃柏乳汁炒一錢生知母一錢麥門冬去心一錢牡丹皮一錢玄參一錢犀角一錢山梔仁炒黑一錢阿膠炒五分甘草三分上銼一劑水煎入十汁飲同服如不思飲食加白朮去蘆一錢一治吐血不止屬實熱者胡云閣傳將軍丸錦紋大黃酒拌九蒸九曬為末水丸如梧桐子大每服四五十丸白滾湯送下下血條芩湯送下一論先吐血而後見痰者是陰虛也宜清火滋陰湯天門冬去心麥門冬去心生地黃牡丹皮赤芍梔子黃連山藥山茱萸去核澤瀉赤茯苓去皮甘草上銼一劑水煎入童便同服一論先吐痰而後見血者是積熱也宜清肺湯白茯苓去皮陳皮當歸生地黃芍藥天門冬去心麥門冬去心黃芩山梔紫菀阿膠炒甘草減半烏梅一個桑白皮各等分上銼一劑棗一枚水煎服喘急加蘇子去天門冬一治吐血一服立止歸尾赤芍生地黃百合貝母梔子炒麥門冬去心各一錢蒲黃炒黑牡丹皮各七分川芎阿膠炒熟地黃桃仁去皮尖各五分上銼一劑生薑一片水煎服一論痰中見血當歸一錢白芍一錢白朮一錢五分青皮五分桃仁去皮尖一錢牡丹皮一錢五分黃芩八分桔梗五分貝母一錢梔子炒黑八分甘草三分潮熱加柴胡赤茯苓上銼一劑生薑三片水煎溫服一論每言語過多即吐血一二口久有此病遇勞即作此勞傷肺氣其血必散視之果然宜服補中益氣湯方見內傷依本方加麥門冬五味子山藥地黃茯神遠志立效一論吐血每遇勞則作咳嗽有痰吐血脾胃腎三脈皆洪數宜補中益氣湯依本方加貝母茯苓石棗山藥麥門五味一男子鰥居數年素勤苦勞則吐血發熱煩躁服犀角地黃湯氣高而喘前病益盛更遺精白濁形體倦怠飲食少思脈洪大舉按有力服十全大補湯加麥門冬五味山藥山茱而愈一儒者素勤勞苦吐血發痙不知人事余以為脾胃虛損用十全大補湯及加減八味丸而痙愈用歸脾湯而血止一童子年十四發熱吐血余謂宜補中益氣湯兼滋化源伊信用寒涼降火愈甚始謂余曰童子未室何腎虛之有參耆補氣奚為用之余述丹溪云腎主閉藏肝主疏泄二臟俱有相火而其繫上屬於心心為君火為物所感則易於動心動則相火翕然而隨雖不交會其精亦暗耗矣又精血篇云男子精末滿而御女以通其精則五臟有不滿之處異日有難狀之疾遂用補中益氣湯及六味地黃丸加麥門冬五味治之而愈後因勞怒忽吐紫血塊先用花蕊石散又用獨參湯漸愈後勞則咳嗽吐血一二口脾胃腎三脈皆洪數用補中益氣湯六味地黃丸全愈補遺一凡人因酒色過度或勞役過度或場屋勞心內省極深或心肺脈破氣血妄行血如泉湧口鼻俱出須臾不救黃濱江方側柏葉蒸乾揀參去蘆各等分上為細末每服二錢入飛羅面二錢新汲水調和如稀糊服一方用釜底墨研末三錢米飲湯調下連進三服一方單用側柏葉陰乾水煎服代茶吃一人吐血不止發熱面紅胸膈脹滿手足厥冷煩躁不寧用當歸身二錢川芎一錢五分官桂三錢上銼水煎服立效衄血衄血者鼻中出血也陽熱怫鬱致動胃經胃火上烈則血妄行故衄也治以涼血行血為主如左孔流用線將右手中指根緊扎右孔流扎左手中指血自止如兩孔俱流兩手俱扎生地黃湯治衄血生地黃三錢川芎一錢枯芩一錢桔梗一錢梔子一錢蒲黃一錢阿膠炒一錢側柏三錢牡丹皮一錢茅根三錢甘草三分白芍一錢上銼一劑水煎溫服一治衄血祕方人乳童便好酒上三味各等分碗盛重湯煮熱飲之立止一治衄血勿令患人知以井花水忽然猛噀其面立止一治衄血久不止素有熱而暴作者諸藥不效用大紙一張作八折或十折於水內濕置頂中以熱尉斗尉至一重或二重紙干立止一治鼻衄久不止用驢糞焙乾為末血餘燒灰等分每少許吹鼻立止一治鼻衄用蘿蔔自然汁和酒飲之則止蓋血隨氣運轉氣逆不順所以妄行蘿蔔最下氣而消導一服即效一治衄血不止將頭頂發分開將新汲泉井水一匙滴百會穴上立止一治鼻衄不止用山梔子白芷等分燒存性為細末吹入鼻中其血乃止又方用大蒜去皮搗爛如左鼻出血貼左腳心右鼻出血貼右腳心如兩鼻出血兩腳心貼之其血立止以溫水洗腳心一治鼻血不止用緑豆粉細草為末涼水調服立止又方括人中白置新瓦上焙乾以溫湯調服又方人中白一錢頭髮燒灰一錢麝香一分為細末吹鼻少許立止又方大蚯蚓十餘條搗爛入井花水和稀患輕澄清飲重則並渣汁調服立愈久不復作一人年近五旬素稟怯弱患衄血長流五晝夜諸藥不止六脈洪數無力此去血過多虛損之極以八物湯加龍骨熟附子等分又加真茜草五錢水煎服連進二劑其血遂止又依前方去茜草龍骨調理十數劑而痊一治鼻中流血用小兒胎髮燒灰吹之其血立止一女子因翻身望後一跌鼻血長流止後一有所感其血即流諸醫不效一方用白麵和水包大附子一個在內火煨熟去附子用面燒存性為末每二錢白水調服永不復發八物湯方見補益咳血一論咳血出於肺咳嗽痰中帶血也清咳湯當歸白芍桃仁去皮貝母各一錢白朮去蘆牡丹皮黃芩梔子炒各五分青皮去穰甘草三分桔梗五分上銼一劑水煎服潮熱加柴胡赤茯苓咳血不易治喉不容物毫髮咳血即滲入喉愈滲愈咳愈咳愈滲飲溲溺百不一死服寒涼百不一生一論因咳而吐痰痰中有血者是宜用當歸一錢白芍一錢生地黃一錢五分貝母一錢二分知母一錢白茯苓八分天花粉一錢五分桔梗一分麥門冬去心一錢甘草五分上銼一劑水煎溫服一論咳血方天地丸天門冬一斤懷生地黃酒拌砂鍋內蒸至黑半斤上為細末煉蜜為丸如彈子大每服三丸溫酒送下日進三服一論咳血痰盛身熱多是血虛用青黛栝蔞仁訶子海石山梔為末薑汁蜜為丸噙化咳甚加杏仁後以八物湯加減調理痰甚加痰藥咯血一論咯血者出於腎咯出血屑者是也亦有痰帶血絲出者宜清咯湯陳皮半夏薑汁炒白茯苓知母貝母去心生地黃各一錢桔梗梔子炒各七分杏仁去皮阿膠炒甘草柳桂各五分桑白皮一錢五分上銼生薑煎服一方治同前白朮一錢五分當歸一錢芍藥一錢牡丹皮一錢五分桃仁研一錢山梔炒黑八分桔梗七分貝母一錢黃芩八分青皮五分甘草三分上銼一劑水煎服一方無青皮黃芩有知母麥門冬黃柏一論吐血咯血大能潤肺止咳宜天門冬丸天門冬去心一兩白茯苓去皮阿膠杏仁去皮尖貝母甘草各五錢上為細末煉蜜為丸如芡實大每服一丸含口中噙化下日夜可服十丸嘔血一論先噁心而後嘔出成升成碗者由怒氣逆甚所致治方用當歸三錢川芎一錢五分芍藥三錢生地黃四錢炒山梔三錢上銼水煎臨服入童便一盞薑汁少許同服一論嘔血脈大發熱喉中痛者此是氣虛用黃耆二錢人參二錢黃柏一錢五分生地黃三錢荊芥一錢當歸二錢上銼一劑水煎服一論怒氣逆甚而嘔血宜栝蔞仁三錢當歸二錢生地黃四錢桔梗八分通草一錢五分牡丹皮三錢上銼一劑水煎服唾血一論唾血者出於腎鮮血隨唾而出也麥門冬天門冬知母貝母黃柏桔梗熟地黃玄參遠志各等分乾薑炒減半上銼水煎服便血一論下血者大便出血也乃臟腑蘊積濕熱之毒而成或因氣鬱酒色過度及多食炙爆熱毒之物或風邪之冒或七情六淫所傷使氣血逆亂榮衛失度皆能令人下血此方治大便下血不問糞前糞後並腸風下血皆治解毒四物湯當歸酒洗五分川芎五分白芍炒六分生地黃一錢黃連炒一錢黃芩炒八分黃柏炒七分梔子炒黑七分地榆八分槐花炒五分阿膠炒六分側柏葉六分上銼一劑水煎服腹脹加陳皮六分氣虛加人參三分白朮三分木香三分腸風下血加荊芥五分氣下陷加升麻五分心血不足加茯苓六分虛寒加炒黑乾薑五分一方去阿膠加苦參七分一論大便下血去多心虛四肢無力面色痿黃宜滋陰臟連丸懷生地黃懷熟地黃各用四兩山茱萸酒蒸去核牡丹皮白茯苓去皮各二兩川黃連酒炒澤瀉三兩山藥四兩槐花拌蒸大黃酒蒸九次極黑各用三兩上為細末裝入雄豬大腸頭內兩頭扎住糯米三升水浸透米去水將藥腸藏糯米甑內蒸一炷香時為度搗藥腸為丸如梧桐子大每服八十丸空心鹽湯下一虛人大便下血用補中益氣湯方見內傷加炒阿膠酒炒椿根皮地榆槐花一下血服臟連丸等藥其血愈多形體消瘦發熱少食裡急後重此脾氣下陷以補中益氣湯加炒黑乾薑立止一論腸風下血者必在糞前是名近血色清而鮮其脈又浮宜人參敗毒散方見感冒依本方加黃連柏葉湯治腸風下血側柏葉當歸生地黃黃連枳殼麩炒槐花地榆荊芥川芎各等分甘草減半上銼一劑烏梅一個生薑切片水煎空心服槐角丸治腸風下血不問糞前糞後遠年近日皆效槐角子一兩枳殼麩炒黃芩酒炒地榆荊芥黃連側柏葉酒浸各五錢黃柏酒浸防風歸尾酒洗各四錢上為細末酒糊為丸如梧桐子大每服五七十丸空心米湯送下忌生冷燒酒蒜毒等物戒房事一論臟毒下血必在糞後是名遠血宜八寶湯黃連黃芩黃柏梔子連翹槐花各一錢五分細辛甘草各四分上銼一劑水煎空心服一論大便下血大腸痛不可忍肛門腫起此下焦熱毒盛也宜加味解毒湯大黃黃連黃芩黃柏梔子赤芍連翹枳殼麩炒防風甘草上銼水煎空心服一治腸胃閉悶下血積熱臟毒黃連四兩炒枳殼去穰炒四兩上為細末水糊為丸如梧桐子大每服七十丸清茶下一論腸風臟毒便血痔痛下血宜槐黃丸槐花四兩黃連酒炒四兩上為細末入豬大腸內兩頭扎住入韭菜二斤水同煮爛去菜用藥腸搗爛為丸如梔子大如濕加些面每服八十丸空心米湯送下一論大便下血久不止者此臟腑虛寒故也面色痿黃身體瘦弱宜斷紅丸鹿茸去毛醋煮大附子炮去皮臍當歸酒洗續斷酒浸黃耆炒阿膠蛤粉炒側柏葉炒各一兩白礬枯五錢上為細末醋煮米糊為丸如梧桐子大每服七十丸空心米湯下丹溪云下血久不愈者後用溫劑先用四物湯加炮薑附子升麻後服斷紅丸收效一論腸風下血熱者其血鮮寒者其血青黑或成塊一儒者素勤苦因飲食失節大便下血或赤或黯半載之後非便血則盜汗非惡寒則發熱血汗二藥用之無效六脈浮大心脾則澀此思傷心脾不能攝血歸源然而即汗汗即血其色赤黯便血盜汗由火之升降微甚惡寒發熱氣血俱虛也在午前用補中益氣湯以補肺脾之源舉下陷之氣午後用歸脾加麥冬五味以補心脾之血收耗散之液不兩月諸症悉愈一人素善飲酒不時便血或在糞前或在糞後食少體倦面色痿黃此脾氣虛而不能統血以益氣湯加茱萸黃連一男子便血精滑發熱一男子便血發熱一男子發熱遺精或小便不禁俱是脾腎虧損用六味地黃丸益氣湯以滋化源並皆全愈一論下血服犀角地黃湯等藥其血愈多形體消瘦發熱少食裡急後重此脾氣下陷以益氣湯加炮薑立收效一治大便下血用石蓮肉四兩去殼捶碎入公豬肚內水煮爛去蓮肉將肚並湯食之立止一治大便下血祕方觀音救苦方馬伏所傳木香四兩黃連二兩上將黃連切片煎汁浸木香慢火焙乾為末烏梅肉搗為丸如梧桐子大每服六十丸空心滾湯送下一患腸風下血者何也人腸皆有脂裹之厚則腸胃以安腸中本無血血緣有風或有熱以消其脂腸遂薄滲入身中血初患時必服涼藥而愈服之過者則腸寒而脂愈不生其血必再作凡熱者其血鮮冷者其血青黑察其冷熱用藥可也冷者用斷紅丸熱者用四物湯合黃連解毒湯加苦參槐角地榆側柏葉一腸胃流熱則糞門暴腫用蝸牛細研塗之則消一治臟毒下血用黃連解毒湯合四物湯和調為末滴水為丸每服八九十丸空心陳米飲下補中益氣湯方見內傷歸脾湯方見健忘六味丸方見補益溺血一論溺血者小便出血乃心移熱於小腸也宜清腸湯當歸生地黃焙梔子炒黃連芍藥黃柏瞿麥赤茯苓木通萹蓄知母各一錢甘草減半麥門冬一錢去心上銼一劑燈心烏梅水煎空心服溺血莖中痛加滑石枳殼去芍藥茯苓金黃散治尿血槐花淨炒鬱金濕紙包火煨各一兩上為細末每服二錢淡豆豉湯送下一治小便下血不止地骨皮燒酒二鍾煎至七分去渣空心服立止一治小便溺血旱蓮草車前草各取自然汁每服半茶鍾空心服自愈又方用壯年無病人頭髮不拘多少燒存性將側伯葉搗汁糯米糊為丸如梧桐子大每服百丸以四物湯下一治溺血不止效方小薊根生地黃各二錢通草滑石蒲黃炒淡竹葉當歸藕節山梔甘草各六分茯苓車前草各八分上銼一劑水煎空心服一治尿後有鮮血用柿子三枚燒灰陳米煎湯調服因柿性寒故也一治尿血六味地黃丸加黃柏知母殊效一尿血因心腎氣結所致或憂勞房室過度而得之實因精氣滑脫陰虛火動榮血妄行耳尿行則不痛尿淋血行則痛一治暴熱尿血山梔子去皮炒水煎服一治小便出血以車前草根葉多取洗淨取汁頻服可通五淋惡熱惡熱非熱明是虛症經曰陰虛則發熱陽在外為陰之衛陰在內為陽之守精神外馳淫欲無節陰氣耗散陽無所附遂致浮散於肌表之間而惡熱也當作陰虛火動治之惡寒惡寒非寒明是熱症亦有久服熱藥而得之河間謂火極似水熱甚而反覺自冷實非寒也有用熱藥而少愈者辛能發散郁遏暫開耳又曰火熱內熾寒必蕩外故惡寒實非寒症凡背惡寒甚者脈浮而無力者陽虛也用參耆之類加附子少許一婦人六月惡寒之極怕風雖穿棉襖亦不覺熱此火極似水也六脈洪數小水赤少豫以皮硝五錢溫水化服而愈一羅工部仲夏腹惡寒而外惡熱鼻吸氣而腹覺冷體畏風而惡寒脈大而虛微每次進熱粥甌許必兼食生薑甌許若粥離火食腹內即冷余曰熱之不熱是無火也宜用八味丸壯火之源以消陰翳彼反服四物元參之類而歿惜哉汗症自汗盜汗脈大而虛浮而濡者汗在寸為自汗在尺為盜汗傷寒脈陰陽俱緊當無汗若自汗者曰亡陽不治自汗者無時而濈濈然出動則為甚屬陽虛衛氣之所司也盜汗者寐中出通身如浴覺來方止屬陰虛榮血之所主也大抵自汗宜補陽調衛盜汗宜補陰降火心虛而冷汗自出者理宜補肝益火之源以消陰翳也陰虛火炎者法當補腎壯水之主以制陽光又有火氣上蒸胃中之濕亦能生汗涼膈散主之凡汗出發潤汗出如油汗綴如珠者皆不治也自汗大忌生薑以其開腠理故也一論自汗屬陽虛時常而出也宜參耆湯黃耆蜜炙人參白朮去蘆炒白茯苓去皮當歸酒洗熟地黃白芍酒炒酸棗仁炒牡蠣煅各一錢陳皮七分甘草炙二分烏梅一枚上銼一劑棗一枚浮小麥一撮水煎溫服一論自汗虛弱之人可服大補黃耆湯黃耆蜜炒人參白朮去蘆炒白茯苓去皮當歸酒洗白芍酒炒熟地黃山茱萸酒蒸去核肉蓯蓉酒洗各一錢五味子十粒肉桂五分防風七分甘草炙三分上銼一劑棗二枚水煎溫服一論盜汗屬陰虛睡中則出醒則止也此方治盜汗之聖藥也當歸六黃湯當歸酒洗黃耆蜜炙生地黃熟地黃各二錢黃柏黃連黃芩各一錢上銼一劑水煎空心服一論治盜汗屬氣血兩虛者宜滋陰益陽湯當歸酒洗熟地黃生地黃白芍酒炒各一錢黃柏蜜水炒知母蜜水炒各八分人參五分白朮去蘆白茯苓去皮黃耆蜜水炒各一錢陳皮八分甘草炙八分上銼一劑棗二枚淨小麥一撮水煎溫服一論自汗盜汗宜實腠理也男子失精女子夢交自汗盜汗宜白龍膠桂枝白芍酒炒龍骨煅牡蠣煅各三錢甘草炙一錢上銼一劑棗二枚水煎服四制白朮散白朮四兩黃耆炒一兩石斛炒二兩牡蠣煅一兩甘草炙一錢麥麩炒一兩有止用白朮為末每服三錢粟米調服一論心汗者心孔有汗別處無也宜茯苓補心湯白茯苓去皮人參白朮去蘆當歸生地黃酸棗仁炒麥門冬去心陳皮黃連炒各等分甘草炙八分辰砂研末臨服調入五分上銼一劑棗二枚烏梅一個浮小麥一撮水煎食遠服一祕方治冷汗時出宜用公豬肚洗淨裝糯米入內令滿用線縫口入砂鍋內水煮爛將肚與湯一併食之用糯米曬乾為末每服小盞空心米湯調服一額上常有汗出不論冬夏者得之醉後當風所致頭乃諸陽之會酒乃發陽所以飲酒必見汗者醉後陽氣上升頭面之陽氣必開當風坐臥風時入之以致頭面出汗名曰漏風宜黃耆六一湯黃耆六兩甘草一兩加肉桂白芍名黃耆建中湯上各用蜜炙十餘次出火毒每服一兩水煎溫服一論自汗不休內傷及一切虛損之症所致者用補中益氣湯柴胡升麻俱用蜜水炒少加製附子麻黃根浮小麥方見內傷一論腎氣虛弱發汗發熱用六味地黃丸方見補益一論腎氣虛弱盜汗惡寒用八味丸方見補益一論氣血俱虛而盜汗者用十全大補湯方見補益祕方治盜汗自汗五倍子為末津液調搽臍中綢勒住一宿即止一方用何首烏末津液調搽臍中亦效一論自汗邪在諸經有蓄血亦有頭汗有頭汗小便不利者死關格不得尿有頭汗者死元氣下脫有頭汗如珠不流者死柔汗發黃者死鎮液丹防風去蘆酒洗三兩黃耆蜜炙二兩五錢白朮去蘆微炒一兩中桂一兩白芍酒炒一兩五錢大附子麵包煨去皮臍童便炒二兩上為細末酒糊為丸如梧桐子大每服五七十丸空心酒下加酸棗仁炒一兩一治腳汗方白礬五錢乾薑五錢上銼為末逐日洗連五日自然無汗一治盜汗用牙豬心一個水二碗入砂鍋內煮爛熟為度去心不用另用當歸人參各二錢半入煮心汁內熬至大半甌去渣不拘時服豬心食否不拘一論凡內傷及一切虛損之症自汗不休者用益氣湯加熟附子麻黃根浮小麥其效捷於影響但升麻柴胡俱用蜜水炒過以殺其升發勇悍之性又欲引參耆等藥至肌表不可缺也如左寸脈浮洪而自汗者心火炎也本方加倍參耆加麥冬五味黃連各五分如左關脈浮弦而自汗者挾風邪也本方桂枝芍藥若不陰虛只用桂枝可也左尺脈浮洪無力而有汗者水虧火盛也本方加黃柏知母各五分熟地一錢壯水之主以制陽光右關脈浮洪無力而自汗者只依本方倍參耆右尺脈洪數無力而自汗者或盜汗相火挾心火之勢而上伐肺金也宜當歸六黃湯一論自汗盜汗乃陰陽兩虛或睡或醒時而出也益氣湯去升麻加茯苓酒芍酸棗炒牡蠣煅各一錢黃柏蜜炒知母蜜炒烏梅一個棗一枚浮小麥一撮水煎服一人四時出汗畏風不敢當雖炎天必須棉衣冬天氣喘氣不相接偶有便淋白濁服八物湯不效服補中益氣湯少已豫以荊芥防風桂枝薄荷甘草羌活一劑而痊一治自汗盜汗久不止者以清晨採帶露桑葉為末每服三錢空心米飲湯送下
