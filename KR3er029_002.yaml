body:
  text: 卷二中風脈微而數中風使然風邪中人六脈多沉伏亦有脈隨氣奔指下洪盛者夾寒則脈帶浮遲夾暑則脈虛夾濕則脈浮澀大法浮遲者吉急疾大數者凶風者百病之長也即內經所謂偏枯風痱風懿風痹是也而有中腑中臟中血脈中經絡之分焉夫中腑者為在表中臟者為在裡中血脈中經絡俱為在中在表者宜微汗在裡者宜微下在中者宜調榮中腑者多著四肢手足拘急不仁惡風寒為在表也其治多易用疏風湯之類中臟者多滯九竅唇緩失音耳聾目瞀二便閉澀為在裡也其治多難用滋潤湯之類中血脈者外無六經之形症內無便溺之阻隔肢不能舉口不能言為在中也用養榮湯之類中經絡者則口眼喎斜亦在中也用復正湯之類其間又有血氣之分焉血虛而中者由陰血虛而賊風襲之則左半身不遂用四物湯加鉤藤竹瀝薑汁以補血之劑為主氣虛而中者由元氣虛而賊風襲之則右半身不遂用六君子湯加鉤藤竹瀝薑汁以補氣之劑為主氣血俱虛而中者則左右手足皆不遂用八珍湯加鉤藤竹瀝薑汁或用上池飲乃治諸風左癱右瘓之神方也然則類中風者如中寒中暑中濕中火中氣食厥勞傷房勞等症如中於寒者謂冬月卒中寒氣昏冒口噤肢攣惡寒脈浮緊也用理中湯之類中於暑者謂夏月卒暴炎暑昏冒痿厥吐瀉喘滿用十味香薷飲之類中於濕者乃丹溪所謂東南之人多因濕土生痰痰生熱熱生風也用清燥湯之類加竹瀝薑汁中於火者河間所謂肝木之風內中非六淫之邪外侵良由五志過極火盛水衰氣熱怫鬱昏冒而作也用六味地黃丸四君子湯之類內有恚怒傷肝火動上炎者用小柴胡湯之類中於氣者由七情過極氣厥昏冒或牙關緊閉急用蘇合香丸或藿香正氣散之類若誤作風治者死也食厥者過於飲食胃氣自傷不能運化故昏冒也用六君子湯加木香之類勞傷者過於勞役耗損元氣脾胃虛衰不任風寒故昏冒也用補中益氣湯之類傷於房勞者因腎虛精耗氣不歸元故昏冒也用六味地黃丸之類此皆類中風也蓋內經主於風河間主於火東垣主於氣丹溪主於濕而為暴病暴死之症類中風非真中風也治者詳之有卒中昏冒口眼喎斜痰氣上壅咽喉有聲六脈沉伏此真氣虛而風邪所乘用三生飲一兩加人參一兩煎服即蘇若遺尿手撒口開鼻鼾者不治用前藥亦有得生者是乃行經絡祛寒痰之藥有斬關奪旗之功每服必用人參少許以祛其邪而補助真氣否則不收效矣有因虛火與濕痰涎壅盛口眼喎斜不能言語牙關緊閉昏倒不知人事將病人足大指中間半甲半肉上並人中各重掐一下至體即用奪命通關散搐鼻候有嚏可治無嚏不治如牙噤不開用烏梅肉揉和南星細辛末以中指蘸藥擦牙自開隨以蜜湯調奪命通關散二匙即吐其痰以通經絡亦上湧意也得嚏氣轉即進攝生飲或清熱導痰湯之類皆效人事稍醒關節動活且先以理氣為急中後氣未盡順痰未盡消調理之劑惟當以藿香正氣散加南星木香當歸防風一二劑之後次隨症而調之豫觀古人之方多用攻擊之劑施於北方風土剛徑之人間或可也用於南方風土柔弱之人恐難當耳豫約補古人之缺略以備天下之通宜若天地之南北人身之虛實固有不同其男子婦人大略相似學者當變通而治之慎毋膠柱以調瑟也理中湯見中寒十味香薷飲見中暑清燥湯見痿躄四君子湯見補益小柴胡湯見傷寒藿香正氣散見霍亂蘇合香丸見諸氣中風惡症夫口開者心氣絶遺尿者腎氣絶鼻鼾者肺氣絶手撒者脾氣絶及髮直吐沫睛如直視聲如鼾睡者不治之症也及筋枯不活舉動則筋痛是無血以滋養其筋故也面赤如妝環口黧黑汗綴如珠不治之症也一論中風中氣痰厥不省人事牙關緊急湯水不下宜奪命通關散皂角如豬牙者去皮弦二兩用生白礬一兩以苧布包入水與牙皂同煮化去白礬再煮令乾取出曬乾為末遼細辛去土葉為末五錢上合勻每遇痰厥或喉閉不省人事者先以少許吹鼻候有嚏可治無嚏不可治卻用蜜湯調服二匙即吐痰不吐再服一方用半夏為末少許吹鼻即效一治牙噤不開用烏梅肉及南星細辛末以中指蘸藥擦牙自開一治中風痰厥不省人事者用巴豆去殼紙包捶油在紙上將麝少許入紙卷作筒油浸透燒煙吹滅熏鼻一治中風不語或倒地不省人事及左癱右瘓口眼喎斜須以諸藥末服之先用真麝香三分為細末加麻油三兩攪勻將病人口撬開灌下通其關竅即便蘇醒一論卒中不問中風中寒中暑中濕及痰飲氣厥之類不省人事初作用此方攝生飲南星濕紙包一錢五分半夏生薑汁泡一錢五分木香一錢五分蒼朮生一錢遼細辛一錢石菖蒲一錢甘草生一錢上銼一劑生薑七片水煎溫服痰盛加全蠍炙二枚仍先用通關散吹鼻一論中風痰涎壅盛不能言語不省人事牙關緊急有火有痰有氣或面赤身熱手足溫暖脈緊盛宜服此方清熱導痰湯黃連八分黃芩二錢栝蔞仁四錢去殼枳實二錢麩炒桔梗八分白朮一錢五分去蘆白茯苓三錢去皮陳皮二錢半夏二錢南星二錢人參三錢甘草八分上銼一劑生薑三片棗一枚水煎熟入竹瀝薑汁同服一方加防風白附子尤效一論中風昏冒不知人事口眼喎斜半身不遂咽喉作聲痰氣上壅無問外感風寒內傷喜怒或六脈沉伏或指下浮盛並宜服之兼治痰厥飲厥及氣虛眩暈症屬虛寒者宜服三生飲南星生五錢川烏去皮尖生一錢大附子去皮尖生一錢木香一錢半上銼一劑生薑十片水煎溫服氣虛之人虛弱之甚加人參一兩如氣盛人只用南星五錢木香一錢生薑十四片水煎服名星香散一論中風卒然倒僕牙關緊急不省人事並解上膈壅熱痰涎不利咽喉腫閉一應熱毒又能消食化氣兼治食瘧取積下熱並纏喉風卒死心頭猶溫灌起立蘇雄黃解毒丸方見小兒通治壯盛之人暫服一論中風暗風氣厥不省人事宜服牛黃紫金丹牛黃三分硃砂二分阿芙蓉一錢沉香一錢冰片三分廣木香五分麝香二分上為細末人乳為丸四十數陰乾每服一丸梨汁送下如無梨汁薄荷湯研化灌下立蘇一論初中風邪四肢麻痹骨節疼痛手足癱瘓語言謇澀宜服此方烏藥順氣散烏藥陳皮各二錢麻黃去節川芎白芷桔梗枳殼麩炒各一錢殭蠶炒乾薑各五分炮甘草炙三分上銼一劑薑棗煎服口眼喎斜加薑炒黃連羌活防風荊芥竹瀝薑汁左癱右瘓加天麻當歸皮膚燥癢加蟬蛻薄荷一論風中腑者多著四肢手足拘急不仁面色如土惡風寒為在表也宜用此方疏風湯當歸川芎白茯苓去皮陳皮半夏泡炒烏藥香附白芷羌活防風各八分麻黃五分甘草細辛各二分上銼一劑生薑三片水煎熱服一論風中臟者多滯九竅唇緩失音耳聾鼻塞目瞀二便閉澀為在裡也宜服此方潤腸湯當歸生地黃枳殼去穰厚朴薑炒檳榔大黃火麻仁杏仁去皮各二錢羌活七分紅花三分上銼一劑水煎空心溫服一論中風一切風熱大便閉結小便赤澀頭面生瘡眼目赤痛或熱極生風舌強口噤或鼻生紫赤風刺癮疹而為肺風或成風癘而世呼為大風或腸風而為痔漏或腸鬱而為諸熱譫妄驚狂並皆治之防風通聖散防風歸身川芎白芍連翹薄荷麻黃各四分石膏桔梗黃芩各八分白朮梔子荊芥各三分滑石二錢四分大黃芒硝各四分甘草一錢上銼一劑生薑煎服自利去硝黃自汗去麻黃解利四時傷寒兩感每一兩加益元散一兩蔥白十根豆豉一撮生薑五片水煎熱服一論風中血脈者外無六經之形症內無便溺之阻隔肢不能舉口不能言為在中也宜此方養榮湯當歸三錢酒洗川芎一錢五分生地黃四兩白芍二錢酒炒麥門冬三錢去心遠志八分甘草湯泡去心石菖蒲一錢去毛南星二錢半夏二錢薑製陳皮一錢五分白茯苓三錢去皮枳實二錢麩炒烏藥一錢黃連八分薑炒防風一錢五分羌活二錢秦艽二錢甘草八分上各等分加竹茹一團生薑三片水煎服一治中風瘛瘲舌謇不語並失音不能言語用此方轉舌膏連翹一兩梔子五錢黃芩酒炒五錢薄荷一兩桔梗五錢大黃酒蒸五錢玄明粉五錢防風五錢川芎三錢遠志甘草湯泡一兩石菖蒲六錢甘草五錢犀角二錢柿霜一兩牛黃五錢琥珀一錢珍珠一錢上為細末煉蜜為丸如彈子大硃砂五錢為衣每一丸細嚼薄荷湯送食後臨臥服一治中風失音用韭菜汁灌之或用白殭蠶末酒調服一治舌大不能言語青黛三分冰片三分硼砂二錢牛黃三分南薄荷葉三錢上為細末先以蜜水洗舌上後以薑汁擦之將藥蜜水調稀搽舌上一治中風不語痰迷心竅舌不能言南星一兩防風五錢上為細末麵糊為丸如桐子大每服五十丸薑湯送下一治中風卒不得語以苦酒煮白芥子敷頸以帛包之一日一夕即瘥一治中風喑啞不能言大黃一兩芒硝二兩當歸二兩甘草五錢上銼水煎服瀉下後用四物湯加殭蠶一兩作二服之一治腎氣虛弱舌喑不能言足痿不能行地黃飲子熟地黃四錢巴戟三錢去心石棗三錢酒蒸去核肉蓯蓉三錢酒洗薄荷八分少許石斛三錢大附子八分泡五味子三分白茯苓三錢去皮石菖蒲一錢遠志八分甘草水泡去心官桂八分麥門冬三錢去心上銼生薑棗子水煎溫服一論風中經絡則口眼喎斜也宜此方復正湯防風一錢荊芥一錢細辛八分黃芩二錢烏藥二錢天麻二錢當歸三錢酒洗白芍二錢酒炒川芎一錢五分白朮一錢五分去蘆陳皮一錢五分去白半夏二錢枳殼一錢去穰麩炒白芷八分桔梗八分殭蠶三錢甘草八分白茯苓二錢去皮上銼生薑煎服一治口眼喎斜及手足頑麻蒼朮米泔炒一兩半陳皮三兩南星一兩五錢半夏二兩五錢白茯苓二兩五錢防風一兩五錢羌活六錢天麻三兩五錢白殭蠶一兩大川烏炮六錢粉草六錢上銼生薑三片水煎服臨服入生薑汁三匙溫服一治諸風口眼歪斜金刀如聖散川烏炮用三錢草烏炮三錢防風二錢川芎二錢白芷四錢雄黃二錢細辛二錢蒼朮四錢天麻五分白朮五分麻黃五分上為細末每服五分臨臥溫酒調服一治中風口眼不正語則牽急四肢如故無他苦由居處不適因臥而邪風入耳客陽明經故令筋不調而口歪僻皂角膏大皂角五兩去皮子為末以三年米醋和成膏左喎塗右右喎塗左干更塗之一方用新礦石灰一合以酸醋炒調如泥口面喎向右即於左邊塗之向左即於右邊塗之候正如舊即須以水洗下其效如神一治卒暴中風口眼喎斜天仙膏天南星草烏白芨俱用大者各一兩殭蠶七個上為細末薑汁調如前塗正便洗去一治口眼喎斜正顏丹白芷二兩獨活二兩薄荷一兩上為細末蜜丸如彈子大每服一丸細嚼茶清下一論癱瘓之症因虛而痰火流注為病當時以速治為妙若失之於初痰火停久便成郁郁久便生火火能傷氣耗血而痰則難治矣如疼痛則為實用疏通關節之藥而與腦麝少許為引經如不痛則為虛服此疏通關節之藥亦要兼服補氣血藥如此攻補兼施而癱瘓可愈矣一論癱者坦也筋脈弛縱坦然而不舉也瘓者渙也血氣散漫渙然而不用也或血虛或氣虛不足之症也一論中風手足軟弱不能舉動外症自汗者虛中風也若手足強急口眼喎斜伸縱痛者實中風也一論中風左癱左半身不遂屬血虛乃痰火流注於左而為左癱也宜後方一論中風右瘓右半身不遂屬氣虛乃痰火流注於右而為右瘓也宜後方一論一切中風左癱右瘓半身不遂口眼歪斜語言謇澀呵欠噴嚏頭目眩暈筋骨時痛頭或痛心中忪悸痰火熾盛此乃血氣大虛脾胃虧損有痰有火有風有濕此總治諸風之神方也上池飲即愈風潤燥湯加人參烏藥人參去蘆二錢臺白朮去蘆炒一錢五分白茯苓去皮五錢當歸酒洗一錢二分川芎一錢二分杭白芍酒炒一錢懷生地黃薑汁炒一錢熟地黃薑汁炒一錢南星薑汁炒一錢半夏薑製一錢陳皮鹽水洗八分羌活六分防風六分天麻一錢去油牛膝去蘆酒洗八分川紅花酒洗四分柳枝六分寒月一分黃芩酒炒八分黃柏酒炒三分夏月加一分酸棗仁炒八分烏藥四分甘草炙四分上銼一劑水煎入竹瀝薑汁清旦時溫服言語謇澀加石菖蒲一患風痰人多有痰熱每湯藥宜加竹瀝荊瀝薑汁同服甚妙三味和一處溫服亦可一論中風等症因內傷者非外來風邪乃本氣自病也多因勞役過度耗散真氣憂喜忿怒傷其氣者而卒倒昏不知人則為左癱右瘓口眼喎斜四肢麻木舌本強硬語言不清等症宜此方補中益氣湯黃耆蜜水炒一錢五分人參去蘆一錢白朮去清蘆炒一錢陳皮一錢當歸酒洗一錢柴胡去蘆五分升麻五分甘草炙一錢上銼一劑生薑棗子水煎服加酒炒黃柏三分以滋腎水瀉陰中之伏火也紅花三分而入心養血一中風卒倒因勞傷者過於勞役耗損元氣脾胃虛弱不任風寒故昏冒也宜本方一左癱右瘓加防風羌活天麻半夏南星木香一語言謇澀加石菖蒲竹瀝一口眼喎斜加薑炒黃連羌活防風荊芥竹瀝薑汁一中風痰喘因中氣虛飲食素少忽痰壅氣喘頭搖目札揚手擲足難以候脈視其面色黃中見青此肝木乘脾土依本方加白茯苓半夏水煎臨熟加薑汁同服一中風面目十指俱麻乃氣虛也加大附子制木香羌活防風烏藥麥門冬一善飲舌本強硬語言不清此脾虛濕熱加神麯麥芽乾葛澤瀉一論中風等症因房勞者名曰內風房勞過度則真精暴亡舌本欠柔言不利也精血一虧即水竭而心火暴甚腎水虛衰不能制之則陰虛陽實而熱氣怫鬱心神昏冒筋骨不用而卒倒無所知也或一肢之偏枯或半身而不遂或口眼之歪斜或言語之謇澀悉宜此方或湯或丸皆可六味地黃丸懷生地黃酒拌蒸一日令極黑曬乾八兩山茱萸酒蒸去核取肉四兩牡丹皮去骨三兩懷山藥四兩白茯苓去皮三兩澤瀉三兩上為細末煉蜜為丸如桐子大每服三錢空心鹽湯任下忌三白兼補右尺相火加大附子麵裹火煨去皮臍切片童便浸焙乾二兩官桂二兩名八味丸一論中風氣血衰弱痰火上升虛損之症左癱右瘓中風不語手足臂體疼痛動履不便飲食少進人乳二酒盞壯盛婦人香甜者好甜梨汁一酒盞傾放銀鏇中或錫器內入湯鍋內頓滾熱有黃沫起開清路為度每日五更後一服能消諸痰補虛生血延壽乃以人補人其效無加其中風不語半身不遂曾照此方治驗豫嘗以此乳與地黃丸兼進屢屢獲效一論補中益氣湯六味地黃丸二方一治元氣脾胃之虛一治腎水真陰之弱若病人素稟虛弱者或患病久不愈者或誤服攻擊之過者又非外中於風者悉宜此二方兼而濟之乃王道平和之劑能收萬全之功也若病者虛寒之甚年過四旬之外者又當以十全大補湯斑龍固本丹之類專治左癱右瘓年久不愈大補虛寒之聖藥也加味十全大補湯黃耆蜜水炒人參去蘆白朮去油蘆炒白茯苓去皮甘草炙各五分當歸酒洗川芎白芍酒炒熟地黃各八分大附子麵裹煨去皮臍沉香木香各三分烏藥牛膝去蘆酒炒杜仲去皮酒炒木瓜防風去蘆羌活獨活薏苡仁各五分肉桂甘草炙各三分上銼一劑薑棗煎服一論中風左癱右瘓手足不能動舌強謇於言與上池飲或地黃飲子兼服神效健步虎潛丸黃耆鹽水炒一兩五錢人參一兩白朮去蘆二兩白茯神去皮木三兩當歸酒洗一兩五錢白芍鹽水炒二兩生地黃酒洗二兩熟地黃二兩甘枸杞子一兩五錢五味子五錢虎脛骨酥炙二兩龜板酥炙一兩五錢牛膝去蘆酒洗二兩杜仲薑酒炒二兩破故紙鹽酒炒一兩半黃柏人乳拌鹽酒炒三兩知母同上制二兩麥門冬去心二兩遠志甘草水泡去心一兩石菖蒲一兩酸棗仁炒一兩沉香五錢木瓜一兩薏苡仁炒一兩羌活酒浸一兩獨活酒洗一兩防風酒洗一兩大附子童便浸三日麵裹煨去皮臍切四片童便浸煮乾五錢半上為細末煉蜜和豬脊髓五條和為丸如梧桐子大每服百丸空心鹽湯溫酒任下一論經驗之方滋補之聖藥專治諸虛百損五勞七傷形容羸瘦顏色衰朽中年陽事不舉精神短少未至五旬發須先白並左癱右瘓步履艱辛腳膝痠軟小腹疝氣婦人下元虛冷久無孕育服之神效斑龍固本丹人參去蘆二兩乾山藥二兩懷生地黃二兩熟地黃酒蒸二兩天門冬去心二兩菟絲子酒煨搗餅焙乾四兩山茱萸酒蒸去核二兩巴戟酒浸去心二兩甘枸杞子二兩麥門冬去心二兩杜仲薑炒二兩五味子二兩肉蓯蓉酒浸二兩牛膝酒洗去蘆二兩遠志甘草水泡去心一兩覆盆子二兩五錢澤瀉一兩地骨皮一兩五錢老川椒一兩白茯苓去皮二兩石菖蒲二兩車前子一兩五錢大附子麵裹煨去皮臍切片童便浸炒一兩木香二兩虎脛骨酥炙二兩柏子仁二兩上為細末用好酒化五仁斑龍膏為丸如梧桐子大每服百丸空心溫酒送下斑龍膠方見補益久服神氣不衰身輕體健一治癱瘓祕方蛤蚧一對麻黃四兩川烏二兩草烏二兩透骨草四兩艾一把川椒四兩白花蛇四錢防風四兩紫花地丁一升大鹽四兩槐枝一條上用水二桶煎用大缸半埋在地待水溫時坐上洗再用水二桶煎渣候冷時再入熱水或一日或一夜臨出時用水洗頂心數次再用芥末稀貼患處紙絹裹熱坑上睡汗出盡為度忌早起飲食就臥甚妙一論仙傳史國公浸酒良方史國公染風疾半體偏枯手足拘攣不堪行步宣醫診治良劑屢投治越十載全無寸效乞歸故里廣訪名醫途至奉先驛獲遇異人陳述病狀蒙授一方依方浸酒未服之先非人扶之不能起及飲一升便手能梳頭服二升手足屈伸有力服三升言語舒暢行步如故服四升肢體通緩百節遂和舉步如飛其效如神言之不可盡述防風去蘆一兩秦艽去蘆四兩甘枸杞子五兩白朮去蘆二兩萆薢酒炙二兩羌活一兩干茄根飯上蒸熟八兩牛膝去蘆酒洗二兩虎脛骨酥炙二兩鱉甲九肋者炙一兩當歸油松節捶碎二兩晚蠶砂炒二兩蒼耳子捶碎四兩川杜仲薑酒炒二兩一方加花蛇酒浸去皮骨四兩其效如神上細銼用好酒三十五斤將生絹袋盛藥懸浸於內封固過十四日將壇入鍋懸空著水煮令壇內滾響取出埋入土內三日去火毒開壇取酒不可以面對壇口恐藥力沖傷眼目每飲一二鍾毋令藥性斷絶忌動風之物凡制此酒不可煮之太過則無效只可盡一炷香為度凡左癱右瘓口眼喎斜四肢麻痹筋骨疼痛三十種風疾並四般氣無不效也仙靈酒仙靈脾一名淫羊藿一斤切碎以生絹袋盛不滲器內用好酒浸之厚紙重重封固春夏三日秋冬五日後開壇隨量飲之當令醺醺莫得大醉治一切冷風勞氣補腰膝強心力丈夫絶陽不起女子絶陰無子老人昏耄健忘服之最良兼治偏風手足不遂皮膚不仁等症一論男婦小兒諸風症左癱右瘓半身不遂口眼歪斜腰腿痛疼及手足頑麻語言謇澀行步艱難遍身瘡癬上攻頭目耳內蟬鳴痰涎不利皮膚瘙癢偏正頭風無問新舊及破傷風角弓反張蛇犬咬傷金刀所傷出血不止敷貼立效痔漏膿血痛楚難禁服之頓愈千金不換刀圭散太府劉水山傳人參川烏草烏二味俱用火炮去皮臍白茯苓去皮各一錢五分兩頭尖蒼朮米泔洗各一錢甘草炙一兩五錢殭蠶炒三錢五分真白花蛇酒浸三日去酒火炙去皮骨石斛酒洗各五錢川芎白芷細辛當歸酒洗防風麻黃藁本各二錢五分全蠍瓦上焙乾天麻何首烏米泔浸忌鐵器荊芥各二錢五分上為細末每服三分或五分漸加至六七分臨臥酒調下不飲酒者蔥亦可服一論治男婦血氣衰敗外感風濕傳於經絡手足麻木遍身筋骨腰腿疼痛久則成左癱右瘓口眼喎斜諸中風氣不能步履仙傳黑虎丹蒼朮米泔浸二宿去皮切片草烏洗淨去皮切片生薑洗淨研碎生蔥連須白葉研二兩上四味和一處拌勻灰之春五夏三秋七冬十每日一番拌勻候日數足曬乾入後藥五靈脂乳香沒藥各一錢二分半穿山甲炮去灰土五錢自然銅火煨醋淬七次二錢五分上同前藥為末好醋糊為丸如梧桐子大每服三十丸空心熱酒送下間日服尤妙婦人血海虛冷肚腹疼痛臨臥醋湯下止服二三十丸不可多服服後不可飲冷水冷物但覺麻木為效孕婦不宜服一女子雞爪風十指搐搦服之立愈一治手足拘攣不伸牙皂木香各等分上銼水煎一服立效一治中風失音不語偏風口眼喎斜時吐涎水四肢麻痹骨間疼痛腰膝無力一切風濕豨蘞丸豨蘞草五月五日六月六日九月九日採者取葉洗淨曬乾入瓶中層層灑酒與蜜蒸之又曬如此九遍為末煉蜜為丸如梧桐子大每服五七十丸溫酒送下一人年近四旬忽發潮熱口乾喜飲冷水求醫治以涼藥投之罔效四五日渾身沉重不能動止四肢強直耳聾譫言妄語眼開不省人事六脈浮大無力此氣血脾胃虧損之極豫以十全大補湯去芍藥地黃加熟附子一服須臾病者鼾睡痰響人咸以為服桂附參耆之誤豫曰此藥病交攻不必憂疑又進一服過一時許即能轉身動止次日連進數劑則諸病次第而潛瘳矣此從脈不從症而治之也一人因素弱飲食起居失宜左半身並手足不遂汗出神昏痰涎上壅一醫用參耆大補之劑汗止而神思漸清頗能動履後不守禁左腿自膝至足腫脹甚大重墜如石痛不能忍其痰極多肝脾腎脈洪大而數重按則軟澀朝用補中益氣加黃柏知母麥門五味煎送地黃丸晚用地黃丸料加黃柏知母數劑諸症悉退但自弛禁不能全愈耳一治癱瘓諸風秦高中玄閣老曾服奏效乳香沒藥三錢棉花子六錢白糖六錢上為細末黃酒化服出汗一男子體肥善飲舌本強硬言語不清口眼喎斜痰氣湧盛肢體不遂余以脾虛濕熱用六君子加葛根山梔神麯而痊一人中風痰嗽因中氣虛飲食數少忽痰壅氣喘頭搖目札揚手擲足難以候脈視其面色黃中見青此肝木乘脾土用補中益氣湯加白茯苓半夏水煎臨服加薑汁同服預防中風一論中風者俱有先兆之症凡人如覺大拇指及次指麻木不仁或手足少力或肌肉蠕動者三年內必有大風之至經曰肌肉蠕動名曰微風故手大指次指手太陰陽明經風多著此經也當預防之宜朝服六味地黃丸或八味丸暮服竹瀝枳朮丸與搜風順氣丸二藥間服久而久之諸病可除何中風之有是以聖人治未病而不治已病一論此方專化痰清火順氣除濕祛眩暈療麻木消酒食開鬱結養氣血健脾胃平常可服竹瀝枳朮丸白朮去蘆土炒蒼朮米泔浸鹽水炒各二兩木香二錢枳實麩炒陳皮去白白茯苓去皮半夏白礬皂角生薑煎水浸一日煮乾南星制同上黃連薑炒條芩酒炒當歸酒洗山楂去子白芥子炒白芍酒炒各一兩人參五錢上為細末以神麯六兩薑汁一盞竹瀝一碗煮糊為丸如梧桐子大每服百丸食遠臨臥淡薑湯送下一論三十六種風七十二般氣上熱下冷腰腳疼痛四肢無力多睡少食日漸羸瘦顏色不完惡瘡下注口苦無味憎寒毛悚積年癥癖氣塊丈夫陽氣斷絶婦人久無嗣息久患寒瘧嘔吐瀉痢腸中積熱以致脅間痞悶大便結燥小便赤澀腸風痔漏肢節頑麻手足癱瘓步履艱辛言語謇澀不問男子婦人小兒皆可服搜風順氣丸錦紋大黃酒浸九蒸九曬要黑色五兩為主火麻仁微炒去殼二兩郁李仁泡去皮二兩枳殼麩炒二兩山茱萸酒蒸去核二兩車前子炒二兩五錢檳榔二兩乾山藥酒蒸二兩懷牛膝去蘆酒洗二兩菟絲子水洗淨酒煨爛搗成餅焙乾二兩獨活一兩上為末蜜丸如梧桐子大每服七十餘丸茶酒任下百無所忌早晚各一服覺臟腑微動以羊肚肺羹補之久患腸風便血服之除根癱瘓語澀服之平復酒後能進一服宿酒盡消中年以後之人過用厚味酒肉多有痰火且不能遠房事往往致陰虛火動動則生風所謂一水不能勝五火也故以此疏風降火為主不論年高氣弱雄壯婦人並皆治之孕婦勿服傷寒脈陽浮而陰弱謂之傷風邪在六經俱弦加之陽浮衛中風也陰弱榮氣弱也風傷陽故浮虛脈浮緊而無汗謂之傷寒寒傷榮榮實衛虛陽脈緊邪在上焦主欲汗脈浮頭項痛腰脊強病在太陽脈長身熱鼻乾目痛不得臥病在陽明脈弦胸脅痛耳聾往來寒熱病在少陽脈沉細咽乾腹滿自利病在太陰脈微緩口燥舌乾而渴病在少陰脈沉澀煩滿囊縮病在厥陰脈陰陽俱盛重感於寒而緊澀變為溫瘧陰陽緊盛傷寒之脈前病熱未已復感於寒也脈陽洪數陰實大太過濕熱相合變為濕毒洪數大皆熱兩熱相合也脈陽濡弱陰弦緊更遇濕氣變為瘟疫病發熱脈沉細表得太陽名曰痓病脈陽浮滑陰濡而弱更遇於風變為風溫陽脈浮滑陰脈濡弱皆風脈也前脈未除風木乘熱也病太陽關節疼痛而煩脈沉細名曰濕痹病太陽身熱疼痛脈微弱弦芤名曰中暍若發汗已身灼然熱名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼾語難更被下者小便不利若被火微發黃色者則驚癇時瘛瘲若火熏則死矣脈沉細而疾身涼四肢冷煩躁不欲飲水狂悶名曰陽厥傷寒熱盛脈浮而大者生沉小者死已汗沉小者生大者死也脈歌傷寒傷風何以判寒脈緊澀風浮緩傷寒惡寒風惡風傷風自汗寒無汗陽屬膀胱並胃膽陰居脾腎更連肝浮長弦沉細微緩脈症先將表裡看陰病見陽脈者生陽病見陰脈者死傷寒總論夫傷寒者乃大病也生死反掌之間要隨機應變而治之也蓋傷寒發熱惡寒腰痛脊強則知病在太陽經也身熱目痛鼻乾不得眠則知病在陽明經也胸脅痛耳聾口苦舌乾往來寒熱而嘔則知病在少陽經也腹滿咽乾手足自溫或自利不渴或腹滿時痛則知病在太陰經也煩滿囊縮則知病在厥陰經也引衣蜷臥惡寒或舌乾口燥則知病在少陰經也潮熱自汗譫語發渴不惡寒反惡熱揭去衣被揚手擲足或發黃斑狂亂五六日不大便則知病在陽明腑也設若脈症不明誤用麻黃令人汗多亡陽誤用承氣令人大便不禁誤用薑附令人失血發狂正為寒涼耗其胃氣辛熱損其汗液燥熱助其邪熱庸醫殺人莫此為甚傷寒之邪實無定體或入陽經氣分則太陽為首其脈必浮輕手便得或入陰經血分則少陰為先其脈必沉重手乃得浮而有力無力是知表之虛實沉而有力無力是知里之寒熱中而有力無力是知表裡緩急脈有浮沉虛實症乃傳變不常治療之法先分表裡虛實寒熱標本先病為本次病為標先以治其急者此為第一義也問症以知其外察脈以知其內全在活法二字不可拘於日數但見太陽症在直攻太陽但少陰症在直攻少陰但見真寒直攻真寒但見一二症具便作主張不必悉具當何如處此為活法若同而異者明之似是而非者辨之在表者汗之散之在裡者下之利之在上者因而越之下陷者升而舉之從乎中者和解之直中陰經者溫補之若解表不可攻裡日數雖多但有表症而脈浮者尚宜發散此事不明攻之為逆經云一逆尚引日再逆促命期若表症解而里症存者不可攻表日數少但有裡熱而脈沉實者急當下之此事不明禍如反掌經云邪熱未除復加燥熱如抱薪救火矣如直中陰經真寒症也無熱惡寒不渴宜溫補切忌寒涼此事不明殺人甚速陰症似陽症者溫之陽症似陰症者下之陽毒者分輕重下之陰毒者分緩急溫之陽狂者下之陰厥者溫之濕熱發黃者利之下之血症發黃者清之下之發斑者清之下之譫語者下之清之痞滿者消之瀉之結胸者解之下之太陽症似少陰者溫之少陰症似太陽者汗之衄血者解之止之發喘者汗之下之咳嗽者利之解之正傷寒者大汗之大下之感冒寒者微汗之微下之勞力感寒者溫之散之溫熱病者微解之大下之此經常之大法也有病一經而用熱藥寒藥之不同如少陰症有用白虎湯四逆散之寒藥者少陰症有用四逆湯真武湯之熱藥者庸俗狐疑詎能措手哉嗚呼能察其傷寒之症名而得其傷寒之方脈如此親切乃為良醫是知寒藥治少陰乃傳經裡熱也熱藥治少陰乃直中真寒也辨脈定經識症用藥真知其為表也而汗之真知其為裡熱而下之真知其為直中陰經而溫之如此而汗如此而下又如彼而溫麻黃承氣投之不瘥薑附理中用之必當病奚逃乎然必須分輕重緩急老少虛實久病新發婦人胎産室女經水大凡有臨産而傷寒者與男子傷寒治法不同若無胎産治亦相同婦人室女經水適來適斷寒熱似瘧者即是熱入血室但當和解表裡久病者過經不解壞症也新發者始病也老者血氣衰少者血氣壯緩者病之輕也急者病之重也寒藥熱服熱藥涼服中和之劑溫而服之戰汗分四症要知邪正盛衰類傷寒四症照常例而治之也學者宜究心焉傷寒金口訣真傷寒世罕稀多少庸醫莫能知仲景石函節庵泄千金不易傷寒祕方不同法更異四時傷寒各有例惟有冬月正傷寒不與春夏秋同治發表實表兩妙方用在三冬無別治真傷寒真中風表實表虛各自中表虛自汗脈浮緩疏邪實表有奇功表實無汗脈浮緊升陽發表汗自松背惡寒背發熱頭痛脊痛一般説俱屬太陽膀胱經有汗無汗須分別有汗表虛無汗實脈浮緩緊須分別春夏秋別有方通用羌活沖和湯春溫夏熱秋治濕隨時加減細斟量病症與冬皆相似淺深表里脈中詳脈有浮脈有沉半浮半沉表裡停有力無力表虛實或溫或下細推尋更有汗吐下三法當施當設莫留停兩感症日雙傳一日太陽少陰連腎與膀胱脈浮大口乾頭痛是真原二日陽明與太陰沉長之脈脾胃兼目又痛鼻又幹腹滿自利不能安三日少陽厥陰病肝膽脈息見浮弦耳聾脅痛囊蜷縮古人不治命堪憂今有方治兩感症見後補遺陶節庵泄漏方不問陰陽兩感傷通用沖和靈寶飲一服兩解雪澆湯更明表裡多少病治分先後細推詳表病多里病微麻黃葛根湯最奇表緩裡急宜攻裡調胃承氣急通之寒中陰經口不幹身疼發熱自下利脈沉細又無力回陽急救湯最的都言兩感無治法誰知先後有消息結胸症候分輕重雙解六一二方覓陽明症不得眠鼻乾目痛是根源柴葛解肌湯一劑猶如渴急遇甘泉耳聾舌痛半表裡柴胡雙解立蘇痊腹又痛咽又幹桂枝大黃湯可蠲太陽發黃頭有汗茵陳當歸湯獨羡無熱自利是臟寒加味理中湯最端時行疫病身大熱六神通解須當啜小便不利導赤飲下焦蓄血憑斯訣一切下症並結胸六一順氣分明説身有熱頭無痛面赤飲水不下咽庸醫誤認為熱病豈知心火泛上炎自是戴陽多不曉復元湯服得安然汗如珠眼似火發斑狂叫誤認我病在三焦無人識三黃石膏湯最可發斑之症先咳嘔耳聾足冷定無他休發汗愈斑斕消斑青黛飲莫慢勞力感寒症又異調榮養衛金不換內傷血氣外感寒莫與傷寒一例看身出汗熱又渴如神白虎湯最確食積症類傷寒發熱不惡寒嘔逆身不痛頭痛休疑談只消加味調中飲氣口緊盛休變延小便利大便黑桃仁承氣對君説熱邪傳裡蓄血症血熱目利病妥貼吐血衄血另有方生地芩連湯最切陰格陽難遍詳陰極發厥面戴陽欲赴井中脈無力急救回陽返本湯水不下咽瘀血症加減犀角地黃湯真中寒真厥症回陽救急湯連進陽毒發斑脈洪數三黃巨勝湯之症原無熱精采不與人相攝熱結膀胱休誤下桂苓飲子真奇絶心下硬痛利清水熱積利症醫莫測又譫語又作渴身熱黃龍湯莫錯口噤搖頭名痙痓如聖飲內抽添訣瘥後昏沉百合病柴胡百合湯休越亡陽症過汗多頭痛振振病不和筋惕肉瞤虛太甚溫經益元湯最和男女勞復陰陽易逍遙湯治脈沉疴腳氣症類傷寒禁用補劑與湯丸暑中傷熱寒中冷浮風弱濕脈之端便閉嘔逆難伸屈加減續命湯保全撮空症仔細認休認風症誤人命循衣摸床為症驗叉手摸胸不識人只因肝熱相傷肺升陽散火效如神睡覺中忽言語夢寐昏昏神不主湯粥與之雖吞咽形如中酒多不舉心火克肺越經症瀉心導赤湯急取身熱渴不頭疼神思昏昏亂語言小水不利大便黑誤投涼藥命難全病傳心肺夾血症當歸活血湯最玄夾痰症類傷寒寒熱昏迷頭又眩涎出口中為症驗七情內損傷之根神出舍空亂語言加味導痰湯可增大頭病是天行項腫惡寒熱並煎一劑芩連消毒飲痰火喉痹盡安全此是先賢千古祕不是知音莫浪傳出汗良法一嚴冬傷寒不得汗出宜薑蔥各半斤煎湯一斛傾大盆中用小板一塊橫加盆上令患人坐臥其上蒸之外以席被圍定露其口鼻外可進發汗藥一病人用大指捏住中指中節緊捏莫放十指俱屈合掌夾在兩大腿中緊緊坐住待良久汗自出一用發表藥不出汗將蘇葉煎湯以器盛之置於被內兩膝下熏之又法用薑渣綿裹周身擦之汗即出一傷寒連日不出汗昏睡不省身熱語亂此汗不得出也用滾水一大茶壺布包放病人腳下踏之一時汗自下而上其病即愈一傷寒不得汗出用樟樹白皮搗爛炒熱絹巾包烙渾身上一時汗出即已一傷寒發熱頭疼身痛用生薑連須蔥淡豆豉等分共搗爛為餅搭臍上帛緊勒汗自出而已王景明傳一傷寒無汗或日久汗不出者用甜梨一個生薑一塊同搗為汁再入童便一碗量湯煮熱服之即汗一傷寒單潮發熱無汗五七日不大便死在旦夕以桃仁承氣湯打下硬糞如石二次即出大汗而已後以溫膽湯二劑調理而安一治傷寒發熱頭痛亦治感冒生薑一塊核桃七個打碎連殼蔥白連須七根茶葉一撮上水三碗煎熱服蓋被出汗一論傷寒昏迷不省人事以皂角刺燃煙入鼻有嚏可治無則不治肺氣上絶也可治者隨用皂莢半夏生白礬一錢五分共為末入薑汁調服探吐痰去蘇醒為效一論汗出不止將病人發按在水盆中足冷於外用炒麥麩皮糯米粉龍骨牡蠣煅為末和勻周身撲之其汗自止傷寒諸方一論冬月正傷寒頭疼發熱惡寒項脊強重脈浮緊無汗是足太陽膀胱經表症若頭如斧劈身似火炙者宜此方升陽發表湯麻黃一錢杏仁三錢桂枝一錢川芎一錢五分白芷二錢羌活二錢防風一錢五分升麻八分上銼薑蔥豆豉水煎熱服出汗汗出藥止勿多服一論冬月正傷風頭疼發熱惡寒鼻塞項脊強重脈浮緩自汗為表症也此足太陽膀胱經受邪當實表散邪無汗者不可服疏邪實表湯桂枝一錢白朮一錢五分去蘆芍藥二錢甘草一錢防風一錢五分羌活二錢川芎上銼生薑三片棗二枚水煎溫服汗不止加黃耆蜜水炒喘加柴胡八分杏仁三錢胸中飽悶加枳殼一錢麩炒去穰桔梗八分一論春夏秋非時感冒暴寒頭疼發熱惡寒無汗脊強脈浮緊此足太陽膀胱受邪是表症宜發表不與冬時正傷寒同治法此方非獨治三時暴寒春可治溫夏可治熱秋可治濕治雜病亦有神也可代麻黃湯桂枝湯大青龍湯各半湯乃太陽經神藥也羌活沖和湯又名神解散蒼朮泔制一錢羌活一錢防風一錢五分川芎一錢五分白芷一錢細辛二分黃芩一錢生地一錢甘草二分上銼生薑蔥白水煎熱服出汗胸中飽悶加枳殼去穰桔梗去蘆夏月加石膏知母有汗去蒼朮加白朮再不止去細辛加黃耆蜜炙如再不止以小柴胡湯加桂枝芍藥一錢名神術湯不作汗加蘇葉一論足陽明胃經身熱鼻乾不眠微惡寒頭痛眼眶痛脈微洪宜解肌此屬陽明經病其正陽明腑病別有治法柴葛解肌湯柴胡八分黃芩二錢芍藥二錢葛根二錢羌活二錢石膏三錢桔梗八分甘草