芩二錢黃柏一錢五分梔子二錢上銼水煎服一治傷寒熱極發狂不認親疏躁熱之極長垣成都憲傳用熊膽一分研末涼水調服立效一論惡風寒鼻流清涕寒噤噴嚏此脾肺虛不能實腠理補中益氣湯方見內傷依本方加麥門冬三錢五味子三分一治傷寒感冒頭疼發熱古石灰緑豆粉鬧羊花各等分上為末每少許吹兩鼻一二次效一論傷風寒後餘毒未散上攻頭頸鼻塞聲重怒氣上攻時常有血從腦上落至口中或出紅痰此陽道不利作梗非血症也防風五分川芎七分辛夷五分生甘草四分薄荷五分羌活三分獨活七分升麻六分葛根七分白芷四分藁本四分黃芩酒炒八分上銼一劑生薑一片水煎服清陽道以通關竅然後可以養正也次服人參養榮湯熟地黃六分白芍七分麥門冬一錢五味子六個黃柏酒炒三分遠志四分陳皮三分人參四分白朮六分白茯苓四分歸身酒洗四分川芎四分上銼一劑水煎溫服中寒中寒脈緊者陰陽俱盛法當無汗有汗傷命一論中寒卒倒昏迷不省者先用熱酒薑汁各半盞灌服稍醒後進理中湯方見於後一論真陰症四肢厥冷腹痛如錐脹急服大附薑桂壯火此中焦寒冷之症宜急灸臍上二穴臍下一穴臍左右兩穴每七壯即效一論四肢渾身冷極唇青厥冷無脈陰囊縮者宜急用蔥尉法並艾灸臍中與氣海開元二三十壯一論三陰中寒一切虛冷厥逆嘔噦陰盛陽虛及陰毒傷寒四肢厥冷臍腹刺痛咽痛嘔吐下利身背強自汗流脈沉細唇青面黑諸虛寒等症宜用蔥尉法蔥細切麥麩各三升鹽二升上用水和勻分作二次炒令極熱用重絹包之乘熱尉臍上冷更易一包其蔥包既冷再用水潤濕炒焦依前用之至糜爛不用別取蔥麩日夜尉之勿住如大小便不通用此亦可以行其勢矣一論五臟中寒口噤失音四肢強直兼胃脘停痰冷氣刺痛又治臟毒下寒泄痢腹脹大便或黃或白或青黑或有清穀宜此方理中湯人參三錢白朮二錢去蘆炒乾薑一錢甘草一錢炒上銼一劑生薑三片棗一枚水煎熱服如寒冷之甚加大附子麵裹煨去皮臍一錢名附子理中湯苦寒加乾薑五分腹痛去白朮加附子一錢一中寒脈虛而微細躁熱煩渴可煎理中湯水中浸冷服之不可熱服用寒涼之藥服之決死一論中寒怕寒身涼四肢厥冷腹痛吐瀉無脈者此寒中陰經也宜服此方回陽急救湯人參三錢白朮二錢去蘆炒白茯苓三錢陳皮一錢五分半夏二錢肉桂八分大附子八分炮去臍五味子三分甘草八分乾薑八分上銼生薑煎服無脈加豬膽汁一匙一論中寒外感寒邪頭疼身痛內傷生冷肚腹脹痛表裡皆中寒邪也宜此方五積散白芷陳皮厚朴薑炒桔梗枳殼去穰麩炒川芎白芍酒炒白茯苓去皮蒼朮米泔浸當歸酒洗半夏湯泡各一錢乾薑官桂各五分麻黃八分甘草三分上銼薑棗煎熱服一治陰毒傷寒面青心硬四肢冷正陽散大附子八分乾薑八分甘草八分麝香一釐皂莢一錢引入厥陰經也上銼水煎熱服瘟疫脈陽濡弱陰弦緊更遇濕氣變為瘟疫溫病汗不出出不至足者死厥逆汗自出脈堅強急者生虛軟者死一論天行瘟疫傳染凡患瘟疫之家將出病人衣服於甑上蒸過則一家不染若親戚鄉里有患瘟疫欲去看問先將清油抹鼻孔任進候出外又將紙捻於鼻內探取噴嚏三五個則不染一論瘟疫之氣令人不相傳染瘟病及傷寒用屠蘇酒屠蘇是羽帳名豐貴之家正月眷屬會羽帳之中飲此酒以闢瘟疫邪氣大黃十五銖白朮十銖桔梗十五銖川椒十五銖炒出汗六錢二分防風六銖烏頭六銖桂枝十五銖菝契六銖即古之二錢半二十四銖為一兩上㕮咀絳囊盛以十二月晦日早懸沉井中至泥正旦平曉出藥置酒中屠蘇之東向戶中飲之屠蘇之飲先從小起多少自在飲藥酒三朝還置井中當家內外並皆著藥闢瘟疫也忌豬肉生蔥桃李雀肉等物一宣聖闢瘟方用臘月二十四日井花水在平旦第一汲水盛淨器中量人口多少浸乳香至歲旦五更暖令溫從小至大每人用茶杯盛一小塊飲水一二呷咽下則一年不患疫一論瘟疫之病皆是大熱之症不可妄用熱藥一治瘟疫不相傳染方用小赤豆以新布袋盛入井中浸二日與家人各服二十一粒闢穢丹乳香蒼朮細辛甘松川芎真降香上為末烈火焚之疫邪遠闢一九味羌活湯治瘟疫初感一二日間服之取汗而愈其效如神一論衆人病一般者天行時疫也其症頭面腫大咽喉不利舌乾口燥憎寒壯熱時氣流傳不問四時瘟疫通用此方加減敗毒散防風一錢五分荊芥二錢羌活二錢獨活二錢前胡二錢升麻五分乾葛一錢赤芍二錢桔梗八分川芎一錢五分白芷二錢薄荷八分牛蒡子三錢甘草八分柴胡八分上銼薑蔥煎熱服出汗一論時毒頭面紅腫咽嗌堵塞水藥不下若素有臟腑積熱發為腫毒疙瘩一切惡毒紅腫而痛宜此方漏蘆湯漏蘆二錢升麻一錢五分玄參一錢牛蒡子一錢連翹一錢桔梗一錢黃芩酒洗一錢五分大黃酒浸甘草各一錢藍葉二錢半如無以青黛五分代之上銼一劑水煎溫服大便實加芒硝一錢一治大頭瘟病額大項腫八聖散大尹許即洲傳黃芩黃連黃柏蒲黃各五錢雄黃蛇蛻炒雞內金白丁香各二錢上為末每服一錢用藍靛根煎湯送下瘴氣一論夾嵐瘴氣溪源蒸毒之氣其狀血乘上焦病欲來時令人迷困甚則發躁狂妄亦有啞不能言者皆由敗血瘀於心毒涎聚於脾經所致宜驅瘴湯人參柴胡黃芩半夏大黃枳殼甘草各等分上銼每服一兩薑棗煎空心服啞瘴食後服一論海內縉紳遊宦四方水土不服常用此方若任兩廣尤宜多服理脾卻瘴湯陳皮炒白朮去蘆炒茯神去皮木黃芩炒梔子炒半夏薑製各一錢神麯炒八分山楂肉一錢黃連薑汁炒前胡各八分蒼朮米泔水浸鹽水炒八分甘草五分上銼生薑煎服不拘時一日一服或間日一服可免瘴病何也蒼白二術去濕芩連清熱解毒二陳化痰楂曲理脾百病自卻去矣更宜戒酒色慎起居一論四時不正之氣寒瘴時氣山嵐瘴氣雨濕蒸氣或中寒腹痛吐利中暑冒風吐瀉中濕身重泄瀉或不服水土脾胃不和或飲食停滯復感外寒頭痛憎寒或吐逆噁心胸膈痞悶或發寒熱無汗者宜藿香正氣散主之方見霍亂一論四時傷寒瘟疫時氣及山嵐瘴氣寒熱往來霍亂吐瀉下痢赤白或出遠方不服水土並治之金不換正氣散蒼朮二錢米泔浸陳皮一錢五分厚朴八分去皮薑汁炒藿香三錢半夏二錢湯泡薑汁炒甘草八分上銼薑棗煎服有濕加白朮茯苓名除濕湯頭痛加川芎白芷潮熱加柴胡黃芩口燥心煩加柴胡乾葛冷瀉不止加木香訶子肉豆蔻瘧疾加常山檳榔草果痢疾加黃連枳殼去藿香咳嗽加桔梗杏仁五味子喘急加麻黃蘇子桑白皮身體疼痛加麻黃桂枝赤芍感寒腹痛加乾薑官桂嘔逆加丁香砂仁氣塊加三稜枳殼檳榔小茴香極熱大便不通加大黃芒硝腹脹加香附枳殼白豆蔻胸脅脹滿加枳實砂仁莪朮兩足浮腫加木瓜大腹皮五加皮加人參茯苓草果名人參養胃湯加川芎官桂煎吞安腎丸治脾胃肝腎俱虛風入四體筋骨緩弱不仁仍早晨常服炒黑豆淋酒一論傷風傷寒頭目不清如被疫氣所侵之人少覺頭昏腦悶急取嚏之毒氣隨散永無傳染真仙方也救苦散芎藿藜蘆三雄芷皂角四玄胡牡丹皮硃砂為伴侶一點透玄門起死回生路有人知此術永無傷寒苦川芎藿香藜蘆各三錢牡丹皮玄胡索硃砂水飛各三錢雄黃水飛白芷牙皂各四錢上為末用一些兒先噙水在口中以竹筒吹入兩鼻嚏之出清涕為佳凡畜類受瘟者吹之即愈中暑脈虛微細弦芤遲皆屬於中暑不可汗下但解熱利小便為要夫暑者乃長夏盛熱之令也人當避酷熱之亢相安於燔炙之宜毋冒灼灼毋致愴愴其知道者夏以養陰扶陽順之則祥逆之則殃故三伏炎炎三暑蒸蒸腠理開泄真氣不藏孫思邈云長夏宜服五味子人參麥門冬以固耗散之金真氣不足者倍加人參其不善養者坐臥於風涼之處扇不息於寢寐之時或拭以冷布或浴以涼泉則腠理寒侵逆其時令即病曰傷暑矣其藏於肌表之間至秋收斂陽回邪正交爭故寒熱兢兢作病名曰瘧者也其有過食瓜果好飲梅漿冷水吞泉噙水及愛食涼湯生蔬此傷暑於腸胃或為霍亂等症遺於秋病發曰痢疾脾寒等症此有人傷於暑者也飢渴於道途及乘虛而冒暑或運氣之兼勝而病曰暑病感之深者曰中暑皆作頭疼昏憒發熱傷寒則身熱而脈大惟傷暑則身熱而脈小又有暑風者神昏身體拘急類若中風痓病相似此為極重之候蓋必其人元氣素弱真陰不足感於金消水涸之時則內外兩虛法當清補倍加生脈散緣夏乃陽外陰內表裡不實清暑益氣湯最為精確以香藿飲為卻暑之藥一論暑者天地炎熱之氣中之多成吐瀉身熱頭痛煩渴甚則昏迷不知人事如遇是病切不可飲以冷水令臥濕地當以熱湯灌之俟其蘇醒投之以藥可也盛暑切戒勞苦淫欲之事諺云六月莫入房勝似灸膏肓誠哉是言也虛弱之人尤宜謹焉一論凡行人或農夫於日中勞役得之者名曰中熱其病必苦頭痛發燥熱惡熱捫之肌膚大熱必大渴引飲汗大泄無氣以動乃為天熱外傷肺氣也宜人參白虎湯主之方見傷寒一論凡人之暑於深堂大廈而得病者名曰中暑其病必頭痛惡寒身戰而急肢節痛而心煩肌膚大熱無汗為房室之陰寒所遏使周身陽氣不得伸越宜辛溫之劑以解表散寒五積散主之方見中寒一論傷暑則脈虛而身熱口燥咽乾或吐或瀉或背惡寒者蓋暑傷心心不受邪則包絡受之包絡相火以火助火則熱盛而昏不醒也大抵清心利小便為主黃連香薷飲川厚朴去皮薑汁浸炒五錢白扁豆微炒五錢香薷去土五錢加黃連薑汁炒名黃連香薷散上銼一劑水煎入酒一分澄冷不拘時服熱則作瀉心煩熱多或吐逆加薑汁炒黃連手足搐搦不省人事加黃連羌活小便不利加滑石赤茯苓吐加藿香陳皮少加薑汁嘔加生薑半夏口渴加乾葛天花粉瀉痢加白朮茯苓脈虛弱加人參五味麥門冬虛汗不止加黃耆白朮心煩躁加梔子薑炒黃連調辰砂末服之胸膈飽悶加枳殼桔梗一論傷暑飲冷當風取涼嘔吐不止用二陳湯合香薷飲加生薑烏梅煎服一論一切外感風寒暑濕之病內傷飲食生冷之症悉宜此方二香散香薷一錢二分扁豆炒厚朴薑汁拌炒黃連薑汁炒藿香半夏薑汁炒陳皮大腹皮桔梗去蘆紫蘇白茯苓去皮蒼朮米泔浸白芷各一錢甘草二分上銼一劑薑棗煎服一論夏月中暑危篤而大便下血者香薷解毒湯舊香薷三錢厚朴薑炒白扁豆炒山梔炒黃連黃柏炒黃芩炒各一錢上銼水煎服一論傷暑身熱煩渴引飲小便不利者此胃脘積熱也益元散一名天水散一名六一散白滑石水飛六兩粉草微炒一兩上為細末每服二三錢加蜜少許熱湯冷水任下如欲發汗以蔥白豆豉湯調下或用生蜜和為丸如彈子大每服一丸涼水研化服亦可一論傷暑身熱口乾煩渴心神恍惚小便赤澀大便泄瀉者此脾胃虛而陰陽不分也宜服五苓散豬苓二錢澤瀉二錢白朮一錢五分白茯苓三錢肉桂五分上銼散白水煎服本方去桂名四苓散加茵陳名茵陳五苓散加辰砂名辰砂五苓散一方加大黃治初痢亦治積聚食黃並酒疽量人虛實多則三錢少則二錢須煎藥八分熟然後入之陽毒加芍藥升麻去肉桂狂言亂語加辰砂酸棗仁頭痛目眩加川芎羌活咳嗽加五味桔梗心氣不定加人參麥門冬痰多加半夏陳皮喘急加馬兜鈴桑白皮大便不通加大黃芒硝氣塊加三稜莪朮心熱加黃連石蓮肉身痛拘急加麻黃口乾噯水加乾葛烏梅眼黃酒疽及五疽加茵陳木通滑石鼻衄加梔子烏梅伏暑鼻衄加茅根煎調百草霜末五心熱如勞加桔梗柴胡有痰有熱加桑白皮人參前胡水腫加甜葶藶木通滑石木香吊腎氣加吳茱萸枳殼小腸氣痛加小茴木通霍亂轉筋加藿香木瓜小便不利加木通滑石車前子喘咳心煩不得眠加阿膠炒疝氣加小茴香川楝子檳榔官桂薑蔥入鹽一捻同服女子紅汗加桃仁牡丹皮嘔吐去桂加半夏生薑一論伏暑作寒熱未解宜五苓散合白虎湯主之伏熱後或冷水沐浴或吃冷物清氣在脾令日作寒栗壯熱渾身灑淅更加桂出汗便解一論傷暑煩渴小便不利大便泄瀉者宜用香薷散合四苓散名薷苓湯加木通二錢滑石三錢內熱心煩加薑炒黃連八分山梔三錢調辰砂末虛倍加人參三錢一論伏暑身體倦怠神昏頭重吐利宜服十味香薷飲黃耆二錢人參三錢白朮二錢白茯苓二錢陳皮二錢厚朴一錢木瓜二錢香薷二錢扁豆三錢甘草一錢上銼水煎溫服之一論長夏濕熱蒸人人感之四肢困倦精神短少懶於動作胸滿氣促肢節痛或氣高而喘身熱而煩心下痞悶小便黃而數大便溏而頻或利或渴不思飲食自汗體重或汗少者血先病而氣未病也其脈中得洪緩若濕熱未消必加以遲遲病雖互換少瘥其脈暑濕合則一也宜清燥之藥治之用清暑益氣湯黃耆蜜炙一錢蒼朮米泔浸一錢半升麻一錢人參白朮去蘆陳皮神麯炒澤瀉各五分甘草炙黃柏酒炒當歸酒洗青皮去穰麥門冬去心乾葛各三分五味子九粒上銼一劑水煎服一論發熱惡寒身重疼痛小便澀灑然毛聳手足逆冷小有勞身即熱口開前板齒燥脈弦細虛遲表裡中暍也補中益氣湯方見內傷依本方加香薷扁豆有熱加黃芩一論外不受寒止是內傷冰水冷物腹痛泄瀉或霍亂吐逆者宜理中湯加神麯麥芽蒼朮砂仁此專治內溫中消食也一論注夏者屬陰血虛元氣不足也夏初春末頭疼眼花腿痠腳軟食少體弱五心煩熱口苦舌乾精神困倦無力好睡胸膈不利形如虛瘠脈數無力是名注夏宜服參歸益元湯人參去蘆五分當歸酒洗白芍酒炒懷熟地黃白茯苓去皮麥門冬去心各一錢五味子十粒陳皮黃柏酒炒知母酒炒各七分甘草三分上銼一劑棗一枚烏梅一個炒米一撮水煎服飽悶加砂仁白豆蔻噁心加烏梅蓮肉炒米噦加竹茹煩躁加辰砂酸棗仁竹茹瀉加白朮山藥砂仁烏梅去熟地知母黃柏小水短赤加木通山梔胃脘不開不思飲食加厚朴白豆蔻益智仁砂仁蓮肉去熟地黃黃柏知母腰痛加杜仲破故紙小茴香腿痠無力加牛膝杜仲皮焦加地骨皮頭目眩暈加川芎虛汗加黃耆酸棗仁白朮夢遺加牡蠣山藥辰砂椿根皮虛驚煩熱加辰砂酸棗仁竹茹口苦舌乾加山梔烏梅葛根一論夏月最難調理而途中尤甚故附方預卻暑毒清熱解煩可免中暑霍亂泄瀉痢疾等症驅暑益元湯人參一錢二分白朮去蘆一錢五分五味子十粒白芍酒炒麥門冬去心甘草炙五分陳皮知母酒炒香薷各七分黃芩炒三分白茯神去皮木一錢上銼生薑煎服一論途中傷暑而作水瀉腹痛煩渴者行人不服水土夏秋月宜隨身備此丸以防之胃苓丸蒼朮米泔浸炒一兩陳皮一兩厚朴薑汁炒一兩白朮去蘆土炒一兩白茯苓去皮二兩肉桂五錢豬苓一兩澤瀉一兩人參五錢黃連薑汁炒一兩白芍炒一兩甘草炙五錢上為末煉蜜為丸如梧子大每服五六十丸清米湯下一論此方清上焦熱潤肺生津止渴清上梅蘇丸烏梅不拘多少清水洗淨取肉半斤白砂糖半斤上為細末入南薄荷頭末半斤共搗成膏丸如彈子大每用一丸口中噙化行路備之解渴最妙千里梅花丸長途備用枇杷葉乾葛末百藥煎烏梅肉蠟梅花甘草各一錢上俱為末用蠟五兩先溶蠟開投蜜一兩和藥末搗二三百下丸如雞頭實大夏月長途噙化一丸津液頓生寒香滿腹妙不可言一夏末秋初熱氣酷烈不可於中庭脫露身背受風取涼五臟俞穴並會於背或令人扇風或袒露手足此中風之原若染諸疾便服八味丸補理腑臟御邪氣仍忌三白恐沖剋藥性一人盛暑發熱胸背作痛飲湯自汗用發表之藥昏瞶譫語大便不實吐痰甚多用十全大補一劑頓退又用補中益氣加炮薑二劑全愈一人夏月入房食水果腹痛余用附子理中湯而愈有同患此者不信別用二陳芩連之類而死一人雖盛暑喜燃火四肢常欲沸湯漬之面赤吐痰一似實火吐甚宿食亦出惟食椒薑之物方快余謂食入反出乃脾胃虛寒用八味丸及十全大補加炮薑全愈不月平復一傷暑與傷寒俱有發熱若誤作傷寒治之則不可也蓋寒傷形熱傷氣傷寒則外惡寒而脈浮緊傷暑則不惡寒而脈虛此為異耳經云脈盛身寒得之傷寒脈虛身熱得之傷暑治宜小柴胡湯渴加知母石膏或人參白虎湯天久霪雨濕令大行蒼朮白虎湯若元氣素弱而傷之重者清暑益氣湯治之八味丸見補益補中益氣湯見內傷十全大補湯見補益附子理中湯見中寒六味丸見補益小柴胡湯白虎湯俱見傷寒中濕脈浮而緩濕在表也脈沉而緩濕在裡也或弦而緩或緩而浮皆風濕相搏也脈經曰濕家為病一身盡疼發熱而身色似熏黃也濕者因坐臥濕地遠行涉水或冒風雨久著汗衣多食生冷濕面酒後多飲冷水類能致之不自覺耳蓋濕能傷脾脾土一虧百病由是生焉滯而為喘嗽漬而為嘔吐滲而為泄瀉溢而為浮腫濕淤熱則發黃濕遍體則重著濕入關節則一身盡痛濕聚痰涎則昏不知人至於為身熱為鼻塞為直視為鄭聲為虛汗為腳氣為腹中脹臍下堅為小便難大便自利皆其症也治濕之法必以健脾燥濕分利為主經云治濕不利小便非其治也宜蒼朮白朮茯苓豬苓澤瀉車前之類或因濕而生痰故用二陳湯加羌活防風酒芩去風行濕蓋風能勝濕故也大抵宜微汗及利小便使上下分消其濕是其治也一論中濕而一身盡痛者乃風濕相搏邪在表也除濕羌活湯羌活一錢五分防風升麻柴胡各一錢藁本蒼朮米泔浸各二錢上銼一劑生薑煎服一論中濕而腫脹泄瀉者乃濕傷脾邪在裡也滲濕湯蒼朮米泔制白朮去蘆陳皮豬苓甘草三分澤瀉一錢厚朴薑炒撫芎各七分砂仁香附茯苓各一錢五分上銼一劑薑棗燈心煎服一論腎氣虛弱坐臥濕地腰背拘急筋攣骨痛當風取涼過度風邪流入腳膝為偏枯冷痹緩弱疼痛牽引腳重行步艱難並白虎歷節風痛獨活寄生湯獨活桑寄生牛膝去蘆酒炒杜仲薑汁炒秦艽細辛桂枝川芎白芍酒炒茯苓去皮人參當歸酒洗熟地黃防風去蘆各等分甘草鹽炒一方用各一兩好酒炒日飲三次良驗上銼薑棗煎空心溫服外用金鳳花柏子仁朴硝木瓜煎湯洗浴每日洗三次一論寒濕客於經絡腳膝痠痛渾身麻木五積散主之方見中寒一論脾胃受濕身重倦怠好臥背脊痛項強似折頂似拔上衝頭痛及足太陽經不行羌活勝濕湯羌活獨活各一錢藁本防風各五分蔓荊子二分川芎二分甘草五分白朮一錢防己一錢加黃耆一錢上銼作一劑生薑煎服如身重腰沉沉然經中有濕熱也加黃柏一錢大附子五分蒼朮二錢一論中濕遍身疼痛不能轉側及皮肉痛難忍者經驗白朮酒白朮去蘆油土炒一兩上銼一劑好酒煎溫服一論濕氣作痛或腫或脹或黃或瀉蒼朮膏蒼朮米泔浸揉去黑皮切片曬乾不拘多少上用水熬成膏白湯調服如暴發紅腫痛甚者以臘糟敷之一論筋骨疼痛或濕熱流注腰下作痛二妙湯川黃柏鹽酒炒五錢蒼朮米泔浸炒一兩上為末每用一匙沸湯入薑汁調食前服痛甚者加蔥三根水煎空心熱服一論中濕遍身骨節疼痛除濕膏廣膠三兩生薑半斤搗汁乳香沒藥取末各一錢半上入銅杓內火上熬化移在滾湯內頓以筋攪勻入花椒末少許再攪勻攤厚紙或絹上貼患處用鞋底烘熱尉之一夏月患濕不能行走足腫者九月間收茄根蔥簷下煎湯洗之一凡空室久閉者不宜輒入欲入先以香物及蒼朮之類焚之俟鬱氣發散然後可入不然感之成病久閉井窖尤宜慎之一凡濕氣流注之病痛不可忍用金銀花帶葉和酒糟研爛用淨瓦罐於火中烘熱敷患處立已膏藥方生薑帶皮取汁一碗蔥汁一碗蔥連青帶須用加牛膝半斤慢火熬成膏入麝一錢在內用布帛攤膏藥貼痛處收出濕水如汗出即愈火症脈浮而洪數為虛火沉而實大為實火洪大見於左寸為心火見於右寸為肺火見於左關為肝火見於右關為脾火兩尺為腎經命門之火男子兩尺洪大者必遺精陰火盛也人之臟腑各皆有火但有虛實之不同耳然實火可瀉如黃連瀉心火黃芩瀉肺火芍藥瀉脾火石膏瀉胃火柴胡瀉肝火知母瀉腎火此皆苦寒之味能瀉有餘之火若飲食勞役內傷元氣火不兩立為陽虛之病以甘溫之劑除之如黃耆人參甘草之屬若陰微陽弦相火熾盛以乘陰位為血虛之病以甘寒之劑降之如當歸地黃之屬若心火亢極鬱熱內實為陽強之病以鹹冷之劑降折之如大黃芒硝之屬若腎水受寒真陰失守無根之火為陰虛之病以壯水之劑制之如生地玄參之屬若有腎經命門火衰為陽脫之病以溫熱之劑濟之如附子乾薑之屬若胃虛過食冷物抑遏陽氣於脾土為火鬱之病以升發之劑發之以升陽散火湯主之諸經實火照後方調之毋執一論男子婦人四肢發熱筋骨間熱肌表熱如火捫之烙手此病多因血虛而得之或脾虛過食冷物抑遏陽氣於脾土之中火鬱則發之升陽散火湯升麻葛根羌活獨活白芍人參各六分炙甘草二分柴胡三分防風二分半生甘草二分上銼一劑生薑煎服忌生冷等物一論三焦實火六經積熱煩躁作渴口舌生瘡小便赤大便結一切有餘之火涼膈散連翹一錢五分黃芩一錢梔子一錢桔梗一錢薄荷五分大黃一錢芒硝一錢甘草三分上銼水煎入蜜同服咽喉痛加桔梗荊芥酒毒加黃連乾葛名清心湯用蜜竹葉同煎咳而嘔加半夏生薑衄血嘔血加當歸赤芍生地小便淋瀝加滑石赤茯苓風眩加防風川芎石膏斑疹加乾葛荊芥川芎赤芍藥防風桔梗咳嗽加桑白皮杏仁桔梗陽毒發斑加當歸結胸心下滿加桔梗枳殼譫語發狂越牆赴井皆陽熱極盛加黃連黃柏赤芍藥眼中翳瘴赤澀流淚加菊花木賊生地黃大金花丸解諸熱臟伏火黃連去毛黃芩黃柏去皮梔子去谷各等分上為末滴水為丸如梧桐子大每服四五十丸白溫水下一方加桔梗大黃酒煨治上焦一切熱症兼治鼻紅一論積熱積痰並五臟三焦有餘之熱夾熱下利食痞膈悶咽痛目赤腫中暑中熱煩躁等症及初發腫毒兼治黃金丸大黃煨鬱金即薑黃要極小者佳牙皂去筋皮各等分上為細末用牛膽汁入瓷罐內煎成稀膏和藥為丸如梧桐子大每服三五十丸量病輕重加減白湯下大便少行一二次即止不傷元氣一論上焦積熱風痰壅滯頭目赤腫或有瘡癤咽喉不利大小便閉澀一切風熱亦能磨酒食諸滯神芎丸黑醜四兩滑石四兩大黃一兩黃芩二兩黃連五錢川芎五錢薄荷五錢上為末滴水丸如梧桐子大每服五十丸用溫水送下上清丸朱全吾傳治上焦痰火咳嗽乃心脾之有熱也龍腦二分另研硼砂二分另研薄荷末一兩川芎末五錢桔梗末二錢甘草末二錢上為細末煉蜜為丸如圓眼大每服一丸臨臥噙化或食後茶清咽下一婦人年四十餘夜間發熱旦晨退五心煩熱無休止時半年後六脈皆數伏而且牢浮取全不應手以升陽散火湯四劑而熱減大半胸中覺清快勝前再與二劑熱悉退後以四物湯加黃柏知母少佐以炒黑乾薑二十劑全安一治骨蒸內熱之病時發外寒寒過內熱附骨蒸盛之時四肢微痹足跗腫者其病在臟腑之中太白散白石膏火煅為末新汲水調下方寸匙以身無熱為度內傷東垣曰右手氣口脈大於人迎一倍過在少陰則二倍太陰則三倍右手三部屬三陰少陰在關者屬脾太陰在寸主肺肌膚大熱故脾肺二臟之脈皆緊盛右寸氣口脈急大而數時一代而澀澀者肺之本脈代者元氣不相接續此飲食失節勞役過甚大虛之脈也右關脾脈大而數謂獨大於五脈也數中顯緩時一代也此不甚勞役之脈也右關胃脈損弱甚則隱而不見但內顯脾脈之大數微緩時一代此飲食不節寒溫失所之脈也右關脈沉而滑此宿食不消之脈也內外傷辨人迎脈大於氣口為外傷氣口脈大於人迎為內傷外傷則寒熱齊作而無間內傷則寒熱間作而不齊外傷惡寒雖近烈火不除內傷惡寒得就溫暖即解外傷惡寒乃不禁一切風寒內傷惡風惟恐些小賊風外傷症顯在鼻故鼻氣不利而擁盛有力內傷者不然內傷症顯在口故口不知味而腹中不和外傷者無此外傷則邪氣有餘發言壯厲且先輕而後重內傷則元氣不足出言懶怯且先重而後輕外傷手背熱而手心不熱內傷則手心熱而手背不熱外傷頭痛常常有之直須傳裡方罷內傷頭痛有時而作有時而止若顯內症多者則是內傷重而外感輕宜以補養為先若顯外症多者則是外感重而內傷輕宜以發散為急一論飲食勞倦傷脾則不能生血故血虛則發熱熱則氣散血耗而無力或時易飢或時飽悶不思飲食變病百端如遇外感重者則先理外感六分而治內傷四分見效即住如外感輕則內傷藥用六分矣能治萬病其效如神東垣曰夫飲食不節則胃病胃病則氣短精神減少氣不足以息言語怯弱腹中不和口不知穀味或胃當心而痛或上肢兩脅痛甚則氣高而喘身熱而煩胃既病則脾無所稟受故亦從而病焉若形體勞役而脾病脾病則怠惰嗜臥四肢不收或食少小便黃赤大便或閉或泄或虛坐只見些白濃或泄黃糜無氣以動而懶倦嗜臥脾既病則胃不能獨行津液故亦從而病焉若外感風寒俱無此症故易分別耳虛實之症不可不知因往往以內傷不足之病誤作傷寒外感有餘之症汗之吐之差之毫釐謬之千里實實虛虛醫殺之耳夫傷寒為六淫之病風寒始於表而漸傳於裡則初病頭項強痛發熱惡寒身疼當汗之及其邪入於裡熱盛內實譫語狂妄當下之不愈即發斑黃厥逆變生諸症矣夫內傷因七情鬱結飲食勞役為不足之病始生於里而發於表也其病倦怠四肢不收頭疼時作時止其熱始發於心膈間次發於肢體稍遇風寒時時畏懼氣短喘促懶於言語脈必微細或弦而數或虛而大只此分別則內外易見矣一論中氣不足或誤用克伐四肢倦怠口乾發熱飲食無味或飲食失節勞倦身熱脈洪大無力或頭痛惡寒自汗或氣高而喘身熱而煩脈微細軟弱自汗身倦目合或中氣虛弱而不能攝血或飲食勞倦而患瘧痢等症因脾胃虛而不能愈者或元氣虛弱感冒風寒而不勝發表用此代之或入房而後勞役感冒或勞役感冒而後入房者急加附子愚謂人之一身以脾胃為主脾胃氣實則肺得其所養肺氣既盛水氣生焉水升則火降水火既濟而全天地交泰之令矣脾胃既虛四臟俱無生氣故東垣先生著脾胃內外傷等論諄諄然皆以固脾胃為本所制補中益氣又冠諸方之首觀其立方本旨可知矣故曰補腎不若補脾正此謂也前所治症概舉其略余當仿此而類推之是方之妙並注以表明之補中益氣湯黃耆蜜炒一錢五分人參一錢白朮去蘆炒一錢五分當歸酒洗一錢五分陳皮七分柴胡六分升麻八分甘草炙五分上銼一劑薑棗煎服如感風寒頭痛發熱加川芎防風白芷各一錢羌活七分汗多加黃耆五分如汗多去升麻柴胡加炒酸棗仁一錢夜間不睡亦加之如虛火炎上加玄參一錢如陰虛生火加酒炒黃柏知母各七分夏月亦可常用如陰虛痰多加貝母一錢如泄瀉去當歸加白茯苓一錢澤瀉一錢白芍煨一錢如氣虛甚者必少加大附子制過以行參耆之力也手足冷或腹痛亦如之如心刺痛者乃血澀不足加當歸五分白豆蔻七分研如用心太過神思不寧怔忡驚悸加參苓酸棗仁炒柏子仁各一錢遠志石菖蒲各七分如咽乾及渴者加乾葛七分天花粉一錢如飲食少或傷飲食加神麯麥芽山楂各一錢如精神短少者倍加人參夏加五味子十粒麥門冬去心一錢如夢遺加牡蠣龍骨煅各一錢如頭痛加蔓荊子七分痛甚加川芎七分如頭頂痛者加藁本一錢細辛三分如腰痛加牛膝杜仲薑炒各一錢如腳弱加木瓜一錢漢防己五分如有痰加半夏薑製七分貝母一錢如咳嗽夏加片芩知母麥門冬各一錢如久嗽肺中有伏火者減人參加片芩紫菀各一錢如食不下胸中有寒或塞滯加青皮五分木香三分如腳軟乏力或痛加酒炒黃柏一錢牛膝五加皮各一錢如五心煩躁加生地黃若氣浮心亂以硃砂安神丸鎮固之則愈方見怔忡一論中氣虛而胃弱不愛食及食不生肉不長力或常微熱怯冷神疲倦怠或帶痰嗽加味六君子湯人參一錢白朮去蘆一錢五分陳皮八分白茯苓去皮一錢半夏薑製八分乾葛七分山楂肉一錢甘草炙五分砂仁五分上銼一劑薑煎服一論此方藥性中和專理心脾氣弱神昏體倦多困少力飲食不進中滿痞噎心忪上喘嘔吐瀉痢等症久服養氣育神醒脾益胃扶正辟邪參苓白朮散人參一錢白朮去蘆一錢白茯苓去皮七分白扁豆炒一錢山藥一錢蓮肉去心皮七粒桔梗去蘆七分薏苡仁一錢砂仁五個甘草炙四分上銼一劑薑棗煎服一論凡遇勞行辛苦用力過多即服此二三劑免生內傷發熱之病補氣湯嫩黃耆蜜水炒一錢半人參白朮去蘆炒陳皮麥門冬去心各二錢五味子十粒甘草炙七分上銼一劑生薑三片棗二枚水煎服勞倦甚者加附子五分一論凡遇勞心思慮損傷精神頭目昏眩心虛氣短驚悸煩熱等症補血湯當歸酒洗白芍酒炒白茯苓去皮木酸棗仁炒麥門冬去心各一錢人參一錢二分川芎六分懷熟地黃二錢陳皮梔子炒各五分五味子十五粒甘草炙五分上銼一劑水煎溫服一論脾胃虛弱元氣不足四肢沉重食後昏沉怠於動作嗜臥無力補胃湯黃耆蜜炒二錢人參五分甘草炙二錢當歸五分神麯炒七分柴胡三分升麻二分蒼朮米泔浸一錢青皮去穰五分黃柏酒炒三分上銼一劑水煎食後服一論病後元氣虛弱脾胃虧損此藥補氣和血健脾理胃進美飲食壯健身體充實四肢清火化痰解鬱順氣參苓白朮丸人參一兩白朮去蘆土炒一兩半白茯苓去皮一兩懷山藥炒一兩白扁豆薑汁炒一兩桔梗去蘆一兩薏苡仁炒一兩蓮肉去心皮二兩陳皮一兩半夏湯泡薑汁炒一兩砂仁五錢黃連薑汁炒一兩神麯炒一兩香附童便炒一兩白芍酒炒一兩當歸酒炒二兩甘草炙五錢上為末薑棗煎服打神麯糊為丸如梧子大每服百丸食後米湯下加遠志去心一兩亦妙一論此方養元氣健脾胃生肌肉潤肌膚益血祕精安神定志壯筋力養精神進飲食之上品也又治虛勞瘦怯泄瀉腹脹腫滿喘嗽等症陽春白雪糕白茯苓去皮懷山藥芡實仁蓮肉去心皮各四兩共為細末陳倉米半升糯米半升白砂糖一斤半上先將藥米二味用麻布袋盛放甑內蒸極熟取出放簸箕內卻入白砂糖同攪極勻揉作一塊用小木印印作餅子曬乾收貯男婦小兒任意取食妙不可言一秀才勞役失宜飲食失節肢體倦怠發熱作渴頭痛惡寒誤用人參敗毒散痰喘昏憒揚手擲足胸膈發斑如蚊所咬余用補中益氣湯加薑桂麥門五味補之而愈一男子發熱煩渴時或頭痛因服發散藥反加喘急腹痛其汁如水晝夜譫語余意此勞傷元氣誤汗所致其腹必喜手按詢之果然遂與十全大補湯加附子一錢服之熟睡喚而不醒舉家驚惶及覺諸病頓退再劑而痊凡人飲食勞役起居失宜見一切火症悉屬內真寒而外假熱故肚腹喜暖口畏冷物此乃形氣病氣俱屬不足法當純補元氣為善一人因勞役失於調養忽然昏憒此元氣虛火妄動夾痰而作急令灌童便神思漸爽更用參耆各五錢芎歸各三錢玄參柴胡山梔炙草各一錢服之稍定察其形倦甚又以十全大補湯加五味麥門治之而安凡人元氣素弱或因起居失宜或因飲食勞倦或因用心太過致遺精白濁自汗盜汗或面熱晡熱潮熱發熱或口乾作渴喉痛舌裂或胸乳膨脹脅肋作痛或頭頸時痛眩暈目花或心神不寧寤而不寐或小便赤澀莖中作痛或便溺余滴臍腹陰冷或形容不充肢體畏寒或鼻氣急促或更有一切熱症皆是無根虛火但服前湯固其根本諸症自息若攻其風熱則誤矣一人面如血紅髮熱終日不食沉困相火衝上豫以補中益氣湯煎半碗童便半碗合而服之日進五服而愈一論大凡大病後谷消水去精散衛亡多致便利枯竭實當補中益氣為主蓋為中州澆灌四旁與胃行其津液者也況大腸主津小腸主液亦皆稟受於胃胃氣一充津液自行矣燥甚者則當以辛潤之以苦泄之飲食東垣云胃中元氣盛則能食而不傷過時而不飢脾胃俱旺則能食而肥也脾胃俱虛則不能食而瘦或少食而肥雖肥而四肢不舉蓋脾實而邪氣盛也又有善食而瘦者胃伏火邪於氣分也則能食脾虛則肌肉削即食傷也大抵飲食不進以脾胃之藥治之多不效者亦有説焉人之有生不善攝養房勞過度真陽衰敗坎火不溫不能上蒸脾土沖和失布中州不運致飲食少胸膈痞塞或不食而脹滿或已食而不消大便泄溏此皆真火衰弱不能蒸蘊脾土而然古云補腎不若補脾豫謂補脾不若補腎腎氣若壯丹田之火上蒸脾土脾土溫和中焦自治則能飲食矣今飲食進少且難消化屬脾胃虛寒蓋脾胃屬土乃命門火虛不能生土而然不宜補脾胃當服八味丸補火生土也方見補益夫食者謂穀肉菜果之物也經云陰之所生本在五味陰之五宮傷在五味穀肉菜果中嗜而欲食之心自裁製勿使過焉則不傷其正矣或有傷於食者必先問其人或因喜食而多食之耶或因飢餓而急食之耶或因人勉強勸而強食之耶或因病後宜禁之物而誤食之耶如因喜食得之當先和其胃氣胃氣素強損谷自愈消導耗氣之藥不必服也如因飢餓得之當先益其胃氣胃氣強所傷之物自消導矣宜香砂養胃湯主之如因勉強勸而得之宜行消導之劑百消丸主之若因病後得之當以補養為主宜參苓白朮散主之其所傷之物有寒熱之不同所傷之人有強弱之各異主治之法無一定也所謂熱物者如膏粱辛辣厚味之物是也穀肉多有之寒物者水果瓜桃生冷之物是也菜果多有之治熱以寒大黃牽牛是也治寒以熱丁香巴豆是也如以熱攻熱以寒攻寒則食雖去藥毒猶存胃氣重傷禍不旋踵矣故傷熱物者三黃枳朮丸甚則利氣丸導之傷冷物者香砂養胃湯甚則萬億丸通之如冷熱不調者備急丹主之人知飲食所以養生不知飲食失調亦以害生故能消息使適其宜是故賢哲防於未病凡以飲食無論四時常令溫暖夏月伏陰在內暖食尤宜不欲苦飽飽則筋脈橫解腸澼為痔因而大飲則氣乃暴逆養生之道不欲食後便臥及終日穩坐皆能凝結氣血久即損壽食後常以手摩腹數百遍仰面呵氣數百口趑趄緩行數百步謂之消化食後便臥令人患肺氣頭風中痞之疾蓋營衛不通氣血凝滯故爾食訖當行步躊躇有所作為乃佳語曰流水不腐戶樞不蠹以其動然也食飽不得速步走馬登高涉險恐氣滿而激致傷臟腑不欲夜食脾好音聲聞聲即動而磨食日入之後萬響俱絶脾乃不磨食之即不易消不消即損胃損胃即翻翻即不受穀氣穀氣不受即坐臥袒肉操扇此當毛孔盡開風邪易入感之令人四肢不遂不欲極飢而食食不可過飽不欲極渴而飲飲不可過多食過多則結積飲過多則成痰癖故曰大渴不大飲大飢不大食恐血氣失常卒然不救也荒年餓莩飽食即死是驗也嗟乎善養生者養內不善養生者養外養內者以恬臟腑調順血脈使一身之流行沖和百病不作養外者恣口腹之欲極滋味之美窮飲食之藥雖肌體充腴容色悅澤而酷烈之氣內蝕臟腑精神虛矣安能保合太和以臻遐齡莊子曰人之可畏者衽席飲食之間而不知為之戒過也其此之謂乎一論治內傷生冷飲食厚味堅硬之物肚腹脹滿疼痛外感風寒濕氣頭疼身熱憎寒遍體骨節麻木痛疼及惱怒相沖飲食不下心腹氣痛行氣香蘇散紫蘇一錢陳皮二錢香附二錢烏藥二錢川芎一錢五分枳殼一錢羌活二錢麻黃五分甘草一錢因濕加蒼朮二錢上銼生薑煎服外感風寒頭痛加蔥白三根內傷飲食加山楂二錢神麯二錢去麻黃一論脾胃虛弱不思飲食口不知味胸腹痞脹疼痛等症用香砂養胃湯人參七分白朮去蘆炒白茯苓去皮香附炒砂仁蒼朮米泔水浸炒厚朴薑汁炒陳皮各八分白豆蔻去谷七分木香五分甘草炙二分上銼薑棗煎服脾胃虛寒加乾薑官桂胃熱加薑汁炒黃連梔子炒肉食不化加山楂草果米麵粉食不化加神麯麥芽生冷瓜果不化加檳榔乾薑胸腹飽悶加枳殼蘿蔔子大腹皮傷食胃口痛加木香枳實益智仁傷食泄瀉加乾薑烏梅白朮傷食噁心嘔吐加藿香丁香半夏烏梅乾薑吐痰加半夏一論脾胃虛弱不思飲食嘔吐泄瀉胸痞腹脹噎膈並虛勞咳嗽吐痰大便頻數或腹痛等症尋常無病之人服之百病皆除理氣健脾丸白朮去蘆炒二兩白茯苓去皮三兩陳皮洗二兩半夏泡薑汁炒三兩二錢當歸酒洗六兩黃連薑汁炒三兩枳實麩炒一兩五錢桔梗炒一兩五錢神麯炒二兩五錢山楂肉去子一兩八錢香附童便炒二兩木香五錢甘草炙二兩如泄瀉去桔梗加白芍煨二兩上為細末荷葉一塊煎湯下大米煮粥為丸如梧子大每服八十丸食後白湯下如元氣虛弱加黃耆蜜炙二兩人參一兩懷山藥二兩蓮肉去心炒二兩一論人稟素弱脾胃虛怯上焦有火有痰有鬱氣有食積胸中不快飲食少思常可服大補枳朮丸白朮去蘆炒一兩陳皮去白一兩枳實麩炒一兩黃連薑汁炒五錢黃芩醋炒五錢黃柏青鹽水炒一兩白茯苓去皮五錢貝母去心八錢神麯炒五錢山楂去核五錢麥芽炒五錢加砂仁三錢香附醋炒三錢上為細末荷葉湯下粳米煮稀粥同藥搗和為丸如梧子大每服一百丸食後薑湯送下有熱茶清送下服後飲食自然多進人之精血皆因穀氣而生蓋脾乃肺之母母實乃消化之氣下降何痰之有一論中氣虛損脾胃怯弱飲食不下或瀉或痢有調胃實腸之功用大鯽魚去腸洗淨入蒜五六瓣於內用紙包水濕火煨熟去蒜食魚日二三次自然進食又治膈噎食不下一論此方能消酒消食消痰消氣消水消痞消腫消脹消積消痛此藥消而不見響而不動藥本尋常其功甚捷百消丸黑醜頭末二兩香附米炒五靈脂各一兩上為細末煉蜜為丸如緑豆大每服二三十丸或五六十丸食後薑湯下一治胃中停滯寒冷之物及療心腹諸卒暴痛並脹滿不快宜用備急丹大黃巴豆去殼乾薑各一兩上為細末煉蜜為丸如梧桐子大每服三丸溫水送下若卒中客忤心腹脹滿卒痛如錐氣急口噤停尸卒死者用熱酒灌下以腹中鳴轉即吐下立效萬億丸方見通治治一切飲食所傷腹滿脹疼痛一治過食寒硬冷物食傷太陰厥陰或嘔吐痞滿腸澼陳皮半夏茯苓三錢枳實一錢山楂二錢神麯二錢炒乾生薑一錢砂仁六分三稜一錢莪朮一錢上銼生薑煎服一治過食熱物煎炒厚味有傷太陰厥陰嘔吐痞脹或瀉痢者青皮陳皮枳實炒白朮炒白芍炒黃連薑炒山楂肉麥芽炒各一錢大黃酒蒸錢半甘草三分上銼水煎溫服嗜酒喪身夫酒者祭天享地順世和人行氣和血乃可陶情性世人能飲者固不可缺凡遇天寒冒露或入病家則飲酒三五盞壯精神闢疫癘飲者不過量力而已過則耗傷血氣也古云飲酒無量不及亂此言信矣飲者未嘗得於和氣血抑且有傷脾胃傷於形亂於性顛倒是非皆此物也早酒傷胃宿酒傷脾為嘔吐痰沫醉後入房以竭其精令人死亦不知雖知者亦迷而不戒養活高人當寡欲而養精神節飲食以介眉壽此先聖之格言實後人之龜鑑也本草云酒性大熱有毒大能助火一飲下咽肺先受之肺為五臟之華蓋屬金本燥酒性喜升氣必隨之痰鬱於上溺澀於下肺受賊邪不生腎水水不能制心火諸病生焉其始也病淺或嘔吐或自汗或瘡疥或鼻齄或泄利或心脾痛尚可散而出也其久也病深或為消渴為內疽為肺痿為痔漏為鼓脹為黃疸為失明為哮喘為勞嗽為血衄為顛癇為難狀之病倘非高明未易處治凡嗜酒者可不慎乎一論治酒病當發汗其次莫如利小便使上下分消其濕可也此藥治飲酒太過嘔吐痰逆心神煩亂胸膈痞塞手足戰搖小便不利大便稀溏飲食減少等症宜服葛花解酲湯葛花五錢砂仁五錢白豆蔻去殼五錢人參二錢五分白朮去蘆炒二錢白茯苓去皮一錢五分青皮去穰一錢五分陳皮一錢五分木香五錢豬苓一錢五分澤瀉二錢神麯二錢炒乾生薑二錢素有熱者加黃連薑汁炒一錢上為細末和勻每服三錢白湯調下但得微汗酒病去矣論云此皆不得已用之豈可恃賴以日日飲酒耶是方氣味辛溫偶因病酒服之則不損元氣何者敵酒病故也若頻服之則損人天年也一治燒酒醉傷不醒者急用緑豆粉蕩皮切片將箸開口用冷水送下一論此藥能壯脾進飲食令人飲酒不醉用八仙銼散丁香砂仁白豆蔻去殼各三錢粉葛二兩百藥煎二錢半木瓜鹽窖一兩燒鹽一兩甘草一錢半上細銼人不能飲酒者只抄一錢細嚼溫酒下即能飲酒不醉只可暫服過服未有不傷人之元氣也一論飲酒過多大醉難醒服此即解石葛湯石膏五兩葛根銼生薑銼各五錢上銼每服五錢水煎溫服一論腹中膈氣痞滿面色黃黑將成癖疾飲食不進日漸肌瘦如欲飲酒先服之多飲不醉百杯丸丁香五十個橘紅小茴香三稜炮三錢莪朮炮三錢砂仁白豆蔻三十個乾薑三錢生薑一兩去皮切片鹽一兩浸一宿焙乾甘草炙二錢人參三錢木香二錢上為細末煉蜜為丸硃砂為衣每一兩作五丸每服一丸細嚼生薑湯送下一論酒積面黃黑色腹脹不消甘遂一錢為末用槽頭豬肉一兩細切如泥入遂末在內和勻通作一丸紙裹燒令香熟取出臨臥細嚼用好酒送下解酒仙丹曾府傳白果仁八兩葡萄八兩薄荷葉一兩側柏枝一兩細辛五分朝腦五分細茶四兩當歸五錢丁香五分官桂五分砂仁一兩甘松一兩上為細末煉蜜為丸如芡實大每服一丸細嚼清茶送下極能解神仙醒酒丹周藩京山王傳葛花五分赤小豆花緑豆花各二兩家葛花搗碎水澄粉八兩真柿霜四兩白豆蔻五錢上取細末和勻用生藕汁搗和作丸如彈子大每用一丸嚼而咽之立醒一論飲酒人元氣虛弱四肢無力飲食減少面紅如妝宜用補中益氣湯方見補益加陳皮半夏乾葛白芍神麯麥芽枳殼小便閉加麥門冬三錢大便閉加桃仁一錢紅花一錢火麻仁一錢五分一儒者善飲便滑溺澀食減胸滿腿足漸腫症屬脾腎虛寒用加減金匱腎氣丸進食消腫更用八味丸胃強脾健而愈一人善飲酒泄瀉腹脹吐痰作嘔口乾此脾胃之氣虛先用六君子加神麯止嘔再用益氣湯加茯苓半夏泄脹亦愈此症若濕熱壅滯當用葛花解酲湯分消其濕濕既去而瀉未已須用六君子加神麯實脾土化酒積然雖為酒而作實因脾土虛弱不能專主濕熱醒醉湯用青橄欖黃損者不用瓦上磨去粗皮核細切如縷一斤以粉草末二兩炒鹽二兩拌勻入瓷罐內密封以沸湯點服自然生津液醒醉極妙飲酒不醉方薄荷五錢乾葛二兩桂花三錢白梅肉五錢上為末為丸先放口內舌下自然酒化斷酒法用驢胞衣燒灰調酒服傷酒不藥法心中酒食停積或被人勸飲過多一切服下胸腹脹滿不消用鹽花頻擦牙齒溫水漱下不過三次如湯潑雪即時寬腸通快誠妙法也一治飲酒過多蘊熱胸膈以致吐血衄血葛花二兩黃連四兩上為末以大黃末熬膏和為丸如梧子大每服百丸溫水送下一人飲酒過度大醉不醒一家愴惶無計可施來告豫用樟樹上嫩葉曬乾為末真葛花末二味各等分每服三錢白滾水調服立愈鬱症脈多沉伏或促或細或代氣鬱則必沉而澀濕鬱則必沉而緩熱鬱則必沉而數痰鬱則脈弦滑血鬱則脈芤而急促食鬱則脈必滑而緊盛郁在上見於寸郁在中見於關郁在下見於尺左右皆然夫郁者結聚而不得發越也當升者不得升當降者不得降當變化者不得變化也此為傳化失常六郁之病見矣氣鬱者胸膈痛脈沉澀濕鬱者周身走痛或關節痛遇陰寒則發脈沉細痰鬱者動則喘寸口脈沉滑熱鬱者瞀悶小便赤脈沉數血鬱者四肢無力能食便紅脈沉食鬱者噯酸腹飽不能食人迎脈平和氣口脈緊盛者是也一論丹溪曰血氣衝和百病不生一有怫鬱諸病生焉其症有六氣血痰濕熱食是也此方開諸郁之總司也六郁湯香附童便炒蒼朮米泔浸神麯炒梔子炒連翹陳皮川芎貝母枳殼麩炒白茯苓蘇梗各一錢甘草五分上銼一劑水煎服痰鬱加南星二錢半夏二錢熱鬱加柴胡八分黃芩二錢血鬱加桃仁八分紅花八分濕鬱加白朮一錢五分羌活一錢氣鬱加木香一錢檳榔一錢食鬱加山楂二錢砂仁八分一論解諸鬱火痰氣開胸膈思飲食行氣消積散熱用此加味越鞠丸蒼朮米泔浸薑汁炒一兩撫芎一兩香附童便浸三日炒一兩神麯炒一兩梔子炒五錢陳皮去白一兩白朮去蘆炒三兩黃連酒炒一兩山楂去子二兩白茯苓去皮一兩蘿蔔子炒五錢連翹五錢枳實麩炒一兩當歸酒洗一兩廣木香五錢上為末薑汁打稀糊為丸如梧子大每服五六十丸食後白湯送下一論氣濕痰熱血食六郁此寬脾快膈之藥也越鞠二陳丸蒼朮米泔浸山梔子炒黑南芎神麯炒香附童便炒山楂肉陳皮半夏薑汁炒白茯苓去皮海石南星天花粉各二兩枳殼去穰麩炒一兩五錢甘草炙五錢
