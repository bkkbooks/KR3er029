邪熱結膀胱名曰如狂症宜服桂苓飲子豬苓二錢澤瀉二錢桂枝八分甘草八分黃柏一錢五分知母一錢五分白朮一錢五分山梔三錢滑石二錢上銼生薑燈心二十四莖煎服之一論有患無頭疼無畏寒止發大渴小便利大便黑口出無倫語此內傷血鬱肝脾之症使人昏迷沉重錯語名曰夾血當歸活血湯當歸三錢赤芍二錢甘草八分紅花八分桂枝八分乾薑八分枳殼八分麩炒柴胡八分人參一錢生地黃三錢桃仁泥八分上銼薑一片水煎入酒三匙同服三劑後去桃仁紅花乾薑桂枝加白朮一錢茯苓三錢一論有患憎寒壯熱頭痛昏沉迷悶上氣喘急口出涎沫此因內傷七情以致痰迷心竅神不守舍神出舍空空則痰生也名曰夾痰痰症類傷寒與此同法加味導痰湯茯苓三錢去皮半夏二錢湯泡南星一錢五分礬炮枳實一錢麩炒黃芩二錢人參三錢白朮一錢五分桔梗八分黃連八分栝蔞仁二錢甘草八分陳皮一錢五分上銼薑棗煎臨服入竹瀝薑汁同服一論食積類傷寒頭疼身熱惡寒氣口脈緊盛但身不痛此為異耳經曰飲食自倍腸胃乃傷輕則消化重則吐下宜用加味調中飲蒼朮一錢五分米泔浸炒厚朴八分薑汁炒陳皮一錢五分白朮一錢五分山楂二錢乾薑八分炮神麯二錢炒草果一錢黃連八分薑汁炒甘草八分枳實一錢上銼生薑煎服腹中痛加桃仁八分痛甚大便結實加大黃二錢下之去草果乾薑銼散薑棗煎服入竹瀝薑汁同服一論腳氣類傷寒頭疼身熱惡寒肢節痛便閉嘔逆腳軟屈不能轉動但起於腳膝耳禁用補劑及淋洗宜服加減續命湯防風一錢五分芍藥二錢白朮一錢五分川芎一錢五分防己二錢桂枝八分麻黃八分甘草八分蒼朮一錢五分羌活二錢上銼薑棗燈心煎服暑中三陽所患必熱脈來數去附子桂枝麻黃加黃芩一錢黃柏一錢五分柴胡八分寒中三陰所患必冷脈來遲加附子一錢五分起於濕者脈來弱加木瓜二錢牛膝三錢起於風者脈來浮加獨活二錢元氣虛加人參少許大便實加大黃二錢一論天行大頭病發熱惡寒頭項腫痛脈洪取作痰火治之其喉痹者亦照此方治之芩連消毒湯柴胡八分甘草八分桔梗八分川芎一錢五分黃芩二錢荊芥一錢黃連八分防風一錢五分羌活二錢枳殼一錢連翹二錢射干二錢白芷二錢鼠黏子二錢上銼散生薑煎臨服加竹瀝薑汁同服先加大黃利一二次後依本方去大黃加人參二錢當歸二錢調理一方三月前後謂之晚發感冒寒疫頭疼發熱惡寒體痛而渴脈浮緊有力無汗年力壯盛之人用羌活沖和湯恐緩故用此六神通解散麻黃八分甘草八分黃芩二錢石膏三錢滑石三錢蒼朮一錢五分川芎一錢五分羌活二錢細辛八分上銼薑蔥豆豉煎熱服出汗中病即止一論傷寒虛煩心驚微熱四肢無力體倦者又治六七日別無刑剋症候昏沉不知人事六脈俱靜者無脈欲出汗者宜此安神益志湯柴胡八分人參二錢知母二錢甘草八分竹茹四錢茯神三錢當歸三錢黃連八分薑炒麥門冬三錢五味子四分生地黃三錢遠志一錢甘草湯泡去心上銼散薑棗煎服一論傷寒頭疼發熱身痛惡寒口乾不思飲食時醫誤投發表攻擊之藥過多發得表虛上氣喘急口乾不食肢體昏沉冷汗大出以致亡陽等症用此加減補中益氣湯方見內傷依本方加柴胡八分升麻一錢蜜炒白芍二錢酒炒桂枝八分酸棗仁二錢炒熟附麻黃根各八分浮小麥三錢倍加黃耆一論傷寒頭痛發熱口乾屢服發表解肌之藥而日晡發熱尤甚或日經夜重此陰虛火動也宜用六味地黃丸方見勞瘵依本方六味作湯藥加酒炒黃柏一錢五分知母一錢五分一論傷寒狐惑多眠聲嗄及唇口生瘡宜用槐子桃仁艾各一兩棗子十五個上銼每服五錢水煎溫服一論汗吐下後心胸滿悶或頭痛微汗虛煩不得眠反覆顛倒心中懊憹乃燥熱怫鬱於內而氣不宣通故也宜服梔豉湯肥梔子三錢淡豆豉三錢上水煎溫服煩躁者懊憹不得眠也懊憹者沉悶不舒之貌煩者氣也火入於肺也躁者血也火入於腎也故用梔子以治肺煩豆豉以治腎躁少氣虛滿加甘草嘔噦加生薑一錢橘皮二錢有宿食而煩躁者加大黃二錢下後腹滿而煩加枳實二錢厚朴八分下後身熱而煩加甘草一錢乾薑二錢瘥後勞復加枳實二錢一論傷寒已經汗下表裡俱虛津液枯竭心煩發熱氣逆欲吐及諸煩熱並宜服之竹葉石膏湯石膏二錢半夏一錢五分人參一錢甘草一錢麥門冬去心一錢五分上銼一帖青竹葉生薑各五六片粳米百餘粒水煎服熱極發狂倍加知母石膏一論陽毒傷寒藥下雖通結胸不軟痛楚喘促或發狂亂者宜用地龍水大頭縮地龍四條洗淨研爛入生薑自然汁一匙白蜜半匙薄荷汁一匙更入片腦一分或半分研勻徐徐灌令盡良久漸快穩睡一頓飯時久即與揉心下片時再令睡當有汗即愈若服下半時不應須再服一次效一論傷寒自汗大便閉結不通最便於老人並日久不能服藥者又恐硝黃變為別症者有屎已入直腸者以此法最便益也蜜煎導法方見大便閉一論傷寒陽明自汗反小便利大便燥硬不可攻者用此豬膽汁導法方見大便閉一傷寒小便不通先將麝香半夏末填患人臍中外用蔥白田螺搗爛成餅封於臍中上用帶縛住良久下用皂莢燒煙熏入陰中其水竇自通婦人亦用皂莢煎湯戽洗小便處小水亦通一論傷寒日數過多其熱不退夢寐不寧心驚恍惚煩躁多痰宜竹茹溫膽湯柴胡一錢竹茹二錢桔梗一錢枳實麩炒一錢黃連一錢人參一錢麥門冬去心五分陳皮一錢半夏薑炒八分茯苓一錢甘草二錢香附八分上銼一劑生薑三片棗二枚水煎溫服一論傷寒曾經汗下後而熱不退頭疼不清脈數實心尚煩躁渴不止是陰陽交此症甚危其人平素有積熱而或因心事起火也宜用加減解毒湯黃