body:
  text: 卷八兒科總論小兒形色論夫小兒半周兩歲為嬰兒三四歲為孩兒五六歲為小兒七八歲為齠齔九歲為童子十歲為稚子矣小兒半歲之間有病當於額前眉端髮際之間以名中食三指輕手滿額按之兒頭在左用右手在右用左手食指為上中指為中名指為下若三指俱熱主感受風邪鼻塞氣粗發熱咳嗽若三指俱冷主外感內傷發熱吐瀉若食中指熱主上熱下冷名中指熱主夾驚食指熱主胸膈氣滿乳食不消又要觀形察色假如肝之為病則面青心之為病則面赤脾之為病則面黃肺之為病則面白腎之為病則面黑先要分別五臟形症次看稟受盈虧胎氣虛實明其標本而治之無不可者入門審候歌觀形察色辨因由陰弱陽強發硬柔若是傷寒雙足冷要知有熱肚皮求鼻冷便知是瘡疹耳冷應知風熱症渾身皆熱是傷寒上熱下冷傷食定觀形察色面目圖觀面部左腮屬肝其色青者為順白者為逆若色赤主肝經風熱發熱拘急青黑主驚風腹痛淡赤主潮熱痰嗽右腮屬肺其色白者為順赤者為逆若赤色甚者主咳嗽喘急悶亂飲水傳於腎則小便赤澀或淋閉不通額上屬心其色赤者為順黑者為逆若青黑主驚風腹痛瘛瘲啼哭微黃主盜汗頭髮乾燥驚疳骨熱鼻屬脾其色黃者為順青者為逆若色赤主脾經虛熱飲食少思深黃主小便閉而鼻燥衄血頦屬腎其色黑者為順黃者為逆若色赤主腎與膀胱有熱而小便不通又面赤心家熱面黃脾有積面白肺家寒面青肝有風唇赤心家熱唇黃脾有積唇白肺虛寒唇燥脾有熱眼赤心經熱眼青肝有驚眼黃脾有積眼白肺有驚鼻青主吐瀉人中青感風人中赤肺家痰人中黑腹蟲痛風池紅多蹄風池黃吐逆山根紫傷食驚承漿黃主吐青主驚唇紅面赤主傷寒臉青唇黑驚風唇青面白瘧疾面黃如土食症痢下眉頭皺驚風面頰紅渴來唇帶赤熱甚眼朦朧面黃多食積青色是驚風面白多成瀉傷寒色紫紅手指脈紋式夫小兒三歲以下有病須看男左女右手虎口三關紋理兩手食指本節為風關中節為氣關第三節為命關其紋曲直不同如紋只在本節病易治透過中節則病重過第三節則難治驚則紋青淡紅則寒熱在表深紅必主傷風痘疹紋亂則病久紋細則腹痛多啼乳食不消紋粗直射指甲必主驚風惡候紋黑如墨必困重難醫此乃神聖工巧之一端也虎口三關脈紋圖虎口叉手處是也三關在第二指應看三節第一節風關第二節名氣關第三節名命關脈指歌小兒食指辨三關男左女右一般看皆知初氣中風候末是命門易亦難要知虎口氣紋脈倒指看紋分五色紅黃安樂五臟和紅紫依稀有損益紫青傷食氣虛煩青黑之時症候逆忽然純黑在其間好手醫人心膽寒若也直上到命關粒米短長分兩端如槍沖射驚風至分作枝叉有數般弓反里順外為逆順逆交連順已難叉頭長短猶可救如此醫人仔細看初看掌心中有熱便知身體熱相從肚熱腳冷傷積定腳熱額熱是感風額冷腳熱驚所得瘡疹發來耳後紅孩子無事忽大叫不是驚風是天吊大叫氣促長聲粗誤吃熱毒悶心竅急須吐下卻和脾若將驚藥真堪笑痢後努氣眉頭皺不努不皺腸有風冷熱不調分赤白脫肛因毒熱相攻十二種痢何為惡噤口刮腸大不同孩兒有病不可下不熱自汗兼自瀉神困囟陷四肢冷乾嘔氣虛神怯怕吐蟲面白毛憔悴府氣潮熱食不化鼻塞咳嗽及虛痰脈細腸鳴煩躁訝方將有積與疏通下了之時必生詫孩兒實熱下無辜面赤睛紅氣壯強脈大弦洪肚上熱胙腮喉痛尿如湯屎硬腹脹脅肋滿四肢浮腫夜啼長遍體生瘡肚隱痛下之必愈是為良小兒脈理小兒一歲變蒸已足方有脈自寸口而生豫見小兒初生未滿月手掌高骨之際亦有脈息吸吸而動脈者氣血之波瀾既生乃成人必有氣血焉得無脈但不見有大人察其端的之至意也小兒脈歌小兒有病須憑脈一指三關定息數遲冷數熱古今傳浮風沉積當先識左手人迎主外症右手氣口主內疾外候風寒暑濕侵內候乳食痰積致洪緊無汗是傷寒浮緩傷風有自汗浮洪多是風熱盛沉細原因乳食積沉緊腹中痛不休弦緊喉間作氣急緊促之時痘疹生緊數之際驚風至虛軟慢驚作瘛瘲緊實風癇發搐搦軟而細者為疳蟲牢而實者因便閉脈芤大小便中血虛濡有氣兼驚悸滑主露濕冷所傷弦急客忤君須記大小不勻為惡候二至為脫三至卒五至為虛四至損六至和平曰無疾七至八至病猶輕九至十至病勢急十一二至死無疑此訣萬中無一失小兒五臟主病脈歌心脈心脈浮數驚與熱傷暑焦啼明白訣吊腸疝氣及盤腸壅結口瘡小腑澀心脈沉遲臟腑寒諸氣有冷痛難當小便頻數腸中冷下指端詳仔細看肝脈肝脈浮數定主風目赤翳膜又主筋流淚出血眼生眵或癢或痛怕羞明肝脈沉遲主有寒面青唇白眼喜張諸病傳入慢風候良醫仔細要參詳脾脈脾脈浮數熱痰涎能食胃惡脾臟堅滯頤口瘡停壅結唇紅臉赤胃中熱脾脈沉遲主風吹更加吐瀉慢脾傳氣虛胃弱不能食滯頤嘔惡醒脾丸肺脈肺脈浮數主便血傷寒咳嗽遍身熱氣急痰甚或瘡疹瀉痢潮熱大腑澀肺脈沉遲主虛寒臟腑滑腸或洞泄仍有咳嗽與痰涎下根不定即無根腎脈腎脈浮數實有熱偏墜膀胱痛又赤口臭咬牙是腎驚火熱齒內出鮮血腎脈沉遲定有寒臟腑停留入腎囊偏墜膀胱尤不痛浮而虛大最難當小兒死症真訣黑色如懸針眼下盧醫也須怕忽然腹痛鼻青時不必更求醫青色連目橫入耳此候必知死黑色繞口及連目看看定不足黑色眉間也不良十日必然亡人中黑色入口來孩子入泉埋水腫之病準頭黑報君腎氣滅咳嗽切忌白入眉肺絶要君知孩子吐時鼻色白命斷難再得中風切忌面如妝焉能得久長目陷無光兼直視必定三朝死更有瞳人不動時死候要君知目似開如又不開也是死之媒口噤全然不進乳此病終不起瀉下之物如溺血孤兒不得活長吐不止止又吐休要勞心顧痢久不食更啖人終與死為鄰瀉痢不歇歇又來指日下泉臺小便艱難又大渴畢竟難得活大便用藥全不通扁鵲也無功耳上主瘡黑斑出醫人無此術久嗽四肢皆逆冷無由難得醒體熱多應睡不醒休要費精神痘疹出後熱不退此候應為害下糞青黑不止時不必覓良醫久渴之後加燥渴命必難得活腹腫脹時氣又粗終久命不蘇小兒死候形症太衝無脈滿口枯涎身出黑汗舌縮生瘡五心凸腫瀉出黑血丹毒遍身瀉止又瀉直視看人黑麵狂躁驚叫咬人吐瀉不止魚口氣粗鼻乾黑燥忽作鴉聲啼哭無淚兩眼半開四肢羸瘦氣喘無煙肚大青筋四肢逆冷汗珠不流唇反舌縮用手撤人搖頭動項囟門作坑涎如牽鋸拗腰凸腹鼻內氣冷患者皆死以上並是死候難以醫療不可順情看兒眼法小兒諸病但見兩眼無精光黑睛無轉運目睫無鋒芒如魚眼貓眼之狀個個不治或神藏於內外若昏困者無妨其有病篤而眼中神氣不脫者可以活眼者五臟六腑神氣之發神氣已脫脈雖僅存亦未能保相兒命短長法兒初生叫聲連延相屬者壽聲絶而復揚急者不壽啼聲散不成人啼聲深不成人臍中無血者好臍小者不壽通身軟弱如無骨者不壽魚白長大者壽自開目者不成人小便凝如脂膏不成人頭四破者不成人汗血者多死不壽汗不流不成人常搖手足者不成人頭毛不周匝者不成人兒生枕骨不成者能言而死尻骨不成者能倨而死掌骨不成者能匍匐而死躅骨不成者能行而死臏骨不成者能立而死身不收者死魚口者死股間無生肉者死頭下破者死陰不起者死陰囊下白者死卵縫通達黑者壽急驚脈訣啓蒙曰小兒脈促急為虛驚直指云浮數洪緊為急驚沉遲散緩為慢驚虎口脈紋青紫為驚風紅者風熱輕赤者風熱盛青者驚積紫者驚熱青紫相半驚積風熱俱有主急驚風青而淡紫伸縮來去主慢驚風紫絲青絲或黑絲隱隱相雜似出而不出主慢脾風形勢彎入里者順出外者逆急驚風者因內有鬱熱外挾風邪心家受熱而積驚肝家生風而發熱夫木製在金若火盛則金受克金衰不能平木木能生火火得風則焰煙起故子母縱橫血亂氣並痰涎壅塞關竅不通風火蕃盛而不得泄暴烈而成急驚也其症牙關緊急壯熱涎潮竄視反張搐搦顫動唇口眉眼眨引頻並六脈浮散洪緊治先搐鼻通關痰涎壅盛以吐風散吐之次用敗毒散保命丹或雄黃解毒丸下之驚退而神志未定投安神散但噴藥不下通關不嚏眼睛翻轉口中出血兩足擺跳肚腹搐動或神緩而摸床尋衣症篤而晨昏氣促心中熱痛忽大聲叫者不治嚏驚散半夏牙皂等分為末用少許吹入鼻中一論小兒急慢驚風發熱口噤不省人事手心伏熱痰涎咳嗽上壅喘急並宜湧法吐風散全蠍炒一個瓜蒂炒十個赤小豆三十個上為末每一歲兒服一丸溫米飲調下未吐再服一論小兒急驚風初起發熱手足搐搦眼上視等症並一切感冒風寒咳嗽鼻塞聲重頭疼發熱及痘疹欲搐發搐並時行瘟疫等症宜加味敗毒散羌活獨活前胡柴胡白茯苓去皮人參枳殼去蘆麩炒桔梗天麻全蠍殭蠶白附子地骨皮川芎甘草上作一劑生薑三片水煎熱服一論小兒急驚搐搦眼翻口噤搖頭天吊痰嗽喘熱服南極壽星湯膽星防風白附子蟬蛻薄荷甘草上銼水煎服一小兒潮熱驚啼木通車前赤茯苓麥門冬蟬蛻防風白芍甘草燈草水煎服一小兒驚風咳嗽痰喘天南星一個大者炮去皮為末每服一錢生薑三片水煎溫服一論小兒胎驚內吊肚腹堅硬目睛上視手足搐搦角弓反張痰熱咳嗽一切急慢驚風並皆治之至聖保命丹南星炮去皮用白礬水浸一宿再出曬乾再用生薑水浸一宿曬乾再炒半夏同上制薄荷青黛各一兩全蠍去尾尖天麻白附子略炒殭蠶薑汁炒防風鬱金甘草各五錢麝香少許硃砂五錢上為末煉蜜為丸硃砂為衣芡實大每服一丸燈心薄荷湯化下一論小兒痰喘急慢驚風欲死但能開口灌下無不活者用千金散內閣祕傳全蠍炙熟直殭蠶各三分硃砂四分天麻四分冰片二分牛黃六釐黃連四分膽星甘草各三分上為細末每服五七釐薄荷燈心金銀花煎湯不拘時調下一論驚風退後恍惚虛怯安神定志調理之劑安神散人參茯苓去皮遠志去心天麻白附子麥門冬全蠍蓮肉茯神去皮木硃砂各等分上為細末每服燈心湯調下一小兒沉困發熱驚搐不乳視其脈紋如亂魚骨此風熱急驚之症也先用抱龍丸少許祛風化痰後用六君子湯加柴胡壯脾平肝熱遂退而驚定愈矣一小兒瘛瘲啼叫額間青黑此驚風肝木乘脾腹中作痛也先以六君子湯加木香柴胡鉤藤鉤啼叫漸緩更加當歸又二劑而安一小兒目內色青發搐目上視叫哭不已或用牛黃清心丸不愈反咬牙頓悶小便自遺此肝經血氣虛甚故耳余用補中益氣湯及六味地黃丸而痊慢驚夫慢驚風者因外感風寒內傷乳食而作吐瀉或大病之餘或誤吐下之過脾胃兩虛者也脾與肺母子也母虛子亦虛而生黏痰胃虛則能生風風能開能動故其症目偏喜開痰滯咽喉如牽鋸狀口鼻氣冷唇緩面青涎流口角將復瘛瘲是也治宜祛風活痰健脾生胃不可妄用腦麝巴粉等藥其有眼閉四肢厥冷者名曰慢脾風極危篤速用回陽之藥手足漸溫復以醒脾散理之其服藥不效太衝脈尚有者灸百會穴但面暗神慘魚口鴉聲脾痛脅動身冷黏汗頭搖髮直睛定口瘡喘嗌仄臥唇縮氣粗者不治加味和中散治小兒慢驚風人參白朮去蘆各一錢白茯苓去皮用陳皮各五分半夏七分全蠍炒五分天麻七分細辛三分薄荷三分甘草二分上銼一劑生薑棗煎服乳母亦宜服之一論小兒吐瀉不止作慢驚風脾困昏沉默默不食宜醒脾散人參白朮去蘆白茯苓去皮木香全蠍殭蠶白附子天麻甘草上銼生薑三片棗一枚水煎服一方去天麻殭蠶加炮南星半夏曲陳倉米二百粒水煎熟旋服之一論慢驚乃元氣虛損而至昏憒急灸百會穴若待下痰不愈而後灸之則元氣脫散而不救矣此乃臟腑傳變已極總歸虛處惟脾受之無風可逐無驚可療此因脾虛不能攝涎而作痰也此方專治慢驚涎潮發搐或吐或瀉不思飲食神昏氣弱宜用紫金錠子人參白朮去蘆白茯神去皮木山藥炒乳香辰砂各二錢赤石脂醋炒七分麝香一錢茯苓二錢上為細末以糕一兩為丸如彈子大金箔為衣每一粒薄荷湯研化服一小兒嘔吐不食手足搐搦痰上壅手足指冷額黑唇青此腎水勝心火也用五味異功散加木香炮薑頓安乃去炮薑再劑而愈一小兒潮熱發搐痰涎上湧手足指冷左腮至申酉時青中隱白手足時搐此肝經虛弱肺金所勝而潮搐脾土虛弱而手足冷也用補中益氣湯以調補脾肺用六味地黃丸以滋補肝腎而愈蓋病氣有餘當認為元氣不足若用瀉金伐肝清熱伐痰則誤矣一小兒慢驚睡多驚啼凡面黃脈細者難治用此藥與乳母服之釀乳法木香沉香藿香丁香減半陳皮人參神麯炒麥芽炒上銼每服四錢紫蘇十葉生薑十片棗二枚水煎先令乳母食後捏去宿乳汁服之即仰臥霎時令藥入乳之脈次令兒吮不可過飽亦良法也五味異功散方見脾胃補中益氣湯方見脾胃六味地黃丸方見諸疳慢脾慢脾之症面赤額汗舌短頭低眼合不開睡中搖頭吐舌頻嘔腥臭噤口咬牙床手足微搐不收或身冷或身溫而四肢冷其脈沉微陰氣極盛胃氣極虛十救一二蓋由慢驚之後吐瀉損脾病傳已極總歸虛處惟脾所受故曰慢脾風若遂風則無風可遂療驚則無驚可療但脾間涎痰壅滯而然耳世所謂慢驚難療者慢脾風是也宜服加味四君子湯人參三分白茯苓三分蒼朮三分炮乾薑四分白朮炒六分製附子一分羌活一分炙甘草四分上銼生薑三片棗一枚水煎服一論慢驚慢脾危惡之症藥力不到者但看兩腳面中間陷處有太衝脈即灸百會穴三五壯炷如小麥大灸後仍與醒脾之劑調之一論小兒慢脾風內虛昏迷不醒宜加味大醒脾散人參白朮去蘆炒白茯苓去皮橘紅丁香南星炮全蠍去毒炒天麻煨白附子煨山藥炒木香石蓮肉去殼石菖蒲肉豆蔻砂仁甘草一論小兒驚風后聲啞不能言及諸病之後不能言天南星一個炮去皮為末每半字五歲兒半錢獖豬膽汁調食前服一論治慢驚慢脾之聖藥也一錠即有起死回生之功頃刻奏效故名回生錠真海上仙方也急驚亦效回生錠人參五錢白朮去蘆油一兩白茯苓去皮懷山藥桔梗各一錢甘草三錢膽星五錢赤石脂煨五錢辰砂二錢乳香二錢半礞石煨金色三錢牛黃一錢麝香一錢上為末搗勻印作錠子金箔為衣陰乾每三五分薄荷湯化下諸疳脈訣啓蒙曰小兒脈單細為疳勞虎口紋白色面白者為疳夫疳者甘肥無節乳哺不調或稟賦怯弱血氣不足蓋十五歲以前為疳以後為勞也書載五疳病關五臟要亦脾家有積一臟失治而傳其餘也脾家病去餘臟皆已症雖分乎冷熱治當以補為先宜用地黃丸五疳膏肥兒丸之類一論小兒疳病面黃肌瘦肚大青筋大便色白小便渾濁或澄之如米泔此疳病也消疳湯山楂去子白芍炒黃連薑汁炒白茯苓白朮去蘆澤瀉各一錢青皮四分甘草生三分上銼一劑薑棗煎服一治小兒疳積發熱肚大青筋骨瘦如柴消疳退熱散山楂去子烏藥燈心竹茹檳榔尖使君子蕪荑仁淮木通黑牽牛大黃柴胡莪朮煨枳殼去穰黃芩甜葶藶上銼水煎溫服一論肝膽經熱毒瘰癧或耳內耳下生瘡發熱潮熱或肝經濕熱下注囊癰便毒腫潰或小腹脅股結核凡肝膽經部分一切瘡瘍發熱並用之九味柴胡湯柴胡黃芩炒各五分人參山梔半夏龍膽草當歸芍藥各三分甘草二分水煎服一論小兒肝疳白膜遮睛肝經虛熱血燥或風客淫氣而患瘰癧結核或四肢發搐眼目忽抽動痰涎上壅凡傷損出血多抽搐發熱又治腎肝腦熱消瘦手足如冰寒熱往來滑泄肚脹口臭乾渴齒齦潰爛爪黑麵黧遍身兩耳生瘡或耳內出水或發熱自汗盜汗或便血諸血失喑或小便淋閉咳嗽吐血或咽喉燥痛口舌瘡裂或稟賦不足肢體瘦弱解顱鶴節五遲五軟或畏明下竄或早近女色精血虧耗五臟齊損凡屬肝腎諸虛不足之症皆宜用之以滋化源其功不能盡述六味地黃丸懷生地黃酒浸砂鍋內瓷碗盛蒸至極黑搗碎入石臼搗如泥成膏八兩山茱萸酒蒸去核取肉乾山藥各四兩牡丹皮去骨白茯苓去皮福澤瀉去毛各三兩上忌鐵器為細末和地黃膏加煉蜜為丸如梧子大每服三五十丸空心白滾水下一治小兒五疳潮熱面黃肌瘦煩渴肚大青筋手足如柴精神困倦歷試有效無疾預服此藥則諸病不生元氣虛者服半月身體健壯保嬰五疳膏青皮麩炒二錢橘紅五錢白朮去蘆蜜水炒一兩半白茯苓七錢半麥門冬去心一兩使君子肉銼炒七錢五分山楂肉五錢麥芽炒五錢金櫻子肉各炒五錢芡實仁二錢半蓮心肉隔紙炒五錢甘草二錢上為末和勻重七兩每次用藥末一兩煉蜜四兩調和成膏每日中晌晚間各服一二茶匙溫水漱口身熱咳嗽加地骨皮百部肚腹飽脹大便為稀水腹鳴作聲或因蟲出不知加檳榔二錢木香一錢稟受氣弱加人參二錢半一論消疳化積磨癖清熱伐肝補脾進食殺蟲潤肌膚養元氣真王道也肥兒丸人參三錢半白朮去蘆白茯苓去皮各三錢黃連薑炒錢半胡黃連五錢使君子去殼四錢神麯炒麥芽炒山楂肉各三錢半甘草炙三錢蘆薈二錢半碗盛泥封固置坑中四面穀粳火煨透用上為末黃米糊為餅白湯化下或作丸黍米大每服二三十丸看兒大小米湯下積癖夫癖塊者嬰兒飲食失調三焦關格以致停滯腸胃不得宣通初得為積久則氣血與痰裹積塞於腹脅及瘧家縱飲生冷漿水亦能成之其症作痛有時面黃肌瘦倦怠無力或生潮熱寒熱是也治先除去寒熱次用消堅散結和脾益胃之劑理之更用灸法貼藥久之自然收效一論小兒腹中癖塊發熱憎寒口乾小便赤或大便稀溏或腹脹腫滿或痰嗽喘熱不思飲食面黃肌瘦四肢困倦等症淨府湯柴胡一錢黃芩八分半夏薑炒八分人參三分白朮去蘆炒八分白茯苓去皮二錢豬苓五分澤瀉二錢三稜煨七分莪朮煨七分山楂肉一錢胡黃連三分甘草三分上銼一劑生薑三片棗二枚水煎溫服一論小兒癖積日久不消元氣虛弱脾胃虧損肌肉消削肚大青筋發熱口乾肚腹脹滿抑肝扶脾散人參五分白朮六分茯苓八分陳皮六分青皮殭蠶炒六分龍膽草酒洗八分白芥子炒八分柴胡三分山楂八分神麯炒六分黃連薑炒一錢胡黃連三分甘草三分上銼一劑生薑三片棗一枚水煎溫服黃龍丸扶溝劉小亭傳雄黃一錢半蜈蚣兩條砂鍋內炒去頭足蘆薈三分阿魏三分牛黃一分天竺黃三分上為末化黃蠟一兩為丸如緑豆大先服七丸則熱退次服九丸則塊消三服十一丸則病根除每用黃蠟煎雞子清入藥用黃酒下肥兒丸方見諸疳治癖疾如神一專貼癖積氣塊身體發熱口內生疳此藥用狗皮攤貼患處每個重七錢貼三日止熱七日覺腹微痛十日大便下膿血為驗大有神效忌生冷腥膩發物百日神仙化癖膏真香油二斤四兩秦艽五錢三稜五錢黃丹一斤二兩水飛過炒紫色黃柏五錢穿山甲十四片當歸三錢莪朮五錢全蠍十四個大黃三錢蜈蚣五錢木鱉子七個上將藥入油內煎黃色為度濾去渣搗爛待用油冷時下黃丹用文武火熬槐柳條不住手攪出黑煙氣滴水成珠手試軟硬方可離火次下五味細藥併入搗爛粗渣於內真阿魏二兩乳香五錢沒藥五錢麝一錢皮硝三錢風化為末調勻以瓷器內盛之如用坐水中熔開不可火上化如有馬刀癧子瘡加琥珀一兩在內無有不效驗者也將軍百戰百勝膏貼癖如神大黃白芷各二兩三稜莪朮各一兩木鱉子十個蜈蚣十條穿山甲十五片巴豆一百五十粒萆麻子一百五十個梔子五個黃連五錢槐柳條三百寸香油二斤入藥熬黑色去渣濾淨再加黃丹一斤熬點水成珠再加血竭五錢蘆薈五錢天竺黃五錢輕粉五錢阿魏五錢麝香五分黃連二錢硼砂二錢為末下油為妙一治小兒發熱癖疾之甚及眼蒙方明目化癖丹牛黃一分片腦一分熊膽一分麝香三釐乳香三釐上共為細末先將乳汁於銅勺內炭火上滾黃色下前藥急取出攪勻於油單紙上丸如米粒大男左女右臥時點入大眼角內閣眼自化頭上汗出至胸前第二丸汗至臍上第三丸汗至臍下再點二三丸腹痛下膿血自愈妙不可言化癖金丹內閣祕傳蟾酥水泡黃蠟各二錢羚羊角牛黃各五分麝香三分巴豆肉一錢硇砂冰片各二分上為末丸如菜子大每用一粒用扁頭針在患處刺破皮入之用膏藥貼上一伏時揭起其癖化膿血出盡服調理脾胃之藥而愈一論小兒患癖年深不愈諸醫以攻克殺伐之劑屢投不愈以致元氣耗憊脾胃損傷血氣乾涸肢體羸瘦面色痿黃肚大青筋身熱自汗喘急氣促泄瀉腹脹浮腫不思飲食遂以補中益氣湯久服而愈熱症小兒之病惟熱居多夫熱有虛有實實則面紅目赤氣粗口乾燥渴小便赤澀大便堅閉五心煩熱日夜焦啼發壯熱宜大連翹飲主之虛則面白眼青氣微口中清冷恍惚神緩大便稀而小便頻夜則盜汗發虛熱宜惺惺散主之其有乍冷乍熱怫鬱驚惕上盛下虛此冷熱不調候也如熱在表宜汗在裡宜下表裡俱熱則宜解散其或表裡已解熱又時來此表裡俱虛氣不歸元而陽浮於外不可再服涼藥必使陽斂於內身體自涼宜參苓白朮散主之又有潮熱則發熱有時驚熱顛叫恍惚夜熱夕發旦止餘熱寒邪未盡食熱肚腹先發熱疳熱骨蒸盜汗壯熱一向不止煩熱心躁不安積熱頰赤口瘡風熱汗出身熱虛熱困倦少力客熱來去不定癖熱涎嗽飲水寒熱發如瘧狀血熱巳午時發熱瘡疹熱耳鼻尖冷十六者大同而小異諸症得之各有所歸其間或有三兩症交互者宜隨其輕重而處治之蓋小兒氣稟純陽臟腑生熱陰陽氣變熏蒸於外致令身熱也若肝熱則兩眼赤痛流淚羞明或生翳障心熱則口內生瘡小便赤腫淋瀝不通肺熱則鼻衄不止大腑閉結脾熱則多涎沫口內長流心脾熱則生重舌木舌胃熱則作口臭腎熱則耳聾或出膿汁此五臟所生熱各不同是不可以概論也大抵熱則生風風則悸矣一論小兒心經邪熱心與小腸受盛乃水寶之處常宜通利壅則結滑則利熱則澀盛則淋平涼心火三焦自順不待疾作而解症成而療者疏通有之矣一十五味加湯使用才覺蘊熱客熱寒邪風邪冒之肺經心將受之不受獨傳於小腸或閉或澀或赤或白淋瀝不通榮衛不通壅之作疾其發多端以致膈熱眼目赤腫唇口白瘡津液不生涕唾稠盛須在表裡俱得其宜驚風悉能散之痰熱亦自除之連翹之功可謂大矣大連翹飲連翹瞿麥穗滑石車前子牛蒡子赤芍藥各八分山梔子木通當歸防風各四分黃芩一錢二分柴胡甘草各一錢二分荊芥穗五分蟬蛻五分上銼作一劑竹葉十片燈草十根水煎服風痰熱變蒸熱加麥門冬實熱丹熱加大黃胎熱瘡疹餘毒加薄荷葉癰疽毒熱加大黃芒硝一論小兒蘊積熱毒唇口腫破生瘡牙縫出血口臭頰熱咽痛煩躁不寧並痘疹餘毒未解或頭面身體多生瘡癤宜五福化毒丹犀角鎊三錢桔梗一兩生地黃泔浸赤茯苓去皮鼠黏子微炒各五錢粉草朴硝各三錢連翹玄參各六錢青黛二錢上為細末煉蜜為丸如龍眼大每服一丸薄荷湯研化下兼有驚加硃砂為衣一論小兒變蒸一症乃小兒蒸皮長骨變幻精神不須服藥其有兼傷風咳嗽痰涎鼻塞聲重變蒸發熱宜服此方惺惺散人參白朮去蘆白茯苓去皮甘草炙桔梗白芍炒天花粉細辛薄荷葉上銼每服三錢水煎溫服感冒一論小兒感風或冒寒用老蔥三四根舂極爛以手抹來相搽滿掌烘溫暖向病者遍身擦之通氣處再遍擦幾遍暖處出汗立愈出痘疹屢驗絶妙一治小兒面青身冷默默不語用燈火遍身手足按穴爆之立醒一論小兒傷寒頭痛壯熱惡寒咳嗽鼻塞聲重痘疹欲出發搐驚風喘嗽手足搐搦等症宜服人參敗毒散羌活獨活柴胡前胡桔梗白茯苓枳殼川芎薄荷葉人參甘草上銼薑蔥煎服一論小兒風寒外感驚風內積發熱喘促咳嗽痰涎潮熱搐搦並痘疹初作羌活膏人參羌活獨活前胡川芎桔梗天麻各五錢薄荷地骨皮各三錢甘草二錢上為細末煉蜜為丸如芡實大每服一丸薑湯研化下一論小兒四時感冒傷風瘟疫身熱昏睡氣粗喘滿痰實壅嗽及驚風潮搐蠱毒中暑並瘡疹欲出發搐皆可服之壯實小兒三五日服一丸可免驚風痰喘等疾宜抱龍丸南星為末入膜月黃牛膽中陰乾百日取出八錢天竺黃雄黃辰砂研各四錢麝香一錢上為細末煮甘草膏為丸如皂角子大每服一丸薄荷湯研化下百晬內者作三服或用臘雪水煮甘草膏汁和藥尤佳按上方若風熱痰嗽或急驚發搐昏睡咬牙形病俱實宜用此方若初冒風寒咳嗽痰盛氣喘者屬客邪內作也先用十一味參蘇飲若邪既解而腹脹吐瀉或發搐咬牙睡而露睛屬脾肺氣虛也用四君子湯加陳皮名異功散切忌祛痰表散若過服攻伐而致前症者尤宜溫補脾肺參蘇飲方見咳嗽脾胃一論小兒諸病因藥攻伐元氣虛損脾胃衰憊惡寒發熱肢體倦怠飲食少思或兼飲食勞倦頭痛身熱煩躁作渴脈洪大弦虛或微細軟弱右關寸獨甚亦宜用之大凡久病或過服克伐之劑虧損元氣而諸症悉具之最宜此湯調補若無有前症之兒為患者尤宜用之補中益氣湯黃耆蜜水炒揀參各八分白朮去蘆油炒當歸身酒洗各一錢陳皮甘草炙各五分升麻柴胡各二分上銼薑棗煎空心溫服一論小兒脾胃虛弱或因克伐之過致飲食少思或食而難化或欲作嘔或大便不實脾胃虛損吐瀉少食宜用四君子湯人參白朮去蘆炒白茯苓去皮甘草炙各等分上銼薑棗煎服六君子湯治脾胃虛弱飲食少思或大便不調肢體消瘦面色痿黃即四君子湯加陳皮半夏一論小兒脾胃虛弱吐瀉不食或驚搐痰盛或睡而露睛手足指冷或脾肺虛弱咳嗽吐痰或虛熱上攻口舌生瘡弄舌流涎若母有疾致兒患此母亦當服之異功散人參白茯苓去皮白朮去蘆炒甘草炙陳皮各等分上用薑棗煎服傷食經云脈滑者有宿食也虎口脈紋黃色為脾家有積小兒脈沉者為乳不消夫小兒傷食皆因乳哺不節過食生冷堅硬之物脾胃不能克化積滯中脘外為風寒所搏或因夜臥失蓋以致頭痛身熱面黃目胞微腫腹痛脅脹足冷肚熱喜睡神昏不思飲食或惡食或噁心或嘔或噦或口噯酸氣或大便敗卵臭或氣短痞悶或胃口作痛或心下痞滿按之則痛此皆為陳積所傷也宜以萬億丸利之若內停於食或外又感寒邪者則人迎氣口俱緊盛頭痛惡寒拘急兼前等症宜以太和散佐之葛氏曰乳者奶也哺者食也乳後不可與食食後不可與乳緣小兒脾胃怯弱乳食易傷難於消化初則成積久則成癖成疳變為百病可不慎乎萬億丸方見通治治傷食百病一論內傷乳食肚腹脹痛外感風寒頭痛發熱宜服太和丸紫蘇陳皮香附羌活蒼朮川芎枳殼山楂神麯炒麥芽炒甘草炙生薑三片水煎溫服一治小兒食積腹痛膨脹肚硬青筋黑醜半生半炒檳榔各三錢木香五分上為細末每服五分黑砂糖調入滾水服立消一論小兒時常傷食皮黃肌瘦肚大腹脹用此焦餅令常食之消食餅蓮肉去皮山藥炒白茯苓去皮芡實去殼炒神麯炒麥芽炒扁豆炒山楂去子上各等分為末每四兩入白麵一斤水同和烙焦餅用一論此藥消食止泄止吐消疳消黃消脹定肚痛益元氣健脾胃啓脾丸人參白朮去蘆炒白茯苓山藥蓮肉去心皮各一兩山楂肉陳皮澤瀉神麯炒各五錢上為末煉蜜為丸如緑豆大每服三四十丸空心米湯送下小兒常患傷食諸疾服之立愈一論小兒傷食肚大腹脹用做酒小曲一枚為末打入雞子一個調勻入鹽少許蒸熟食之每早服一次可數次而愈一論健脾胃進飲食消積滯殺疳蟲長肌肉乃保嬰第一方也保嬰丸臨川徐培鴻試驗人參三錢白朮去蘆五錢橘紅刮淨五錢白茯苓去皮四錢甘草炙二錢青皮去穰三錢砂仁二錢半木香二錢五分山藥五錢蓮肉去皮與心三錢使君子去殼三錢山楂肉三錢六神麯炒三錢上共為細末用生荷葉包粳米炒熟去荷葉將米杵爛以青布扭出更煮成糊為丸如麻仁大第二十五丸或三十五丸至五十丸陳米炒熟煎湯不拘時服一小兒食粽後咬牙欲吐頃間腹脹昏瞶鼻青黃赤此脾土傷而肝氣所動食積發厥也先令雞翎探吐出酸物頓醒節其飲食勿藥而愈一小兒好吃粽忽腹脹痛用白酒麴末同黃連末為丸服之愈一小兒因停食腹痛服峻利之藥後患瘧日晡而作此元氣下陷以補中益氣湯治之千金肥兒餅小兒無病日常食三五餅可防患於未然妙不可言嬰兒恆缺乳飲食不消停脾胃一傷損吐瀉兩相併痰嗽加吭喘熱積致疳驚面黃肌瘦削腹脹肚青筋赤子焦啼叫慈母苦傷情吾心懷幼切家蓮子茯苓芡實幹山藥扁豆薏苡仁以上各四兩神麯麥芽陳人參使君子山楂國老並六味每二兩白糯米二升藥米均為末布裹甑內蒸白糖二斤半調和餅印成每日二三餅諸病即安寧肥兒王道藥價可擬千金吐瀉夫小兒吐瀉因六氣未完故六淫易侵兼以調護失常乳食不節遂使脾胃虛弱清濁相干蘊作而然大概有冷有熱有食積三者之不同也蓋冷者脾胃虛寒水穀不化小便白而大便青或如糟粕手足厥冷或吐或瀉宜助胃膏主之如上之症或兼有外感風寒內傷生冷身熱乍涼乍熱作吐瀉者宜藿香正氣散主之熱者脾胃有濕大便黃而小便赤口乾煩渴四肢溫暖或吐或瀉宜甘露散主之如上之候有兼中暑受熱作吐瀉者宜茹苓湯主之或益元散亦可食積者因傷食過多積滯脾胃則腹脹發熱若吐如酸醙氣或瀉如敗卵臭宜萬億丸微利即愈利後不愈乃脾胃虛弱仍助胃膏主之凡吐瀉初起者即服燒針丸鎮固之即效大抵吐瀉之症多因乳食以傷脾胃乳食傷胃則為嘔吐乳食傷脾則為泄瀉吐瀉不止漸到日深致其脾氣之虛慢驚之候自此而得可不慎乎吐瀉不治症小兒瀉不定精神好者脾敗也吐瀉唇深紅者內熱故也不退必死而黑氣喘者不治大渴不定止之又渴腎敗也遺瀉不覺者死燒針丸治吐瀉如神黃丹水飛過硃砂白礬火煅各等分上為末棗肉為丸如黃豆大每服三四丸戳針尖上放燈焰上燒過存性至爛涼米泔水調服瀉者食前吐者無時外用緑豆粉以雞子清和作膏以塗腳心如瀉塗囟門上止則去之一治脾胃虛弱吐瀉不食凡虛寒症先服此以正胃氣五味異功散人參白朮去蘆茯苓去皮陳皮甘草上銼薑棗煎服一論小兒吐瀉脾胃虛弱飲食不進腹脅脹滿腸鳴吐瀉虛寒等症助胃膏人參白朮炒白茯苓去皮丁香木香砂仁白豆蔻肉豆蔻官桂藿香甘草各一錢陳皮五分山藥四錢上為細末煉蜜為丸如彈子大每服一丸米湯化下兼治哯乳便青或時夜啼胎寒腹痛一論四時不正之氣寒疫時氣山崖瘴氣雨濕蒸氣或中寒腹痛冒風吐瀉中濕身重泄瀉脾胃不和或飲食停滯復感外寒頭疼憎寒嘔逆噁心肋膈悶或發寒熱無汗藿香正氣散藿香一錢紫蘇八分陳皮厚朴薑炒白朮去蘆炒茯苓去皮桔梗大腹皮白芷甘草炙各五分半夏薑汁炒五分上銼一劑薑棗煎服一論小兒夏秋之月霍亂吐瀉身熱口渴加減茹苓湯豬苓七分赤茯苓去皮一錢澤瀉七分白朮去蘆五分黃連五分竹茹一錢乾葛七分天花粉二錢甘草五分上銼生薑煎服如熱極加石膏知母瀉極加升麻腹痛加炒白芍一錢肉桂三分寒痛亦加一論小兒五種泄瀉赤白痢疾宜用鐵門拴文蛤一兩炒黃色白礬一錢半生半枯黃丹二錢上為末用黃蠟一兩化開為丸如緑豆大大人每服十五丸小兒五七丸用茶一錢薑二錢煎湯下一小兒水瀉痢疾用蜜三匙枯礬末三錢蘿蔔汁調服微汗忌醋一論小兒脾胃久虛嘔吐泄瀉頻頻不止津液枯竭發熱煩渴多燥但欲飲乳食不進羸困失治變成慢驚風癇不問陰陽虛實並宜服之七味白朮散人參白朮去蘆炒白茯苓去皮藿香木香乾薑甘草上銼薑棗煎服如小兒頻頻瀉痢將成慢驚加山藥扁豆肉豆蔻各一錢薑汁一錢煎服若慢驚已作加細辛天麻各一錢全蠍二個白附子八分若小兒冬月吐瀉皆是胃寒胃虛所致加丁香兩粒若胃虛不能食而大渴不止者不可用淡滲之藥但胃元氣少故也以白朮散補之如不能食而渴者倍用乾葛加天花粉如能食而渴者白虎湯加人參一論小兒嘔吐不止宜金棗丸木香半夏南星湯泡透薑汁炒各三錢丁香陳皮各二錢砂仁藿香各五錢人參一錢半上為細末薑汁打糊和成錠辰砂為衣淡薑湯送下一論小兒久瀉久痢不止及滿口生瘡白爛如泥痛哭不已諸醫罔效用巴豆去殼一個瓜子仁七個共搗一處如泥津調貼在兩眉間手巾包待成泡揭去即愈一論小兒泄瀉用巴豆汁末為膏貼在囟門上燒線香一炷火盡即去巴豆立效一小兒泄瀉不止用山藥炒為末不拘多少入粥同粥食之立止一小兒久瀉兼脫肛小腹重墜四肢浮腫面色痿黃時或兼青諸藥到口即嘔吐審乳母憂鬱傷脾大便不實先用補中益氣湯後用五味異功散及四神丸調治其母不兩月而子母俱痊一小兒傷食嘔吐服克伐之藥嘔中見血用清熱涼血之藥又大便下血唇色白而或青問其故於余余曰此脾土虧損肝木所乘而然也令空心用補中益氣湯食遠用異功散以調補中氣使涎血各歸其源而愈一小兒吐瀉不止或攻伐過多四肢發厥虛風不省人事用此四肢溫暖神識漸省益陽散天南星為末每服三錢入京棗二枚同煎溫服一治小兒吐不定五倍子兩個一生一熟甘草一握用濕紙包炮過同為末每服半錢用米泔水調下痢疾小兒八痢者乃飢飽勞役風寒暑濕因觸冒天地八風之邪而得故以痢命名也大抵多由脾胃不和飲食過度停積於脾胃不能克化又為風寒暑濕干之故為此疾傷熱則赤傷冷則白傷風則純下清血傷濕則下如豆汁冷熱交併赤白兼下若下迫後重裡急窘迫急痛者火性急速而能燥物故也或夏末秋初忽有暴折於盛熱無所發故客搏肌膚之中發於外則為瘧發於內則為痢內外俱發則為瘧痢凡痢病久則令腫滿下焦偏冷上焦偏結則為上實下虛若脾胃濕熱之毒熏蒸清道而上以致胃口閉塞而噤口痢疾又有一方一家之內上下傳染長幼相似是疫毒痢也當先推其歲運以平其外察其鬱結以調其內審其所傷別其虛實冷熱以治之條然明白不致妄投也痢疾不治症凡小兒下痢如豆腐色者死下如屋漏水者死下痢日久大孔如孔者死下痢如竹筒注水者死又小兒赤白同下久而不禁小便赤澀腹痛時發熱唇紅舌胎氣促心煩坐臥不安狂渴飲水穀道傾陷復面容似妝飲食全不進者並不治清熱化滯湯治痢主方黃連吳茱黃煎湯拌炒白芍藥陳皮白茯苓去皮枳殼去穰炒黃芩甘草上銼一劑用生薑一片水煎空心溫服初起積熱正熾加大黃芒硝血痢加酒炒黃芩當歸地榆白痢加厚朴枳殼赤白並下加川芎歸尾桃仁紅花滑石陳皮乾薑炒黑白痢久虛加白朮黃耆白茯苓去芩連枳殼赤痢久虛下後未愈去芩連加當歸白芍白朮川芎阿膠珠裡急後重加木香檳榔腹痛加白芍川芎玄胡索枳殼小便赤少加木通豬苓澤瀉下如豆汁加白朮蒼朮防風食積加山楂枳實麥芽神麯久痢氣血兩虛者加人參黃耆當歸川芎升麻肉蔻下後二便流利惟後重不去者氣陷於下也以升麻提之一論小兒痢疾屬熱居多用黃連黃芩大黃甘草煎服赤痢加桃仁紅花白痢加滑石末同煎開板丹黃丹飛過一兩黃蠟一兩乳香一錢沒藥一錢杏仁去皮尖八個巴豆去油八個上將四味為細末將黃蠟熔開後將末藥同蠟拌勻調冷成塊丸如黃豆大每服一丸空心服紅痢冷甘草湯下白痢冷乾薑湯下水瀉冷米湯下忌生冷油膩一治休息痢及疳瀉日久不能安用雞子一枚打破用黃蠟一塊如指大銚內熔以雞子拌和炒熟空心食之一治小兒痢疾方用雞子一個冷水下鍋煮二三沸取出去白用黃研碎以生薑汁半小鐘和勻與小兒服不用茶神效一治小兒患痢脫肛色赤或痛以補中益氣湯送香連丸而愈後傷食作瀉脫肛不入仍以益氣湯服之更以萆麻仁研塗頂門一治小兒久痢裡急後重欲去不去手足並冷皆胃氣虛寒下陷也以補中益氣湯加木香補骨脂倍加升麻柴胡一治紅痢及噤口用田螺搗爛填臍中頃刻奏效一治痢不拘赤白白蘿蔔汁蜜各等分調勻服三四匙即效一治小兒噤口痢用甜梨一個挖空入蜜填滿紙包火煨熟吃立止一治噤口痢湯飲米穀不下者石蓮子去殼並內紅皮及心為細末每服量兒大小或五分或一錢二三錢用陳倉米湯調下如嘔加生薑汁一二匙一治血痢用苦參炒為末每服三分或五分米湯調下一治白痢用肉豆蔻麵包煨乳香一粒共為末每服二三分米湯調下一治久痢不止用陳蘿蔔煎湯一服立止一方用莧菜煎湯服效一治瀉久久不止不肯服藥用肉豆蔻煨去油為末三錢麥面四兩同和切面入蔥鹽煮如常食之瘧疾夫瘧疾者外因感受風寒暑濕內因飲食飢飽而作也其症不一先寒後熱者名寒瘧先熱後寒者名溫瘧寒而不熱者名牝瘧熱而不寒者名疸瘧不寒而熱骨疼節痛身重腹脹自汗善嘔者名濕瘧噯氣吞酸胸膈不利者名食瘧一日一發受病一月間日一發受病半年連發二日間一日者氣血俱病也起於三陽者多熱而發於日起於三陰者多寒而發於夜發於日者隨症而治發於夜者加血藥並用升提暫瘧可截久瘧加補經久不愈縱兒飲水結癖中脘名曰瘧母此最難痊一二髮間用截太早必變浮腫疳痢之疾然嬰兒之瘧自飲食得之居多治須以消導扶胃氣為本此祕訣也一論食瘧嘔吐痰沫及時行瘴瘧不問先寒後熱諸瘧通用清脾飲青皮厚朴薑炒草果白朮去蘆炒茯苓去皮柴胡黃芩半夏薑炒甘草上銼棗煎服小便赤加豬苓澤瀉一論停食感寒發瘧及中脘虛寒嘔逆噁心等症養胃湯蒼朮米泔浸厚朴薑汁炒陳皮半夏薑炒白茯苓去皮人參藿香草果甘草上銼烏梅一個生薑水煎服截瘧飲白朮去蘆蒼朮米泔浸陳皮青皮去穰柴胡黃芩豬苓澤瀉常山甘草上銼一劑用薑棗水煎露一宿溫服有汗而熱多者加人參黃耆知母前胡無汗熱多者加乾葛紫蘇寒多加乾薑草果痰多加半夏貝母如食積加枳實山楂麥芽神麯夜發者為陰分加當歸升麻二日三日一發者加人參黃耆白朮烏梅去蒼朮單寒加乾薑附子人參去柴芩豬苓澤瀉腹痛加厚朴檳榔室女熱入血室加小柴胡湯截瘧仙丹五月五日午時用雄黑豆四十九粒先一日以水泡去皮研爛入人言五分同研為丸如黃豆大雄黃一錢為衣陰乾收貯臨發熱早晨無根水下一丸忌熱酒熱物一時仍忌魚腥生冷之物三日黑豆圓者是一乳兒瘧疾痞塊川芎生地白芍藥各一錢半陳皮半夏黃芩炒各一錢甘草四分上作一服薑三片煎下鱉甲末半錢痰喘痰者風之苗熱生於心痰生於火火者痰之根靜則伏於脾土動則發於肺金水澄則清水沸則渾小兒痰嗽乃心火剋制肺金或寒邪停留肺腧寒化為熱必生痰喘咳逆上氣肺脹齁䶎俗為馬脾風又為喉風若不速治立見危殆奪命丹治小兒風涎灌膈利痰去風青礞石煅為末煉蜜為丸如緑豆大每七八丸薄荷湯下一小兒風痰吐沫氣喘咳嗽肚腹膨脹不思飲食小兒肺脹喘嗽人多看作風喉大黃檳榔二牽牛人參分兩等勻五味研成細末蜜水調量稀稠每將一字著咽喉不用神針法灸上其證肺脹喘滿膈高氣急兩脅煽動陷下作坑兩鼻竅張悶亂嗽渴聲嗄不鳴痰涎壅塞俗云馬脾風若不急治死於旦夕也定喘湯治齁喘氣急麻黃六分杏仁一錢半夏六分甘草水泡七次黃芩微炒三分蘇子一錢款冬花一錢甘草二分白果五枚去殼打碎炒黃桑白皮蜜炙五分上銼水煎溫服不必用生薑一論小兒脾胃虛寒久嗽不已咽膈滿悶咳嗽痰涎嘔逆噁心肚腹膨脹腰背倦痛虛勞冷嗽諸藥無效者服人參款冬花膏人參八錢紫菀一錢款冬花去梗八錢桑白皮炒一兩貝母二錢半桔梗炒二錢半紫蘇五錢檳榔五錢木香五錢杏仁去皮炒八錢五味子八錢馬兜鈴二錢半上為末煉蜜為丸如龍眼大每服一丸薑湯化下一論小兒喉中痰壅喘甚神效方用巴豆搗爛作一丸以棉花包裹男左女右塞鼻痰即墜咳嗽夫咳嗽者肺為嬌臟外主身之皮毛內為五臟華蓋形寒飲冷燥熱鬱蒸最為傷也肺實肺虛皆能壅痰而發咳也咳嗽二症難作一塗咳謂無痰有聲肺氣傷而不清嗽謂無聲有痰脾濕動而生痰咳嗽謂有聲有痰因傷肺氣兼傷脾濕也其症感風寒者鼻塞聲重停寒者悽慘怯寒挾熱者則焦煩受濕者為纏滯停水者則怔忡若痰飲則咳有痰聲痰出咳止火極則咳聲不轉面赤痰結肺氣則喘滿氣結息重風痰壅盛則咳至極頻吐乳食與痰俱盡方得少息而或實或虛則視痰之黃白唾之稀稠而可知也以歲周論之春乃上升之氣夏乃火氣炎上秋由濕熱傷肺冬則風寒外束以一日論之清晨嗽曰痰火午後皆曰陰虛夜間或有食積其咳而吐膿血者肺熱盛也久咳不已必致驚悸頑涎甚至眼眶紫黑如物傷損眼珠紅赤如血大可畏也治法風寒宜疏散煩熱宜清利受濕用勝濕之藥停水宜瀉水之劑痰飲則豁痰火極則降火肺脹則養胃疏肝風痰壅盛宜養胃去風豁痰也況肺生胃門更能溫中與表順助其氣滋潤肺經和順三焦者將見氣壯則咳漸減胃復則痰不生肺滋則咳不有乳母節飲食慎風寒咳何從而生乎一論春夏秋傷風咳嗽痰熱喘急並挾驚傷寒等症雄朱丸牛膽南星天花粉各一兩薄荷荊芥防風天麻羌活硃砂雄黃各六錢麝香三分上為細末粳米飯為丸薄荷湯送下一論冬月感寒咳嗽夜不能睡以此發之九寶飲薄荷紫蘇大腹皮麻黃桂枝桑白皮杏仁陳皮甘草上銼生薑三片烏梅一個水煎溫服一論小兒四時感冒發熱頭痛咳嗽喘急痰涎壅盛鼻塞聲重涕唾稠黏乃內傷外感一切發熱等症宜服參蘇飲紫蘇陳皮桔梗前胡半夏乾葛茯苓去皮枳殼去穰人參木香甘草上銼生薑煎服一論小兒咳嗽吐痰用甜梨一個挖小孔入硼砂一分燒熟與服或搗汁亦可一論小兒一切咳嗽不已用寧嗽膏麻黃杏仁去皮尖桔梗去蘆甘草知母貝母款冬花黃芩紫菀各五錢黃連一錢香附二錢童便炒牛膽南星一兩上為細末煉蜜為丸如芡實大每一丸白湯食後化下一論小兒身熱感冒鼻流清涕或鼻塞咳嗽吐痰輕者勿藥候二三日自愈重者服此方治痰為主輕輕解之白朮去蘆一錢白茯苓七分去皮桑白皮蜜炙七分川芎五分桔梗五分橘紅五分半夏五分防風四分甘草薄荷各三分枯芩炒三分上銼一劑生薑水煎服一治小兒傷風咳嗽發熱服解表之劑如喘促出汗此脾肺氣虛以補中益氣湯加五味子發痧小兒發痧有陰有陽陰痧則腹痛而手足冷陽痧則腹痛而手足溫或其症似寒非寒似熱非熱四肢懈怠飲食不思容顏慘楚為症不一俗呼為痧病非痧也多由感冒風寒而耍水傷濕得之其治之法宜用熱水蘸搭臂膊將苧麻頻頻刮之候紅色出為度甚者宜以針刺十指背近其爪處一分許可先將兒兩手自臂捋下血聚指頭方刺抑或視其身背有紅點以燈草蘸香油點燈燎之以上諸法使腠理開通寒邪易散血氣通暢而已矣一論小兒攪腸痧心腹腰諸痛用火龍丹雄黃焰硝各二錢共研細末每用簪挑些點眼角尖男左女右立愈通治神仙萬億丸硃砂巴豆去殼寒食麵上先將硃砂研爛即將巴豆同研極細卻以寒食麵好酒打成糕入藥中仍同研百餘下再揉和為丸如黍米大所服不過三五七丸而已看虛實加減照後引下一感冒風寒薑蔥湯下出汗一內傷飲食清茶下一心痛艾葉煎湯入醋少許送下一伏暑熱冷水送下一心膨氣脹淡薑湯送下一霍亂吐瀉薑湯下一痢疾空心茶清下一肚腹痛熱茶送下一瘧疾薑湯下一急慢驚薄荷湯送下一切雜症茶清下太乙混元丹紫河車曬乾三錢白梅花三錢辰砂一兩甘草一兩水煮半日去甘草滑石六兩用牡丹皮二兩水煎去丹皮煮水乾為度香附米一兩蜜水煮透粉草二兩甘松四錢莪朮火煅三錢砂仁去皮三錢益智去殼六錢山藥薑汁炒二錢半人參去蘆一錢黃耆蜜炙一錢白茯苓三錢白茯神去皮木二錢半遠志甘草泡去心一錢半桔梗去蘆一錢木香一錢麝香三分牛黃二分天竺黃一錢一方無混元衣梅花上共為細末煉蜜為丸如龍眼大金箔為衣每服量大小加減小兒大人婦女諸病並皆治之一中風痰厥不省人事薑湯研下一傷寒夾驚發熱薑蔥湯研下宜出汗一停食嘔吐腹脹大便酸臭薑湯下一霍亂紫蘇木瓜湯下泄瀉米湯下一赤白痢陳倉米湯下一咳嗽喘急麻黃杏仁湯下一積聚腹痛薑湯下一蟲痛苦楝根湯下一疝氣偏墜大小茴香湯下一夜啼不止燈草灰湯下一急驚搐搦薄荷湯下一慢驚人參白朮湯下一大便下血槐花陳倉米湯下一小便不通車前子湯下一夜出盜汗浮小麥湯下一發熱金錢薄荷湯下一痘疹不出升麻湯下一中暑煩渴燈心湯下一疳熱身瘦肚大手足細或淋或瀉或腫或脹或喘或嗽陳倉米湯下一論小兒諸病有餘壯盛者宜服萬億丸小兒諸病不足虛弱者宜服雄黃解毒丸雄黃二錢半鬱金二錢半巴豆二十四個去油上為末醋煮糊為丸如緑豆大每服七丸熱茶清吞下一中風卒然倒僕牙關緊急弓角反張不省人事茶清吞下一小兒急驚風痰熱等症加牛黃五分硼砂一錢水糊丸薄荷湯下一纏喉風急喉閉每七丸研化以熱水研白梅花調下或熱茶下即蘇熱則流通之意纏喉風卒死心頭猶溫者灌下即蘇一瘧疾中有癖用沉香磨水泄下黑血如泥極臭立效一諸積下利煎五苓散下之一疔瘡加全蠍一錢皂角一錢麝香少許滴水丸每服二十丸茶下若始不覺是疔瘡不曾發汗過數日方知則寒熱體痛皆罷毒氣入里須用利藥使內中毒氣下泄此藥主之一瘰癧瘡加斑蝥七個去翅足糯米炒冷茶下一切熱毒壅盛又能取積消食下熱茶下小兒初生小兒五宜一小兒分娩初離母體口有穢毒啼聲未發急用軟綿裹指拭去口中惡汁倘或不及預煎甘草黃連濃汁灌之待吐出惡沫方與乳吃或用好硃砂水飛過煉白蜜調和成膏如小豆大乳汁化服三日內止進三粒以除胎毒痘疹之患也一初生三五日宜綁縛令臥勿豎頭抱出免致驚癇一乳與食不宜一時混吃使兒生疳癖痞積一兒衣宜用年老人舊裙舊褲改作小兒衣衫切不可制紵絲綾羅氈絨之類與小兒穿一兒生四五個月止與乳吃六個月以後方與稀粥哺之周歲以前切不可吃葷腥並生冷之物令兒多疾若待二三歲後臟腑稍壯方與葷腥庶可若到五歲後食之尤嘉洗兒法凡初生兒洗浴不可先斷臍帶候洗了方斷不致水濕傷臍可免臍風臍瘡等症浴兒調和湯水須看冷熱得宜不可久浴久浴傷風寒夏不可久浴久浴則傷熱浴時當護兒背免邪風侵入不使發熱成癇疾用五根湯洗以免瘡疥之患五根湯桃根柳根梅根槐根桑根加苦參白芷同煎上每味一兩洗淨切碎用水煮去渣加豬膽汁一枚候水溫洗斷臍法一小兒初生洗訖斷臍不可用刀割以軟絹裹臍或膈單衣咬斷蓋臍不可太長又不可太短只取兒足掌長如長引外風則成臍風之患短則傷臟內痛面青啼呼臍帶中有穢蟲宜急撥去不然入腹成疾變蒸論夫小兒初生血氣未定陰陽未和臟腑未足骨格未生有變蒸之候變者異常也蒸者發熱也所以變生五臟蒸養六腑須要變蒸多遍則骨節臟腑由是而全胎毒亦因變而散氣血方榮性情有異後來出痘亦輕可也自生之日始每三十二日一變凡人有三百六十五骨除手足四十五碎骨外止有三百二十骨自生下骨而上一日十骨三十二藒為一變骨氣始全一變生一臟或一腑十變則臟腑始足每變輕則發熱微汗其狀似驚重則壯熱脈亂而數或吐或汗或煩啼燥渴輕則五日解重則八日解凡小兒之病無有不由變蒸而得也而不熱不驚無他病候是暗變者多矣此受胎氣壯故也凡變蒸須看兒唇口如上唇微腫有如臥蠶或有珠泡子者是真變蒸之候也此則決不可妄投針灸藥餌若誤之則為藥引入各經症遂難識而且纏綿不脫反為藥之所害也如或因傷食因傷風因驚嚇等項夾雜相值而發令人疑惑亦須守候兩三日俟其病勢真的是食則消食是風則行痰是驚則安神隨症調治或非變蒸時而得傷寒時行瘟病則口上無白泡其診皆相似惟耳及尻通熱此為他病可作余治業幼科者奚不詳究耶初生雜症論夫小兒初出腹骨氣未斂肌肉未成猶尚是血血凝則堅而成肌肉也書云如水上之泡草頭之露夫初生一臘之內天地八風之邪豈能速至良由在胎之時母失愛護或勞動氣血相干或坐臥飢飽相投飲酒食肉冷熱相制恐怖驚撲血脈相亂蘊毒於內損傷胎元而降生之後故有胎熱胎寒胎肥胎怯胎驚胎黃諸症生焉外因浴洗拭口斷臍炙囟之不得法或綁抱驚恐乳哺寒溫之乖其宜致令噤口臍風鎖肚不乳等症病而起此亦難治療良可哀憫小兒雜病諸方悉陳於後胎熱胎寒胎肥胎怯胎黃胎驚鎖肚不乳臍風撮口噤風客忤不尿夜啼中惡天吊鵝口口瘡重舌木舌弄舌牙疳吃泥土丹毒赤遊喉痹乳蛾眼疾耳疾鼻瘡頭瘡臍瘡蟲痛尾骨痛陰腫疝氣盤腸氣痛脫肛遺尿尿濁便血下淋吐血衄血小便閉大便閉水腫黃疸汗症解顱鶴節行遲語遲齒遲諸遲龜胸龜背滯頤囟陷囟填手拳腳拳痘瘡淋疹胎熱一論小兒胎熱因母孕時食熱毒之物過多令兒生下身熱面赤眼閉口中氣熱焦啼燥渴或大小便不通法當漸次解熱先令乳母服藥兒服乳即解決不可速效以涼藥攻之必致嘔吐而成大患也慎之慎之釀乳方生地黃三錢澤瀉二錢半豬苓去黑皮赤茯苓去皮天花粉各一錢半茵陳甘草各一錢上銼散每服三錢水一盞煎七分令乳母捏去宿乳卻服藥少頃乳之胎寒一論胎寒乳母孕時受寒生下再感外邪令兒面色青白四肢厥冷大便青黑口冷腹痛身起寒栗等症即宜當歸散服之當歸散當歸炒黃耆蜜炙桂心黃芩細辛龍骨細研赤芍各二錢上為末每服一字用乳汁調下日進三服仍看兒大小加減胎肥一論胎肥小兒生下肥肉厚遍身血色紅滿月以後漸漸羸瘦目白晴粉紅色五心煩熱大便難時時生涎當浴體更別父母肥瘦肥不可生瘦瘦不可生肥胎怯一論胎怯小兒面無精光肌肉薄弱大便白水身無血色時時哽氣多噦目無精彩宜以浴體法主之浴體法天麻末二錢蠍梢去毒硃砂各半錢白礬青黛各二錢烏蛇肉三錢酒浸焙為末麝香一字上同研勻每用三錢水三碗桃枝一握並葉五七個同煎至十沸溫熱浴之浴時勿浴背胎黃一論胎黃者皆因乳母受熱而傳於胎也兒生下遍體面目皆黃狀如黃金色身上壯熱大便不通小便不利如梔子汁乳食不思啼哭不止宜用地黃湯主之地黃湯生地黃川芎赤芍當歸天花粉豬苓澤瀉赤茯苓茵陳甘草各等分上銼每服五錢水煎食前乳母服並略滴些少與兒口中胎驚一論胎驚者由孕婦調適乖常飲食嗜欲忿怒驚僕母有所觸胎必感之或外挾風邪有傷於胎故子乘母氣生下即病也其候月內溫壯番眼握拳噤口咬牙身腰強直涎潮嘔吐搐搦驚啼腮縮囟開或頰赤或面青眼合其有著噤撮口亦此一種之所發也視其眉間氣色紅赤鮮碧者可治而活若點青黑者不治虎口指紋曲入里者可治反出外者不治治宜解散風邪利驚化痰順氣青金丸主之慎不可作慢驚而用溫藥也青金丸人參天麻煨白茯神去皮木白附子炮牛膽南星各二錢甘草炙一錢半青黛一錢硃砂水飛半錢麝香一分上為細末煉蜜為丸如梧桐子大用鉤藤皂莢子煎湯研化不拘時服鎖肚一論鎖肚者由肚中受熱毒壅盛大小便閉而不通結於肛門腹脹欲絶急令婦人以溫水先漱了口吸咂於兒前後心並臍下手足心共七處凡三五次漱口吸咂取紅赤為度須臾自通不爾無生意若有此症知此可得再生不乳一論不乳者謂初出胞胎而不吮乳也嬰兒初出胎時其聲未發急以手拭其口令惡血淨盡不得下咽即無他病若拭口不全惡穢入腹則令腹滿氣短不吮乳汁或産母取冷過度胎中受寒致令兒腹痛也宜用茯苓丸赤茯苓去皮川黃連去毛枳殼去穰麵炒各等分上為末煉蜜為丸如梧子大每服一丸乳汁化下撮口一論撮口者由胎氣挾熱風邪入臍流毒心脾之經故令舌強唇青聚口啼聲不出者當視其齒齦之上有小泡子如粟米狀急以溫水蘸青熟棉布裹手指輕輕擦破開口便安如甚則用牛黃三分竹瀝一蜆殼調勻滴入口中即愈噤風一論噤風者眼閉口噤啼聲漸小舌上聚肉如粟米狀吮乳不得口吐白沫大小便皆通白滿月一百二十日見此名曰犯風噤可急看兒上齶有點子先以指甲輕輕刮破次服定命散如口噤不開諸藥不效者生南星去皮臍研為極細末龍腦少許和勻指蘸生薑汁於大牙齦上擦之立開凡臍風撮口噤風三者雖異其受病之原則一也大抵裡氣鬱結壅閉不通並宜服淡豆豉汁與吃取下胎毒千金云小兒初生其氣高盛若有微患即須下之若不下時則成大疾難為療矣紫霜丸量而與之定命散治初生小兒口噤不開蟬蛻十四個去口足全蠍十四個去毒上為細末輕粉少許和勻乳汁調之煎服臍風一論臍風多因斷臍為風濕所乘或者胎元有熱毒則兒下胎時視其臍必硬直定有臍風必自臍發出青筋一道行至肚卻生兩岔行至心者必死於青筋初發急用燈心蘸香油用燈於青筋頭並岔行盡處燎之以截住不致攻心更以艾灸中脘三壯內服萬億丸二三粒以泄其胎毒也一治小兒臍風撮口用完全生蔥搗汁用直殭蠶三個研末調塗母乳頭上令兒吮之或用乳調蠶末灌之兒口即開一治臍風攝口用田螺搗爛入麝香一分再搗塗臍上立效經驗五通膏治小兒臍風攝口生地黃生薑蔥白蘿蔔子田螺肉各等分上共研爛搭臍四圍如指厚抱住候一二時有屁下泄而愈一治臍風用蠐螬一條將尾發兩根剪斷自然出水滴入臍內少頃即愈其蟲則在多年牆孔內人家水缸底亦有一祕方治臍風撮口殭蠶末三分牛黃六釐冰片麝香各一釐先將殭蠶牛黃搽上次將片麝用蝦蟆膽抹之一小兒犯撮口風荷包風鵝口風臍風等項並牙齦邊生白點名為馬牙作痛啼哭不乳即看口內堅硬之處或牙齦邊白點將針挑破出血用好墨調薄荷湯以手指調過再用其母油發蘸墨遍口擦之仍用青絹蘸新汲井水展口即客忤一論小兒客忤者初生之時因別房異戶外來氣息忤之一名中人是為客忤也及家人或乘馬行得馬汗氣息或衣染穢暴之氣未盥洗易衣便向兒側皆令忤也不尿一論小兒初生不尿者皆因在胎之時母食糟醃煎炙等毒物熱氣流入胎中兒因飲血是以生下肚腹膨脹腎腫如覺臍四傍有青黑色及口撮即不可救也如有青黑色不飲乳者服蔥乳湯蔥白切作四散用乳汁半小盞同煎片時分作四次服即通不飲乳者服之即飲夜啼一論小兒夜啼者此是邪熱乘心也宜化火膏用燈花三朵以乳汁調抹兒口或抹母乳上令兒吮之一治小兒觸犯禁忌而夜啼者宜醋炭熏服蘇合香丸一治小兒夜啼不止作心經有熱有虛治安神散人參黃連薑汁炒各一錢半甘草五分上銼竹葉二十片薑一片水煎服一方治驚啼用亂髮燒灰酒調服一論小兒夜啼似有邪厲蟬蛻七個下半截為末初生炒一字薄荷湯入酒少許調下或者不信將上半截為末依煎湯調下復啼如初古人立法莫知其妙中惡一論中惡天吊者冒犯邪氣也小兒卒中惡毒心腹刺痛悶亂欲死等症辟邪膏治中惡真降香白膠香沉香虎頭骨兔肉龍膽草人參白茯苓去皮各五錢上為細末入雄黃五錢麝香一錢煉蜜為丸乳香湯下天吊一治小兒天吊潮熱鉤藤散鉤藤人參犀角鎊屑各五錢全蠍天麻各二錢甘草炙一錢半上銼四劑水煎溫服鵝口一論小兒鵝口口瘡者胃中濕熱也小兒口中百病鵝口口瘡重齶不能吮乳及咽喉腫塞一切熱毒牛黃散牛黃冰片硼砂辰砂研各一分雄黃青黛各二分牙硝一分半黃連末八分黃柏末八分上共入乳鉢內研勻每用少許敷入口內一治小兒鵝口不能食乳用地龍擂水塗瘡即愈即摩蟲也口瘡一治口瘡瀉心湯用川黃連淨為細末每服一字蜜水調下一論小兒口舌生瘡乃心脾受熱口瘡赤心臟熱口瘡白脾臟冷口瘡黃脾臟熱宜用吳茱萸末醋調敷腳心移夜即愈藥性雖熱能引熱下行其功至良一論小兒滿口白爛生瘡名口糜白朮豬苓澤瀉木通生地赤苓肉桂甘草各等分水煎服一論小兒白口瘡黃丹巴豆仁同炒焦去豆用丹摻上立已咽喉並口瘡我也有妙方白礬兩錢許硼砂一錢強咽痛用吹入口瘡蜜調當一次若不愈再用保安康重舌一論重舌者脾經實火也小兒心脾有熱舌下有形如舌而小者名曰重舌及唇口兩傍生瘡當歸連翹湯治重舌歸尾連翹白芷各三錢大黃煨甘草炙各一錢上銼作二劑水煎食後頻服一方治重舌用蒲黃塗之一方用膽礬研細敷之一治小兒重舌木舌乃舌下生舌也用三稜針於舌下紫脈刺之即愈又宜竹瀝調蒲黃末敷之舌上一治小兒絆舌用布針舌下針數下溏雞屎一搽即愈一治小兒絆舌不語啼哭用布針蘸桐油燒紅針下頦挨骨邊一針即已木舌一論木舌乃舌腫硬不柔和脾經實火也瀉黃散治木舌弄舌藿香葉七分山梔一錢軟石膏五分防風四分甘草七分上銼一劑水煎不拘時服一治木舌百草霜芒硝滑石上為末酒調敷之弄舌一論小兒舌微露而即收名弄舌屬心脾虧損用補脾散補之舌舒長而收緩名舒舌乃心脾積熱少用前瀉黃散主之兼口舌生瘡作渴飲冷胃經實熱用瀉黃散作渴畏冷屬脾經虛熱用四君子湯食少作渴或大便不實脾胃虛弱也用吐瀉門七味白朮散若午後甚者脾血虛也四物湯多加參朮茯苓末應用內傷門補中益氣湯大病未已而弄舌者凶弄舌微微露即收得於病後最難瘳出長收緩名舒舌熱在心脾不用憂補脾散治弄舌人參白朮去蘆各一錢白芍酒炒茯苓各八分陳皮川芎各六分黃耆鹽炒當歸酒炒甘草炙各四分上銼每劑三錢生薑煎服牙疳一論牙疳者陽明之熱也小兒齒腫流涎腮腫走馬牙疳等症清胃升麻湯升麻川芎白芍半夏湯泡各七分乾葛防風去蘆黃連酒炒生甘草各五分軟石膏煨一錢白朮七分白芷三分上銼水煎熱服能漱口即含漱而吐之漱藥不用白朮半夏一治小兒走馬牙疳一時腐爛即死用婦人溺桶白垢火煅一錢許入銅緑三分麝香一分半敷之立效立效散治走馬牙疳青黛黃柏枯礬五倍子各一錢上藥共為細末用米泔水先漱口內將藥末摻入患處一論小兒走馬牙疳牙根臭爛侵蝕唇鼻先用甘草湯洗皮令血出塗之亦理身上肥瘡但是疳瘡用之立效玉蟾散蚵蚾即蝦蟆不鳴不跳者是用黃泥裹火煅焦二錢半青黛二錢麝香少許黃連二錢半上為細末濕則乾摻干則香油調抹之吃泥土一治小兒愛吃泥土乃脾虛胃熱所致面色青黃或是蟲動此藥皆治若不急療癖症生焉清脾養胃湯軟石膏黃芩陳皮白朮去蘆甘草胡黃連使君子茯苓去皮上銼等分水煎溫服或為末放於飲食內令兒服之黃金餅治好吃泥土干黃土為末濃煎黃連汁為餅服之立愈丹毒赤遊一論小兒丹毒赤腫風熱狂躁睡臥不安胸膈滿悶咽喉腫痛九竅有血妄行遍身丹毒及痘瘡已出未出不能快透或已出熱不解急宜服消毒飲牛蒡子荊芥穗防風黃芩各一錢犀角甘草各五分上銼水煎不拘時服如無犀角以升麻代之泥金膏治丹毒赤遊風陰地上蚯蚓糞熟皮硝蚯蚓糞三分之二共一處研細新汲井水濃調厚敷患處干則再上喉痹乳蛾一論小兒喉痹會厭兩傍腫者為雙乳蛾易治一傍腫者為童乳蛾難治乳蛾差小者為喉痹熱積於咽喉且麻且癢腫繞於外名纏喉風喉痹暴發暴死者名走馬喉風後方蘇厄湯主方桔梗二錢山豆根一錢牛蒡子一錢荊芥穗八分玄參八分升麻三分防風八分生甘草一錢竹葉五片水煎頻服外用硼砂一味噙化咽下降痰消腫碧雪散治咽喉腫痛水漿不下或生瘡重舌木舌碧雪真青黛硼砂與焰硝飛過蒲黃甘草末俱用生等分摻咽喉一治喉痹乳蛾氣絶者即時返活單乳蛾用巴豆一粒去殼打碎入綿絮團內塞鼻在左塞左在右塞右若雙蛾用兩粒塞兩鼻一喉痹乳蛾風口舌生瘡用黑牛膽一個生白礬末二兩銀硃五錢入膽內陰乾取出研末每少許吹入喉內神效眼疾一論小兒兩眼腫痛上焦火盛也吹鼻散暴病眼赤痛乳香沒藥各五分雄黃三分焰硝一錢黃丹水飛一分上為細末每用少許吹兩鼻孔一論小兒未周患兩眼腫痛拔毒膏用黃連為末水調敷腳心手心自愈如腫痛難開加薑黃牙皂朴硝為末同敷太陽穴手心足心加蔥搗爛敷之尤妙一方用熟地黃一兩以新汲水浸透搗爛貼兩腳心布裹住效一治小兒雀目不計時月蒼朮二兩為末每服一錢不計時候用好羊子肝一個以竹刀子批開摻藥在內麻繩扎定以粟米泔一大盞煮熟為度患人先熏眼後溫服耳疾一論小兒耳腫耳痛聤耳乃三陽風熱壅遏所致宜升陽散火湯加黃柏知母晚服兼服金花丸一論小兒耳熱出汁作癢乃痰也腎火上炎也宜清腎湯防風天花粉貝母黃柏鹽水炒白茯苓玄參白芷蔓荊子天麻半夏泡各五分生甘草二分半生薑三片水煎服一治小兒耳後月蝕瘡燒蚯蚓糞合豬脂敷之一治小兒患潰耳出膿水成瘡以蚯蚓糞末吹耳中又方治膿耳羽澤散枯礬末少許吹入耳中即止一方用五倍子燒存性為末吹入耳中亦止一方用抱出雞卵殼炒黃色為末香油調灌耳內即時痛止鼻瘡一論小兒鼻瘡熱壅傷肺肺主氣通於鼻風濕之氣乘虛客於皮毛入於血脈故鼻下兩傍瘡濕癢爛是名鼻𧈟其瘡不痛汁所流處又成瘡澤瀉散主之澤瀉散治鼻瘡澤瀉鬱金山梔甘草炙各一錢上為細末用甘草煎湯食後臨臥調服一治久患鼻瘡膿極臭者用百草霜研細每服五分冷水調服頭瘡一論小兒頭生肥瘡或多生蝨子搔癢成瘡膿水出不止一掃光細茶一錢口嚼爛水銀入茶內研一錢牙皂花椒各二錢為末香油調搽一小兒瘡痛經年不瘥者白礬五錢胡粉一兩水銀一兩黃連一兩半黃芩一兩大黃一兩半苦參一兩半松脂一兩蛇床子十八粒上為細末以臘月豬脂和研水銀不時敷之一小兒頭瘡胎毒諸風熱惡瘡痘瘡黃柏黃連白芷五倍子各等分上為細末用井花水調稀稠得所塗開在碗內覆架兩磚上中空處灼艾煙燻蒸以黑干為度仍取前藥再研為末清油調塗如有蟲則用前油調搽之立效一小兒頭生禿瘡用通聖散酒拌除大黃另用酒炒共為末再以酒拌焙乾每服一錢水調服外用白炭燒紅淬入水中乘熱洗之更用胡荽子伏龍肝懸龍尾黃連白礬為末油調敷之臍瘡一論小兒因剪臍外傷於風邪以致臍瘡不幹用礬龍散枯礬龍骨煅各五分共為細末每用少許乾摻臍上一小兒臍中汁出並痛用枯礬末乾摻又方黃柏末敷之又方蠶繭殼燒灰存性摻之亦可蟲痛一論小兒蟲積痛凡腹痛口中出清水者蟲積也追蟲散使君子去殼一錢檳榔一錢作一劑水煎食遠服使君散使君子去殼一錢檳榔一錢雄黃五分上為末每服一錢苦楝根皮煎湯調下一治小兒蟲積腹痛用巴豆一枚去殼捶去油以硃砂一粒同研勻用雞子一個開頂微去白入藥在內調勻仍將紙糊口用杆圈坐於鍋內水煮熟令兒食之或以茶清送下即打下所積蟲極效一治小兒吐蛔蟲蛔蟲出口有三般口鼻中來大不堪如有白蟲兼黑色靈丹縱服病難安楝陳湯苦楝根皮二錢陳皮半夏薑炒白茯苓去皮各一錢甘草五分上銼一劑生薑煎服一女子肚大腹脹蟲積瘦弱用馬慈一名地梨食之打下蟲來肚脹立消一治小兒冬月吐蛔蟲多是胃寒胃虛所致錢氏白朮散人參白朮去蘆白茯苓去皮藿香木香乾葛甘草各二錢丁香兩粒每服三錢水煎服尾骨痛一小兒尾骨痛者乃陰虛痰火所致也滋陰化痰湯當歸酒炒川芎白芍好酒炒熟地黃黃柏酒炒知母酒炒陳皮半夏薑炒白茯苓去皮甘草各等分上銼少用官桂為引或以前胡木香為引如痛不止加乳香沒藥陰腫疝氣一論小兒陰腫疝氣者寒邪所郁也五倍子燒存性為末好酒調服出汗而愈一治疝氣偏墜腫痛不可忍者槐子炒為末每服一錢入鹽三分黃酒調下立止一治小兒疝氣小腹痛引腰脊攣曲身不能直京師傳青皮陳皮三稜莪朮炮木香檳榔川楝肉芫花醋炒各五錢辣桂牽牛生取末各三錢巴豆肉不去油一錢上為細末麵糊為丸如麻子大每三丸空心一服午前一服薑湯下一治小兒陰囊忽腫或坐地多時或風邪或蟲蟻咬者蟬蛻半兩水一大碗煎湯洗腫處其痛立止若不消再煎再洗內服五苓散燈草煎服方見中暑又方用蔥園內蚯蚓屎用甘草汁調塗腫痛處或薄荷汁調塗亦可盤腸氣痛一論小兒盤腸氣痛則腰曲乾啼額上有汗是小兒為冷氣所搏而然也其口閉腳冷或大便青色不實上唇乾者是也此多因生下洗遲感受風冷而致也急用蔥湯淋洗其腹揉蔥尉臍腹間良久尿且湧出其痛自止乳香散治盤腸氣痛乳香沒藥各等分共為細末以木香煎湯調服脫肛一論小兒脫肛皆因久患瀉痢所致大腸頭自糞門出而不收是也用蔥湯熏洗令軟送上或以五倍子末敷而頻托入又以五倍子煎湯洗之亦可又方以鱉頭燒存性為末香油調敷一云以此物燒煙燻之久久自收又以陳壁土用湯泡之先熏後洗亦效提氣散方見脫肛治小兒肛門脫下極效遺尿一論小兒遺尿失禁者膀胱冷弱也益智仁七個桑螵蛸七個為末酒調服用熟白果七個送下故紙散用破故紙炒為末每服一錢熱湯調下一治小兒遺尿六味丸加破故紙益智仁人參肉桂一治小兒睡中遺尿不自覺者官桂為末雄雞肝一具等分搗丸如小豆大溫水送下每日進三服一治小兒遺糞用枯礬牡蠣煅等分為末米湯調下尿濁一論小兒尿濁澄之如米泔水也澄清飲白朮去蘆白茯苓去皮白芍炒黃連薑汁炒澤瀉山楂去子各一錢青皮四分生甘草五分上銼一劑水煎空心服一治小兒尿濁如米泔水江南做酒小曲炒為末每服五分酒調下三服而愈便血一論便血者熱傳心肺也凡初生嬰兒七日之內大小便有血出者此由胎氣熱甚之所致也因母食酒麴炙爆熱毒等物流入心肺兒在胎內受之熱毒亦傳於心肺且女子熱入於心故小便有血男子熱入肺故大便有血治法用生地黃取自然汁入蜜少許和勻溫服男女皆效一方用生蒲黃油發燒灰各一錢為末生地黃汁或米飲乳汁調服下淋一論小兒下淋乃膀胱有熱水道不通淋瀝不出或尿如豆汁或如沙石或冷淋如膏或熱淋如尿血五淋散赤茯苓去皮六分赤芍藥去皮二分山梔子二分條芩三分當歸甘草各五分一方加生地黃澤瀉木通滑石車前子各三分上銼一劑燈心一團水煎溫服吐血衄血一論小兒吐血衄血下血宜用黃金丸黃芩不拘多少為末煉蜜為丸如芡實大三歲兒每一丸鹽湯化下一治小兒吐血不止黃連末一錢淡豆豉三十個水一盞煎六分去渣溫服量兒大小加減一治吐血衄血柏枝散柏枝曬乾藕節曬乾各等分為末三歲兒每服半錢藕汁和蜜一匙白湯調下大小便閉一小兒初生大小便不通腹脹欲死急令人以溫水漱口淨口吸咂小兒前後心並臍下手足心共七處每一處凡三五次漱口吸咂取紅赤為度須臾自通不然則無生意一論小兒小便不通者膀胱火盛也神通散小便閉澀不堪言為用兒茶末一錢萹蓄煎湯來送下霎時溲便湧如泉一治小便不通腹脹欲死野地蒺藜子不拘多少焙黃色為末溫酒服立通又方用火麻仁燒灰酒調服一論小兒大便不通者臟腑有毒也小兒風與熱滯留蓄上焦胸膈高起大便不通沒藥散沒藥大黃枳殼炒桔梗各二錢木香甘草炙各一錢上銼每二錢薑三片水煎服一治新生小兒兩三日不大小便用蔥汁人乳各半調勻抹在口中同乳帶下即通一掩臍法治小兒大小便不通取連根蔥白一莖生薑一塊淡豆豉二十粒鹽一小匙同研爛捏作餅子貼於臍中烘熱貼之用絹帛托之良久氣透目通不通再易一餅二妙散六七月間尋牛糞中有蜣螂不拘多少用線穿起陰乾收貯用時取一個要全者放淨磚上四面以灰火烘乾以刀從腰切斷如大便閉用上半截小便閉用下半截二便俱閉全用為細末新汲水調服水腫一論小兒腫滿土虧水旺也並四肢腫滿陰水陽水皆可服加味五皮散五加皮地骨皮生薑皮大腹皮茯苓皮各一錢加薑黃木瓜各一錢銼散水煎服一方去五加皮加陳皮桑白皮一治小兒諸般腫脹黑牽牛半生半熟取頭細末每服一二匙桑白皮煎湯磨木香汁調服黃疸一論小兒黃疸寒熱嘔吐而渴或飲冷水身體面目俱黃小水不利不得安臥不思飲食茯苓滲濕湯茯苓茵陳山梔黃連黃芩防己白朮蒼朮陳皮青皮枳殼豬苓各二錢澤瀉二錢水煎漸漸溫服如小便不通加木通如傷食不思飲食加神麯麥芽砂仁汗症一論小兒盜汗寒熱往來胡黃連柴胡各等分為細末煉蜜為丸如雞頭子大每一丸至三丸用酒少許化開更入水五分重湯煮二三十沸放溫食後和渣服之一治小兒虛汗或心血液盛亦發為汗此藥收斂心氣新羅人參川當歸各三錢上細銼用雄豬心一個切三片每服二錢豬心一片井水一盞半煎食前作兩次服一治小兒盜汗因食生冷之物過多或熱水淘飯大能損土為水之所傷則不能制其津液故成汗自出也牡蠣煅二錢黃耆蜜炙生地黃各一兩銼散水煎服一治小兒盜汗用五倍子為末津液調塗臍中一宿即止又方用何首烏為末津液調塗亦效解顱一論小兒解顱者生下囟門不合也長必多愁少笑目白睛多面色㿠白肢體消瘦皆腎虛也一治小兒顱開解頭縫不合此乃腎氣不成腎主骨髓腦為髓海腎氣不勝所以腦髓不足故不能合丹溪治解顱以八物湯有熱加酒炒黃連黃芩甘草水煎服外用布帛緊束又以白芨末敷之人參地黃丸人參二錢懷熟地黃四錢嫩鹿茸山藥白茯苓去皮牡丹皮山茱萸酒蒸去核各三錢上為細末煉蜜為丸如芡實大用人參煎湯研化食遠服鶴節一論小兒鶴節因氣血不充故肌瘦薄骨節呈露如鶴之膝當歸地黃丸懷熟地黃酒蒸八錢山茱萸酒蒸去核乾山藥澤瀉去毛牡丹皮去梗白茯苓去皮當歸酒洗各二錢一方加鹿茸酥炙牛膝去蘆酒洗各二錢上為細末煉密為丸如芡實大每用熱水研化食前服仍以天南星炮去皮臍研細末入米醋調敷絹帛上烘熱貼之亦良法行遲一論小兒行遲肝腎虛弱骨髓不充不能行步加味地黃丸懷熟地黃八錢山藥四錢山茱萸酒蒸去核四錢白茯苓去皮牡丹皮澤瀉各三錢嫩鹿茸酥炙二錢懷牛膝去蘆酒浸二錢五加皮三錢上為細末煉蜜為丸如黍米大每服一錢空心鹽湯送下一論小兒稟受元氣不足顱囟開解肌肉消瘦腹大面腫語遲行遲手足如筒神色昏慢牙齒生遲諸虛調元散乾山藥五錢人參白茯苓去皮白茯神去皮木各二錢白朮去蘆二錢石菖蒲一錢白芍藥炒熟地黃當歸川芎黃耆蜜炙各二錢半甘草炙一錢半上銼薑棗煎不拘時服嬰兒乳母同服語遲一論小兒語遲者心氣不足也菖蒲丸石菖蒲人參麥門冬去心川芎遠志甘草水泡去心當歸乳香硃砂另研各一錢上為末煉蜜為丸黍米大每服十丸食遠粳米飲送下齒遲一論小兒齒遲者腎不足也芎藭散川芎乾山藥當歸白芍炒甘草炙各二錢半上為細末每服二錢白湯調下食後服將此干藥末擦牙齦即生諸遲一論小兒行遲齒遲解顱囟陷五軟鶴膝腎疳齒豁睛白多愁凡此皆因稟受腎氣不足當以六味丸加鹿茸補之若因精氣未滿而御女以通多致頭目眩暈作渴吐痰或發熱作熱腰腿痠軟或自汗盜汗二便澀痛變生諸疾難以名狀余嘗用八味丸或六味丸及補中益氣之劑加減用之方見補益劑無不奏效一小兒五歲不能言咸以為廢人矣但其形瘦痿乃肺腎不足遂用六味丸加五味鹿茸及補中益氣湯加五味兩月餘形氣漸健將半載能發一二言至年許始聲音朗朗龜胸一論小兒龜胸者因肺熱脹滿攻於胸膈即成龜胸也又云由乳母食麵熱物五辛轉使胸高起也龜胸丸川大黃粳火煨天門冬去心百合杏仁去皮尖麩炒木通去節枳殼麩炒桑白皮蜜炙甜葶藶隔紙炒軟石膏各一錢上為細末煉蜜為丸緑豆大每服五丸溫水化下食後臨臥服仍宜灸兩耳前各一寸半上兩行三骨罅間六處各灸三壯春夏從下灸起秋冬從上灸起依法灸之龜背一論小兒龜背者由兒生下風邪客入於脊入於骨髓致成龜背也龜胸龜背並用龜尿點其骨節自愈取龜尿法用青蓮葉按龜上用鏡照之其尿自出龜背丸枳殼麩炒防風去蘆獨活大黃煨前胡去蘆當歸麻黃去節各三錢上為細末麵糊為丸如黍米大每服十五六丸看兒大小以米湯食後服仍灸肺俞穴在三椎下兩傍各一寸半心俞穴在五椎下兩傍各一寸半膈俞穴在七椎之下兩傍各一寸半各灸三壯以小兒中指節為一寸艾炷以小麥大灸五壯愈一治小兒龜背兒生下客風入脊透於骨髓致成龜背治以龜尿點骨節即平滯頤一論滯頤乃涎流出而潰於頤間也涎者脾之液脾胃虛冷故涎自流不能收約法當溫脾為主宜服溫脾丸半夏薑汁炒一兩木香五錢丁香二錢益智仁炒五錢白朮去蘆炒一兩青皮去白五錢陳皮五錢上為細末薑汁打稀糊丸麻子大每二三十丸米飲送下囟陷一論囟陷乃臟腑有熱渴飲水漿致成泄痢久則血氣虛弱不能上交腦骨故囟如坑不得滿平宜用黃狗頭骨炙黃為末雞蛋清調敷之即合囟填一論囟填者囟門腫也脾主肌肉乳食不常飢飽無度或熱或寒乘於脾家致臟與腑不調其氣上衝為之填脹囟突而高如物堆垛毛髮短黃自汗是也若寒氣上衝則牽硬熱氣上衝則柔軟寒者溫之熱者涼之劑量輕重手拳一論手拳不展稟受肝氣怯弱致筋攣搐兩手伸展無力宜服當歸薏苡仁秦艽米仁棗仁防風羌活各等分上為末煉蜜為丸如雞頭實大麝香湯化下量兒大小服之腳拳一論腳拳不展所稟腎氣不足榮氣未充腳指拳縮無力不能伸放宜服當歸身酒洗川牛膝去蘆酒洗山茱萸肉人參牡丹皮懷生地黃補骨脂上為末煉蜜為丸如芡實大空心鹽湯送下一治富翁子八歲不能步履皆因看得太嬌放不落手兒身未得土氣以致肌肉軟脆筋骨薄弱用黃土放入夾襖內與穿內服地黃丸加人參鹿茸牛膝虎脛骨服未半料兒能行矣一治小兒稟賦腎經虛熱耳內生瘡或肌肉消瘦骨節皆露名節疳六味丸加鹿茸牛膝各一兩五味子四兩若顱解不合牙齒不生眼睛不黑腿軟難行最宜此藥痘瘡夫痘瘡者乃胎毒之所致也嬰兒在胎之時感其穢毒之氣藏於臟腑之中發時有遠近之不同耳若值寒暄不常之候痘疹由是而發因其所受淺深而為稀調焉大抵始發之時有因外感風寒而得者有因內傷飲食而得者有因時氣傳染而得者有因跌撲驚恐而得者大凡初起未見紅點與傷寒相類發熱煩躁臉赤唇紅身痛頭疼乍寒乍熱噴嚏呵欠喘嗽痰涎等症身熱未明疑似之間急須表散可服敗毒散以微發其汗則胎毒隨汗而解而痘疹亦隨發而出矣痘苗一見之際則禁表藥恐發得表虛故也惟視痘之稀稠稀者輕不須用藥而稠者重宜以九味神功散以化其毒痘自出至齊宜此加減用之能除諸病毒已解盡又看痘之起脹如何如痘不起脹此元氣虛也宜保元湯主之而痘必起脹又看痘之貫膿如何如痘不貫膿此氣血虛也宜內托散加人乳好酒此貫膿之巧法也貫膿已滿又看收靨如何若當靨不靨灰陷黑陷嘔吐白沫為表虛宜木香散治之若當靨不靨寒戰咬牙癢塌泄瀉為裡虛宜異功散治之有過服熱藥以致熱毒猖狂血氣彌盛痘爛不靨者宜小柴胡湯豬尾膏解之收靨已畢又看痘後有無餘毒若餘毒盛必因過服附子熱毒失解聚而不散以致渾身手足赤腫成癰毒也宜消毒飲五福化毒丹治之又有毒攻發為諸病宜隨症而療之大凡痘瘡七日以前為裡實不可投溫燥之藥能助毒也八日以後為裡虛不可投寒涼之劑能伐生氣也但世俗不分寒熱但見痘出不快舉手悉用陳氏治虛寒熱藥殊不知痘瘡屬燥熱者多急以丹溪涼血解毒治之若概投熱劑豈無死者今不知致病之因又不求立方之意倉卒之際據症檢方漫爾一試設有不應並其書而廢之不思之甚也余觀陳氏其意大率歸重於太陰一經蓋以手太陰為肺主皮毛足太陰為脾主肌肉肺金惡寒而易於外感脾土惡濕而無物不受觀其用丁香薑桂所以治肺之寒用朮附半夏所以治脾之濕使肺果有寒脾果有濕而兼有虛也量而與之中病則已何傷之有今徒見瘡之出遲者身熱者泄利者驚悸者氣急者渴思飲水者不問寒熱虛實率投木香散異功散間有偶中隨有功效設或誤投禍不旋踵何者古人用藥制方有向道有監製有反佐有因用陳氏之方其時必痘瘡而挾寒者其用燥熱補之故其宜也今未挾寒而用一偏之方寧不過於熱乎余嘗會諸家之粹求其意而用之實未敢據其成方也若痘瘡虛寒淡白色癢塌屬虛寒宜用之若發熱壯盛齊湧紅紫色燥癢此屬熱毒宜涼血自陳氏方盛行後屬虛寒者率得生屬熱毒者愁不救痘是胎毒古人治法只解毒然氣血虛則又送毒氣不出及不能成就故陳氏之法既行而解毒之旨遂隱只顧救其虛寒之痘而不能治其燥熱之瘡也余思治法陳氏與丹溪寒熱兼用俱不可廢如痘瘡陷頂灰白色寒戰悶亂腹脹泄瀉者屬虛寒只用異功等方治之如熱甚紅紫燥癢屬熱毒者急宜用涼血之藥消毒等散相兼而用之豈有不中其病耶余謂痘疹乃小兒之酷疾生死反掌古人論之不一有見於寒者有見於熱者習者不可執一而誤赤子之生何也蓋痘疹乃胎毒所致初生小兒失於拭去口中穢毒者一誤也及長失於未用預解胎毒免痘之方者二誤也初起發熱有當汗而不汗者三誤也將出之際有不當汗而汗者四誤也既出之後有毒盛當解而不解者五誤也起脹貫膿之時有當補虛而不補虛者六誤也有首尾症平不當下而下者七誤也有首尾實熱當下而不下者八誤也有首尾虛寒當溫補而不溫補者九誤也有過服熱藥致痘瘡後餘毒當解毒而不解毒者十誤也凡此十誤當預慎之務加通變故曰寒者溫之熱者涼之虛者補之實者瀉之又曰化而裁之神而明之若斯治者庶免小兒夭枉之禍耶視痘顏色輕重之法空谷而響應形動而影隨夫痘瘡之發也內熱和緩達於外者必輕便閉煩躁彰於外者必重有諸中形諸外者理勢之自然也夫顏色貴潤澤而嫌昏暗貴光彩而嫌枯澀貴淡紅而嫌黑滯貴圓淨而嫌破損貴高聳而嫌平塌貴結實而嫌虛薄貴稀疏而嫌稠密根窠收緊痘分陰陽見點動活更怕臉浮出要參差血宜歸附耳後心喉少於他處為佳眉稜兩顴額前光潤不泄為妙如發熱便出者重瘡夾疹者半輕半重裡外微紅者輕外黑裡赤者微重外赤里黑大重瘡內黑點如針孔者熱極青乾紫陷昏睡汗出煩躁熱渴腹脹啼喘大小便閉者困也善治者看其形色而辨之輕者獲安重能取效矣痘症辨疑賦胎毒蓄積發於痘瘡傳染由於外感輕重起於內傷初起太陽壬水克於丙丁後歸陽明血水化為膿漿勢若燃眉變若反掌若救焚兮徙薪何如焦額如落水兮拯溺不及褰裳欲知表裡虛實須明寒熱溫涼證候殊形臟腑易狀肝火激成水泡肺主涕而膿漿心斑紅紫脾疹赤黃腎經居下不受汙濁為變黑而可防觀其外症推乎內臟呵欠煩悶兮肝木之因咳涕噴嚏兮肺金之象目帶赤兮心火延於胸膈手足厥冷而昏睡兮脾土困於中央耳尻屬腎溫暖如常二處煩熱痘疹乖張先分部位次察災祥陽明從目落鼻太陽形於頭上心火炎熱則舌乾面赤肺金鬱結則胸膈先傷手足屬乎脾胃肝膽主脅肋之旁頸項三陽交會腰背統乎膀胱外症分明用心想象泄者邪盛於下吐者邪盛於上氣逆而腹脹隱隱毒甚而腰痛惶惶心熱甚而驚搐胃邪實而癲狂口燥咽乾肺受火邪而液竭便閉尿澀腎因火旺而津亡欲識痘之輕重當觀熱於形狀毒甚兮心如炎上毒微兮內外清涼寒熱往來神氣爽定知痘出必禎祥數番漸出兮春回陽谷一齊湧出兮火烈昆岡蚊蟲蚤斑刻期而死蛇皮蟬蛻引日而亡雖怕紅紫最嫌灰白最宜淡紅滋潤切忌黑陷干黃色要明潤兮猶恐薄嫩之易破痘貴幹結兮又愁癢塌之難當面頰稀而磊落清安可保胸膈密而連串吉凶難量頂欲尖圓不宜平陷漿宜飽滿切忌空瘡皮喜老而愁嫩膚愛活而怕光結實高聳始終無慮丹浮皮肉必主刑傷唇面頭腫兮八九如何可過腰痛胃爛兮一切定主災殃瘡堆口舌毒纏頸項咽瘡喉腫飲食難嘗泄痢膿血毒陷無漿人力難盡生命匪長痘瘡焦落辨別陰陽人中上下先靨為良足腰先若黑靨多凶而少吉祥神斷祕訣細嫩無分地黏連一片紅七朝虛癢塌乾燥定無膿皮膚無光亮胸前不空間身滿紅紫泡九日測死期痘腫皮不腫眼開口又開陰陽俱無縫六日一場空滿面皆稠密仔細看陰陽天庭漿不足此兒必有傷頭身色不潤膿緑臭難當此般脾氣絶不久命須亡初起瘡貼肉起後肉難通寒熱不分別癢塌七朝中見點如肝樣焦枯黑陷傷心腎二經絶此痘火中央頭面方見大頃刻又尖長此般形像見不羡有奇方十四痂堪落依然乾燥膿沉沉睡不食延日不能生目中光射鬥手足亂搖搖若逢有此疾不日命須傾五經穴痘上斜視腫不分縱然與解毒遲日一場空舌尖上見黑心經克肺經皮紅胭脂樣半月此兒亡目白睛紅赤唇紅痘三般黃漿胃先爛焦裂飲茶終初見雲中月雲中隱隱丹兩朝三日後兒命不可挽膿黃色不活干極腳攤紅牙疳瀉不食半月命須終臍凸四肢浮睛黃赤鼻頭類般顏色異十五命難留仔細看身疔咽喉前後心陰陽並腦後唇舌項陰生十四痂該落膿瘡食不進無神死蛇臭兒命必身迍見點如肝樣針苗接一連乾紅主絶水十命九難延目定神昏熱喉痰膝下冰飲湯並下瀉頃刻命難存舌上浮血點喉瘡咽不清皮紅痘不起心經克肺經如神真妙訣學者要精明預解胎毒免痘一論嬰兒初生臍帶脫落後取置新瓦上用炭火四周燒至煙將盡置地土上用瓦盞之類蓋之存性為末預將硃砂透明者為極細末水飛過臍帶若有五分重硃砂用二分五釐生地黃當歸身煎濃汁一二蜆殼調和前二味抹兒口上齶間及乳母乳頭上一日之內令吮盡次日大便遺下穢汙濁垢之物終身永無痘疹及諸疾生一子得一子十分妙法也一論小兒未出痘疹者每遇交春分秋分時服一丸其痘毒能漸消化若只服一二次者亦得減少其毒盡漸化必保無虞神效消毒保嬰丹纏豆藤一兩五錢其藤八月間收取毛豆梗上纏繞細紅絲者是採陰乾妙在此藥為主黑豆三十粒赤豆七十粒山楂肉一兩升麻七錢五分荊芥五錢防風五錢生地黃一兩川獨活五錢甘草五錢當歸酒洗五錢赤芍五錢連翹七錢五分黃連五錢桔梗五錢辰砂水飛另研一兩絲瓜兩條長五寸隔年歲經過霜露者方妙燒存性上為極細末和勻淨砂糖拌丸李核大每服一丸濃煎甘草湯化下全生保安散麻黃羌活防風升麻生地黃黃柏酒浸各五分川芎藁本乾葛蒼朮黃芩酒浸茯苓柴胡各三分紅花細辛蘇木白朮陳皮各二分甘草歸身黃連各三分連翹吳茱萸各五分上銼一劑立春立夏立秋立冬之日水煎露一宿次早溫服如一年之內依時服此四服神效永不出痘滌穢免痘湯大尹王天中傳自上方異人十月經霜後取楝樹子一升收貯到正月初將楝子入鍋內用水煮湯待溫洗兒全身永不出痘真仙方也鄉鄰出痘預防禁方一凡鄉鄰如有時行痘疹可以預防宜節其飲食謹其起居加減衣服預其藥餌亦制節謹度順養生道也麻油擦法用麻油每夜臨臥時以手中三指蘸油擦兒頭額項腰背兩手腕兩足腕然後睡即可以使輕此亦暢達流通升脫凝滯之義也三豆湯大黑豆赤小豆緑豆各一盞甘草一兩細切每日用四味瓦罐煨爛熟連豆帶湯與兒食之黑豆解腎經之毒制相火也赤小豆解心經之毒制君火也緑豆解陽明經之毒制胃火也用豆者又以形治以類從也易簡而便里閈早治以便童稚其為神巧矣乎永不出痘二五散賈蘭峰傳用有雄雞蛋七枚內取一枚開一孔去清黃淨裝入鮮明好硃砂四錢九分其孔以紙糊用雞抱出雞雛將硃砂採日精月華各七日夜收貯聽用再用起頭結絲瓜一個候老成種乾燒灰存性為末每服硃砂絲瓜灰五分為細末蜂蜜水調服服過三次永不出痘疹鄰家出痘尤宜服之油飲子若遇痘疹行時左右鄰家有出者可預服之用真香油一斤煎熟逐日與兒飲盡永不出痘看耳後筋紋斷法凡耳後筋紋似水紅色為上杏紅色次之大紅色宜退火紫黑青色皆不治又須條勻直上耳尖而無分枝者為上若分枝纏繞者雖淡紅亦凶其或過髮際者多不可救紙捻照法用學書竹紙或燒錢草紙烘乾作捻子如小指大蘸香油於燈上往來熏炙令紙條無泡不爆吒又飽蘸油又熏炙令油無泡即點捻子將患者房內窗門閉令黑暗有光處以衣蔽之看左右顴有何色點中庭有何色點觀兩顴宜以捻子在兩耳邊及鼻邊平照觀中庭宜以捻子在兩目角平照看其皮中歷歷可指是赤是紫是塊是點昭然明白若是淋疹則浮於皮外肉內無根若是痘疹根在肉內極深若以捻子當顴及中庭正照則黯而不見捻子有灰暗即掐去令明如此照之病情在內可以預見若日間以天日光觀之則不見矣初起發熱治法一論發熱之初急宜表汗使臟腑胎毒及外感不正之氣憎寒壯熱頭疼腰痛腹脹或喘嗽痰涎鼻流清涕或因驚恐跌繃而發搐搦角弓反張上宮天吊一切內外所感盡從汗出則痘出自然稀少但熱甚者其毒亦甚熱微者其毒亦微然表藥必在紅點未見之前可服敗毒散升麻乾葛紫蘇川芎羌活荊芥前胡薄荷桔梗去蘆枳殼牛蒡子蟬蛻山楂肉地骨皮甘草防風上銼生薑一片水煎臨臥服加蔥白汁五匙熱服一方無干葛加紫草如熱甚加柴胡黃芩冬月加麻黃暑月加香薷瀉加茯苓澤瀉一論小兒痘瘡才覺發熱者服之脹出見苗者服之出稀陷伏者服之起脹妙不可言神效復生丸方伯王如水傳當歸身川芎升麻乾葛白芍人參黃耆甘草辰砂各一兩二錢紫草茸一兩上為末糯米粽為丸如彈子大每服一丸河水煎滾入黃酒少許送下一論痘初發熱一服即輕百發百中預服萬靈丹紫草茸一兩山豆根五錢升麻小者葛根蟬蛻浮者殭蠶炒去絲白附子連翹去心各一錢全蠍去毒十個生甘草五分雄黃一錢五分麝香一錢蟾酥一錢好酒燉化如蜜上十二味為末用蟾酥丸如皂子大每服一丸紫草湯下一論痘瘡初出先用此藥塗面若用之早則痘疹不生於面用之遲雖出亦稀少玉顏膏黃柏去皮一兩緑豆粉四兩生甘草四兩紅花二兩上為極細末香油調成膏從耳前眼唇面上並塗之日三五度出痘治法避穢氣腋下狐臭氣房中混濁氣行遠勞汗氣溝糞濁惡氣婦人經候氣諸瘡腥臭氣硫黃蚊煙氣吹滅燈燭氣誤燒頭髮氣柴煙魚骨氣蔥蒜韭薤氣煎炒油煙氣醉酒葷腥氣麝香燥穢氣一論外解諸方凡被房事經水生産之穢所犯者以大棗燒煙解之凡補五辛厭者以生薑燒煙解之凡被酒厭者以葛根茵陳蒿燒煙解之凡被死尸之氣及厲氣所犯者以大黃蒼朮燒煙解之凡被狐臭犬羊厭者燒楓球解之凡遇風雨燒蒼朮楓球避之凡一切惡氣通以乳香燒煙燻之仲景曰小兒痘時宜燒乳香闢諸惡氣蓋榮衛遇香則行遇臭則凝故也世俗煮醋熏痘謂其能活血然醋主收斂故婦人血崩者用熏之痘毒欲升發而不欲收斂故不宜耳嘗見用醋熏變者多矣一論痘疹初出時宜用此酒遍噴四面床壁及與患人服役者皆飲能闢穢毒又以淨胭脂兩眼角點之防痘入眼胡荽酒胡荽三兩細切以酒兩鍾煎沸用紙密封勿令氣出候冷去渣從頂至頤頷微微塗之更噴背膂胸腹及兩腳皆遍再於滿房壁門戶遍灑之尤妙一論痘瘡欲出未出熱尚未解毒氣太盛稠密成片急進此三四服快透消毒如神專治內蘊邪熱咽膈不利痰涎壅嗽眼赤面腫腮項結核腫壅毒聚遍身風疹瘡毒赤腫等症消毒散牛蒡子微炒四錢荊芥甘草防風去蘆各一錢一方加黃芩一錢犀角鎊五分上銼水煎溫服一論痘瘡已出痘毒太甚以此消毒或出不快皆以服之一云痘瘡欲出渾身壯熱不思飲食若服此一劑即內消已有一兩顆出即解其半若全出即當日頭焦只三服瘥余每用此治壯盛小兒痘出毒盛殊效若虛者宜神功散尤妙化毒散紫草茸五錢川升麻甘草各二錢半上銼每服二錢糯米五十粒同煎服一論痘出毒氣太盛血紅一片不分地界如蚊蠶種或諸失血或吐瀉七日以前諸症可服解毒神效九味神功散黃耆人參白芍紫草紅花生地黃牛蒡子各等分前胡甘草錢半上銼水煎服渣再煎服熱甚者加黃連黃芩各一錢未退再用大黃有驚加蟬蛻去頭足若顆粒淡黑色者有寒乘之加桂一錢如大便閉加大黃一痘發渴用神功散當不渴或有渴者用紅花子一味煎湯飲無子即用紅花亦好加牛蒡子尤妙蓋能散胃口之瘀血故也切不可用荔枝棗能助陽經之火大發渴者用真黃土百沸湯碗蓋泡取出水少加砂糖飲之立止一痘出三日內頂陷者非虛也用神功散活血退火一四日以前有寒症其色黑慘保元湯加官桂一色白光者寒乘之神功散加官桂一腹痛者毒盛也神功散主之一面紅不退地界不分者神功散倍前胡一吐者毒盛乘火炎而宣也神功散主之一泄瀉者火盛而奔越也神功散加升麻以提之一身已涼汗出不止血隨氣溢也用當歸五錢黃耆三錢酸棗仁炒三錢作一劑水煎服立止一有痰用白附子磨服切不可用二陳湯使燥陽明經使孤陽無陰不能施化也一嗽用杏仁煎湯磨白附子服立止一遍身疼痛者以木香一味磨服即止一漿行作癢此內熱而外為風寒所乘用荊芥穗紙裹緊米糊黏住紙頭令不散燈上燒了卻於桌上擦去灰快放手指定癢痘頭點癢處一下即放退每痘癢點之立止一行漿漿足而發疔認定是黑疔痘或黑而硬或有紅絲或為大紫泡未曾解毒者仍以神功散加雄黃黃連大黃黃芩煎服卻用點法雄黃一錢研胭脂重浸水令濃調雄黃末點疔頭上立時即紅活亦神法也蓋雄黃能解毒胭脂能活血也一痘九日十日作瀉先令解毒者宜定中湯真正黃土一大塊碗盛以百沸湯泡即以碗蓋少頃出用如冷傾於盞內外以熱水燙之加入雄黃一錢硃砂五分二味為末和勻以黃土湯兩盞少加砂糖溫服立止一痘瘡腹脹渴者或瀉渴者或足指冷渴者或驚悸渴者或身溫渴者或身熱而㿠白色渴者或寒戰渴不止者或氣急咬牙渴者或飲水轉渴不止者以上九症即非熱也乃脾胃肌肉虛津液衰故也木香散主之如若不愈更加丁香官桂多煎服丁香攻裡官桂發表其表裡俱實而瘡不致癢塌喘渴而死矣一痘十一二日當靨不靨發熱蒸蒸者宜甘露回天湯砂糖半酒杯百沸湯調一大碗溫服立時熱退痘靨百發百中真有回生之力也看痘不治法初出湧壯者不治出如蠶種者不治隨出隨沒者不治如蚊蟲咬者不治氣血相失者不治倒出者不治飲水如促鼻者不治以肺氣不能疏理也看痘輕重歌輕者熱輕痘亦稀大小後先出不齊根窠紅活瘡肥滿飲食如常勿藥宜重者熱中瘡並出密如蠶種若胭脂根白頂紅並紫黑若逢血活尚堪醫起脹治法保元湯人參去蘆二錢嫩黃耆三錢甘草一錢上銼一劑生薑一片水煎溫服一當起脹而不起用穿山甲炒成珠研為末二錢酒調服一血弱不起根底淡薄以保元湯加丁香三粒肉桂一錢當歸二錢川芎一錢水煎溫服一二日初出圓暈成形乾紅少潤毒雖犯上其氣血未離以俟其氣血交會也然毒尚淺急以保元湯加官桂活血勻氣之劑如毒太盛兼解毒之藥活血加當歸五分白芍一錢勻氣加陳皮五分解毒加元參七分牛蒡子炒七分水一盞煎七分溫服二三日根窠雖圓而頂陷者血亦難聚為氣虛弱不能領袖其血也以保元湯加川芎官桂扶陽抑陰豈有不痊者哉四五日根窠雖起色不光澤生意猶存為氣弱血盛以保元湯加芍藥官桂糯米助衛制榮斯為調變之妙也五六日氣盈血弱色昏紅紫以保元湯加木香當歸川芎助血歸附氣位以全中和之道也六七日氣交不旺血雖歸附不能成漿為氣血少寒不能制急投保元湯加官桂糯米助其成漿而收濟惠之偉功斯為治矣七八日毒雖化而漿不滿為氣血有凝不能大振以保元湯加官桂糯米發陽助漿可以保全生命矣一痘至此專主貫膿膿已滿雖有他症不致壞事若痘無膿灰暗雖無他症亦死矣一痘瘡至八九日視痘頂心上有點如水珠見出此痘漏無藥可醫乃死症也八九日漿不充滿血附線紅氣弱而險也以保元湯加糯米以助其氣而駕其血斯漿成矣十一二日氣血充滿血盡漿足濕潤不斂者內虛也以保元湯血亦有力加白朮茯苓助其收斂而結痂也十三四日毒雖盡解漿老結痂之際或有雜症相仍以保元湯隨症加減不可峻用寒涼大熱之劑恐致內損之患故也十四五六日痂落潮熱唇紅口渴不食以四君子湯加陳皮山楂黃連如渴甚用參苓白朮散如熱不解以大連翹飲去黃芩主之症去之後多有內損或餘毒未解此則尤為難治也凡痘瘡發渴者為虛弱而津液枯竭也保元湯加麥門冬五味子即止如不止以參苓白朮散一二劑即止凡痘瘡不起發膿漿不厚保元湯加川芎五分丁香四分夏月二分糯米二百粒煎熟好酒人乳各半盞加入同服若頭額不起脹加川芎六分為引若面部不起脹加升麻四分為引若胸膈不起脹加桔梗四分為引若兩膝不起脹加牛膝四分為引若兩手不起脹加桂枝二分為引一論痘瘡胃虛不進飲食或口乾發渴或吐瀉等症參苓白朮散人參白朮去蘆炒白茯苓去皮甘草炙白扁豆炒蓮肉去心山藥炒各一錢五分桔梗八分薏苡仁八分砂仁七分上為細末每服五六分或一錢紅棗煎湯調下或薑湯亦可貫膿治法一論痘瘡血氣虛損或風邪穢毒沖觸使瘡毒內陷伏而不出或出參差而不勻快此藥活血勻氣調胃補虛內托瘡毒使之盡出易收易靨內托散人參黃耆當歸各二錢川芎防風桔梗厚朴薑汁炒白芷甘草各一錢木香官桂各三分上方如紅紫乾燥黑陷屬熱毒者去官桂加紫草黃芩紅花用此藥調穿山甲炒成珠研末五分同服若淡白灰黑陷伏屬虛寒者加丁香救里官桂救表當貫膿而不貫膿者倍參耆當歸煎熟臨服入人乳汁好酒同摻服此貫膿之巧法也泄瀉加丁香乾薑肉豆蔻一論痘瘡已成出齊而難脹或已脹齊而難靨者由內虛故耳蓋痘已出灰白色及頂平不起或陷伏者氣血大虛也宜此方歸茸湯嫩鹿茸酥炙當歸身酒洗上銼五錢好酒煎溫服一論痘屬虛寒八九日色白如水泡頂陷根白癢塌寒戰咬牙等症回陽湯鹿茸酥炙大附子麵包煨去皮臍嫩黃耆當歸酒洗上銼好酒煎溫服一論痘出至貫膿收靨之時倒塌伏陷心慌喘急悶亂死在須臾好揀參一兩水煎濃汁灌下即蘇一論灰白黑陷嘔吐白沫為表虛木香散十一味木香三分前胡八分甘草炙三分赤茯苓去皮一錢大腹皮一錢人參五分陳皮肉桂各八分丁香雄者五粒半夏薑炒八分訶子煨去殼一錢上銼一劑薑三片水一杯煎八分溫服嘔吐甚加白豆蔻去殼一論寒戰咬牙癢塌泄瀉為裡虛異功散十二味當歸酒洗肉豆蔻煨去油陳皮白朮去蘆炒白茯苓去皮大附子麵包煨去皮臍半夏薑汁炒各一錢厚朴肉桂各八分人參五分小丁香七粒木香磨八分上銼一劑生薑三片棗三枚水一鍾煎至八分溫服泄瀉甚加訶子肉煨一論此方發痘解毒之聖藥也治紅斑黑陷頂不起痘疔一切惡症危者用此立見起死回生之功也小靈丹雄黃硃砂各二錢乳香沒藥各一錢五分大蟾蜍取心肝瓦焙乾五分麝香二分上研細末取豬心血雞冠血丸如皂子大每服一丸身無大熱用酒化下熱甚不飲酒者紫草燈心湯下即時紅活而起一論痘瘡初出光壯忽然黑陷心中煩躁氣急喘滿妄言妄語如見鬼神急宜治之不然毒氣入臟必死人牙散人牙燒存性為細末每一個作一服酒服下立效又祕方用人牙一個火煅硃砂三分雄黃三分為細末先用甘草為末熬成膏調入三味再用無灰好酒調稀灌下治惡症痘疹不發危急至甚服之立效無價散治症同前人牙貓牙豬牙犬牙上等分各將炭火燒留煙瓦碗蓋蔽存性為末每五六歲服三四分好熱酒調下癢塌寒戰泄瀉者煎異功散調下若無貓牙用人牙一味亦好但不如四牙全為妙一論痘瘡寒戰咬牙六七日陷而不發不貫膿陷入黑色氣欲絶者立效有瀉者不宜服三仙散楚黃賓江傳穿山甲半斤用好漿兒酒一斤以山甲微火炙乾再浸再炙以酒干為度穿山甲一兩麝香二分硃砂以麻黃水煮過一錢上為細末每服五七分或一錢溫酒調下一方治前症單用穿山甲用炭火炒成珠為末每服五七分木香湯調服亦效一論痘瘡紫黑乾枯變黑歸腎身如火炙之熱不瀉者可服犀羚散吳竺陽傳烏犀角羚羊角二味磨冷水服之有回生之妙一論痘瘡不出黑陷幾死者可服萬金散人貓豬犬臘晨燒少許微將蜜水調上將前四物的糞於臘日早晨日未出時貯於銀鍋內用炭火攻令煙盡為度但是瘡發不快倒靨黑陷者及一切惡瘡每用一匙蜜水調服其效如神一論痘瘡自出至收靨時理不宜下者用此導之若既靨之後有前症者又當下之一論痘瘡中有長大紫黑者為疔毒把住痘不起發急用簪挑破納入後藥四聖散珍珠三五粒鐵器上爆微黃色研豌豆四十九粒燒灰存性頭髮燒存性不拘多少上為細末用擦面油胭脂調成膏子將兒在溫燠處安存宜避風寒穢氣先用簪尖平撥開疔口將藥紝入疔內即變紅色余瘡皆起但挑破出黑血或挑開用口咂去黑血或用綿裹指捏去黑血即愈蓋疔破而毒氣即散也一女子出痘至脹滿將貫膿時忽紫黑抓破流血此痘屬熱毒太盛用皮硝不拘多少入花椒一撮煎水用青布蘸搭患處頻頻良久即起脹如舊收靨治法一凡痘十日十一二日痘漸收靨自上而下為順自下而上為逆其遍身皆靨雖數顆不靨尚能殺人猶蛇蛻皮雖一節被傷不能退者是亦死也一十日至十一日當靨不靨其身不壯熱悶亂不寧臥則哽氣煩渴咬牙異功散加木香當歸以救陰陽表裡若以蜜水西瓜紅柿等冷物食之速死一凡當靨不靨泄瀉寒戰咬牙抓破此虛寒也宜異功散一凡過服熱藥以致熱毒猖狂血氣彌盛痘爛不靨者內服小柴胡湯豬尾膏解之外用敗草散敷之一凡痘不收靨氣急上痰聲啞目閉無神者死靨後瘢紅吉白無血色毒氣滯內也恐生餘症一治痘瘡抓搔成膿血淋漓宜敗草散用蓋房多年爛草或蓋牆爛草亦可其草經霜露感天地陰陽之氣並解瘡毒其功不能盡述取草不拘多少曬乾或焙乾為末干貼瘡上或渾身瘡破膿水不絶黏貼衣裳難以坐臥可用二三升攤於席上令兒坐臥其效如神仍服木香散加丁香官桂二味同煎服之硝膽膏硝膽膏療口不收瘡瘢臭爛血膿流宜研諸膽芒硝細患處塗之病自瘳豬尾膏龍腦半字研細旋滴豬心血為丸辰砂為衣紫草湯化下一治痘疹抓破稀爛用繭孔內入上蜜新瓦上焙乾燒灰存性為末如濕乾摻如干香油調搽效一小兒三歲者發熱七日瘡出倒靨黑色唇口冰冷危症也祈福求神無所不至偶逢一士曰此疾有藥可起以少許俾服之移時即紅活如常不吝資求方其法用狗蠅七枚擂細和醋酒少許調服蠅夏月極多易得冬月藏於耳中不可不知此蠅夏月狗身上飛者是也一痘瘡屬虛寒者直可延至十數日後方死屬毒盛轉色者不過七八日蓋痘是胎毒自內出外一二三日方出齊毒氣尚在內出至六日則當盡出於外七八九日藏膿而結痂矣若毒氣盛不能盡出過六日毒反內入臟腑故須六日以前毒氣皆出之時急服涼血解毒之藥以驅出之六日以後醫無及矣故其死最急若虛弱毒氣少者只是氣血不足不能貫膿成就故綿延日久而後死此虛實輕重之分也痘後餘毒小兒痘疹餘毒輕則肌表津淫瘙癢重則肢節壅腫作痛若發熱而大便閉結者消毒飲發熱而大便調和者清熱消毒散大便調和而渴者麥門冬飲腫痛發熱而渴者仙方活命飲大凡根赤而作癢者血虛也四物湯加牡丹皮色白而作癢者氣虛也四君加當歸芍藥色赤而作痛者血熱也四物湯加連翹金銀花色白而不焮痛者血氣虛也托裡散不成膿或不腐血氣俱虛也八珍湯膿既潰而不斂脾氣虛也六君子湯按之隨指復起者內有膿也即刺之勿使內攻膿齣兒安不必服藥如膿稀清或反作痛或倦怠熱渴或作痛等症皆因氣血虛甚急以參耆犀術之類補之若虛中見惡症者不可救實中無惡症者多自愈活命飲托裡散方見癰症一論痘後餘毒或先服附子熱毒未解聚而不散以致頭頂胸背手足腹節赤腫或癰毒者宜消毒飲或五福化毒丹消毒飲鼠黏子炒荊芥穗甘草防風各五分犀角鎊末一分金銀花三分上銼水煎服一論痘後餘毒未解頭面身體多生瘡癤上焦熱壅唇口腫破生瘡牙齦出血口臭咽喉腫痛口渴等症五福化毒丹犀角鎊三錢桔梗一兩生地黃赤茯苓牛蒡子各五錢連翹六錢玄參三錢青黛二錢朴硝粉草各三錢上為細末煉蜜為丸如龍眼大每服一丸薄荷湯化下兼有驚硃砂為衣一論痘後不問痘毒發於何經初起紅腫時卻用黑緑赤三豆以酸醋浸研漿時時以雞翎刷之隨手退去其效如神一論一切癰疽陽症腫痛發熱作渴清熱消毒散連翹山梔黃連當歸各五分川芎芍藥炒生地黃各六分金銀花二錢甘草一分上銼一劑煎服一論痘毒發熱作渴咽痛麥門冬飲麥門冬去心四分黃芩三分甘草五分人參玄參各三分金銀花五分上銼水煎服咽痛加桔梗五分一論痘後失音不出天花粉桔梗白茯苓去皮訶子肉石菖蒲甘草上為末水調半匙在碗內外以小竹七莖黃荊七條縛作一束點火在碗內煎臨臥時服一論痘瘡愈後瘡痂雖落其瘢猶黯或凸凹用白蜜塗於瘡上其痂易落且無痘痕亦不臭穢一論痘瘡後身體及肢節生疳蝕瘡膿水不幹用出蠶蛾綿繭不拘多少用白礬研碎塞於繭內令滿以炭火炙之令礬汁干取出研入麝香少許每用干貼瘡上若不早治則潰難消一痘入眼成翳用蟬蛻為細末羊肝煎調化食後服一疹後眼生翳膜凡痘瘡不可食雞鴨卵即時盲瞳子其應如神不可不戒撥雲丹兔糞芒花蘆花色者佳蟬蛻木通白蒺藜各一兩炙甘草一兩上為細末煉蜜為丸如梧桐子大每服八十丸食後白湯下日進三服以愈為度一論痘後餘毒眼生翳障通明散當歸川芎芍藥生地黃防風乾葛菊花蟬蛻天花粉各等分穀精草倍上銼散水煎服眼赤腫加黃連梔子翳厚加木賊祕方黃丹輕粉各一錢上為末用鵝管吹如左眼患吹入右耳右眼患吹入左耳一日吹三次兼服通明散或用雌雄檳榔磨水服之效一治痘疹傷眼有白翳用青果核磨水點之立去一論痘餘毒在脾肺者則發咳嗽宜服清金散陳皮中半夏薑製中貝母上天花粉上麥門冬去心上桔梗上梔子炒黃芩各等分甘草生下上銼水煎食遠服一論小兒痘後咳嗽不拘遠年近日者有此失治乃貽終身患也白砒一分雄黃枯礬鵝管石石膏寒水石火煅各一錢上為細末用緑豆粉打糊丸緑豆大每服三丸臨臥井水送下忌熱物一夜無妨補遺益府祕傳沖虛至寶丹治痘初起氣血兩虛倒塌陷黑不起不分地界或咳或瀉兼治紫草茸八兩荊穗八兩當歸四兩鮮筍一斤紅花木通麻黃白芷白芨牡丹皮赤芍懷生地牛蒡子甘草各四兩上共咀片用水三十碗鍋內煮去二分起來再水十碗煎至五碗去渣共前汁煎滴水成珠加蜂蜜四兩再熬成珠為度聽用梅花蕊一錢半蟾酥三錢紫河車一具酒煮成膏聽用殭蠶炒一兩全蠍酒洗穿山甲炒川黃連酒炒杏仁去皮尖另研黃芩蜂房炒連翹炒地膚子炒大胡麻以上各一兩上為細末前膏一半為丸如龍眼大每用一丸鮮雞湯下立起分地而出奪命象皮丸益藩傳治氣不足空殼無膿一丸即有象皮一兩酒炒磨下用穩小鵝即鵝蛋抱臨出死於殼內者是用一個密紙封皮煅黃色為度大附子五錢童便煮黃花地丁淨花一兩人參五錢血竭五錢沉香二錢麝香五分冰片一錢馬檳榔五分牛黃五分黃耆蜜炙五錢細辛五分射干一兩官桂一錢鹿茸五錢辰砂一錢瑣瑣葡萄小小無核者是一兩木香一錢白附子二錢仙茅一兩黑豆汁煮甘草五錢上共為末白酒酵打秈米糊為丸如龍眼大每一丸酒化下立起神仙救苦丹益藩傳治痘初起三五日熱不出又瀉又嗽喉嚨痛腰痛或痘或驚皆可治如痘初出蔥白湯下驚風泄瀉咳嗽痰喘如神白附子五錢山東者佳天竺黃二錢全蠍二錢膽星一兩殭蠶炒一兩肉豆蔻五錢訶子麵包煨去核五錢麝香一分射干五錢蒲公英五錢硃砂一錢雄黃二錢川黃連二錢上為細末煎膏為丸如龍眼大金箔為衣滾水化下起死回生散治痘瘡七八日忽然變黑收入腹內遍體抓破哮喘死在須臾服此從新另發出立可回生當歸川芎生地黃升麻紅花上陷加白芷下陷加牛膝遍身黑陷加麻黃野象糞微炒如一歲兒用二錢大則用到三五錢上銼一劑半水半酒煎服從新發出腳下有黑疔至七八日用針挑去以太乙膏貼之即拔去毒連進二三服淋疹古謂麻即疹也疹出如麻成朵痘出如豆成粒皆象其形而名也夫胎毒一也痘出於五臟臟屬陰陰主血故痘有形而有汁其症寒熱備有也疹出於六腑腑屬陽陽主氣故疹有形而無漿其形多實熱而無寒也為症既異則治法亦殊痘宜內實可用補劑疹忌內實只宜解散惟初熱發表略相似耳既出之後痘則補氣以生血疹宜補陰以制陽何也蓋疹熱甚則陰分受其熬煎而血多虛耗故以清火滋陰為主而不可少動其氣所以人參白朮半夏及諸燥悍之劑首尾當深忌也世知痘症所繫之重而不知疹子殺人尤甚方書輕忽而不備良可太息矣一論疹發熱之初多似傷風惟疹子則咳嗽噴嚏鼻流清涕眼胞腫其淚汪汪面浮腫兩腮赤噁心乾嘔為異耳但見此候即是疹子便宜謹避風寒戒葷腥厚味用藥以表散之使皮膚通暢腠理開達而疹毒以出也一論疹子初出呵欠發熱惡寒咳嗽噴嚏流涕頭眩宜升麻葛根湯升麻葛根白芍各一錢甘草五分上銼生薑水煎服加紫蘇蔥白以解肌切忌大汗斑不紅者亦宜乃淋疹初起之神方也一論淋疹既出一日而又沒者乃為風寒所沖麻毒內攻若不治胃爛而死可用消毒飲鼠黏子四錢荊芥二錢生甘草一錢防風去蘆五分上銼水煎服加烏犀角尤妙一論淋疹既出而覆沒或出不盡心慌哭啼不止十分危急死在須臾或下痢腹痛可用二仙湯鄢陵劉孟門傳黃芩去朽白芍藥生用各等分水煎溫服如神一論淋疹已出譫語煩躁作渴者可用白虎解毒湯石膏知母黃連黃芩黃柏梔子甘草上銼水煎服一論淋疹已出大小便閉可服防風通聖散方見中寒一論淋疹已出譫語小便閉塞者宜導赤散生地黃木通甘草淡竹葉七片水煎服一論淋疹已出泄瀉不止可服四苓散豬苓澤瀉白朮去蘆白茯苓各等分水煎服如小便如泔者或小便不通者加車前木通一論淋疹已出寒熱似瘧可服柴苓湯柴胡黃芩半夏減半豬苓澤瀉白朮去蘆白茯苓去皮甘草上銼薑棗煎服一論淋疹已出大便下血或小便下血吐血衄血或二便閉澀瘡疹稠密熱濁赤痛犀角解毒湯真犀角一錢如無升麻代之生地黃五分牡丹皮一錢赤芍一錢黃連枯黃芩黃柏梔子上銼水煎服如吐血衄血加炒山梔子童便和服一論淋疹前後有潮熱不退等症併為血虛血熱可服四物湯當歸川芎白芍藥熟地黃血虛用熟血熱用生上銼水煎服發渴加麥門冬犀角汁嗽加栝蔞霜有痰加貝母陳皮去白一論淋疹正出之時雖不進飲食者但得淋疹淡紅潤澤真不為害也蓋熱毒未解內蘊實熱自不必食退後若不食者當隨用四物湯加神麯砂仁二帖決能食矣如胃氣虛者須少下地黃一論淋疹既出之時如色紅紫乾燥晦暗乃火盛毒熾宜四物湯用生地黃加紅花酒炒黃芩一論淋疹既出已過三日不能沒者乃內有虛熱宜用四物湯進之如失血之症加犀角汁解之一論淋疹退後若有牙根腐爛鼻血橫行併為失血之症急用四物湯加茵陳木通生犀角之類以利小便使熱下行如疳瘡色白者為胃爛不治之症也一論淋疹之後須避風寒戒水濕如或不謹遂致終身之咳嗽無有愈也一論淋疹前後大忌豬肉魚酒雞子之類恐惹終身之咳嗽只宜用老雞精肉煮食少助滋味可也一論孕婦出麻當以四物湯倍加白朮條芩艾葉安胎清熱為主則胎決無危而淋疹易出矣如胎氣上衝急用苧根艾葉煎湯磨生檳榔服之更以四物湯大進之一論疹子沒後餘熱內攻循衣摸床譫言妄語神昏傷志者死如熱輕餘毒未除必先見諸氣色雖預防之始終以升麻葛根湯為主或消毒飲解毒湯隨症擇用仍忌魚腥蔥蒜之物黃連解毒湯黃連黃芩黃柏梔子水煎服補遺十仙湯序班孫雙泉傳治疹後餘毒柴胡葛根玄參黃連黃芩梔子陳皮茯苓枳殼生地上銼生薑煎服一小兒疹後咳嗽腹脹喘急煩躁泄瀉聲啞唇口青黑賈農峰傳黃連黃芩連翹玄參知母桔梗杏仁白芍麻黃牛蒡子乾葛陳皮厚朴甘草上銼水煎服
