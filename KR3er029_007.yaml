主於精二月之時兒精成於胞里故足少陽養之足少陽穴在足小指間本節後跗骨上一寸陷中者是妊娠三月始胎當此之時血不流形像始化手心主養之手心主者脈中精神內屬於心無悲哀思慮驚動手心主穴在掌後橫紋是診其妊娠脈滑疾重以手按之散者胎已三月也妊娠四月之時始受水精以成血脈其實宜稻粳其羹宜魚雁是謂盛榮以通耳目而行經絡洗浴遠避寒暑是手少陽養之手少陽者三焦之脈也內屬於腑四月之時兒六腑順成故手少陽養之手少陽穴在手小指間本節後二寸是也診其妊娠四月欲知男女左脈疾為男右脈疾為女左右俱疾為生二女當此之時慎勿瀉之必致産後之殃何謂也是手少陽三焦之脈內屬於三焦靜形體和心志節飲食妊娠五月始受火精以成其氣臥必晏起洗浣衣服深其屋室厚其衣裳朝吸天光以避寒殃其食宜稻麥其羹宜牛羊和以茱萸調以五味是謂養氣以定五臟者也一本云宜食魚鱉足太陰養之足太陰脾之脈主四季五月之時兒四肢皆成故足太陰養之足太陰穴在足內踝上三寸也診其妊娠脈重手按之不散但疾不滑者五月也又其脈數者必血懷脈緊者必胞阻脈遲者必腹滿喘脈浮者必水懷為腫妊娠六月始受金精以成其筋欲微勞無得靜處出遊於野數觀走犬及視走馬宜食驚鳥猛獸之肉是謂變腠膂筋以養其爪以牢其背膂足陽明養之足陽明胃之脈主其口目六月之時兒口目皆成故足陽明養之足陽明穴在太衝上二寸者是也妊娠七月始受木精以成體勞躬搖支無使定止動作屈伸居處必燥飲食避寒常宜食稻粳以密腠理是謂養骨牢齒者也手太陰養之手太陰肺脈主皮毛七月之時兒皮毛已成故手太陰養之手太陰穴在手大指本節後白肉際陷中診其妊娠七月脈實大牢強者生沉細者死懷軀七月而不可知時時衄而轉筋者此為軀衄時嚏而動者非軀也懷軀七月暴下鬥余水其胎必損而墮此非時孤漿隕下故也妊娠八月始受土精以成膚革和心靜息無使氣極是謂密腠理而光澤顏色手陽明養之手陽明者大腸脈大腸主九竅八月之時兒九竅皆成故手陽明養之手陽明穴在大指本節後宛宛中是診其妊娠八月脈實大牢強弦緊者生沉細者死妊娠九月以受石精以成皮毛六腑百節莫不畢備飲醴食甘緩帶自持而待之時謂養毛髮多才力足少陰養之足少陰者腎之脈腎主續縷九月之時兒脈續縷皆成故足少陰養之足少陰穴在足內踝後微近下前動脈是也妊娠十月五臟俱備六腑齊通納天地于丹田故使關節人神咸備然可預修滑胎方法也一論婦人經水不行已經三月者尺脈不止則是胎也驗胎散川芎為末每服一錢空心艾葉煎湯調下覺腹內微動則有胎也若服後一日不動非胎必是經閉一治婦人經水過月不來難明有無胎孕艾醋湯用好醋炒艾服半盞後腹中翻大痛是有孕不為痛是無孕一論婦人經水不行身無病似病脈滑大而六脈俱勻乃是孕婦之脈也精神如故惡聞食氣或但嗜一物或大吐或時吐清水此名惡阻切勿作病寒治之宜服此藥如覺噁心嘔吐加丁香生薑煎保生湯人參二錢白朮五錢橘紅五錢香附子五錢烏藥五錢甘草一錢每銼一兩水一盞半生薑五片水煎五分去渣溫服不拘時候或為末薑湯調亦可一論惡阻謂婦人有孕噁心阻其飲食也宜服養胃湯當歸酒洗白芍酒炒白朮去蘆炒白茯苓去皮陳皮藿香砂仁神麯炒半夏湯泡透切片用杏仁炒過不傷胎氣香附炒各等分甘草減半上銼生薑三片棗二枚一婦人有孕嘔吐不止豫用二陳湯半夏薑汁炒用一半甘草用一半生薑七片煎服立止一婦人妊孕三月其經月來三五次但不多飲食如故此血盛有餘兒大能飲自不來矣後果然也一論子煩謂妊娠煩躁而悶亂心神也宜進竹葉湯白茯苓去皮一錢防風去蘆一錢麥門冬去心黃芩各一錢半上銼一劑竹葉五片水煎溫服一論子癇謂妊娠痰涎潮湧目吊口噤不省人事也羚羊散當歸酒洗川芎防風獨活白茯苓去皮五加皮薏苡仁酸棗仁炒杏仁去皮木香甘草羚羊角上銼一劑生薑五片水煎溫服一論兒在腹中哭用多年空房下鼠穴中土一塊令孕婦噙之即止一論子懸謂妊娠心胃連痛兼治胎氣不和心腹脹滿疼痛或臨産驚恐氣結連日不下及胎前一切諸疾悉宜此方加減治之紫蘇和氣飲當歸酒洗川芎白芍酒炒人參紫蘇陳皮大腹皮甘草上銼劑生薑五片蔥白五寸水煎溫服腹痛加香附木香咳嗽加枳殼桑白皮熱加黃芩嘔吐加砂仁泄瀉加白朮去蘆炒白茯苓去皮感冒加羌活麻黃傷食加山楂香附氣惱加香附烏藥一論子腫謂妊娠七八月前後面目虛浮肢體腫滿也宜茯苓湯當歸川芎白芍炒熟地黃白朮去蘆炒白茯苓澤瀉條芩梔子炒厚朴姜炒甘草麥門冬去心上銼一劑水煎溫服一論子氣謂妊娠自三月成胎以後兩足自腳面漸腫腿膝以來行步艱難以至喘悶似水氣之狀至於腳指間有黃水出者謂之子氣天仙藤即青木香藤洗清略炒陳皮香附炒烏藥木瓜甘草上銼生薑煎服加蒼朮紫蘇尤妙一論子淋謂妊娠小便澀痛頻數也宜後方子淋散麥門冬去心赤茯苓大腹皮木通甘草上銼淡竹葉十片水煎空心服一論轉胞謂妊娠卒不得小便也因胎長逼近於胞胞為所逼而側令人數溲胞即膀胱也然子淋與轉胞相類但小便頻數點滴而痛謂子淋頻數出少而不痛為轉胞間有微痛終是與淋不同並宜五苓散加炒阿膠又宜冬葵散治孕婦轉胞小便不通及男子小便不通皆效冬葵散冬葵子五錢山梔子五錢炒研木通三錢滑石五錢研此藥滑胎臨月可用六七月以前不可用上銼一劑水一盞半煎八分溫服外以冬葵子滑石梔子為末田螺肉搗膏或生薑汁調膏貼臍下立通一妊娠轉胞不得小便者用八物湯加半夏陳皮名曰三合湯服之探吐以升提其氣上竅利而下竅自開也一論胎漏下謂妊娠有胎而血漏下屬氣血虛而有熱也芎歸湯當歸尾川芎各五錢上銼一劑好酒煎入童便一盞同服一服立止如神膠艾四物湯治症同前當歸酒洗一錢川芎八分白芍酒炒一錢懷熟地黃酒蒸二錢條芩一錢五分白朮去蘆炒二錢砂仁炒一錢香附炒一錢艾葉少許真阿膠炒成珠八分粳米一撮水煎服一方加炒蒲黃一錢陳皮七分杜仲鹽水炒一錢續斷一錢甘草炒四分去艾葉不用只用水煎服一治胎動出血産門痛黃連為末酒調二錢日三服一論胎動謂妊娠因事跌僕子死腹中惡露妄下疼痛不已口噤欲死因用此藥探之若子死腹中立便逐下若腹痛即止子母俱安又治臨産難生胞衣不下及産後血暈不省人事狀似中風血崩惡露不止腹中血刺疼痛血滯浮腫血入心經語言顛倒如見鬼神血風相搏身熱頭痛似瘧非瘧一切胎前産後狼狽垂死等症並皆治之宜佛手散當歸酒洗一兩川芎七錢上銼一劑水煎將熟再入酒煎溫服如口噤撬開灌之如人行五里許再灌之便醒立産如胎漏下血不止以酒煎入童便一盞溫服一方治胎氣動用鯉魚一個水煮熟並湯食立效一因事胎動不安動撞不已及下血欲墮者四物湯合四君子湯加條芩阿膠砂仁白芷桑寄生一論安胎謂安胎有二有因病而胎動者但療母病其胎自安有胎不應妄觸母病但安胎氣母病自瘥一論孕成之後覺氣不安或腹微痛或腰間作痛或飲食不美或胎動及五六個月常服數劑甚妙安胎飲當歸身酒洗一錢川芎八分白芍酒炒一錢條芩一錢五分白朮去蘆炒二錢砂仁微炒二錢陳皮一錢蘇梗八分甘草四分熟地黃酒蒸一錢上銼一劑水煎溫服如下血不止加蒲黃炒阿膠炒各一錢腹痛加香附醋炒枳殼麩炒各一錢一論半産謂婦人懷孕氣血虛弱不能榮養以致數月而墮也芎歸補中湯黃耆蜜水炒人參白朮去蘆炒當歸川芎白芍炒乾薑炒阿膠炒五味子木香杜仲薑汁炒甘草炙水煎溫服一論陽施陰化胎孕乃成血氣虛乏不足榮養其胎則墮又有勞恐傷情內火便動亦能墮胎火能消物造化自然豫見一婦但有孕及至三個月左右必墮診其脈左手大而無力重按則澀知其血少以其壯年只補中氣使血自榮時正初夏教以濃煎白朮湯下黃芩末一錢與數十劑得全而生一子也蓋孕至三月上屬相火所以易墮安胎丸妊娠宜常服之當歸酒洗川芎白芍酒炒條芩各一兩白朮去蘆炒一兩上為細末酒糊為丸如梧子大每服五十丸茶湯任下空心日服養血清熱之劑也瘦人血少有熱胎動不安素慣半産者皆宜服此以清其源而後無患也一婦人小産常服此以保胎孕十月完足胡蓮肉去心四兩砂仁炒二兩共為末每服二三匙米飲調下日服二三次一論婦人慣常小産久而不蓄者可服過七個月不必服千金保孕丹當歸酒洗一兩熟地黃酒蒸一兩人參一兩五錢白朮去蘆炒四兩條芩一兩陳皮一兩香附子童便浸一兩續斷酒浸一兩五錢杜仲鹽酒炒一兩半上為細末糯米飯為丸如梧子大每服七十丸白湯下一方去人參加砂仁川芎阿膠艾葉益母草棗肉為丸一論婦人曾經小産今有孕預先培補為妙大凡婦人墮胎只是奇經廢弛衝任帶脈受虧而然宜服此湯大有益加味八珍湯黃耆二錢白朮去蘆一錢甘草炙三分防風七分熟地黃酒洗一錢川芎七分白芍酒炒一錢人參二錢知母一錢當歸酒洗一錢山藥一錢益智仁研八分升麻四分黃柏酒浸炒一錢以上銼一劑水煎溫服一治婦人每懷胎至三四月必墮不肯服藥用四五年老母雞煮湯入紅殼小黃米煮粥食之不數日胎竟固全至月滿而生一論妊娠身居富貴口饜甘肥憂樂不常食物不節既飽便臥致令胎胞肥厚根蒂堅牢行動艱難因致臨産必是難生八月可服此藥日進二服補其血而順其氣使子易生而胎易落也又治小産瘀血腹痛及胎衣不下保生無憂散當歸川芎白芍各七分乳香一分枳殼一錢二分炒木香甘草各五分血餘四分上銼一劑水煎溫服一治胎肥壅隘動止艱辛臨月服之縮胎易産瘦胎散枳殼五錢香附子三錢甘草一錢半上為末每服二錢百沸湯調服一論妊娠至八九個月服數劑甚好令易産腹亦少痛達生散當歸身酒洗白朮去油蘆炒各一錢白芍酒炒人參陳皮紫蘇大腹皮洗各一錢甘草炙三分或加砂仁五分枳殼麩炒八分尤妙上銼一劑蔥五根水煎服如胎肥氣喘加黃楊腦七個此黃楊樹梢兒也此物能瘦胎不長夏加黃芩春加川芎冬加砂仁氣虛倍加參術氣實倍陳皮香附血虛倍當歸加地黃性急多怒加柴胡有熱加黃芩食少加砂仁神麯渴加麥門冬食多易飢加黃楊腦有痰加半夏薑湯泡切片香油炒黃芩胎動加木香一論婦人妊娠至七八月間服此胎氣斂束令人易産凡世之患産難者多由內熱灼其胎液以致臨産之時乾澀而難或脾氣怯弱不能運化精微而令胞液不足亦難産之道也故用白朮茯苓益其脾氣而培萬物之母用黃芩清其胎中之熱兼瀉其火而存胞液用陳皮者取其辛利能流動中氣化其肥甘使胎氣不滯兒身不肥耳此束胎之義也束胎丸茯苓七錢五分陳皮三兩黃芩夏一兩春秋七錢冬五錢白朮二兩上為末酒糊丸梧子大每服五十丸米湯送下一治婦人胎痛當歸川芎條芩阿膠酒炒香附炒元胡索水煎溫服一治孕婦心痛元胡索五錢當歸一錢乳香五分甘草七分上銼水煎溫服一治孕婦腹痛或胎動不安砂仁炒一兩條芩炒紫黑一兩半白朮去蘆炒一兩上為末每服三錢紫蘇湯調下一治孕婦腰痛狀不可忍補骨脂不拘多少瓦上炒令香熟為細末嚼核桃半個空心溫酒調下二錢一治孕婦偶因所觸或墮高傷折致胎動不安腹中痛不可忍者砂仁不拘多少尉斗內盛慢火炒令熟透去皮搗碎為末每服二錢用熱酒調下須臾覺腹中胎動極熱即胎已安神效一治妊娠大便閉澀艱難當歸川芎白芍生地黃枳殼黃連上銼水煎溫服一論妊娠下痢赤白腹中疼痛當歸五分白芍一錢白朮五分白茯苓五分澤瀉五分木香三分檳榔三分黃連五分黃芩五分甘草三分上銼作一服水一盞半煎至一盞空心溫服如白痢腹痛甚恐有寒也去黃連加乾薑炒二分一治妊娠腹痛下痢膿血不止黃連八分厚朴姜炒阿膠炒當歸各六分艾葉黃柏乾薑炒五分上為末空心米飲下方寸匕日三服一論妊娠泄瀉腸鳴腹痛手足厥逆人參白朮炒炮姜甘草炙加肉蔻砂仁上銼生薑三片棗二枚水煎空心溫服一論孕婦瘧疾寒熱相半併産後瘧疾當歸川芎白芍青皮陳皮半夏白茯苓檳榔草果良薑紫蘇乾葛甘草上用薑棗煎臨發日服一論孕婦咳嗽用貝母麩炒研為末砂糖拌勻丸如雞頭實大口含化效一論妊娠忽然口噤吐沫不省人事言語錯亂三合湯當歸酒洗川芎白芍酒炒生地黃陳皮白茯苓去皮遠志甘草水泡去心麥門冬去心竹茹石菖蒲甘草半夏姜泡香油炒上銼生薑水煎服一論妊娠風寒咳嗽痰喘滿悶百合貝母紫菀白芍前胡赤茯苓桔梗甘草生薑五片煎服一論妊娠不語非病也聞有此者不須服藥臨産日期但服四物湯之類産後便語一論妊娠懷鬼胎如抱一甕經脈云設令宮中人若寡婦無夫常夜夢寐交通邪氣或懷似胎而成癥瘕之疾急當治下宜用斬鬼丹吳茱萸川烏頭秦艽柴胡白殭蠶炒巴戟去心上為末煉蜜為丸如梧子大每服七丸溫酒送下出惡物即愈一論妊娠癥瘕痞塊及二者疑似之間者久服安養胎氣消散癥瘕調經進食消補丸枳殼檳榔黃連黃柏黃芩當歸阿膠炒木香各一兩上為末丸如梧子大不飽時溫米飲下三十丸日進二三服一論妊娠或時有白濁白帶而下四物湯和二陳湯加蒼朮牡蠣龍骨等藥一論妊娠遺尿失禁白薇白芍酒炒各等分上為細末酒調方寸匕日三服一論妊娠痰嗽見紅當歸身熟地黃天門冬去心麥門冬去心紫菀各五分桑白皮蜜炙杏仁去皮甘草炙桔梗片芩五味子阿膠炒各一分半上銼加竹茹一團水煎臨服入小薊汁同服一婦人每孕不數月而墮忽又孕三月患嘔吐吞酸噯氣嘈雜腸鳴泄瀉胃脘疼陳皮一錢半夏炒七分白茯苓一錢白朮去蘆二錢蒼朮米泔浸炒黃一錢川芎一錢神麯炒五分藿香香附炒各一錢六分甘草炙四分黃連薑汁炒三分上銼薑棗煎服一治胎孕九個月將産消息用豬肚一個依常法加蔥五味煮熟食之不盡再服勿與別人食之一妊娠誤服草藥及諸般毒物白扁豆生去皮為細末清米飲調方寸匕神效一妊娠下血服涼血之藥下血益甚食少體倦此脾氣虛而不能攝血以補中益氣湯治下血乃愈一治婦人墜胎昏憒不時吐痰自用養血化痰之劑昏憒不知自汗發搐痰涎壅出以為中風欲用祛風化痰藥豫曰此屬脾氣虛寒所致遂用十全大補湯去桂加知母防風山藥升麻黃柏益智仁一妊娠氣喘痰盛諸藥不應問治於豫詢之云素有白帶始於目下浮兩月餘其面亦然此陰虛有痰飲也用六味丸料數劑而愈一妊娠每至五月肢體倦怠飲食無味先兩足腫漸至遍身後及頭面此是脾肺氣虛朝用補中益氣夕用六君子加蘇梗而愈凡治妊娠毋泥其月數但看其病症審用某藥為善妊娠傷寒治法一治妊娠傷寒護胎法井底泥青黛伏龍肝上為末調勻塗於孕婦臍下二寸許如干再塗上以保胎孕一治妊娠傷寒傷風勿輕服藥發熱頭疼惡風身痛紫蘇陳皮香附川芎白芷甘草上銼一劑加生薑蔥煎服加味四物湯專治妊娠傷寒諸症當歸身川芎白芍熟地黃各等分上銼每服五六錢水煎溫服如妊娠傷寒頭痛身熱無汗脈浮緊加麻黃細辛如妊娠傷寒中風表虛自汗頭痛項強身熱惡寒脈浮而弱加黃耆地骨皮如妊娠中風濕之氣肢節煩疼脈浮而熱頭痛加防風蒼朮如妊娠傷寒胸膈滿痛脈弦加柴胡黃芩如妊娠傷寒大便硬小便赤氣滿而脈沉數加生大黃桃仁去皮尖麩炒如妊娠傷寒小便不利加茯苓澤瀉如妊娠傷寒小便赤如血狀者加琥珀茯苓如妊娠傷寒四肢拘急身涼微汗腹中痛脈沉而遲加附子去臍桂少用如妊娠傷寒蓄血症加生地黃大黃酒浸如妊娠傷寒身熱大渴蒸蒸發熱脈長而大者加石膏知母如妊娠傷寒下後過解而不愈溫毒發斑如錦紋加升麻連翹如妊娠傷寒下後咳嗽不止者加五味子人參如妊娠傷寒下後虛痞腹滿加厚朴薑制枳實麩炒如妊娠傷寒不得眠者加梔子黃芩如妊娠傷寒汗後血漏不止者胎氣渴者加阿膠炙甘草黃耆如妊娠傷寒脈浮頭腫自利腹中痛去地黃如妊娠傷寒自利腹中痛飲食不下脈沉者去地黃川芎加白朮炙甘草茯苓黃芩如妊娠傷寒頭痛項強身熱口乾胸脅疼用生地黃加柴胡前胡人參甘草産育一産母面赤舌青母活子死母面青舌赤口沫出子活母死母唇皆青口兩邊沫出身重寒熱舌上青黑及舌上冷遇此症者子母俱死不可治也一胎産橫逆多由坐草太早努力過甚兒身未轉或已破水其血必干致胎難轉若先露腳謂之逆先露手謂之橫當以細絹針於兒手足心針入一二分三四刺之以鹽塗其上輕輕送入兒得痛驚轉一縮即當回轉而生矣一論難産或橫或倒死胎爛脹於腹中者幾覺腹痛或腰重若坐草時將神柞散即溫飲一盞便覺心下開豁如渴又飲一盞覺下重便産更無諸苦橫生倒逆不過三服即正子死腹中不過三服即下能保母子兩全最為神驗有一婦人橫産手出滿腹腫脹但欲截其手不保其生屢服催生藥不效以此藥濃煎一碗與服少頃蘇醒再與一碗困睡少時忽云我骨節都折開了快扶起我血水俱下拔出死胎全不費力可謂更生以此救人百發百中催生神柞散生柞樹刺枝如小指大者一握淨洗銼碎一葉一刺者處處有之甘草五錢上銼一劑新汲水一碗半入新瓦罐內用紙三重密封之文武火煎八分溫服一治孕婦臨産艱難或一二日不下者服此自然轉動下生三合濟生湯當歸二錢川芎二錢枳殼麩炒二錢紫蘇八分香附炒二錢半大腹皮薑汁洗一錢半甘草七分上銼水煎待腰痛甚服之即産催生如意散臨産腰痛方可服之人參一錢乳香一錢辰砂五分上為末臨産之時急用雞子清一個調藥用生薑自然汁調開水冷服如橫生倒産即時順生子母俱安一論妊娠子死或未死胎已動芎歸湯加蘇葉酒水煎服死者即下未死者即安一論胞衣已破其血已涸或元氣困憊用八珍湯斤許再加益母草半斤水數碗煎熟時時飲之飲完再煎孕婦臨月預製此藥日進二服則子易生而胞易落也一論橫生逆産須臾不救子母俱亡蛇蛻一條蟬蛻十四個胎髮一丸並燒灰上為末分作二服酒調下須臾進一服仰臥霎時即下一治難産湊心不下者蛇蛻燒灰同原麝少許研細溫酒調下立産一論臨産破水三五日不下將死未絶者江月池傳魚鰾用大者三寸香油浸過燈上燒之滴下油入酒內其灰研末酒調服一論難産瀝漿胞干胎不得下香油蜂蜜各三碗和勻入銅銚內慢火煎一二沸掠去沫調白滑石末一兩攪勻頓服外以油蜜摩母腹上胎即下一婦人分娩艱難産子已死元氣勞傷用油紙捻燒斷臍帶取其陽氣以補之俄聞兒啼作聲若以刀物如常斷之其母亦難保生凡子死腹中者多因驚動太早或觸犯禁或抱腰太重或頻揉拭水胞衣先破血水先盡而胞乾涸故耳其候産母唇舌皆青者子母俱死若舌黑或脹悶甚者其子已死矣先以平胃散一兩酒水各半煎卻收朴硝半兩即熟皮硝服之或用硝一兩以童便調下亦妙一治胎衣不下雞子清三個去黃以酸醋一合和之啜入口中即下一方治胎衣不下即嚼生蔥白數根即下一治胞衣不下紅花一兩炒清酒五爵沃之溫服此乃氣弱而瘀血盈於胞也故用清酒壯其氣紅花以敗其血一治胞衣不下因産母元氣虛薄用芎歸湯倍桂以溫之自下一治婦人難産及橫生逆産如神用蛇蛻炒焦為末每五分酒調下一治死胎不下兼難産及橫生倒生用桂心為末每二錢痛陳密時用溫酒調下一方用麝香五分為末加桂末二錢酒和服一治産後胎衣不下惡血衝心腹中血塊錦紋大黃一兩為末以好醋半升熬成膏丸如梧子大以醋化五丸服之須臾即下又治月經不通一治橫生逆産胎死腹中不下公老鼠腰子一付輕粉一分松香一分共搗作三四丸辰砂為衣溫酒下一治胎衣不下令産婦銜自己髮尾於口中令嘔噦衣即下此方可用一論婦人分娩交骨不開或五七日不下垂死者活命芎歸湯川芎當歸各一兩生男女婦人發一握燒灰存性自死龜殼一個如無枯過者亦可酥炙上為末每一兩水煎服良久不問生死胎即下一論妊娠十月滿足或因恣情內傷或患潮熱之症又兼産前多吃熱毒之物瘀血相搏七情怒氣所傷臨産橫逆之厄愴忙不謹輒用穩婆下手取胎觸死胎兒在腹不能施治今備妙方防此之患但服一二帖加烏金丸二個甚妙活水無憂散益母草二兩大枳殼一兩當歸四錢川芎一錢白芍二錢生地黃二錢生鯉魚一個官桂一錢急性子四錢陳皮一錢甘草八分上各銼分二服每用水三碗煎至二碗臨服之時加好醋一匙每一碗加烏金丸一粒如其胎不下急取無根水再煎藥渣連進二服即救其性命一論橫生逆産臨産艱難胎死不下及産後諸病烏金丸真阿膠一兩八錢蛤粉炒蘇木一兩艾葉端午日收去根二兩穀芽麥芽曬乾各二兩蛇蛻要全者一條焙乾又要蛇頭下向者方好上共為細末煉蜜為丸如芡實大每用一丸童便和酒化下一治橫生逆産並三五日不下死在須臾姜師師周傳用從上往下蛇蛻一條長尺余者燒灰存性鵓鴿糞等分為末黃蠟為丸一個皮硝化水吞下一治婦人交骨不開産門不閉皆由元氣虛弱胎前失於調攝以致血氣不能運達而然交骨不開陰氣虛也用活命芎歸湯補中益氣湯産門不閉者氣血虛也用十全大補湯活命芎歸湯方見前一治難産兼胞衣不下死胎不下巴三萆七脫衣裳細研如泥入麝香捏作餅兒臍下貼須臾子母便分張一方用萆麻子十粒剝去殼研塗兩腳心衣即下可即浣去如不去則腸出如至此時就以此藥貼頂心縮回其腸多用此藥如腸入則洗之神效一治難産或橫或逆或血海乾涸或胎不下惶惶無措死在須臾戴存愚傳皮硝二錢壯者三錢弱者或寒天可加大附子煨去皮臍三分半上用好酒半鍾童便半鍾入硝煎一二沸溫酒服立下百中一治胎死腹中或産母氣乏委頓産道乾澀或手足冷腹痛即五積散見中寒依本方去麻黃加川烏附子南星阿膠炒木香杏仁六味補中益氣湯方見內傷十全大補湯方見補益一治女人出生腸用腳盆盛貯其腸取芋煎水洗過蓋芋水甚滑洗過則腸滑後用冷水噀胸前使患者因咳嗽氣則腸收又用人以手托之使腸入內後用馬蛤兜水洗用渣搭於門口上女人睡倒腳高起些過一時即愈産後産後扶虛消瘀血脈卻宜虛叔和云新産之脈緩滑吉實大弦急死寸口來去澀疾不調死沉細附骨不絶生凡産畢不問腹痛不痛有病無病以童子小便和酒共一鍾溫服則百病不生少坐床上倚高立膝仰臥不時喚醒及以醋塗鼻或用醋燒炭及燒漆器更以手從心捍至臍下使惡露不滯如此三日以防血暈血逆酒雖行血亦不可多恐引血入四肢且能昏暈宜頻食白粥少許一月之後宜食豬蹄少許仍慎言語七情寒暑梳頭洗足以百日為度若氣血素弱者不計日月否則患手足腰腿痠疼症名曰蓐勞最難治療初産時不可因愛憎而動氣皆能致病不可獨宿恐致虛驚不可刮舌恐傷心氣不可刷牙恐致血逆須氣血平復方可治事犯時微若秋毫成病重如山嶽可不戒哉夫産後血暈其由有三有用心使力而暈者有下血多而暈者有下血少而暈者其暈雖同其治特異若下血多而暈者當補血以芎歸湯為主或惡露不止者倍炒黑乾薑止之若去血少而暈者黑神散主之但凡血暈不省人事用火炭置産母旁以醋沃之使醋氣熏入産母口鼻輕者亦醒重者亦省人事矣一法用韭菜細切盛於有嘴瓶中以熱醋沃之急封瓶口以瓶納産婦鼻孔中㗜之即醒一法用舊漆器燒煙熏之即醒一法用荊芥穗研末用一分吹鼻即醒一法用鹿角燒存性每一錢酒灌下即醒夫産後發熱有去血過多者有勞力過傷者有惡露不盡者有飲食失節者有感冒風寒者有夾食傷寒者有內傷挾外感者有三日蒸乳者俱能發熱憎寒並身疼腹痛不可相類而用藥也一論去血過多發熱者脈必虛大無力內無痛楚此非有餘之熱乃陰虛生內熱耳以歸術保産湯主之一論有傷力發熱或早起勞動發熱者亦以歸術保産湯主之一論惡露不盡亦發熱惡寒必脅肋脹滿連大小腹有塊作痛者宜黑神散主之一論脾胃虛弱飲食必難克化以致停滯發熱必有噫氣作酸惡聞食臭而口中無味胸膈飽悶氣口脈必緊盛發熱惡寒頭痛宜理脾湯主之一論感冒風寒而發熱者其脈弦而緊或惡露缺通頭痛身疼發熱惡寒手足厥冷肚腹疼痛宜五積散主之此藥祛除敗血生新血調和榮衛滋養臟腑使陰陽不相勝負邪氣不能相干則無寒熱之患並加米醋少許同煎本方去麻黃方見中寒一論傷寒夾食必惡食胸痞腹痛頭疼發熱氣口脈來緊盛宜行氣香蘇散一消一發而治之方見內傷一論內傷元氣外感風寒其脈洪大而虛其症身熱而煩頭痛惡寒而渴自汗氣高而喘宜補中益氣湯加減治之方見內傷一論産後蒸乳發熱惡寒者必乳間脹硬疼痛令産母揉乳汁通其熱自除不藥而愈一論産後發熱惡寒或口眼喎斜等症皆是血氣虛甚當以大補氣血為主若左手脈不足補血藥多於補氣藥右手脈不足補氣藥多於補血藥一論産後中風切不可便作風治不可服小續命湯之類宜大補氣血若中風口噤乃血虛而風入夾口筋得風則急故口噤也若角弓反張乃體虛而風入於諸陽之經故獨腰背攣急如角弓反張之狀也以歸術保産湯去香附乾薑加秦艽羌活又宜當歸荊芥各等分水一盞酒少許煎七分灌之如口噤以匙挖開微微灌下但下咽即效又宜荊芥略炒為末每服三錢黑豆淋酒調下童便亦可一論産後虛羸諸病惟宜十全大補湯此藥性溫平補養血氣壯健脾胃乃諸虛百損第一方也一産後血暈者乃下血過多而眩暈也不省人事者氣血大脫而神不用也故用人參銼兩劑水煎溫服蓋人參甘溫益元氣之品可以回氣可以生血而身熱氣急者加童便一杯身寒氣弱者加附子三錢外以炭火以酸醋沃之使醋氣熏入鼻內則能收斂神效一論産後諸疾以本治之大補氣血為主此方治一切諸症氣血虛損脾胃怯弱或惡露不行或去血過多或飲食失節或怒氣相沖以致發熱惡寒自汗口乾心煩喘急心腹疼痛頭眩眼黑耳鳴等症不語昏憒不省人事並皆治之歸術保産湯當歸酒洗一錢五分川芎一錢白芍酒洗一錢熟地黃酒蒸一錢白朮去蘆炒一錢甘草炙三分白茯苓去皮一錢陳皮八分乾薑炒黑八分香附米童便炒一錢氣虛加人參七分上銼一劑生薑三片棗一枚水煎溫服如去血過多倍芎歸乾薑如胸膈脹滿加枳實麩炒砂仁厚朴姜炒山楂肉兩脅肋痛加青皮上肉桂小腹陳疼加元胡索桃仁紅花蘇木甚者加三稜莪朮俱煨醋炒有汗加黃耆蜜水炒酸棗仁炒口乾苦加麥門冬去心身不發熱小腹痛不可忍用桃仁去皮搗爛五錢韭菜汁和酒送下立效惡露不行加益母牡丹皮桃仁入童便同酒服吐痰加半夏貝母咳嗽不止加北五味桑白皮氣惱加烏藥昏憒口噤不語加荊芥穗一論婦人産後一十八症服之如神黑神散棕皮灰元胡索當歸酒洗赤芍白芍生地黃五靈脂各一錢蒲黃一兩熟地黃一兩香附米炒一兩乾薑炮一兩沉香五錢乳香五錢大黑豆五錢莪朮五錢紅花五錢上為細末每服二錢溫酒童便調下一胞衣不下敗血攻心眩暈欲絶服此即醒一將産血多兒食不盡余血裹胎難下服此棄子救母一臨産用力太早兒不及轉橫生倒出亦當急救母命一子死腹中母必肢體冷痛口角出沫指甲青黑服此藥即出一惡露未盡乃失而不治又過食酸鹹之物因而得崩漏一血昏眼花坐起不得一血迷心竅不能言語一敗血乘虛散流四肢因而浮腫一敗血為害口渴舌燥乍寒乍熱似瘧一敗血入心煩躁發狂言語錯亂或妄見似癲一敗血停留肢節間遍身疼痛一月中飲冷敗血凝聚腹痛難忍或致瀉痢一晡熱鼻孔中黑一敗血結聚小便閉澀大便艱難一敗血衝心喉中氣急發喘一敗血滯脾胃中心腹脹滿嘔吐似翻胃一産後諸般怪症難以名狀者多是敗血所致服此立效真仙方也一産後心腹痛瘀血不行或兒枕作痛危急之至當歸三錢川芎白芷元胡索官桂牡丹皮蒲黃五靈脂沒藥各一錢白芍酒炒三錢上銼一劑水煎入童便空心服一治産後小腹作痛有塊脈芤而澀以四物湯加玄胡索紅花桃仁牛膝木香一論産後停食胸膈飽悶身發寒熱不思飲食理脾湯蒼朮米泔浸炒一錢陳皮一錢厚朴薑汁炒一錢半砂仁七分神麯炒一錢山楂去核一錢麥芽炒一錢乾薑炒黑八分甘草炙三分上銼一劑生薑三片水煎服泄瀉加白朮白茯苓大便閉加桃仁紅花小便閉澀加大腹皮一治産後三日牙關緊急眼目直視四肢厥冷乾薑炒黑五錢水煎入童便溫服立效一論産後暈倒不省人事眼黑耳鳴等症並治中風不省人事口吐涎沫手足瘛瘲加味佛手散當歸川芎荊芥各等分上銼一劑水煎入童便溫服一論産後惡露不快腰疼小腹痛時作寒熱頭痛不思飲食亦治久積惡血月水不調又療心痛小腸氣痛血氣痛欲死者又治心腹疼痛及兒枕痛不可忍又或血迷心竅不省人事又治北人青筋症用酒三錢調下失笑散五靈脂水淘去砂醋炒真蒲黃炒各等分上銼一劑水煎溫服一法為細末每服三錢醋熬成膏白湯化下痛甚加川芎肉桂元胡索各一錢一論産婦小腹作痛忽牙關緊急灌以失笑散良久即醒又用四物湯加炮薑白朮陳皮一論産後血脫昏暈不省以四物湯加香附人參白朮茯苓炮姜一論産後瘀血心腹疼痛或發熱惡寒者以四物湯加元胡索香附桃仁紅花青皮澤蘭牡丹皮水煎童便酒各一杯溫服若以手按腹愈痛此是瘀血為患宜服此藥或失笑散消之若按之反不痛是血虛宜四物湯加參朮茯苓若痛而作嘔是胃虛宜六君子湯加乾薑炒白芍酒炒一論蓐勞者産中之病也産中虛羸喘乏乍寒乍熱病如瘧狀名曰蓐勞此是氣血之虛不相順接虛故乍寒壅故乍熱無時休息症似瘧實非瘧也治宜大補氣血使其氣血順接則病愈矣故用人參補氣當歸補血糯米益胃蔥豉醒脾豬腎者取其以類相從能補系胞之區也豬腎湯治産後蓐勞發熱盜汗人參當歸各等分豬腰子一個切片白糯米半合蔥白三根淡豆豉一合以水煮米及腰子熟取清汁一盞入參歸蔥豉同煎好不拘時服腰子可另食一方治産後蓐勞發熱豬腰子一對去白膜切作柳葉片用鹽酒拌炒食先用粳米一合入蔥椒煮粥即以鹽醋和腰子作肴同熱粥空心食之一治産後發熱自汗肢體疼痛名曰蓐勞當歸羊肉湯當歸酒洗人參各七錢黃耆一兩生薑五錢上銼用羊肉一斤煮清汁五大碗去肉入前藥煎至四碗去渣作六服早晚頻進一論産婦牙關緊急腰背反張四肢抽搐兩目連札此去血過多元氣虧損陰火熾盛宜十全大補湯方見補益加炮姜一劑而蘇又數劑而安一論産後筋攣背急肌肉掣動此氣血俱虛用十全大補湯而安一論産後血邪心神恍惚言語失度睡臥不安宜茯神散白茯神去皮一錢人參龍齒研琥珀研赤芍黃耆牛膝去蘆各五分生地黃一錢桂心五分上銼水煎溫服極效一論産後不語者何答曰人心有七孔三毛産後虛弱多致停積敗血閉於心竅神智不能明瞭又心氣通於舌心氣閉塞則舌亦強矣故令不語如此者但服此湯八珍湯人參石菖蒲懷生地黃川芎各一兩細辛二錢防風五錢辰砂另研五錢甘草一錢上為末每一錢薄荷湯調下不拘時服一論産後咳嗽不止用乾柿一個切片以水一大杯煎至六分熱飲之即止一論産後汗出不止嫩黃耆蜜水炒熟地黃牡蠣粉白朮去蘆炒麥門冬去心防風去蘆白茯苓去皮當歸酒洗上銼紅棗二枚水煎溫服一論産後消渴飲水不止當歸酒洗川芎白芍生地黃麥門冬去毛五味子知母去心白茯苓去皮黃耆蜜水炒甘草上銼水煎溫服一論産後瘧疾當歸酒洗一錢五分川芎一錢白芍酒炒一錢五分白朮去蘆炒一錢半白茯苓去皮一錢五分柴胡八分青皮去穰八分甘草三分上銼白水煎溫服一論産婦血痢小便不通臍腹疼痛以生馬齒莧搗爛取汁三大合煎湯下蜜一合調頓服之即愈一治産後痢疾不問赤白主方當歸酒洗川芎白芍炒白朮去蘆炒白茯苓陳皮木香香附炒神麯炒乾薑炒甘草炙上銼水煎溫服不思飲食加砂仁小便不利加澤瀉一論産後痢疾久不止者以四君子湯加黃耆粟殼一論産後胸痞腹脹當歸酒洗川芎白芍酒炒白朮去蘆炒白茯苓去皮陳皮半夏湯泡姜炒砂仁香附炒厚朴薑汁炒甘草生薑煎服一治産後泄瀉人參白朮去蘆土炒白茯苓去皮陳皮白芍炒乾薑炒澤瀉厚朴薑汁炒砂仁當歸酒炒甘草炙上銼薑棗煎服一治産後嘔吐陳皮半夏湯泡姜炒白朮去蘆炒白茯苓去皮砂仁藿香人參神麯炒當歸酒炒甘草炙上銼生薑五片水煎溫服一治産後頭痛黃耆蜜水炒人參白朮去蘆炒陳皮當歸升麻柴胡細辛蔓荊子川芎藁本甘草上銼生薑三片水煎服一治産後發熱咳嗽痰喘當歸酒洗白芍酒炒川芎熟地黃陳皮半夏薑汁泡炒白茯苓去皮枳殼麩炒桔梗去蘆前胡蘇梗葛根人參木香甘草上銼散薑棗水煎服一産婦咳嗽痰盛面赤口乾內熱晡熱徹作無時此陰火上炎當補脾胃遂用補中益氣湯六味地黃丸而愈一論産婦糞後下血諸藥不應飲食少思肢體倦怠此中氣虛弱用補中益氣湯加吳茱萸炒黃連五分四劑頓止但怔忡少寐盜汗未止用歸脾湯治之而愈一論産後大便不通因去血過多大腸乾涸或血虛火燥乾涸可不計其日期飲食數多以藥通潤之必待腹滿覺脹自欲去下不能者乃結在直腸宜用豬膽汁潤之若服苦寒藥潤通反傷中焦元氣或愈加難通或通而瀉不能止必成敗症若屬血虛火燥用加味逍遙散氣血俱虛八珍湯慎不可用麻子杏仁枳殼之類一産前産後大便不通當歸酒洗川芎防風去蘆枳殼麩炒各一錢甘草炙二錢上銼薑棗煎服忌動風之物用蜜導之亦妙一産後五七日不大便切不宜妄服丸藥用大麥芽炒為末每服三錢沸湯調下與粥間服一論産後胞損小便淋漓不止人參二錢五分白朮去蘆二錢白茯苓去皮一錢黃耆蜜炒錢半陳皮一錢桃仁去皮尖一錢甘草炙五分上銼一劑水煎豬羊胞後入藥煎服一論婦人子宮腫大日日損落一片殊類豬肝已而面黃體倦飲食無味內熱晡熱自汗盜汗用十全大補湯二十餘劑諸症愈後仍復生育一論産後陰戶痛極不可忍桃仁泡去皮尖研如泥塗之即愈一論産後陰門癢極不可忍用食鹽一兩塗之亦止一論産後陰門不閉發熱惡寒用十全大補湯加五味子數劑而寒熱退又用補中益氣湯加五味子數劑而斂若初産腫脹或焮痛而不閉者用加味逍遙散若腫既消而不閉者補中益氣湯切忌寒涼之劑陰門不閉用石灰煎湯先熏後洗一方用荊芥藿香臭椿根皮煎湯熏洗一論産後生腸不收皆由氣虛血弱所以掛下但養氣和血其腸自收人參白朮去蘆炒黃耆蜜炒當歸川芎甘草炙上銼水煎服若掛二日則入升麻五分升提之日用熱手心常尉腰肚但腰肚氣暖其腸自收一治産後生腸不收萆麻子去殼研成膏貼頭頂心即收內服補中益氣湯倍升麻去柴胡加益母草一錢一論産後因子死經斷不行一日小腹忽痛陰戶內有物如石硬塞之而痛不禁此乃石瘕也當歸酒洗川芎白芍酒炒生地黃桃仁去皮尖紅花大黃三稜檳榔澤瀉香附元胡索血竭水煎空心服一論産後有疾鬱冒則多汗汗則大便閉故難用藥唯此藥最嘉二子飲蘇子火麻子去殼二味各半合揀淨洗研極細用水再研取汁一杯分三次煮粥食之此粥不特産後可服大抵老人諸虛人風閉皆得效一論産後陰戶腫大用吳茱萸煎湯洗之一産後惡寒發熱余欲用八珍湯加炮姜治之其家知醫以為風寒用小柴胡湯余曰寒熱不時乃氣血虛不信服一劑汗出不止譫語不絶煩熱作渴肢體抽搐余用十全大補湯二劑益甚脈洪大重按如無仍以前湯加附子四劑而安一産婦瀉痢年餘形體骨立內熱晡熱自汗盜汗口舌糜爛口吐痰三碗許脈洪大重按全無此命門火衰脾土虛寒而假熱然痰者乃脾虛不能統攝歸原故用八味丸補火以生土用補中益氣湯兼補肺金而健其脾胃小産小産重於大産蓋大産如粟熟自脫小産如生採破其皮殼斷其根蒂豈不重於大産但人輕忽致死者多矣治法宜補形氣生新血去瘀血若未足月痛而欲産芎歸補中湯倍加知母止之若産而血不止人參黃耆湯補之若産而心腹痛當歸川芎湯主之胎氣弱而小産者八珍湯固之若出血過多而發熱聖愈湯汗不止急用獨參湯發熱煩躁肉瞤筋惕八珍湯大渴面赤脈洪而虛當歸補血湯即黃耆一兩當歸三錢是也身熱面赤脈沉而微四君姜附東垣云晝發熱而夜安靜是陽氣自旺於陽分也晝安靜而夜發熱是陽氣下陷於陰分也如晝夜俱發熱者是重陽無陰也當峻補其陰王太僕云如大寒而甚熱之不熱是無火也熱來復去晝見夜伏夜發晝止時節而動是無火也如大熱而甚寒之不寒是無水也熱動復止倏忽往來時動時止是無水也若陽氣自旺者補中益氣湯陽氣陷於陰者四物二連湯即四物湯加胡連川連是也重陽無陰者四物湯無火者八味丸無水者六味丸一論小産氣虛血下不止宜人參黃耆湯人參黃耆蜜炒當歸白朮去蘆炒白芍酒炒艾葉醋炒各一錢阿膠炒二錢上銼一劑水煎溫服一論小産氣血虛宜芎歸補中湯方見妊娠一論小産後瘀血心腹疼痛或發熱惡寒當歸川芎湯當歸川芎白芍炒熟地黃元胡索桃仁紅花香附青皮澤蘭牡丹皮上水煎入童便好酒各半杯同服如小産腹痛以手按腹愈痛此是瘀血為患宜用此藥或失笑散消之若按之反不痛此是血虛宜用四物加參苓朮甘若痛而作嘔此是胃虛宜用六君子若痛而瀉此是脾虛宜用六君子送二神丸一妊娠五月服剪紅丸而墜腹中脹痛服破血之劑益甚以手按之益痛余曰此峻藥重傷脾胃受患用八珍湯倍人參黃耆加半夏乳香沒藥二劑而痛止數劑而全愈一婦人年二十餘疫疾墮胎時刻服清肺解表喘急不寐請治余以為脾土虛不能生肺金藥損益甚先與補中益氣加茯苓半夏五味炮姜四劑漸愈往視之又與八珍加五味及十全大補湯復原一小産下血不止氣虛之甚也以補中益氣湯去升柴加白芍川芎香附砂仁艾葉阿膠乳病乳房陽明所經乳頭厥陰所屬乳子之母不知調養忿怒所逆鬱悶所遏厚味所釀以致厥陰之氣不行故竅不得通而汁不得出陽明之血沸勝故熱甚而化膿亦有所乳之子膈有滯痰口氣焮熱含乳而睡熱氣所吹遂生結核於初起時便須忍痛揉令稍軟吮令汁自通可消散失此不治必成癰癤治法疏厥陰之滯以青皮清陽明之熱細研石膏行汙濁之血以生甘草之節清腫導毒以栝蔞子或加沒藥青橘葉皂角刺金銀花當歸或湯或散或加減隨意消息然須以酒少佐之若加以艾火兩三壯於腫處其效尤捷不可輒用針刀必致危困或因憂愁鬱悶朝夕積纍脾氣消傷肝氣橫逆遂成隱核如大棋子不痛不癢數年之後方為瘡陷名曰乳岩以其瘡形峻曲似巖穴也不可治矣若於始生之際便能消釋病根使心清神安然後施之治法亦有可安之理一論有兒者名曰外吹乳有孕者名曰內吹乳可以急治宜服立效散白芷貝母各等分為末每服二錢好酒調服若無乳行加漏蘆酒煎調服一論婦人乳腫作痛欲成癰毒宜神效栝蔞散大栝蔞黃熟者一個連皮子穰重重紙包火煨搗爛每一劑半個白芷一錢五分元參二錢升麻五分歸尾二錢桔梗一錢連翹二錢柴胡一錢青皮一錢天花粉一錢五分穿山甲炒一錢川芎八分知母一錢木通一錢木鱉子兩個元胡索二分上銼一劑水煎溫服一治婦人患吹乳腫痛未成膿者用生半夏一個為末將蔥白半寸搗和為丸綿裹塞鼻一夜即愈左乳塞右鼻右乳塞左鼻神效一外敷吹乳方蔥一大握搗爛作餅厚攤乳上將瓦罐盛灰火撲在蔥上蒸出汗即消腫痛甚妙或將紫蘇煎湯頻服一治婦人吹乳韭菜地中蚯蚓糞研細末醋調厚敷於上干則再易三次即愈一治吹乳用益元散五錢以政治部豉蔥白湯調下頻服即愈一治婦人年五十外乳癰初已而又致穿破不得收功者宜衝脈飲子黃耆每一兩用桂一錢煎湯將碗盛飯上蒸熟每劑用一錢人參一錢五分白朮一錢生地黃酒浸一錢茯苓一錢當歸身二錢白芍酒炒一錢川芎一錢柴胡五分青皮五分宣木瓜四分皂角子二錢甘草二分上銼一劑水煎頻服大便不通潤加火麻仁炒二錢黃連酒炒二錢一論內外吹乳乳癰腫痛已成未成服之立瘥牙皂燒過存性蛤粉炒等分為末每服五錢好頭生酒調下以醉為度熱服出汗立愈外用巴豆三個燒存性香油調敷放癰頭上上用膏藥貼之四圍用鐵箍散白芨白蘞白芷梢赤芍梢為末蜜調敷瘡四圍立愈一治內外吹乳及潰漿服之立效黃耆人參當歸川芎白芷木通連翹漏蘆天花粉青皮橘蕊防風白芍貝母栝蔞乳香甘草穿山甲皂角刺水煎食後臨臥服一治乳勞乳癰已成化膿為水未成亦消治乳之方甚多獨此神效瘰癧瘡毒其效無比名神效栝蔞散栝蔞大者兩個搗當歸酒洗甘草各五錢乳香另研沒藥另研各一錢上作二劑用酒三碗煎至二碗分三次飲之更以渣敷於患處一切癰疽腫毒便毒皆效補遺一切吹乳腫痛不可忍者升麻甘草節白芷梢青皮歸尾金銀花栝蔞仁倍用橘葉七片連翹貝母上銼水煎入酒半碗同服不拘時服一治乳痛風神方北細辛一錢白芷梢八分歸尾一錢赤芍八分防風一錢莪朮八分桔梗八分烏藥一錢麻黃一錢小甘草三分上銼一劑水煎加熱酒同服以渣敷患處出汗為度乳岩婦人乳岩始有核腫如圍棋子大不痛不癢五七年方成瘡初便宜服疏氣行血之藥亦須情思如意則可愈如成瘡之後則如巖穴之形或如人口有唇赤汁膿水浸淫胸脅氣攻疼痛用五灰石膏出其蠹肉生新肉漸漸收斂此症多生於憂鬱積忿中年婦人未破者尚可治成瘡者終不可治宜服十六味流氣飲當歸川芎白芍酒炒人參烏藥檳榔防風黃耆蜜水炒官桂厚朴姜炒桔梗枳殼去穰木香白芷紫蘇甘草上銼生薑煎服乳癰加青皮亦治痘疹後餘毒作癰瘤一治婦人乳岩永不愈者樺皮油核桃各等分燒灰存性枯礬輕粉二味加些共為細末香油調敷一治婦人乳癰乳岩初起時先服荊防敗毒散一劑以敗其毒次進蒲公英連根葉搗汁入酒飲之將渣敷於患處立效敗毒散即人參敗毒散方見傷寒去人參加防風荊芥連翹是也一婦人年逾三十每怒後乳內作痛或腫此肝火所致與小柴胡合四物湯加青皮桔梗枳殼香附而愈彼欲絶去病根自服流氣飲遂致朝寒暮熱益加腫毒此血被損而然豫與八珍湯三十餘劑喜其年壯元氣易復而愈也一婦乳內腫一塊如雞子大勞則作痛久而不消服托裡藥不應此乳勞症也屬肝經血少所致先與神效栝蔞散四劑更隔蒜灸之腫少退再服八珍湯倍加香附夏枯草蒲公英仍間服前散月餘而消亦有乳疽一症其狀腫硬木悶雖破而不潰腫亦不消尢當急服此散及用蒜灸此二症乃七情所傷氣血所損亦勞症也宜戒怒節飲食慎起居否則不治一婦人患癰氣血頗足但瘡口不合百法不應豫與栝蔞神效散四劑少可更與四劑及豆豉餅灸之而愈又一婦人患此未潰亦與此方三劑而消良甫云如有乳勞便服此藥可杜絶病根如毒已成能化膿為水毒未成者則從大小便中散之小柴胡湯方見婦人虛勞四物湯八珍湯俱見補益通乳一論婦人素稟怯弱血氣虛耗産後無乳宜補養之劑用當歸補血湯當歸身酒洗五錢嫩黃耆蜜水炒一兩上銼一劑蔥白十根煎服一論産後乳脈不行身體壯熱疼痛頭目昏暈用此涼膈散熱下乳玉露飲當歸一錢二分川芎五錢芍藥一錢五分人參白茯苓甘草各二錢半白芷五錢桔梗炒五錢上銼水煎臨臥溫服如煩熱盛大便結加大黃一錢二分乳脈不行結成癰腫疼痛加黃耆蜜水炙當歸金銀花甘草各二錢半水煎入酒半鍾食後溫服一方下乳二母散牡蠣知母貝母為細末以豬蹄湯調下一論産後乳汁絶少用豬蹄一隻通草四兩先水煎肉汁後同通草再煎去渣食後服之又取木梳子上頭垢須用男梳者丸如梧子大每服七八丸空心順流水下一産後氣血衰弱經血不足乳汁澀少豬蹄下截四隻通草二兩川芎一錢穿山甲一兩炒甘草一錢上用水五升煮汁飲之忌生冷避風寒夏月不宜失蓋更以蔥湯頻洗乳房一治乳汁不通通草七分瞿麥柴胡天花粉各一錢桔梗青皮白芷木通赤芍連翹甘草各五分水煎食遠服更摩乳房一治乳婦思慮滯結乳汁不行宜湧泉散王不留行酒浸白丁香漏蘆天花粉白殭蠶炒穿山甲炒黃色各五錢上為細末每服三錢食後以豬蹄湯調服一婦人産次子而無乳服下乳藥但是作脹豫謂人乳皆氣血所化今脹而無乳是氣血竭而津液亡也當補氣血自然有乳矣乃與八珍湯倍加參術少加肉桂十餘劑奏效斷乳一論小兒三四歲或五六歲當斷乳不肯斷者宜用斷乳盡眉膏山梔子三個燒灰存性雄黃少許辰砂少許上三味為末入生麻油輕粉各少許調勻候兒睡了抹於兩眉上醒來便不食未效再抹一論婦人欲斷乳方歸尾赤芍紅花酒洗牛膝酒炒水煎臨臥服一論婦人血氣方盛乳房作脹或無兒吃乳脹痛憎寒熱麥芽一二兩炒水煎服立消其耗散血氣如此和脾胃虛弱飲食不消方中多用之一云麥芽最消腎或氣血虛而乳汁自出者宜十全大補湯服之其子多不育婦人通治夫通治方者蓋胎前産後一切雜病皆可治也或一方而治數十症不可入於專門皆是素試之有效者雖曰通治不可膠柱而鼓瑟也一論婦人胎前産後諸病三十六種冷血風八十二種風疝氣中風淋瀝血聚胎孕不安死胎不下胞衣不落一服立效産後腹內臍下如刀刺赤白帶下嘔逆填塞心氣煩滿懷胎近産一日一丸臨産不覺痛苦經脈不通或乘時不來或來頻並飲食無味面赤唇焦手足頑麻遍身生黑點血斑者産後中風傷寒體如板者麻黃湯研化服神祕萬靈丹何首烏去皮用黑豆拌九蒸九曬忌鐵器當歸酒洗兩頭尖各五錢川烏去尖火煨大茴香草烏水煮過去皮川芎人參去蘆防風去蘆尾白芷荊芥穗桔梗米泔浸甘草炙天麻十一味各二兩白朮去蘆米泔浸木香不見火北細辛血竭另研各五錢蒼朮半斤米泔水洗過入酒浸一宿曬乾為末麻黃用水煮三四沸去節四錢上共二十味俱為細末煉蜜為丸如彈子大每服一丸細嚼黃酒送下一論婦人胎前産後一切之症功效甚大濟陰返魂丹益母草五月五六月六採梗葉並子陰乾不拘多少上為細末煉蜜為丸如彈子大每服一丸細嚼米飲吞下一胎前臍腹刺痛胎動不安下血不止水煎秦艽米湯或當歸湯亦可一胎前産後臍腹作痛作聲寒熱往來狀如瘧疾者俱溫米湯下一臨産併産後各先用一丸童便酒化下安神定魄氣血自然調和諸病不生又能破血養脈息調經絡功效不能盡述一産後胎衣不下落在胞中及産前一切産難橫生不順死胎經日不下脹滿腹中心悶心痛炒鹽湯下一産後中風牙關緊急半身不遂失音不語童便酒各半送下一産後氣喘咳嗽胸膈不利噁心口中吐酸水面目浮腫兩脅疼痛舉動失力者溫酒下一産後兩太陽痛呵缺心忪氣短肌膚羸瘦不思飲食血風身熱手足頑麻百節疼痛溫米湯送下一産後眼前黑暗昏暈血熱口渴煩悶如見鬼神狂言不省人事薄荷自然汁下如無生者濃煎乾薄荷湯下及童便酒各半送下一産後面垢顏赤五心煩熱或結成血塊臍腹奔痛時發寒熱有冷汗者童便酒各半送下一産後未及一月血氣不通咳嗽四肢無力臨睡自汗不止月水不調久而不治者則為骨蒸之疾童便酒下一産後鼻衄口乾舌黑童便酒各半送下一産後大小便不通煩躁口苦者薄荷自然汁下如無生者濃煎乾薄荷湯下一産後痢疾米湯下一産後漏血水煎棗湯下一産後赤白帶下煎膠艾湯下一血崩漏下糯米湯下一勒奶痛或成癰為末水調塗乳上一宿自瘥或生搗爛敷上亦可一婦人久無子息溫酒下服至一月決有功效一論此方治産前産後腹痛身熱頭痛及諸疾才産子未進別物先服此藥能除諸疾逐敗血生新血佛手散一名芎歸湯川芎當歸酒洗各三兩上銼水酒各半煎溫服一治諸般失血傷胎去血産後去血血崩去血金瘡去血拔牙去血不止一切去血過多心煩眩暈悶絶不省人事頭重目暗舉頭欲倒俱能治之一産後血暈宜加酒炒芍藥治之一産後腹痛不可忍者加桂心等分酒與童便煎服立效名桂香散一妊娠子死或未死胎動不安酒水同煎連進數服若已死服之即下未死其胎即安此經纍效萬不失一一妊娠臨月服之則縮胎易産兼治産後諸疾病一治虛損羸乏腹中疼痛往來寒熱呼吸少氣不能支持頭眩自汗腹內拘急每服用精肉一兩姜十片水煮熟溫服一婦人室女心腹疼痛經脈不調用水煎服一妊娠胎氣不安産後諸疾加酒煎服一婦人血氣上喘下腫二味等分為細末每二錢空心艾湯調下一産後虛損敗血衝心腹脹氣絶者神效一難産倒橫子死腹中先用黑豆山梔仁炒熟水一杯入童便一杯藥末四錢煎至一杯分為二服未效再作一産子後惡血注心迷悶喘急腹痛依前用黑豆加生薑自然汁半合煎服一臟毒下血每服一錢半拌入槐花末五分水煎服三日取下血塊即愈一産後頭痛加荊芥煎服一吐血亦宜服之女聖丸香附米乃女中之聖藥以其氣香則竄無滿氣也味苦能降無道之火其性勇毅發暢可解婦女鬱結多怒之偏本草只言益氣世俗多言耗氣男子不敢服非也先舂去皮毛用一斤淨分作四制一用鹽水加薑汁浸透煮熟略炒主降痰調下部血一用水醋浸透煮熟略炒主斂氣補血一用山梔仁四兩同炒去梔子不用主降鬱火一用童便洗過不炒為末一方加芎歸各二兩共為末酒煮麵糊為丸如梧桐子大每五七十丸隨引子送下經水不調酒送下胎前諸病艾湯下産後諸病芎歸湯下胸脅脹滿用薑湯下頭暈薄荷荊芥湯入薑汁下白帶非冷乃自庚辛金來主忿氣所致用小茴香湯或木香湯吞下其餘病者與男子同症隨意用引不能者只用白湯下婦人雜病一論室女寡婦師尼惡風體倦乍寒乍熱面赤心煩或時自汗症類時疫但肝脈弦長欲男子而不可得者斷欲丸一名抑陰丸生地黃二兩酒浸搗爛黃芩五錢硬柴胡五錢赤芍六錢秦艽五錢上為末加煉蜜少許丸如梧子大每服二三十丸烏梅煎湯下一論寡居獨陰無陽欲心萌而不遂是以惡寒發熱全類瘧者柴胡益肝散蒼朮炒一錢柴胡二錢五分香附一錢神麯炒八分山梔炒一錢牡丹皮一錢五分連翹五分青皮炒二錢川芎七分赤芍一錢五分生地黃五分地骨皮一錢上銼水煎服一論婦人夢交臟腑虛神不守故邪厲得為病也其狀不欲見人如有對晤時獨言笑或時悲泣是也脈息遲伏或如鳥啄又脈來綿綿不知度數而顏色不變亦是此候也宜安神散白茯神去皮木一兩半白茯苓去皮人參石菖蒲各一兩赤小豆五錢上銼水煎溫服一論婦人心氣不足精神恍惚夜夢顛倒與人交語言錯亂或驚悸恐怖悲憂慘戚虛煩少寐喜怒不常夜多盜汗飲食無味頭目昏眩常服補養氣血安神鎮心宜妙香散黃耆一兩人參一兩白茯苓去皮一兩白茯神去皮心一兩山藥薑汁炒一兩木香二錢五分桔梗五錢甘草炙五分麝香四分另研辰砂三錢另研遠志甘草湯泡去心一兩上為細末每服二錢不拘時溫酒調服一論婦人陰腫者是虛損受風所為胞絡虛而風邪客之風氣乘於陰血氣相搏令氣痞塞腠理壅閉不得泄越故令腫也宜菖蒲散石菖蒲當歸秦艽吳茱萸上銼蔥白五寸水煎空心服一治婦人陰中腫痛不可忍洗法艾葉五兩防風五兩大戟二錢上銼水煎熱洗切宜避風寒一洗法小麥朴硝白礬五倍子上銼同蔥白煮熱水洗之一論婦人陰癢者是蟲蝕所謂三蟲在於腸胃之間因臟虛三蟲動作蝕於陰內其蟲作熱微則為癢重則痛也宜將軍散大黃微炒黃芩黃耆炙各一兩赤芍玄參丹參山茱萸去核蛇床子各五錢上為末每服二錢食前溫酒調下一治陰癢以小薊不拘多少水煮湯熱洗日三次用之蒜煮湯亦可一方用杏仁燒作灰乘熱綿裹納陰戶中日三易之一治女人陰冷癢方遠志二分乾薑生蓮花各三分蛇床子五味子各四分上為細末先以兔屎塗陰門中然後綿裹藥一錢納陰中熱即為效一方以硫黃末煎湯洗一治陰門下脫先以淡竹根煎水洗次用五倍子白礬為末摻之又方用溫鹽湯洗軟以五靈脂燒煙燻之次用萆麻子研爛塗頂上吸入即洗去一治婦人陰中生瘡杏仁研末雄黃礬石麝香少許上四味研細末和敷陰中一治婦人陰戶作癢用豬肝炙燥納入陰戶則蟲俱引出而癢自止一治婦人生門硬如石衣撞著痛不可忍用青魚膽七個或鯽魚膽七個亦好用絲綿二三錢燒灰存性同魚膽調取鴨毛搽上立效其硬不過半時即軟一治女人生門翻出流黃臭水作痛取綿繭二三錢燒灰存性酒調鴨毛搽上其毒即收一時即愈一婦人交腸病者糞從小便出尿從大便出混濁不分必是夏月伏暑而致須用五苓散加牛膝海金沙木通通草但令大小便各歸本臟即安西園公治臨穎徐少川母服此藥即愈加車前子一治女人陰中生瘡如蟲咬痛用桃葉搗爛綿裹納陰中三四次即瘥茄病一治女人生門上茄病取茄䔷銼爛煎水洗若另出者用巴豆捋絲線二人牽住用巴豆捋之以絲線纏其毒上過一晚即落推生門邊縛上亦用茄䔷煎水洗如在內用枯礬與茄䔷同煎水洗一論婦人茄病原因生産月未滿足因取重物膀胱墜下若是紅茄紫茄可治白者不治人參三錢五分白朮去蘆二錢五分當歸三錢白芍火煨三錢懷熟地黃二錢五分沉香二錢肉桂二錢川芎五錢甘草炙五分吳茱萸湯泡二錢枳殼麩炒一錢五分陳皮去白三錢上銼二劑除沉香磨水生薑一片水煎空心服再服白薇散白薇一錢白芍火煨一錢五分蒼朮米泔浸三錢當歸三錢懷熟地黃三錢川芎三錢牡丹皮一錢五分澤蘭三十片凌霄花即紫薇花一兩上銼一劑澤蘭葉每劑十片水煎空心服後熏洗之其物自上熏洗方宣黃連一兩金毛狗脊八錢茄藤七錢水楊柳根一兩五倍子八錢魚腥草一兩枯礬七錢上為散每帖要如數大罐貯藥煎滾放桶內去罐上紙蓋熏候藥水略溫復傾小半在盆內洗次日再將前藥煎滾熏洗如前其物自收次服三茱丸斷根三茱丸吳茱萸水泡七次家茱萸陳者加溫水洗去塵垢山茱萸去核各一兩白蒺藜炒去刺八錢海藻八錢洗去鹽小茴香七錢炒入鹽少許玄胡索七錢五分牙桔梗八錢五分白茯苓七錢五分川楝子去核兩半五味子七錢五分花青皮去鹽七錢五分上十二味俱要足稱不可短少為極細末用真正頭酒調早米粉打糊為丸如梧桐子大空心白湯加酒化下
