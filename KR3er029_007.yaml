body:
  text: 卷七婦科總論夫婦人乃衆陰所集性情溫淳榮衛和平諸病無由而生榮衛虛弱則百病生焉經云二七而天癸至任脈通太衝脈盛月事以時下交感則有子矣夫其天癸者天一生水也任脈通者陰用之道泰也太衝脈盛者血氣俱盛也何謂之月經月者陰也經者經絡也過期而行經者血寒也未期而先行者血熱也經行作痛者氣之滯也來後或作痛者氣之虛也其色紫者為風黑者多熱淡者多痰如煙塵水者血不足余考古方耗其氣以調其經則以為人之正氣不宜耗也夫衝脈氣也任脈血也氣升則升氣降則降血隨氣行無有暫息若獨耗其氣血無所施正氣既虛邪氣必勝故百病生焉其經安得調乎況心生血脾統血脈為之元也養其心則血生實其脾則血足氣盛則血行矣安得獨耗其氣哉此調經之要法也行經之時保如産母一失其宜為病不淺當戒暴怒莫損於衝任遠色欲莫損於血海一有抑鬱宿血必停走於腰脅注於腿胯遇新血擊搏則疼痛不已散於四肢則麻木不仁入於血室則寒熱不定或怔忡而煩悶或入室而狂言或湧上出或歸大腸皆因七情之氣所致也余考産後一科胎前血氣用藥溫暖於理最當産後治法至於子和論産後出血數斗世人皆以血氣兩虛妄用溫熱之劑養血補虛止作寒治舉世皆然故有誤者殊不知妊孕如天地之孕物陰陽和合人物俱生陰陽偏勝豈得孕乎譬如瓜果值水旱花實萎落故立秋後十日寸草不結乃寒不發生也今婦人終於十月而産者反為寒治則非理矣若子和之法當行溫涼溫熱之劑實所禁也以余常用和暖之劑使血得暖以流通其惡露自盡故無後患耳況生産有難易血氣有盛衰豈可偏執一法能盡産後無窮之變乎余每經歷新産月里用溫暖治效者十多八九用溫涼治效者百無二三嘗考子和之法施於月外蘊熱自甚陰虛潮熱往來當行溫涼之劑故無禁耳其月里可不慎哉人之受胎雖是陽精所得實賴母血而成亦若瓜果賴枝葉所蔭也今婦人於十月而産者即瓜熟蒂落脫殼之意雖冒寒暑傷食調理不宜急迫則隨手而愈間有失珍重不滿十月而動胎産者猶若枝蔓瓜果有所傷也胞系腐爛胎始墮落故此得病則難愈矣昔人所謂小産傷如大産者此也凡婦人新産榮衛俱虛腠理不密或冒風寒或傷飲食或惡露不通或血行過度如此四者俱能發寒熱身疼腹痛又不可相類而用藥也又如産後脾胃既虛或多食雞子冷物所傷脾胃遂成傷食以致身熱氣口脈盛當行消食之藥世人多因身熱便為外感遂行溫涼之藥發汗退熱胃氣轉傷豈無死者産後半月之前難去內外之邪亦當生血行氣若過半月以後倘有雜症不可偏執産後一門治療又當各類中求之庶不耽誤病體矣調經諸方一論此方調益榮衛滋養氣血治衝任虛損月水不調臍腹疼痛崩中漏下血瘕塊硬發歇疼痛妊孕宿冷將理失宜胎動不安血下不止及産後乘虛風寒內搏惡露不下結生瘕聚小腹堅痛時作寒熱婦人百病宜四物湯當歸身酒洗川芎白芍酒炒懷熟地黃各二錢上銼一劑水煎溫服看病加減一經候將來腹中陳陳作痛乍作乍止者血氣實也用生地加黃連香附桃仁紅花元胡索牡丹皮莪朮一經水常不及期而行者血熱也用生地加黃連黃芩白芷一經水常過期而來者瘦人多是血少倍當歸地黃加黃耆甘草少佐以紅花桃仁泥以為生血之引用也肥人大概是氣虛挾痰阻滯升降然也去地黃加參耆甘草茯苓半夏陳皮香附一常過期而紫黑成塊者血熱也多作腹痛用生地加香附黃連元胡索五靈脂乳香沒藥一過期而血淡色者痰多血少也用生地黃合二陳湯煎服一肥盛婦人經水或二三個月一行者痰盛而軀脂閉塞經脈以導痰湯加芎歸香附蒼朮白朮一經水適來適斷往來寒熱如瘧者合小柴胡湯煎服一經行過三五日腹中綿綿走痛者此血行而氣滯未盡行也加木香檳榔煎服一經水行後而作疼者血氣俱虛也加四君子湯煎服一經事欲行臍腹疼痛臨經者血澀也加川楝子小茴木香檳榔玄胡索一行經時忽作氣惱後得心腹腰脅痛不可忍脈弦急不勻乃瘀血作痛也加桃仁紅花玄胡莪朮青皮行血即愈一經行不止加炒阿膠地榆荊芥穗一婦人因經血過多五心煩熱日晡潮熱加胡黃連二三服效一婦人筋骨肢節痛及遍身頭疼兩手脈弦憎寒如瘧每以散風止痛之劑罔效加羌活防風秦艽官桂立效一血崩初起不問虛實加荊芥穗燈上燒過升麻如不止加蒲黃白朮炒升麻一治血崩加荊芥黃芩香附一治崩漏加沙參益母草香附炒阿膠炒蒲黃炒陳皮白朮甘草去當歸不用一赤白帶下加柴胡升麻酒炒各七分半夏薑汁炒白茯苓蒼朮米泔浸炒黃柏酒炒知母酒炒乾薑炮升陽除濕帶自除也一胎動下血不安加艾葉阿膠炒黃芩白朮砂仁香附糯米一胎死腹中加官桂白芷麝香一産後惡露不行加益母草桃仁蘇木一産後血虛昏暈不醒加人參白朮白茯苓乾薑香附甘草一腹中氣塊加木香檳榔一血積塊痛加三稜莪朮官桂一口乾煩躁加麥冬乾葛烏梅一骨蒸勞熱加知母地骨皮柴胡一小便閉塞加澤瀉木通一大便不通加桃仁大黃一虛煩不眠加竹葉人參酸棗仁炒一心神恍惚加遠志酸棗仁白茯苓辰朱另研一嘔加藿香半夏砂仁陳皮一瀉加白茯苓白朮蓮肉山藥炮乾薑一婦人經水先期而至血紫有塊腰痛手足冷痹口乾頭眩胸痞本方加條芩荊芥香附小茴玄胡索續斷地榆杜仲甘草一婦人血塊作痛不可忍者加三稜莪朮青皮陳皮小茴香附吳茱萸玄胡索木香甘草薑棗煎服一婦人經不下行逆經吐血不止本方加川大黃酒浸炒一兩水煎入童便同服立效一婦人女子經行愆期以至鼻衄錯經妄行本方去地黃加桃仁山梔炒大黃酒炒甘草共七味水煎臨服入童便同服一婦人經行三日後來多不止本方加伏龍肝地榆蒲黃黃柏側柏葉黃連白茯苓甘草梔子十三味因氣惱加香附脾胃虛食少加朮一論婦人經不調或腹痛白帶或淋漓不止或肌瘦者頭目眩暈面色痿黃四肢無力以十全大補湯加香附陳皮玄胡索砂仁阿膠沉香小茴香吳茱萸一論室女十四歲經脈初動名曰天癸水至失於調理心腹脹滿惡寒發熱頭身遍疼此感寒血氣不順宜服小溫經湯利氣散主之小溫經湯桂枝三分白芷四分白朮五分川芎七分當歸酒洗一錢熟地黃一錢枳殼麩炒七分白芍酒炒一錢羌活四分柴胡四分砂仁四分黃芩七分香附炒一錢甘草二分小茴酒炒四分血氣刺痛心腹難忍加玄胡五分咳嗽加杏仁去皮尖七分五味子十粒桔梗七分上銼一劑生薑三片水煎熱服利氣散香附炒五錢黃芩四錢炒枳殼去穰四錢陳皮藿香小茴酒炒白朮去蘆玄胡索砂仁草果各三錢去殼炒甘草八分厚朴一錢上為細末每服二錢空心米湯調酒亦可一論室女十五六歲經脈不通日夜寒熱手足麻痹飲食少進頭疼噁心嘔吐腹中忽然結一塊痛者此症誤食生冷所傷可服加減四物湯香附炒一錢當歸酒洗川芎枳殼去穰炒柴胡白芍酒炒各八分黃芩陳皮三稜醋炒莪朮醋炒各六分熟地黃一錢白芷玄胡索小茴酒炒白朮去蘆炒青皮去穰砂仁肉桂甘草各五分上銼作一劑水煎空心熱服遍身痛加羌活一論室女十七八歲經脈不通或百日或半年顏色青黃飲食少進寒熱往來四肢困倦頭疼目眩肚疼結塊五心煩熱嘔吐膨脹此乃脾胃受傷氣血俱弱誤食生冷急宜和氣血扶脾胃先以逍遙散次服加味八物湯後服調經丸逍遙散當歸酒洗一錢五分白芍酒炒一錢柴胡一錢黃芩一錢川芎七分熟地黃七分半夏姜炒七分人參五分麥門冬去心五分甘草四分上銼散生薑三片水煎熱服後服八珍湯十劑又可服調經丸數服若少睡加酸棗仁炒以斂心血加味八物湯香附當歸白芍酒炒白朮川芎人參熟地黃小茴香炒黃芩柴胡白茯苓去皮甘草腹痛加玄胡索枳殼乾漆嘔吐噁心加良薑砂仁手足麻痹惡寒加肉桂咳嗽加杏仁五味子款冬花上銼水煎服調經丸香附醋浸曬乾三兩當歸酒洗白朮去蘆一兩半如腹痛以蒼朮代之枳殼麩炒兩半赤芍陳艾醋炒陳皮小茴酒炒川芎厚朴薑汁炒各五錢熟地黃酒蒸兩半青皮去穰一兩二錢玄胡索砂仁三稜醋浸煅莪朮牛膝去蘆酒洗白芷粉草各兩半上為細末醋打米糊為丸如梧子大每服百丸空心米湯送下一論婦人二十歲後遇經脈動來沿身疼痛手足麻痹寒熱頭痛目眩可服加減五積散厚朴去皮薑汁炒蒼朮米泔浸川芎白茯苓去皮當歸酒洗姜半夏炒白芍酒炒獨活羌活牛膝去蘆桔梗白芷枳殼麩炒麻黃去根陳皮各等分甘草三分上銼散薑蔥煎熱服咳加五味杏仁瀉去枳殼加肉蔻一婦人二十三四歲經水不調或赤白帶下或如梅汁淋漓或成片有阻二三月者此乃氣血弱漸致潮熱咳嗽飲食少進四肢倦怠久必變生骨蒸即成勞瘵急當調治可服前加味八物湯四劑方可服大溫經湯大溫經湯香附八分當歸酒洗熟地黃鹿茸醋炙各八分白芍酒炒八分人參白茯苓去皮白朮吳茱萸炒元胡索川芎各五分砂仁四分陳皮四分小茴酒炒四分沉香三分黃耆蜜炒五分阿膠炒肉桂甘草各三分上銼一劑生薑三片水煎空心熱服如汗不止加酸棗仁炒黃耆蜜炒咳嗽加杏仁五味半夏桔梗各五分潮熱加柴胡黃芩一論婦女二十四五歲所服藥餌加味四物六君湯加味四物六君湯厚朴薑汁炒五分桔梗白朮去蘆各四分砂仁紅花各三分黃連三分玄胡三分陳皮四分甘草二分當歸酒洗香附各五分枳實麩炒白茯苓去皮川芎赤芍蘇葉檳榔半夏薑汁炒各四分上銼散生薑三片水煎空心熱服一論婦人二十五六歲血海虛冷經水不調或時小腹疼痛或下白帶如魚腦髓或似米泔不分信期每日淋漓不止面色痿黃四肢無力頭暈眼花目眩宜服四物補經湯兼服烏雞丸調理四物補經湯香附當歸白芍酒炒各六分熟地黃川芎各五分黃耆蜜炙白茯苓去皮白朮去蘆黃芩玄胡索陳皮各四分砂仁小茴酒炒人參阿膠炒各三分沉香另研三分吳茱萸三分粉草三分上銼生薑三片水煎空心熱服烏雞丸海金沙側柏葉鹽水炒焙乾各四兩香附炒一兩厚朴姜炒三兩當歸酒洗三兩白朮去蘆川芎各二兩白芍酒炒二兩熟地二兩羌活一兩半防風一兩半人參一兩砂仁一兩粉草三錢上銼用白毛烏肉膳雞一隻不問三五年者俱好宰後去腸屎毛將藥末裝入雞肚中放銅鍋內好酒五壺水二瓶文武火煮至干取雞去骨取肉切細同藥曬乾為末用粳米粉酒水煮糊為丸如梧子大每服百丸空心米湯吞下酒亦可一論婦人二十七八歲身體虛敗經水不時淋漓或成片或下黑水面色青黃頭暈眼花四肢困倦宜服此四五劑後服大溫經湯十餘帖止經湯當歸酒洗一錢三分白朮去蘆八分白芍酒炒川芎熟地黃香附阿膠炒黃芩蒲黃炒側柏葉砂仁各七分甘草炒三分上銼生薑煎空心熱服咳加五味子杏仁去皮肚痛加枳殼玄胡索乾漆氣急加半夏蘇子各五分一治婦人經水來多不止用蘄艾一兩好生酒炒三次後碗蓋淬入水煎滾去渣溫服立止一論婦人三十一二歲年年生育敗血過多以致經水不勻不時腹中疼痛結塊飲食少進困倦目眩潮熱往來五心煩躁此血虛胃熱宜服紅花當歸散兼用八物湯紅花當歸散當歸酒洗八分川芎赤芍藥熟地黃香附各六分枳殼五分玄胡索五分厚朴姜炒小茴香酒炒柴胡陳皮三稜醋炒各四分莪朮醋煨四分牛膝去蘆四分紅花三分甘草二分上銼生薑水煎空心熱服一論婦人三十四五歲因經水到時當風坐臥失於回避腠理空虛外