下一治婦女月經不通鼻衄出血不止侍郎張玉陽傳當歸一錢半川芎一錢白芍一錢半生地黃一錢半知母一錢黃柏鹽水炒一錢二分桃仁去皮尖一錢紅花一錢牡丹皮一錢茅根側柏葉各二錢大黃以紅花蘇木茜根煎酒煮大黃一日取出曬乾三錢上銼一劑水煎空心服一治室女經水不行翰林張明宇傳當歸川芎赤芍生地黃荊芥穗枳殼麩炒各一錢馬鞭草一錢半牡丹皮川牛膝生蒲黃各五分桂心三分烏梅二分上銼一劑水煎服日二劑過期不行加澤蘭葉一治室女經閉咳嗽發熱屬虛弱者宜養血通經湯牡丹皮當歸各一錢五分白芍陳皮白朮去蘆香附各一錢川芎七分柴胡七分黃芩七分甘草四分生地黃一錢上銼一劑水煎空心熱服通經調氣湯治症同前當歸酒洗川芎白芍酒炒生地黃香附米童便炒各一兩牡丹皮八錢柴胡三錢黃柏酒浸炒六錢知母童便炒八錢牛膝酒洗八錢桃仁去皮尖紅花二味量加上銼十劑水煎空心一服食遠一服一治婦人經閉不通不論新久下取良法下取通經丸乳香沒藥孩兒茶巴豆去殼血竭蔥白各五分斑蝥五個上為末共搗為丸綿裹三層系放筒口上將線捆住送入陰戶內三四寸許俟一炷香經水即下一治婦人胃氣虛素弱為哭母吐血咳嗽發熱盜汗經水不行此乃悲則傷肺以補中益氣湯加桔梗貝母兼進六味丸一婦人經閉八月肚腹漸大面色或青或黃用胎症之藥不應余診視之曰面青脈澀寒熱往來肝經脈病也此鬱怒傷脾肝之症非胎也不信仍用治胎散不應余用加味歸脾逍遙之藥各三十餘劑諸症稍愈彼欲速效別服通經丸藥一服下血昏憒自汗惡寒手足俱冷嘔吐不食余用人參炮姜二劑漸愈又用十全大補湯五十帖而愈一婦人久患瘧形體怯弱內熱晡熱自汗盜汗飲食少思月事不行或用通經丸虛症悉具此因虛而致瘧因瘧以閉經也用補中益氣湯及六味地黃丸瘧愈經行一婦人性沉多慮月經不行胸滿食少或作脹或吐酸余以中氣虛寒用補中益氣湯加砂仁香附煨姜一帖而胸膈和飲食進更加六君加川芎歸貝桔梗生薑大棗數劑脾胃健而經自調矣一婦人素有胃火或用清胃散而安後因勞役燥渴內熱肌肉消瘦月經不行此胃火消爍陰血用逍遙散加牡丹皮炒梔子以清胃熱用八珍湯加茯苓遠志以養脾而經自行矣補中益氣湯方見內傷六味丸方見補益十全大補湯方見補益逍遙散方見婦人虛勞六君子湯八珍湯俱見補益崩漏婦人漏血下赤白日下血數升脈急疾者死遲者生又曰脈小虛滑者生大緊實數者死又云尺寸脈虛者漏血漏血脈浮不可治也夫婦人崩中漏下者由勞傷血氣衝任之脈虛損故也衝脈任脈為經脈之海皆起於胞內而手太陽小腸之經也手少陰心之經也此二經上為乳汁下為月經婦人經脈調適則月水依時若勞傷衝任氣虛不能制其經脈血非時而下淋漓而不斷謂之漏下也故五臟傷損五臟之色隨臟不同若五臟皆虛損者則其色隨血下診其脈寸口弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏其脈為革婦人即半産而漏下又云尺脈急而弦大風邪中少陰之經女子漏血下赤又漏下赤白不止脈小虛滑者生脈大緊實數者死也又漏血下赤白日下血數斗脈急疾者死遲者生也又云尺寸脈虛者漏血漏血脈浮不可治也若經候過多其色瘀黑甚者崩下吸吸少氣臍腹冷極則汗出如雨尺脈微小由衝任虛衰為風冷客乘胸中氣不能固可灸關元百壯在臍下當中三寸是其穴也一論女人漏下惡血月事不調或暴崩不止多下水漿之物皆因飲食不節勞倦所傷或素有心氣不足致令心火乘脾必怠惰嗜臥困倦乏力氣短氣急脾主滋榮周身者也脾胃虛而心胞乘之故漏下月水不調也況脾胃為血氣陰陽之根蒂也當除濕去熱抑風氣上升以勝其濕又云火鬱則發之宜用升陽除濕湯當歸酒洗五分黃耆一錢五分蒼朮米泔浸一錢半柴胡一錢五分升麻一錢藁本一錢防風一錢羌活一錢五分獨活五分蔓荊子七分甘草炙一錢上銼作一劑水煎空心溫服少時以早飯壓之可一服而愈又灸足太陰脾經血海穴二七壯此藥乃從權之法因風勝濕為胃氣下陷而氣迫於下以收其血之暴崩也往後必須服黃耆人參當歸炙甘草之類數服以補之一治婦人崩漏多因氣所使而下者黃耆蜜炙五分人參五分白朮去蘆一錢當歸身酒洗一錢川芎五分白芍酒炒一錢熟地黃一錢香附炒黑一錢蒲黃炒五分地榆五分升麻三分上銼一劑水煎空心服一治婦人經水過多不止者樗根皮七錢半白芍炒一兩黃芩炙一兩龜板炙一兩黃柏炒一兩香附童便浸一宿二錢五分上為末酒糊為丸如梧子大每服五十丸空心溫酒白湯送下一治婦人血崩氣血兩虛而兼熱者當歸酒洗一錢川芎七分人參一錢黃耆鹽炒一錢防風一錢荊芥一錢白芍酒炒八分艾葉酒炒真阿膠炒成珠各一錢蒲黃略炒一錢黃連酒炒錢半黃芩酒炒一錢白朮去蘆酒炒地榆各一錢生地黃薑汁炒一錢半山梔子炒黑一錢生甘草三分上銼一劑水煎空心溫服或薑棗煎服一治婦人血崩或作肚腹刺痛者蒲黃炒五靈脂官桂雄黃甘草各一錢上為細末每服一錢薑湯調下一治血崩惡血去多心神恍惚戰栗虛暈者宜復元養榮湯遠志肉五分人參一錢半酸棗仁炒一錢黃耆蜜炒一錢荊芥八分白芍酒炒一錢當歸頭一錢地榆一錢白朮去蘆一錢甘草三分上銼一劑棗一枚水煎溫服如虛極發熱不省人事口噤急以醋噀其面又將鐵錘燒通紅浸入醋碗內沸起醋氣熏本婦鼻邊此産後通用法也一治婦人經候凝結黑血成塊左脅有血瘕水泄不止食有時不化後血塊暴下並水泄俱作是前後二陰有形血脫竭於下既久經候猶不調水泄日三四行食罷煩心飲食減少人形瘦弱血脫益氣古聖人之法也先補胃氣以助生髮之氣故曰陽生陰長諸甘藥為之先務也甘能生血陽生陰長之理人生以穀氣為寶故先理胃氣為要益胃升陽湯黃耆蜜炒一錢半人參一錢二分甘草炙一錢陳皮炙一錢白朮去蘆二錢當歸一錢柴胡五分升麻五分神麯炒一錢生黃芩二分上銼一劑水煎服腹痛加白芍三分中桂少許如口渴作干加葛根八分一異人傳授祕方治血崩如神金鳳膏白毛烏肉雄雞一隻吊死水泡去毛去腸雜不用將金櫻子之根洗淨切片裝入肚內酒煮令熟去藥將雞酒任意食之一治血崩試驗方云來弟傳懷生地黃用砂罐去皮煎水蒸黑六分牡丹皮六分石棗酒蒸去核六分淮山藥五分條芩酒炒八分蒲黃炒六分阿膠炒八分香附醋炒六分白芍酒炒八分白朮去蘆八分黃連薑汁炒八分陳皮五分甘草一分上合一劑生薑三片棗一枚不拘時服一治婦人五十以上經脈暴行內經曰火主速不可以冷病治之如下峻藥即死止可用黃連解毒湯以清其上加棕灰蓮殼灰以澀其下然後用四物湯涼血和經可也一方治血崩用槐花一兩百草霜五錢為末每服二錢燒紅稱錘淬酒下一方治風熱血崩荊芥穗燈火燒焦為末每服三錢童便調服一方治血虛內熱血不歸元而崩桂心燒為末每一二錢米湯飲下一方治血崩枯礬為末麵糊為丸指頂大每一丸好酒下一方治血崩棕燒灰一撮好酒調空心一服立止一方治血崩用益智仁為末每服二錢以燒紅稱錘淬黃酒調服一方治血崩用精肉四兩百草霜二兩篩過蘸吃即止一方用干驢糞為粗末入壇內燒煙令崩婦坐其上煙燻久久自止一方用魚腥草銼一劑水煎服立止一方用雞子去黃一個入銀硃三錢和勻燒存性溫酒下一方蠶砂揀淨為末每服三錢空心溫酒下一方五靈脂燒黑為末每一錢溫酒調下又方半生半炒一方香附米炒黑為末每服三錢空心熱酒調服米飲亦可一婦人崩漏面色黃或赤時覺腰間臍下痛四肢困倦煩熱不安其經行先發寒熱兩脅束痛此脾胃虛損元氣下陷與相火濕熱下迫所致以益氣湯加防風白芍炒黃柏一女子漏下惡血月經不調或暴崩不已多下水漿之物或白帶脫漏不止皆因飲食不節勞倦所傷或素有心氣不足致令心火乘脾必怠惰嗜臥困倦乏力氣短氣急脾主滋榮周身者也脾胃虛而心胞乘之故漏下月水不調也況脾胃為血氣陰陽之根蒂乎當除濕去熱抑風氣上伸以勝其濕又云火鬱則發之以益氣湯去參朮陳皮加蒼朮藁本防風羌活蔓荊子一婦人經行太過血氣虛耗胃氣不足故經水妄行可以十全大補湯加香附去桂耆一婦人患崩過服寒涼之劑其症益甚更加肚腹痞悶飲食不入發熱煩躁脈洪大而虛此脾經氣血虛而發燥也急用八珍湯加炮姜以溫補之緩則不救不信乃服止血降火之劑虛症蜂起始信豫言緩不及治矣帶下婦人帶下六極之病脈浮則為腸鳴腹滿緊則為腹中痛數則為陰中癢痛則生瘡弦則陰戶掣痛帶下脈浮惡寒漏下者不治婦女下白而不甚稠者曰白淫與男子白濁同也系出於相火如龍雷之擾而不澄清故耳屬於足少陰太陽治當清補為主其下赤白稠黏者謂之帶下屬於心胞手厥陰少陽即若男子自遺之精甚至如砂石之淋原乎心胞繫於脊絡於帶脈通於任脈下抵湧泉上至泥丸王叔和云崩中日久為白帶漏下多時骨髓枯言之切矣治宜血肉之劑以培之此乃窮源探本之論百世不易之法時人皆泥於常套作濕痰以治又以牡蠣龍骨地榆膠艾之類澀之和以四物兼以提升殊不知根本損傷以致腐敗而來彼塞滯不消之物則益加其滯升提不正之氣則增劇其鬱噫或非醫者之過抑求治者之不賢也凡遇是病必以六龍固本丸十六味保元湯主之十六味保元湯黃耆一錢石斛七分巴戟肉二錢白茯苓一錢升麻七分圓眼肉三錢貫仲去根土三錢人參二錢山藥一錢川獨活一錢當歸身二錢蓮蕊一錢黃柏酒炒八分生甘草三分杜仲小茴鹽醋湯浸炒一錢五分骨碎補先以稻草火上烙去毛以粗布拭淨二錢上銼一劑水煎空心溫服潮熱加柴胡八分黃芩酒炒一錢帶甚者月經必少其有聚而反來者色紫適來適斷漓漓落落而不淨者加荊芥一錢黃連酒炒七分地榆八分若五心煩躁而口舌乾者加知母一錢麥門冬一錢地骨皮八分大便澀而燥者乃血少火燥陽明也四物湯加麻仁大黃等分研如泥半夜熱服之帶下久不能止服前藥不能奏效者宜六龍固本丸大效一論此藥能生血固真補心益腎帶不漏則經水自調月經調準則有孕男婦元氣充足産子少疾而有壽矣此方不特赤白帶下有效凡小産後虛者血出崩虛者五勞七情勞怯者一切不足之症並欲求嗣得孕婦女諸虛皆有殊效者也六龍固本丸懷山藥四兩巴戟肉四兩山茱萸肉四兩川楝子肉二兩黃耆一兩補骨脂二兩青鹽三錢煎湯拌半日搓去皮黃柏五錢酒煎拌骨脂炒小茴香一兩鹽二錢煎湯拌楝肉同炒乾人參二兩蓮肉二兩木瓜二兩當歸身二兩生地黃二兩白芍一兩川芎一兩上藥十四味用水三碗童便二鍾好酒一鍾拌浸一日烘又浸又烘乾上為細末用斑龍膠一料和丸如梧子大每服百丸空心淡鹽湯送下班龍膠方見補益人多難得子常用煉密為丸服之亦效一治婦人經水不調肚腹冷痛赤白帶下子宮虛冷久無子息先宜服五積散加香附吳茱萸小茴入米糖一塊煎服減麻黃後服此丸藥白鳳丹嫩黃耆蜜水炒人參去蘆川芎白茯苓去皮當歸酒洗乾薑炒大附子麵裹煨去皮臍小茴香鹽酒炒白芍酒炒肉桂白朮去蘆微炒胡椒艾葉醋炒破故紙鹽酒炒烏藥以上各二兩甘草炙一兩香附米醋炒六兩蒼朮米泔浸炒四兩吳茱萸炒一兩上銼片用白毛烏肉雞一隻重二斤吊死水泡去尾屎並頭足不用鐵鍋內將藥片蓋上入好酒煮爛為度取去骨同藥在鍋焙乾為末將雞酒汁打稀米糊為丸如梧子大每服五十丸空心好酒送下一治婦人赤白帶下宜補中益氣湯加黃柏知母香附半夏川萆薢川楝子肉姜煎先服此湯末後進丸藥歸附地黃丸當歸酒洗三兩川芎一兩白芍酒炒二兩熟地黃酒蒸一兩香附子童便浸炒二兩陳皮一兩半黃柏去皮童便浸三日曬乾一兩半知母去毛一兩半酒浸曬乾五味子一兩半蒼朮米泔浸炒二兩牡蠣煅五錢椿根皮酒炒二兩半一方有白葵花一方有山茱萸無五味酒蒸去核人虛加人參白朮上共為細末酒糊為丸如梧子大每服五十丸空心淡鹽湯下後用乾物壓之忌蔥白蘿蔔胡椒煎炒發熱之物一治婦人赤白帶下宜用溯源丹當歸酒洗熟地黃酒蒸蘄艾酒炒各二兩香附醋浸炒三兩川芎米泔制人參各一兩二錢白芍酒炒阿膠蛤粉炒白朮去蘆茅根各六錢椿根皮酒炒黃柏酒炒各一兩地榆七錢白茯苓去皮八錢白石脂七錢上為細末米醋糊為丸如梧子大每服五六十丸空心米湯送下一治婦人赤白帶下上熱下寒口出惡氣或咽乾或牙痛或耳鳴或遍身流注疼痛發熱憎寒或口吐酸水或心腹氣痛或下五色腥臭用清玉散當歸酒洗川芎生地黃牡丹皮陳皮黃連升麻甘草半夏薑製白茯苓赤芍蒼朮米泔浸香附黃芩柴胡去蘆上銼一劑生薑煎服一治婦人白帶其效如神心傳侄傳硫黃不拘多少將豆腐剮去中一塊入硫黃居中上仍用豆腐蓋住砂鍋底放稻草鋪之放豆腐於內上仍用草蓋入水煮一日頻頻添水豆腐煮黑為度取出硫黃研為末將白芍紙包水濕火煨切片為末各等分合一處和勻水打麵糊為丸如梧桐子大每早空心用五分好燒酒一鍾送下服五日後即愈如未愈每早服一錢服至五日全愈一治婦人白帶男子白濁下淋乾薑炮一兩百草霜二兩為末每服一錢溫酒調下一治婦人赤白帶下不論年月深久不瘥乾薑炒黑五錢白芍酒炒二兩上為細末每服一錢空心米飲調服又方白雞冠花搗末每服三錢空心酒調下赤帶用赤雞冠花又方用鹿角燒灰存性為末好酒調下空心服二匙又方雞子開頂入硫黃末三分濕紙裹煨嚼吃好燒酒下又方蒼朮米泔浸焙乾乾薑炮各等分為末每服三錢空心酒調下又方白芷四兩以石灰半斤淹三宿去灰炒焦為末清米飲空心調服又方硫黃五錢炒化胡椒四十九粒為末好酒調服又方硫黃五錢用烏梅肉三錢搗丸黃豆大每服五錢空心好酒送下又方蔓荊子炒焦為末空心米飲調服以能燥濕痰也亦可治心痛一治赤白帶下五倍子炒桃仁炒去皮尖上各等分為末每服二錢空心燒酒調服一治婦人久患白帶瘦削無力倦怠欲睡腰痠腿痛飲食無味面黃日晡煩熱小水淋漓用參朮香湯去桂加車前子地骨皮鹿角膠大獲全效一婦人帶下四肢無力蓋四肢者土也此脾胃虛弱濕痰下注以補中益氣湯兼婦脾湯二藥治之即愈一婦人年已六旬內熱口乾勞則頭暈吐痰帶下或用化痰行氣前症益甚飲食愈少肢體或麻木服祛風化痰肢體常麻手足或冷或熱日漸消削此症屬脾氣虛弱而不能生肺祛風之劑復損諸經也當滋化源以補中益氣湯加白茯苓半夏炮乾薑如聖丹白礬蛇床子各等分上為末醋糊為丸如彈子大胭脂為衣薄綿裹留綿線二尺許系藥丸深入玉戶中定坐半日熱極再換大抵此疾多因子宮不潔服藥難以取效一治婦人帶下腸有敗膿淋露不已腥穢難聞遂至臍腹更加冷痛此蓋敗膿所致卒無已期須以排膿乃已白芷一兩單葉紅葵根二兩白芍白礬各五錢另枯研研為末同以蠟丸梧子大空心飯前米飲下十丸或五十丸候膿盡仍用他藥補之五積散方見中寒補中益氣湯方見內傷十全大補湯方見補益歸脾湯方見婦人虛勞虛勞夫人之生以氣血為本人之病未有不先傷其氣血者世有室女童男積想在心思慮過當多致勞損男子則神色先散女子則月水先閉何以致此蓋憂愁思慮則傷心心傷則血逆竭血逆竭則神色先散而月水先閉也火既受病不能榮養其子故不嗜食脾既虛則金氣虧故發嗽嗽既作水氣絶故四肢干水氣不充故多怒發焦筋痿傳變五臟至此成勞最為難治或有以為血熱用涼藥解殊不知血得熱則行冷則凝凡經水少漸至不通手足骨肉煩疼漸至羸瘦漸生潮熱脈來微數此陰虛血熱陽往乘之水不能滅火火逼水涸當養陰血慎勿以藥通之一論治婦人以氣衰血旺為本心生血肝藏血今血衰而氣衰者由心氣虛耗又不能生血又不能制乎肺金使肺氣得以乘乎肝木肝至虧損則不能藏血漸至枯涸不榮經絡因至月信不調矣此藥專補心元之虛抑其肺金之盛調和榮衛滋養血脈其疾自愈兼治血氣過多虛勞發熱及吐血衄血咳嗽痰喘上壅胸膈不利虛勞熱嗽痰喘無汗者可用茯苓補心湯當歸酒洗川芎白芍酒炒懷熟地黃陳皮半夏湯泡切片薑汁炒白茯苓去皮桔梗去蘆枳殼去穰麩炒前胡去蘆各一錢乾葛紫蘇各七分人參木香各五分甘草三分上銼一劑生薑棗子煎服一論婦人諸虛百損五勞七傷經水不調肢體瘦弱此藥專治經水和血脈補虛勞扶元氣健脾胃養心肺潤咽喉清頭目定心慌安神魄除骨蒸退潮熱止喘嗽化痰涎收盜汗住泄瀉開鬱氣利胸膈療腹疼解煩渴散寒熱祛體痛大有奇效不能盡述濟陰至寶丹當歸酒洗白朮去蘆炒各八分白芍酒炒八分白茯苓去皮八分生知母去毛貝母去心香附童便炒地骨皮麥門冬去心陳皮各八分薄荷柴胡甘草各三分上銼一劑煨姜三片水煎溫服一論婦人脾經失血少寐發熱盜汗或憂思傷脾不能攝血以致妄行或健忘怔忡驚悸不寧或心脾傷痛嗜臥少食或憂思傷脾血虛發熱或肢體作痛大便不調或經候不準晡熱內熱或瘰癧流注不能消散潰斂宜用歸脾湯黃耆蜜水炒人參白朮去蘆炒白茯苓去皮當歸酒洗遠志甘草水泡去心酸棗仁炒龍眼肉各一錢木香甘草炙各五分上銼一劑薑棗煎服加味歸脾湯治瘀血已去或脾經失血小腹作痛無寐發熱盜汗或脾傷不能攝血或心脾傷痛嗜臥少食或憂思傷脾血虛發熱或肢體腫痛大便不調或經候不準晡熱內熱等症依前方加柴胡梔子是也一論婦人血虛勞倦五心煩熱肢體疼痛頭目昏沉心忪煩躁口燥咽乾發熱盜汗減食嗜臥及血熱相搏月水不調臍腹脹痛寒熱如瘧又治室女血弱陰虛榮衛不和痰涎潮熱肢體羸瘦以致骨蒸勞熱宜逍遙散當歸白朮去皮炒白芍酒炒白茯苓去皮柴胡甘草炙各一錢上銼煨姜一塊入薄荷少許水煎溫服加牡丹皮山梔仁炒名加味逍遙散一論婦人血虛勞倦五心煩熱或發熱齒痛日晡益甚月水不調此脾血虛加升麻愈後因怒復痛以前方加川芎一論婦人虛勞血氣脾胃虛損之極發熱痰嗽喘急之甚相火妄動肌肉消削四肢沉困夜出盜汗精神短少或大便稀溏或腹中積塊或瘧母癥瘕面黃肌瘦百藥罔效宜五仙散嫩黃耆蜜水炒揀參去蘆白朮去蘆炒當歸酒洗各二錢甘草炙一錢上銼一劑龍眼五個蓮肉七個水煎溫服有熱加地骨皮知母嗽加五味子桑白皮痰加貝母半夏渴加五味子麥門冬吐血加生地黃犀角玄參茅根汁血虛加熟地黃白芍藥一論婦人氣血兩虛五心虛熱或白帶頻頻注下先賢有云婦人性悍且少有不如意處心中躁急咸池之火上灼五心如烈炭是也宜十珍飲子淮山藥一錢半杜仲鹽炒一錢人參一錢白朮去蘆一錢懷生地黃一錢白茯苓去皮木七分當歸一錢川芎七分白芍酒炒一錢甘草三分上銼棗二枚燈心七莖水煎空心服一治肝膽經症寒熱往來晡熱潮熱身熱默默不欲食或怒火口苦耳聾咳嗽發熱或脅痛腳滿轉側不便兩脅痞悶或瀉利或嘔吐酸水宜小柴胡湯柴胡二錢黃芩一錢半人參七分半夏一錢甘草六分上銼一劑薑棗煎服加味小柴胡湯肝膽經風熱耳前後腫痛或結核焮痛或寒熱晡熱或經候不調等症即小柴胡湯加山梔子牡丹皮一論腎虛發熱作渴吐痰小便淋漓頭暈眼花咽燥唇裂齒不堅固腰腿痠軟自汗盜汗便血諸血失音水泛為痰之聖藥血虛發熱之神劑六味丸懷生地自制八兩用酒蒸至黑山茱萸酒蒸去核乾山藥各四兩牡丹皮白茯苓去皮澤瀉各三兩上為末煉蜜為丸如梧子大每服三錢空心白滾水下一論婦人經水不調或不通虛勞吐血衄血咳血便血發熱咳嗽痰喘盜汗心慌一切虛損勞怯骨蒸危篤等症並皆治之此方作湯服亦可滋陰地黃丸懷熟地黃薑汁浸焙乾四兩淮山藥二兩山茱萸酒蒸去核二兩白茯苓去皮牡丹皮澤瀉去皮各三兩半天門冬去心麥門冬去心生地黃酒洗知母去毛酒炒貝母去心當歸酒洗白芍酒炒香附米童便浸炒各一兩上為細末煉蜜為丸如梧桐子大每服百丸空心淡鹽湯送下吐痰薑湯送下一論婦女五勞七傷骨蒸五心煩熱心虛驚怕經水來時或前或後或淡白或紫色時常注帶下或因煩勞性氣惱怒産後失調致赤白帶滲及夜臥身體上下疼痛及午後神疲腰腿痠軟或心嘈又時飽悶及夢寐不清或衝任二脈結癥瘕隱隱久服大有功效白鳳丹真正白絲毛烏骨雄雞一隻先以黃耆末一兩當歸末一兩甘草末五錢三味和米粉七合勻作七分調成小塊雞食之約有六七日吊死不出血去毛腸不用當歸身酒洗三兩川芎二兩白芍酒炒三兩懷生地黃酒洗五兩山藥三兩鹿角霜四兩天門冬去心一兩人參二兩丹參水洗淨二兩山茱萸酒蒸去核二兩木瓜一兩半胡黃連一兩知母去毛酒炒三兩小茴酒炒二兩麥門冬去心一兩懷牛膝去蘆酒洗二兩秦艽去蘆二兩銀柴胡二兩鱉甲醋炙一兩生甘草一兩上俱制如法銼勻將雞切作小塊俱盛於瓷壇內用水二分好酒二分米醋一分壇口用柿漆紙封固放大鍋內桑柴火煮三晝夜取出日曬夜烘俟干又入汁拌又烘曬以汁盡為度為極細末煉蜜和杵千餘下丸如梧桐子大每服百丸空心淡鹽湯送下一婦人為哭母吐血咳嗽發熱盜汗經水不行此悲傷肺以補中益氣湯加桔梗貝母知母多服歸脾湯送下六味丸一婦人熱來復去晝見夜伏不時而動或無定處而作口舌生瘡者若從腳起乃無根之火也以十全大補湯加麥門冬五味子一婦人患勞嗽不時發熱或時寒熱或用清熱之藥其熱益甚盜汗口乾兩足如炙遍身皆熱昏憒如醉良久熱止方醒或晡熱至旦方止此乃陰血虛而陽氣弱也朝用六味丸料夕用十全大補湯月餘諸症稍愈更兼以補中益氣湯兩月餘而愈求嗣一論凡婦人無子多因七情所傷致使血衰氣盛經水不調或前或後或多或少或淡色如水或紫色如塊或崩漏帶下或肚腹疼痛或子宮虛冷不能受孕宜進此藥而效可通神調經種玉湯少參姚範川傳當歸身酒洗四錢川芎四錢白芍酒炒三錢熟地黃酒蒸六錢白茯苓去皮三錢陳皮三錢香附米炒四錢吳茱萸炒四錢元胡索三錢牡丹皮三錢若先行三五日色紫者血虛有熱也加條芩三錢若過期經水色淡者血虛有寒也加官桂乾薑炒艾葉醋炒各三錢上銼作四劑每一劑加生薑三片水一碗半煎至一碗空心溫服渣再煎臨臥服待經至之日上服起一日服一劑藥盡經止則當交媾即成孕矣若未成孕經當對期俟經來再服四劑必孕無疑矣一論此方常服順氣養血調經脈益子宮療腹痛除帶下種子屢效不可盡述種子濟陰丹香附米四兩一兩醋浸一兩米泔浸一兩酒浸一兩童便浸各浸三日烘乾為末益母草二兩以上二味忌鐵器真阿膠蛤粉炒成珠二兩艾葉醋浸炒一兩當歸酒洗一兩五錢白芍酒炒一兩二錢生熟地黃薑汁炒二兩川芎一兩陳皮法制一兩半夏