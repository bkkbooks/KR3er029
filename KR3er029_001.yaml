神殺人如劍不可輕用蜜水炒巴豆辛熱除胃寒積破癥消痰大能通痢一名江子一名巴椒反牽牛去角看症制用夜明砂糞能下死胎小兒無辜瘰癧堪裁一名伏翼糞一名蝙蝠屎斑蝥有毒破血通經諸瘡瘰癧水道能行去頭翅足米炒熟用蠶砂性溫濕痹癮疹癱風腸鳴消渴可飲胡黃連苦治勞骨蒸小兒疳痢盜汗虛驚折斷一線煙出者佳忌豬肉使君甘溫消疳消濁瀉痢諸蟲總能除卻微火煨去殼取仁赤石脂溫保固腸胃潰瘍生肌澀精瀉痢色赤黏舌為良火煅醋淬研碎青黛鹹寒能平肝木驚癇疳痢兼除熱毒即靛花阿膠甘溫止咳膿血吐血胎崩虛羸可啜要阿井者佳蛤粉炒成珠白礬味酸化痰解毒治症多能難以盡述火煅過名枯礬五倍苦酸療齒疳䘌痔癰瘡膿兼除風熱一名文蛤一名百蟲倉百藥煎即此造成玄明粉辛能蠲宿垢化積消痰諸熱可療用朴硝以蘿蔔同制過者是通草味甘善治膀胱消癰散腫能治乳房枸杞甘溫添精補髓明目祛風陰興陽起紫熟味甘膏潤者佳去枝蒂黃精味甘能安臟腑五勞七傷此藥大補與鉤吻略同切勿誤用洗淨九蒸九曬何首烏甘種子添精黑髮悅顏補血養陰赤白兼用泔浸過一宿搗碎五味酸溫生津止渴久嗽虛勞金水枯竭風寒咳嗽用南虛損勞傷用北去梗山茱性溫澀精益髓腎虛耳鳴腰膝痛止酒蒸去核取肉其核勿用為要恐其滑精難治石斛味甘卻驚定志壯骨補虛善驅冷痹去根如金色者佳破故紙溫腰膝痠痛興陽固精鹽酒炒用一名補骨脂鹽酒洗炒薯蕷甘溫理脾止瀉益腎補中諸虛可治一名山藥一名山芋懷慶者佳蓯蓉味甘峻補精血若驟用之更動便滑酒洗去鱗用除心內膜筋菟絲甘平夢遺滑精腰痛膝冷添髓壯筋水洗淨熱酒砂罐煨爛搗碎曬乾合藥同麝末為丸不堪作湯牛膝味苦除濕痹痿腰膝痠疼小便淋瀝懷慶者佳去蘆酒洗巴戟辛甘大補虛損精滑夢遺強筋固本肉厚連珠者佳酒浸過宿治去骨曬乾俗名二蔓草仙茅味辛腰足攣痹虛損勞傷陽道興起牡蠣微寒澀精止汗帶崩脅痛老痰祛散左顧大者佳火煅紅研楝子苦寒膀胱疝氣中濕傷寒利水之劑即金鈴子酒浸蒸去皮核萆薢甘苦風寒濕痹腰背冷痛添精益氣白者為佳酒浸切片寄生甘苦腰痛頑麻續筋堅骨風濕尤佳要桑寄生續斷味辛接骨續筋跌撲折損且固遺精酒洗切片如雞腳者佳龍骨味甘夢遺精泄崩帶腸癰驚癇風熱火煅人之頭髮補陰甚捷吐衄血暈風驚癇熱一名血餘天靈蓋咸傳屍勞瘵溫瘧血崩投之立瘥即人腦蓋是也燒灰存性雀卵氣溫善扶陽痿可致堅強當能固閉鹿茸甘溫益氣滋陰泄精尿血崩帶堪任燎去毛或酒或酥炙令脆鹿角膠溫吐衄虛羸跌撲傷損崩帶安胎膃肭臍熱補益元陽驅邪辟毒痃癖勞傷酒浸微炙令香紫河車甘療諸虛損勞瘵骨蒸滋培根本一名混沌皮一名混元衣即胞衣也長流水洗淨或新瓦烘乾或用甑蒸爛忌鐵器楓香味辛外科要藥瘙瘡癮疹齒痛亦可一名白樛香檀香味辛升胃進食霍亂腹痛中惡邪氣安息香辛辟邪驅惡逐鬼消蠱鬼胎能落黑黃色蘇合香甘誅惡殺鬼蠱毒癇痓夢魘能起熊膽味苦熱蒸黃疸惡瘡蟲痔五疳驚癇硇砂有毒潰癰爛肉除翳生肌破癥消毒水飛去土石生用敗肉火煅可用硼砂味辛療喉腫痛膈上熱痰噙化立中大塊光瑩者佳硃砂味甘鎮心養神祛邪治癇定魄安魂生餌無害煉服即能殺人硫黃性熱掃除疥瘡壯陽逐冷寒邪敢當龍腦味辛目痛頭痹狂躁妄語真為良劑即冰片蘆薈氣寒殺蟲消疳癲癇驚搐服之即安俗名象膽天竺黃甘急慢驚風鎮心解熱驅邪有功出天竺國麝香辛溫善通關竅活血安驚解毒極妙不見火乳香辛苦療諸惡瘡生肌止痛心腹尤良去砂石用燈心同研沒藥溫平治瘡止痛跌打損傷破血通用阿魏性溫除癥破結卻邪殺蟲傳屍可滅水銀性寒治疥殺蟲斷絕胎孕催生立通輕粉性燥外科要藥楊梅諸毒殺蟲可托靈砂性溫能通血脈殺鬼辟邪安魂定魄系水銀硫黃水火煉成形者砒霜大毒風痰可吐截瘧除哮能消沉痼一名人言一名信所畏綠豆冷水米醋姜肉誤中毒服其中一味即解雄黃甘辛辟邪解毒更治蛇虺喉風瘜肉珍珠氣寒鎮驚除癇開聾磨翳止渴墜痰未鑽者研如粉牛黃味苦大治風痰定魄安魂驚癇靈丹琥珀味甘安魂定魄破瘀消癥利水通澀拾起草芥者佳血竭味鹹跌撲傷損惡毒瘡癰破血有準一名麒麟竭敲斷有鏡臉光者是石鐘乳甘氣乃剽悍益氣固精明目延壽陽起石甘腎氣之絕陰痿不起其效甚捷火煅酒淬七次再酒煮半日研細桑椹子甘解金石燥清除熱渴染髮須皓蒲公英苦潰堅消腫結核能除食毒可用一名黃花地丁草石葦味苦通利膀胱遺尿或淋發背瘡瘍萹蓄味苦疥瘙疽痔小兒蛔蟲女人陰蝕赤箭味苦原號定風殺蠱解毒除疝療癰即天麻苗也雞內金寒溺遺精泄禁痢漏崩更除煩熱鰻𩼽魚甘勞瘵殺蟲痔漏瘡疹崩疾有功螃蟹味鹹散血解結益氣養筋除胸煩熱馬肉味辛堪強腰脊自死老死並棄勿食懷孕痢疾生瘡者禁食白鴿肉平解諸藥毒能除疥瘡味勝豬肉兔肉味辛補中益氣止渴健脾孕婦勿食秋冬宜啖春夏忌食牛肉屬土補脾胃弱乳養虛羸善滋血涸豬肉味甘量食補虛動風痰物多食虛肥羊肉味甘專補虛羸開胃補腎不致陽痿雄雞味甘動風助火補虛溫中血漏亦可有風人並患骨蒸者俱不宜食鴨肉散寒補虛勞怯消水腫脹退驚癇熱鯉魚味甘消水腫滿下氣安胎其功不緩鯽魚味甘和中補虛理胃進食腸澼瀉利驢肉微寒安心解煩能發痼疾以動風淫鱔魚味甘益智補中能去狐臭善散濕風血塗口眼喎斜左患塗右右患塗左也白鵝肉甘大補臟腑最發瘡毒痼疾勿與犬肉性溫益氣壯陽炙食作渴陰虛禁嘗不可與蒜同食頗損人鱉肉性冷涼血補陰癥瘕勿食孕婦勿侵合雞子或莧菜食不宜並忌多食芡實味甘能益精氣腰膝痠疼皆主濕痹一名雞頭去殼取仁石蓮子苦療噤口痢白濁遺精清心良劑藕味甘甜解酒清熱消煩逐瘀止吐衄血龍眼味甘歸脾益智健忘怔忡聰明廣記蓮鬚味甘益腎烏須澀精固髓悅顏補虛柿子氣寒能潤心肺止渴化痰澀腸止痢石榴皮酸能禁精漏止痢澀腸染須尤妙陳倉穀米調和脾胃解渴除煩能止瀉痢愈陳愈佳黏米陳粟米同萊菔子辛喘咳下氣倒壁沖牆脹滿消去即蘿蔔子也芥菜味辛除邪通鼻能利九竅多食通氣漿水味酸酷熱當茶除煩消食瀉痢堪誇砂糖味甘潤肺和中多食損齒濕熱生蟲飴糖味甘和脾潤肺止渴消痰中滿休食麻油性冷善解諸毒百病能除功難悉述白果甘苦喘嗽白濁點茶壓酒不可多嚼一名銀杏胡桃肉甘補腎黑髮多食生痰動氣之物梨味甘酸解酒除渴止嗽消痰善驅煩熱勿多食令人寒中作瀉產婦金瘡屬血虛切忌榧實味甘主療五痔蠱毒三蟲不可多食竹茹止嘔能除寒熱胃熱咳噦不寐安歇竹葉味甘退熱安眠化痰定喘止渴消煩味淡者佳竹瀝味甘陰虛痰火汗熱渴煩效如開鎖截尺余直劈數片兩磚架起火烘兩頭流瀝每瀝一盞薑汁二匙萊菔根甘下氣消穀痰癖咳嗽兼解面毒俗云蘿蔔燈草味甘能利小水癃閉成淋濕腫為最艾葉溫平除濕散寒漏血安胎心痛即愈宜陳久者佳揉爛醋浸炒之綠豆氣寒能解百毒止渴除煩諸熱可服川椒辛熱祛邪逐寒明目殺蟲溫而不猛去目微炒胡椒味辛心腹冷痛下氣溫中跌撲堪用石蜜甘平入藥煉熟益氣補中潤燥解毒馬齒莧寒青盲白翳利便殺蟲癥癰咸治蔥白辛溫發表出汗傷寒頭疼腫痛皆散忌與蜜同食胡荽味辛上止頭疼內消穀食痘疹發生韭味辛溫祛除胃熱汁清血瘀子醫夢泄大蒜辛溫化肉消穀解毒散癰多用傷目食鹽味鹹能吐中痰心腹卒痛過多損顏茶茗性苦熱渴能濟上清頭目下消食氣酒通血脈消愁遣興少飲壯神過多損命用無灰酒凡煎藥入酒藥熱方入醋消腫毒積瘕可去產後金瘡血暈皆治一名苦酒用味酸者白梅味酸除煩解渴霍瘧下痢止嗽勞熱去核用淡豆豉寒能除懊憹傷寒頭痛兼理瘴氣用江西淡豉黑豆造者蓮子味甘健脾理胃止瀉澀精清心養氣食不去心恐成卒暴霍亂大棗味甘調和百藥益氣養脾中滿休嚼人乳味甘補陰益陽悅顏明目羸劣仙方要壯盛婦人香濃者佳病婦勿用童便味涼打撲瘀血虛勞骨蒸熱嗽尤捷一名回陽湯一名輪迴酒一名還元湯要七八歲兒清白者佳赤黃者不可用生薑性溫通暢神明痰嗽嘔吐開胃極靈去皮即熱留皮即冷藥共四百精製不同生熟新久炮煅炙烘湯丸膏散各起疲癃合宜而用乃是良工
