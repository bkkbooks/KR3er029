body:
  text: 卷一醫說大哉醫乎其來遠矣肇自開闢厥初生民有壽夭則有札瘥有札瘥則有醫藥故神農嘗百草黃帝注內經伊尹作湯液雷公制炮炙與夫著書立言垂世者若內經其言深而要其旨邃以宏其考辯信而有徵實為醫家之祖下此則秦越人和緩者緩獨能知晉侯之膏肓而未有著述惟越人所著八十一難經則皆發明內經之旨又下此則淳于意華佗佗之熊經鴟顧固亦導引家之一術至於刳腹背湔腸胃而去疾則誠精於技矣意之醫狀司馬遷備志之又下此則張機之金匱玉函經及傷寒諸論誠千古不刊之妙典第詳於六氣之所傷而於嗜欲飲食疲勞之所致者略而不議又下此則王叔和篡岐伯華佗等書為脈經敘陰陽內外辨三部九候分人迎氣口條陳十二經絡洎夫三焦五臟六腑之病最為著明又下此則巢元方病源候論似不為無所見者但論風寒而不著濕熱之篇乃其失也又下此則王冰推五運六氣之變撰為天元玉策周詳切密亦人之所難苟泥之則局滯而不通矣又下此則孫思邈王燾思邈以絕人之識操慈仁惻隱之心其敘千金方翼及粗工害人之禍至為憤切後人稍闖其藩垣亦足以其術鳴但不制傷寒之書或不能無遺憾也燾雖闡明外臺秘要所言症治方藥灼灸之詳頗有所祖述然謂針能殺生人不能起死人者則一偏之見也又下此則錢乙龐安時許叔微叔微具在準繩尺寸之中而無所發明安時雖能出奇應變而終未離於範圍二人皆得張機之粗者也惟乙深造機之閫奧而擷其精華建五臟之方各隨所宜謂肝有相火則有瀉而無補腎為真水則有補而無瀉皆啟內經之秘尤知者之所取法奈世知乙之淺其遺書散亡由於閻孝忠所集居多孝忠之意初非乙之本真也又下此則上谷張元素河間劉完素睢水張從政元素之與完素雖設為奇夢異人以神其授受實聞乙之風而興起者焉若從政則又宗乎完素者也元素以古方今病決不能相值治病一切不以方故其書亦不傳其有存於今者皆後來之所附會其學則東垣李杲深得之杲推明內外二傷而多注意於補脾土之設蓋以土為一身之主土平則諸臟平矣從政以汗吐下三法風寒暑濕燥火六門為醫之關鍵其治多攻利不善學者殺人完素論風火之病本內經論病機氣宜一十九條著為原病式闡奧探微有非大觀官局諸醫所可彷彿究其設施則不越攻補二者之間也近代名醫若吳中羅益滄州呂復皆承東垣之餘緒武林羅知悌丹溪朱彥修各挹完素之流風又若臺之朱佐越之滑壽慈溪王節齋餘杭陶節庵吳郡薛立齋咸有著述未易枚舉嗟夫自內經以來醫書汗牛充棟不為不多蓋醫之有內經猶儒道之六經無所不備後賢著述若仲景東垣河間丹溪四子之說可謂醫書之全備猶學庸論孟為六經之階梯不可缺者也故曰外感法仲景內傷法東垣熱病用河間雜病用丹溪然素問論病之因本草著藥之性脈訣詳症之原運氣法天之候一以貫之於內經斯醫道之大成乃千古不易之定論實為萬世之師法矣五臟六腑脈病虛實凡十一條肝臟脈病虛實肝象木旺於春其脈弦其神魂其候目其華在爪其充在筋其聲呼其臭臊其味酸其液泣其色青其藏血足厥陰其經也與膽合膽為腑主表肝為臟主裡肝氣盛為血有餘則病目赤兩脅下痛引小腹善怒氣逆則頭眩耳聾不聰頰腫是肝氣之實也則宜瀉之肝氣不足則病目不明兩脅拘急筋攣不得太息爪甲枯面青善悲恐如人將捕之是肝氣之虛也則宜補之於四時病在肝愈於夏夏不愈甚於秋秋不死持於冬起於春於日愈在丙丁丙丁不愈加於庚辛庚辛不死持於壬癸起於甲乙於時平旦慧下晡甚夜半靜禁當風肝部左手關上是也關部脈來綽綽如按琴瑟之弦如揭長竿春以胃氣為本春肝木旺其脈弦細而長是平脈也反得微澀而短者是肺之乘肝金之剋木謂之賊也大逆不治反得浮大而洪者是心乘肝子之乘母為實邪雖病當愈反得沉濡而滑者是腎乘肝母之克子為虛邪雖病當愈反得緩而大者是脾之乘肝為土之凌木為微邪雖病不死肝脈來盈實而滑如循長竿曰平病肝脈來急益勁如新張弓弦曰肝死真肝脈至中外急如循刀刃責責然如新張弓弦色青白不澤毛折乃死心臟脈病虛實心象火旺於夏其脈如鉤而洪大其候舌其聲言其臭焦其味苦其液汗其養血其色赤其藏神手少陰其經也與小腸合小腸為腑主表心為臟主裡心氣盛為神有餘則病胸內痛脅支滿脅下痛背膊間痛兩臂內痛喜笑不休是心氣之實也則宜瀉之心氣不足則胸腹大脅下與腰背相引痛驚悸恍惚少顏色舌本強善憂悲是心氣之虛也則宜補之於四時病在心愈於長夏長夏不已甚於冬冬不死持於春起於夏於日愈於戊己戊己不已加於壬癸壬癸不死持於甲乙起於丙丁於時日中慧夜半甚平旦靜禁溫衣熱食心部在左手寸口是也寸口脈來累累如連珠如循琅玕曰平夏以胃氣為本夏心火旺其脈浮洪大而散名曰平脈也反得沉濡而滑者腎之乘心水之剋火大逆不治反得弦而長是肝乘心母之克子雖病當愈反得緩而大是脾乘心子之乘母雖病當愈反得微澀而短是肺之乘心金之凌火為微邪雖病不死病心脈來喘喘連屬其中微曲曰心病死心脈前曲後倨如操帶鉤曰心死真心脈至牢而搏如循薏苡累累然其色赤黑不澤毛折乃死脾臟脈病虛實脾象土旺於長夏其脈緩其候口其聲歌其臭香其味甘其液涎其養形肉其色黃其藏意足太陰其經也與胃合胃為腑主表脾為臟主裡脾氣盛為形有餘則病腹脹溲不利身重苦飢足痿不收胻善瘛腳下痛是為脾氣之實也則宜瀉之脾氣不足則四肢不用後泄食不化嘔逆腹脹腸鳴是為脾氣之虛也則宜補之於四時病在脾愈在秋秋不愈甚於春春不死持於夏起於長夏於日愈於庚辛庚辛不愈加於甲乙甲乙不死持於丙丁起於戊己於時日中慧平旦甚下晡靜脾欲緩急食甘以緩之用苦以泄之甘以補之禁溫食飽食濕地濡衣脾部右手關上是也六月脾土旺其脈大阿阿而緩名曰平脈也長夏以胃氣為本反得弦而急是肝之乘脾木之剋土為大逆不治反得微澀而短是肺之乘脾子之乘母不治自愈反得浮而洪者是心之乘脾母之歸子當瘥不死反得沉濡而滑者是腎之克脾水之凌土為微邪當瘥脾長而弱來疏去數再至曰平三至曰離經四至曰奪精五至曰命盡六至曰死病脾脈來實而盛數如雞舉足曰脾病死脾脈來堅銳如鳥之啄如鳥之距如屋之漏如水之溜曰脾絕真脾脈至弱而乍數乍疏其色不澤毛折乃死肺臟脈病虛實肺象金旺於秋其脈如毛而浮其候鼻其聲哭其臭腥其味辛其液涕其養皮毛其藏氣其色白其神魄手太陰其經也與大腸合大腸為腑主表肺為臟主裡肺氣盛為氣有餘則病喘咳上氣肩背痛汗出尻陰股膝腨脛足皆痛是為肺氣之實也則宜瀉之肺氣不足則少氣不能報息耳聾嗌乾是為肺氣之虛也則宜補之於四時病在肺愈在冬冬不愈甚在夏夏不死持於長夏起於秋於日愈在壬癸壬癸不愈加於丙丁丙丁不死持於戊己起於庚辛禁寒衣寒飲食於時下晡慧夜半靜日中甚肺欲收急食酸以收之以辛泄之肺部在右手關前寸口是也平肺脈微短澀而如毛秋以胃氣為本病肺脈來上下如循雞羽曰病肺病其色白身體但寒無熱時時欲咳其脈微遲為可治秋金肺旺其脈浮澀而短是曰平脈也反得浮大而洪者是心之乘肺火之剋金為大逆不治反得沉濡而滑者是腎之乘肺子之乘母也不治自愈反得緩大而長阿阿者是脾之乘肺母之歸子雖病當愈反得弦而長者是肝之乘肺木之凌金為微邪雖病當愈肺脈來泛泛而輕如微風吹鳥背上毛再至曰平三至曰離經四至曰奪精五至曰死六至曰命盡肺脈來如物之浮如風吹毛曰肺死秋胃微毛曰平胃氣少毛多曰肺病但如毛無胃氣曰死毛有弦曰春病弦甚曰今病真肺脈至大而虛如毛羽中人膚然其色青白不澤毛折乃死腎臟脈病虛實腎象水旺於冬其脈如石而沉其候耳其聲呻其臭腐其味鹹其液唾其養骨其色黑其神志足少陰其經也與膀胱合膀胱為腑主表腎為臟主裡腎氣盛為志有餘則病腹脹飧泄體腫喘咳汗出憎風面目黑小便黃是腎氣之實也則宜瀉之腎氣不足則厥腰背冷胸內痛耳鳴苦聾是為腎氣之虛也則宜補之腎病者腹大體腫喘咳汗出憎風虛則胸中痛於四時病在腎愈在春春不愈甚於長夏長夏不死持於秋起於冬於日愈於甲乙甲乙不愈甚於戊己戊己不死持於庚辛起於壬癸無犯塵垢無衣炙衣於時夜半慧日中甚下晡靜腎欲堅急食苦以堅之咸以泄之苦以補之腎部在左手關後尺中是也腎脈來如引葛按之益堅曰腎病腎屬水其脈大緊身無痛形不瘦不能食善驚悸以心萎者死冬腎水旺其脈沉濡而滑名曰平脈也反得浮大而緩者是脾之乘腎土之剋水為大逆不治反得浮澀而短者是肺乘腎母之歸子為虛邪雖病可治反得弦細而長者是肝之乘腎子之乘母為實邪雖病自愈反得浮大而洪者是心之乘腎火之淩水雖病不死死腎脈來發如奪索辟辟如彈石曰腎死冬胃微石曰平胃少石多曰腎病但石無胃氣死石而有鉤曰夏病鉤甚曰今病藏真下於腎藏骨髓之氣真腎脈至搏而絕如彈石辟辟然其色黃黑不澤毛折乃死諸真臟脈見者皆不治膽經虛實病候膽象木旺於春足少陽其經也肝之腑也謀慮出焉諸腑臟皆取決斷於膽其氣盛為有餘則病腹內冒冒不安身軀習習是為膽氣之實也則宜瀉之膽氣不足其氣上嗌而口苦善太息嘔宿汁心下淡淡如人將捕之嗌中介介數睡是為膽氣之虛也則宜補之小腸虛實病候小腸象火旺於夏手太陽其經也心之腑也水液之下行為溲便者流於小腸其氣盛為有餘則病小腸熱焦竭乾澀小腹䐜脹是為小腸之氣實也則宜瀉之小腸不足則寒氣客之腸病驚跳不言乍來乍去是為小腸氣之虛也則宜補之胃經虛實病候胃象土旺於長夏足陽明其經也脾之腑也為水穀之海諸臟腑皆受水穀之氣於胃氣盛有餘則病腹䐜脹氣滿是為胃氣之實也則宜瀉之胃氣不足則飢而不受水穀飧泄嘔逆是為胃氣之虛也則宜補之胃脈實則脹虛則泄關脈滑胃內有寒脈滑為實氣滿不欲食關脈浮積熱在胃內大腸虛實病候大腸象金旺於秋手陽明其經也肺之腑也為傳導之官變化糟粕出焉氣盛為有餘則病腸內切痛如錐刀刺無休息腰背寒痹攣急是為大腸氣之實也則宜瀉之大腸氣不足則寒氣客之善泄是大腸之氣虛也則宜補之診其右手寸口脈手陽明經也脈浮則為陽陽實者大腸實也苦腸切痛如錐刺無休息時膀胱經虛實病候膀胱象水旺於冬足太陽其經也腎之腑也五穀五味之津液悉歸於膀胱氣化分入血脈以成骨髓也而津液之餘者入胞則為小便其氣盛為有餘則病熱胞澀小便不通小腹偏腫痛是為膀胱氣之實也則宜瀉之膀胱氣不足則寒氣客之胞滑小便數而多也面色黑是膀胱之氣虛也則宜補之三焦虛實病候三焦者上焦中焦下焦是也上焦之氣出於胃上口並咽以貫鬲布胸內走腋循太陰之分而行上至舌下至足陽明常與營衛俱行主納而不出也中焦之氣亦並於胃口出上焦之後此受氣者泌糟粕承津液化為精微上注於肺脈乃化而為血主不上不下也下焦之氣別迴腸注於膀胱而滲入焉主出而不納故水穀常並居於胃成糟粕而俱下於大腸也謂此三氣焦乾水穀分別清濁故名三焦三焦為水穀之道路氣之所終始也三焦氣盛為有餘則脹氣滿於皮膚內輕輕然而不牢或小便澀或大便難是為三焦之實也則宜瀉之三焦之氣不足則寒氣客之病遺尿或瀉利或胸滿或食不消是三焦之氣虛也則宜補之診其寸口脈遲上焦有寒尺脈遲下焦有寒尺脈浮者客陽在下焦五臟補瀉主治例肝虛者陳皮生薑之類補之虛則補其母腎者肝之母也以熟地黃柏補之如無他症六味地黃丸主之實則白芍瀉之如無他症瀉青丸主之實則瀉其子以甘草瀉心湯主之心者肝之子也心虛者炒鹽補之虛則補其母肝者心之母生薑補之如無他症以安神丸主之實則甘草瀉之如無他症重則瀉心湯輕則導赤散主之脾虛者甘草大棗之類補之虛則補其母心乃脾之母以炒鹽補之實則瀉其子肺乃脾之子以桑白皮主之又云實則黃連枳實瀉之如無他症益黃散主之肺虛者五味子補之實則桑白皮瀉之如無他症阿膠散虛則補其母脾乃肺之母以甘草大棗補脾實則瀉其子腎乃肺之子以澤瀉瀉腎腎虛者熟地黃柏補之腎無實不可瀉錢仲陽止有補腎地黃丸無瀉腎藥虛則補其母肺乃腎之母以五味子補肺十二經絡徑而直者為經支而橫者為絡手太陰之脈起於中焦下絡大腸還循胃口上鬲屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上循魚際出大指之端其支者從腕後直出次指內廉出其端次注手陽明手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下鬲屬大腸其支者從缺盆上頸貫頰下入下齒中還出挾口交人中左之右右之左上挾鼻孔次注足陽明足陽明之脈起於鼻交頞中旁約太陽之脈下循鼻外入上齒中還出挾口循唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下鬲屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中指內間其支者下廉三寸而別下入中指外間其支者別跗上入大指間出其端次注足太陰足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上腨內循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上鬲挾咽連舌本散舌下其支者復從胃別上鬲注心中次注手少陰手少陰之脈起於心中出屬心系下鬲絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下下循臑內後廉行太陰心主之後下肘內循臂內後廉抵掌後銳骨之端入掌內後廉循小指之內出其端次注手太陽手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下鬲抵胃屬小腸其支者從缺盆循頸上頰至目銳眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴次注足太陽足太陽之脈起於目內眥上額交顛其支者從顛至耳上角其直者從顛入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從膊內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫腨內出外踝之後循京骨至小指外側次注足少陰足少陰之脈起於小指之下斜趨足心出於然谷之下循內踝之後別入跟中以上腨內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝鬲入肺中循喉嚨挾舌本其支者從肺出絡心注胸中次注手厥陰手厥陰之脈起於胸中出屬心包絡下鬲歷絡三焦其支者從胸出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中循臂內入掌中循中指出其端其支者從掌中循小指次指出其端次主手少陽手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩交出足少陽之後入缺盆布膻中散絡心包下鬲循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰抵䪼其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥次注足少陽足少陽之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者別銳眥下大迎合於手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫鬲絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上入小指次指之間其支者別跗上入大指之間循大指歧骨內出其端還貫爪甲出三毛次注足厥陰足厥陰之脈起於大指叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫鬲布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於顛其支者從目系下頰裡環唇內其支者復從肝別貫鬲上注肺次注手太陰奇經八脈督脈者起於下極之腧並於脊裡上至風府入屬於腦任脈者起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目絡舌衝脈者起於氣街並足陽明之經挾臍上行至胸中而散帶脈者起於季脅回身一周陽蹺脈者起於跟中循外踝上行入風池陰蹺脈者起於跟中循內踝上行至咽喉交貫衝脈陽維起於諸陽之會陰維起於諸陰之交診脈皇極經云人之四肢各有脈也一脈三部一部三候以應天數也一脈三部寸關尺也一部三候浮中沉也所以應之九數也愚謂脈之理亦微矣人有四時之正脈有平生之常脈有內傷之變脈有外感之邪脈有重陰之脈有重陽之脈有陽虛而陰乘之脈有陰虛而陽乘之脈有陽極而陰生之脈有陰極而陽生之脈有獨見之脈有兼見之脈有初病之脈有久病之脈有可治之脈有不治之脈其左右上下表里之間有餘不足惟在乎分別陰陽能分別陰陽斯可以識脈之體劉復真曰昔王叔和以七表八里脈決人之生死然又文理浩繁今撮其樞要以浮沉遲數四脈為宗知風氣冷熱主病且浮而有力者為風浮而無力為虛沉而有力為積沉而無力為氣遲而有力為痛遲而無力為冷數而有力為熱數而無力為瘡更分三部在何部得之若在寸部主上焦頭面胸膈之疾關部主中焦肚腹脾胃之疾尺部主下焦小腹腰足之疾診其五臟何髒得之六腑亦然學者又當以意會而加精別庶不致按寸握尺之誚云七表八里總歸四脈浮脈屬陽主表舉指輕按而得之曰浮浮而有力曰洪浮而無力為芤浮而長大為實沉脈屬陰主裡舉指重按而得之曰沉沉而有力曰滑沉而無力為弱沉而似有似無為微沉而至骨為伏遲脈屬陰在臟舉指半重按之在內再按乃見一息三至曰遲遲而有力為澀遲而無力為濡遲而似有似無為緩數脈屬陽在腑舉指輕按而極急一息六至曰數數而有力為弦數而無力為緊寸部主上焦頭面之疾凡診脈按至骨而見者謂之有力按至骨而無者謂之無力余皆仿此浮而有力主風無力主虛主頭面眼目虛浮體重風寒齒痛口眼喎斜沉而有力主積無力主氣主胸膈痞滿咳嗽氣急膈氣翻胃胸滿不食遲而有力主痛無力主冷主嘔吐痞滿不入水穀虛汗拘急疼痛不已數而有力主熱無力主瘡主吐食煩躁口苦咽乾客熱煩渴頭痛口瘡關部主中焦胸腹之疾浮而有力主風無力主虛主兩臂拘攣不能舉運背脊筋疼身體麻木沉而有力主積無力主氣主膨脹虛鳴心腹疼痛上下關格不思飲食遲而有力主痛無力主冷主痃癖腹痛遊走不定上下攻刺反胃吐食數而有力主熱無力主瘡主口熱作渴嘔吐霍亂怔忡煩躁寒熱交爭尺部主下焦腰足之疾浮而有力主風無力主虛主寒邪腰痛腿膝麻木陰莖腫痛大小便不利沉而有力主積無力主氣主臍下腫痛腳膝痠痛下虛盜汗小便頻數遲而有力主痛無力主冷主小腹急痛外腎偏墜小便頻數大便泄瀉數而有力主熱無力主瘡主小便不通大便閉塞或作腎癰煩渴不止五臟見浮脈主風虛之病心脈浮主心虛觸事易驚神不守舍舌強不語語言錯亂肝脈浮主中風癱瘓筋脈攣搐面腫牙疼腸風下血脾脈浮主脾虛作膨飲食不進上氣喘急嘔逆泄瀉肺脈浮主咳嗽氣急大便風秘面浮面瘡吐血吐膿腎脈浮主腰疼牙痛小腹氣痛腿足生瘡足膝無力五臟見沉脈主積氣之病心脈沉主小便淋瀝咯血尿血小便不通寤而不寐心驚肝脈沉主怒氣傷肝脅痛肥氣眼目昏痛肚腹脹滿脾脈沉主中滿不食痞氣色黃手足不仁嘔吐泄瀉貪睡肺脈沉主咳嗽多痰上氣喘急嘔血失聲息賁肺癰腎脈沉主風滯腰疼小便不利陰癩作脹奔豚腹滿五臟見遲脈主冷痛之病心脈遲主小便頻數心疼嘔水怔忡多悸伏梁臍痛肝脈遲主筋攣骨痛目昏多淚觸事易驚轉筋麻木脾脈遲主咳嗽泄瀉腹中有蟲痰涎多壅飲食不化肺脈遲主寒嗽喘滿大便溏瀉皮膚燥澀夢涉大水腎脈遲主小便頻數滑精不禁膝脛痠痛陰濕盜汗五臟見數脈主瘡熱之病心脈數主煩躁狂言舌上生瘡小便赤澀眼目昏花肝脈數主眼痛翳膜目昏多淚頭風眩暈婦人血熱骨蒸及中風脾脈數主口臭胃翻齒痛牙宣多食不飽四肢不舉肺脈數主咳嗽吐血喉腥目赤大便閉結面生痤痱腎脈數主消渴不止小便血淋下疳生瘡陰囊濕癢論五臟見四脈應病詩內因脈喜怒憂思悲恐驚內應氣口喜怒傷心脈必虛思傷脾脈結中居因憂傷肺脈必澀怒氣傷肝脈便濡恐傷於腎脈沉是緣驚傷膽動相須脈緊因悲傷胞絡七情氣口內因之外因脈風寒暑濕燥火外應人迎緊則傷寒腎不移虛因傷暑向胞推澀緣傷燥須觀肺細緩傷濕要觀脾浮則傷風肝部應弱為傷火察心知六邪合脈須當審免使將寒作熱醫不內不外因脈勞神役慮定傷心虛澀之中仔細尋勞役陰陽傷腎部忽然緊脈必相侵房帷任意傷心絡微澀之中宜忖度疲極筋力便傷肝指下尋之脈弦弱飲食飢飽定傷脾未可輕將一例推飢則緩弦當別議若然滑實飽無疑叫呼損氣因傷氣燥弱脈中宜熟記能通不內外中因生死吉凶都在是定死脈形候歌指上如湯沸湧時旦占夕死定無疑尾掉搖搖頭不動魚翔腎絕亦如期去疾來遲勢劈劈命絕脈來如彈石三陽谷氣久虛空胃氣分明屋漏滴散亂還同解索形髓竭骨枯見兩尺蝦游狀如蝦蟆遊魂去行屍定生憂雀啄連連來數急脾無穀氣定難留欲知心絕並榮絕如刀壓力細推求更有肺枯並胃乏如麻蹙促至無休指下渾然如轉豆三光正氣已漂流脈辨生死洞虛子曰蝦游雀啄代止之脈故名死症須知痰氣關格者時復有之若非諳練數歷未免依經斷病而貽笑於大方也蓋病勢消鑠殆盡者其氣不能相續如蝦游水動屋漏滴點而無至者死脈也其或痰凝氣滯關格不通則其脈固有不動者有三兩路亂動時有時無者或尺寸亦有亦無者有關脈絕骨不見者或時動而大小不常者有平居之人忽然而然者有素稟痰病而不時而然者有僵仆卒中而然者皆非死脈也診雜病生死脈歌五十不止身無病數內有止皆知定止猶代脈也脈來五十動而不見一止者無病也五十配天地造化之數易繫辭曰大衍之數五十五十乃備一乃數之始十乃數之極人之脈息晝夜循環五臟脈一動循一臟五動循環五臟遍五十動是十次五數循環遍則數皆極處而不見止者五臟皆平故無病也四十一止一臟絕卻後四年多沒命三十一止即三年二十一止二年應十五一止一年殂以下有止看暴病四十動而見一止者是一臟欠動脈之極數故知一臟絕也先絕腎經何以言之夫天一生水腎屬水生成之一數也人之五臟所生先生乎腎腎水主肝脈肝木生心火命門火生脾土脾土生肺金所以先絕腎期應四年而死三十動而見止者兩臟欠動脈之極數是知腎與肝二經無氣期應三年而死二十動而止者三臟欠動脈之極數是腎肝心三臟無氣期應二年而死十五動而一止者知腎脾肝心四臟皆無氣期應一年而絕也新注云上言脈之動止未知診切何部而取據謹按素問難經云每於平旦寅時日未出飲食未進血氣未亂醫者可以存神定意心無外馳診於指下右手寸口默數脈息至止以決之夫寸口者右手氣口也內經曰氣口何以獨為五臟主岐伯曰胃者水穀之海六腑之大源也五味入口藏於胃變現於氣口又曰脈會太淵寸口是太淵穴也是知寸口為脈大會之處故能決斷五臟六腑生死吉凶矣診暴病歌兩動一止或三四三動一止六七死四動一止即八朝以此推排但依次池氏曰暴病者喜怒驚恐其氣暴逆致風寒暑濕所侵病生卒暴損動胃氣而絕即死不過十日也脈兩動而一止乃胃氣將絕猶得三四日方死三動一止而胃氣將盡猶得六七日死穀氣絕盡方死仿此而推若至十五動而一止者乃死期在一年矣又歌曰寸平無病何謂死尺澤原來脈不存君知此理是何物猶如草木已無根諸脈宜忌生死中風宜浮遲忌急實傷寒熱病宜洪大忌沉細主有變傷寒已得汗脈沉小生浮大者死咳嗽宜浮濡忌伏沉心腹痛宜沉細遲忌浮大弦長堅疾腹脹宜浮大忌虛小頭痛宜浮滑忌澀短下痢宜微小忌大浮洪喘急宜浮滑忌澀溫病穰穰大熱其脈細小者死心腹積聚脈堅強急者生虛弱者死癲病脈虛可治實則死又云脈堅實者生沉細小者死狂病宜實大忌沉細吐血宜沉弱忌實大霍亂宜浮洪忌微遲上氣浮腫宜沉滑忌微細鼻衄宜細沉忌浮大中惡宜緊細忌浮大金瘡宜微細忌緊數中毒宜洪大忌細微腸癖下膿血宜小沉遲忌數疾大吐血宜沉小弱忌實大墜墮內傷宜緊弦忌小弱風痹痿軟宜虛濡忌數腹中有積忌虛弱病熱脈靜者危血脫而脈實者危泄而脈大者危病在中脈虛者危病在外脈澀者危癰疽膿血大泄脈滑數者危婦人帶下宜遲滑忌浮虛急疾婦人妊六七個月宜實大弦緊忌沉細虛弱婦人產前脈細小者危婦人虛勞右寸數者危婦人已產宜小實沉細緩滑微小忌浮虛實大弦急牢緊頭痛目痛卒視無所見者死腸癖下血身熱則死寒則生洞泄食不化不得留下膿血脈微小遲者生緊急者死咳嗽羸瘦脈形堅大者死消渴脈數大者生細小浮短者死水病脈洪大者可治微細者不可治厥逆汗出脈堅強急者生虛緩者死病風不仁痿躄脈虛者生堅疾者死上氣喘急低昂其脈滑手足溫者生脈澀四肢寒者死扁鵲華佗察聲色秘訣病人五臟已奪神明不守聲嘶者死病人循衣縫膽言者不治病人陰陽俱絕掣衣撮空妄言者死病人妄語錯亂及不能語者不治熱病者可治病人陰陽俱絕失音不能小言者三日半死病人兩目眥有黃色起者其病方愈病人面黃目青者不死青如草茲者死病人面赤目黃者不死赤如衃者死病人面黃目白者不死白如枯骨者死病人面黃目黑者不死黑如煤者死病人面目俱等者不死病人面黑目青者不死病人面青目白者死病人面赤目青者六日死病人面黃目青者九日必死是謂亂經飲酒當風邪入胃經膽氣妄泄目則為青雖有天赦不可復生病人面赤目白十日死憂恚思慮心氣內索面色反好急求棺槨病人面白目黑者死此謂榮華已去血脈空索病人面黑目白八日死腎氣內傷病因留積病人面青目黃者五日死病人著床心痛氣短脾竭內傷百日復愈能起彷徨因坐於地其立倚床能治此者可謂神良病人面無精彩若上氣不受飲者四日死病人目無精光及齒牙黑色者不治病人口張者三日死病人耳目及顴頰赤者死在五日中病人黑色出於額上髮際下鼻脊兩顴上者亦死在五日中病人及健人黑色若白色起入目及口鼻者死在三日中病人及健人面忽如馬肝色望之如青近之如黑者死病人面黑目直視惡風者死病人面黑唇青者死病人面青唇黑者亦死病人面黑兩脅下滿不能自轉反者死病人目不回直視肩息者一日死病人陰結陽絕目精脫恍惚者死病人陰陽竭絕目眶陷者死病人眉系傾者七日死病人口如魚口不能復閉而氣出多不返者死病人耳目口鼻有黑色起入於口者必死病人唇青人中反者三日死病人唇反人中滿者死病人唇口忽乾者不治病人唇腫齒焦者死病人齒忽變黑者十三日死病人舌卷卵縮者必死病人汗出不流舌卷黑者死病人髮直者十五日乃死病人發如干麻善怒者死病人發與眉衝起者死病人爪甲青者死病人爪甲白者不治病人手足爪甲下肉黑者八日死病人榮衛竭絕面浮腫者死病人卒腫其面蒼黑者死病人手掌腫無文者死病人臍腫反出者死病人陰囊莖俱腫者死病人脈絕口張足腫者五日死病人足跗腫嘔吐頭重者死病人足跗上腫兩膝大如斗者十日死病人臥遺尿不覺者死病人屍臭者不可治肝病皮白肺之日庚辛死心病目黑腎之日壬癸死脾病唇青肝之日甲乙死肺病煩赤目腫心之日丙丁死腎病面腫唇黃脾之日戊己死青欲如蒼碧之澤不欲如藍赤欲如白裹朱不欲如赭白欲如鵝羽不欲加鹽黑欲如重漆不欲如炭黃欲如羅裹雄黃不欲如黃土診五臟六腑氣絕症候病人肝絕八日死何以知之面青但欲伏眠目視而不見人汗一作泣出如水不止一曰二日死病人膽絕七日死何以知之眉為之傾病人筋絕九日死何以知之手足爪甲青呼罵不休一曰八日死病人心絕一日死何以知之肩息回視立死一曰目亭亭二日死病人腸一云小腸絕六日死何以知之髮直如干麻不得屈伸自汗不止病人脾絕十一日死何以知之口冷足腫腹熱臚脹泄利不覺出無時度一曰五日死病人胃絕五日死何以知之脊痛腰中重不可反覆一曰脬腸平九日死病人肉絕六日死何以知之唇舌皆腫溺血大便赤泄一曰足腫九日死病人肺絕三日死何以知之口張但氣出而不收一曰鼻口虛張短氣病人大腸絕不治何以知之泄利無度利絕則死病人腎絕四日死何以知之齒為暴枯面為正黑目中黃色腰痛欲折自汗出如流水一曰人中平七日死病人骨絕齒黃落十日死諸浮脈無根者皆死以上五臟六腑為根也臟腑論心藏神腎藏精脾藏魂膽藏魄胃受物而化之傳氣於肺傳血於肝而傳水穀於脬腸矣腎北方天乙水故以藏精精始為魂魄乃精之所自出是精氣之佐使而並其出入水能生木木為之子故膽中藏魄心南方太虛火用以藏神生陽曰魂魄乃神之所自出是為神氣之所弼而隨其出入火能生土土為之子故脾中藏魂人之一身精神其主而魂魄其使也人之生也精神魂魄性之用也血氣水穀形之用也惟內外交相養則精神強而魂魄盛性者受之天必有藏焉心者神所藏腎者精所藏脾者魂所藏膽者魄所藏統其藏者心也故能發見於聲臭言視之間而不違其則者所以靈也形者資於地必有腑焉肺為傳氣之腑胃為化水穀之府又為之脬腸以流其渣滓濁穢故天地之性人為貴豈若異端者之言魂魄哉愚謂人之飲食入口由胃管入於胃中其滋味滲入五臟其質入於小腸乃化之則入於大腸始分別清濁渣滓濁者結於廣腸津液清者入於膀胱膀胱乃津液之府也至膀胱又分清濁濁者入於溺中其清者入於膽膽引入於脾脾散於五臟為涎為唾為涕為淚為汗其滋味滲入五臟乃成五汁五汁同歸於脾脾和乃化血行於五臟五腑而統之於肝脾不和乃化為痰血生氣於五臟五腑而統之於肺氣血化精統之於腎精生神統之於心精藏二腎之間謂之命門神藏於心之中竅為人之元氣氣從肺管中出鼻為呼吸也血氣論人生之初具此陰陽則亦具此血氣所以得全性命者氣與血也血氣者乃人身之根本乎氣取諸陽血取諸陰血為榮榮行脈中滋榮之義也氣為衛衛行脈外護衛之義也人受穀氣於胃胃為水穀之海灌溉經絡長養百骸而五臟六腑皆取其氣故清氣為榮濁氣為衛榮衛二氣周流不息一日一夜脈行五十度平旦復會於氣口陰陽相貫血榮氣衛常相流通何病之有一窒礙焉則百病由此而生且氣之為病發為寒熱喜怒憂思積痞疝瘕癥癖上為頭旋中為胸膈下為臍間動氣或喘促或咳噫聚則中滿逆則足寒凡此諸疾氣使然也血之為病妄行則吐衄衰涸則虛勞蓄之在上其人忘蓄之在下其人狂逢寒則筋不榮而攣急挾熱毒則內瘀而發黃在小便為淋痛在大便為腸風婦人月事進退漏下崩中病症非一凡此諸疾皆血使之也夫血者譬則水也氣者譬則風也風行水上有血氣之象焉蓋氣者血之帥也氣行則血行氣止則血止氣溫則血滑氣寒則血凝氣有一息之不運則血有一息之不行病出於血調其氣猶可以導達病原於氣區區調血又何加焉故人之一身調氣為上調血次之先陽後陰也若夫血有敗瘀滯泥諸經壅遏氣之道路經所謂去其血而後調之不可不通其變矣然調氣之劑以之調血而兩得調血之劑以之調氣則乖張如木香官桂細辛厚朴烏藥香附三稜莪朮之類治氣可也治血亦可也若以當歸地黃輩施之血症則可然其性纏滯有虧胃氣胃氣虧則五臟六腑之氣亦餒矣善用藥者必以胃藥助之凡治病當識本末如嘔吐痰涎胃虛不食以致發熱若以涼劑退熱則胃氣愈虛熱亦不退宜先助胃止吐為本其熱自退縱然不退但得胃氣已正旋與解熱又有傷寒大熱屢用寒涼疏轉其熱不退若與調和胃氣自然安愈心為血之主肝為血之藏肺為氣之主腎為氣之藏止知血之出於心而不知血之納於肝知氣之出於肺而不知氣之納於腎往往用藥南轅北轍矣假如血痢以五苓門冬等劑行其心巴豆大黃逐其積其病猶存者血之所藏無以養也必佐以芎歸則病自止假如喘嗽以枳殼桔梗紫蘇桂薑橘等劑調其氣以南星半夏細辛豁其痰而終不升降者氣之所藏無以收也必佐以補骨脂輩則氣歸原矣病有標本治有先後綱舉而目斯張矣噫此傳心至妙之法敢不與衛生君子共之脾胃論夫脾胃者倉廩之官也屬土以滋眾臟安穀以濟百骸故胃於中宮職司南政旺於四季體應四肢胃形如囊名水穀之海脾形若掌乘呼吸而升降司運化之權其致呼吸者元氣也脾居其間附胃磨動所以穀氣消而轉輸也胃屬於戊脾乃己也至哉坤元萬物滋生人之一元三焦之氣五臟六腑之脈統宗於胃故人以胃氣為本也凡善調脾胃者當惜其氣氣健則升降不失其度氣弱則稽滯矣運食者元氣也生血氣者飲食也無時不在無時不然故無專名亦無定位經言胃氣脈不可得見衰乃見耳六脈之偏勝而出獨弦獨浮獨洪獨沉之脈是脈無胃氣之神也甚至屋漏雀啄等脈必元氣先竭然後胃氣不相接濟故也氣將絕則升降之道廢運化之機弛也大凡膈不快食不美者是氣之虛也苟或飲食自倍所傷乃一時膨悶過則平矣若傷之日久仍不寬快者得非元氣虧損而胃氣弱乎古今論脾胃及內外傷辨惟東垣老人用心矣但繁文衍義卒難措用蓋內傷之要有三致焉一曰飲食勞倦即傷脾此常人之患也因而氣血不足胃脘之陽不舉宜補中益氣湯主之二曰思欲而傷脾此富貴之患也資以厚味則生痰而泥膈縱其情欲則耗精而散氣內經曰腎者胃之關夫腎脈從腳底湧泉穴起上股內臁夾任脈抵咽嗌精血枯則乏潤下之力故吞酸而便難胸膈漸覺不舒爽宜加味六君子湯加紅花三分知母鹽炒一錢主之三曰飲食自倍腸胃乃傷者勞力者之患也宜保和丸三因和中丸權之此內傷之由如此而求本之治宜養心健脾疏肝為要也夫心氣和則脾土榮昌心火脾土之母肝木脾土之賊木曰曲直作酸故疏肝則胃氣暢矣肺乃傳送之官肺主氣屬金肺金有力則能平肝木不能作膈悶矣人多執於舊方香燥耗氣之藥致誤多矣予家傳三因和中健脾丸為脾胃家之通用其功效不可盡述原夫世俗但知枳朮丸為脾胃之要藥者膚略之傳也人或信為健脾養胃之藥而可久服謬之甚矣不特無效抑且剝削真氣凡知素難大旨者察安危全在於胃氣蓋三焦司納司化司出者本諸元氣凡治內傷不知惜氣者誠實實虛虛之謂學者宜致思焉五運六氣論夫五運者金木水火土也六氣者風寒暑濕燥火也天干取運地支取氣天干有十配合則為五運地支有十二對衝則為六氣天氣始於甲地氣始於子天地相合則為甲子故甲子者干支之首也天氣終於癸地氣終於亥天地相合則為癸亥故癸亥者干支之末也陰陽相隔剛柔相須是以甲子之後乙丑繼之壬戌之後癸亥繼之三十年為一紀六十年為一周太過不及斯皆見矣然以天干兄弟次序言之甲乙東方木也丙丁南方火也戊己中央土也庚辛西方金也壬癸北方水也以其夫婦配合之甲與己合而化土乙與庚合而化金丙與辛合而化水丁與壬合而化木戊與癸合而化火故甲己之歲土運統之戊癸之歲火運統之詩曰甲己化土乙庚金丁壬化木盡成林丙辛化水滔滔去戊癸南方火焰侵然以地支循環之序言之寅卯屬春木也巳午屬夏火也申酉屬秋金也亥子屬冬水也辰戌丑未屬四季土也以其對衝之位言之子對午而為少陰君火醜對未而為太陰濕土寅對申而為少陽相火卯對酉而為陽明燥金辰對戌而為太陽寒水巳對亥而為厥陰風木故子午之歲君火主之丑未之歲濕土主之寅申之歲相火主之卯酉之歲燥金主之辰戌之歲寒水主之巳亥之歲風木主之詩曰子午少陰君暑火丑未太陰濕土雨寅申少陽相火炎卯酉陽明燥金主辰戌太陽司火寒巳亥厥陰風木舉然五運有主運有客運六氣有主氣有客氣主運主氣萬載而不易客運客氣每歲而迭遷然則客運也有太過焉有不及焉太過之年甲丙戊庚壬五陽干也不及之年謂乙丁己辛癸五陰乾也太過者其至先不及者其至後客氣也有正化焉有對化焉正化之歲謂午未寅酉辰亥之年也對化之歲謂子醜申卯戌巳之年也正化者令之實對化者令之虛假令甲子年甲為土運統主一年子為君火專司一歲一期三百六十五日零二十五刻正合乎周天三百六十五度四分度之一也一期之中主運以位而相次於下客運以氣而周流於上主運者木為初之運火為第二運土為第三運金為第四運水為第五運客運者假令甲己年甲為土運初之運即土也土生金二之運即金也金生水三之運即水也水生木四之運即木也木生火五之運即火也火生土每一運各主七十三日零五刻太過之年大寒前十三日交名曰先天不及之年大寒後十三日交名曰後天平氣之年正大寒日交名曰齊天一歲之內主氣定守於六位客氣循行於四時主氣者風為初之氣火為二之氣暑為三之氣濕為四之氣燥為五之氣寒為終之氣客氣者假令子午年少陰君火司天陽明燥金司地太陰濕土為天之左間厥陰風木為天之右間所以面南而命其位也一氣在上一氣在下二氣在左二氣在右經曰天地者萬物之上下也左右者陰陽之道路也地之左間為初之氣天之右間為二之氣司天為三之氣天之左間為四之氣地之右間為五之氣司地為終之氣每一氣各主六十日七十八刻半有奇申子辰之年大寒日寅初一刻交初之氣至春分日子時之末交二之氣至小滿日亥時之末交三之氣至大暑日戌時之末交四之氣至秋分日酉時之末交五之氣至小雪日申時之末交終之氣所謂一六天也巳酉醜之年大寒日巳初一刻交初之氣至春分日卯時之末交二之氣至小滿日寅時之末交三之氣至大暑日丑時之末交四之氣至秋分日子時之末交五之氣至小雪日亥時之末交終之氣所謂二六天也寅午戌之年大寒日申初一刻交初之氣至春分日午時之末交二之氣至小滿日巳時之末交三之氣至大暑日辰時之末交四之氣至秋分日卯時之末交五之氣至小雪日寅時之末交終之氣所謂三六天也亥卯未之年大寒日亥初一刻交初之氣至春分日酉時之末交二之氣至小滿日申時之末交三之氣至大暑日未時之末交四之氣至秋分日午時之末交五之氣至小雪日巳時之末交終之氣所謂四六天也蓋因客運加於主運之上主氣臨於客氣之下天時所以不齊民病所由生也五運主病諸風掉眩皆屬肝木掉搖也眩昏亂旋運也風主動故也所以風氣盛而頭目眩暈者由風木旺必是金衰不能制木而木復生火風火皆屬陽多為兼化陽主乎動兩動相搏則為之旋轉故火本動也焰得風自然旋轉如春分至小滿而為二之氣分風火相搏則多起飄風俗謂旋風是也四時皆有之由五運六氣千變萬化沖蕩擊搏推之無窮安得失時而便謂之無也但有微甚而已人或乘車躍馬登舟環舞其動不止而左右紆曲經曰曲直動搖風之用也眩暈而嘔吐者風熱甚故也諸痛癢瘡瘍皆屬心火人近火氣者微熱則癢熱甚則痛附近則灼而為瘡皆火之用也或癢痛如針輕刺者猶飛迸火星灼之然也癢者美疾也故火旺於夏而萬物蕃鮮榮美也炙之以火漬之以湯而癢轉甚者微熱之所使也因而癢去者熱令皮膚寬緩腠理開通陽氣得泄熱散而去故也或夏月皮膚癢而以冷水沃之不去者寒能收斂腠理閉密陽氣鬱結不能散越怫熱內作故也癢得爬而解者爬為火化微則亦能令癢爬令皮膚辛辣而屬金化辛能散故金化見而火力分解矣或云痛為實癢為虛非謂虛為寒也正謂熱之微甚也或疑瘡瘍皆屬火熱而反腐出膿水者何也猶穀肉菜果熱極則腐爛而潰為汙水潰而腐爛水之化也蓋所謂五行之理過極則勝己者反來制之故火熱過極則反兼於水化又如鹽能固物令不腐爛者鹹寒水化制其火熱使不過極故得久固也萬物皆然諸濕腫滿皆屬脾土地之體也土濕過極則痞塞腫滿物濕亦然故長夏屬土則庶物隆盛也諸氣膹郁病痿皆屬肺金膹謂膹滿也郁謂奔迫也痿謂手足痿弱無力以運動也大抵肺主氣氣為陽陽主輕清而升故肺居上部病則其氣膹滿奔迫不能上升至於手足痿弱無力運動者由肺金本燥燥之為病也血液衰少不能榮養百骸故也經曰目得血而能視掌得血而能握指得血而能攝足得血而能步故秋金旺則霧氣蒙鬱而草萎落病之象也萎猶痿也諸寒收引皆屬腎水收斂引急寒之用也故冬寒則拘縮矣六氣為病風類諸暴強直支痛緛戾裡急筋縮皆屬於風厥陰風木乃肝膽之氣也暴卒也強直堅勁也支痛支持也謂堅固支持筋攣不柔而痛也緛縮也戾乖戾也謂筋縮裡急乖戾失常而病也然燥金主於緊斂短縮勁切風木為病反見燥金之化者由亢則害承乃制也況風能勝濕而為燥也風病熱甚而成筋緛者燥之甚也故甚者皆兼於燥也熱類諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大鼓之如鼓癰疽瘍疹瘤氣結核吐下霍亂瞀郁腫脹鼻窒鼽衄血溢血泄淋閉身熱惡寒戰慄驚惑悲笑譫妄衄衊血汗皆屬於熱少陰君火主之乃真心小腸之氣也喘火氣甚而為夏熱衰為冬寒故病寒則氣衰而息微病熱則氣盛而息粗而為喘也嘔胃膈熱甚則為嘔火氣炎上之象也吐酸者肝木之味也由火盛制金不能平木而肝木自甚故為酸也如飲食熱則易於酸矣或言吐酸為寒者誤也且如酒之味苦而辛熱能養心火故飲之則令人色赤氣粗脈洪大而數語澀譫妄歌唱悲笑喜怒如狂冒昧健忘煩渴嘔吐皆熱症也其吐必酸為熱明矣況熱則五味皆厚經曰在地為化化生五味故五味熱食則味皆厚也是以肝熱則口酸心熱則口苦脾熱則口甘肺熱則口辛腎熱則口咸或口淡者胃熱也胃屬土土為萬物之母胃為五臟之本故傷生冷堅硬之物則令人噫醋吞酸猶寒傷皮毛能令陽氣壅滯而為病熱也俗醫妄以為冷主溫和脾胃而復愈者猶傷寒用麻黃桂枝藥發表令汗出而愈也若久吐酸不已則不宜溫之當用寒藥以下之後以涼藥調之所以中酸而不宜食油膩之物者皆因能令氣之壅塞也暴注卒瀉也腸胃熱甚而傳化失常火性疾速故也下迫裡急後重也火能燥物能令下焦急迫也轉筋熱燥於筋而筋轉也或言轉筋為寒者誤也所謂轉者動也陽動陰靜熱症明矣霍亂吐瀉之人必有轉筋之症大法吐瀉煩渴為熱不渴為寒霍亂轉筋而不渴者未之有也或曰以溫湯漬之則愈以冷水沃之則劇何也蓋溫湯能令腠理開發熱氣消散轉筋即止冷水能令腠理閉密熱氣鬱塞轉筋不止世俗見溫湯漬之而愈妄疑為寒也小便渾濁天氣寒則水清潔天氣熱則水渾濁如清水為湯則自渾濁也腹脹大鼓之如鼓氣為陽熱甚則氣盛故腹脹滿也癰淺而大也經曰熱盛血則為癰膿也疽深而惡也瘍有頭小瘡也疹浮小隱疹也瘤氣赤瘤丹熛熱勝氣也結核熱氣鬱結堅硬如果中核也不必潰發但令熱氣散自然消也吐下霍亂三焦為水穀傳化之道路熱氣甚則傳化失常而吐瀉霍亂也或言吐瀉為寒者誤矣大法吐瀉煩渴為熱不渴為寒或熱吐瀉初得之亦有不渴者若止則亡液而後必渴或寒不渴若亡津液過多則亦燥而渴也大抵完穀不化而色白吐利腥穢澄澈清冷小便清白不澀身涼不渴脈沉細而遲者寒症也如小兒病熱吐利乳未消而色尚白不可便言為寒當以飲食藥物之色別之若穀雖不化而色變非白小便赤黃吐利煩渴脈洪大而數者熱症也蓋瀉白為寒余皆為熱瀉白者肺金之色也由寒水甚而制火不能平金肺金自甚故色白也瀉青者肝木之色也由火盛制金不能平木肝木自甚故色青也如傷寒少陰下利清水色純青仲景以大承氣湯下之為熱明矣瀉黃者脾土之色也由火甚水衰脾土自旺故色黃也瀉紅者心火之色也瀉黑者腎水之色也由亢則害承乃制火熱過極反兼水化制之故色黑也下痢色黑者即死又如瘡癤皆屬火熱其本一也其標則有五焉以其在皮膚之分屬肺金故出白膿以其在血脈之分屬心火故為血癤以其在肌肉之分屬脾土故出黃膿以其在筋之分屬肝木故其膿見蒼色深至骨屬腎水故紫黑血也若以下痢黑者為寒然則瘡癤之出紫黑血者亦為冷歟又如赤痢本濕熱之相兼也舉世皆言赤痢為熱白痢為寒者誤之久矣殊不知陰陽之道猶權衡也一高則必一下一盛則必一衰故陽盛者陰必衰陰盛者陽必衰自然之理也豈有陰陽二氣俱盛於腸胃而同為赤白之痢乎夫痢何也蓋因六七月之交世之穀肉果菜飲啖無度濕熱大甚人受之感其毒氣於腸胃之間而為下膿血赤白也治痢之法當以苦寒之藥治之如宋朝錢仲陽處香連丸以治小兒之痢深得玄理木香苦溫黃連苦寒苦能燥濕寒能勝熱溫能開發腸胃之鬱結愈痢多矣今世俗醫但以辛熱薑桂之藥以治諸痢病之微者能令腸胃開通鬱結消散偶或一愈病之甚者怫熱不開痢疾轉甚輕則為小溲不通水腫之疾重則為瞀亂之病而死矣深可嘆哉又如婦人赤白帶下之病同乎痢也蓋人有十二正經脈有奇經八脈帶脈者奇經之一也起於季脅回身一周如束帶然婦人下焦濕熱太甚津液湧溢從帶脈淋瀝而下也舉世皆言白帶為寒者亦誤矣凡病此者必頭目昏眩口苦舌乾咽嗌不利小便赤澀大便閉滯脈實而數皆熱症也治帶下之法亦以辛苦寒藥為主不可驟用燥藥及熱藥以損人生命也又如酒蠱而大便濡瀉者亦中濕熱也或水腫或發黃皆濕熱也嗚呼人即有形不能無病有生不能無死然醫者但當按法治之若標本不明陰陽不審誤投湯藥實實虛虛而死者是誰之過歟故曰世無良醫枉死者半誠不誣矣瞀神昏而氣濁也郁熱極則腠理鬱結而氣道不通也腫脹陽熱太甚則腫滿䐜脹也如六月庶物隆盛腫脹之象明可見矣鼻窒謂鼻塞也傷風寒於腠理而為鼻窒寒能收斂陽氣不通暢也人側臥則下竅通利上竅反塞者謂陽之經左右相交於鼻也鼽鼻出清涕也衄鼻出血也血溢血出於上竅也血泄血出於下竅也淋熱客膀胱小便澀痛也或曰小便澀而不通為熱遺溲不禁為冷豈知熱甚客於腎部干於足厥陰之經廷孔鬱結極甚氣液不能宣通故痿痹神無所用津液滲入膀胱而為溲也如傷寒少陰熱極則遺溲其理明矣世傳眾方又有冷淋之說可笑也已及觀其所治之方還用榆皮瞿麥苦寒之藥其說雖妄其方乃是由不知造化變通之理宜乎認是而作非也學不明而欲為醫難矣哉閉大便澀滯也由火盛制金不能平木肝木生風風能勝濕濕能耗液故也身熱惡寒邪熱在表而反惡寒也故仲景治傷寒之法以麻黃湯汗之或曰寒在皮膚則熱在骨髓熱在皮膚則寒在骨髓此說非也戰慄謂火熱過極反兼水化制之故戰慄而動搖也傷寒日深大汗欲出必先戰慄熱極故也人恐懼而戰慄者恐則傷腎水衰故也驚心卒動而不寧也惑疑惑而志不一也悲謂心血熱甚則凌肺金金不受制故發悲哭也悲哭而涕淚俱出者如火鍊金反化為水也是以肝熱盛則出泣心熱盛則出汗脾熱盛則出涎肺熱盛則出涕腎熱盛則出唾猶夏熱太盛則林木流津也笑心火熱甚喜志發也或以輕手擾人脅肋膕腋令癢而笑者擾亂動搖火之化也譫多言也心熱神亂則語言妄出也妄狂妄也心熱神昏則目有所見也衄衊血汗謂鼻出黑血也濕類諸痙強直積飲痞隔中滿吐下霍亂體重胕腫肉如泥按之不起皆屬於濕太陰濕土乃脾胃之氣也痙痓也強直謂項強也太陽經中濕則令人項強有汗者曰陰痙仲景所謂柔痙是也無汗者曰陽痙仲景所謂剛痙是也積飲謂留飲也痞否也謂氣不升降也如否卦陽在上陰在下則天地閉塞矣隔阻滯也腸胃濕甚則傳化失常也中滿土位中央濕則令人中焦滿也吐下霍亂謂腸胃濕飲相兼故也體重清陽為火濁陰為地濕土為病體重宜也胕腫濕勝於下也肉如泥按之不起濕勝於身也火類諸熱瞀瘈暴喑冒昧躁擾狂越罵詈驚駭胕腫疼酸氣逆衝上禁慄如喪神守嚏嘔瘡瘍喉痹耳鳴及聾嘔湧溢食不下目昧不明暴注瞤瘈暴病暴死皆屬於火少陽相火乃心包絡三焦之氣也瞀昏也君火化同瘈熱令肌肉跳動也暴喑卒啞也心火熱盛上克肺金不能發聲也冒昧昏憒也躁擾謂熱盛於外手足不寧也狂越謂乖越禮法而失常也經曰登高而歌棄衣而走罵詈不避親疏熱極故也罵詈言之惡也水數一道近而善火數二道遠而惡心火熱極則發惡言也驚駭君火化同胕腫熱勝於內也疼酸痠疼者由火勝制金不能平木故也氣逆衝上火氣熱炎上也禁慄如喪神守慄戰慄也禁冷也喪神守火極而似水化也嚏鼻中因癢而氣噴作於聲也嘔瘡瘍君火化同喉痹熱客上焦而咽嗌腫也耳鳴熱沖聽戶耳中作聲也聾水衰火盛氣道閉塞耳不聞聲也微則可治久則難通嘔湧溢食不下胃膈熱盛火氣炎上之象也目昧不明五臟熱極則目昏不能視物也暴注卒瀉也君火化同瞤瘈惕跳而肉動也暴病暴死火性疾速故也由其平日飲食衣服性情好惡不循其宜而失其常久則氣變興衰而為病也蓋因腎水衰虛心火暴盛水不能制之熱氣怫鬱心神昏冒則筋不用卒倒而無所知也若熱甚至極則死微則發過如故俗云暗風若血氣鬱結不得宣通鬱極乃發若一側得通利則痞者痹而癱瘓也燥類諸澀枯涸幹勁皴揭皆屬於燥陽明燥金乃肺與大腸之氣也澀遍身澀滯不滑澤也枯不榮生也涸不流通也干不滋潤也勁不柔和也皴揭皮膚開裂也寒類諸病上下所出水液澄澈清冷癥瘕㿗疝堅痞腹滿急痛下痢清白食已不飢吐利腥穢屈伸不變厥逆禁固皆屬於寒足太陽寒水乃腎與膀胱之氣也至上下所出水液澄澈清冷如天氣寒則水自然澄清也癥氣聚之積或聚或散無有常處也瘕血積之塊蓋由女子月水沉滯久而成瘕也經曰小腸移熱於大腸為虛瘕為沉然則血瘕亦有熱者也當以標本明之㿗疝足厥陰經受寒則陰腫也堅痞腹滿急痛如水寒則冰堅硬如地也下痢清白水寒則清而明白也食已不飢胃熱能消穀寒則不能消穀雖已而亦不飢也吐利腥穢寒水甚而制火則不能平金肺金自盛故水腥也屈伸不變厥逆禁固謂手足蜷攣而冷也亢則害承乃制體用說夫氣淫太過曰亢則害物極而得復則曰承乃制也蓋陰陽互藏平氣以為和五行偏勝而為眚軒岐法則天地把握陰陽人稟太極全體至理而生成者也故內經所言君火之下陰精承之者相火之下水氣承之木氣之下金氣承之水氣之下土氣承之土氣之下木氣承之謂土必剋水以水之子木也承於土之下此乃先天和平之配偶耳經言亢則害承乃制者謂其亢之為害必得受害者之子以承其勝而制之也即子復母仇之義耳原夫木極似金火極似水土極似木金極似火水極似土如風木為病掉眩甚則肢體拘攣固勁而不能動動極靜也火之太過則煅木溶金人為渴汗土極之病肉瞤筋惕慢驚瘈瘲之類靜極動也金暴斂則反熱水極則冰凝如石人病則收引癃結時工昧知陰陽生殺之機不究火亢則害陰金症出戰慄惡寒當辨目之黃赤口之乾渴二便通塞脈之遲數以別是是非非庶無誤人之弊設若口燥便赤脈不遲縱寒戰之甚急宜清涼為當時醫輒見戰慄厥逆惡寒不諳厥深熱亦深之理逕投熱藥則如傷寒賦云桂枝下咽陽盛則斃又有陰症似陽者亦有譫言妄語欲奔泥水但不甚渴便清脈遲俗工認為陽治賦亦云承氣入胃陰盛乃亡凡為良醫者須博理廣見可也所以承氣解毒等湯可治似陰之症理中四逆等湯可療似陽之急庸常昧知亢極之變誤指附子可以治熱病涼藥可以療寒厥殊不知有義理當然而用之也籲附子承氣備為明醫以救人何期又為庸醫之殺人仁人君子其亢則害承乃制之理豈容不加究此心哉且如雜症木亢則害其土也土受木之克害則不善食木曰曲直曲直作酸故為膈噎中滿等症生焉其所承於木之下者肺金也土之子緣肺金主氣氣屬陽陽行健其播敷運化氣之力也肺金大腸職司傳送今夫木之亢也則侮金而害土必當扶土之子金氣之壯則能制其木之過所以法當資益肺金之氣則木可平而土可保矣俗夫反以耗氣散氣之藥則土益衰而木愈克可勝惜哉又如火亢可害其肺金金受火克之極病則惡寒戰慄而發晚熱咳渴直俟夜半之後氣血傳過肺金得微汗方解此係承乃制之義也苟不扶水以濟金即元氣日索矣法當培其陰精真水以御君相二火之暴則惡寒退而潮熱減自汗而涼正氣回也人或以辛甘之劑兼以解散療之則精液愈涸而真精愈竭則虛其虛也余可類推人身安危之機在於陰陽互藏以為和否則五行更勝克害而生病也故經曰氣之勝者則薄其所不勝而害其所能勝嗟夫亢之所以為害責在承之不足而起之也確乎論歟致中和以全生者良醫也大易曰造物不致終窮其久病有待時令遷轉而承乃制而自愈矣如傷寒待日期傳過而涼者即承乃制而痊也此造物化工之妙耳僻處乏醫則從漢書有云不藥當中醫可也與其亢則害承乃制之說庶乎得矣醫論扁鵲論醫病有六不治驕恣不論於理一不治也輕身重財二不治也衣食不能適三不治也陰陽並藏氣不足四不治也形羸不能服藥五不治也信巫不信醫六不治也雲林子曰越人之論一三四五六是矣二則於予心有未適然者何也輕者彼輕也重者彼重也彼輕而我重之則彼之生可活矣不然彼以一吝而喪生固病者之不智子以一吝而不治亦醫者之不仁噫古之神醫於此意猶存則世醫可知矣本草藥論夫藥者天地間之萬物也昔古神農憫蒼生之疾苦格物理之精微其用心可為仁矣故本草藥品雖多然其味不過五乃甘辛鹹苦酸是也而其性不過六溫涼補瀉升降是也且甘辛溫補升者陽也苦鹹涼瀉降者陰也淡滲泄而屬陽酸性陽而味陰故藥有純陽者有純陰者有陰中之陽有陽中之陰有專用其氣者有獨用其味者大抵味之厚者必補氣之重者必降味淡則瀉性輕則升升者治在上在表之病降者治在下在裡之疾諸寒涼者治乎血熱諸溫熱者治乎氣鬱氣虛潤以濡燥澀以收脫又甘為諸補之原苦為諸瀉之本辛香者亦升泄之類酸鹹者皆補降之屬所謂補者性味各有所補而其瀉者亦各有所瀉然補中有瀉而瀉中有補如酸入肝生津以制燥至苦入心滋陰以降火辛能溫肺以退寒咸可堅腎以御熱如欲去其邪在使復其正瀉陽有以補陰瀉陰有以補陽降則通其自升升則欲其自降惟病有兼成而法當合用故方有奇偶而藥有君臣制之以散者散也或成之以錠者鎮也用湯者蕩也取氣味盪漾而無所不至用丸者緩也取氣味緩達而有所及遠湯有生熟瀉則宜生補則宜熟丸有大小病在上者宜小俱服於食後或散末以輕調或含丸以緩化病在下者宜大俱服於食前或服後以食壓或湯藥以頓服吞補劑於早於未語之前服疾藥當脫衣臨睡之際鬱氣妙舐嚼之方溫症利丸散之功凡用甘草者解諸藥毒取甘以緩脾劑投生薑者行諸藥力取辛以開胃故病以脾胃為主始得以攻病之力用酒者欲其上達用鹽者取其下行丸用蠟者匱其毒裹用蠟者藏其氣水丸求其速化以清利蜜丸取其緩行以滋潤用新者速其功用陳者遠其毒調脾胃之藥丸宜五穀和氣血之劑利用醋酒炒以緩其性泡以剖其毒浸能滋陰煉可助陽但制有太過不及之弊忌用有相反畏惡之情有療之於理者有療之以意者又有不藥之術出乎才智之巧如針灸熏熨淋漬之類治六淫外病之藥也有以人事真偽之機委曲旁求之變動人耳目移病者之心志郁者散之散者郁之勞者逸之靜者動之乃治七情內病之藥也故導引運行調乎飲食起居從中正之心無欺妄之憂者乃修養之藥也故藥者非徒藥物之為藥而人事所宜之門莫不為之藥也藥有五法湯劑煎成清液也補須要熟利不嫌生並先較定水數煎蝕多寡之不同耳去暴病用之取其易升易散易行經絡故曰湯者蕩也治至高之分加酒煎去濕加生薑煎補元氣加大棗煎發散風寒加蔥白煎去膈病加蜜煎止痛加醋煎凡諸補湯渣滓兩劑併合加原水數復煎待熟飲之亦敵一劑新藥其發表攻裡二者雖前藥取效不必煎渣也從緩從急之不同故耳膏劑熬成稠膏也藥分兩雖多水煎膏宜久渣滓復煎數次絞取濃汁以熬成耳去久病用之取其始蝕力大滋補膠固故曰膏者膠也凡可服之膏或水或酒隨熬渣猶酒煮飲之可摩之膏或酒或醋隨熬滓宜搗數患處此蓋盡藥力也散劑研成細末也宜施制合不堪久留恐走泄氣味服之無效耳去急病用之不循經絡只去胃中及腸腑之積故曰散者散也氣味厚者湯調服氣味薄者煎熟和酒服丸劑作成丸粒也治下焦之疾者如梧子大治中焦疾者如綠豆大治上焦疾者如粒米大因病不能速去取其舒緩逐漸成功故曰丸者緩也用水丸者或蒸餅作稀糊丸者取其易化而治上焦也用稠面和丸者或飯糊丸者取略遲化能達中焦也或酒或醋丸者取其收散之意泡半夏南星欲去濕痰者以生薑自然汁取稀糊為丸亦取其易化也神麯丸者取其消食山藥糊丸者取其澀煉蜜丸者取其遲化而易循經絡蠟丸取其難化能固護藥之味氣勢力全備直過膈而作效也漬酒漬煮藥酒也藥須細銼絹袋盛之入酒罐密封如常法煮熟埋地日久氣烈味濃早晚頻吞經絡速達或攻或補並著奇功滓濾出曝乾搗末別漬力雖稍緩服亦益人為散亦佳切勿傾棄補虛損症宜少飲緩取效攻風溼症宜多飲速取效凡丸藥用蜜每藥末一斤則用蜜十二兩文火煎煉掠去沸沫令色黃滴水成珠為度再加水四兩和勻如此丸庶可曬乾經久不壞或用重湯熬煉成珠尤妙藥性歌括共四百味諸藥之性各有奇功溫涼寒熱補瀉宣通君臣佐使運用於衷相反畏惡立見吉凶人參味甘大補元氣止渴生津調榮養衛去蘆用反藜蘆黃耆性溫收汗固表托瘡生肌氣虛莫少綿軟如箭乾者瘡瘍生用補虛蜜水炒用白朮甘溫健脾強胃止瀉除濕兼祛痰痞去蘆淘米泔水洗薄切曬乾或陳東壁土炒茯苓味淡滲濕利竅白化痰涎赤通水道去黑皮中有赤筋要去淨不損人目甘草甘溫調和諸藥炙則溫中生則瀉火一名國老能解百毒反甘遂海藻大戟芫花當歸甘溫生血補心扶虛益損逐瘀生新酒浸洗淨切片體肥痰盛薑汁浸酒身養血尾破血全活血白芍酸寒能收能補瀉痢腹痛虛寒勿與有生用者有酒炒用者赤芍酸寒能瀉能散破血通經產後勿犯宜用生生地微寒能消濕熱骨蒸煩勞兼消破血一名苄懷廣出者用酒洗竹刀切片熟地微溫滋腎補血益髓填精烏須黑髮用懷廣生地黃酒拌蒸至黑色竹刀切片勿犯鐵器忌蘿蔔蔥蒜用薑汁炒除膈悶麥門甘寒解渴祛煩補心清肺虛熱自安水浸去心用不令人煩天門甘寒能治肺癰消痰止嗽喘熱有功水浸去心皮黃連味苦瀉心除痞清熱明眸厚腸止痢去須下火童便痰火薑汁伏火鹽湯氣滯火吳萸肝膽火豬膽實火朴硝虛火酒炒黃芩苦寒枯瀉肺火子清大腸濕熱皆可去皮枯朽或生或酒泡黃柏苦寒降火滋陰骨蒸濕熱下血堪任去粗皮或生或酒或蜜或童便或乳汁炒一名黃蘖梔子性寒解鬱除煩吐衄胃痛火降小便生用清三焦實火炒黑清三焦鬱熱又能清曲屈之火連翹苦寒能消癰毒氣聚血凝濕熱堪逐去梗心石膏大寒能瀉胃火發渴頭疼解肌立妥或生或煅一名解石滑石沉寒滑能利竅解渴除煩濕熱可療細膩潔白者佳粗紋青黑者勿用研末以水飛過貝母微寒止嗽化痰肺癰肺痿開鬱除煩去心黃白色輕鬆者佳大黃苦寒實熱積聚蠲痰潤燥疏通便閉柴胡味苦能瀉肝火寒熱往來瘧疾均可去蘆要北者佳前胡微寒寧嗽化痰寒熱頭痛痞悶能安去蘆要軟者佳升麻性寒清胃解毒升提下陷牙痛可逐去須青綠者佳桔梗味苦療咽腫痛載藥上升開胸利壅去蘆青白者佳紫蘇葉辛風寒發表梗下諸氣消除脹滿背面皆紫者佳麻黃味辛解表出汗身熱頭痛風寒發散去根節宜陳久止汗用根葛根味苦祛風發散溫瘧往來止渴解酒白粉者佳薄荷味辛最清頭目祛風化痰骨蒸宜服一名雞蘇龍腦者佳辛香通竅而散風熱防風甘溫能除頭暈骨節痹疼諸風口噤去蘆荊芥味辛能清頭目表汗祛風治瘡消瘀一名假蘇用穗又能止冷汗虛汗細辛辛溫少陰頭痛利竅通關風濕皆用華陰者佳反藜蘆能發少陰之汗羌活微溫祛風除濕身痛頭疼舒筋活血一名羌青目赤亦要獨活甘苦頸項難舒兩足濕痹諸風能除一名獨搖草又名胡王使者知母味苦熱渴能除骨蒸有汗痰咳皆舒去皮毛生用瀉胃火酒炒瀉腎火白芷辛溫陽明頭痛風熱瘙癢排膿通用一名芳香可作面脂藁本氣溫除頭巔頂寒濕可去風邪可屏去蘆香附味甘快氣開鬱止痛調經更消宿食即莎草根忌鐵器烏藥辛溫心腹脹痛小便滑數順氣通用一名旁其一名天台烏枳實味苦消食除痞破積化痰沖牆倒壁如龍眼色黑陳者佳水浸去積切片麩炒枳殼微溫快氣寬腸胸中氣結脹滿堪嘗水浸去穰切片麩炒白蔻辛溫能去瘴翳益氣調元止嘔和胃去殼取仁青皮苦寒能攻氣滯削堅平肝安胃下食水浸去穰切片陳皮甘溫順氣寬膈留白和胃消痰去白溫水略洗刮去穰又名橘紅蒼朮甘溫健脾燥濕發汗寬中更去瘴疫米泔水浸透搓去黑皮切片炒厚朴苦溫消脹泄滿痰氣下痢其功不緩要厚如紫莖者佳去粗皮薑汁炒南星性熱能治風痰破傷強直風搐自安薑湯泡透切片用或為末包入牛膽內名曰牛膽南星半夏味辛健脾燥濕痰厥頭疼嗽嘔堪入一名守田反烏頭滾水泡透切片薑汁炒藿香辛溫能止嘔吐發散風寒霍亂為主或用葉或用梗葉與梗併兼用檳榔味辛破氣殺蟲祛痰逐水專除後重如雞心者佳腹皮微溫能下膈氣安胃健脾浮腫消去多有鳩糞毒用黑豆湯洗淨香薷味辛傷暑便澀霍亂水腫除煩解熱陳久者佳扁豆微涼轉筋吐瀉下氣和中酒毒能化微炒豬苓味淡利水通淋消腫除濕多服損腎削去黑皮切片澤瀉苦寒消腫止渴除濕通淋陰汗自遏去尾木通性寒小腸熱閉利竅通經最能導滯去皮切片車前子寒溺澀眼赤小便能通大便能實去殼地骨皮寒解肌退熱有汗骨蒸強陰涼血去骨木瓜味酸濕腫腳氣霍亂轉筋足膝無力酒洗威靈苦溫腰膝冷痛消痰痃癖風濕皆用去蘆酒洗牡丹苦寒破血通經血分有熱無汗骨蒸去骨玄參苦寒清無根火消腫骨蒸補腎亦可紫黑者佳反藜蘆沙參味苦消腫排膿補肝益肺退熱除風去蘆反藜蘆丹參味苦破積調經生新去惡祛除帶崩反藜蘆苦參味苦癰腫瘡疥下血腸風眉脫赤癩反藜蘆龍膽苦寒療眼赤疼下焦濕腫肝經熱煩五加皮寒祛痛風痹健步堅筋益精止瀝此皮浸酒輕身延壽寧得一把五加不用金玉滿車防己氣寒風濕腳痛熱積膀胱消癰散腫地榆沉寒血熱堪用血痢帶崩金瘡止痛如虛寒水瀉