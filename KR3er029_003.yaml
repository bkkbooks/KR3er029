body:
  text: 卷三痰飲脈雙弦者寒飲也其脈偏弦者飲也肺飲不弦但喘短氣經云脈浮而細滑傷飲脈弦數有寒飲春夏難治脈沉而弦者懸飲內痛其人短氣四肢歷節走痛脈沉者有留飲左右手關前脈浮弦大而實膈上有稠痰也宜吐之病人百藥不效關上脈伏而大者痰也眼胞及眼下如炭煙燻黑者亦痰也久得澀脈痰飲膠固脈道阻澀也卒難得開必費調理痰者病名也生於脾胃然脾胃氣盛飲食易克何痰之有或食後因之氣惱勞碌驚恐風邪致飲食之精華不能傳化而成痰飲矣有流於經絡皮膚者有鬱於臟腑支節者遊溢遍身無所不至痰氣既盛客必勝主或奪於脾之大絡壅氣則倏然仆地此痰厥也升於肺者則喘急咳嗽迷於心者則怔忡恍惚走於肝則眩暈不仁脅肋脹滿關於腎則咯而多痰唾流於中脘則嘔瀉而作寒熱注於胸則咽膈不利眉稜骨痛入於腸漉漉有聲散於胸背則揪觸一點疼痛或塞於手足或背痹一邊散則有聲聚則不利一身上下變化百病治當各從所因是以虛宜補之火宜降之氣宜順之郁宜開之食宜導之風寒濕熱宜發散清燥以除之故曰治病必求其本一論有濕痰熱痰風痰老痰寒痰食積痰宜後方加減二陳湯陳皮去白一錢半夏湯泡二錢白茯苓去皮一錢甘草五分上銼一劑生薑三片水煎溫服一濕痰盛者身軟而重加蒼白二術一熱痰加黃連黃芩痰因火盛逆上降火為先加白朮黃芩軟石膏黃連一眩暈嘈雜者火動其痰也亦加山梔黃連黃芩一風痰加天麻枳殼南星白附子殭蠶牙皂之類氣虛者加竹瀝氣實者加荊瀝俱用薑汁一老痰用海石半夏栝蔞香附連翹之類五倍子佐此藥大治頑痰宜丸藥喉中有物咯不出咽不下此痰結也用藥化之加咸藥軟堅之類宜栝蔞杏仁海石桔梗連翹香附少佐朴硝薑汁煉蜜和丸噙服之脈澀者卒難得開必費調理氣實痰熱結者吐難得出或成塊吐咯不出氣滯者難治一寒痰痞塞胸中倍加半夏甚者加麻黃細辛烏頭之類痰厥頭痛加半夏一食積痰加神麯麥芽山楂炒黃連枳實以消之甚者必用攻之宜丸藥兼血虛者用補血藥送下中焦有痰者食積也胃氣亦賴所養卒不使虛若攻之盡則虛矣噫氣吞酸此係食積而鬱有熱火氣動上加黃芩南星一血虛有痰加天門冬知母栝蔞仁香附米竹瀝薑汁帶血者更加黃芩白芍桑皮血滯不行中焦有飲者取竹瀝加生薑汁韭汁飲三五盞必胸中煩躁不寧後愈一氣虛有痰加人參白朮脾虛者宜補中氣以運痰降下加白朮白芍神麯麥芽兼用升麻提起內傷夾痰加人參黃耆白朮之類薑汁傳送或加竹瀝尤妙一痰在膈上必用吐法瀉之不去膠固稠濁者必用吐脈浮者宜吐痰在經絡間非吐不可吐中就有發散之義凡用吐藥宜升提其氣便吐加防風川芎桔梗茶芽生薑齏汁之類或瓜蒂散凡吐用布緊勒肚於不通風處行之一痰在腸胃間可下而愈枳實甘遂巴豆大黃芒硝之類凡痰用利藥過多脾氣易虛則痰易生而多一痰在脅下非白芥子不能達一痰在皮裡膜外非薑汁竹瀝不可及在四肢非竹瀝不開在經絡亦用竹瀝必佐以生薑韭汁膈間有痰或顛狂或健忘或風痰俱用竹瀝與荊瀝同功氣虛少食用竹瀝氣實能食用荊瀝一凡人身上中下有塊是痰也問其平日好食何物吐下後方用藥一凡人頭面頸頰身中有結核不痛不紅不作膿者皆痰注也宜隨處用藥消之一凡痰之為物無處不到為隨氣升降故也一論竹瀝大治熱痰又能養血清熱有痰厥不省人事幾死者得竹瀝灌之遂蘇誠起死回生妙藥也用水竹早薑竹截長二尺許小者每段劈作二片大者劈作四片入井水浸一時許以薄磚兩塊排定將竹片排於磚上兩頭露一二寸下以烈火迫之兩頭以盆盛瀝每六分中加薑汁一分服之熱甚者只可加半分耳以竹瀝加入湯藥內服之尤妙取荊瀝亦治熱痰亦照此法取之一論痰屬濕乃津液所化因風寒濕熱之感或七情飲食所傷以致氣逆液濁變為痰飲故曰痰因火動降火為先火因氣逆順氣為要加減二陳湯橘紅去白一錢半夏制一錢半白茯苓去皮一錢貝母一錢半枳實炒一錢白朮去蘆一錢二分連翹五分黃芩酒炒一錢防風去蘆五分天花粉七分香附童便炒一錢甘草三分上銼生薑三片水煎溫服一論熱痰在胸膈間不化吐咯不出寒熱氣急滿悶作痛者名曰痰結開結化痰湯陳皮一錢半夏制二錢茯苓二錢桔梗八分枳殼七分貝母一錢栝蔞仁二錢黃連五分黃芩二錢梔子二錢蘇子二錢桑皮三錢朴硝八分杏仁三錢甘草八分上銼水煎入薑汁磨木香服一論遍身四肢骨節走注疼痛牽引胸背亦作寒熱喘咳煩悶或作腫塊痛難轉側或四肢麻痹不仁或背心一點如冰冷脈來沉滑乃是濕痰流注經絡關節不利故也清濕化痰湯南星泡二錢半夏制二錢陳皮一錢五分去白茯苓三錢去皮蒼朮一錢五分米泔炒羌活二錢白芥子三錢白芷二錢甘草八分上銼水煎入竹瀝薑汁磨木香溫服骨節痛甚及有種塊作痛者名曰痰塊加乳香一錢沒藥一錢海石三錢朴硝五分頭頂痛加川芎一錢五分威靈仙三錢手臂膊痛加薄桂引南星至痛處一論內傷七情痰迷心竅神不守舍神出舍空空則痰生以致憎寒壯熱頭痛昏沉迷悶上氣喘急口出涎沫症類傷寒兼治中風痰厥氣厥不省人事者清熱導痰湯人參二錢白朮一錢五分去蘆茯苓三錢去皮陳皮二錢去白半夏二錢薑製南星二錢薑製枳實三錢麩炒桔梗八分黃連五分黃芩二錢栝蔞仁三錢甘草八分上銼生薑煎入竹瀝薑汁同服家傳清氣化痰丸製造甚得法化痰清火開膈順氣消痞除脹醒酒消食殊效天南星四兩大半夏四兩二味先用米泔水各浸三五日以透為度洗淨切片以碗一個盛貯曬乾先薑汁次皂汁又次礬汁又次硝水曬乾一用生薑汁浸一旦夕曬乾一用皂角煎水去渣浸一旦夕曬乾一用白礬一兩煎水浸一旦夕曬乾一用朴硝一兩煎水浸一旦夕曬乾青皮去穰陳皮去白枳殼去穰麩炒枳實麩炒白朮去蘆白茯苓去皮蘇子炒白芥子炒蘿蔔子炒香附鹽水炒栝蔞仁乾葛桔梗去蘆苦杏仁去皮黃芩酒炒神麯炒麥芽炒山楂蒸去子白豆蔻去殼前胡去蘆甘草各一兩上為細末用前浸四味藥水加竹瀝一碗泡蒸餅為丸如梧子大每服五六十丸或茶或薑湯送下一論健脾胃清火化痰頑痰能軟結痰能開疏風養血清上焦之火除胸膈之痰清頭目止眩暈千金化痰丸膽星四兩半夏薑礬牙皂同煮半日用四兩陳皮去白三兩白茯苓去皮二兩枳實麩炒一兩海石火煅一兩天花粉二兩片芩酒炒二兩黃柏酒炒二兩知母酒炒一兩當歸酒炒四兩天麻火煨三兩防風去蘆二兩白附子炮二兩甘草生三兩大黃酒蒸九次五兩白朮米泔浸炒四兩氣虛加人參八錢上為細末神麯二兩打糊為丸如梧子大每服七八十丸茶水送下一稱金一名金珠化痰丸治痰嗽如神又治勞嗽用半夏十斤米泔水浸十日換水三次取出切作兩半曬乾用白礬五斤水一桶入鐵鍋內化開將半夏入礬水內浸二十日取出切作四瓣曬乾用生薑十斤另研取汁再入半夏浸二十日取出曬乾為細末聽用粉草十斤去皮為粗末入鍋內添水煮數沸取出以布濾去渣將淨水仍入鍋內熬成膏子和成劑每病重者用藥二錢半輕者二錢金箔十張和一大丸與病人噙化忌房事此藥神效不可輕忽一治痰壅方梨汁一錢生薑汁半鍾蜜半鍾南薄荷末三兩上為勻重湯煮十餘沸任意食降痰驗如奔馬一論痰飲為病或狂或眩暈等症無不奏效白丸子中州傳明岐傳川南星四兩半夏十兩白附子五兩小川烏三兩上俱切片春七夏三秋八冬十日水浸一日一換日曬夜露南星半夏放瓷器內少加薑汁同浸去麻性次將前藥磨又將絹巾濾去渣澄白粉曬乾白米糊為丸如梧子大每服五六十丸薑湯滾水任下其藥放舌上不麻為度方妙釣痰仙方魯府祕方硼砂一錢白礬半生半焙一錢瓷青上細瓷器打下青研細一錢甜瓜蒂五分青礞石煅紅浸薑汁內一錢上共研細末每用二釐薄荷濃湯調入鼻內即愈一人氣短有痰小便赤澀足跟作痛尺脈浮大按之則澀此腎氣丸補飲也用四物送六味丸不月而康仲景先生云氣虛有飲用腎氣丸補而逐之誠開後學之蒙瞶濟無窮之夭枉腎氣丸即六味丸也一儒者體肥善飲仲秋痰喘用二陳芩連益甚加桑皮杏仁盜汗氣促加知母枳殼不時發熱余以為脾肺虛寒用八味丸以補土母補中益氣以安中氣而愈一婦人因怒吐痰胸滿作痛服四物二陳芩連枳殼之類不應更加祛風之劑半身不遂筋漸攣縮四肢痿軟日晡益甚內熱口乾形體倦怠余以為鬱怒傷肝脾氣血復損而然遂用逍遙散補中益氣湯六味地黃丸調治喜其謹疾年餘悉愈形體康健補中益氣湯見內傷六味丸八味丸俱見補益咳嗽脈辨咳嗽所因浮風緊寒數熱細濕房勞虛澀右關濡者飲食傷脾左關弦短疲極肝衰浮短肺傷法當咳嗽五臟之嗽各視本部浮緊虛寒沉數實熱洪滑多痰弦澀少血形盛脈細不足以息沉小伏匿皆是死脈惟有浮大而嗽者生夫咳謂有聲肺氣傷而不清嗽謂有痰脾濕動而生痰咳嗽者因傷肺氣而動脾濕也病本須分六氣五臟之殊而其要皆主於肺蓋肺主氣而聲出也戴云因風寒者鼻塞聲重惡寒者是也因火者有聲痰少面赤者是也因勞者盜汗出兼痰者多作惡熱肺脹者動則喘滿氣急息重痰者嗽動便有痰聲痰出嗽止五者大概耳亦當明其是否也治法須分新久虛實新病風寒則散之火熱則清之痰涎則化之濕熱則瀉之久病便屬虛屬郁氣虛則補氣血虛則補血兼鬱則開鬱滋之潤之斂之降之則治虛之法也一論四時感冒發熱頭痛咳嗽聲重涕唾稠黏中脘痞滿嘔吐痰水寬中快膈不致傷脾此藥大解肌熱將欲成勞痰嗽喘熱並效用參蘇飲紫蘇葉前胡桔梗枳殼去穰乾葛陳皮半夏湯泡白茯苓去皮各一錢甘草三分人參五分木香三分初病熱嗽去之上銼一劑薑棗煎服若天寒感冒惡寒無汗咳嗽喘急或傷風無汗鼻塞聲重加麻黃一錢杏仁一錢金沸草一錢以汗散之若初感冒肺多有熱加杏仁桑皮黃芩烏梅胸滿痰多加栝蔞仁氣促喘嗽加知母貝母肺寒咳嗽加五味乾薑心下痞悶煩熱嘈雜噁心停酒不散加薑炒黃連枳實乾葛陳皮倍用之鼻衄加烏梅麥門冬白茅根火盛發熱加柴胡黃芩頭痛加川芎細辛咳嗽吐血加升麻牡丹皮生地黃心熱咳嗽久不愈加知母麥門冬見血加阿膠生地黃烏梅赤芍牡丹皮吐血痰嗽加四物湯名茯苓補心湯妊娠傷寒去半夏加香附一論上氣喘逆咽喉不利痰滯咳嗽口舌乾渴二母清順湯天門冬去心一錢麥門冬去心一錢知母薑湯浸二錢貝母甘草湯洗二錢人參五分當歸身一錢枯芩一錢元參一錢山梔子炒一錢桔梗一錢天花粉一錢薄荷七分生甘草三分上銼水煎服清熱寧嗽化痰定喘丸橘紅五錢青黛三錢貝母七錢膽星一兩天花粉七錢桑白皮七錢杏仁去皮尖七錢桔梗七錢黃芩五錢前胡七錢甘草三錢上為細末煉蜜為丸如龍眼大每服一丸淡薑湯化下一論痰嗽服前方不效者多屬氣血虛弱四肢沉困宜八物湯加黃柏知母貝母門冬五味栝蔞紫蘇陳皮等分薑棗煎服一論咳嗽早間吐痰甚多夜間喘急不寐然早間多痰乃脾虛飲食所化夜間喘急乃肺虛陰火上衝以後方服之補中益氣湯方見內傷依本方加麥門冬五味子六味地黃丸方見補益依本方加麥門冬五味子一論傷風寒鼻流清涕寒噤噴嚏此脾肺氣虛不能實腠理以補中益氣湯主之一論咳嗽面白鼻流清涕此肺氣虛而兼外邪補中益氣湯加茯苓半夏五味而愈一論咳嗽吐痰失音聲啞此元氣虛弱而致也補中益氣湯加黃柏知母天門冬麥門冬五味杏仁黃芩栝蔞仁一論咳嗽吐痰手足時冷此脾肺虛寒以補中益氣湯加炮薑半夏一論聲音不出用新槐花不拘多少瓦上慢火炒焦置懷中袖中時時將一二粒口中咀嚼咽之使喉中常有味久聲自出一治言語不出用訶子三個真蘇子二錢杏仁二十個百藥煎二兩上為末每服二錢熱湯調服一治久嗽語音不出訶子去核一兩杏仁泡去皮尖一兩通草二錢上銼每服四錢煨薑五片水煎食後溫服一論年老人日久咳嗽不能臥者多年不愈用豬板油四兩蜂蜜四兩米糖四兩上三味熬化成膏時刻挑一匙口中噙化三五日其嗽自止一論久年咳嗽吐痰銀杏膏陳細茶四兩略焙為細末白果肉四兩一半去白膜一半去紅膜擂爛核桃肉四兩擂家蜜半斤上藥入鍋內煉成膏不拘時服一治久咳不瘥並虛勞喘嗽紫菀去蘆頭款冬花各二兩百部五錢上為末每服三錢生薑三片烏梅一個同煎湯調下食後臥睡時各一服一論久嗽並連嗽四五十聲者用連皮生薑自然汁一勺加白蜜二茶匙同放茶碗內煎一滾溫服三四次即止一切咳嗽上氣者一道士專賣此藥不拘新久皆效乾薑桂心紫色辛辣者去皮皂莢泡去皮子肥大無孔者上三味並另搗下篩了各稱分兩和合後更搗篩一遍煉白蜜搜和又搗一二千杵每服三丸如梧桐子大不限食之先後嗽發即服日進三五服忌蔥蒜油膩麵食一論年久近日咳嗽哮吼喘急等症神吸散國子博士顏心吾傳鵝管石火煅醋淬七次一錢餘糧石火煅醋淬七次一錢粉草三分枯白礬五分石膏煅五分款冬花五分上為細末每服三分二釐準稱至夜食後靜坐片時將藥放紙上以竹筒五寸長直插喉內用力吸藥速亦不怕吸藥令盡為度以細茶一口漱而咽之忌雞魚羊鵝一切動風發物並生冷諸物惟食白煮豬肉雞子戒三七日宜用公豬肺一副加肉半斤梔子一歲一個炒成炭桑白皮不拘多少用之同炒至熟爛去藥至五更病人不要開口言語令人將湯肺喂之病人嚼吃任用余者過時再食效一論久嗽痰喘百藥不效並年久不瘥者或能飲酒人久嗽尤效清金膏曲阜令孔桂窗傳天門冬去心八兩麥門冬去心四兩貝母四兩杏仁去皮四兩半夏薑製四兩上五味切片水熬去渣取汁五碗入白粉葛末四兩蜜一斤共煎汁入壇內重湯煮一日成膏取出每日無時頻頻服之一人時唾痰涎內熱作渴肢體倦怠勞而足熱用清氣化痰益甚余曰此腎水泛而為痰法當補腎不信另進滾痰丸一服吐瀉不上飲食不入頭暈眼閉始信余用六君子湯數劑胃氣漸復卻用六味丸月餘諸症悉愈一人咳嗽氣喘鼻塞流涕余用參蘇飲一劑以散寒邪更用補中益氣以實腠理而愈後因勞怒仍作自用前飲益甚加黃連枳實腹脹不食小便短少二陳四苓前症愈劇小便不通余曰腹脹不食脾胃虛小便短少肺腎虛也悉因攻伐所致投以六君子加黃耆炮薑五味二劑諸症頓退再用補中益氣加炮薑五味數劑全愈一治咳嗽祕方款冬花三錢石膏三錢硼砂七釐甘草三錢上為末吹入喉內用細茶漱下即好喘急脈滑而手足溫者生脈沉澀而四肢寒者死數者亦死為其形損故也肺受邪則喘手太陰肺專主外感無汗而喘屬表實有汗而喘屬表虛凡久喘未發扶正氣為要已發攻邪為主大概喘急甚者不可便用苦藥火氣盛故也一論外邪在表無汗而喘者五虎湯麻黃三錢杏仁去皮三錢石膏五錢甘草一錢細茶一錢有痰加二陳湯上銼一劑生薑蔥水煎熱服加桑白皮一錢尤良一論在裡邪實不便脈實而喘者三一承氣湯大黃芒硝厚朴枳實甘草加木香檳榔上銼生薑三片水煎熱服一論痰盛而喘者此治痰喘不能臥人扶而坐數日一服而安千緡導痰湯南星一錢半夏七個水泡破皮分四片赤茯苓枳殼麩炒各一錢皂角一寸炙去皮一錢甘草一寸炙上銼生薑一指大水煎服一論七情郁上氣而喘者用四磨湯人參檳榔沉香烏藥上四味各用水磨汁合一處溫服之三子湯治氣喘如神蘇子白芥子蘿蔔子水煎服立愈一論腹脹氣喘坐臥不得者宜服沉香散沉香二錢半木香二錢半枳殼麩炒三錢蘿蔔子三錢上銼一劑生薑三片水煎溫服一論喘急因內傷元氣氣不接續而喘者宜用補中益氣湯方見內傷一論陰虛火動火炎上攻而喘者宜此清離滋坎湯方見勞瘵一用六味丸加黃柏知母亦效一論虛陽上攻氣不升降上盛下虛痰涎壅盛喘促短氣咳嗽而喘者蘇子降氣湯蘇子三錢陳皮厚朴薑汁炒各一錢前胡肉桂各二錢半夏薑汁炒五錢當歸三錢甘草一錢上銼薑棗煎服一論凡人痰嗽氣喘宜服三子養親湯白芥子研八分蘿蔔子研八分南星水泡八分半夏水泡八分陳皮去白六分枳實炒六分片芩去朽八分赤茯苓去皮八分蘇子研八分甘草二分上銼一劑生薑三片水煎溫服一人體肥善飲仲秋痰喘用二陳芩連益甚加桑皮杏仁盜汗氣促加貝母枳殼不時發熱豫以為脾肺虛寒用八味丸見補血以補土母補中益氣湯接補中氣哮吼脈大抵浮而滑易治脈微而澀難治夫哮吼以聲響名喉中如水雞聲者是也專主於痰宜用吐法亦有虛而不可吐者治之有以紫金丹導痰小胃丹劫之而愈者有以六味地黃丸補中益氣湯兼進而愈者必須量虛實而治之也千金定喘湯治哮吼如神麻黃二錢桑白皮蜜制三錢杏仁一錢五分蘇子二錢白果二十一個炒款冬花三錢黃芩一錢五分炒半夏甘草水泡甘草各一錢上銼白水煎食遠服諸病原來有藥方唯愁齁喘最難當麻黃桑杏尋蘇子白果冬花更又良甘草黃芩同半夏水煎百沸不須薑病人遇此仙方藥服後方知定喘湯一論人素有喘急遇寒暄不常發則哮吼不已夜不能睡者用此蘇沈九寶湯紫蘇薄荷麻黃杏仁去皮尖桑白皮大腹皮官桂甘草上銼用生薑三片烏梅一個水一碗煎至八分食後服即效且住服惟慎勞碌戒厚味節欲日間常服些順氣化痰丸夜臥時服抑火潤下丸如除根須合六味地黃丸加黃柏知母人參紫菀五味子百合各二兩浮小麥粉熟蜜四兩糊為丸每服百丸空心柿餅湯送下餅隨食之二母丸治哮喘知母去皮毛二兩貝母去心二兩百藥煎一兩上為細末將烏梅肉蒸熟搗爛為丸如梧子大每服三十丸臨臥或食後連皮薑湯送下一論喘氣哮吼上喘不休或是鹽創水創肺竅俗謂之喘氣病用此祕方小薊草一把用精豬肉四兩入水同煮令熟食肉並湯立已其草三月生七八月有四稜莖葉尖杪有花子一論凡遇天氣欲作雨者便發齁喘甚至坐臥不得飲食不進此乃肺竅中積有冷痰乘天陰寒氣從背自鼻而入則肺脹作聲此病有苦至終身者亦有子母相作者每發時即服不過七八次覺痰腥臭吐出白色是絶其根也用此方紫金丹白砒一錢生用枯白礬三錢另研淡豆豉出江西者一兩水浸去皮蒸研如泥旋加二味末合勻上捻作丸如緑豆大但覺舉發用冷茶送下七丸甚者九丸以不喘為愈再發勿多增丸數慎之小兒服一二丸導痰小胃丹方見痰氣治哮吼經年不愈宜久久服之斷根一論哮喘氣急而不息者宜用均氣八仙湯麻黃二錢杏仁二錢石膏三錢桔梗一錢片芩二錢貝母一錢用北細辛三分煎湯拌炒三次為末生甘草一錢知母二錢上銼一劑水煎溫服一治上氣喘急經年咳嗽齁䶎久不愈遇發即服三五次永不再發奪命丹人言一錢白礬二錢白附子二錢南星四錢半夏泡五錢上先用人言與白礬一處於石器內火煅紅出火黃色為度切不可犯鐵器卻和半夏南星白附末生薑汁煮麵糊為丸黍米大硃砂為衣每服七丸小兒三丸井水化下忌食熱物哮吼靈祕丹海上異人傳膽南星二兩大半夏二兩用白礬五錢牙皂五錢同煅一夜不見白星赤茯苓去皮二兩苦葶藶二兩大貝母二兩沉香一兩青礞石硝煅五錢天竺黃二錢珍珠三錢豆腐煮羚羊角一支銼末烏犀角三錢白礬一兩硼砂一兩風化硝五錢花蕊石火煅五錢孩兒茶五錢款冬花一兩鉛白霜五錢上為細末煉蜜為丸如梧子大每服二三十丸臨臥薑湯送下外製六味地黃丸空心服百發百中真仙方也一治素患哮吼之病發則喘急痰涎上壅不時舉發令慎勞役戒厚味節欲早服六味丸加黃柏知母人參紫菀五味百合各二兩浮小麥粉熟蜜四兩打糊為丸每服百丸空心柿餅湯下餅隨食之夜臥時服後方各一料而愈千金定吼丸南星半夏各四兩用生薑牙皂各三兩煎湯浸星半一宿切片再加白礬二兩入湯內同星半煮至湯干去薑皂只用星半貝母枳實麩炒黃連薑炒黃芩酒炒連翹去心白附子天麻殭蠶炒桔梗栝蔞各一兩錦紋大黃酒拌九蒸九曬一兩青礞石用硝煅如金色者五錢沉香五錢上為細末竹瀝薑汁和為丸如彈子大每服一丸臨臥口噙化下或丸如黍米大薑湯送下亦可一人哮吼十數年發則上氣喘促咳嗽吐痰自汗四肢發冷六脈沉細此氣虛脾弱用黃耆二錢蜜水炒人參二錢白朮二錢去蘆白茯苓二錢去皮半夏二錢杏仁三錢五味子三分麥門冬二錢去心陳皮一錢五分甘草八分上銼薑棗煎服一人自幼患哮吼之病每逢寒即發發則上氣喘急咳嗽痰涎上壅年久不愈已成痼疾百藥罔效豫制此方一料全愈清上補下丸懷生地黃炒鍋內酒拌蒸黑四兩南棗酒蒸去核二兩懷山藥一兩五錢白茯苓去皮一兩五錢牡丹皮一兩五錢澤瀉一兩五錢遼五味子一兩五錢天門冬去心一兩五錢枳實麩炒一兩五錢貝母一兩五錢麥門冬去心一兩五錢桔梗去蘆一兩五錢黃連薑炒一兩五錢杏仁去皮一兩五錢半夏薑炒一兩五錢栝蔞仁去油一兩五錢枯芩酒炒一兩五錢甘草五錢上為細末煉蜜為丸如梧桐子大每服三錢空心淡薑湯送下瘧疾脈弦數滑實者順沉細虛微為逆瘧脈自弦微則為虛代散則死瘧症皆因先傷於暑後感於風客於營衛之間腠理不密復遇風寒閉而不出舍於腸胃之外與榮衛並行晝行於陽夜地於陰並則病作離則病止並於陽則熱並於陰則寒淺則日作深則間日在氣則早在血則晏按本經曰瘧脈自弦弦數者多熱弦遲者多寒弦短者傷食弦滑者多痰弦而緊者宜下浮大者宜吐弦遲者宜溫此治瘧之大法其病熱多寒少心煩少睡者屬心名曰溫瘧用柴芩湯但寒少熱腰疼足冷者屬腎名曰寒瘧用桂附二陳湯先寒而後大熱咳嗽者屬肺名曰疸瘧用參蘇飲熱長寒短筋脈拘縮者屬肝名曰風瘧用小柴胡湯加烏藥香附寒熱相停嘔吐痰沫者屬脾名曰食瘧用清脾飲瘧愈之後陰陽兩虛夢遺咳嗽不善保養遂成勞瘵若能清心養體節食避風如此調治無不愈矣一論瘧疾無汗要有汗散邪為主大凡瘧疾初起宜服此發散出汗立愈用此方散邪方川芎白芷麻黃白芍防風荊芥紫蘇羌活甘草上銼生薑三片蔥白三根水煎露一宿次早溫服有痰加陳皮有濕加蒼朮夾食加香附一論瘧疾有汗要無汗正氣為主宜用正氣湯柴胡八分前胡二錢川芎一錢五分白芷一錢五分半夏二錢麥門冬二錢檳榔一錢草果一錢青皮二錢茯苓三錢桂枝六分甘草八分上銼薑棗煎預先熱服一論瘧疾不論先寒後熱先熱後寒諸瘧通用清脾飲青皮去穰二錢厚朴薑炒八分白朮一錢五分半夏二錢薑炒柴胡八分黃芩二錢茯苓三錢草果一錢甘草八分上銼生薑五片水煎溫服一論諸瘧寒熱交作陰陽不分口乾發渴小便赤澀或作吐瀉用加減柴芩湯柴胡八分黃芩三錢半夏薑製二錢豬苓二錢蒼朮一錢五分青皮二錢厚朴薑炒八分檳榔一錢草果一錢烏梅二錢甘草八分澤瀉二錢上銼薑棗煎服一論五臟氣虛喜怒不節致陰陽相勝結聚涎飲與衛氣相搏發為瘧疾並治諸瘧四獸飲人參一錢五分白朮一錢五分白茯苓去皮三錢橘紅一錢半夏薑製二錢草果仁三錢烏梅去核二錢甘草八分生薑二片棗子四個上銼以鹽少許醃食頃用皮紙包裹甚厚以水濕之慢火炮令香熟焙乾每服一兩水一碗煎半碗溫服未發前連進數服神效一論人平素不足兼以勞役內傷挾感寒暑以致瘧疾寒熱交作肢體倦怠乏力少氣或瘧發經年不愈則氣血皆虛瘧邪深入名曰痎瘧此方主之加味補中益氣湯黃耆蜜炒二錢人參八分白朮去蘆八分陳皮六分當歸八分柴胡一錢升麻三分白芍八分黃芩一錢半夏制八分甘草五分上銼薑棗煎空心服有汗加桂枝五分倍黃耆熱甚倍柴芩渴加麥門冬天花粉一治傷暑發瘧宜服香薷散香薷四錢厚朴薑汁炒扁豆各一錢烏梅一錢上水煎臨熟入薑汁一匙溫服一論熱藥火盛舌卷焦黑鼻如煙色六脈弦洪而緊此乃陽毒內深先以青布摺疊數重新汲水浸之搭於胸上須臾更易如此三次熱勢稍退即服此藥龍虎湯柴胡一錢五分黃芩七分半夏七分石膏二錢五分知母一錢黃連一錢五分黃柏八分梔子八分粳米五十粒上銼薑棗煎服一治瘴瘧大熱煩躁宜用地龍飲子生地龍三條研入生薑汁薄荷汁生蜜各少許新汲水調和服如熱加龍腦少許一治虛弱之人患瘧初起感寒者宜五積散依本方用薑蔥煎服方見中寒一論體虛之人患瘧寒多久不愈者不可用截藥宜用分利順元散川烏一兩去皮半生半熟附子一兩去皮半生半熟南星二兩半生半熟木香五錢不見火上銼每服四錢生薑十片棗七枚水一碗煎七分當發早晨速進二三服半生半熟能分解陰陽也一論諸瘧不問先寒後熱或先熱後寒或寒熱獨作或連日併發或間日一發頭痛惡心煩渴引飲氣息喘急口苦咽乾諸藥不效者宜服此截之常山飲子常山二錢草果不去皮二錢知母二錢良薑一錢五分烏梅一錢五分甘草炙一錢上銼一兩一劑棗五個未發之前連進二服一論瘧疾夜發者乃陰經有邪宜散血中之風寒也用此麻黃桂枝湯麻黃一錢去節桂枝二錢黃芩一錢桃仁去皮三十個甘草炙三錢上銼水煎服桃仁散血緩肝之藥一久瘧腹中有癖用水磨沉香下雄黃解毒丸打下黑血如泥極臭是其驗也方見通治一海外高僧傳於周少峰治瘧疾不問新久虛實寒熱諸般鬼瘧邪瘧溫瘧瘴瘧一服立愈其效如神番木鱉即馬錢子去殼莢炒至黑色一兩黃雄一錢硃砂一錢甘草一錢上共為細末每服四分其瘧將發預先吃飯一碗將藥水酒調服蓋被臥即愈一治瘧先寒後熱熱多寒少或單熱不寒者桂枝五錢石膏一兩半知母一兩五錢黃芩一兩上銼水煎服一治瘧疾服藥轉加寒熱者知太陽陽明少陽三陽合病也小柴胡湯加石膏知母桂枝水煎服一治久瘧不能食胸中鬱郁欲吐而不吐以此吐之雄黃甜瓜蒂赤小豆各等分上為末每服五分溫水調下以吐為度一論久瘧積成癥瘕癖在胸脅之間諸藥不愈者宜咳瘧飲蒼朮米泔浸草果去皮桔梗青皮陳皮良薑各五錢白芷白茯苓半夏湯泡薑炒枳殼麩炒桂心蘇葉乾薑炮各三錢川芎二錢甘草炙三錢上每服一兩水煎入鹽少許空心服一治久瘧腹中痞塊用阿魏丸鱉甲醋炙五錢三稜醋浸炒莪朮醋浸炒香附子米泔浸各一兩陳皮五錢真阿魏五錢上為末醋糊為丸如梧子大每服三十丸淡薑湯送下一論瘧疾一日一發或二日一發或三五日一發或經三兩月或半年一載或誤用止截太過久不能愈者此元氣脾胃大虛以補中益氣湯方見內傷依本方加常山知母檳榔貝母一二劑自效已愈後去四味只用本方調理多服自然正氣盛邪氣自退矣一論患瘧寒熱用止截之劑反發熱惡寒飲食少思神思昏倦脈或浮洪或微細此陽氣虛寒以補中益氣湯方見內傷依本方參耆歸術各用三錢甘草一錢五分加炒乾薑炮附子各一錢一劑寒熱止數劑元氣復一論經年久瘧氣血俱虛而三日五日一發者以十全大補湯方見補益依本方蓋邪氣在陽分淺而易治邪氣在陰分深而難治宜多服為良一治三年久瘧不瘥用揀參乾生薑各五錢酒調服汗出立止一凡瘧後形體骨立發熱惡寒食少體虛補中益氣內參耆歸術各加二錢甘草一錢五分炮薑二錢一劑而寒熱止數劑而元氣復一婦人瘧久不已發後口乾倦甚用七味白朮散加麥門冬五味作大劑煎與恣飲再發稍可乃用補中益氣加茯苓半夏十餘劑而愈凡截瘧余常以參術各一兩生薑四兩煨熟煎服即愈或以大劑補中益氣加煨薑尤效生薑一味亦效一凡久瘧多屬元氣虛寒蓋氣虛則寒血虛則熱胃虛則惡寒脾虛則發熱陰火下流則寒熱交作或吐涎不食戰栗泄瀉手足厥冷皆脾胃虛弱宜補中益氣諸症悉愈若手足厥冷加大附子一婦人久患瘧瘧作則經不行形虛脈大頭痛懶食大便泄瀉小便林瀝口乾唇裂內熱腹脹蓋由久瘧正氣已虛陰火獨旺以益氣湯治之即愈惟不時頭痛加蔓荊子而止又兼六味丸而經行痢疾脈宜微小不宜浮滑大不宜弦急身寒則生身熱則死痢者古之滯下是也多由感受風寒暑濕之氣及飲食不節有傷脾胃宿積鬱結而成者也其症大便窘迫裡急後重數至圊而不能便腹中疼痛所下或白或赤或赤白相雜或下鮮血或如豆汁或如魚腦膿血相雜或如屋漏水此為感之有輕重積之有深淺也其濕熱滯積於血分則赤於氣分則白赤白兼下氣血俱受邪也雖有赤白二色終無寒熱之分通作濕熱治之但分新久更量元氣用藥凡痢初患元氣未虛必須下之下後未愈隨症調之痢稍久者不可下胃氣敗也痢多屬熱亦有虛與寒者虛者宜補寒者宜溫年老及虛弱人不宜下不便了而不了者血虛也數至圊而不便者氣虛也丹溪曰痢赤屬血自小腸來白屬氣自大腸來下痢不治症下如魚腦半生半死下若屋漏水者必亡下若塵腐色者必死下純黑者死下如竹筒直出者死下純紅者難治身熱脈大者死是亦大概言之耳小便絶不通為胃絶鎮國將軍丸治痢之總司也錦紋好大黃一斤切薄片分作四分聽用一分用川黃連去毛一兩切片水浸汁用拌大黃同炒乾為度一分用吳茱萸去梗一兩用水泡成汁拌大黃同炒乾為度一分用人乳汁浸拌大黃炒乾為度一分用童便浸大黃炒乾為度上四分共合一處為細末酒打米糊為丸如梧子大將一半三蒸三曬將一半曬乾各包聽用如白痢用吳茱萸煎湯送下三十丸半生半熟如赤痢用黃連煎湯送下三十丸半生半熟如赤白痢用吳茱萸黃連煎湯送下三十丸半生半熟一論赤白痢疾初起積滯不行裡急後重頻登圊而去少腹痛等症宜先用此下之香連化滯湯當歸尾一錢白芍一錢半黃連一錢去毛黃芩一錢去皮黃柏一錢去皮枳殼去穰麩炒一錢五分檳榔一錢木香一錢大黃三錢虛人用半滑石二錢甘草二分上銼水煎空心服下一論下痢白多不拘新久或用前藥復未愈者用此和之白朮和中湯當歸酒洗二錢五分白芍土炒一錢白朮去蘆土炒白茯苓去皮各二錢陳皮一錢黃芩炒一錢黃連炒八分紅者多加甘草五分木香少許上銼水煎食前服一論下痢紅多不拘新久或用前藥下後未愈者用此調之當歸調血湯當歸二錢五分川芎一錢白芍三錢黃連一錢黃芩一錢桃仁去皮另研一錢升麻五分上銼一劑水煎空心服如白痢加吳茱萸炒一錢芩連用酒炒赤白痢加白朮茯苓陳皮香附各一錢一治赤痢血痢痛不可忍又治血痔其效如神病雖垂殆一服即愈逐瘀湯阿膠炒枳殼麩炒茯神茯苓白芷川芎生地黃莪朮木通五靈脂炒盡煙赤芍生甘草桃仁去皮尖大黃上銼一劑水一盅半入蜜三匙再煎溫服一治素有積熱下痢白膿腹痛膨脹晝夜無度漸至大便閉結小便不通此三焦有實熱也服此即愈或下痢純紅或赤白相雜皆效清臟解毒湯黃連黃芩黃柏梔子大黃連翹滑石木通車前子海金沙枳實莪朮上銼水煎空心服一治脾疳泄瀉痢疾屬氣虛宜此加味六君子湯人參白朮去蘆白茯苓去皮黃耆各一錢懷山藥二錢砂仁研一錢甘草五分上銼一劑棗三枚水煎空心服如腹痛加炒黑乾薑木香各五分烏梅一個一論下痢赤白膿血相雜服痛裡急後重晝夜無度日久不愈不能起床不思飲食疲倦之甚或服寒涼峻利太過者宜加減補中益氣湯方見內傷依本方去柴胡加白芍炒澤瀉木香砂仁白豆蔻地榆御米殼醋炒三分一論曾經服推滌藥過多又服攻擊克伐等他藥所不效者以致形氣極弱去無休息積久惡候出者並與救之養臟復元湯人參三錢白朮去蘆炒一錢半白茯苓去皮一錢白豆蔻去殼研一錢乾薑炒黑一錢粟殼去蘆炒一錢半製附子五分烏梅二個木香一錢甘草炒五分上銼一劑北棗三枚水煎空心服渣再煎服謹節飲食一論噤口痢其疾有冷有熱有冷熱不調皆須先發散表邪如手心熱目赤是熱宜敗毒散加陳米煎服如手心冷及純下白痢者是寒宜用蓮肉不去心為末用米飲調服三錢敗毒散方見感冒又治疫痢發熱合境皆然者神效加白芍黃連尤效一治虛弱之人噤口痢飲食不下參苓白朮散方見內傷依本方加石蓮肉石菖蒲各一兩或有氣加木香五錢共為末每服二錢棗湯調下噤口痢粳米湯下休息痢砂糖送下一治下痢諸藥不效者以好醇酒半盞薑汁半盞倉米湯半盞三味合一處入陳干松菜一撮揉爛一併食之胃口立開如口不開用鐵箸撥開牙齒灌下立已一治噤口藥食俱不受用田螺數枚連殼搗爛入麝香少許調勻填滿臍內引熱下降服藥再不吐矣一治噤口痢食不下老倉米炒香熟為末淮鹽火煅每米粉三四匙鹽少許白滾水下一治下痢噤口點眼方黃賓江傳用首胎糞炙乾每一錢加雄黃一分胡黃連四分片腦少許共為細末篩點眼兩角一治下痢噤口傅明坡傳用首胎糞瓷器收入水銀養住入麝少許點眼角即能食一治下痢噤口胡養恆傳用雞一隻去毛糞切片入罐內用胡椒末五錢入水同煎用皮紙重重密封待熟用簪子刺孔令患痢人鼻孔聞之即立時思食一治下痢噤口飲食不下多是胃氣熱甚用黃連三錢人參一錢五分甘草五分一方加石蓮肉一錢上用水煎終日呷之如吐再強飲但得一呷下咽便好又方以稱錘燒紅用好醋淋令病人開口吸氣吞之即效一治痢疾發厄益元散有人參白朮煎湯送下頻服即止一治年老久痢不止肌瘦如柴晝夜苦楚命已垂危用人參一兩水煎服之鼻有微汗而蘇後用十全大補湯調理而安一治久痢休息不止百方不效用黃連末木香末十分之一豬腸頭去油入藥水煮爛搗為丸如梧子大每服五十丸空心米湯送下一人下痢小腹急痛大便欲去不去此脾胃氣虛而下陷也用補中益氣送八味丸二劑而愈此等症候因利藥致損元氣肢體腫脹而死者不可枚舉一人停食患痢腹痛下墜或用疏導之劑兩足腫脹食少體倦煩熱作渴脈洪數按之微細豫以六君子加薑桂各二錢吳茱萸五味各一錢煎熟冷服之即睡覺而諸症退再劑全安此假熱而治以假寒也一人嘔吐不食腹痛後重自用大黃等藥一劑腹痛益甚自汗發熱昏瞶脈大豫用參術各一兩炙甘草炮乾薑各三錢升麻一錢水煎一服而蘇又用補中益氣湯加炮乾薑二劑而愈一人痢後兩足浮腫胸腹脹滿小便短少用分利之劑遍身腫兼氣喘豫曰兩足浮腫脾氣下陷也胸腹脹滿脾虛作痞也小便短少肺不能生腎也身腫氣喘脾不能生肺也豫用補中益氣湯加附子而愈半載後因飲食勞倦兩足浮腫小便短少仍服前藥頓愈一人下血服犀角地黃湯等藥其血愈多形體消瘦發熱少食裡急後重此脾氣下陷余用補中益氣加炮薑一劑而愈一人血痢及下血不止以六味丸加地榆阿膠炒黃連黃芩生地黃一劑即效一人患痢後重自知醫用芍藥湯後重益急飲食少思腹寒肢冷豫以為脾胃虧損用六君子湯加木香炮薑三劑而愈泄瀉脈多沉傷於風則浮傷於寒則沉細傷於暑則沉微傷於濕則沉緩泄而腹脹脈弦者死又云脈緩時微小者生浮大數者死夫泄瀉屬濕屬氣虛有火有痰有食積有寒有脾泄有腎泄凡瀉水腹不痛者濕也飲食入胃不住完穀不化者氣虛也腹痛瀉水如熱湯痛一陳瀉一陳者火也或瀉或不瀉或多或少者痰也腹痛甚而泄瀉瀉後痛減者食積也肚腹痛四肢冷者寒也常常泄瀉者脾泄也五更泄者腎泄也宜分別而治也大概泄瀉因濕傷其脾者居多以胃苓湯加減主之一論中暑傷濕停飲夾食脾胃不和腹痛泄瀉作渴小便不利水穀不化陰陽不分者濕也胃苓湯主方蒼朮米泔浸厚朴薑汁炒陳皮豬苓澤瀉各一錢白朮去蘆炒二錢白茯苓一錢五分白芍炒一錢五分肉桂甘草炙各三分上銼一劑生薑三片棗二枚水煎溫服泄瀉稍久加升麻防風有熱者加酒炒黃連有寒者加炒乾薑暴泄水瀉加滑石食積加山楂神麯有痰加半夏烏梅氣虛加人參白朮氣惱加木香久泄加乾薑肉蔻暴痢赤白相雜腹痛裡急後重去肉桂加檳榔木香黃連水煎服一論泄瀉飲食入胃不住完穀不化者氣虛也益氣健脾湯人參二錢白朮一錢五分去蘆土炒白茯苓去皮三錢陳皮二錢白芍炒三錢蒼朮一錢五分米泔浸乾薑炒黑八分訶子煨二錢肉蔻麵裹煨六分升麻酒洗四分甘草炙八分上銼棗薑煎服腹痛加桂忌油膩一論泄瀉腹痛瀉水如熱湯痛一陳泄一陳者火也宜加味四苓散白朮一錢五分白茯苓去皮二錢豬苓二錢澤瀉二錢木通二錢梔子三錢黃芩二錢白芍三錢甘草八分上銼燈心十莖水煎空心服一論泄瀉或多或少或瀉或不瀉者痰也宜加味二陳湯陳皮二錢半夏薑炒二錢白茯苓去皮三錢蒼朮一錢五分厚朴薑汁炒八分砂仁八分山藥炒一錢半車前子二錢木通二錢甘草八分上銼一劑生薑三片烏梅一個燈心十莖水煎溫服一論泄瀉腹痛甚而泄瀉瀉後痛減者食積也用香砂平胃散蒼朮一錢五分陳皮二錢厚朴薑炒八分白朮一錢五分白茯苓去皮三錢半夏薑炒二錢砂仁一錢香附炒二錢神麯炒三錢白芍二錢甘草炙八分上銼生薑煎服一論劉草窗痛瀉要方傷食腹痛得瀉便減今瀉而痛不止故責之土敗木賊也白朮三錢炒白芍一錢炒陳皮炒錢半防風一錢上銼水煎溫服一論泄瀉肚腹痛疼四肢厥冷者寒也宜附子理中湯白朮一錢五分乾薑八分人參二錢白茯苓去皮三錢砂仁一錢厚朴薑汁炒八分蒼朮一錢五分米泔浸炒熟附子八分甘草炙八分上銼生薑水煎服一論泄氣弱易飽常便稀溏者此脾泄也用扶脾散蓮肉去心不去皮一兩半陳皮一兩白茯苓一兩白朮東壁土炒二兩麥芽炒五錢上為細末每服二錢白砂糖二錢白滾水送下補脾助元氣令人能食止渴一論滑瀉日夜無度腸胃虛寒不禁宜服八柱散人參二錢白朮一錢五分肉蔻煨二錢乾薑炒八分訶子煨二錢大附子八分麵裹煨去皮臍粟殼蜜水炒二錢甘草炙八分上銼一劑薑一片烏梅一個燈心一團水煎溫服補脾丸症治同前白朮去蘆十兩分四分一肉蔻二五味三故紙四吳茱萸各二兩拌炒去四味只用白朮蓮肉去心炒人參各一兩甘草白芍炒各五錢木香煨四錢山藥炒陳皮各七錢乾薑三錢炒上為細末煮粥加炒神麯末打糊為丸如梧桐子大每服百丸空心淡薑湯下不專治老人弱人脾泄飧泄俱中一論泄瀉脾腎虛弱清晨五更作瀉或全不思食或食而不化大便不實者此腎泄也凡飯後隨即大便者蓋脾腎交濟所以有水穀之分脾氣雖強而腎氣不足故飲食下咽而大腑為之飧泄也治法用二神丸主之二神丸破故紙四兩炒肉豆蔻二兩生用上為末用大紅棗四十九個生薑四兩切碎同棗用水煮熟去薑取棗肉和為丸如梧子大每服五十丸空心鹽湯下加吳茱萸泡炒一兩五味子一兩名四神丸治經年久泄不止者神效一人善飲便滑溺澀食減胸滿腿足漸腫症屬脾腎虛寒以金匱腎氣丸治之食進腫消更用八味丸胃強脾健而愈一人病泄每至五更輒即利此腎泄也用五味子散數服而愈因起居不慎泄復作年餘不瘥此命門火虛不能生脾土法當補其母火者土之母也遂用八味丸補其母瀉即止食漸進東垣云脾胃之氣盛則能食而肥虛則不能食而瘦全賴命門火為生化之源滋養之根也故用八味丸奏效只用六味丸亦可一論大便滑利小便閉澀或肢體漸腫喘嗽唾痰為脾腎氣血俱虛用十全大補湯方見補益送下四神丸一論腎虛久瀉不止用六味地黃丸加五味子破故紙肉豆蔻吳茱萸方見補益大抵久瀉多由泛用消食利水之劑損其真陰元氣不能自持遂成久瀉若非補中益氣湯四神丸滋其本源後必胸痞腹脹小便淋澀多致不起一人患泄瀉日久不止以致元氣下陷飲食入胃不住完穀不化肌肉消削肢體沉困面目兩足腫滿上氣喘急此元氣脾胃虛之甚也宜補中益氣湯方見內傷依本方減當歸加酒炒白芍茯苓澤瀉山藥蓮肉木香乾薑炒黑止泄瀉之良方也一泄瀉因內傷勞倦飲食化遲而瀉及脾胃素蘊濕熱但遇飲食勞倦即發而肢體痠軟沉困泄瀉者以益氣湯去當歸加炒芍茯苓蒼朮豬苓澤瀉薑棗煎服按上諸方治泄瀉有濕瀉有氣虛瀉有火瀉有痰瀉有食積瀉有土敗木賊瀉有寒瀉有脾瀉有脾胃瀉有元氣下脫瀉有腎瀉有虛寒滑脫久瀉不止者宜依病對方而用也一人食下即響響而即瀉不敢食一些食之即瀉諸藥不效以生紅柿核紙包水濕灰火燒熟食之不三四個即止一祕方治泄瀉用雞子一個將小頭破開入胡椒七粒紙糊頂煨熟好酒送下燒酒更好將胡椒完吞下一泄瀉二三日或腹疼痛生薑豆豉胡椒煎湯熱服即止一治暴泄不止小便不通車前子炒為末每服二錢米飲調下其根葉亦可搗汁服此藥利水道而不動元氣一治泄瀉用獖豬肚一枚淨洗去脂膜入大蒜在內以水煮爛搗膏入蒼朮泔制陳皮厚朴薑炒甘草炙各等分為末同杵為丸如梧子大每服三五十丸空心米湯下鹽湯亦可一治許州黃太守患泄瀉二三年不愈每飲燒酒三盅則止二三日以為常畏藥不治召余診之六脈弦數先服此藥以解酒毒後服理氣健脾丸加澤瀉而愈方見傷寒門宣黃連一兩生薑四兩上為一處以慢火炒令乾薑脆色去薑取連搗末每服二錢空心臘茶清下甚者不過二服專治久患脾泄一大便溏泄米穀不化用黃連酒炒白芍煨吳茱萸炒各等分上為細末用小米飯為丸如梧子大每服五六十丸空心米湯送下一治泄瀉手足冷不渴腹痛用人參白朮乾薑甘草水煎熱服中寒重者加附子一治久瀉大腸滑泄五倍子炒五兩為末麵糊為丸如梧子大每服五丸米飲下日三服六味丸金匱腎氣丸八味丸十全大補湯俱見補益補中益氣湯見內傷補遺三白散治一切泄瀉如神白朮去蘆炒一錢半白芍炒一錢五分白茯苓去皮一錢澤瀉一錢厚朴薑炒黃連炒各一錢乾薑炒五分烏梅肉煎用三錢丸用二錢如兼傷食加神麯炒麥芽炒各一錢上銼生薑三片水煎食前服為末神麯為丸服尤效霍亂脈大者生脈微弱而遲者死脈代者霍亂氣少不語舌卷囊縮者皆不治夫霍亂者揮霍變亂也其症心腹卒痛嘔吐下利發熱憎寒頭痛眩暈或瀉而不吐或吐而不瀉先心痛則先吐先腹痛則先瀉心腹俱痛則吐瀉俱作甚則轉筋頽頓手足厥冷死生反掌間耳治宜藿香正氣散加生薑為上不惟可以溫散風邪抑亦可以調理吐瀉蓋有吐有瀉名濕霍亂死者少也若上不得吐下不得瀉名乾霍亂而死者多也治之急須以鹽湯灌之令其大吐庶有可生者切莫與穀食雖米飲一呷入口即死必待吐瀉過二三時直至飢甚方可與稀粥慢慢調理可也轉筋不住男子以手挽其陰女子以手牽其乳近肱兩邊此千金妙法也一論四時不正之氣寒疫時氣山嵐瘴氣雨濕蒸氣或中寒腹痛吐瀉中暑冒風吐瀉中濕身重泄瀉或不服水土脾胃不和飲食停滯復感外寒頭痛憎寒或嘔逆噁心胸膈痞悶或發熱無汗者並治藿香正氣散藿香二錢紫蘇陳皮厚朴薑汁炒半夏薑汁炒白朮炒去蘆白茯苓去皮桔梗大腹皮白芷各一錢甘草五分上銼一劑生薑棗子煎服霍亂轉筋加木瓜二錢腹痛加炒白芍二錢寒痛加官桂八分冷甚加乾薑八分飲食不化心下痞悶加香附砂仁一錢米穀不化加神麯二錢中暑冒風加香薷一錢扁豆二錢時發憎寒壯熱加柴胡一錢乾葛二錢發熱加麥門冬二錢淡竹葉三錢口渴作瀉小便不利合五苓散濕熱相搏霍亂轉筋煩渴悶亂合黃連香薷散心腹絞痛加木香一錢若頻欲登圊不通利者加枳殼一錢一論霍亂之疾未有不由內傷生冷外感風寒而致也余用藿香正氣散治之百發百中一歲之內常治百人未有不效者但有熱者須加薑炒黃連六分寒甚者加乾薑八分萬無一失又腹痛加桂五分痛甚去藿香加吳茱萸四分小便不利加茯苓三錢如干霍亂加枳殼一錢白茯苓三錢官桂五分最佳一治虛弱之人上吐下瀉霍亂手足厥冷腹痛脈微者乃陰症也理中湯人參二錢白朮一錢五分乾薑炒八分甘草炙八分若為寒氣濕氣所感者加附子一錢名附子理中湯若霍亂吐瀉加青皮二錢陳皮一錢名治中湯若干霍亂心腹作痛先以鹽湯頻服候吐出即進此藥若嘔吐者於治中湯內加丁香五分半夏二錢生薑二片若泄瀉加橘皮茯苓名補中湯若溏瀉不已於補中內加附子一錢若不喜飲食米穀不化加砂仁八分附子八分陳皮二錢茯苓三錢若霍亂吐瀉心腹作痛手足厥冷去白朮加附子八分名四順湯若傷寒結胸先以桔梗湯再不愈及諸吐利後胸痞欲絶心膈高起急緊痛手不可近加枳實二錢茯苓三錢名枳實理中湯若渴者再於枳實理中湯加天花粉三錢渴欲飲水加白朮一錢五分若霍亂轉筋理中湯加火煅石膏三錢若臍上築者腎氣動也去白朮加桂五分腎惡燥故去白朮恐欲作奔豚故加官桂若悸多加茯苓三錢若腹滿去白朮加附子八分若飲酒過多或啖炙爆熱食發為鼻衄加川芎一錢五分若傷胃吐血以此藥能理中脘分利陰陽安定血脈一論轉筋霍亂上吐下瀉腹內疼痛及乾霍亂俗名絞腸痧真陰症手足厥冷宜服理中丸人參二錢乾薑炮八分白朮三錢甘草炙八分上為末煉蜜為丸每重一錢細嚼淡薑湯下忌食米湯此即理中湯改為丸取土能塞水之義若仍煎湯則不效矣一論乾霍亂者俗名絞腸痧其症因宿食不消心腹絞痛欲吐不吐欲瀉不瀉揮霍撩亂所傷之物不得泄出故也死在須臾急宜多灌鹽湯探吐之令物出盡卻服理中湯或理中丸亦可更刺十指出血並委中出血一霍亂身熱口渴此熱暑中也加減薷苓湯豬苓二錢澤瀉二錢香薷一錢乾葛二錢赤茯苓三錢上銼一劑生薑煎服如熱極加石膏二錢知母二錢泄極加升麻五分滑石三錢腹痛加炒芍藥二錢桂三分寒痛亦如此一霍亂吐瀉用生薑細切以新汲水調益元散燉熱服之即止一論霍亂吐瀉因飲冷或冒寒或失飢或大怒或乘車舟傷動胃氣令人上吐下瀉不止頭暈眼花手足轉筋四肢厥冷用藥遲緩須臾不救百沸湯吳茱萸五錢木瓜五錢食鹽五錢上三味同炒焦用沸湯煎之隨病人意冷熱服之一方用枯白礬為末每服一錢百沸湯煎點服一治傷食吐瀉腹脹順逆丹白朮去蘆土炒白茯苓去皮陳皮川厚朴去皮薑炒澤瀉各一兩豬苓八錢蒼朮米泔浸炒兩半神麯炒七錢麥芽炒七錢砂仁三錢木香三錢甘草五錢上為末煉蜜為丸如龍眼大每服一丸米湯研化下一治脾虛氣陷吐瀉煩渴用參朮散人參白朮炒用白茯苓去皮山藥藿香葛根升麻上為末每服二錢米湯調下一論霍亂已愈煩熱多渴小便不利宜麥門冬湯人參二錢白朮一錢五分白茯苓去皮三錢陳皮二錢半夏薑炒二錢麥門冬三錢去心甘草八分小茴香八分烏梅二錢上銼生薑五片水煎服一論乾霍亂上不得吐下不得利出冷汗欲絶者鹽一大把炒令黃入童便一碗溫和服之少頃吐下即愈一治霍亂吐瀉心腹作痛炒鹽兩碗紙包紗護頓其胸前並肚腹上截以尉斗火尉氣透則蘇續又以炒鹽尉其背則十分無事一治霍亂轉筋用皂角末吹一小豆入鼻中得吐即愈一霍亂轉筋用大蓼一握煎湯蕩洗北人以麥糖代之便腠理開泄陽氣散則愈河間云熱氣燥灼於筋則攣瘛而痛也一轉筋入腹欲死者生薑一兩搗爛以酒五杯煎服一霍亂上吐下瀉鄧對峰傳用韭菜搗汁一盞重湯煮熟熱服之立止一霍亂吐瀉腹痛服藥即吐無法可施用百沸湯半碗井泉水半碗合而服之即安名陰陽湯極效一治霍亂吐瀉樟樹皮一把煎湯溫服立止一霍亂不拘寒暑吐瀉不出腹痛煩躁謂之乾霍亂死在旦夕急將病人腿腕黃紋上蘸溫水拍打紫紅脈見以布針或瓷瓦刺破出紫血即愈一治霍亂吐瀉霍香梗一味水煎服立效一方加陳皮尤妙嘔吐脈滑數為嘔代者霍亂微滑者生澀數者凶斷嘔吐者飲食入胃而覆逆出也有聲無物謂之噦有物無聲謂之吐嘔吐謂有聲有物胃氣有所傷中氣不足所致也有外感寒邪者有內傷飲食者有氣逆者三者俱以藿香正氣散加減治之有胃熱者清胃保中湯有胃寒者附子理中湯有嘔噦痰涎者加減二陳湯有水寒停胃者茯苓半夏湯有久病胃虛者比和飲醫者宜審而治之也藿香正氣散方見霍亂治諸嘔吐照後加減一論外感寒邪嘔吐者依前方一論內傷飲食嘔吐者依前方加砂仁八分山楂二錢神麯二錢一論有氣逆嘔吐者依前方加木香八分砂仁八分白豆蔻八分一論胃虛有熱嘔吐者宜後方清胃保中湯藿香一錢白朮土炒一錢陳皮八分半夏薑炒八分砂仁五分黃連土炒一錢白茯苓三錢黃芩土炒一錢梔子薑炒二錢甘草四分加枇杷葉去毛一錢上銼一劑生薑三片長流水和黃泥攪澄清二盅入藥煮至一盅稍冷服氣逆吐甚加伏龍肝一塊因氣加香附炒一錢枳實麩炒八分白朮一錢心煩不寐加竹茹二錢酒傷脾胃加乾葛八分天花粉三錢白豆蔻八分一論嘔噦痰涎者加減二陳湯陳皮二錢半夏薑炒二錢白茯苓去皮三錢甘草八分人參二錢白朮一錢五分竹茹二錢砂仁八分山梔三錢麥門冬去心一錢上銼一劑生薑三片棗一枚水煎徐徐溫服一論水寒停胃作嘔吐者茯苓半夏湯白茯苓去皮半夏薑炒陳皮蒼朮米泔浸厚朴薑炒各一錢砂仁五分藿香八分烏梅一個乾薑炒三分甘草三分上銼一劑生薑三片水煎徐徐服一論陰症嘔吐或手足厥冷腹痛屬虛寒冷甚者附子理中湯方見中寒門一論久病胃虛嘔吐月餘不納水穀聞食即嘔聞藥亦嘔者比和飲人參一錢白朮一錢白茯苓去皮一錢藿香五分陳皮五分砂仁五分神麯炒一錢甘草炙三分上銼一劑用陳倉米一合順流水二盅煎沸泡伏龍肝研細攪渾澄清取一鍾生薑三片棗二枚同煎七分稍冷服別以陳倉米煎湯啜之日進藥二三服即止一論卒暴嘔吐虛弱困乏無力及久病人嘔吐飲食入口即吐者人參一兩切片水煮徐徐而服之立止一治胃氣冷飲食即欲吐白豆蔻五錢為末以好酒一盞微溫調服日三盞一治冷涎嘔吐陰症乾嘔吳茱萸湯泡炒一錢半生薑二片人參三分大棗五個上銼水煎食前服一治患嘔吐聞藥即嘔百方不效以伏龍肝為末水丸塞兩鼻孔卻服對症藥遂不再吐如神一治熱症嘔吐或憎寒發熱口苦小柴胡湯多加生薑人參或加烏梅一治胃熱而嘔吐欲知胃熱手足心皆熱者是竹茹湯半夏薑汁炒二錢乾葛二錢青竹茹四錢甘草八分上銼薑棗煎服或加前胡三分一治嘔吐屬熱者黃連薑炒一錢石膏二錢火煅上為末白滾水送下一治熱吐不止梔子炒黑朴硝各等分上為末每服二三茶匙白滾水送下一論大腸結燥嘔吐不止湯藥不入老人虛人多有此症幽門不通上衝竅門嘔吐泛滿之症法須先以蜜導煎通其幽門然後服藥蓋人身之氣上下周流下不通必宣其上如前吐法是也上不安必撤其下也藿香厚朴薑炒陳皮白朮去蘆炒白茯苓去皮各一錢砂仁炒五分枇杷葉擦去白毛三片甘草三分生薑一錢上銼水煎服一治嘔吐宿滯臍腹痛甚手足俱冷脈微細用附子理中湯一服益甚脈浮大按之而細用參附湯一劑而愈一論陰虛於下令人多嘔者乃諸陽氣浮無所依從故嘔咳氣喘以六味地黃丸鹽湯送下一嘔吐不食腹痛後重自用大黃等藥一劑腹痛益甚自汗發熱昏憒脈大豫用參術各一兩炙甘草煨薑各三錢升麻一錢水煎服而蘇又用益氣湯加炮薑一劑而愈翻胃脈浮緩者生沉澀者死脈澀而小血不足脈大而弱氣不足夫翻胃之症其來也未有不由膈噎而始者膈噎者喜怒不常憂思勞役驚恐無時七情傷於脾胃鬱而生痰痰與氣搏升而不降飲食不下血氣留於咽嗌五噎結於胸膈者為五膈法當順氣化痰溫脾養胃如陽脈緊而澀者為難治之症夫翻胃即膈噎膈噎即翻胃之漸大法有四血虛氣虛有痰有熱血虛者脈必數而無力氣虛者脈必緩而無力氣血俱虛者則口中多出沫但見沫大出者必死有熱者脈必數而有力有痰者脈必滑數二者可治血虛者則以四物湯為主左手脈無力氣虛者則以四君子為主右手脈無力糞如羊屎者斷不可治大腸無血故也痰以二陳湯為主寸關脈沉或伏或大有氣結滯通氣之藥皆可用寸關脈沉而澀大不可用香燥熱劑宜薄滋味又曰膈噎翻胃之疾得之六淫七情遂有火熱炎上之作多升少降又有外為陰火上炎翻胃者作陰火治之大便必結用童便竹瀝韭汁薑汁牛羊乳分別而用一論膈有十般之病其實同出一源皆因動性不能發泄則鬱於肝人之膈膜屬肝木否則木乘土位木曰曲直作酸然酸則能收塞胃脘因之而收小窒礙乃作膈症宜用此湯當歸活血潤膈湯當歸酒洗一錢半桃仁去皮尖一錢廣陳皮青色者八分川厚朴薑炒一錢黃連吳茱萸煎湯炒一錢大腹皮甘草湯洗一錢片白朮鹽水炒一錢紅花七分炙甘草三分善飲酒者加葛根上銼一劑水煎溫服按五噎名雖有五原其要在於氣弱血枯之人思慮勞欲而成者也氣弱則運化不開血枯則道路閉塞蓋心生血腎生氣任脈乃陰之母枯則精涸任脈不潤矣任脈循咽嗌胸中胃之三脘一直而下腎虛則丹田清氣不升故中焦失順下之化脾雖思味而愛食因升降不利而成噎矣宜絶欲以後精血須節順志以和心脾用當歸活血潤膈湯去白朮加人參一錢白豆蔻七個黃柏酒炒七分知母七分梔子炒一錢栝蔞仁炒一錢遠志甘草湯泡去心八分紅棗三個水煎服一論膈噎胸中不利大便結燥痰嗽喘滿脾胃壅滯此能推陳致新治膈氣之聖藥也人參利膈丸人參三錢當歸二錢藿香一錢五分厚朴薑汁炒一兩枳實麩炒一兩大黃酒蒸一兩木香一錢五分檳榔一錢五分甘草炙三錢上為末滴水為丸如梧子大每服五十丸溫水送下一論噎食轉食宜加減不換金正氣散蒼朮米泔浸一錢半陳皮去白二錢厚朴薑汁炒八分藿香三錢半夏薑汁炒二錢枳實麩炒二錢白朮去蘆一錢五分白茯苓去皮三錢白豆蔻去殼八分甘草八分黃連土炒六分上銼生薑三片煎服一論噎膈翻胃之症皆由七情之氣太過鬱則生火生痰而致病病則耗氣耗血以致虛氣虛不能運化而生痰血虛不能滋潤而生火或朝食而暮吐或暮食而朝吐或食已即吐者日久不愈誤投香燥攻克之藥過多以致危殆宜以補中益氣湯方見內傷依本方去柴胡升麻加半夏二錢白茯苓三錢白芍酒炒三錢枳實麩炒一錢神麯炒二錢黃連薑炒六分一翻胃不食脾胃虛弱不進飲食宜人倉丸丁香一兩砂仁一兩白豆蔻去殼一兩陳倉米六兩黃土炒米熟去土不用上為細末生薑自然汁為丸如梧子大每服百丸食後用淡薑湯送下有怒氣加香附子薑汁炒一兩一論五噎者氣憂勞食思也氣噎者心悸上下不通噫噦不得胸脅苦痛憂噎者天際苦厥逆心下悸動手足厥冷勞噎者苦氣膈脅下支滿胸中填塞令手足厥冷不能自溫食噎者食無多少胸中苦塞常痛不能喘息思噎者心悸動善忘目視䀮䀮皆憂恚嗔怒寒氣上攻胸膈五噎丸治胸中虛寒日久咽喉氣逆飲食不下結氣不消用人參五分白朮去蘆四分白茯苓四分陳皮四分細辛四分川椒五分吳茱萸五分大附子煨去皮臍四分桂心五分乾薑炒五分上為末煉蜜為丸如梧子大每服三丸酒送下日服三次保和丸治實熱翻胃陳皮半夏薑汁炒白茯苓去皮連翹神麯山楂肉蘿蔔子炒各三錢黃連薑炒二錢上為末稀米糊為丸胭脂為衣粟米大每服六七十丸人參煎湯入竹瀝同下一論胃反不受食食已即嘔吐出人參二兩白朮去蘆一兩半夏湯泡三兩生薑三兩白蜜一兩上五味㕮咀以水五升和蜜攪之二三百下煮取一升半分三次服之一論反胃嘔吐無常粥飲入口即吐困弱無力垂死者人參二兩咀片水煎頓服立效再用人參汁稀粥與服一治翻胃用六君子湯加炮薑白豆蔻黃連用吳茱萸酒拌過宿炒去茱萸一治轉食方反翅雞一隻煮熟去骨入人參當歸鹽各五錢為末再煮取與食之勿令人共食一人年過五十得噎症胃脘作痛食不下或食下良久復出大便結燥人黑瘦甚診其脈右關弦滑而洪關後略沉小二部俱沉弦帶芤此中氣不足木來侮土上焦濕熱鬱結成痰下焦血少故大便結燥陰火上衝吸門故食不下用四物湯以生血四君子湯以補氣二陳湯以祛痰三合成劑加薑炒黃連麩炒枳實栝蔞仁少加砂仁又間服潤腸丸百餘劑全安潤腸丸方見大便祕方一治翻胃用大附子一個最大者坐於磚上四面著火漸逼淬入生薑自然汁又依前火逼干復淬之約生薑汁可盡半碗許搗為末每服一錢用粟米湯下不過三服立效一治噎膈大便燥結橘杏麻仁丸陳皮為末杏仁去皮尖火麻仁去殼各三兩郁李仁去殼五錢上三仁俱搗為膏用棗肉和入石臼杵為丸每服五十丸枳實煎湯送下厄逆脈浮而緩者易治弦急按之而不鼓者難治脈急或促或微皆可治脈代者危右關脈弦者木乘土位難治發厄者氣逆上衝而作聲也一名厄逆因氣逆奔急上行作厄發聲有數者不同不可不辨有胃虛膈熱者宜桔皮竹茹湯有胃虛寒者宜丁香柿蒂湯有腎氣虛損陰火上衝者宜六味地黃丸有中氣不足者脈虛數氣不相續而發厄者宜補中益氣湯加生薑炒黃柏以降虛火或少加附子服之立愈有陽明內實失下而發厄者宜六一順氣湯下之有渴而飲水太過成水結胸而又發厄者宜小陷胸湯或用小青龍湯去麻黃加附子治水寒相搏發厄大妙有傳經傷寒熱症誤用薑桂等藥料助起火邪痰火相搏而厄逆者黃連解毒湯白虎湯及竹瀝之類治之一論厄逆因吐利後胃虛膈熱而厄逆者橘皮竹茹湯陳皮去白三分人參二錢甘草一錢炙竹茹一錢柿蒂一錢丁香五分上銼一劑生薑五片棗二枚水煎溫服身熱發渴加柴胡黃芩去丁香一論吐利後大病後胃中虛寒厄逆至七八聲相連收氣不回者難治丁香柿蒂湯人參二錢白茯苓二錢陳皮二錢良薑二錢丁香二錢柿蒂二錢甘草五分上銼生薑五片水煎服一論厄逆而無脈者用人參復脈湯人參二錢白朮一錢五分去蘆麥門冬去心二錢白茯苓去皮三錢五味子四分陳皮二錢半夏薑炒二錢竹茹四錢甘草八分上銼生薑五片水煎服一論人因飽食後得氣發厄逆連聲不止者宜順氣消滯湯陳皮二錢半夏薑炒二錢白茯苓去皮三錢丁香三分柿蒂二個黃連薑炒二分神麯炒二錢香附二錢白朮一錢五分竹茹四錢甘草八分上銼生薑五片水煎服一論腎氣虛損虛火上衝而作厄逆者自臍下上衝直出於口者難治六味地黃丸方見補益依本方作湯加柿蒂二個沉香八分木香一錢砂仁八分一論中氣不足脈虛微氣不相接續而作厄逆者宜補中益氣湯方見內傷依本方加麥門冬二錢五味子四分黃柏酒炒三錢少加附子六分制一論傷寒陽明內實失下而作厄逆者用六一順氣湯方見傷寒一論傷寒發熱而作厄逆者用蔓荊子炒不拘多少水煎服一論傷寒發渴而飲水太過成水結胸而發厄者用小陷胸湯黃連三錢半夏薑炒二錢栝蔞實三錢上銼一劑生薑三片水煎服一論傷寒表證未解心下有水氣乾嘔咳逆又治受寒喘嗽宜以小青龍湯桂枝八分乾薑八分細辛八分半夏二錢芍藥二錢五味子四分麻黃八分甘草八分上銼水煎服一論傷寒陽症厄逆潮熱小柴胡湯加生薑二片竹茹四錢橘皮二錢一論有傳經傷寒誤用薑桂等熱藥助起痰火而作厄逆者用黃連解毒湯方見感冒白虎湯方見傷寒一論因服攻病藥致傷胃氣下陷而元氣將離以致胃氣共丹田之氣疲敝或久病人而至於厄者乃三焦元氣與胃氣憊矣乃危急之兆也宜用大補元湯嫩黃耆蜜水炒一錢半揀參去蘆一錢五分白朮炒二錢懷山藥一錢廣陳皮七分石斛七分白豆蔻研六分沉香二分廣木香三分甘草炙七分上銼一劑生薑三片紅棗二枚粳米一撮水煎不拘時溫服一論一切厄逆用柿蒂燒存性為末酒調服立止一方每服用柿蒂七個焙為末用黃酒調下一嗅法治厄逆服藥無效者用硫黃乳香各等分為末以酒煎急令患人嗅之一方用雄黃二錢酒一盞煎七分急令患人嗅其熱氣即止一灸厄逆法見灸法一治噦逆欲死者其肺脈弱者不治用半夏生薑各一兩每服五錢水煎服一治咳逆連咳四五十聲者用薑汁半合蜜一匙共煎令熟溫服如此三服瘥噯氣噯氣嘈雜審右寸關緊滑可治弦急則難兩寸弦滑留飲胸間脈橫在寸有積上攔夫噯氣者胃虛火鬱之所成也因胃中有火治療之法虛則補之熱則清之氣則順之氣順則痰消也一論噯氣者胃中有火痰也宜用星半湯南星薑製二錢半夏薑製二錢石膏二錢香附二錢梔子炒三錢上銼一劑生薑煎服或以薑搗汁亦可蓋胃中有鬱火膈上有稠痰故也一論噯氣聲聞於外因氣胸膈悶有痰舌黑乃痰之症也宜服導痰湯陳皮二錢半夏薑炒二錢白茯苓去皮三錢白朮一錢五分去蘆香附二錢青皮去穰二錢黃芩炒二錢栝蔞仁三錢砂仁八分黃連薑炒二錢甘草八分上銼生薑三片水煎服一論婦人噯氣胸緊連噯十餘聲不盡噯出氣心頭略寬不噯即緊宜破郁丹香附四兩梔子仁炒四兩黃連薑汁炒二兩枳實麩炒一兩檳榔二兩莪朮制二兩青皮去穰一兩蘇子一兩栝蔞仁一兩上共為末水丸如梧子大每服三十丸食後滾水送下或以分心氣飲服之立效一上舍飲食失宜胸膈膨脹噯氣吞酸以自知醫用二陳枳連蒼柏之類前症益甚更加足指腫痛指縫出水余用補中益氣加茯苓半夏治之而愈若腿足浮腫或焮腫寒熱嘔吐亦用前藥吞酸脈弦而滑兩手或浮或弦或浮而滑或沉而遲或緊而洪或洪而數或沉而遲胸中有寒飲洪數者痰熱在胸膈時吐酸水欲成翻胃也夫酸者肝木之味也由火盛制金不能平木則肝木自甚故為酸也如飲食熱則易於酸矣或言吐酸為寒者誤也乃濕熱在胃口上飲食入胃被濕熱鬱遏食不得化故作吞酸如穀肉覆蓋在器濕則易於為酸也必用吳茱萸順其性折之方為得法一論吞酸嘈雜酸水刺心者乃痰火鬱氣也宜清郁二陳湯陳皮半夏薑炒茯苓香附黃連薑炒梔子炒各一錢蒼朮米泔浸川芎枳實炒各八分神麯炒三錢白芍炒七分甘草二分上銼一劑生薑煎服一論鬱結吐酸者用茱連丸蒼朮米泔浸一兩陳皮一兩半夏薑炒一兩白茯苓去皮一兩黃連一兩半薑炒夏月倍用吳茱萸炒一兩冬月倍用上為細末蒸餅為丸如緑豆大每服三五十丸食後白滾水送下一論噫氣吞酸嘈雜有痰有熱有氣有食胸膈不寬飲食不化以香蔻和中丸白朮去蘆炒山楂肉連翹各四兩萊蔔子炒五錢白茯苓去皮枳實去穰麩炒陳皮去白半夏薑汁炒神麯炒各二兩乾生薑一兩白豆蔻炒五錢木香五錢上為細末神麯糊為丸如梧桐子大每服百丸食後白滾湯送下一論婦人心酸乃痰飲積在脾胃間時時酸心或吐水用吳茱萸丸大麥芽炒五錢肉桂五錢吳萸一兩鹽水洗蒼朮米泔浸一兩陳皮去白五錢神麯炒五錢上為細末稀粥為丸如梧桐子大每服五六十丸米飲送下一論酸心每酸氣上攻如釅醋不可當者用吳茱萸一合水一盅煎七分頓服縱濃亦須強飲曾有人心如螫破服此方立效一治口吐清水用蒼朮二錢壁土炒白朮一錢半去蘆炒陳皮一錢五分白茯苓三錢滑石炒三錢水煎服一儒者四時喜極熱飲食或吞酸噯腐或大便不實足指縫濕癢此脾氣虛寒下陷用六君子湯加薑桂治之而愈稍為失宜諸疾仍作用前藥更加附子錢許數劑則不再發一婦人吞酸噯腐嘔吐痰涎面色純白或用二陳黃連枳實之類加發熱作渴肚腹脹滿豫曰此脾胃虧損末傳寒中不信仍作火治肢體腫脹如蠱余以六君加附子木香治之胃氣漸醒飲食漸進虛火歸原又以補中益氣加炮薑木香茯苓半夏兼服全愈一治食後吐酸水用乾薑吳茱萸各二兩為末每服方寸匙酒調服日二服胃冷者服之立效嘈雜夫胃為水穀之海無物不受若夫濕面魚腥水果生冷以及烹飪不調黏滑難化等物恣食無節朝傷暮損而成清痰稠飲滯於中宮故為嘈雜噯氣吞酸痞滿甚則為翻胃膈噎即此之由也夫嘈雜之為症也似飢不飢似痛不痛而有懊憹不自寧之況者是也其症或兼噯氣或兼噁心或兼痞滿漸至胃脘作痛實痰火之為患也治法以南星半夏橘紅之類以消其痰芩連梔子石膏知母之類以降其火蒼朮白朮芍藥之類以健脾利濕壯其本元又當忌口節欲無有不安者也一論嘈雜乃痰因火動也宜化痰清火湯南星薑炒二錢半夏薑炒二錢陳皮二錢黃連六分黃芩二錢梔子三錢知母一錢五分石膏二錢蒼朮一錢半米泔浸白朮一錢五分白芍炒二錢甘草八分上銼生薑煎服一論嘈雜因血虛而作者宜養血四物湯當歸三錢川芎一錢五分白芍炒二錢熟地黃薑炒四錢人參二錢白朮去蘆一錢五分白茯苓去皮二錢半夏薑炒二錢黃連薑炒六分梔子三錢甘草八分一方去人參加香附二錢貝母二錢上銼生薑煎服一論婦人心胸嘈雜多是痰症或云是血嘈而用豬余血炒食之則愈此以血導血歸原耳此方治中脘心腹冷痰心下嘈雜口出清水脅肋急腹滿痛不欲食此胃氣虛冷脈沉遲弦細宜此旋覆花湯陳皮半夏薑炒赤茯苓旋覆花去皮人參白芍炒細辛桔梗官桂甘草上銼生薑七片水煎服一論婦人心胸嘈雜用茯苓補心湯即四物湯合參蘇飲是也一治心中嘈雜坐臥不寧蔡完體傳陳皮一錢半夏八分白茯苓錢半赤茯神八分酸棗仁炒八分益智仁三分麥門冬去心一錢甘草二分上銼一劑生薑水煎半空心溫服一人多思慮以致血虛五更時嘈雜是也宜以四物湯加香附山梔黃連貝母一肥人嘈雜宜用二陳湯少加川芎蒼朮炒梔子水煎服一論嘈雜者痰水內動如阻食在膈令人不自安也用痰火越鞠丸海石研水飛三兩膽星二兩栝蔞仁三兩山梔炒黑三兩青黛水飛過八分香附童便浸二兩蒼朮米泔浸透搓去黑皮切片炒二兩撫芎二兩上各等分為細末湯泡蒸餅為丸如緑豆大每服百丸臨臥白湯送下一論嘈雜屬鬱火者宜加味三黃丸黃芩二兩去朽酒炒黃連六錢去毛薑炒黃柏一兩五錢去皮童便炒香附二兩米醋浸透炒蒼朮一兩五錢米泔浸透搓去黑皮切片炒上各等分為細末打稀糊為丸如緑豆大每服七八十丸臥時清茶送下諸氣下手脈沉便知是氣沉極則伏澀弱難愈其或沉滑氣兼痰飲病也人稟天地陰陽之氣以生藉血肉以成其形一氣周流於中以成其象形神俱備乃為之全人故氣陽而血陰能溉周身而無一毫之間斷也血則隨氣而行氣載乎血者也有是氣必有是血有是血必乘乎是氣二者行則俱行一息有間則病矣今之人不知忿怒驚恐悲哀而損其身憂愁思慮以傷其氣故人之病多從氣而生致有中滿腹脹積聚喘急五膈五噎皆由於氣也一論男子婦人一切氣不和多因憂愁思慮忿怒傷神或臨食憂戚或事不隨意使抑鬱之氣留滯不散停於胸膈之間不能流暢致心胸痞悶脅肋虛脹噎塞不通噯氣吞酸嘔噦噁心頭目昏眩四肢倦怠面色痿黃口舌乾枯飲食減少日漸消瘦或大腸虛閉或內病之後胸中虛痞不思飲食並皆治之分心氣飲青皮去穰二錢陳皮二錢半夏二錢薑炒白茯苓去皮二錢木通二錢官桂五分赤芍二錢桑白皮三錢大腹皮三錢紫蘇一錢羌活二錢甘草八分上銼作劑生薑三片棗一枚燈心十莖水煎溫服性急加柴胡多怒加黃芩食少加砂仁神麯咳嗽加桔梗半夏胸膈痞悶加枳實香附三焦不和加烏藥氣閉加蘿蔔子枳殼氣滯腰疼加木瓜枳殼上焦熱加黃芩下焦熱加梔子翻胃加沉香磨服水氣面目浮腫加豬苓澤瀉車前木瓜葶藶麥門冬氣塊加三稜莪朮一方去赤芍羌活加枳殼桔梗木香檳榔香附莪朮藿香治憂思鬱怒諸氣一論七情之氣結成痰涎狀如破絮或如梅核在咽喉之間咯不出咽不下或中脘痞悶氣不舒快或痰涎壅盛上氣喘急或因痰飲噁心嘔吐等症加味四七湯半夏湯泡五兩白茯苓去皮四兩川厚朴薑炒三兩紫蘇二兩桔梗二兩枳實麩炒二兩甘草一兩上銼作十劑生薑七片棗一枚水煎熱服一方治梅核氣加檳榔一論一切氣滯心腹飽悶疼痛脅肋脹滿難消嘔吐酸水痰涎不利頭目昏眩並食積酒毒及米穀不化或下痢膿血大小便結滯不快風壅積熱口苦煩躁涕唾稠黏此藥最能流濕潤燥推陳致新滋陰抑陽破結散郁活血通經治氣分之聖藥也宜此利氣丸大黃生用六兩黑醜頭末六兩木香一兩檳榔一兩枳殼麩炒一兩香附末炒四兩青皮去穰一兩陳皮去白一兩莪朮煨一兩黃連一兩黃柏三兩上為細末水丸梧子大每服六七十丸或百丸臨臥淡薑湯送下以利為度如不利加丸數通利則愈瑞竹堂加黃芩當歸各一兩一論脾胃不和過食生冷油膩麵粉濕面停滯不化胸膈滿悶嘔逆噁心腹脅膨脹心脾疼痛憎寒壯熱或面目四肢浮腫甚至臟腑悶澀上氣喘息臥睡不安俱是因氣所傷寒氣咽氣膈氣滯氣氣痞氣癖氣塊一切氣並治用此沉香化氣丹香附子一斤炒內四兩生用黑牽牛頭末八兩蒼朮米泔浸炒四兩青皮去穰炒五兩陳皮五兩山藥二兩枳殼麩炒二兩枳實麩炒二兩川厚朴薑汁炒一兩三稜煨二兩莪朮煨二兩紫蘇煨二兩木香一兩沉香七錢半丁香三兩丁皮二錢二分官桂五錢乾薑一兩砂仁一兩良薑一兩白豆蔻去殼一兩南星泡一兩半夏泡一兩人參五錢草果去殼一兩五錢檳榔一兩白茯苓去皮一兩石菖蒲二兩蘿蔔子炒一兩神麯炒二兩山楂去子二兩上為細末醋糊為丸如桐子大每服五十丸臨臥淡薑湯送下膀胱疝氣空心鹽湯下如要大便通利漸加至百丸仍看老幼盛衰增減丸數此藥蠲積聚化滯氣逐利病原立見神效藥性溫平不損元氣常服三五丸疏風順氣和胃健脾消酒化食寬中快膈消磨痞塊孕婦不宜服一論男婦中風中氣牙關緊閉口眼喎斜不省人事並傳尸骨蒸勞瘵卒暴心疼毒厲瘴瘧小兒急慢驚搐婦人産後中風赤白痢疾一切急暴之症最能順氣化痰神效蘇合香丸沉香木香丁香白檀香安息香酒熬膏各一兩麝香三錢香附末白朮去蘆訶子肉蓽茇各一兩犀角銼屑二錢硃砂一兩片腦蘇合油入安息香膏內各五錢上將各味切片研為細末入腦麝安息香蘇合油同藥拌勻煉蜜為丸每丸稱過一錢用蠟包裹每用大人一丸小兒半丸去蠟皮以生薑自然汁化開擦牙關另用薑湯少許調藥灌下一人飲酒大醉後氣往外仰頭出不盡有出氣無收氣此乃氣不歸元死在須臾諸藥不效余以韭菜根捶爛入陳釅醋炒熱絹包尉臍下此一包冷了又另換一包尉至臍下溫暖氣漸降而歸元矣妙不可言痞滿脈來堅實者順虛弱者逆痞滿與脹滿不同脹滿是內脹而外亦形痞則內覺痞悶而外無脹急之形也蓋由陰伏陽蓄氣血不運而成位心下之中腹滿痞塞皆土邪之所為耳有因誤下裡氣虛邪乘虛而入於心之分野有因食痰積不能施行而作痞者有濕熱太甚上來心下而為痞者治之用黃連黃芩枳實之苦以泄之生薑半夏厚朴之辛以散之人參白朮之甘溫以補之茯苓澤瀉之鹹淡以滲之大概與濕同治使上下分消可也一論按之堅而軟無塊為痞多是痰氣鬱結或飲食停滯者加味二陳湯陳皮二錢半夏薑炒二錢枳實麩炒一錢黃連薑炒六分山楂去子二錢木香八分青皮去穰二錢白茯苓去皮三錢砂仁八分甘草八分上銼生薑煎服一論痞滿宜調中補氣血清痞清熱攻補兼施簡而當也平補枳朮丸白朮去蘆土炒三兩白芍酒炒一兩陳皮枳實麩炒黃連酒炒各一兩人參木香各五錢上為細末荷葉煎湯打米糊為丸如梧子大每服五十丸食遠米湯下漸加至六七十丸一論內傷元氣脾胃而作心下痞者宜大補元氣也服加減補中益氣湯方見內傷如脈緩有痰而痞加半夏黃連脈弦四肢滿閉便難而心下痞加黃連柴胡甘草大便閉燥黃連桃仁少加大黃歸身心下痞醃悶加白芍黃連心下痞腹脹加白芍砂仁五味子天寒少加乾薑或官桂心下痞中寒者加附子黃連心下痞嘔逆者加陳皮生薑黃連夏月加黃連少加丁香藿香能食而心下痞加枳實三錢黃連五分如不能食心下痞者勿加之依本方食已心下痞服前枳朮丸而愈一論一切心下痞及年久不愈者宜用大消痞丸黃連土炒六錢黃芩土炒六錢枳實麩炒五錢半夏泡四錢陳皮四錢厚朴薑炒四錢豬苓四錢澤瀉四錢薑黃二兩乾生薑三錢人參四錢神麯五錢炒砂仁三錢甘草三錢炙白朮去蘆土炒一兩上為細末蒸餅為丸如梧子大每服五十丸漸加至百丸空心白滾湯送下一男子胸膈作痞飲食難化服枳朮丸久而形體消瘦發熱口乾脈浮大而微用補中益氣加薑桂諸症悉退唯見脾胃虛寒遂用八味丸補命門相火不月而飲食進三月而形體充此症若不用前丸多變腹脹喘促腿足浮腫小便淋澀等症急用加減腎氣丸亦有得生者一治痞悶氣結食積宜服內消丸青皮陳皮三稜煨莪朮煨神麯炒麥芽香附炒各等分上為細末醋糊為丸如梧子大每服三五十丸清茶送下一腹中窄狹須用蒼朮若肥人自覺腹中窄狹乃是濕痰流注臟腑氣不升降燥飲用蒼朮香附行氣如瘦人自覺腹中窄狹乃是熱氣熏蒸臟腑宜黃連蒼朮一論心下堅如盤者枳實麩炒一錢白朮去蘆三錢上銼一劑水煎溫服補中益氣湯方見內傷八味丸方見補益鼓脹經云其脈大堅以澀者脹也關上脈浮則內脹遲而滑者脹脈盛而緊者脹脹脈浮大者易治虛小者難治水病腹大如鼓脈實者生虛者死脈洪者生微細者死中惡腹大四肢滿脈大而緩者生浮而緊者死丹溪云七情內傷六淫外感飲食不節房勞致虛脾土之陰受傷轉輸之官失職胃雖受谷不能運化故陰陽不交清濁相混隧道壅塞鬱而為熱熱留為濕濕熱相生遂成脹滿經云鼓脹者是也以其外雖堅滿中空無物有似於鼓其病膠固難以治療又名曰蠱若蠱侵蝕之義陰陽愆伏榮衛凝滯三焦不能宣行脾胃不能傳布脹滿之所由生也曰谷脹曰水脹曰氣脹曰血脹謂之四病或寒或熱或虛或實又不可以無別也若久病羸乏卒病脹滿喘息不得與夫臍心突起或下痢頻數百方調治未見一愈者矣朝寬暮急者為血虛暮寬朝急者為氣虛朝暮俱急者氣血俱虛脈經曰胃中寒則脹滿此論內傷不足之邪乃久病也寒者非寒冷之寒乃陽虛之義故用參術以補脾為君蒼朮茯苓陳皮為臣黃芩麥門冬為使以制肝木少加厚朴以消腹脹氣不運加木香氣下陷加升麻柴胡提之血虛加四物湯有痰加半夏經云塞因塞用者是也病脹久脾胃虛者雖有大小便不利之症乃氣不運血不潤也當大補氣血為主慎不可用下藥也鼓脹為病多端宜照後方加減調治毋得執泥以誤人也一論病人初起心腹脹滿因於食傷脾胃濕痰氣鬱食積而作脹也用此通治之劑宜香砂和中湯藿香一錢二分砂仁一錢二分蒼朮炒一錢半厚朴薑汁炒廣陳皮去白半夏薑汁炒白茯苓去皮神麯炒枳實麩炒青皮去穰山楂肉各一錢白朮去蘆炒一錢半甘草三分上銼一劑生薑煎服一論脾虛鼓脹手足倦怠短氣溏泄者此調治脹滿王道之藥久病虛弱之人宜服六君子湯人參二錢白朮一錢五分去蘆炒白茯苓去皮三錢半夏薑製二錢陳皮去白二錢甘草八分上銼生薑煎服一方加當歸白豆蔻蘇梗尤妙按經曰塞因塞用故用補劑以治脹初服則脹久服則通此唯精達經旨者知之庸醫未足道也若朝寬暮急為血虛加當歸川芎暮寬朝急為氣虛依本方朝暮俱急亦加芎歸一論男婦因於氣惱而心腹脹滿或痰嗽喘急者豫常見因氣而作脹滿者甚多用此方甚效分心氣飲方見諸氣依本方加檳榔枳殼香附烏藥木香消脹丸治症同前木香二錢半檳榔五錢陳皮一兩大腹皮一兩洗枳殼麩炒一兩桑白皮一兩蘇子一兩香附子一兩炒蘿蔔子五錢炒上為細末水煮稀神麯為丸如梧桐子大每服五六十丸淡薑湯送下一論腹脹發熱以陽並陰則陽實而陰虛陽盛則外熱陰虛生內熱脈必浮數浮則為虛數則為熱陰虛不能宣導飲食如故因致脹滿者謂之熱脹宜用枳實分消湯川厚朴去皮薑汁炒五分枳實麩炒一錢半大黃酒蒸一錢半官桂一錢二分甘草炙一錢五分上銼一劑薑棗煎服嘔吐加半夏自利去大黃寒多加乾薑一論中滿鼓脹氣脹水脹熱脹宜中滿分消丸人參二錢半白朮去蘆炒二錢半薑黃二錢半豬苓去黑皮二錢甘草炙二錢砂仁二錢乾生薑二錢澤瀉三錢陳皮三錢知母去毛酒炒三錢白茯苓去皮三錢枳實麩炒三錢半夏薑炒三錢黃連薑汁炒二錢黃芩酒炒三錢川厚朴薑炒五錢上為細末水浸蒸餅為丸如梧子大每服百丸食遠白湯送下一論老人虛人中寒下虛心腹膨脹不喜飲食脈浮遲而弱此名寒脹宜朴香丸川厚朴薑汁炒五錢大附子泡去皮臍三錢八分木香一錢半上銼一劑生薑七片棗二枚水煎熱服一論中滿寒脹寒疝大小便不通陰躁足不收四肢厥逆食入反出下虛中滿腹脹心下痞下焦躁寒沉厥奔豚不收宜中滿分消湯益智五分半夏薑炒五分升麻二分茯苓五分木香三分黃耆炒五分吳茱萸炒五分川烏二分川朴薑炒五分草豆蔻五分人參三分澤瀉三分青皮去穰三分當歸五分柴胡二分黃連二分澄茄二分黃柏酒炒三分乾薑三分生薑三分上銼一劑水煎服房勞酒濕面生硬冷物等一切忌之一論中滿腹脹內有積聚如石堅硬令人坐臥不寧二便澀滯上氣喘促或通身虛腫宜廣朮潰堅湯川厚朴薑炒五分黃芩炒五分黃連五分益智仁五分草豆蔻五分當歸五分半夏薑炒七分蓬莪朮三分升麻二分紅花二分吳茱萸二分生甘草二分柴胡二分澤瀉三分神麯五分陳皮五發青皮去穰二分口乾加葛根四分上銼一劑生薑煎服食遠溫服忌酒醋濕面一論濁氣在上則生䐜脹清氣在下則生飧泄宜木香順氣湯木香三分厚朴薑炒四分青皮去穰五分陳皮五分益智仁五分澤瀉五分乾生薑五分茯苓五分半夏薑炒五分吳茱萸五分當歸五分蒼朮米泔炒五分升麻二分柴胡二分草豆蔻三分白朮一錢上銼一劑水煎溫服忌生冷硬物一治蠱脹黑醜頭末木香甘遂各一錢上為細末用豬腰一對俱分破將藥撒在腰子內合住紙包炭火燒熟空心或食一個或食二個大便行膿血見效一論血蠱腹如盆脹積聚痞塊宜化蠱丸三稜煨莪朮煨乾漆炒盡煙硇砂虻蟲糯米炒水蛭石灰炒琥珀肉桂牛膝去蘆酒炒大黃各等分上為末用生地黃自然汁和米醋調勻為丸如梧桐子大每服十丸空心溫酒服下童便亦可四炒枳殼丸治脾胃不和血氣凝滯腹內蠱脹枳殼四兩去穰切作兩指面大塊分四處一兩用蘿蔔子一兩炒去蘿蔔子不用一兩用蒼朮四兩炒去蒼朮不用一兩用乾漆一兩炒去幹漆不用一兩用小茴香一兩炒去小茴香不用上用炒枳殼四兩研末煮糊為丸如梧子大每服五十丸食後米湯下水腫水腫之症有陰有陽察脈觀色問症須詳陰脈沉遲其色青白不渴而瀉小便清澀脈或沉數色赤而黃燥糞赤溺兼渴為陽水腫氣急而小便澀血腫氣滿而四肢寒蠱症大要有二曰單腹脹曰雙腹脹喘急氣滿腫而不安四肢微腫此單腹脹因內傷七情所致取效微遲四肢浮腫肚大身重此雙腹脹因外感風濕所致取效甚速又有水腫氣腫之分以指按腫處有陷隨起隨起者氣腫先須理氣陷指起遲者水腫也只須導水立愈凡人年四十以上氣血壯盛者得效之後善自調理終身不發五十以後氣血稍衰調理不謹時或再復此藥尚能治之但屢復屢治而元氣耗則難為矣脈浮洪易治沉細難治浮洪者只用金不換木香丸沉細者兼用沉香快脾丸先服木香流氣飲一論諸氣痞滯不通胸膈膨脹口苦咽乾嘔吐不食或肩背腹脅走注刺痛及喘急痰嗽面目虛浮四肢腫滿大小便閉澀又治憂思太過怔忡鬱積腳氣風濕聚結腫痛喘滿脹急此藥調順營衛流通血脈快利三焦安和五臟凡治蠱脹宜先用此木香流氣飲木香七錢五分丁皮七錢五分藿香七錢五分半夏湯泡五錢五分人參五錢白朮去蘆五錢赤茯苓五錢厚朴薑炒一兩青皮去穰二兩陳皮四兩草果七錢五分檳榔七錢五分香附二兩紫蘇二兩大腹皮七錢五分木瓜五錢白芷五錢麥冬去心五錢莪朮煨七錢五分肉桂七錢半木通一兩石菖蒲五錢甘草一兩上銼一劑生薑三片棗二枚水一碗半煎至七分去渣熱服本方加沉香枳殼大黃去藿香石菖蒲名二十四味流氣飲蠱腫加白豆蔻腫滿加黑牽牛頭面腫加蔥白肚腹腫加枳實倍青陳皮臍至腳腫加桑白皮一論金不換木香丸治蠱腫之神藥也先服木香流氣飲三五劑通加白豆蔻次用金不換木香丸至收功後用沉香化氣丸調理或心頭煩熱者竹葉石膏湯熱甚加黃芩前賢論蠱腫之症有五不治者面黑如炭肚大青筋掌中無紋腳腫無坑臍中凸起此五症亦能治之間有得生者如敗下黑水者不治陽事不舉者不治其餘青黃紅紫皆能治之又一症或腫或消或作泄瀉知脾弱即瀉名曰洪水橫流服此宜之其腫自消其瀉自止忌一切生冷毒物油鹽醬醋魚鮓鵝鴨房事等件無有不效者金不換木香丸大戟五錢芫花炒五錢甘遂五錢黑醜頭末二錢生大黃五錢青皮五錢陳皮五錢南木香五錢青木香五錢胡椒一錢病合倍用川椒去目五錢檳榔五錢益智仁五錢射干三錢桑白皮五錢苦葶藶五錢炒大腹皮五錢澤瀉五錢木通去皮五錢連翹五錢砂仁五錢巴豆去殼半生半熟五錢上二十二味為末醋煮麵糊為丸如梧子大每服五十丸壯盛人加七八十丸第一消頭而腫五更初用蔥白酒送下第二消中膈胸腹腫五更初用陳皮湯送下第三消臍以下腳腫五更初用桑白皮湯送下沉香快脾丸青皮四錢陳皮四錢三稜煨四錢莪朮煨四錢蒼朮米泔浸炒四錢白朮去蘆四錢白茯苓四錢砂仁四錢草果仁四錢木香四錢沉香二錢丁香二錢藿香四錢良薑四錢大腹皮洗用四錢肉桂四錢連翹四錢商陸白的四錢黑醜頭末四錢殭蠶三錢神麯四錢麥芽四錢益智仁四錢雄附子五錢看病虛實實者不用上二十四味為末麵糊為丸如梧桐子大每服三四十丸仍照前用之第一五更蔥白湯下第二五更陳皮湯下第三五更桑白皮湯下沉香化氣丸治蠱常服調理青皮陳皮三稜莪朮煨人參白朮去蘆白茯苓山藥砂仁丁香木香沉香檳榔白豆蔻石菖蒲以上各用六錢官桂一兩蘿蔔子二兩黑醜頭末二兩八錢上為末醋糊為丸如梧子大每服五六十丸薑湯下一治前症服藥忌鹽醋一百日之後用藥開鹽法豬苓澤瀉白朮白茯苓肉桂鹽各等分上銼每用七錢用鯽魚一個破肚去淨腸雜將前藥入魚肚內加麝香少許入瓦內火焙黃色存性為末薑棗湯調服一論腹脹緊硬如石或陰囊腫大先用甘草煎湯一鍾熱服之後即用此藥敷之大戟芫花甘遂海藻各等分上為末醋糊和藥塗腫處一加椒目尤效按上諸方治諸鼓脹腫滿殊效其中有病人氣血虛不敢服者又有服之而不效者此皆得病日久或誤投攻擊藥太過以致脾胃元氣虛損之極宜服後諸方實有起死回生之功也一凡看蠱識症一朝腫暮消是陽蠱二朝消暮腫是陰蠱三腹上青筋起氣喘潮熱是氣蠱四四肢不收無肉肚大是食蠱五遍體腫肚不脹是翳油蠱六遍身潮熱是脾蠱七房室過多是腎蠱八泄瀉潮熱是腸蠱九衄望上下大小便不通是胃蠱一論水腫四肢頭面皆浮面腫或單腹鼓脹皆屬脾虛不能制水氣虛不能運化治之補元氣養心血健脾胃以培其本清濕熱平肝木利水道以治其標此藥主之行濕補氣養血湯人參二錢去蘆陳皮二錢當歸三錢川芎一錢五分白芍酒炒二錢白茯苓三錢蘇梗一錢不油白朮一錢五分去蘆川厚朴薑炒八分大腹皮三錢洗蘿蔔子三錢炒海金沙三錢木香八錢木通二錢甘草八分上銼薑棗煎服氣虛倍參苓術血虛倍芎歸芍小便短少加豬苓澤瀉滑石以消其腫也服後腫脹俱退惟面足不消此陽明經氣虛倍用白朮茯苓一論單腹蠱脹只宜補中行濕利小便切不可下宜用行濕補中湯人參二錢白朮麩炒二錢白茯苓三錢蒼朮米泔浸一錢五分陳皮一錢五分厚朴薑炒一錢黃芩二錢麥冬去心二錢澤瀉二錢氣不運加木香八分木通二錢氣下陷加柴胡八分升麻四分朝寬暮急血虛加當歸三錢川芎一錢五分白芍炒二錢香附二錢黃連薑炒六分去人參朝急暮寬氣虛倍參術朝暮急者氣血俱虛宜雙補之一論腫脹之症因內傷而得者或誤服攻擊克伐之劑以致元氣虛憊脾胃傷損腫脹尤甚於前此氣血兩虛腎水乾涸用此方以金匱腎氣丸兼進加味補中益氣湯黃耆炒二錢人參一錢白朮去蘆炒二錢白茯苓二錢陳皮八分柴胡四分升麻三分白芍酒炒一錢五分當歸酒炒三錢蘿蔔子炒三錢厚朴薑炒一錢甘草炙八分枳實麩炒八分上銼一劑生薑煎服一論脾腎虛腰痛腳腫小便不利或肚腹脹痛四肢浮腫或喘急痰盛已成蠱症其效如神此症多因脾腎虛弱治失其宜元氣復傷而變症者非此藥不能救也必以補中益氣湯早晚兼濟可收全功矣金匱腎氣丸懷熟地黃四兩白茯苓三兩牛膝去蘆酒炒一兩肉桂一兩澤瀉一兩車前子一兩山萸肉酒蒸去核一兩山藥一兩牡丹皮一兩大附子炮去皮臍五錢上為細末煉蜜為丸如梧桐子大每服百丸空心米飲送下臨臥時服補中益氣湯一論單腹脹及脾虛腫滿膈間閉塞或胃口作痛此補中有消之意也調中健脾丸黃耆蜜炙二兩人參去蘆二兩白朮黃土拌炒六兩白茯苓二兩陳皮鹽水炒二兩半夏泡七次三兩半蒼朮米泔浸炒二兩黃連吳茱萸浸水炒去茱萸二兩半香附童便浸炒三兩白芍炒三兩半蘇子炒一兩五錢蘿蔔子炒一兩半山楂肉炒三兩薏苡仁炒三兩沉香六兩另研澤瀉炒一兩半五加皮炒二兩草豆蔻酒炒一兩法制栝蔞一兩用大栝蔞二個鑲一孔每個入川椒三錢多年糞磏二錢敲米粒大外用棉紙糊再加紙筋鹽泥封固曬乾炭火煨通紅取出去泥要黑色一併入藥上為細末煎荷葉大腹皮湯打黃米糊丸如梧桐子大每服百丸日進三服白滾湯送下上方法制栝蔞多不便制豫每不用此味亦護奇功如有更妙按上諸方治腫脹屬虛皆宜用此王道之劑病者苦其腫脹難堪豫令朝服丸藥夕服湯藥或三朝五日間服蟠桃丸或石干散一服謂之下棋打劫而治病者暫抒一時之寬醫者一補一攻亦善治之良法也一人脾胃虛弱肚腹膨脹遍身腫按之成窠其脈沉細右寸為甚此脾胃虛寒之症治以八味丸或金匱腎氣丸以補腎陽行生化之源至暮服之小便通又數劑腫消即止前藥復與六君子湯加木香官桂炮薑以燥脾導氣而瘥後因不戒慎病作但有氣惱或飲食稍多即泄瀉仍用八味丸倍附子一儒者失於調養飲食難化胸膈不利或用行氣消導藥咳嗽喘促服行氣消導藥肚腹漸脹服行氣分利藥睡臥不能兩足浮腫小便不利大便不實脈浮大按之微細兩寸皆短此脾胃虧損朝用補中益氣加薑附夕用金匱腎氣加骨脂肉果各數劑諸症漸愈再佐以八味丸兩月乃能步履卻服補中益氣半載而康補遺蟠桃丸益國主祕傳治男婦渾身頭面手足浮腫肚腹脹滿疼痛上氣喘急千金不傳之妙沉香三錢木香三錢乳香三錢箬上炙沒藥三錢箸上炙琥珀一錢或五分白醜生用頭末八錢黑醜用牙皂煎濃汁浸半日鋪鍋底焙一半生一半熟取出研末八錢檳榔一兩一半生一半用牙皂煎汁浸透焙熟上為細末牙皂水打稀麵糊為丸如梧桐子大每服二錢七分五更晨砂糖煎湯送下石干散張靜虛道人治蠱脹神方薛兵巡傳石干一錢黑醜一錢頭末沉香五分木香五分檳榔一錢葶藶八分琥珀五分海金沙一錢上共為末聽用患者先服五皮飲一二帖然後服此末藥實者一錢虛者九分空心蔥白湯下隔一日一服輕者二帖重者不過三帖全愈後服健脾養胃之藥永不發也服藥要忌鹽葷腥二七則腸胃清病根拔一治腫脹仙方名金棗兒紅芽大戟一斤紅棗三斤水煮一日夜去大戟用棗曬食之立消一治水脹黑豆煮去皮焙乾為末每服二錢米飲調下一治腫脹仙方名天命飲白商陸根似人形者搗取汁一合生薑自然汁二合點黃酒一盞和勻空心服三日服一次元氣厚者服五次薄者三次忌鹽醬凡人年五十以里者可服五十以外者不必用一治腫病用粟米緑豆各一抄豬肝一葉切碎三味煮作粥食之至重者不過五次其腫自消忌氣惱生冷之物一治十種水病不瘥垂死者用青頭雄鴨一隻治如食法細切和米並五味煮極熟化粥食之一方用鯉魚一尾重一斤和蔥白冬瓜煮食之一方用癩蝦蟆一個入豬肚內煮食去蝦蟆將豬肚一日俱食盡一治蠱腫用田螺不拘多少水漂加香油一盞於水內其涎自然吐出取其涎曬乾為末每服不過三分酒調下其水自小便而下其氣自大便而出其腫即消即服養脾胃之藥為妙一治水氣腫滿腹脹者用黑白牽牛頭末每服二錢大麥面三錢水和為餅以火煨熟取食之茶湯送下一治十腫蠱脹輕者服此效苦丁香去梗微焙為末用棗肉為丸如梧子大每服二十丸空心米飲下行水日進二服一治十腫水氣五蠱脹氣其效如神一人患腹脹陰囊腫大不一劑而病愈真仙方也甘遂赤皮細花不蛀者不拘多少用蕎麥麵水和作厚餅內摻神麯末將厚紙包甘遂在內炭火中燒熟取出曬乾為末每服一錢二分以細面約一兩許合和水調幹作面片次用商陸二錢半巴豆一個去殼水一碗半砂鍋內煎至一碗去渣再入鐵鍋內入前面片煮熟食之其商陸湯任其意服與不服不在其限服不一二時水從大便出如是血蠱則下血氣蠱即下氣當時腫消若有喘嗽盡皆妥貼若腹中塊漸消散只一服見效忌鹽醬冬瓜香油葷腥之物半月後用鹽亦須炒過用之若蠱症加胡椒一錢與巴豆同煮其巴豆須看虛實加減其壯者加至一二個無不效積聚脈來大強者生沉小者死脈來附骨者積也在寸口積在胸中在關上積在臍旁在尺部積在氣衝脈在左積在左脈在右積在右脈兩出積在中央脈來小沉而實者脾胃中有積聚不下食食則吐積者生於五臟之陰也其發有根其痛有常處脈必結伏聚者成於六腑之陽也其發無根其痛無常處脈必浮結由陰陽不和臟腑虛弱四氣七情失常所以為積聚也久則為癥瘕成塊不能移動者是癥或有或無或上或下或左或右者是瘕氣不能成塊塊乃有形之物痰與食積死血此理曉然在中為痰飲右為食積左為死血治法咸以軟之堅以削之行氣開痰為要積塊不可專用下藥徒損其氣病亦不去當消導使之熔化其死血塊去須大補痞塊在皮裡膜外須用補藥宜六君子湯加香附枳實開之一論五積六聚癥瘕痃癖痰飲食積死血成塊者化堅湯白朮去蘆二錢白茯苓去皮三錢當歸三錢川芎一錢五分香附炒二錢山楂二錢枳實一錢陳皮二錢半夏薑炒二錢桃仁去皮尖十粒紅花八分莪朮一錢甘草八分上銼一劑生薑三片水煎服肉積加黃連六分面積加神麯二錢左有塊倍川芎一錢右有塊加青皮二錢飽脹加蘿蔔子三錢壯人加三稜一錢弱人加人參二錢一論五積六聚痰積血積食積氣積一切積塊或中或左或右或上或下久不愈者用之消積保中丸陳皮去白一兩半夏湯浸切片一兩白茯苓去皮二兩白朮去蘆炒二兩香附醋炒一兩青皮去肉四錢木香三錢不見火檳榔七錢莪朮醋炒八錢三稜醋炒八錢萊蔔子炒一兩砂仁炒四兩神麯炒一兩麥芽炒六錢白芥子炒一兩川芎八錢黃連薑炒一兩桃仁去皮尖一兩梔子仁薑汁炒一兩紅花五錢當歸酒炒一兩乾漆炒黃五錢真阿魏醋浸五錢上為細末薑汁酒打稀糊為丸如梧桐子大每服八十丸食後白湯送下體虛人加人參一兩外宜化鐵膏貼之一論五積六聚狀如癥瘕隨氣上下發作有時心腹疼痛上氣窒塞小腹脹滿大小便不利宜以大七氣湯三稜一錢莪朮一錢青皮二錢陳皮二錢桔梗八分藿香三錢益智仁一錢五分香附二錢肉桂八分甘草八分上銼一劑生薑三片棗一枚水煎溫服渣再煎服心脾痛加烏藥枳殼一論心腹堅脹脅下緊硬胸中痞塞喘滿短氣癥瘕積塊化痰飲寬胸腹順氣進食消脹軟硬用此三稜煎丸三稜生細銼半斤搗為末以酒三升於砂鍋內慢火熬成膏青皮去穰二兩蘿蔔子炒二兩神麯炒二兩麥芽炒三兩乾漆炒令煙盡三兩杏仁湯泡去皮尖炒黃色三兩硇砂用瓷盞細研入水調和坐於炭火上候水乾取出為末上為細末三稜膏為丸如梧桐子大每服十五丸加至二十丸食遠米飲送下一論男婦五積六聚七癥八瘕破一切血下一切氣宜消癥破積丸三稜煨乾漆炒去煙大黃煨硇砂入醋煎乾巴豆去油各一兩上為末醋糊為丸如緑豆大每服三丸至七丸空心米湯送下量虛實加減服之不可過服損人之真氣一論癥積心腹內結一塊如拳漸上撞心及腹脹痛保安丸大黃三兩酒浸一宿蒸焙乾薑炮一兩大附子炮去皮臍用五錢鱉甲醋煮一伏時炙黃色一兩五錢上為細末陳米醋一升煮取四五合和藥為丸如梧子大每服二十丸五更醋湯下天明時再服五丸去積如魚腸膿血爛泥而下一論虛弱之人腹內積聚癖塊脹滿疼痛面黃肌瘦肚大青筋不思飲食此藥消痰利氣扶脾助胃開胸快膈消痞除脹清熱消食久服積塊漸消大效加味保和丸白朮去蘆炒五兩枳實麩炒一兩陳皮去白三兩半夏泡薑炒二兩白茯苓去皮三兩蒼朮米泔浸炒一兩川厚朴薑炒二兩香附酒炒一兩神麯炒三兩連翹二兩黃連酒炒一兩黃芩酒炒一兩山楂肉三兩麥芽炒一兩蘿蔔子二兩木香五錢三稜醋炒一兩莪朮醋炒一兩上為細末薑汁糊為丸如梧子大每服五十丸加至七八十丸食後白滾湯送下一論五積六聚七癥八瘕或左或右或上或下或腹中有時攻作疼痛諸醫誤治以攻擊太過以致面黃肌瘦四肢困倦不思飲食等症宜以此方久服則元氣漸復脾胃健壯蓋養正積自除譬如滿坐皆君子縱有一小人自無容地而出此潔古之言豈欺我哉加減補中益氣湯黃耆蜜水炒一錢半人參一錢白朮去蘆炒一錢半白茯苓去皮一錢陳皮七分柴胡五分當歸酒炒一錢半夏泡薑汁炒七分山楂肉五分枳實麩炒五分厚朴薑汁炒七分甘草炙四分上銼一劑生薑三片棗一枚水煎溫服與前加味保和丸兼而服之久則病根自拔按上諸方虛弱人患積塊久不愈者宜用化鐵膏肥皂四兩熬膏生薑四兩蔥半斤蒜半斤皮硝半斤化水大黃末四兩入膏再熬貼塊上內服前方保中丸一治痞塊心下堅硬狀若覆杯者服此一料即愈三稜二兩莪朮二兩檳榔二兩草果二兩陳皮二兩枳殼二兩山楂二兩小茴一兩甘草一兩砂仁五錢木香五錢浮鐵皮五錢厚朴薑炒四兩沉香三錢枳實一兩神麯酒炒二兩麥芽炒二兩青皮二兩蒼朮米泔浸四兩收貯一男子腹內有痞者先以燙熱好醋將痞上洗淨量所患大小用面圈圈定用皮硝一升放入面圈內鋪定用紙蓋硝上尉斗盛火不住手尉俟硝化盡再用熱醋洗去用紅絹攤膏貼於患處用舊鞋底炙熱尉兩三次每七日一換貼藥重者不過三七腫血化去一小兒幼女患痞者釅醋熬硝洗之用紅絹攤膏貼患處一人將小兒雙手抱住肩上卻用木鱉子搗爛搽於雙腎上後用膏貼炙鞋底尉之覺腹內大熱為度一戴雷門夫人年近三旬患腹左有一大塊堅硬如石有時作痛肚腹膨悶經水不調或前或後或多或少或閉而不通白帶頻下夜間發熱脈急數豫以千金化鐵丸當歸酒炒一兩半白芍酒炒一兩半川芎七錢懷生地酒洗一兩半白朮去蘆炒一兩半白茯苓去皮一兩陳皮去白一兩青皮七錢半半夏薑汁炒一兩枳實麩炒七錢五分木香炒七錢五分香附炒一兩檳榔五錢蘿蔔子炒五錢三稜炒五錢紅花五錢乾漆炒令煙盡五錢桃仁去皮尖五錢莪朮醋炒一兩五錢硇砂為末瓷器內煨過五錢琥珀五錢上為細末醋打麵糊為丸如梧桐子大每服三錢白湯送下早晚各進一服服盡藥其塊潛消經水即調而後孕生一女也五疸脈經曰凡黃候寸口脈近掌無脈口鼻黑色並不可治大抵脈大者死微細者生無脈鼻氣冷者不治也凡渴欲飲水小便不利者必發黃也內經曰諸濕腫滿皆屬脾土夫黃疸為病肌肉必虛腫而色黃蓋濕熱鬱結於脾胃之中久而不散故其土色形於而與肌膚也蓋脾主肌肉肺主皮毛母能令子虛母病子亦病是故有諸中者必形諸外其症有五曰黃汗曰黃疸曰酒疸曰谷疸曰女癆疸雖有五者之分終無寒熱之異丹溪曰不必分五同是濕熱如盦曲相似故曰治濕熱不利小便非其治也又曰濕在上宜發汗濕在下宜利小便二法並用使上下分消其濕則病無有不安者也一論治腎疸目黃甚至渾身俱黃小便赤澀者宜腎疸湯羌活防風藁本獨活柴胡各五分白茯苓一錢澤瀉三分豬苓四分白朮五分神麯炒六分蒼朮一錢黃柏二錢人參三分葛根五分升麻二分甘草三分上銼一劑水煎熱服一論濕熱發黃汗黃尿赤及寒熱嘔吐而渴欲飲冷水身目俱黃小便不利不思飲食用茯苓滲濕湯豬苓澤瀉蒼朮米泔浸白茯苓陳皮枳實麩炒黃連炒黃芩梔子防己茵陳木通上銼生薑三片水煎服如飲食不思乃傷食加砂仁神麯麥芽炒各三分一論黃疸專屬濕熱飲症相似茵陳五苓散茵陳三錢白朮赤茯苓各一錢半豬苓澤瀉各一錢蒼朮山梔滑石各一錢二分官桂甘草各二分上銼燈心水煎服一論五疸俱是脾胃濕熱相蒸以致遍身發黃如梔子水染者是病延日久醫誤以寒涼之過損傷元氣脾胃以致身體黑瘦四肢沉困憎寒發熱不思飲食等症宜以加味益氣湯黃耆蜜炒一錢五分人參一錢白朮去蘆炒二錢陳皮八分當歸一錢柴胡五分升麻五分茵陳四分蒼朮米泔浸炒四分梔子炒四分豬苓四分赤茯苓一錢澤瀉四分黃連四分滑石四分甘草炙四分上銼生薑煎服以六味地黃丸加蒼朮白朮茵陳黃柏各二兩蜜丸相兼而進之一治發黃症身口俱發如金色小便如濃煮柏汁諸藥不效用加味解毒湯黃芩二錢黃連六分黃柏一錢五分梔子三錢柴胡八分茵陳二錢龍膽草二錢木通二錢滑石三錢升麻五分甘草八分上銼燈心煎服大便實加大黃二錢目睛黃倍龍膽草一治發黃脈沉細而遲體逆冷腰以上自汗宜以加味薑附湯茵陳二兩大附子一枚麩炒去皮臍乾薑炮一兩五錢甘草炙一兩上銼四劑水煎服一治黃疸安陵馬進覺傳極效露珠飲露珠即土豆形如薑搗爛取汁半碗溫服立效一治黃腫妙方王少川傳蒼朮一斤廣陳皮半斤川厚朴五兩草果一兩砂仁一兩青礬四兩茵陳穗半斤香附米一斤上青礬同香附米炒燒過俱為細末醋打麵糊為丸如梧子大每空心酒下薑湯亦可一治黃腫病最捷用此緑礬丸五倍子半斤炒黑緑礬四兩薑汁炒白針砂四兩醋炒紅神麯半斤炒黃上為細末生薑汁煮紅棗肉為丸如梧子大每服六七十丸溫酒下不能飲酒米湯下終身忌食蕎麵一論黃胖飲食無味四肢無力行步倦怠脈澀而遲或腹有積塊脹滿加減胃苓湯蒼朮一錢五分陳皮一錢五分厚朴薑炒八分豬苓澤瀉各二錢白朮一錢五分白茯苓三錢藿香三錢半夏薑炒二錢大腹皮三錢山楂三錢蘿蔔子三錢三稜一錢莪朮一錢青皮一錢甘草八分上銼生薑三片棗二枚水煎溫服一治黃疸倦怠脾胃不和食少小便赤宜以平胃散合五苓散加滑石一治黃腫腹中有積塊脹滿者退金丹山東李西嶺傳蒼朮酒炒八兩香附八兩青皮去穰三兩陳皮四兩良薑一兩厚朴薑炒三兩烏藥四兩三稜煨三兩莪朮煨一兩青礬八兩用百草霜同炒上為細末醋糊為丸如梧桐子大每服五十丸米湯送下一治酒疸食疸五積六聚七癥八瘕心腹疼痛潮熱等症不問大人小兒皆可用此紫金丸血竭二兩沉香一兩青皮二兩陳皮二兩枳殼去穰麩炒二兩五錢厚朴薑炒二兩百草霜一兩皂礬四兩用醋煮過蓬朮醋炒三兩香附去毛一兩針砂醋炒一兩乾漆炒過性二兩檳榔二兩黃石榴礬二兩即金絲礬是也蓁艽一兩三稜醋炒三兩甘草五錢一方加蒼朮白朮各一兩上為細末用大棗煮爛去皮核打糊為丸如梧桐子大每服六七十丸溫酒送下米飲亦可一治遍身發黃妄言如狂苦於胸痛手不可近此中焦蓄血為患宜用桃仁承氣湯打下瘀血即愈一治黃病愛吃茶者用白朮去蘆炒三兩蒼朮米泔浸三兩軟石膏煨一兩白芍炒一兩黃芩一兩薄荷葉一錢膽星一兩陳皮一兩上為細末砂糖水調神麯糊為丸如梧桐子大每服五六十丸砂糖水下一治黃病愛吃壁泥者用黃泥一斤砂糖四兩同泥炒乾上為細末黃連膏和為丸如梧桐子大每服五六十丸空心糖湯下一治黃病愛吃生米者陳皮白芍神麯炒麥芽炒山楂白茯苓去皮石膏各一錢厚朴七分蒼朮一錢二分藿香五分白朮一錢五分甘草三分上銼水煎熟入砂糖一蛤蜊殼食前服一治黃疸祕方大蝦蟆一個黑礬三錢豬肚一個上二味裝入肚內煮爛蝦蟆去骨用煮湯洗令肚淨吃之即愈一治五勞疸方四苓散合四物湯去川芎加茵陳麥門冬滑石甘草一治諸黃疸口淡怔忡耳鳴腳軟惡寒發熱小便白濁此為虛症用八味丸方見補益用四君子湯吞下一治黃疸病醫不愈耳目悉黃飲食不消胃中脹熱生黃衣蓋胃中有干糞為病用煎豬脂一小升溫熱頓服之日三次燥糞下去乃愈
