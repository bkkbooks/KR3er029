body:
  text: 卷五眩暈風寒暑濕氣鬱生涎下虛上實皆暈而眩其脈風浮寒緊濕細暑虛涎弦而滑虛脈則無治眩暈法尤當審諦先理痰氣次隨症治眩者言其黑暈言其轉冒言其昏眩暈之與冒眩其義一也其狀目閉眼眩身轉耳聾如登舟車之上起則欲倒蓋虛極乘寒得之亦不可一途而取軌也風則有汗寒則掣痛暑則熱悶濕則重滯此四氣乘虛而眩暈也喜怒哀樂悲恐憂思鬱而生痰隨氣上厥七情致虛而眩暈也淫欲過度腎家不能納氣歸原使諸氣逆奔而上此眩暈之出於氣虛也明矣吐衄崩漏肝家不能收攝榮氣使諸血失道妄行此眩暈之生於血虛也又明矣以至新産之後血海虛損或瘀不行皆能眩暈是可不推尋致病之因乎治法隨機應敵其間以升降鎮墜行焉最不可妄施汗下然而眩暈欲解自汗則有之若諸逆發汗劇者言亂目眩與夫少陰病下利止而頭眩時時自汗者此虛極而脫也識者將有采薪之憂清暈化痰湯主方治眩暈之總司也陳皮去白半夏薑汁炒白茯苓去皮各一錢半防風羌活各七分甘草三分枳實麩炒一錢川芎黃芩酒炒各八分白芷細辛南星薑汁炒各七分上銼一劑生薑三片水煎服以此作丸亦可氣虛加人參七分白朮去蘆一錢血虛加當歸倍川芎有熱加黃連姜炒七分一論頭旋眼黑噁心煩悶氣短促上喘無力言語心神顛倒目不敢開如在風雲中頭若裂身重如山四肢厥冷不得安臥此乃胃氣虛損停痰而致也半夏白朮天麻湯方見頭疼一論勞役之人飢寒眩暈者脈虛弱也補中益氣湯方見內傷依本方加半夏天麻白芍熟地黃一眩暈屬氣虛有濕痰者依本方去升麻柴胡加白茯苓川芎半夏大麻桔梗白芷一論陰虛火動眩暈者脈必數也清離滋坎湯方見癆瘵依本方加川芎天麻山梔竹瀝少許一論真陽不足上氣喘急氣短自汗眩暈欲倒如坐舟車手足冷脈沉細參附湯人參五錢大附子炮三錢上銼一劑生薑三片水煎熱服一論眩暈之症因氣虛痰火炎上故也清陽除眩湯人參六分白朮去蘆一錢白茯苓一錢陳皮一錢半夏湯泡一錢明天麻八分檳榔八分旋覆花八分甘草四分上銼一劑生薑三片水煎服一論肥白人日常頭旋目花卒時暈倒者名曰痰暈清痰祛眩湯天南星姜泡半夏薑汁製天麻蒼朮米泔浸川芎陳皮茯苓去皮桔梗枳殼去穰烏藥酒芩羌活各八分甘草三分上銼一劑生薑水煎臨服入竹瀝薑汁同服一論虛體之人一時為寒所中口不能言眩暈欲倒手足厥冷姜附湯乾薑一兩大附子生去皮臍一兩上銼每五錢水煎溫服一論一切失血過多眩暈不醒者芎歸湯川芎當歸各等分上銼一劑水煎服虛甚加炮過大附子一論氣血兩虛而挾寒作頭目眩暈者十全大補湯方見補益依本方如有痰加陳皮半夏一人氣短痰暈服辛香之劑痰盛遺尿兩尺浮大按之如無豫以為腎家不能納氣歸原香燥致甚耳用八味丸料三劑而愈八味丸見補益一人形體豐厚勞神喜怒面帶陽色口渴吐痰或頭目眩暈或熱從腹起左三脈洪而有力豫以為足三陰虧損用補中益氣湯加麥門冬五味及加減八味丸而愈大方痰暈湯法半夏一錢橘紅一錢赤茯苓一錢黃芩酒洗七分白朮一錢五分川芎五分黃連五分黃柏酒炒七分知母七分石膏一錢薄荷五分甘草炙五分上銼一劑生薑三片水煎臨臥服一生圓形體魁梧不慎酒色因勞怒頭暈仆地痰涎上湧手足麻痹口乾引飲六脈洪數而虛豫以為腎經虧損不能納氣歸原而頭暈不能攝水歸原而為痰陽氣虛熱而麻痹虛火上炎而作渴補中益氣合六味丸料治之而愈其後或勞役或入房其病即作用前藥而愈一孟都憲者氣短痰暈服辛香之劑痰盛遺尿兩尺浮大按之如無余以為腎家不能納氣歸原香燥致甚耳以八味丸料三劑而愈一孫都憲形體豐厚勞神喜怒面帶陽色口渴吐痰或頭目眩暈或熱從腹起左三脈洪而有力右三脈洪而無力余謂足三陰虧損用補中益氣加麥門五味及加減八味丸而愈十全大補丸見補益補中益氣湯見內傷八味丸六味丸俱見補益麻木脈浮而濡屬氣虛關前得之麻在上體關後得之麻在下體也脈浮而緩屬濕為麻痹脈緊而浮屬寒為痛痹脈澀而芤屬死血為木不在痛癢內經曰風寒濕三氣合而為痹故寒氣勝者為痛痹濕氣勝者著痹河間曰留著不去四肢麻木拘攣也經又曰痛者寒氣多也有寒故痛也其不痛不仁者病久入深榮衛之行澀經絡時疏故不痛皮膚不榮故為不仁夫所謂不仁者或周身或四肢唧唧然麻木不知痛癢如繩扎縛初解之狀古方名為麻痹者是也丹溪曰麻是氣虛木是濕痰死血然則曰麻曰木者以不仁中而分為二也雖然亦有氣血俱虛但麻而不木者亦有虛而感濕麻木兼作者又有因虛而風寒濕三氣乘之故周身掣痛兼麻木並作者古方謂之周痹治法宜先汗而後補醫者亦各以類推而治之不可執一見也一論麻木遍身手足俱麻者此屬氣血兩虛宜加味八仙湯當歸酒洗川芎熟地黃各六分白芍酒炒八分人參六分白朮去蘆二錢陳皮八分半夏曲七分白茯苓去皮一錢桂枝三分柴胡四分羌活五分防風五分秦艽六分牛膝六分甘草炙三分上銼一劑生薑一片棗一枚水煎食遠服氣虛加黃耆蜜炒八分一論麻是渾身氣虛也加減益氣湯黃耆蜜炒人參白朮去蘆陳皮當歸各一錢升麻柴胡木香各五分香附青皮去穰川芎各七分桂枝甘草各三分上銼一劑生薑棗煎服一論十指盡麻並面目皆麻此亦氣虛也補中益氣湯依前方去青皮川芎桂枝加麥冬羌活防風烏藥共十四味一論木是濕痰死血也雙合湯當歸川芎白芍生地黃陳皮半夏姜炒各一錢桃仁去皮尖八分白茯苓去皮一錢紅花三分白芥子一錢甘草三分上銼一劑姜十片水煎熟入竹瀝薑汁同服一論手足麻痹因濕所致也香蘇散方見感冒依本方加蒼朮麻黃桂枝白芷羌活木瓜一論感風濕手膊或痛或木或遍身麻木五積散方見中寒一論婦人七情六郁氣滯經絡手足麻痹宜開結舒經湯紫蘇陳皮香附臺烏川芎蒼朮米泔浸羌活南星半夏當歸各八分桂枝四分甘草三分上銼生薑三片入薑汁竹瀝服一論口舌麻木延及嘴角頭面亦麻或嘔吐痰涎或頭暈眼花噁心遍身麻木宜止麻消痰飲黃連半夏栝蔞仁黃芩白茯苓桔梗枳殼麩炒陳皮天麻細辛南星甘草上銼生薑三片水煎服血虛加當歸氣虛加人參亦有十指麻木胃中有濕痰死血加蒼朮白朮少佐熟附子行經中死血者四物湯加紅花桃仁韭葉忌生冷魚腥發風發熱之物一論十指痠痛麻木不仁大附子木香各等分每服三錢姜三片水一碗煎七分服一論婦人遍身麻痹謂之不仁皆因血分受風濕所致用祛風散送下五補丸祛風散生川烏白朮去蘆白芷各三錢甘草二錢上為細末酒調吞下五補丸五補丸黃耆蜜炒一兩人參五錢附子一個當歸三錢白芍酒炒五錢上為細末煉蜜為丸如梧子大每服六七十丸祛風散送下一論不仁者謂不凝和也痛癢不知針灸不知是也經曰諸乘虛寒而鬱冒不仁蓋其血氣虛弱不能周流於一身於是正氣為邪氣所伏故肢體頑麻不知痛癢遇寒厥如死尸而鬱且冒也用麻桂各半湯不愈者補中益氣湯入薑汁設或汗如油喘不休喘而直視水漿不入者皆為絶症也一論風熱血燥皮膚瘙癢頭面手足麻木清涼潤燥湯當歸酒洗生地黃各一錢半黃連黃芩白芍煨川芎各一錢天麻防風羌活荊芥各八分細辛六分甘草五分上銼水煎食遠服麻甚加川烏炮三分一論面上木處可用桂枝為末用牛皮膠和少水化開調敷之厚一二分若腳底硬木處可將牛皮膠熔化入薑汁調和仍入南星末五錢和勻用厚紙攤貼二三分乘半熱裹貼腳底用溫火烘之此外治也一治兩手指麻木四肢困倦怠惰嗜臥乃熱傷元氣也黃耆八錢人參五錢白芍三錢柴胡二錢五分升麻二錢五味子百四十粒生甘草五錢炙甘草二錢上銼水煎稍熱空心服一治兩腿麻木沉重無力多汗喜笑口中涎下身重如山語聲不出右寸脈洪大黃耆三錢當歸二錢蒼朮四錢陳皮五錢藁本三錢黃柏酒炒一錢柴胡三錢升麻一錢知母酒炒一錢五味子一錢生甘草二錢五分上每銼一錢水煎空心服少待以早飯壓之一治皮膚間有麻木乃肝氣不行故也黃耆一兩白芍一兩半橘皮一兩半不去白澤瀉五錢炙甘草一兩上銼水煎溫服癲狂癲脈搏大滑者生沉小緊急不治狂脈實大生沉小死癲脈虛可治實則死內經曰巨陽之厥則腫首頭重腳不能行發為昫僕昫搖其目而暴僕也是蓋陽氣逆亂故令人卒然暴僕而不知人氣復則蘇此癇之類也又曰陽明之厥則癲疾欲走呼腹滿不得臥面熱妄見妄言又曰甚則棄衣而走登高而歌逾垣上屋罵詈不避親疏是蓋得之於陽氣太盛胃與大腸實熱燥火鬱結於中而為之耳此則癲狂之候也曰癲曰狂分而言之亦有異乎難經謂重陰者癲重陽者狂素問注云多喜為癲多怒為狂然則喜傷於心而怒傷於肝乃二臟相火有餘之症難經陰陽之說恐非理也大抵狂為痰火實盛癲為心血不足多為求望高遠不得志者有之癇病獨主乎痰因火動之所作也治法癇病宜吐狂宜下癲則宜安神養血兼降痰火雖然此三症者若神脫而目瞪如愚癡者縱有千金我酬吾未如之何也已矣癲者喜笑不常顛倒錯亂之謂也狂者大開目與人語所未嘗見之事為狂也又云狂者狂亂而無主定也譫語者合目自言日用常行之事為譫也又蓄血症則重復語矣鄭聲者聲顫無力不相接續造字出於喉中為鄭聲也陰附陽則狂陽附陰則癲脫陰者目盲脫陽者妄見一論癲者心血不足也此方主癲狂喜笑不常養血清心湯人參白朮去蘆白茯苓去皮遠志去心酸棗仁炒川芎各一錢生地黃一錢石菖蒲一錢當歸一錢五分甘草五分麥門冬去心一錢五分上銼一劑水煎服一論狂者痰火實盛也宜後清心滾痰丸主之若風熱實盛者宜防風通聖散方見中風依本方加生地黃桃仁丹皮主之治一切大風癲狂之疾一論喜笑不休者心火之盛也以海鹽二兩火燒令紅研細以河水一大碗煎三五沸待溫三次啜之以叉探吐熱痰次服黃連解毒湯方見感冒依本方加半夏竹葉竹瀝薑汁少許一論婦人癲疾歌唱無時逾垣上屋者乃營血迷於心包所致也加味逍遙散當歸白芍炒白朮去蘆白茯苓去皮生地黃柴胡遠志去心桃仁去皮尖蘇木紅花甘草上銼一劑煨姜一片水煎服有熱加小柴胡湯生地辰砂水煎服一論發狂無時披頭大叫欲殺人不避水火古人治狂謂之失心苦參主心腹結氣故足以治時熱狂言苦參丸苦參為末煉蜜為丸如桐子大每服二三十丸薄荷湯送下一論一切癲癇瘋狂或因驚恐畏怖所致及婦人産後血虛驚氣入心並室女經脈通行驚邪蘊結須服此丸立效抱膽丸水銀二兩一錢硃砂一兩鉛一兩半乳香一兩研上將鉛入銚內水銀結成砂子次下硃砂滴乳乘熱用柳木棍研勻丸如芡實大每一丸空心井花水送下病者得睡切莫驚動覺來即安再服一丸除根一方薄荷湯送下亦可一論癲狂失心不寐此方用硃砂能鎮心安神酸可使收引故棗仁能斂神歸心香可使利竅故乳香能豁達心志許學士加人參亦謂人參能寧心耳寧志膏辰砂一兩酸棗仁炒五錢乳香五錢人參一兩上為細末煉蜜為丸如彈子大每服一丸薄荷湯化下一論癲狂失心此病因憂鬱得之痰涎包絡心竅此藥能開鬱痰白金丸白礬二兩川鬱金七兩上為末米糊丸每服五十丸溫水送下一論癲狂五癇驚悸一切怪症此皆痰火實盛也清心滾痰丸大黃酒蒸四兩黃芩四兩青礞石煅五錢沉香二錢半牙皂五錢犀角二錢麝香五分硃砂五錢為衣上為細末水為丸每服四五十丸滾水送下一論心風者何蓋君火在心因怒發之相火助盛痰動於中脅氣上攻迷其心竅則為癲為狂所怒之事膠固於心輒自言談失其條序謂之心風與風無干也若痰不盛則有感亦輕一論久患心風癲狂健忘怔忡失志及恍惚驚怖入心神不守舍多言不定此藥大能安神養血寧心定志以紫河車一具長流水洗淨慢火焙乾為末煉蜜為丸空心酒送下一人癲狂亂打走叫上房用瓜蒂散吐出其痰數升又以承氣湯下之即愈一人患心風即痰迷心竅發狂用真花蕊石煅黃酒淬一次為細末每服一錢黃酒送下一論癲狂五癇眩暈時作時止痰涎壅盛心神昏憒此屬氣血虛而挾風痰鬱火也驅風化痰湯人參白朮去蘆白茯苓去皮半夏姜炒陳皮枳實酒炒當歸酒洗川芎白芍酒炒桔梗去蘆南星遠志甘草水泡去心栝蔞仁白附子殭蠶天麻黃連酒炒黃芩酒炒甘草懷生地上銼一劑生薑五片水煎溫服一癲狂健忘失志及恍惚驚怖入心神不守舍多言不定一切真氣虛損用紫河車入補藥內服之大能安神養血寧志治健忘驚悸怔忡不寐以六味丸加遠志石菖蒲人參白茯苓當歸酸棗仁炒一治心恙狂惑用無灰酒一碗真麻油四兩共和勻楊枝二十條逐一條攪一二下攪遍楊枝直候油酒相和如膏煎至八分狂者強灌之令熟睡或吐或不吐覺來即醒一治狂言亂語用蝦蟆一個燒為末酒調服一治癲狂諸病將軍湯大黃四兩酒浸一宿上用水三升煎之分作三服癲狂病者多怒為癲多喜為狂癲者精神不守言語錯亂妄見妄言登高罵詈是也狂之病始發少臥少飢自賢自貴妄笑妄動登高而歌棄衣而走是也癲病者賊邪之並於肝狂病者賊邪之並於心也此皆實病宜瀉而不宜補故用大黃以瀉之取其苦寒無物不降可以瀉實又必數日後方可與食但得寧靜便為吉兆不可見其瘦弱減食以溫藥補之及以飲食飽之病必再作戒之戒之緩與之食方為得體故曰損其穀氣則病易愈所以然者食入於陰長氣於陽故也又宜滾痰丸下之一治癲狂不止得之驚憂極者用甜瓜蒂半兩為末每服一錢井水調一盞投之即大吐後熟睡勿令驚起神效一治邪狂癲癇不欲眠妄行不止用白雄雞二隻煮熟五味調和作羹食一治因驚憂失心或思過多氣結不散積有痰涎留灌心包窒塞心竅以致妄言妄語叫呼奔走雄朱丸硃砂顆塊者二錢半研雄黃明淨者研一錢半白附子一錢上和勻以豬心血和為丸如梧子大另用硃砂為衣每服三粒以人參菖蒲湯送下常服一粒能安魂定魄補心益智一牧童小子平日口中胡說一片亂話令人驚駭豫診之脈洪大是實熱以蚯蚓數條研爛井水調服立愈癇症脈虛弦為驚為風癇癇症者發則仆地悶亂無知嚼舌吐沫背反張目上視手足搐搦或作六畜聲者是也蓋癇疾之原得之驚或在母腹之時或在有生之後必因驚恐而致疾蓋恐則氣下驚則氣亂恐氣歸腎驚氣歸心並於心腎則肝脾獨虛肝虛則生風脾虛則生痰蓄極而通其發也暴故令風痰上湧而癇作矣內經曰然所以令人仆地者厥氣並於上上實下虛清濁倒置故令人仆地悶亂無知者濁邪上干心主而神明壅閉也舌者心之苗而脾之經絡連於舌本陽明之經絡入上下齒縫中故風邪實於心胸則舌自挺風邪實於陽明則口自噤一挺一噤故令嚼舌吐沫者風熱盛於內也此風來潮湧之象背反張目上視者風在太陽經也足太陽之經起於睛明挾脊而下風邪干之則實而徑急故目上視而背反張也手足搐搦者屬肝木肝木主筋風熱盛於肝則一身之筋牽攣故令手足搐搦也搐者四肢屈曲之名搦者十指開握之義也或作六畜聲者風痰鼓其氣竅而聲自變也譬之弄笛焉六孔閉塞不同而宮商別異是也夫癇之為病角弓反張手足搐搦口吐涎沫俗云豬圈風也亦因金衰木旺生風外出驚邪入內以致之蓋癇病一月數發者易治周年一發者難治虛實之判也實則即攻之虛者先補可也治法當先以瓜蒂散吐之用甜瓜蒂為末每服一錢井水調一盞投之即大吐後熟睡勿令驚起即效後以湯藥調理一論癇者宜下宜吐茶子喜湧而能吐頑痰宜取一升搗爛煎湯服得大吐便止一論諸癇神智不寧時發狂躁多言好怒面容不澤定神至寶丹生地黃薑汁炒五錢橘紅貝母白茯苓去皮黃連遠志去心石菖蒲酸棗仁炒枳實麩炒栝蔞仁天花粉甘草少許上銼生薑三片水煎服一論癇者痰涎壅並然也加減導痰湯主方神效南星薑製半夏陳皮去白白茯苓去皮栝蔞仁枳實麩炒桔梗山梔子黃芩各一錢黃連姜炒一錢甘草木香五分另研辰砂五分為末上銼一劑生薑煎入竹瀝薑汁磨木香末調辰砂同服一論癇屬氣血虛而兼痰火者此攻補兼施平肝解鬱清火化痰除眩暈諸癇之症清心抑氣湯當歸酒洗白芍酒炒白朮去蘆炒白茯苓去皮陳皮去白半夏薑汁炒枳實麩炒竹茹石菖蒲黃連姜炒香附炒各一錢麥門冬去心川芎人參遠志去心甘草各四分上銼一劑生薑煎服一論大人小兒忽然昏暈倒地五癇之症硃砂水飛用豬心一個割開入砂末五錢濕紙包漫火炙熟取砂淨入後藥豬心病人空心食南星沸湯浸三次銼薑製二兩巴豆仁五錢石灰一碗炒紅入仁在內灰冷取仁將灰又炒又以仁在內再炒揀出用草紙捶去油灰不用全蠍去頭足尾炙二錢龍膽草二兩上為末麵糊丸如梧子大每服十五丸薑湯送下一論風癇搐搦心志發狂棄衣而走登高而歌或數日不愈逾垣上屋妄言罵詈不避親疏妄見鬼神一切潮熱及風中厥逆牙關緊閉並可治之三聖散防風去蘆三兩瓜蒂炒二兩藜蘆去苗加減用或一兩或半兩或二兩上為粗末每服五錢用齏汁二盞煎三沸濾於大碗中再用齏一盞煎渣三沸卻入先煎藥同熬三沸澄清候溫徐徐投下不必盡劑吐如吐不止煎蔥白湯咽三五口立解如不吐再加服之如服藥多不吐出涎再飲齏汁鹽湯各一二盞投之如不出以光叉喉中探引即出矣須用白盆一個黑盆不見涎形狀吐出青黃涎沫二三升為效吐罷之後吃微溫白粥一二頓此三聖散汗吐下三法俱行防風發汗瓜蒂下泄藜蘆湧吐凡用法則禁忌症候小者勿服病久雖合吐勿服吐血人勿服主病不正勿服衆口不能正勿服先正病人心神居淨室中善侍病者一二人溫克和柔善誘病人則妙矣提防吐後眩暈跌撲呼叫病人既吐必損津液作渴與冰水及新水降心火勿食熱物一論諸風瘛瘲不能言語怔忡健忘恍惚去來頭目眩暈胸中煩郁痰涎壅塞精神昏倦心氣不足神志不寧驚恐憂慘虛煩少睡或發癲狂小兒驚癇風搐大人暗風羊癲風癲發叫如雷其效如神千金保命丹侍御何中寰經驗硃砂二錢珍珠一錢膽星三錢甘草麻黃去根節白附子炮雄黃薄荷各一錢防風琥珀金箔牛黃各一錢殭蠶炒犀角麥門冬去心枳殼去穰桔梗去蘆地骨皮神麯炒白茯苓去皮白朮去蘆人參各三錢遠志去心三錢柴胡三錢天麻一錢膽礬一錢七分冰片少許黃芩七錢麝香少許紫河車七錢天竺黃一錢荊芥七錢蟬蛻一錢七分川芎牙皂各一錢上為細末煉蜜為丸如彈子大金箔為衣用蠟包裹用時取開每服一丸薄荷煎湯磨化下不拘時服忌豬羊肉蝦米胡桃動風之物一參伯王搢庵公子患癇七年諸醫罔效召余治以追風祛痰丸安神丸二丸兼進半年而愈逾四年未發復因不善保守病發如前差役復求余治余以此方製藥一料投之輒效迄今數年不發氣體已復原矣余因此方治癇屢驗故名曰醫癇無雙丸南星一兩半夏一兩二味用白礬皂角生薑煎湯浸一日夜透切片隨湯煮乾去礬皂姜不用川芎三錢歸身酒洗軟石膏各一兩天麻七錢殭蠶五分生地黃酒炒一兩荊芥穗五錢辰砂五錢川獨活五錢烏犀角五錢白茯苓去皮揀參各一兩遠志甘草水泡去心麥冬去心白朮去蘆油陳皮去白各五錢酸棗仁炒五錢黃芩三錢川黃連去毛五錢白附子煨珍珠甘草各三錢金箔三十片上為細末好酒打稀糊為丸如梧子大金箔為衣每服五十丸空心白湯送下最能祛風化痰降火補益養血理脾寧心定志輕者半料奏效重者全料一兒十五歲御女後復勞役考試失意患癇症三年矣遇勞則發用十全大補湯加味歸脾湯之類更以紫河車生研如膏入蒸糯米飯為丸如梧子大每服百丸日三四服而痊後患遺精盜汗發熱仍用前藥及六味丸而愈此方治癇不拘老幼皆效清心滾痰丸治諸風癲癇有殊效一治驚癇方白礬一兩半生半枯荊芥穗二兩上為末麵糊為丸如黍米大硃砂為衣每服二十丸薑湯送下健忘夫健忘者陡然而忘其事也盡心力思量不來為事有始無終言談不知首尾蓋主於心脾二經心之官則思脾之官亦主思此由思慮過度傷心則血耗散神不守舍傷脾則胃氣衰憊而疾愈深二者皆主人事則卒然而忘也蓋心主血因而少而不能養其真臟或停飲而氣鬱以生痰氣既滯脾不得舒是病皆作治之必須先養其心血理其脾土凝神定智之劑日以調理亦當以幽閒之處安樂之中使其絶於憂憊遠其六欲七情如此漸安矣一論思慮傷脾不能攝血致血妄行或吐或下或健忘怔忡驚悸不寐發熱盜汗或心脾傷痛嗜臥少食大便不調或血虛發熱或肢體重痛婦人月經不調赤白帶下或晡熱內熱瘰癧流注不能消耗潰斂或思慮傷脾而作瘧痢歸脾湯主方人參三錢黃耆二錢白朮一錢五分白茯苓三錢當歸三錢遠志一錢甘草水泡去心龍眼肉十枚酸棗仁三錢炒木香八分甘草六分炙上銼薑棗煎服加柴胡附子名加味歸脾湯神不寧而健忘倍酸棗仁茯神當歸加柏子仁一論諸虛健忘及驚悸怔忡等症加減補心湯人參白茯苓陳皮白芍酒炒遠志甘草水泡去心酸棗仁炒知母白朮生地黃當歸石菖蒲麥門冬去心黃柏酒炒甘草上銼薑棗煎服一論寧心保神益血固精壯力強志令人不忘清三焦化痰涎祛煩熱療咽乾除驚悸定怔忡育養心神大補元氣讀書勞神勤政勞心並宜服之天王補心丹大中丞松石劉公傳加石菖蒲百部杜仲甘草懷生地四兩天門冬去心桔梗各五錢當歸柏子仁酸棗仁炒五味子各一兩麥門冬去心遠志甘草水泡去心白茯苓去皮元參丹參人參各一兩一方加酒炒黃連五錢上為末煉蜜為丸如梧子大硃砂為衣每服二三十丸臨臥燈心竹葉煎湯送下燈心棗湯亦可如飲食不思大便不實恐不宜也又當服後方安神定志丸功同補心丸人參一兩五錢白朮去蘆炒白茯苓去皮白茯神去心遠志甘草水泡去心石菖蒲去毛忌鐵酸棗仁炒各一兩麥門冬去心一兩牛黃另研一錢辰砂二錢五分水飛為衣上為細末元眼肉四兩熬膏和煉蜜三四兩為丸如梧子大辰砂為衣每服三十丸清米湯送不拘時日三服一論凡人多識不忘者心血足而無所蔽也若心血不足邪氣蔽之則傷虛靈之體而學問易忘矣龜介蟲之靈物也龍鱗蟲之靈物也假二物之靈以養心之靈欲其同氣相求云爾遠志辛溫味厚辛溫可使入心味厚可使養陰菖蒲味辛氣溫味辛則利竅氣溫則通神以之而治易忘斯近理矣聰明丸春元周用廷經驗敗龜甲炙酥龍骨入雞腹中煮一宿遠志去心苗石菖蒲九節者各等分上為末每服一錢酒調下日三服一論讀書辛苦而有房勞者當歸生地黃白朮元參各一錢川芎白芍白茯苓黃柏酒炒知母酒炒麥門冬去心山梔炒甘草各五分上銼一劑生薑煎服一論癲狂健忘失志及恍惚驚怖入心神不守舍多言不定一切真氣虛損用紫河車入補藥內服之大能安神養氣寧志治健忘驚悸怔忡不寐用六味丸加遠志石菖蒲人參白茯神當歸酸棗仁炒一論諸虛健忘等症以十全大補湯去川芎肉桂黃耆加陳皮遠志石菖蒲麥門冬酸棗仁黃柏知母驚悸寸口脈動而弱動為驚弱為悸心中驚悸脈必大結飲食之悸沉伏動滑夫驚悸即動悸也動之為病惕然而驚悸之為病心下怯怯如恐人捕皆心虛膽怯之所致也又曰驚者恐怖之謂悸者怔忡之謂怔忡驚悸健忘三症名異而病同又云驚悸者驀然而跳躍驚動如有欲厥之狀有時而厥者是也屬血虛時覺心跳者亦是血虛蓋人之所主者心心之養者血心血虛神氣不守此驚悸之肇端也一人聞聲即驚醫者令病人坐於堂下使兩人挾之醫自堂上以小凳木槌手擊而口云吾擊凳亦常事耳爾何必驚且擊且言患者視之久而驚遂定此深得乎治之法也一論驚悸怔忡健忘不寐屬心血虛者補心湯主方當歸一錢二分川芎七分白芍炒一錢生地黃一錢二分白朮去蘆一錢遠志去心八分白茯神一錢二分酸棗仁炒八分麥門冬去心一錢黃連薑汁炒一錢元參五錢甘草炙三錢上銼一劑水煎溫服一方加柏子仁一論血虛心神不安驚悸怔忡不寐並治安神鎮驚丸當歸酒洗一錢貝母去心一兩川芎七錢生地黃酒洗一兩半麥門冬去心酸棗仁炒白芍酒炒一兩遠志去心七錢陳皮去白一兩白茯神去皮木七錢黃連薑汁炒五錢甘草三錢硃砂研末水飛為衣一兩上為末煉蜜為丸如緑豆大每服五十丸食遠棗湯送下一論七情六欲相感而心虛夜多夢寐睡臥不寧恍惚驚怖痰癡屬心氣虛者益氣安神湯當歸一錢二分黃連薑汁炒生地黃麥門冬去心酸棗仁炒遠志去心各一錢白茯苓去皮心一錢二分人參黃耆蜜炒膽星各一錢淡竹葉一錢甘草六分上銼一劑姜一片棗一枚水煎服一論小兒大人被驚神不守舍痰迷心竅恍惚健忘諸癇癡風心風諸症安神醒心丸南星末五兩川連末一兩五錢先以薑汁拌浸半日入南星末調和勻成餅於飯甑內蒸半日人參末一兩五錢制遠志末一兩五錢飛過辰砂研七錢五分琥珀七錢五分酸棗仁炒研末一兩上用雄豬心血三個入竹瀝打麵糊為丸如梧桐子大金箔為衣每服五十丸食遠白湯送下小者二三十丸一論異夢多驚有二法一於髻中戴粗大靈砂一囊一於枕中置真麝香一囊皆能杜絶異夢而療夜魘一論夜夢陰盛夢大水恐懼陽盛夢大火燔灼陰陽俱盛夢相殺上盛夢飛下盛夢墮飽夢與人食飢夢取人食心實夢燔灼心虛夢救火陽物堅肝虛夢細草芒芒肝實夢伏樹下不敢起脾虛夢飲食不足脾實夢築牆蓋屋肺虛夢白物斬血籍肺實夢兵刃血戰腎虛夢舟船溺水腎實夢伏水中若有所畏怔忡夫怔忡者心中不安惕惕然如人將捕是也屬血虛有慮便動屬虛時作時止者痰因火動瘦人多是血少肥人屬痰怔忡者心胸躁動謂之怔忡此心血不足也多因汲汲富貴戚戚貧賤不遂所願而成一論血虛火盛怔忡心慌恍惚煩躁不寧養血清心湯當歸酒洗一錢川芎七分白芍酒炒一錢生地黃酒洗一錢黃連薑汁炒一錢甘草二錢五分片芩去朽八分梔子炒八分酸棗仁炒遠志去心麥門冬去心各一錢上銼一劑生薑煎服一論心煩懊惱驚悸怔忡胸中氣亂此血虛而火盛也硃砂安神丸硃砂另研水飛濾過五錢當歸酒洗二錢五分黃連酒洗一錢生地黃酒洗一錢五分甘草炙二錢五分一方加人參白朮茯神酸棗仁炒麥門冬去心各等分為末煉蜜為丸如黍米大每服五十丸食遠米湯送下一論思慮即心跳者是心中無氣少血故作怔忡也四物安神湯當歸酒洗白茯神去皮木白芍酒炒熟地黃黃連薑汁炒人參白朮去蘆辰砂研末臨服調入竹茹酸棗仁炒麥門冬去心烏梅一個梔子上銼一劑煎服一論心氣怔忡而自汗者不過一二服而愈參歸腰子人參五錢當歸身五錢豬腰子一對上先以腰子用水二碗煮至一碗半將腰子細切入二味藥同煎至八分吃腰子以藥汁送下如吃不盡腰子同上二味藥渣焙乾為細末山藥糊為丸如梧子大每服三五十丸米汁湯送下一論精神虛憊恍惚不寧心思不定氣不足健忘怔忡加味寧志丸人參白茯苓去皮遠志甘草水泡去心石菖蒲米泔浸酸棗仁炒黃連去毛柏子仁各二兩當歸酒洗八錢生地黃酒洗八錢木香四錢硃砂研水飛一兩二錢半一半入藥一半為衣上為細末煉蜜為丸如緑豆大半飢時麥門冬去心煎湯送下五六十丸虛煩夫虛煩者心胸煩擾而不寧也多是體虛攝養有乖榮衛不調使陰陽二氣皆有所偏勝也或陰虛而陽盛或陰盛而陽虛內經曰陰虛則內熱陽虛則外寒陽盛則外熱陰盛則內寒令人虛煩多是陰虛生內熱所致虛勞之人腎水有虧心火內蒸其煩必躁吐瀉之後津液枯竭煩而有渴惟傷寒及大病後虛煩之症卻無霍亂臨病宜審之巢氏病源曰心煩不得寐者心熱也但虛煩不得寐者膽冷也一論病後虛煩不得眠及心膽虛怯觸事易驚短氣心悸或復自汗等症溫膽湯半夏湯泡七錢竹茹枳實麩炒各三錢陳皮四錢半白茯苓去皮二錢五分甘草炙二錢五分上銼分二劑薑棗煎服一方加酸棗仁炒遠志去心五味子熟地黃人參各等分一論大病後表裡俱虛內無津液煩渴心躁及諸虛煩熱與傷寒相似但不惡寒身不痛不可汗下宜服竹葉石膏湯方見傷寒不寐不寐有二種有疾後虛弱及年高人陽衰不寐者有痰在膽經神不守舍亦令不寐虛者用六君子湯加炒酸棗仁黃耆痰者用溫膽湯減竹茹一半加南星炒酸棗仁傷寒不寐者當求之本門一論心膽虛弱晝夜不眠百方無效服此如神高枕無憂散人參五錢軟石膏三錢陳皮半夏姜炒白茯苓去皮枳實麩炒竹茹麥門冬去心酸棗仁炒甘草各一錢五分上銼一劑龍眼五個水煎服一論勞心痰多少睡心神不定養心湯人參麥門冬去心黃連微炒白茯苓去皮白茯神去木當歸酒洗白芍酒炒遠志去心陳皮柏子仁酸棗仁甘草等分上銼蓮肉五個去心水煎溫服安神復睡湯當歸川芎白芍酒炒熟地黃益智仁酸棗仁炒遠志甘草水泡去心山藥龍眼肉各等分上銼薑棗煎服一論心氣不足恍惚多忘或勞心膽冷夜臥不睡此藥能安神定志加味定志丸人參三兩白茯神去皮木二兩遠志甘草水泡去心石菖蒲各二兩酸棗仁炒二兩柏子仁炒去殼二兩上為細末煉蜜為丸如梧桐子大硃砂乳香為丸每服五十丸臨臥棗湯送下附睡法睡不厭蜷覺不厭舒蜷者曲膝蜷腹以左右肋側臥修養家所謂獅子眠是也如此則氣海深滿丹田常暖腎水易生益人多宏舒體而臥則氣宣而寡蓄神散而不潛故臥惟覺時可舒體耳西山蔡季通引千金方睡訣云睡則必側覺正而伸早晚以時先睡心後睡眼晦庵以為此古今未發之妙一論膽虛臥不安心多驚悸酸棗仁一兩炒令香熟為末每服二錢不拘時服竹葉湯送下一治心下怔忡睡倒即大聲打鼾睡醒即不寐余以羚羊角烏犀角各用水磨濃汁入前所用養心湯或復睡湯內服之立效蓋打鼾睡者心肺之火也一治膽虛常多畏恐不能獨臥如人捕狀頭目不清人參枳殼五味子桂心各三分柏子仁一錢甘菊花白茯苓枸杞子各三分山茱萸五分熟地黃五分上為末每服二錢溫酒調下厥症陽厥脈滑而沉實陰厥脈細而沉伏氣虛則發厥血虛則發熱厥者手足冷也氣屬陽陽虛則陰湊之故發厥也血屬陰陰虛則陽湊之故發熱也氣虛發厥者當用溫藥血虛發熱者不宜用涼藥當用溫養氣血之藥以補之宜養陰黃耆建中湯之類是也又有一種病實熱者極而手足厥冷所謂熱深厥亦深此當用涼藥須以脈別之此最難辨一論陽厥者是熱深則厥深蓋陽極則發厥也急以六一順氣湯治之一論陰厥者始得之身冷脈沉四肢厥逆足蜷臥唇口青或自利不渴小便色白宜四逆理中湯之類仍速灸關元百壯鼻尖有汗為度一論痰厥者卒然不省人事喉中有水雞聲者是也用牙皂白礬等分研末吹鼻即以香油一盞入薑汁少許灌之立醒或燒竹瀝薑汁灌之亦可一論蛔厥者乃胃寒所致經曰蛔者長蟲也胃中冷即吐蛔宜理中湯加炒川椒五粒檳榔五分吞烏梅丸一論氣厥者與中風相似但風中身溫氣中身冷以藿香正氣散加南星木香烏藥如有痰以四七導痰湯主之一論暴怒暴死者名曰氣厥蓋怒則氣上氣上則上焦氣實而不行下焦氣逆而不吸故令暴死氣上宜降之五磨飲子木香沉香檳榔枳實臺烏藥上五味等分白酒磨服立效建中湯見汗症六一順氣湯見傷寒四逆湯見中寒理中湯見中寒藿香正氣湯見霍亂四七湯見諸氣導痰湯見痰飲心胃痛脈沉細而遲者易治浮大弦長者難治胃脘痛者多是縱恣口腹喜好辛酸恣飲熱酒煎爆復食寒涼生冷朝傷暮損日積月深自郁成積自積成痰痰火煎熬血亦妄行痰血相雜妨礙升降故胃脘疼痛吞酸噯氣嘈雜噁心皆膈噎反胃之漸者也俗醫以燥熱之藥治之以火濟火誤矣古方有九種心痛曰飲曰食曰風曰熱曰冷曰悸曰蟲曰疰曰去來痛夫所謂冷者一耳豈可例以熱藥治之乎須分新久若明知身犯寒氣口得寒物而病於初得之時當用溫散溫利之藥若病久則成郁矣鬱則成熱宜用炒山梔為君熱藥為之嚮導則邪易伏病易退病安之後若縱恣不改病必再作難治矣此病雖日久不食不死必須待服藥數劑痛定過一日漸而少食方得痊安其有真心痛者大寒觸犯心君又有汙血衝心手足青過節者旦發夕死夕發旦死非藥所能療焉一論胃脘積有鬱熱刺痛不可忍者此方治心胃痛之主方也清熱解鬱湯山梔仁炒黑二錢乾薑炒黑五分川芎一錢黃連炒一錢香附炒一錢枳殼去穰麩炒一錢五分蒼朮米泔浸七分陳皮五分甘草三分上銼一劑生薑三片水煎熱服服後戒飲食大半日再服一劑神效如痛甚加薑汁二三匙入藥同煎一論諸積氣為痛心膈痛腹痛血積痛腎氣痛脅下痛大便不通氣噎宿食不消等症神保丸木香二錢五分胡椒二錢五分全蠍全者七枚巴豆十枚去心研末上為末入巴豆霜再研湯浸蒸餅為丸如麻子大硃砂三錢為衣每服三十粒心膈痛柿蒂燈心湯下腹痛柿蒂煨薑湯送下血積痛炒薑醋湯下肺氣盛者白礬蛤粉黃丹各一錢同研為散煎桑白皮糯米飲調下三錢氣喘桑白皮糯米飲下腎氣痛脅下痛炒茴香酒下大便不通蜜調檳榔末一錢同下氣噎木香湯下宿食不消茶下或酒漿飲任下酒面熱毒過度痰飲致胃痛柿蒂湯下諸氣惟膀胱氣脅下痛最難治獨此藥能去之有人病項筋痛諸醫皆以為風治之數月不瘥乃流入背膂久之又注右脅攣痛甚苦乃合服一料而瘥再服除根一論治心胃刺痛並兩脅肋痛嘔吐胸痞大便堅六脈數或發熱口乾清上飲柴胡黃芩赤芍厚朴枳實梔子鬱金黃連半夏青皮大黃芒硝甘草上銼生薑三片水煎熱服一治心氣及胃脘諸痛鬱火所致者肥梔子去殼十五枚薑汁炒黑撫芎一錢香附童便炒一錢上銼水煎三滾入薑汁三四匙再煎一滾去渣入百草霜二匙調和服之一治心胃痛不可忍者或心神恍惚梔子炒黃連炒二味等分用茯苓茯神減半水煎服立止一治因多食煎炒燒餅米拌熟面之類以致熱鬱胃脘當心而痛或嘔吐不已漸成翻胃黃連六錢甘草一錢上銼水煎溫服立止一治胃脘心氣作痛有熱者酒餅炒梔子炒石膏煅各三錢上銼水煎一服立止一論男婦小兒憒常心腹作痛宜服此一料以拔病根永不再發此藥能清痰涎消食積酒積肉積茶積一切諸積在胃脘當心而痛及痞滿噁心嘈雜嘔吐噯氣吞酸脾疼諸痛神效無價金丹白朮去蘆炒三兩枳實麩炒一兩蒼朮米泔浸炒豬苓一兩麥芽炒神麯炒半夏湯泡各二兩澤瀉赤豬苓去皮川芎黃連陳土炒白螺螄煅各七錢砂仁草豆蔻黃芩陳土炒青皮去穰萊蔔子炒生薑各五錢陳皮去淨白香附子童便炒栝蔞仁檳榔各三錢川厚朴去皮姜炒二錢木香二錢甘草二錢上為細末青荷葉泡湯浸晚粳米研粉作糊為丸如梧子大每服七十丸多至百丸米湯送下吞酸加吳茱萸湯泡寒月用五錢熱月用二錢半久病挾虛加人參扁豆石蓮肉各五錢時常口吐清水加炒滑石一兩牡蠣煅五錢一論胃脘痛屬寒者丁胡三建湯丁香良薑官桂各一錢五分上銼一劑水一碗煎七分用胡椒五十粒炒為末調入藥內頓服一方用良薑末三分米湯調下立止一治心胃刺痛不可忍者胃口冷氣所致者乾薑炒官桂蒼朮米泔浸炒半夏薑汁炒上銼生薑煎服一論一切氣痛心痛肚疼及冷氣痛良薑一兩五錢吳茱萸四兩炒胡椒一兩上為末每服五分輕者三分用飛過硃砂三分酒調服一論氣自腰腹間攻心痛不可忍腹中冰冷自汗如洗手足攣急厥冷山梔子大小四十九個連皮搗碎炒黑大附子一枚炮去皮臍上為粗末每服二三錢酒煎八分入鹽一捻溫服一治諸般心腹氣痛或瘀血作痛桃靈丹桃仁五錢五靈脂五錢火煨制上為末醋糊為丸如梧子大每服二十丸酒下或醋湯下一人心胃刺痛手足稍冷出汗指甲青百藥不效余用當歸三錢煎湯外用水磨木香沉香烏藥枳殼磨濃服立止一論寒邪冷氣入乘心絡或臟腑暴感風寒上乘於心令人卒然心痛或引背膂甚則經年不瘥桂附丸西園公屢驗川烏頭炮去皮臍三兩附子三兩乾薑炮二兩官桂二兩川椒去目微炒二兩赤石脂二兩上為細末煉蜜為丸如梧子大每服三十丸溫水下覺至痛處即止若不止加至五十丸以知為度若是朝服無所覺至午後再進二十丸若久心痛每服三十丸至五十丸盡一劑終身不發治心痛徹背如神一論心腹疼痛每作必胸滿嘔吐厥冷面赤唇麻咽乾口燥寒熱不時而脈洪大屢服寒涼損真之故內真寒而外假熱也且脈弦洪而有怪狀乃脾氣損虧肝木乘之而然當暖補其胃補中益氣湯方見內傷依本方加半夏茯苓吳茱萸一婦人胃脘當心而痛甚右寸關俱無左雖有微而似絶手足厥冷病熱已篤察其色眼胞上下青黯此脾虛肝木所勝用參朮茯苓陳皮甘草補其中氣用木香和胃以行肝氣用吳茱萸散脾胃之寒止心腹之痛急與一劑俟滾先服煎好再進諸病悉愈何可泥其痛無補法而反用攻伐之藥禍不旋踵一婦人懷抱鬱結不時心腹作痛年久不愈諸藥不應余用歸脾加炒山梔而愈一唐儀部胸內作痛月餘腹亦痛左關弦長右關弦緊此脾虛肝木所乘以補中益氣加半夏木香二劑而愈又用六君子湯二劑而安此面色黃中見青一論有蟲者必面斑白唇紅又痛後便能食時作時止是也用二陳湯加苦楝根皮煎服上半月蟲頭向上易治下半月蟲頭向下難治或曰痛而久臥不安自按心腹時大叫面色或青或黃唇緩目無睛光此蟲痛也一治蛔蟲作痛神方用苦楝根上皮洗淨白水煎露一宿次日早燒豬肉一塊嗅其氣然後服藥其法上半月服其蟲盡下一治寸白蟲作痛用酸石榴東南根二兩檳榔五錢大黃五錢白水煎露一宿來日五更冷服未服先燒些豬肉嗅其氣不可食其藥上半月服之立效一論胃冷蛔蟲上攻心痛嘔吐四肢冷烏梅丸當歸四錢人參六錢炮姜一兩肉桂六錢大附子炮六錢川椒去目炒四錢細辛六錢黃連一兩酒炒黃柏六錢酒炒上為末烏梅三十個去核搗爛入蜜為丸如梧桐子大每服五十丸空心鹽湯送下烏梅用好醋浸一宿去核於五升米飯上蒸熟杵如泥和藥令相得納臼中杵三千下入蜜和為丸又治胃腑發咳咳而嘔嘔甚則長蟲出一論蟲攻心痛並腹中塊按之不見往來痛無休止化蟲丸鶴蝨三錢胡粉炒枯礬苦楝根皮去浮皮檳榔各五錢上為末麵糊為丸如梧桐子大每服十五丸米飲入真芝麻油一二點打勻服之其蟲小者化為水大者自下一婦年四旬心胃刺痛時痛時止不思飲食食則即吐手足厥冷胸中痞悶口乾作渴余曰此胃中有蟲也以二陳湯加檳榔枳實烏梅花椒炒黑乾薑苦楝根皮生薑煎一服打蟲下一大碗遂止一論急心痛元靈散五靈脂去砂石元胡索炒莪朮火煨良薑炒當歸各等分上為末每服二錢熱醋湯送下一論諸心氣痛不可忍者絳靈散白礬枯一兩硃砂一錢生薑二片上為末每服一錢五分輕者一錢空心白湯送下一治心痛方白礬枯一兩白硼砂一錢五分上為末薑汁打麵糊為丸如黃豆大每服一丸溫酒送下一治心胃氣痛如神用生礬枯礬等分為末麵糊丸如櫻桃大每服三丸燒酒下立止一治心胃刺痛砂糖半鍾熱酒調服即愈一治心氣痛五靈脂一錢枯礬二分為末溫酒調下一治心胃痛欲死用良薑末三分米湯調下立已一徐四可治胃脘痛用炒鹽一錢生薑七片水煎一鍾溫服立止一論心腹痛不問寒熱新久一服立止官桂一錢五分白芍二錢酒炒甘草五分上銼水煎服如感冒寒邪加香蘇如有熱加芩連如大便閉及下痢初起任服涼藥不通腹痛不止加大黃枳殼立效一治胃脘痛甚諸藥不效者黃連六錢大附子去皮臍炮一錢上銼一劑生薑三片棗一枚水煎稍熱服一治心疼痛荊子炒焦為末米飲調下又方蜜一小鐘酒一碗同蜜煎滾調枯礬末一錢溫服出汗一治諸血諸氣痛不可忍及心脾氣血諸痛又治血滯腰痛三香沉麝丸內翰蘇沈方硃砂血竭沒藥各一分沉香三分木香五分麝香半分上銼為末瓷器煮生甘草膏丸如皂角子大每服一丸姜鹽湯嚼下婦人産後氣血痛並主之亦治脾痛血滯腰痛用續斷牛膝桃仁炒煎溫湯送下血暈用乳香泡湯研化服腹痛心腹痛不得息脈細小遲者生脈大而疾者死夫腹痛寒氣客於中焦干於脾胃而痛者有宿積停於腸胃者有結滯不散而痛者有痛而嘔者有痛而瀉者有痛而大便不通者有熱痛者有虛痛者有實痛者有濕痰痛者有死血痛者有蟲痛者種種不同治之皆當辨其寒熱虛實隨其所得之症施治若外邪者散之內積者逐之寒者溫之熱者清之虛者補之實者瀉之泄則調之閉則通之血則消之氣則順之蟲則追之積則消之加以健理脾胃調養氣血斯治之要也一論風寒外感飲食內傷七情惱怒過度肚腹疼痛初起者行氣香蘇散方見飲食一論外中寒邪內傷冷物肚腹綿綿痛不已而手足厥冷者五積散方見中寒一論肚腹疼痛有寒有熱有食有氣治一切肚腹痛之總司也開鬱導氣湯蒼朮米泔浸炒一錢陳皮五分香附童便浸炒一錢白芷一錢川芎一錢白茯苓去皮一錢乾薑炒五分滑石一錢山梔子炒黑一錢神麯一錢甘草少許上銼一劑水煎溫服一論綿綿痛無增減脈沉遲者寒痛也薑桂湯乾薑肉桂良薑各七分枳殼去穰麩炒陳皮砂仁厚朴薑汁炒吳茱萸炒各一錢香附一錢五分木香五分甘草二分上銼生薑煎服痛不止加元胡索茴香乳香寒極手足冷加附子去吳茱萸良薑泄瀉去枳殼一論乍痛乍止脈數者火痛也散火湯黃連炒白芍炒梔子炒枳殼去穰厚朴去皮香附川芎各一錢木香砂仁茴香各五分甘草三分上銼一劑生薑一片水煎痛甚不止加元胡索一論肚腹滿硬痛久不止大便實脈數而渴者積熱也枳實大黃湯枳實大黃檳榔川厚朴各二錢甘草三分木香二分上銼一劑水煎溫服一論痛不移處者是死血也活血湯當歸尾赤芍桃仁去皮尖牡丹皮元胡索烏藥香附子枳殼去穰各一錢紅花官桂木香各五分另磨汁川芎七分甘草二分上銼一劑生薑一片水煎服一論小便不利而痛腹中勾引脅下有聲者是濕痰也二陳湯加減方見痰飲一論以手按之腹軟痛止者是虛痛也溫中湯良薑五分官桂五分益智仁一錢砂仁四分木香另研香附米厚朴姜炒陳皮小茴香酒炒當歸甘草各八分元胡索六分上銼一劑生薑煎服一論食積腹痛其脈弦其痛在上以手重按愈痛甚欲大便利後其痛減是也加味平胃散蒼朮米泔浸炒一錢陳皮一錢厚朴姜炒八分半夏姜炒八分川芎五分香附一錢炒枳實一錢木香八分神麯炒一錢山楂一錢乾薑七分甘草三分上銼一劑生薑三片水煎服一論時痛時止面白唇紅者是蟲痛也椒梅湯烏梅花椒檳榔枳實木香香附砂仁川楝子去核肉桂厚朴去皮姜炒乾薑甘草炙各等分上銼一劑生薑一片水煎服三仙丸治蟲痛雄黃白礬檳榔各等分上為末飯丸如黍米大每服五分食遠白水下干痛者不吐不泄而但痛也有時者淡食而飢則痛厚味而飽則否也經曰腹內干痛者腹內有蟲此之謂也一孩子腹中作痛看看至死腹中揣摸似有大小塊諸醫不效余則令人慢慢以手搓揉痛處半日其蟲自大便出而愈一婦人腹痛如錐刺每痛欲死不敢著手六脈洪數此腸癰毒也用穿山甲炒白芷貝母殭蠶大黃合一大劑水煎服打膿血自小便中出即愈一李儀部常患腹痛治以補中益氣加炒山梔即愈一朱太守因怒腹痛作瀉或兩脅作脹或胸乳作痛或寒熱往來或小便不利飲食不臥嘔吐痰沫神思不清此肝木乘脾土用柴胡加山梔炮薑茯苓陳皮制黃連一劑即愈制黃連即黃連吳茱萸等分用鹽水拌濕越二三日同炒焦取連用一人內停飲食外感風寒頭疼發熱噁心腹痛豫以藿香正氣散加香附川芎一服而止次日前病悉除惟腹痛不止以手重按其痛稍止此客寒乘虛而作也以香砂六君加木香炮姜服之睡覺痛減六七去二香再服即愈一婦人臍腹疼痛不省人事只此一服立止人不知者云是心氣痛誤矣余用白芷五靈脂木通去皮三味等分每服五錢醋水各半盞煎至七分服一論白芍味酸微寒補中焦之藥得炙甘草為輔治腹中痛之聖藥也如夏中熱腹痛少加黃芩若惡寒腹痛只少加肉桂一錢白芍三錢甘草一錢五分此三味為治寒腹痛此仲景神品藥也如深秋腹痛更加桂枝三錢如冬月大寒腹中冷痛加桂枝一錢五分水二盞煎服腰痛丹溪曰脈必沉而弦沉為滯弦為虛澀者是瘀血緩者是濕滑者伏者是痰大者是腎虛也夫腰乃腎之府動搖不能腎將憊矣因嗜欲無節勞傷腎經多有為喜怒憂思風寒濕毒傷之遂致腰痛牽引於脊背旁及二脅下不可俯仰此由腎氣虛弱所致宜滋腎調氣病可除矣一論常常腰痛者腎虛也此方主之補腎湯當歸酒洗白芍酒炒生地黃熟地黃陳皮小茴香鹽酒炒破故紙酒炒牛膝去蘆酒洗杜仲去粗皮酒炒白茯苓去皮各一錢人參五分黃柏去皮酒洗知母酒炒各七分甘草炙三分上銼一劑棗二枚水煎服痛甚者加乳香砂仁沉香去白芍生地陳皮如常服合丸藥俱為細末煉蜜為丸如梧桐子大每服五十丸米湯下酒下亦可一論腰胯濕熱作痛者清熱勝濕湯蒼朮米泔制黃柏鹽水炒羌活白芍酒炒陳皮去白牛膝去蘆酒洗木瓜杜仲薑汁炒威靈仙澤瀉各五分甘草三分上銼生薑三片水煎服痛甚者加乳香沒藥各五分為末水濕停下入黑醜檳榔各五分血痛加歸尾桃仁去皮尖各一錢紅花酒洗五分冷風作痛加熟附子一錢虎脛骨末五分去黃柏澤瀉各三分倦怠腳如欲墜加蒼朮防己薏苡仁白朮各五分遊走而痛加紫金皮濕熱加炒梔子氣不順加烏藥痠軟加牛膝當歸地黃腎虛加破故紙炒五分一論氣滯腰痛並閃挫腰痛腎虛腰痛立安散當歸官桂元胡索杜仲小茴香木香黑醜上為細末每服二匙空心溫酒調下一方去黑醜以酒煎服一論腰痛神方魚鰾炒成珠好酒一碗淬入內溫熱通口連渣服一論此方專滋腎水壯元陽益筋骨又能烏須治腎虛腰痛足膝痛神效青娥丸破故紙酒炒川萆薢童便浸杜仲薑汁炒牛膝去蘆酒洗黃柏鹽水炒知母酒炒各四兩胡桃肉去皮泡八兩上為細末煉蜜為丸如梧子大每服八十丸空心酒送下一論腎氣虛弱肝脾之氣襲之令人腰膝作痛伸屈不便冷痹無力夫腎水臟也虛則肝脾之氣湊之故令腰膝實而作痛屈伸不便者筋骨俱病也經曰能屈而不能伸者病在筋能伸而不能屈者病在骨故知屈伸不便為筋骨之病也冷痹者陰邪實也無力者氣血虛也獨活寄生湯方見中濕一論元氣虛弱腰痛白濁以補中益氣湯方見內傷依本方加黃柏知母白芍俱酒炒牛膝去蘆酒洗杜仲姜酒炒一論腎經虛損腰腿遍身疼痛壯腎散扶溝何晴嶽傳仙靈脾酒浸五兩遠志去心四兩巴戟去心六兩杜仲酒炒五兩破故紙酒炒五兩肉蓯蓉酒浸六兩青鹽八兩大茴香五兩小茴香炒五兩上為末每服二錢用豬腰切開摻藥末在內紙裹火燒熟細嚼酒下一論腰痛人皆作腎虛治諸藥不效者此瘀血痛也以大黃半兩更入生薑半兩同切如小豆大於鍋內炒黃色投水二碗煎五更初頓服天明取下腰間瘀血物用盆器盛如雞肝樣痛即止一治腰痛不能轉側點藥後少頃復舊神妙雄黃二錢黃丹一錢焰硝一錢去黃丹名龍火丹上為細末令病人仰睡以銀簪蘸藥點眼大角頭少許一二次神效一治腰痛良方杜仲姜酒炒二錢破故紙炒五分小茴香鹽酒炒人參三分上為末用豬腰子二個切開入藥蒸熟帶水渣同食即愈一治腰痛祕方王明景傳當歸酒洗杜仲酒炒大茴香酒炒小茴香酒炒羌活上銼一大劑用頭生酒浸一宿次早濾汁溫熱服之用渣將酒再煎溫服立效補遺青娥丸馬伏所祕傳治諸虛百病大補之聖藥也素患腰痛者殊效仙茅酒浸洗勿犯鐵器四兩白茯神去皮四兩破故紙四兩酒浸一日懷生地黃酒浸砂鍋內蒸黑四兩甘枸杞子四兩小茴香鹽酒炒二兩黃精酒蒸四兩川杜仲去皮姜炒四兩天門冬去心四兩菟絲子酒炒搗餅四兩當歸酒洗四兩肉蓯蓉酒洗去鱗三兩懷熟地黃酒洗四兩巴戟鹽水泡去心四兩青鹽四兩水洗去泥打碎炒牛膝去蘆酒洗四兩揀參二兩鎖陽三兩鹿茸一兩炙川萆薢四兩童便浸七日流水洗淨去臭氣核桃肉去殼一百五十個搗成泥上為細末好酒打糊為丸如梧子大每服百丸空心好酒鹽湯送下忌三白一治一切腰痛如神宋東園傳黑醜半生半炒為細末水和丸如梧子大硫黃末為衣每服五十丸空心鹽水湯下脅痛脈雙弦者肝氣有餘兩脅作痛夫脅痛者厥陰肝經為病也其症自兩脅下痛引小腹亦當視內外所感之邪而治之若因暴怒傷觸悲哀氣結飲食過度冷熱失調顛仆傷形或痰積流注於脅與血相搏皆能為痛此內因也若傷寒少陽耳聾脅痛風寒所襲而為脅痛者此外因也治之當以散結順氣化痰和血為主平其肝導其滯則無不愈矣一論左脅下痛肝積屬血或因怒氣所傷或顛仆閃挫所致而為痛也疏肝散主方黃連吳茱萸煎炒二錢柴胡當歸酒洗各一錢五分青皮去穰桃仁研如泥枳殼麩炒各一錢川芎白芍酒炒各七分紅花五分上銼一劑水煎食遠服一論右脅痛者肝邪入肺也推氣散片薑黃枳殼麩炒各一錢桂心少許甘草炙五分上銼一劑生薑三片水煎食遠服一方加廣陳皮一錢五分半夏姜炒一錢一論左右脅俱痛肝火盛而木氣實也柴胡歸芎湯柴胡川芎白芍青皮去穰枳殼麩炒各一錢五分甘草香附子當歸龍膽草木香砂仁上銼一劑姜一片水煎溫服一論因內有濕熱兩脅痛甚伐肝木之氣瀉肝火之要藥也當歸龍薈丸當歸龍膽草山梔子黃連大黃酒浸紙裹煨蘆薈青黛各五錢木香三錢五分麝香另研五分加柴胡五錢青皮去穰醋炒一兩上為細末神麯打糊為丸如梧桐子大每服二十丸薑湯送下一論勞傷身熱脅痛者脈必虛也補中益氣湯方見內傷依本方加川芎白芍青皮木香砂仁小茴香枳殼去白朮升麻一論左脅下有塊作痛不移者是死血也活血湯方見腹痛依本方加青皮去白芍一論男子房勞兼怒風府脹悶兩脅脹痛此色欲損腎怒氣傷肝六味地黃丸料加柴胡當歸一劑而安方見補益一婦人口苦脅脹此肝火也用小柴胡湯加黃連梔子稍愈更以四君子湯加當歸白芍柴胡調理脾胃而瘥臂痛臂為風寒濕所搏或睡後手在被外為寒邪所襲遂令臂痛及乳婦從臂枕兒傷於風寒而致臂痛悉依本方對症用之一論有因濕痰橫行經絡而作臂痛者二術湯蒼朮米泔浸一錢半白朮去蘆南星陳皮白茯苓去皮香附酒芩羌活威靈仙半夏甘草各一錢上銼一劑生薑水煎服一論臂痛因於寒者五積散方見中寒一論臂痛因於氣者烏藥順氣散方見中風一論臂痛因於濕者蠲痹湯當歸赤芍黃耆羌活薑黃防風甘草炙各等分上銼生薑五片煎服一論臂冷痛起手甚艱或一臂痛或兩臂俱痛者五積交加散主簿傳效五積散合人參敗毒散加木瓜薑棗煎服未效再加牛膝可服烏藥順氣散加羌活木瓜一論凡臂軟無力不任重者乃肝經氣虛風邪客滯於榮衛之間使血氣不能周養四肢故有此症肝主項背與臂膊腎主腰胯與腳膝其二臟若偏虛則隨其所主而病焉今此症乃肝氣偏虛宜補肝腎六味丸主之一男子年六十餘素善飲兩臂作痛恪服祛風治痹之藥更加麻木發熱體軟痰湧腿膝拘痛口斜語澀頭目暈重口角流涎身如蟲行搔起白屑始信謂余曰何也余曰臂麻體軟脾無用也痰涎自出脾不能攝也口斜語澀脾氣傷也頭目暈重脾氣不能升也癢起白屑脾氣不能營也遂用補中益氣加神麯半夏茯苓三十餘劑諸症悉退又用參術煎膏治之而愈肩背痛一論脈洪大促緊者肩背痛沉而滑者痰痛也豁痰湯半夏制梔子炒陳皮海桐皮枳殼各八分桔梗赤芍蒼朮制香附各七分茯苓去皮六分川芎薑黃各五分甘草三分上銼一劑生薑煎服如痛甚頭劑加朴硝二錢一論肩背痛不可回顧者太陽氣鬱而不行也以風藥散之脊痛腰強腰似折項似拔此足太陽經不通行也以羌活勝濕湯藁本二錢防風羌活獨活各一錢川芎一錢蔓荊子六分甘草六分上銼一劑水煎服身痛腰沉經中有濕寒加防己一錢輕者炮附子重者炮川烏各五分一論背心一點痛者痰氣之所聚也參合湯陳皮半夏制茯苓去皮烏藥枳殼麩炒殭蠶炒川芎白芷麻黃桔梗乾薑紫蘇香附蒼朮甘草羌活各等分上銼薑棗煎服一論風熱乘肺肩背強直作痛提肩散防風羌活藁本川芎白芍炒各七分黃連酒炒黃芩酒炒各五分甘草四分上銼一劑生薑三片煎服濕加蒼朮防己薏苡仁各五分氣虛加人參汗多加黃耆蜜炒一錢血虛加芎歸地黃一治肩背痛汗出小便數而少風熱乘肺肺氣鬱甚也當瀉風熱則愈以迎氣防風湯防風羌活陳皮人參甘草各五分藁本青皮各三分白豆蔻黃柏各二分升麻四分柴胡黃耆蜜水炒各一錢上銼一劑水煎食後溫服如面白脫色氣短者不可服一論體虛人背上惡風或夏月怕脫衣及婦人産後被冷風吹入經絡故常冷痛或手足冷入骨者又治腰痛及一切冷痹痛又治濕氣禦寒膏用生薑八兩取自然汁入牛膝三兩乳香沒藥末各一錢五分銅勺內煎化就移在滾水內須以柳條攪令成膏又入花椒末少許再攪勻用皮紙將紙作殼子視痛處闊狹貼患處用鞋烘熱尉之候五七日脫下或起小痕不妨痛風夫痛風者皆因氣體虛弱調理失宜受風寒暑濕之毒而四肢之內肉色不變其病晝靜夜劇其痛如割者為寒多腫滿如剜者為濕多或汗出入水遂成斯疾久而不愈令人骨節蹉跌股脛消瘦者為難療矣豫考痛風脈理多端有旦定而夜甚脈弦而緊者是痛風也脈沉而伏中氣也不可一例而治臨症當審辨矣經曰痹者謂風寒濕三氣合而成痹故曰痛痹筋骨掣痛也曰著痹著而不行也曰行痹走而不定也曰周痹周身疼痛也皆邪氣有餘之候耳一論痛風腰背手足肢節疼痛乃血虛氣弱經絡枯澀寒滯而然也午後夜甚者血弱陰虛午前早甚者氣滯陽弱痛甚者曰白虎歷節風走注風膝大脛瘦曰鶴膝風是也參五秦艽湯當歸三錢赤芍酒炒七分蒼朮童便浸一錢生地黃酒浸一錢萆薢一錢黑狗脊去毛根二錢川芎七分羌活一錢五分秦艽去蘆一錢五分川獨活一錢五加皮二錢黃連薑汁炒一錢黃柏酒炒一錢紅花酒洗八分黃芩酒炒一錢五分黃耆酒炒二錢人參二錢牛膝去蘆酒浸一錢五分杜仲每一兩用茴香一錢鹽一錢水二鍾拌炒此用二錢生甘草二分上銼桃枝七根每長一寸半燈心七根水煎臨服入童便好酒各一盞空心溫服渣再煎服忌酒面鯉魚濕熱羊鵝如天將作雨陰晦時日而預先覺痛甚者加防風天麻升麻午後夜甚者血弱陰虛加升麻五分牡丹皮一錢早上午前甚者氣滯陽弱加連翹沉香竹瀝乳汁痛甚者倍羌活紅花酒炒黃芩涼血則痛止此症乃筋與骨症患者乃外淫侵入日久及年近衰者不善養而得蓋筋屬肝血骨屬腎水內損所致耳一論濕熱作痛不拘上下用之蒼朮妙於燥濕黃柏妙於去熱二物皆有雄壯之性亦簡易之方也加牛膝則治濕熱下流兩腳麻木或如火燎之熱者二妙散蒼朮米泔浸黃柏乳汁浸透上為末每服三錢用酒調下痛甚加生薑汁熱服一論血脈凝滯筋絡拘攣肢節疼痛行步艱難活血理氣第一品也舒筋散元胡索炒當歸辣桂各等分上為丸每服二錢用酒調下十全大補湯治勞倦遍身疼痛加半夏薑製倍佳一婦人年七十餘遍身作痛筋骨尤甚不能屈伸遍身作癢如蟲行口乾目赤頭暈痰湧胸膈不利小便短赤夜間殊甚用六味地黃丸料加山梔柴胡水煎服一論瘀血濕痰蓄於肢節之間筋骨之會空竅之所而作痛也肢節沉重者是濕痰晚間病重者是瘀血也趕痛湯乳香沒藥地龍酒炒香附童便浸桃仁紅花甘草節牛膝酒浸當歸羌活五靈脂酒淘去土上銼水煎溫服一論寒濕之氣痹滯關節麻木疼痛續斷丸黃耆一兩人參七錢白茯苓一兩山茱萸肉一兩薏苡仁一兩續斷一兩防風七錢桂心一兩山藥一兩白朮七錢熟地黃二兩牡丹皮一兩麥門冬一兩石斛一兩鹿角膠上為細末煉蜜為丸如梧子大每服五十丸空心溫酒下一論人手足不能屈伸周身疼痛消風飲臨川徐培鴻試驗陳皮白朮去蘆當歸酒洗白茯苓去皮各一錢防己獨活木瓜四分秦艽六分半夏薑製牛膝桂枝各八分元胡索羌活枳殼去穰甘草各三分防風五分上銼一劑生薑煎不拘時服氣虛加人參八分一論一切遍身骨節疼痛或流注作痛不可忍者立見神效人參白朮去蘆白茯苓當歸川芎天麻陳皮甘草赤芍防風生地黃羌活獨活南星黃芩上銼生薑煎服一論風濕相搏周身盡痛以益氣湯加羌活防風藁本蒼朮治之如病去勿再服以諸風藥損人元氣而益其病故也一男子兩胯痛不可忍者臨川徐擴吾試效黃耆蜜炒一兩揀參二錢蒼朮米泔制一錢五分當歸身酒洗一兩五錢秦艽一兩牛膝去蘆酒洗一兩獨活一兩杜仲酒炒一兩五錢熟地黃一兩桑寄生一兩五錢官桂二錢木瓜五錢小茴香鹽酒炒五錢上為細末酒打麵糊為丸如梧子大每服百丸空心酒下一論雷火針蒼朮五錢川芎三錢硫黃二錢半穿山甲三錢炒蔓荊子三錢皂角三錢麝香五分雄黃二錢艾葉三錢上為末紙卷如指大以草紙七層貼患處將藥然起淬之知痛則止一論尉法治諸風惡毒冷痹麻木腫痛或遍身骨痛始覺腫痛尉之無不即效蒼朮二兩羌活一兩獨活五錢蛇床子五錢蔓荊子五錢穿山甲五錢土炒雄黃三錢硫黃三錢麝香三分上為末炒熱以絹包尉患處一法以醋拌炒作餅用絹包燒稱錘放餅上尉之一人每勞肢體時痛或用清痰理氣之劑反不勞常痛加以導濕臂痛漫腫形體倦怠內熱盜汗脈浮大按之微細此陽氣虛寒用補中益氣加附子一錢人參五錢腫痛俱愈又以十全大補百餘劑而愈一人形體豐厚筋骨軟痛痰盛作渴喜飲冷水或用愈風湯天麻丸等藥痰熱益盛服牛黃清心丸更加肢體麻痹余以為脾腎俱虛用補中益氣湯加減八味丸三月餘而痊壽躋七旬一治白虎歷節風走注疼痛兩膝熱腫虎脛骨酥炙黑附子炮製去皮臍各一兩上為細末每服二錢溫酒調下七日再服腳氣脈弦者風濡弱者濕洪數者熱遲澀者寒微滑者虛牢堅者實結則因氣散則因憂緊則因怒細則因悲腳氣者濕熱在足而作氣痛也濕熱分爭濕勝則令人憎寒熱勝則令人壯熱此其為症亦有兼頭痛者頗類傷寒惟其得病之始本於腳氣為異耳又不可以腳腫為拘亦有痛而不腫者名曰乾腳氣亦有緩縱不隨者名曰緩風亦有疼痛不仁者名曰濕痹亦有轉筋攣急者名曰風毒此在醫者體會而辨症耳各有治法不同大抵腳氣之疾壅疾也喜通而惡塞故孫真人曰腳氣之疾皆由氣實而死終無一人以服藥致虛而殂故腳氣之人皆不得大補亦不得大瀉是方也木通防己檳榔通劑也可以去熱蒼白二術燥劑也可以去濕然川芎能散血中之氣犀角能利氣中之血先痛而後腫者氣傷血也重用川芎先腫而後痛者血傷氣也重用犀角若大便實者加桃仁小便澀者加牛膝有熱加芩連時熱加石膏有痰加竹瀝全在活法切勿拘也凡腳氣攻心喘急不止嘔吐不休皆死水犯火故也一論專治腳氣憎寒壯熱者此濕熱在足而作氣痛也防己飲蒼朮鹽水炒白朮黃柏酒炒防己生地黃酒炒川芎檳榔木通犀角甘草梢上銼水煎空心服一論腳氣初發一身盡痛或肢節腫痛便溺阻隔先用此藥導之次用當歸拈痛湯服愈羌活導痰湯羌活獨活各一錢防己炒一錢當歸一錢大黃酒煎一錢五分枳實炒一錢上銼水煎服一論濕熱腳氣為病肢節煩痛肩背沉重胸脅不利兼遍身疼痛下注足脛腫痛腳膝生瘡赤腫及內外生瘡膿水不絶或癢或痛並宜服當歸拈痛湯羌活茵陳各一錢防風豬苓苦參白朮去蘆各五分葛根四分黃芩酒炒澤瀉當歸酒洗知母去毛人參升麻蒼朮米泔浸炒各四分甘草一錢上銼水煎空心服一論三陽經腳氣流注腳踝上焮熱赤腫寒熱如瘧自汗惡風用人參敗毒散各一錢方見感冒門加蒼朮米泔炒大黃酒蒸各二錢作一服加生薑煎空心服皮膚搔癢赤疹加蟬蛻一論風濕流注經絡間肢節緩縱不隨老人腳膝疼痛不能履地七聖散川牛膝酒浸杜仲姜酒炒續斷川萆薢防風川獨活甘草各三兩上焙乾為末每服二錢酒調服一治腳氣止痛奇方乳香沒藥天麻白附子殭蠶上銼各等分為微末每服五分空心酒調服一治濕氣攻注腰腳痛行步不得當歸酒洗肉桂元胡索萆薢沒藥各三兩杜仲酒炒一兩五錢上為細末每服三錢空心溫酒調下一治腳氣浮腫川牛膝去蘆酒洗錢半威靈仙一錢漢防己一錢五加皮一錢五分川獨活一錢五分蒼朮米泔水浸一錢五分當歸身一錢川黃柏鹽酒炒一錢上銼一劑生薑煎熟入酒一杯同服一人有氣如火從腳上入腹者此虛極也蓋火起於九泉之下也此病十不救一治法以四物湯加黃柏知母降火之藥服之外以大附子為末津調貼腳心湧泉穴以引火下一按此條言猶有未盡者如果勞怯陰虛之人有此固當作陰虛治若壯盛之人有此則是濕鬱成熱之候也豫嘗冒雨途行衣濕得此症以後所制加味二妙丸一料服之而愈後醫數人皆驗若誤作陰虛治則成痿疾矣一治足跟痛有痰有血熱血熱四物湯加黃柏知母牛膝有痰唾者五積散加木瓜一論兩足濕痹疼痛或如火燎之熱從足跗熱起漸至腰胯或麻痹痿軟乃濕熱為病皆貪酒嗜欲乘風所致然耳加味二妙丸蒼朮泔制四兩黃柏酒浸曬乾二兩牛膝一兩當歸尾酒洗一兩萆薢一兩防己一兩龜板醋炙一兩或去龜板加熟地黃二兩亦可上為細末好酒打糊為丸如梧桐子大每服七十丸空心鹽薑湯下一治一切寒濕虛冷腳氣腫痛焦枯經年臥床不能動履者獨活寄生湯各等分入好酒煮熟飲之效方見中濕門一論男婦五勞七傷腎氣衰敗精神耗散風濕流注腳膝痠痛行步艱辛飲食無味耳閉眼昏皮膚枯燥婦人臟冷無子下部穢惡腸風痔漏吐血瀉血諸氣並皆治之經進地仙丹西園公屢驗黃耆炒一兩五錢人參一兩白茯苓去皮一兩白朮去蘆一兩大附子炮去皮四兩覆盆子二兩首烏二兩川烏炮一兩白附子炮四兩牛膝酒浸四兩肉蓯蓉酒浸四兩川萆薢二兩菟絲子酒製二兩烏藥二兩天南星炮二兩骨碎補去毛炒三兩防風二兩赤小豆二兩木鱉子去殼二兩羌活二兩川椒去目炒四兩地龍去土三兩金毛狗脊去毛二兩甘草二兩上為細末酒煮麵糊為丸如梧子大每服三四十丸空心溫酒送下陶隱君以此地仙丹編入道藏經時有人自幼年時得風氣疾久治不瘥五十餘年隱居修合日進三服諸病頓愈人常言看方三年無病可治治病三年無藥可用噫有是哉余近苦腳膝痠痛服經進地仙丹三月而愈由是知天下無不可治之病醫書無不可用之方特在於遇醫之明耳二十四味輕腳丸腳氣通用當歸酒洗二兩川芎一兩萆薢淨水煮乾一兩木香七錢海桐皮七錢細辛一兩牛膝酒洗一兩枳殼一兩蒼朮米泔浸炒七錢防風七錢石楠藤二兩麻黃七錢杜仲姜炒一兩木瓜七錢威靈仙七錢羌活一兩薏苡仁一兩乳香五錢續斷酒洗七錢檳榔一兩五加皮七錢獨活七錢五靈脂七錢沒藥七錢上為細末酒浸雪膏為丸如梧子大每服五十丸辣桂荊芥湯下或枳殼木瓜湯下一論寒濕腳氣疼痛不仁兩尺脈來沉細者此痹症也內經曰寒氣勝者為痛痹濕氣勝者為著痹今疼痛不仁是寒而且著也兩尺主二足脈來沉者為里遲者為寒是方也用桂附治其寒蒼朮治其濕甘苓脾家藥也扶土氣之不足制濕氣之有餘然必冷服者欲桂附之性行於下而不欲其橫行於上也六物附子湯白茯苓去皮三兩大附子炒去心桂心防己各四錢白朮去蘆甘草炙各一錢上銼一劑水煎空心服一論兩膝腫痛腳脛枯細者名鶴膝風也既痛後不謹感冒寒濕或步冰履霜以致兩足痹痛如刀剔虎咬之狀膝脛腫大不能行動用補中益氣湯去升柴陳皮加附子防風牛膝杜仲羌活川芎白芍熟地萆薢防己生薑棗煎服一論兩腿痠軟或赤或白足跟患腫或痛或癢痛後或如無腿者或如皺裂日晡至夜脹痛厥熱以補中益氣湯加入八味丸料補其肝腎一論兩足心發熱作癢以滾湯浸漬漬而出水肌體骨立作渴吐痰此脾腎虛而水泛為痰也以補中益氣湯兼進六味丸久而元氣復而諸症愈一論腳發熱則咽喉作痛內熱口乾痰涎壅上此腎經虧損火不歸經以補中益氣湯加麥冬五味及加減八味丸服愈一論兩腿逸則筋緩痿軟而無力勞則作痛如針刺脈洪數而有力此腎肝陰虛火動之象也用六味丸而愈一論八味丸治腳氣足少陰經腳氣入腹腹脹痛上氣喘急腎經虛寒所致也此症最急以腎水乘心火死不旋踵八味丸方見補益一論八味丸治腳弱加續斷萆薢老人加牛膝鹿茸治鶴膝風加牛膝人參鹿茸一人以兩足發熱或腳跟作痛用六味丸及四物湯加麥冬五味元參治之愈後因勞役發熱惡寒作渴煩躁用當歸補血湯而安一人足熱口乾吐痰頭暈服四物湯加黃連黃柏飲食即減痰熱益甚用十全大補湯加麥冬五味山藥山茱萸而愈一論風濕氣足脛腫痛用此熏洗立效防風荊芥苦參番白草地榆青藤麻黃蒼耳蒼朮生蔥炒鹽威靈仙各一兩上用水一桶煮熱於桶內熏蒸痛處出微汗待湯少溫再洗痛處一二次覺痛減如貧者只用桃柳榆槐桑椿六件木枝煎水洗亦效一論凡人患寒濕腳氣疼痛不仁者內服煎劑外宜以此湯煎洗之蓋冷疾洗之無有不良一椒湯洗法用川椒一兩蔥一握生薑掌大一塊水一盆煎湯洗之一治遠行腳打成泡用水調生面糊貼過夜間干不可挖破一論兩足痛如刀剜不可忍者先用生薑一片蘸香油擦痛處隨用生薑火燒熟搗爛敷患處須臾姜干而痛止神效一論腳氣衝心用白礬三兩煎水浸洗兩足良久自愈一論腳走急腳底熱腫如石塊不能行步痛不可忍者以燒紅磚一塊將草鞋浸於尿缸內一宿或半日取來放在紅磚上將腫腳底立在草鞋上火逼尿氣入皮里即消此病諸方不載如不早治爛入腳底俗曰罨一治腳氣腫痛鶴膝風不能動履用真生薑汁一碗入牛膠一兩熬成膏入乳香沒藥末各一錢攪勻絹帛攤貼腫消痛止次日將滾水入藥碗內去水又攤又貼效不可言補中益氣湯見內傷六味丸八味丸俱見補益當歸補血湯見發熱十全大補湯見補益一論鶴膝不能動履腫痛難當及麻木風濕屬虛寒者宜之神仙風藥酒秦歸身一兩大川芎一兩片白朮去蘆五錢白茯苓去皮大川烏炮各五錢軟防風五錢荊芥穗五錢羊角天麻五錢全蠍炒二錢香白芷五錢北細辛五錢何首烏五錢新草烏五錢威靈仙五錢金叉石斛五錢川牛膝去蘆五錢川獨活五錢羌活五錢麻黃節三錢石楠藤五錢薏苡仁一兩川乾薑五錢赤桂五錢尖檳榔五錢宣木瓜五錢真石乳五錢明沒藥二錢川續斷五錢白蒼朮米泔炒一兩嫩黃耆五錢兩頭尖五錢南木香二錢漢防己五錢桑寄生五錢赤茯神五錢骨碎補五錢甘草節三錢虎脛骨煅乳浸五錢上合一處用生頭酒五斤文武火熬熟去火毒早晚飲酒隨量一治男婦風濕相搏腰膝痛或因坐臥濕地雨露所襲遍身骨節疼痛風濕腳氣並治祕傳藥酒方白芷桔梗白芍川芎麻黃連根茯苓半夏肉桂甘草各一兩陳皮川厚朴薑汁炒枳殼炒牛膝各二兩杜仲酒炒二兩木瓜一兩五錢檳榔一兩五錢烏藥二兩防己一兩獨活一兩五錢當歸一兩五錢蒼朮米泔浸炒四兩上各銼以麻布袋盛用無灰好酒三斗將藥袋懸浸於壇內密封壇口放鍋內煮一時久然後取出過三日後去藥隨量飲之渣曬乾為末酒糊為丸如梧子大每服七八十丸空心溫酒下腿膝疼痛加川烏虎脛骨腰痛加破故紙肉蓯蓉枸杞子江侯祕傳藥酒方治腳膝腫痛並手足痛五加皮八兩川牛膝去蘆杜仲酒炒各三兩當歸生地黃各三兩地骨皮二兩上銼散好酒一罐入藥重湯煮二炷香土埋三日出火毒隨量飲之一論婦人下體腫痛用人參敗毒散加蒼朮黃柏威靈仙痛減又以四物湯加蒼朮黃柏防己紅花澤瀉一祕方治腳氣腫痛用木瓜為末好酒調敷患處立止一治兩腳俱是疙瘩腫毒骨痛用獨蒜切片鋪放痛處每蒜一片用艾二壯去蒜再換再灸痛自愈㿗疝內經曰肝脈大急沉皆疝症也心脈滑搏急為心疝肺脈沉搏為肺疝又三陽急為瘕三陰急為疝夫疝者由榮衛虛弱寒濕不調致令邪氣乘虛入於心腹中遂成諸疝發則小腹疼痛或繞臍逆上搶心甚則手足厥冷或大小便閉結其諸疝因邪氣流滯乃成積聚令人羸瘦少氣灑淅寒熱嗜臥飲食不養肌膚或腹滿嘔吐遇寒則痛又有婦人小腹腫痛攻擊及二腿者亦疝氣也一論疝氣者陰腫腹痛也川楝子小茴香破故紙青鹽山茱萸酒蒸三稜莪朮通草橘核荔枝核甘草各等分上銼水煎空心服立效收功加馬蘭花蒼朮如夏秋之月暑入膀胱疝氣作痛加黃連香薷扁豆木通滑石車前子一論疝氣腫痛或大便閉結或小便赤澀或有寒有熱兼治之神方也川楝子酒蒸去核取肉葫蘆酒炒小茴香鹽酒炒青鹽黑醜搗碎木香大黃滑石木通吳茱萸炒烏藥車前子上銼水煎空心服一治疝氣小腸氣南塘侄試效豬苓澤瀉蒼朮赤茯苓陳皮川木通白芍川楝子烏藥元胡索青皮紫蘇馬蘭花橘核仁三十個尖檳榔甘草各等分上銼生薑煎服一論治七疝及奔豚小腸氣臍腹大痛七疝湯知府劉水山傳二方元胡索小茴香酒炒川楝子全蠍炒人參大附子山梔子木香各等分上為細末每服三錢空心溫酒調服祕方治症同前青蒿一錢木通甘草各一錢川烏炮三錢燈草一錢上銼一劑水煎溫服一論治外腎腫痛諸般疝氣不論新久一服如神豫嘗用此丸治患疝氣偏墜已經十餘年服至一料除根永不再發木香金鈴丸嚴副使方木香乳香沒藥大附子麵裹火煨小茴香鹽酒炒川楝肉元胡索全蠍人參各等分上為細末好酒打糊為丸如梧子大每服百丸空心熱酒送下一服立止一論疝氣發於寒月者寒邪入膀胱也加減五積散方見中寒依本方加元胡索專治醉飽後色欲不節觸傷下腹致成疝氣其症自小腹連兩脅上心頭吊痛額出微汗宜之一論疝氣其症發於暑月者暑氣入膀胱也加減香苓散枳殼麩炒陳皮香附蒼朮麻黃香薷豬苓澤瀉木通滑石車前子三稜莪朮川楝子元胡索甘草上銼薑蔥煎服專治偏墜氣初起憎寒壯熱發表輕者一服而愈一論疝氣偏墜疼痛屬腎虛者久服除根六味地黃丸方見補益全料內加人參三兩甘枸杞子三兩巴戟肉三兩懷生地黃六兩用桂一兩酒二碗煎成一碗拌地黃蒸之破故紙二兩水三碗大小茴香各一兩青鹽三錢煎水一碗半同拌巴戟故紙共四味同炒同用之上為細末酒打麵糊為丸如梧子大每服百丸淡鹽湯下一論狐疝者晝則氣出而腎囊腫大令人不堪夜則氣入而腫脹皆消稍無疾苦蓋狐之為物也晝則出穴而溺夜則入穴而不溺以斯症肖之故曰狐疝夫晝陽也夜陰也晝病而夜痞者氣病而血不病也補中益氣湯方見內傷依本方加酒炒黃柏知母一論癲疝者頑疝也睪丸雖大而無疾苦也此以父子相傳得於有生之初已然非若有生之後三因所致之疾也故不必主治一論諸疝疼痛太學生徐擴吾傳豬苓澤瀉木通赤茯苓胡蘆巴川楝肉海藻牽牛巴戟桂心竹茹上銼水煎空心服一論治疝氣許碧沚傳檳榔一兩木通一兩五錢橘核川楝子小茴香白茯苓白朮豬苓澤瀉各一兩上銼水煎空心服一治偏墜氣痛用江枳殼橘核角茴三味同炒至褐色去殼將三味搗爛頭酒煎服立愈一治偏墜氣用豬懸蹄燒存性為末每服三錢黃酒調下一論治小腸偏墜氣用豬毛燒灰每服二錢空心熱酒送下立已一方加小茴香炒一治疝氣偏墜腫痛不可忍用槐子一錢炒為末入鹽三分空心熱酒送下立消而止一治陰囊風癢宜浮萍煎水洗之如成瘡用黃連輕粉雞蛋殼燒灰將末擦之即已一治陰囊癢不可忍宜豬肉湯加胡椒煎湯洗之立已一治陰囊腎莖肛門瘙癢抓破出血好而又癢者陳久釅醋二碗熬至一碗洗患處立已一治外腎腫大疼痛者用大黃末釅醋調敷患處立消一周少峰親家患疝氣偏墜腫痛不可忍者遇一秀才傳一方用黃土水和作干泥拍作大餅火炷柱架火上烘熱尉痛處冷則再易立愈一外腎因撲損而傷睪丸偏大有時疼痛者中有瘀血名曰血疝宜於夜分之時自以一手托其下一手按其上由輕至重玩弄百回彌月之間瘀血盡散陳氣皆行誠妙術也雖年深日久無不愈之一治外腎著驚縮小者麝香二錢朝腦三錢萵苣子一茶匙上用萵苣葉搗為膏貼臍上一治偏墜疝氣車左源傳蒼朮一片童便人乳各浸三日炒乾橘核一兩上為末酒糊為丸每服百丸空心送下一治疝氣戴耕愚傳荔枝核三錢燒存性小茴香炒一錢川楝肉一錢橘核一錢上為末鹽酒調服看時令先要發散寒暑一治外腎腫大麻木痛硬及奔豚疝氣偏墜七制金鈴丸川楝子不蛀者四十九個去皮核切片分七制各用七個小茴香二錢五分慢火同炒並用茴香破故紙二錢五分同炒並用故紙黑牽牛二錢五分同炒並用牽牛鹽一錢同炒並用鹽斑蝥十四個先去翅同炒去斑蝥不用巴豆肉十四個切作四段同炒去巴豆不用蘿蔔子二錢五分同炒去蘿蔔子不用外加大茴香炒青木香南木香辣桂各二錢五分上為細末酒糊為丸如梧子大每服三十丸食前鹽酒下指日計功打墜瘀血症本方加元胡索半兩略炒沒藥為末酒調下一治腎大如斗不過三服除根大小茴香青皮荔枝核各等分上銼散炒黃出火毒為細末酒調下二錢日進三服一治疝氣外腎腫脹神效四聖散小茴香炒穿山甲炒全蠍炒南木香各等分上為末每服二錢酒調服一服立效痿躄痿者手足不能舉動是也又名軟風下身痿弱不能趨步及手戰搖不能握物此症屬血虛血虛屬陰虛陰虛生內熱熱則筋弛步履艱難而手足軟弱此乃血氣兩虛風濕之症古方通用風藥治之非也獨東垣丹溪二先生治法始合經意而以清燥湯主之丹溪又分血熱濕痰氣虛血虛瘀血等法濕熱用東垣健步丸燥濕降陰火加蒼朮黃柏黃芩牛膝之類濕痰二陳湯加蒼朮白朮黃芩黃柏竹瀝薑汁氣虛四君子湯加蒼朮黃芩之類血虛四物湯加黃柏蒼朮兼送補陰丸亦有食積死血妨礙不得下降者宜從食積死血治之他如潛行散二妙散虎潛丸皆治痿妙藥也一論六七月間濕令大行子能令母實而熱旺濕熱相合而刑庚金大腸故寒涼以救之燥金受濕熱之邪絶寒水生化之源源絶則腎虧痿躄之病大作腰下痿軟癱瘓不能動履清燥湯黃耆蜜水炒一錢五分蒼朮米泔浸一錢白朮去蘆炒陳皮澤瀉各五分人參白茯苓升麻各三分麥門冬去心當歸身酒洗生地黃神麯炒豬苓各四分黃柏酒炒柴胡黃連各二分五味子九個甘草炙二分上銼一劑水煎空心溫服一論此藥能去風順氣活血壯筋又治痢後腳弱緩痛不能行履名曰痢風或兩膝腫痛足脛枯細名曰鶴膝風兼治一切痹麻風濕痿軟挾虛之症大防風湯當歸酒洗一錢川芎七分白芍酒洗一錢熟地黃一錢黃耆蜜炙一錢人參五分大附子炮去皮臍七分防風一錢牛膝酒洗五分杜仲姜炒一錢甘草炙五分羌活五分白朮去蘆一錢五分上銼一劑生薑五片棗一枚水煎溫服按上四物湯以補血參耆朮草以補氣羌防以散風濕以利關節牛膝杜仲以補腰腎以附子行參耆之氣而走周身脈絡蓋治血氣兩虛挾風濕而成痹痿不能行者之聖藥也觀其治痢後風可見矣然可以治不足之痿弱而不可治有餘之風痹也一論五子益腎養心丸治精血虧損下部痿軟無力不能步履方見補益養血壯筋健步丸治症同前黃耆鹽水炒一錢山藥一兩五味子一兩破故紙鹽水炒一兩人參一兩白芍酒炒兩半熟地黃四兩枸杞子一兩牛膝去蘆酒炒一兩菟絲子酒炒二兩當歸酒洗二兩白朮炒一兩杜仲薑汁炒二兩虎脛骨酥炙兩半龜板酥炙一兩蒼朮米泔浸二兩黃柏鹽水炒二兩防風六錢羌活酒洗三錢漢防己五錢上為細末用豬脊髓七條煉蜜為丸如梧桐子大每服百丸空心鹽湯下一治一切麻痹痿軟風濕血虛之候又治痢後腳軟緩痛不能行履名曰痢風或兩膝腫痛足脛枯細名曰鶴膝風以十全大補湯去肉桂加防風羌活牛膝杜仲大附子煨一人兩足痿弱不能動止豫用人參鹿茸各五錢上銼一劑水煎空心溫服連進數服而愈一治兩腳痿弱不能行者用新磚火燒紅以好醋澆之候溫布包烙腳下遍處立能行動一治腎氣虛憊腰膝痠痛行步無力起痿丹菟絲子酒洗煨爛搗餅曬乾二兩五錢肉蓯蓉酒浸二兩川萆薢破故紙酒炒胡蘆巴酒炒沙苑蒺藜微炒川牛膝去皮酒洗川杜仲酒炒防風酒洗甘枸杞子各二兩上為末酒煮豬腰子搗爛和丸如梧子大每服七八十丸空心酒下河間方去枸杞子加桂枝減半消渴消渴之脈數大者活虛小病深厄難脫夫消渴者由壯盛之時不自保養任情縱欲飲酒無度喜食膾炙或服丹石遂使腎水枯竭心火大燔熾三焦猛烈五臟乾燥由是渴利生焉心煩口渴燥渴而強中二症皆消渴也多渴而利燥渴者由熱中所作但飲食皆作小便自利而渴令人虛極短氣強中者陽具不交而精液自出凡消渴之人常防患癰疽所怕者一飲酒二房勞鹹食及面俱宜忌之大抵脈大者易治細小者難醫也一論消渴引飲無度脈實是也黃連麥冬牛乳生地黃汁生藕汁各等分上二味熬汁去渣入和牛乳二汁佐姜和蜜為膏徐徐於舌上以白湯些少送下或將前二味藥和汁為丸如梧桐子大每服五十丸白湯送下一日進十次一論治三消總治之方服之立愈人參白朮去蘆白茯苓去皮當歸酒洗生地黃各一錢黃柏酒炒知母黃連麥門冬去心天花粉黃芩各八分桔梗五分甘草二分上銼一劑水煎服天池膏治三消如神天花粉黃連各半斤人參知母去殼白朮炒去蘆各四兩五味子三兩麥門冬六兩去心藕汁二碗懷生地黃汁二碗人乳牛乳各一碗生薑汁二酒杯上先將天花粉七味切片用米泔水十六碗入砂鍋內浸半日用桑柴火慢熬至五六碗濾清又將渣搗爛以水五碗煎至二碗同前汁又煎二三碗入生地等汁慢熬如餳加白蜜一斤煎去沫又熬如膏乃收入瓷罐內用水浸三日去火毒每用二三匙安舌咽之或用白湯送下一論消渴口乾心煩用天花粉長流水煎當茶服之立效一論治三消渴神效用繅絲湯如無繅絲湯卻以原蠶繭殼絲綿煎湯皆可代之不時飲之極效蓋此物屬火有陰之用大能瀉膀胱中伏火引陰水上潮於口而不渴也一論陰虛火盛煩渴引飲無度養血清火湯當歸一錢川芎八分白芍酒炒一錢生地黃酒炒一錢麥冬一錢石蓮肉五分天花粉七分知母一錢黃連八分薄荷五分烏梅肉五分黃柏蜜水炒五分甘草五分上銼水煎溫服一治消渴病通用生地黃膏生地黃束如碗大一把洗切研細以新水一碗調開用冬蜜一碗煎至半取出入人參五錢白茯苓去皮一兩為末拌和瓷器密收以匙挑服夏月可加五味子麥門冬一治消渴玉泉丸人參黃耆半生半蜜炙白茯苓乾薑麥冬烏梅肉甘草各一兩天花粉一兩五錢上為細末煉蜜為丸如彈子大每服一丸溫湯嚼下一人消渴引飲無度或令食韭苗或炒或作羹無入鹽日二三次其渴遂止一人消中日夜尿七八升者鹿角燒令焦為末以酒調服五分日三次漸加至方寸匕一治消渴天花散天花粉一兩生地黃一兩麥門冬五錢五味子三錢葛粉五分甘草五錢上銼糯米一撮水煎服一論腎水枯竭不能運上作消渴恐生癰疽參耆救元湯黃耆蜜炒人參粉草炙麥門冬去心五味子上銼水煎入硃砂少許不拘時服一論一常人平日口乾作渴因飲酒食炙爆補劑房勞凡若此類過多致令腎水枯竭不能上制心火故有此症後必有疽發也宜先服此以絶其源及癰疽發後服此尤有益也八味丸懷生地黃酒浸瓦焙乾二兩山藥一兩牡丹皮八錢澤瀉酒浸焙乾八錢山茱萸去核焙一兩肉桂五錢白茯苓去皮八錢五味微焙一兩五錢上為細末煉蜜為丸如梧子大每服五六十丸五更時淡鹽湯送下溫酒亦可一論心腎不交消渴引飲有人病渴用渴藥纍年不愈用加減八味丸而愈其疾本以腎水枯竭不能制火心火上炎是以生渴此藥降心火生腎水一人不時發熱日飲冷水數碗寒藥二劑熱渴益甚形體日瘦尺脈洪大而數時或無力王太僕曰熱之不熱責其無火寒之不寒責其無水又云倏熱往來是無火也時作時止是無水也法當補腎用加減八味丸不月而愈一治腎水不足虛火上炎發熱作渴口舌生瘡或牙齦潰蝕咽喉作痛或形體憔悴寢汗發熱五臟齊損以六味丸加肉桂一兩五味子四兩一人形體魁偉冬日飲水自喜壯實余曰此陰虛也不信一日口舌生瘡或用寒涼之劑肢體倦怠發熱惡寒以六味丸補中益氣湯而愈一晡熱內熱不時而熱作渴痰唾小便頻數而口舌生瘡者此下焦陰火也以六味丸效痓病痓痙字之誤也強痓者堅強而徑直頸項牽急而背反張也此因風寒濕三者客於太陽傷其大筋筋牽而急故令痓也然得之風濕者令人有汗而不惡寒名曰柔痓昔人以桂枝加葛根湯主之是也得之寒濕者令人無汗惡寒名曰剛痓昔人以葛根湯主之是也小續命湯有麻黃附子杏仁可以發表散寒有桂枝芍藥則可以解肌驅風有防風防己則可以驅邪勝濕有人參甘草則可以益氣柔筋有川芎黃芩則可以和陰去熱乃附子之熱則可以溫經而亦可以去濕者也二痓歌原來痓病屬膀胱口噤如癇身反張此是傷風感寒濕故分兩症有柔剛無汗為剛須易識惟有葛根湯第一有汗為柔見的端桂枝葛根湯救急二症皆宜續命湯剛痓去桂用麻黃柔痓去麻當用桂只依此法最為良小續命湯麻黃去節人參黃芩酒炒白芍酒炒川芎酒洗防己杏仁去皮尖桂枝甘草各一錢防風附子炮去皮各五分上銼一劑水煎溫服葛根湯葛根二錢麻黃八分桂枝八分芍藥二錢甘草八分上銼生薑大棗水煎服一論剛柔二症頭搖口噤身反張手足攣搐頭面赤項強急與瘛瘲同治法如聖飲柴胡黃芩半夏赤芍川芎甘草白芷當歸防風羌活烏藥上銼生薑水煎服有汗是柔痓加白朮桂枝無汗是剛痓加麻黃蒼朮口噤咬牙大便實加大黃利之一論痓病有二發熱惡寒頭項牽強腰脊反張口噤面赤瘛瘲如癇有汗柔痓無汗剛痓以補中益氣湯內去黃耆柴胡升麻加川芎白芍熟地白茯苓剛痓身熱面赤脈緊加羌活防風黃芩乾葛去白朮柔痓身不熱手足冷脈沉細加熟附子羌活風痰痓加羌活防風栝蔞枳實桔梗片芩竹瀝薑汁去人參白朮破傷風痓加殭蠶全蠍防風羌活南星栝蔞仁枳實黃芩桔梗竹瀝薑汁去白朮人參汗吐下多發痓者本方倍人參黃耆當歸生地荊芥羌活白朮濁症兩尺脈洪數必便濁失精精之主宰在心精之藏制在腎凡人酒色無度思慮過情心腎氣虛不能管攝往往小便頻數便濁之所由生也因小便而出者曰尿精因見聞而出者曰漏精心不足而挾熱者為赤濁心不足而腎冷者為白濁陰不升陽不降上下乖捩是以有清濁不分之症大抵多是濕痰流注直燥中宮之濕兼降火升舉之法此為至要之語也一論便濁之症因脾胃之濕熱下流滲入膀胱故使便溺赤白混濁不清也宜燥中宮之濕用升麻柴胡提氣使大便潤而小便長不宜用寒涼傷血之藥主方陳皮八分半夏八分茯苓一錢蒼朮米泔浸炒七分黃柏酒炒七分柴胡七分升麻三分白朮去蘆五分神麯炒五分牡蠣五分梔子炒一錢蛤粉三分滑石一錢甘草三分上銼一劑生薑二片白果九枚水煎空心服渣再煎服忌煎炒辛辣物一論心中煩躁思慮憂愁抑鬱小便赤濁或有砂膜夜夢遺精遺瀝疼痛便赤或酒色過度上盛下虛心火上炎致肺經受克故口苦咽乾漸成消渴四肢倦怠男子五淋婦人帶下赤白五心煩躁此藥溫平清心養神祕精清心蓮子飲石蓮肉人參各二錢五分黃耆蜜炙赤茯苓各二錢麥冬去心地骨皮黃芩各一錢五分車前子一錢五分甘草三分熱加柴胡薄荷各一錢五分上銼一劑燈草十根生薑三片水煎空心服上盛下虛加酒炒黃柏知母各一錢一論心經伏暑小便赤濁而有熱也加味四苓散人參減半白朮去蘆赤茯苓去皮豬苓澤瀉香薷石蓮肉麥冬去心各等分上銼水煎空心溫服一論小便白濁溺數無度溺白如油光彩不定溺腳澄下凝如膏糊此真元不足下焦虛寒之所致也萆薢散益智仁一錢五分川萆薢三錢石菖蒲一錢烏藥一錢一方加茯苓三錢甘草八分上各等分銼一劑水煎入鹽一捻空心溫服腎虛加牛膝三錢杜仲三錢山藥三錢便赤加澤瀉二錢麥冬二錢一論白濁初起或半月者下焦虛熱之所致也滋腎散川萆薢二錢麥冬二錢遠志一錢黃柏二錢菟絲子三錢五味子酒炒四分上銼一劑竹葉三片燈草一團水煎空心服一論赤白濁乃水火之不分也水火分清散益智仁一錢五分石菖蒲一錢赤茯苓三錢車前子三錢豬苓三錢澤瀉二錢白朮一錢五分枳殼一錢萆薢二錢麻黃三分甘草八分陳皮二錢上銼水酒各半煎空心服若久病去麻黃易升麻一治遺精白濁玉環丹弟云嵩傳五色龍骨左顧牡蠣蓮花須芡實石菖蒲五味子黃柏酒炒各一兩一方用石蓮子去石菖蒲上為細末用金櫻子煎湯為糊入臼內搗千餘下成劑為丸如梧桐子大每服五十丸鹽湯下乾物壓之一治遺精白濁山藥一兩黃柏酒炒二兩牡蠣火煅醋淬七次五錢白茯苓去皮一兩上共為細末酒糊為丸如梧桐子大每服五十丸空心水下一論白濁夢遺及精滑出而不收者樗根丸樗根白皮有莢者是黃柏炒褐色蛤粉炒青黛乾薑炒黑滑石各等分上為末水糊為丸如梧桐子大每服百丸空心溫酒送下虛勞四物湯下一論白濁經年不愈或時夢遺形體瘦弱當作心虛治之定志丸遠志甘草水浸去心石菖蒲各二兩人參一兩白茯神去木二兩黃柏酒炒二兩蛤粉炒一兩上為末煉蜜為丸如梧桐子大硃砂為衣每服三十丸空心米湯送下一治小便白濁出髓條者人參白朮白茯苓青鹽破故紙大茴香益智仁酸棗仁炒左牡蠣煅各一兩上為末酒糊為丸如梧桐子大每服三十丸溫酒米飲任下一論瘦人陰虛火動患赤白濁下清離滋坎湯方見勞瘵依本方加萆薢牛膝山梔萹蓄赤芍一論久患白濁不止而作頭昏者以益氣湯加白茯苓半夏一論發熱口乾小便頻數大便閉結盜汗遺精甚至廢寢用當歸六黃湯二劑盜汗頓止用六味丸二便調和用十全大補湯及前丸兼服月餘悉愈一論肥人濕痰患赤白渴者二陳湯方見痰飲依本方加蒼朮白朮人參當歸生地麥冬山梔黃柏萆薢牛膝萹蓄一論肝腎脾肺虛損赤白濁久不愈者六味丸補中益氣湯早晚兼服六味丸方見補益補中益氣湯方見內傷依本方加白茯苓半夏一人久患白濁發熱體倦用補中益氣湯加炮姜四劑白濁稍止再用六味丸兼服諸症悉愈一人患頭暈白濁余用補中益氣湯加茯苓半夏愈而復患腰痛用山藥山茱萸五味萆薢遠志頓愈又因勞心盜汗白濁以歸脾湯加五味而愈後不時暈眩用八味丸而愈補遺一治遺精白濁木賊小川芎各五分粉葛一兩居其中蛇蛻一寸半頭向上者掛壁顯神通上用酒炒空心服一治赤白濁陳雲嶽傳木通去節七錢滑石三錢粉草四錢黃荊子一勺上銼水煎空心服立已遺精遺精白濁當驗於尺結芤動緊二症之的夢泄者其候有三年少壯盛鰥曠逾時強制情欲不自知覺此泄如瓶之滿而溢也是以無病不藥可也或心氣虛不能主事此泄如瓶之側而出也人多有之其疾猶輕則以和平之劑治之真元久虛心不攝念腎不攝精此泄如虛瓶而漏者也其重病可決也須作大補湯丸治之不可少緩一論心所慕而作夢遺此君火既動而相火隨之治在心黃連清心湯黃連六分生地三錢當歸三錢人參二錢遠志一錢白茯苓三錢去皮木酸棗仁炒一錢五分石蓮肉一錢甘草八分上銼水煎加麥門冬去心尤妙魯藩泰興王驗方治遺精人參二錢石蓮肉一錢蓮鬚二錢芡實三錢麥冬二錢白茯苓三錢遠志一錢甘草八分上銼水煎溫服一方加酸棗一錢柏子仁二錢石菖蒲一錢黃柏酒炒二錢一論心神寧靜則精固君相火息則溺清是症者始因撓乎心搖乎精而然也龍雷火動其水濁而不清尾閭不禁即精關弛而不固治宜補心寧神滋陰固本益智固真湯黃耆蜜炒一錢五分人參三錢白朮酒炒去蘆一錢白芍酒炒一錢白茯神去皮木一錢五味子十二粒夏用十六粒當歸身酒炒一錢麥冬去心一錢巴戟肉三錢益智仁去殼一錢酸棗仁炒一錢山藥一錢澤瀉一錢升麻五分黃連酒炒一錢五分黃芩一錢黃柏酒炒七分知母一錢蓮花蕊一錢生甘草梢一錢五分上銼分二劑水煎空心服一論心神不安腎虛每自泄精等症寧神固精丸黃柏酒炒知母酒炒各一兩牡蠣煅龍骨煅芡實蓮蕊白茯苓去皮遠志去心山茱萸肉各三兩上為細末煮山藥糊為丸如梧子大硃砂為衣每服五十丸米湯送下一論夜夢遺精或滑精虛損之極久不能止者滋補丸人參白朮炒白茯苓去皮當歸酒洗川芎白芍酒炒熟地黃酒蒸甘枸杞子杜仲酒炒牛膝去蘆酒洗天門冬去心破故紙酒洗遠志甘草水浸去心牡蠣煅龍骨煅金櫻子去毛蓮蕊甘草炙各等分上為細末山藥打糊為丸如梧桐子大每服百丸空心酒下一論男子發熱遺精或小便不禁俱屬脾腎虧損補中益氣湯方見內傷合六味丸方見補益二方合作湯劑水煎服一論嗜欲無度夢遺精滑日夜長流百方罔效病將垂危者玉堂丸扶溝何晴嶽傳蓮鬚色黃者佳一斤石蓮肉淨肉一斤芡實淨肉十二兩麥冬去心四兩用公豬肚一個加入蓮肉帶心皮一斤入砂鍋內水煮爛去肚將蓮肉曬乾同前藥為細末煉蜜為丸如梧桐子大每服百丸空心蓮鬚煎湯送下神效一男子水臟虛憊遺精盜汗往往夢交用豬腰子一枚以刀開去筋膜入大附子末一錢以濕紙包煨熟空心服之便飲酒一二鍾多亦甚妙三五服效一論養元氣生心血健脾胃滋腎水止盜汗除遺精降相火壯元陽養心滋腎丸臨川徐昭志傳人參一兩芡實去殼一兩酸棗仁炒二兩天冬去心二兩遠志甘草水泡去心一兩當歸酒洗一兩蓮蕊一兩柏子仁去油炒一兩石菖蒲去毛六錢熟地黃酒蒸二兩五味子一兩麥冬去心二兩知母去毛酒炒二兩白芍鹽酒炒一兩五錢白茯神去皮木一兩蓮肉去心皮一兩牡蠣火煅一兩懷山藥炒三兩生地黃酒洗二兩黃柏去皮鹽水炒二兩上為細末煉蜜為丸如梧子大每服七十丸空心鹽湯下一論神者精氣之室也神以御氣氣以攝精故人寤則神棲於心寐則神棲於腎心腎神之舍也晝之所為夜之所夢男子夢交而精泄女子夢交而精出是皆不知清心寡欲之道也斯人也神不守舍從欲而動晝有所感夜夢隨之心不攝念腎不攝精久而不已遂成虛損或有神氣委靡念慮猖狂風邪乘其虛厲氣干其正而夢與人交者是又難狀之疾也以鎮神鎖精丹人參白茯苓遠志甘草水煮去心柏子仁酸棗仁炒各一兩石菖蒲去毛一兩白龍骨煅牡蠣煅各兩半辰砂水飛五錢留一錢為衣上共為末煉蜜為丸如彈子大每服一丸棗湯下一論精滑久不愈牡蠣砂鍋內煅醋淬七次為末醋糊為丸如梧桐子大每服五十丸空心鹽湯下一治心虛夢泄以白茯苓去皮一味為末空心米飲調下一治遺精虛漏小便余滴及夜多小便者用益智仁十四個水煎入鹽少許同服一夢泄不止脈弦而大石蓮肉六兩甘草二兩上為細末每服二錢食前燈心湯下一人勞則遺精齒牙即痛以補中益氣加半夏茯苓芍藥並六味地黃丸漸愈更以十全大補加麥門冬五味而痊一人白濁夢遺口乾作渴大便閉澀午後熱甚用補中益氣加芍藥元參並加減八味丸而愈一人莖中痛出白津小便閉時作癢用小柴胡加山梔澤瀉炒蓮木通龍膽草茯苓二劑頓愈又兼六味地黃丸而痊一人便血精滑發熱一男子尿血發熱一男子發熱遺精或小便不禁俱屬腎經虧損用地黃丸益氣湯以滋化源並皆得愈一人午後有熱遇勞遺精其齒即痛此脾腎虛熱先用益氣湯並六味丸更以十全大補湯而愈一人夢遺精滑氣血虛損用十全大補湯加山茱萸山藥五味麥冬補中益氣湯方見內傷六味丸八味丸十全大補湯俱見補益諸淋脈盛大而實者生虛細而澀者死夫淋者有五淋之別氣砂血膏勞是也皆由膏粱之味濕熱之物或燒酒炙肉之類過多或用心太過或房勞無節以致心腎不交水火無制而成五淋之症名雖有五大概屬熱者居多故有新久虛實之不同耳學者審症而變通焉慎毋膠柱以調瑟也一論氣砂血膏勞五淋氣淋為病小便澀滯常有餘瀝不盡也砂淋為病陰莖中有砂石而痛溺不得卒出砂出則痛止也膏淋為病溺濁如膏也勞淋為病遇房勞即發痛引氣衝也血淋為病遇熱則發甚則尿血候其鼻準色黃者知其為小便難也一論心經蘊熱臟腑閉結小便赤澀癃閉不通及熱淋尿淋如酒後恣欲而得者則小便將出而痛既出而癢以此藥主之八正散大黃三錢瞿麥二錢木通二錢滑石三錢萹蓄二錢梔子二錢車前三錢甘草八分上銼一劑燈心水煎空心服按上方治諸淋屬實熱者宜之一治五淋神方海金沙散當歸二錢雄黃一錢川牛膝三錢去蘆酒浸大黃三錢木香八分海金沙三錢上為末每服一錢五分臨臥酒調服兩服見效按上方治諸淋不問虛實宜之一治淋瀝疼痛兼紅淋滋陰清火散當歸二錢生地黃三錢熟地黃三錢黃柏二錢知母二錢黃芩三錢黃連八分木通三錢桑白皮三錢上銼水煎空心服一治諸淋久不止者加味滋陰散當歸二錢川芎一錢五分白芍二錢熟地黃三錢陳皮二錢半夏二錢白茯苓三錢甘草八分升麻三分柴胡五分牛膝二錢黃柏一錢五分知母一錢五分白朮一錢五分蒼朮一錢五分上銼水煎露一宿空心服一論諸淋多屬膀胱之氣虛弱不能運用水道而成諸淋也宜補中益氣湯殊效方見內傷一論下淋久不止乃元氣下陷故也宜補中益氣湯方見內傷依本方參耆減半加川芎白芍熟地半夏茯苓牛膝黃柏知母蒼朮水煎露一宿空心服一論縱欲強留不泄淫精滲下而作淋者益元固精湯人參白茯苓蓮蕊巴戟升麻益智仁黃柏酒炒各二錢山藥澤瀉各一錢五分甘草梢三錢上銼水煎空心溫服一治小便淋瀝不通又治老人虛寒者患死血作淋痛不可忍者宜六味地黃丸方見補益依本方倍茯苓澤瀉又治小便頻數不禁去澤瀉用益智仁一治病苦淋瀝而莖中痛不可忍者六君子湯方見補益加黃柏一錢五分知母一錢五分石葦三錢滑石三錢琥珀八分水煎服一治冷淋諸藥不效者四君子湯方見補益加豬苓澤瀉木通連進三服又以菟絲子研極細用雞翎管吹入小便孔內極效一治心經積熱小便澀及五淋火府丹生地黃一兩搗膏木通黃芩炒各一兩上為細末煉蜜為丸如梧桐子大每服三十丸木通煎湯送下加甘草名導赤散學士云一卒病渴日飲水斗許不食者三月心中煩悶時已十月余謂心經有伏熱與火府丹數服而渴止食進此本治淋用以止渴可謂通變也一李司馬莖中作痛小便如淋口乾唾痰此思色精降而內敗用補中益氣湯六味地黃丸而愈一儒者發熱無時飲水不絶每登廁小便澀痛大便牽痛此精竭復耗所致用六味丸加五味子及補中益氣喜其謹守得愈若肢體畏寒喜熱飲食用八味丸一老人陰痿思色精不出內敗小便水道澀痛如淋用八味丸加車前牛膝立效一老人精已竭而復耗之大小便牽痛愈痛愈便愈便愈痛服以八味丸其功最效補遺一治血淋阿膠炒二兩豬苓澤瀉滑石赤茯苓各一兩車前子五錢上銼水煎空心服關格夫關格者謂膈中覺有所礙欲升不升欲降不降飲食不下此為氣之橫格必用吐其氣之橫格必在吐出痰也有痰以二陳湯探吐之吐中便有降有氣虛不運者補氣藥中用升降法丹溪曰此症多死寒在上熱在下也寒在胸中遏絶不散無入之理故曰格熱在下焦填塞不通無出之由故曰關格則吐逆關則不得小便內經曰人迎與氣口俱盛四倍以上為關格關格之脈羸不能極於天地之精氣則死矣一論關格上焦痰壅兩手脈盛是也枳縮二陳湯枳實麩炒一錢砂仁七分白茯苓去心貝母去心陳皮蘇子栝蔞仁各一錢厚朴七分川芎八分木香五分沉香五分香附童便炒七分甘草三分上銼一劑生薑三片水煎入竹瀝磨沉木香服一陰陽關格前後不通尋常通利大府小水自行中有轉胞一症諸藥不效失救則脹滿悶亂而死豫嘗以甘遂末水調敷臍下內以甘草節煎湯飲之及藥汁至臍二藥相反胞自轉矣小水來如湧泉此救急之良訣也遺溺夫尿者賴心腎二氣之所傳送膀胱為傳送之府心腎氣虛陽氣衰冷致令膀胱傳送失度則必有遺尿失禁之患矣經云膀胱不利為癃不約為遺尿也大宜溫補清心寡欲又有産後不順致傷膀胱及小兒胞冷俱能令人遺尿失禁各須隨症治之一論小便不禁出而不覺者是有熱不禁也宜五苓散方見中暑依本方去桂加黃柏黃芩黃連梔子山茱萸肉五味子水煎空心服一治小便不禁虛弱者用五苓散方見中暑依本方合四物湯方見補益加山茱萸肉五味子共十一味水煎空心服一治腎氣不足小便頻數日夜百餘次縮泉散烏藥益智仁各等分上為細末山藥糊為丸如梧子大每服七十丸空心鹽湯下一治遺尿不禁雞䏶胵一具並曬乾去穢淨不用水洗男用雌雞女用雄雞上為末每服二錢空心滾湯送下二三服愈一治遺尿失禁益智仁七個桑螵蛸七個為末酒調服用熟白果七個送下一治夜多小便用益智仁二十四個研碎入鹽同煎服一治小便多萆薢夜煎服之永不夜起一治夜多小便用胡桃灰煨熟臨臥溫酒嚼下一治小便內虛熱者頻數不禁用六味地黃丸服效一治氣不足脈微而澀小便頻數用小茴香不拘多少同鹽炒為末取糯米糕片炙軟熱蘸藥吃立效一治小便頻數用豬尿胞洗淨以糯米煮爛入椒少許同煮去椒只用胞切吃一治小便遺尿失禁多氣虛以益氣湯去柴胡加茯苓熟地黃益智仁肉桂一治小便頻數或勞而益甚屬脾氣虛弱以益氣湯加山藥五味子一論身體虛瘦夜常遺尿失禁人參八分白朮麩炒一錢山藥一錢益智仁七分山茱萸去核七分當歸一錢白芍酒炒一錢黃耆蜜炙一錢酸棗仁炒七分甘草炙四分上銼作一劑水煎服一論遺尿失禁身體虛瘦補中益氣湯方見內傷依本方去柴胡加山藥一錢益智仁七分山茱萸一錢一人因勞發熱小便自遺或時不利余作肝火陰挺不能約制午前用補中益氣加山藥黃柏知母午後服地黃丸月餘諸症悉退此症若服燥劑而頻數或不利用四物麥冬五味甘草若數而黃用四物加山茱萸黃柏知母五味麥冬若肺虛而短少用補中益氣加山藥麥冬若陰挺痿痹而頻數用地黃丸而愈一論腎與膀胱俱虛冷氣乘之不能約制故遺尿不禁或睡中自出加味地黃丸懷生地黃酒蒸四兩懷山藥二兩牡丹皮一兩五錢白茯苓一兩山茱萸酒蒸去核破故紙炒二兩益智仁一兩人參一兩肉桂五錢上為細末煉蜜為丸如梧桐子大每服百丸空心鹽湯下一小便桶內起泡盈桶此腎水衰也用紅雞冠花為末每服三錢空心溫酒調下小便閉小便不通由膀胱與腎俱有熱也腎主水膀胱為津液之府此二經為表裡而水行於小腸入胞者為小便若腎與膀胱即熱熱入於胞熱氣大盛故結澀令小便不通小腹脹滿氣急甚者水氣上逆令心急腹滿乃至於死診其脈緊而滑直者不得下小便也一論膀胱有熱小便閉而不通也導水散當歸二錢瞿麥三錢車前子二錢滑石三錢赤茯苓三錢澤瀉二錢豬苓二錢木通二錢石蓮子去殼一錢山梔子三錢黃連六分黃柏一錢五分酒炒知母一錢五分甘草八分上銼燈心煎空心溫服一小便不通百法不能奏效服此無不愈禹功散陳皮半夏薑製赤茯苓豬苓澤瀉白朮炒木通各一錢條芩八分升麻三分甘草三分山梔子炒一錢上銼一劑水二鍾煎至一鍾不拘時服少時以雞翎探吐之得解而止妙在吐譬如滴水之器閉其上竅則不瀝拔之則水通流泄矣一論溺溲不通非細故也期朝不通便令人嘔名曰關格又曰不通而死矣一見嘔吐便不可救經曰出入廢則神機化滅升降息則血氣孤危此之謂也一論小便閉塞用涼藥過多而不通者是元氣虛而不能輸化也以補中益氣湯主之一論小便淋瀝不通以六味丸倍茯苓澤瀉一論小便不通先將麝香半分填患人臍中上用蔥白田螺各搗爛成餅封於臍上用布帶縛住良久下宜用皂莢燒煙熏入陰中其水竇自通婦人亦用皂莢熏洗便處即通一論小便不通膀胱發熱者朴硝為細末每服二錢大茴香煎湯調下一論小便不通腹脹土蒺藜炒黃為末黃酒調下一論小便不通用豬膽汁投熱酒中服之立通又方用蚯蚓研以冷水濾濃汁服半碗立通大解熱極不知人事欲死者用之一論小便不通臍下滿悶者海金沙一兩臘茶五錢上為末每服三錢生薑甘草梢煎湯調下一論小便不通兩尺脈俱沉微乃陰虛故也曾服通滑寒涼之藥所致用大附子一枚重一兩者炮去皮臍鹽水浸澤瀉一兩二味銼作四劑服水二盞燈心七根煎食遠服一論小便不通體腫喘嗽用補中益氣湯金匱腎氣丸兼服一論小便不通服涼藥過多脹滿幾死以附子理中湯加琥珀末一服立通一婦人病飲食如故煩熱不得臥而反倚息以脬繫了戾不得溺故致此病名曰轉脬但利小便則愈八味丸主之方見補益一治男子消渴小便反多婦人轉脬小便不通宜服八味丸又治婦人陰冷立齊云治老人陰痿思色精不出內敗小便道澀痛如淋八味丸加車前子牛膝若老人精已竭而復耗之大便小便牽痛愈痛愈欲便愈便則愈痛此藥最效八味丸主之方見補益一治小便不通用螻蛄一個焙熟嚼吃黃酒送下立通一治小便不通並傷寒雜症而不可以藥通利者用此藥立通以皮硝煎化用青皮蘸水搭臍上並小便處熱則易之一治小便不通已經七八日遍身手足腫滿諸醫罔效余以紫蘇煎湯入大腳盆內令病人坐上熏蒸冷則添熱滾湯外用炒鹽尉臍上遍身腫處良久便通腫消而愈一治小便不通小腹脹滿不急治即殺人連根蔥白一斤搗爛炒熱以布裹分作二包更替尉臍下即通加麝香尤妙一治小便不通諸藥無效或轉胞至死此法用之小便自出豬尿胞一個傾出尿用鵝毛管去頭尾插入竅孔內線扎定以口吹氣令滿胞用線管下再扎住管口放在小便頭上向竅孔解下線手搓其氣透里自然小便即出甚效大便閉脈多沉伏而結陽結脈沉實而數陰結脈伏而遲或結老人虛人便結脈雀啄者不治夫陰陽二氣貴乎不偏然後津液流通腸胃潤溢則傳送如經矣攝養乖理三焦氣滯運掉不行遂成閉結之患有五曰風閉氣閉熱閉寒閉濕閉是也更有發汗利小便及婦人産後亡血走耗精液往往皆能令人閉結燥則潤之澀則活之閉則通之寒則溫熱則清此一定之法也一論大腸實熱大便閉結不通用大黃皮硝牙皂三味各等分水煎一服立效又方用大黃末三錢皮硝五錢用好燒酒一碗泡化服之立效又方用皮硝五錢熱酒化開澄去渣加香油三四茶匙溫服立通一論凡大便難幽門不通上衝吸門不開噎閉大便燥結氣不得下治在幽門以辛潤之專治大腸血少結燥不通潤腸湯通幽湯去大黃火麻仁當歸一錢五分生地黃二錢熟地黃二錢桃仁一錢五分紅花五分升麻一錢大黃煨一錢火麻仁一錢甘草五分上銼水煎去渣調檳榔末二錢稍溫服一論大便閉結至極昏不知人事用大田螺二三枚以鹽一小撮和殼搗碎置病人臍下一寸三分以寬帛緊繫之即通一論大便閉結導氣丸木香檳榔火麻仁枳殼上將枳殼每個切作四片用不蛀皂角三寸生薑五片巴豆三枚略捶碎不去殼油用水一盞將枳殼同煎熟濾去三味不用只將枳殼銼細焙乾為末入前三味末煉蜜為丸蜜湯下不拘時服一治大便不通烏桕木方停一寸劈破以水煎取半盞服之立通不用多吃極其神效一人大小便閉數日不通用商陸搗爛敷臍上立通一論自汗大便閉結不通且便於老人並日久不能服藥者蜜導法蜜煉如飴乘熱作如指長二寸兩頭如鋭納穀道中良久下燥糞加皂角捻末少許更效香油導法用竹管蘸蔥汁深入大便內以香油一半溫水一半同入豬尿胞內捻入竹管將病人倒放腳向上立時即通一論自汗小便利而大便燥硬不可攻以此方導之豬膽導法豬膽一枚傾去一小半仍入好醋在內用竹管相接套入穀道中以手指捻之令膽汁直射入內少許即通蓋酸苦益陰以潤燥也一論大便不通並傷寒雜症用藥不行者粟米水煮至熟入火麻仁微炒不拘多少入粥內再煮二三沸飲湯下即通一論虛弱老人大便閉澀不通潤腸丸杏仁炒去皮尖枳殼炒去穰火麻仁炒陳皮炒各五錢阿膠炒防風各二錢五分上為細末煉蜜為丸如梧桐子大每服五十丸白湯送下一老儒素有風濕飲食如常大便十七日不通肚腹不脹兩尺脈洪大而虛此陰火內燥津液用六味丸二十餘劑至三十二日始欲去用豬膽潤而通利如常一婦人年七十有三痰喘內熱大便不通兩月不寐脈洪大重按散亂此屬肝肺腎虧損朝用六味丸夕用逍遙散各三十餘劑計所進諸藥百餘碗腹始痞悶乃以豬膽汁導而通之用十全大補調理而安若服前藥飲食不進諸症復作一治老人大便閉澀連日不通火麻仁一盞半研水浸取汁芝麻半盞炒研水浸取汁荊芥穗一兩桃仁去皮尖炒研一兩入鹽少許同煎服之立效一治大便常閉結宜久服活血潤燥丸當歸酒洗二兩懷生地黃一兩懷熟地黃一兩火麻仁一兩五錢枳殼麩炒七錢杏仁去皮五錢上為細末煉蜜為丸如梧桐子大每服七十丸空心溫水送下一治大便不通大黃皮硝牙皂上三味各等分水煎一服立通二便閉一論大小便不通關格不利燒皂角細研粥飲下三錢立通一方用不蛀皂角安瓦上燒著置馬桶內坐上熏其糞門自通又方二便閉結甚難醫急炒鹽來塞滿臍蒜片覆鹽推艾尉利便良方少人知一論蔥豉餅專治老人大小便不通生薑半兩蔥白根葉一大莖鹽一捻豆豉三十粒上搗爛須烘熱安臍中以帛扎定良久氣透即通或再換一餅又方用蜂蜜一鍾入皮硝二錢滾湯一茶鍾化下一治大小便不通明礬末一匙安臍中冷水滴之冷透腹中自然通如是曾灸無臍孔即於灸盤上用紙作圈子籠灸盤著礬末在內仍以水滴之若倉卒無礬以鹽燒過入臍內蒜片上灸之一論關格脹滿大小便不通獨蒜燒熟去皮綿裹納下部氣立通冷則易腹滿不能服藥者用之一論大小便不通者此氣閉也鐵腳丸皂角去皮子炙不拘多少為細末酒打麵糊為丸如梧子大每服三十丸酒送下一論大小便不通此方治之殊效蝸牛膏用蝸牛三枚去殼搗如泥加麝香少許納臍中以手揉按之立通或用田螺亦可一治大小便不通豬牙皂角末豬膽汁調竹管吹入糞門小便不通蔥汁吹入馬口驗六七月間尋牛糞中有大蜣螂不拘多少用線穿起陰乾收貯用時取一枚要全者放淨磚上四面以炭火烘乾以刀從腰切斷如大便閉用上半截小便閉用下半截各為細末新汲水調服二便俱閉者全用一人大小便不通十餘日腹脹欲死諸醫用硝黃牽巴等無效豫以冬葵子一劑水煎服立通一論大小便不通垂危者蘇危散苦瓜蒂五錢川烏炒草烏炒香白芷牙皂炒細辛各三錢胡椒一錢麝香少許上為細末用小竹筒將藥少許吹入肛內即通神速一論臟腑實熱或小便不通或大便不通或大小便不通顛倒散大黃六錢滑石三錢皂角五錢上為細末溫酒送下如大便不通依前分兩如小便不通黃三石六角如前如大小便俱不通黃石均分角亦如前一治大小便不通百方不效肚腹脹滿疼痛咽喉飽塞或痰壅盛氣喘傷寒結胸臥不倒床水米不下死在須臾此幽門氣閉不通用甘遂五分麵裹火煨熟取出為末入麝香三釐飯搗為丸淡薑湯下立通或小便不通或大便不通或大小便俱不通者皆效痔漏脈沉小實者易治浮洪而軟弱者難愈夫痔漏之原由乎酒色過度濕而生熱充乎臟腑溢於經絡墜於穀道之左右衝突為痔久而成漏者也痔輕而漏重痔實而漏虛治痔之法不過涼血清熱而已至於治漏初則宜涼血清熱燥濕久則宜澀竅殺蟲而兼乎溫散也或曰痔漏火是根原何故而用溫澀殊不知痔止出血始終是熱漏流膿水始是濕熱終是濕寒不用溫藥何以去濕而化寒乎非止痔漏百病中多有始熱百終寒者如瀉痢如嘔吐初作則腸胃氣實而熱久則腸胃氣虛而為寒矣一論痔瘡腫痛初起立效祛風解毒湯黃連一錢黃芩一錢連翹一錢五分赤芍一錢枳殼麩炒一錢大黃酒蒸一錢五分苦參一錢五分黃柏一錢槐花一錢上銼水煎空心服為末水泛為丸用溫水下亦可一論內經曰二陰皆屬腎雖見症於大腸實陰虛而火盛也祛毒養榮湯當歸一錢芍藥二錢生地黃酒洗一錢黃連酒炒一錢五分黃芩一錢黃柏酒炒五分知母一錢連翹一錢升麻五分荊芥一錢槐角二錢皂角子二錢皂角刺二錢天花粉二錢黃耆一錢人參一錢甘草節一錢上銼一劑水煎空心熱服遠酒色則全愈一論千金不換刀圭散治痔漏百發百中方見中風一論專治通腸痔漏濟生蓮蕊散蓮蕊焙一兩當歸五錢五倍子五錢黃連五錢乳香五錢沒藥五錢礬紅四兩黑醜頭末炒一兩錦紋大黃半生半熟一兩上共九味為細末欲服藥前一日勿食晚飯次日空心用淡豬肉汁一鍾好酒一鍾半和豬肉汁煎稱藥一錢二分調服午後於乾淨黃土上大便見紫血為驗或如爛杏五色相雜亦為驗矣如散藥難服用酒糊丸如緑豆大每服一錢五分淡豬肉湯下此方神效不可輕忽切忌燒酒色欲發物魚羊犬肉一論治痔漏纍驗蝟皮丸長葛張明山傳刺蝟皮一個連刺酒浸炙乾當歸酒洗二兩槐角酒浸炒二兩黃連酒炒二兩地骨皮酒炒乾二兩甘草蜜炙二兩乳香二錢核桃十個內取膈三十六片上為細末醋糊為丸如梧桐子大每服二十五丸白湯或酒早晚二服一月後平復神效一論凡人衣食豐饒患痔必由於飲食色欲所致及有乘酒醉犯房欲要除根必須服此滋陰補內之藥大戒醇酒厚味寡欲可也臟連固本丸懷生地黃六兩山藥四兩山茱萸肉四兩白茯苓去皮三兩牡丹皮三兩澤瀉一兩黃連四兩黃柏去皮四兩槐角三兩知母去毛三兩人參三兩當歸二兩皂角二兩天花粉二兩上各為細末用雄豬大腸一段去脂油灌藥末於內兩頭絲線縛住用糯米二升煮飯將半熟時撈起去湯將藥腸盤藏於飯中如蒸飯已熟待冷些取出去兩頭無藥線縛之腸將藥腸入淨石臼內杵爛揀出腸渣筋如不黏加些飯杵之好丸如梧桐子大曬乾每服百丸白滾水送下一論痔漏多年不瘥之神方也收功補漏丸臨川徐學韋驗白茯苓去皮赤茯苓去皮沒藥各二兩破故紙四兩上藥俱不犯鐵器於石臼搗成塊春秋酒浸三日夏二日冬五日取出木籠蒸熟曬乾為末酒糊為丸如梧桐子大每服二十丸緩緩加至五十丸空心溫酒送下豫嘗以此方加入全料六味地黃丸同作一處同丸服治年久漏不愈者一料全愈一論漏瘡先須用補藥以補氣血參耆歸術為主要大劑服之外以附子為細末津調作餅子如銅錢厚以艾火灸之漏大者艾炷亦大漏小者艾炷亦小灸令微熱不可令痛餅乾即易之再和再灸又以補氣血藥作膏貼之一論痔瘡膿血淋漓口乾作渴晡熱便血自汗盜汗以益氣湯加茯苓半夏炮乾薑脾胃漸醒後以六味丸兼進而愈一治蓮花痔瘡余紹坪得效黃連三錢烏梅三十個大黃三錢穿山甲炒三錢上銼水煎空心服補遺一治痔漏熱症有瘀血作痛取出惡物通利小腸川芎一錢五分白芷一錢赤芍二錢枳殼一錢阿膠炒二錢莪朮一錢生地黃三錢茯神三錢木通二錢五靈脂一錢桃仁十粒大黃二錢白茯苓三錢甘草八分上銼一劑生薑三片蜜三匙水煎食前服以利為度一治痔漏脫肛便血方川黃連多用酒浸約三日許淨四兩防風去蘆枳殼麩炒二兩當歸全用四兩上四味為細末以前浸黃連酒和麵糊為丸如梧桐子大每服七八十丸空心米飲或沸湯送下忌煎炒酒面羊雞魚腥之物生肌散五倍子炒黃色三兩乳香沒藥孩兒茶各一錢白礬五分上為細末每次以竹管吹入漏瘡口內一治痔穀道中蟲癢不止用水銀棗膏各二兩同研相和捻如棗核狀薄綿片裹納下部明日蟲出若痛者加用輕粉作丸體氣天香散內閣祕傳琥珀乳香各一錢五分白膠香三錢白芷二錢當歸蛤粉各一錢五分枯礬三錢蜜陀僧五分上為細末洗淨腋下每日擦之有加銅緑者一治體氣方蜘蛛一個生捉大者將瓦燈盞二個一盛一蓋泥封固火煅輕粉一錢枯礬一錢赤石脂一錢先服通藥後用自己小便洗以此擦之一治體氣並口齒惡臭方丁香五錢藿香葉零陵香甘松各三錢香附白芷當歸桂心檳榔益智仁各一兩麝香白豆蔻去殼一兩上為細末煉蜜為丸杵千下丸如梧桐子大每服五丸至二十日身體即香一治體氣方枯礬一錢輕粉一分蛤粉二錢蜜陀僧五分上為細末研勻每以少許擦之一治腋氣方烏龍丸當歸酒炒一兩懷生地二兩搗爛白茯苓去皮二兩甘枸杞子炒一兩石蓮肉炒一兩丁香三錢蓮肉焙五錢木香五錢乳香五錢青木香五錢冰片一分五釐另研京墨五錢上為細末用陳米飯荷葉包燒過搗爛入地黃為丸如黃豆大用麝香一分黃酒化為衣每服三四十丸臨臥半飢半飽用砂仁一二分炒入黃酒內送下婦人加烏藥醋炒三錢香附米童便炒三錢收功後藥人參當歸生地黃乳香沒藥官桂木香各一錢麝香以上八味用陳酒浸過一宿青皮陳皮白芷良薑麻黃米殼甘草各一錢上銼水煎服出汗外用枯礬川椒各一兩為末擦腋下終身忌鱖魚羊肉一治狐臭神方真輕粉研細先用水洗淨次擦上藥立愈每三日擦一次搽一月斷根何以知其斷根其患人多是油耳若病根一去則油耳自愈此為驗也一治腋氣五更時用豬精肉二大片以甘遂末一兩拌之挾腋下至天明以生甘草一兩煎湯飲之良久瀉出穢物須在荒野之處則可恐穢氣傳人故也依法三五次即愈虛弱者間日為之其他蜜陀僧胡粉之類皆塞竅治末耳一治體氣祕方專治五膈五噎痞塞諸虛百損五勞七傷體氣口氣顙氣一切諸般臭氣初服一七百體遍香若常服身體康健壯陽滋腎補益丹田其功不可盡述透體氣口丸沉香丁香木香藿香沒藥甘松縮砂丁皮官桂白芷零零香細茶檳榔香附子孩兒茶白豆蔻人參各一兩乳香山奈細辛益智仁當歸川芎烏藥各五錢麝香朝腦各一錢薄荷一兩上先將大粉草半斤銼片水煮汁去渣將汁熬成膏將前藥為末煉蜜搗膏和為丸如芡實大每清晨噙化一丸黃酒送下忌生冷毒物解之沐浴方防風荊芥細辛當歸羌活獨活皂角藿香白芷藁本番白草水紅花川芎甘松上銼水煎沐浴令人香肌膚去風癬脫肛脈小而緩者易愈夫脫肛者乃虛寒下脫其病或因腸風痔漏人服寒涼或努而下脫或因久痢裡急窘迫而脫有産婦用力過多及小兒叫號努氣久痢不止風邪襲虛而脫也夫脫肛者肛門翻出也蓋肺與大腸為表裡肛者大腸之門肺實熱則閉積虛寒則脫出腎主大便故肺腎虛者多有此症若大腸濕熱用升陽除濕湯若血熱用四物加條芩槐花血虛四物加白朮茯苓兼痔加黃連槐花升麻虛弱用補中益氣湯加芍藥腎虛加六味地黃丸主之升陽除濕湯自下而上者引而竭之升麻八分柴胡八分防風一錢五分麥芽三錢澤瀉三錢蒼朮一錢五分陳皮二錢神麯二錢豬苓二錢甘草八分上銼水煎空心溫服胃寒腸鳴加益智仁一錢五分半夏二錢一論脫肛乃脾肺虛寒下脫肛門翻出也提氣散黃耆二錢蜜炙人參三錢白朮二錢去蘆炒當歸身三錢白芍二錢炒乾薑八分炒柴胡八分升麻四分炙甘草八分羌活一錢五分上銼水煎服洗法用五倍子三錢白礬一塊水煎溫洗以芭蕉葉或荷葉托之一治脫肛方以蜘蛛七個燒存性為末每少許香油調敷一方以生蜘蛛搗搭臍上即收一方以死鱉頭一枚燒令煙盡搗末敷上以手按托之一方以烏龍尾即梁上塵灰同鼠糞和之燒煙於桶內令坐其上熏之數遍即上不脫為效一論脫肛者肛門翻出虛寒而脫也益氣湯去柴胡加生地白芍茯苓桔梗炒乾薑棗煎服一治脫肛氣熱者宜熊膽五分片腦一分兒茶二分上為末以人乳調搽肛上熱汁自上而肛收矣諸蟲脈沉實者生虛大者死尺脈沉而滑者為寸白蟲蠶蝕陰症脈虛小者生徑急者死外臺云蟲脈當沉弱而弦今反洪大即知蛔蟲甚也九蟲形狀一曰伏蟲長四寸為群蟲之長二曰蛔蟲又曰長蟲動則吐清水出則心痛貫心則殺人三曰白蟲長一寸又曰寸白蟲相生子孫轉大長至四五寸或因臟腑虛弱而動或因食甘肥而動其發動則腹痛發作腫聚去來上下痛有休息亦攻心痛口喜吐涎及吐清水貫傷心者死四曰肉蟲狀如爛渣令人煩滿五曰肺蟲狀如蠶令人咳而聲嘶六曰胃蟲狀如蝦蟆令人嘔逆吐喜噦七曰弱蟲狀如瓜瓣又名膈蟲令人多唾八曰赤蟲狀如生肉令人腸鳴九曰蟯蟲形至微細狀如菜蟲居洞腸之間因臟腑虛弱而致發動則為痔為疥癬因人瘡處以生諸癰疽癬瘡瘻疥齲蟲無所不為穀道蟲者由胃弱陽虛而蟯蟲下乘也穀道肛門大腸之候蟯蟲者九蟲內之一蟲也在於腸間若臟腑氣爽則不妄動胃弱陽虛則蟯蟲乘之輕者或癢或蟲從穀道中溢出重者侵蝕肛門瘡爛一論諸般痞積面色痿黃肌體羸瘦四肢無力皆緣內有蟲積或好食生米或好食壁泥或食茶炭咸辣等物者是蟲積只此一服除根指迷七氣湯青皮去穰陳皮三稜醋炒香附益智仁藿香官桂桔梗大黃檳榔甘草上銼水煎露一宿五更空心溫服不得些少飲食不然則藥力減而蟲積不行矣服藥頃肚腹必痛當下如魚凍或長蟲或血鱉至日午蟲積下盡方用溫粥止之後服退黃丸一料全愈退黃丸平胃散六兩緑礬一兩上用醋糊為丸如梧子大每服六十丸棗湯送下忌食生冷發熱濕面等物萬應丸治諸蟲大黃八兩黑牽牛四兩檳榔四兩上為細末用楝根皮一斤皂角不蛀者十錠用水二大碗煎成膏搜和前三味藥為丸如梧桐子大外用沉香木香雷丸各一兩為細末先用沉香為衣然後木香雷丸為衣每服三丸四更時分用沙糖水送下一論蛔蟲或心如刺口吐清水用生艾取汁宿勿食但取肥豬脯一方寸片先吃令蟲聞香後飲汁當下蟲一論小兒諸疳生蟲不時啼哭嘔吐清水肚腹脹痛唇口紫黑腸口濕䘌宜服化䘌丸青黛蘆薈胡黃連蕪荑仁蝦蟆燒灰川芎白芷各等分上為細末豬膽汁浸蒸糕丸如麻子大每服一二十丸食後臥時杏仁湯送下一治下部生蟲䘌蝕肚爛見五臟便死艾葉入雄黃末入管中熏下部令煙入即愈一治下部蟲癢大棗蒸取膏以水銀和捻長三寸以綿裹宿納下部中明日蟲皆出又治痔漏一治蟲已蝕下部肛盡腸穿者取長股蝦蟆青背者一隻雞骨一分燒灰合納下部令深大效一論婦人陰中生瘡如蟲咬痛用桃葉搗爛綿裹納陰戶中一日換三次即安一論婦人陰蝕瘡陰戶中有細蟲其癢不可當食人臟腑即死令人發寒熱與勞症相似用豬肝切大片以花椒蔥拌豬油煎乾待冷納陰戶中少頃取出再換一片其蟲入肝盡出再用後方洗之洗拓散五倍子花椒蛇床子苦參白礬蔥各等分上水煎熏洗神效
