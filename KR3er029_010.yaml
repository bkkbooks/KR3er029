附子棗兒湯下虛熱柴胡竹茹湯下寒熱烏梅湯下上焦虛熱大黃湯下脾胃虛寒酒下一切風痛升麻湯下大小便不通木通湯下一切瘡疼蘿蔔湯下五勞七傷豬膽湯下打撲傷損酒下小兒天吊驚風防己湯下十仙奪命丹三稜莪朮木香沉香丁香沒藥川芎皂角苦葶藶巴豆去殼捶去油各等分上為細末棗肉為丸如櫻桃大每一丸空心涼水送下一梅核氣一鼓滿一積聚痞結一癥瘕氣塊一冷腹痛熱水瀉一冷心疼一食積一氣積一經脈不通一冷積金瘡夫金瘡者或刀斧槍劍所傷出血不止若出血太多者外用止血生肌之藥內用清心補血而調理之大抵脈浮細易治緊數者難治一治金瘡出血不止海螵蛸五錢白龍骨五錢五倍子二兩赤石脂一兩血竭三錢五分麝香少許上為細末以冷水洗淨敷於傷處百發百中一治刀傷石磕損血不止腫痛不可忍用蔥一大把切爛搗如泥熟研乘熱敷之如冷再換其痛即止一治傷破手足血出不止一時無藥即以自己小便淋洗傷處雖痛甚而即愈一治石傷刀損破者用磚上陳石灰研細末敷腫處血止即愈不出膿又不痛神效一止血住痛生肌金瘡丹嫩老鼠未生毛不拘多少韭菜根上各等分石臼搗爛入嫩石灰末於內摻幹成餅為度陰乾用時以刀刮藥末敷傷處一論金瘡所傷並一切臁瘡馬斷梁等瘡一捻金用臈月黑牛膽一個裝入石灰四兩白礬一兩陰乾取出入黃丹炒一兩研和敷患處凡一切手足皮膚偶然出血不止或槍刀刺傷或傷破手腕血長流不止用手指緊捺患處或麻繩扎住半日或一日即住急服八物湯生血氣為主一治箭傷能收斂金瘡口無疤痕用劉寄奴為末摻之立效一治金瘡箭鏃所傷用松樹懸皮生為末石灰煅通紅研為細末和勻敷之止血收瘡口神效一治毒箭傷破欲死者用鹽汁敷之如無鹽用靛青搽瘡立愈一治打破肢體血出不止中州傅體愛傳用生半夏為末摻患處立止一凡刀斧所傷血不止切勿飲水令血不止而死者多若血不止急以布蘸熱湯含之令冷水浸之即止一箭頭入骨肉不能出者用鵝管石為末撒在四圍箭頭自出一治刀斧重傷斫斷手足血出不止痛入骨髓急用手按上捉住降真香二兩銼末老松香五錢上同研細末童便洗淨四圍用藥敷住止血住痛生肌接骨一治金瘡腫痛出血不止寒熱口乾此氣虛血無所附而血不歸經也以補中益氣湯加五味麥冬主之陽氣復而愈一治刀斧傷破打破跌破出血不止開口不合用此止血生肌住痛立時見效金瘡散銀末發灰血竭人指甲燒存性珍珠燒存性各等分上為末研勻每用摻於患處立效一治醫針入而針折在肉中以鼠腦搗如膏塗之鐵棘竹木諸刺在肉中不出並蛇骨刺入毒痛方用燒死鼠敷之齒傷一人齒咬破指頭痛不可忍久則爛脫手指並手掌諸方不載急用人尿使瓶盛之將患指浸在內一宿即愈如爛者用食蛇龜殼燒灰敷之如無龜用鱉殼燒灰搽敷立愈中毒人為百藥所中傷其脈洪大者生微細者死又曰洪大而遲者生微細而數者死大凡百毒所中用甘草綠豆水煎服之能解百毒一方宜多灌香油為最良一治信毒水粉山砒霜及一切殺人之毒巴豆殼壯者十四個弱者七個花椒去目五分甘草五分上共搗為末涼水化服即時嘔吐如不吐再服其毒盡出如嘔吐不止用舊壁土滾水泡服立止一論中砒霜毒於肉飯中得之者則易治飲酒中得之者則散歸百脈難治若在胃膈作痛可吐在腹中可下急服藥得吐泄則愈一中砒霜毒諸方一方用綠豆半升細擂去渣以新汲水調服一方用人糞汁灌之立愈一方用臘月豬苦膽服之立已一方用旱稻草燒灰以新汲水淋汁絹巾濾過冷服一碗毒從下利一方刺羊血飲之立效一方用黑鉛井水磨服效一方用生麻油一碗灌之立愈一方用羊血陰乾收貯用井花水調服一方用新鴨血殺吃之不用水調一中砒霜水粉毒用膽礬一分研爛入井水一小盞和勻服之立解一中山砒霜毒將死用絲瓜根木槿葉研涼水調吃一二碗立解一中信毒水粉山砒霜毒並小兒蟲積用荸薺食之立解一中巴豆毒煮黃連湯飲之一中巴豆毒利下不止乾薑炮黃連炒上各等分為細末每服二錢涼水調服一中水粉毒陳壁隔去硝屑水丸百草霜為衣水送下一解砒霜毒硫黃四錢綠豆粉五錢上為細末冷水調頻頻緩服冬月用溫服如肚痛再加一服待肚不痛用雞毛探吐吐後用溫溫稀粥四五日不可食飯粽以此救數人效一治誤吞金鐵並銅錢羊脛骨炭火燒存性為末每服三錢米飲送下取下物從大便中出一治誤吞銅錢或金銀等物不能化者用砂仁濃煎湯服之其物自下一治誤吞針用雄磁石為末丸如櫻桃大吞下即服通利之藥打下大便而出昔有一女子將針尖誤嚥下肚諸醫不治用蠶豆煮熟同韭菜吃下針同菜由大便而出一兒誤吞針鯁喉不下死在須臾用黑砂糖和黃泥為丸令兒吞下泥裹針於內由大便而下一方用木炭燒紅急搗細末米湯調服一方用磁石一塊當呵之自出一中半夏毒以生薑汁飲之一中杏仁毒搗鹽汁解之一中桐油毒柿餅嚼吃立解一中花椒毒閉氣不通新汲水飲之一中藜蘆毒蔥煮汁服解之一中阿芙蓉毒或致不省人事用釅醋溫熱入砂糖灌下一二碗探吐之一中草烏川烏附子之毒嘔吐不止以香油灌下立解一方用多年陳壁土泡湯如渴用水調服之一飲饌中毒用黑豆甘草煮汁恣飲無虞中砒霜者亦效一治人或酒後口渴或發熱太甚夜間吃水誤食水蛭在腹或至三五個月而面黃肌瘦腹脹滿諸藥不效用泥土為丸香油為衣丸如綠豆大每服一百丸或二百丸空心溫水送下其蛭從土而下且油能泄瀉泥土水蛭之出也故效一治誤食河豚魚毒一時危困倉卒無藥用香油多灌之毒出盡即瘥否則殺人又法用白礬末以沸湯調灌之立愈一治誤吞田螺哽喉不下死在須臾用鴨一隻以水灌入口中少頃將鴨倒懸令出涎水與患人服之不一刻其骨即化一治誤食鱔鱉蝦蟆毒用豆豉一大合新汲水浸令豉水濃溫服之此三物令人大小便秘臍下痛有致死者一治誤食蟹中毒煮紫蘇飲一兩盞即解一方以生藕汁或煮乾蒜汁服均效一治凡中六畜肉毒用犀角濃磨水只服一碗便好一治誤中斑蝥毒煮黑豆汁飲之又宜澤蘭葉研汁飲之補遺一治服信毒方建昌胡春寰傳威靈仙生者七錢乾者一兩綠豆粉一錢芝麻一錢上將威靈仙研爛同下二味入涼水二碗攪勻先服一碗次將雞毛如服白信用紅公雞尾毛如服紅信用白雞毛一根入喉中即吐次又服前藥又探又吐三日愈一治信毒神方建昌鄧少山傳百草霜一錢硫黃五分白礬煮過巴豆三粒燒成灰三味研末雞清三個黃土一兩上水研化濾去渣將藥入內調下一方用綠豆粉白礬甘草各等分為細末每三錢香蔥湯下一中硇砂毒研綠豆汁以解之一治牛肉傷成脹滿用干稻草濃煎湯服之立效一中箭毒以鹽貼瘡上灸鹽三十壯瘥一中鱔魚毒可食蟹即解一中食牛馬肉毒甘草四兩研酒服儘量飲之須臾即吐或瀉如渴切不可飲水飲之即死骨鯁一治一切骨鯁或竹木箭刺喉中不下勝金方於臘月中取鱖魚膽懸北檐下令乾每有魚鯁即取一皂子許以酒煎化溫溫呷下若得逆便吐骨即隨頑痰出若未吐更吃溫酒但以吐出為妙酒即隨性量力也若更未出即煎一塊子無不出者此藥應是鯁在臟腑中日久疼痛面黃甚者服之皆出若卒求鱖魚不得蠡魚鯽魚鱅魚俱可臘月收之蠡魚即黑大頭一治雞魚等骨所鯁用金櫻子根將竹籤取出捶爛水煎用罐嘴插入喉內灌下勿犯牙一治諸骨鯁喉用玉簪花為末無花用根取汁用好醋調汁灌服不可犯牙犯之即落一治雞魚骨鯁用霜梅捶成指大丸子再將棉裹用線穿在內冷茶送下扯住線頭在手一嘔即出一治魚骨鯁不出以蒜納鼻中即出一治雞魚骨鯁燈心灰以米糖如指大蘸灰置喉中勿令沾齒待糖化骨即化下一治諸骨鯁喉以狗涎飲之即下一治骨鯁取硼砂一小塊口含化即下一諸骨鯁喉池素水傳黃蠟為丸如棗大小將溫茶飽服多多為佳然後服一丸當時諸骨或吐或下如神一雞骨鯁用香油煎滾待溫服之即可吐出一諸般骨鯁及魚鯁咽喉吞吐不得以橄欖食下即化如無橄欖用核燒灰水調下亦化邪祟脈來乍大乍小乍長乍短為邪祟脈又寸尺有脈關中無脈為鬼脈鬼脈得病之初便譫語或發狂六部無脈切大指之下寸口之上有動脈者是承祖灸鬼法一治一切驚狂譫妄逾垣上屋罵詈不避親疏等症以病者兩手大拇指用細麻繩扎縛定以大艾炷置於其中兩介甲及兩指角肉四處著火一處不著即不效灸七壯神效一論婦人瘟疾此方最妙辟邪丹虎頭骨二兩硃砂雄黃雌黃鬼臼皂莢蕪荑仁鬼箭藜蘆各一兩上為末煉蜜為丸如彈子大囊盛一丸男左女右係臂上或當病人房內燒之一客忤者中惡之類也多於道間門外得之令人心腹絞痛脹滿氣喘入心胸如不急治能殺人搗墨水和服一錢一飛屍者遊走皮膚穿臟腑每發刺痛變作無常處一遁屍者附骨入肉攻鑿血脈每發不可得近見屍喪聞哀哭便作一風屍者淫濯四肢不知痛之所作每發昏沉得風雪便作一沉屍者纏骨結臟衝心脅每發絞切遇寒冷便作一屍疰者舉身沉重精神錯雜覺昏廢每節氣至則輒至大惡上俱宜服蘇合香丸方見諸氣一論中惡客忤心腹脹滿癢痛如錐刀刺痛氣急口噤者以熱湯或酒送下若不下扶起頭灌之令下喉須臾瘥未蘇更與三丸腹當鳴轉即吐下便愈若口已噤亦須折齒灌之藥入喉即瘥忌蘆筍豬肉冷水肥皂之物備急丹大黃巴豆去殼油乾薑各等分上為細末煉蜜為丸如小豆大量老幼虛實用之一論心腹痛如錐刺下血便死不知人事及臥魘齧腳踵不覺者諸惡毒氣病方此是漢文帝時太倉公淳于意方故名倉公散白礬皂莢雄黃藜蘆各等分上四味共為細末每用如豆大納竹管中吹入病人鼻內得嚏則氣通便活若未嚏更吹之以得嚏為度能起死回生一方治急時氣纏喉風漸入咽塞水穀不下牙關緊急不省人事名如聖散加全蠍七枚吹鼻吐痰一論凡遇屍喪玩古廟入無人所居之室回來暴絕面赤無語者名曰屍疰亦曰鬼疰即中祟之謂也進藥便死宜移病人更行火醋熏鼻法則可復甦否則七竅迸血而死一論凡感臭穢瘴毒暴絕者名曰中惡不治即死宜燒炭火一杓以醋沃之令患人鼻受醋氣則可復甦既蘇以藿香正氣散服之方見霍亂一論初到客舍館驛及久無人居之冷房中為邪厲所襲但聞其人吃吃作聲便令人叫喚如不醒可用牛黃雄黃各一錢硃砂五分共為細末每一錢床下燒一錢酒灌之一論凡館舍久無人到積濕容易侵人預製此法即可遠此害極宜暑月燒之以卻瘟疫並散邪氣太倉公闢瘟丹茅朮一斤臺烏黃連羌活白朮各半斤川芎草烏細辛紫草獨活防風甘草藁本白芷香附當歸荊芥天麻官桂甘松乾薑三柰麻黃牙皂麝香芍藥各四兩上為末紅棗肉為丸如彈子大每一丸燒之一卒中惡搗韭菜汁灌鼻中又宜蔥心黃刺鼻中血出良論祟脈凡面色黯慘或邪視如淫凡脈乍大乍小乍浮乍沉乍長乍短乍有乍無或錯雜不倫或刮快暴至或沉伏或雙弦或鉤啄或滾運或橫隔或促散或尺部大於寸關或關部大於尺寸皆是染祟得之刮快鉤啄多見於脾洪運滾滾多見於肝橫隔促散多見於心脈大抵祟脈心脈虛散肝脈洪盛尤可驗焉蓋心藏神肝藏魂心虛則驚惕昏迷神不守舍而神氣得以入其魂耳補遺一治客忤卒死還魂湯麻黃三兩去節杏仁七十個去皮尖甘草一兩上銼水二碗煎至一碗去渣灌之通治諸卒死五絕五絕一曰自縊二曰牆壁壓三曰溺水四曰魘魅五曰凍死凡五絕皆以半夏為末冷水為丸如豆大納鼻中愈心溫者一日可治又治卒死半夏末如豆大許吹鼻中扁鵲治產後暈絕半夏為末冷水丸如豆大納鼻孔中即已一救自縊死者凡自縊高懸者徐徐抱住解繩不得截斷上下安被放倒微微捻正喉嚨一人以腳踏其兩肩以手挽其頂發常令弦急勿使緩縱一人以手摩捋其胸臆屈伸其手足若已僵直漸漸強移動之勿令泄氣又以竹管吹其兩耳候氣從口出呼吸眼閉仍引按不住須臾以小薑湯或清粥灌令喉潤漸漸能動乃止此法自旦至夕雖已冷可活自夕至旦陰氣盛為難救心下微溫者雖一日以上亦可活百發百中一法以半夏吹鼻中一治自縊氣已脫極重者只灸湧泉穴男左女右灸腳三壯即活一法男用雄雞女用雌雞刺雞冠血滴入口中即活一救水溺死者先以刀斡開溺者口橫放箸一隻令其牙銜之使可出水又令一健夫屈溺人兩足著肩上以背相貼倒駝之而行令出其水仍先取燥土或壁土置地上以溺者仰臥其上更以土覆之止露口眼自然水氣吸入土中其人即蘇仍急用竹管各於口耳鼻臍糞門內更迭吹之令上下氣相通又用半夏末搐其鼻又用皂角末棉裹塞糞門須臾出水即活一方艾灸臍中即活一凍死及冬月落水微有氣者脫去濕衣隨解活人熱衣包暖用米炒熱囊盛熨心上冷即換之或炒灶灰亦可候身溫暖目開氣回後以溫酒或薑湯粥飲灌之若先將火灸必死一用雄黃焰硝各等分為末點兩眼角一壓死及墜跌死心頭溫者急扶坐起將手提其發用半夏末吹入鼻內少蘇以生薑汁同香油打勻灌之次取藥服如無藥以小便灌之一取東邊桃柳枝各七寸煎湯灌之一中惡魘死者不得近前呼叫但唾其面不醒即咬腳跟及拇指略移動臥處徐徐喚之待少蘇用皂角末吹鼻取嚏或用韭汁灌鼻內亦可井塚一凡夏月不可淘井井中及深塚中皆有伏暑氣入則令人鬱悶殺人如欲入必須先以雞鵝鴨鳥毛投之置下至底則無伏氣毛若徘徊不下則有毒氣也亦有納生六畜等置其中若有毒其物即死若或不死而尤當先以酒數升遍灑井塚中四邊畔停少時然後可入若覺有此氣衝欲死者還取其井中水灑人面令飲之又以灌其頭及全體即活若無水取他水用之又方如已中毒以水噀其面並冷水調雄黃末一二錢入水噀之若轉筋入腹痛欲死者使四人捉手足灸臍左邊二寸十四壯又生薑一片劈破酒五盞煮濃頓服又醋煮衣絮令徹溫裹轉筋處又濃煮鹽湯通手洗患者手足摩胸肋間即蘇蠱毒夫蠱毒者有數種皆邪厲變感之氣而毒人也令人心腹攪動痛如有物在咬血肉皆爛如不即治食人五臟則死此病有緩有急急者十數日即死緩者延引歲月遊走腹內氣力羸瘦骨節沉重發則心腹痛煩躁而所中之物變為蟲漸食臟腑而死矣欲驗之法令病人唾於水內沉者是蠱浮者即非大抵脈數而細者死浮而緩者生一治蠱毒方晉福散晉礬福建茶各一兩上為末每服三錢新汲水調下即吐出也未吐再服必吐一論解一切蟲毒並蠱毒如被狐蠱毒鼠毒惡菌毒河豚毒疫死牛馬驢肉毒或蛇蟲惡犬所傷又治一切惡瘡並一切癰疽發背諸風癮疹及無名腫毒隨手取效萬無一失凡人家居旅行不可無此藥萬病解毒丸又名神仙太乙紫金丹方見通治一凡中蠱毒不論遠年近月但煮一雞卵去殼以小銀釵插入其中並含入口一飯之頃取釵視卵俱黑即為中毒一嚼生大豆不覺腥者蠱豆皮脹爛者蠱噙白礬味甘不澀者蠱唾津液水碗中沉是蠱浮非蠱一闢蠱用荸薺果名地慄須用江南所產之大者切曬為末常隨身每以白湯調下二錢一治百蠱不愈用白雞鴨血灌入口中良一解藥毒蠱蟲蛇諸毒大甘草節以真麻油浸年歲愈多愈妙取甘草嚼或水煎服神效又方垢膩散取白礬一塊令病人咀之如覺礬甜即是蠱毒乃用梳齒內垢膩不拘多少食之即吐惡物救荒辟穀辟穀仙方黑豆五升洗淨後蒸三遍曬乾去皮火麻仁三升湯浸一宿濾出曬乾膠水拌曬去皮淘淨三遍碓搗拌黑豆上為末用糯米粥合成團如拳大入甑蒸從夜至子住火至寅取出於瓷器內盛貯不令風乾每服一二團以飽為度不得食一切食物第一頓七日不食第二頓七七日不食第三頓三百日不食渴即研火麻子漿飲更滋潤臟腑容貌勝常若要重吃物用葵子三合杵碎煎湯飲開通胃脘以待沖和氣也救荒代糧丸黑豆去皮一升貫銀一個赤茯苓一錢白茯苓去皮五錢白朮五錢砂仁五錢上切碎用水五升同豆熬煮文武火燒直至水盡揀去各藥取豆搗爛丸如雞頭子大將瓦瓶密封每嚼一丸則任食苗葉可以終日飽雖異草殊木素所不識亦無毒不飢與進飯糧亦同防儉餅栗子紅棗胡桃柿餅四果去核皮於碓內一處搗爛揉勻捻作厚餅曬乾收之以防荒儉之用辟穀散山藥蓮肉去心皮芡實去殼白扁豆去殼炒綠豆去殼炒末各八兩薏苡仁去殼十二兩小茴炒四兩白粳米炒黃二升上共磨為末每服五錢滾白湯調服或白湯調蒸糕食之亦妙凡遠行水火不便或修行人欲省緣休糧用黃耆赤石脂龍骨各三錢防風五分烏頭一錢共泡於石臼內搗一千杵煉蜜丸如彈子大要行遠路飽吃飯一頓服一丸可行五百里服二丸可行一千里長生不老辟穀丹雲南雪白大茯苓去黑皮令淨定粉黃丹白松脂白沙蜜黃蠟各二兩硃砂五錢金箔二錢水銀三錢先將蜜蠟松脂於淨瓷碗內溶為汁傾藥在內以木匙攪勻候溫就大丸如指頭大用水銀為衣有死水銀法先洗手淨用水銀三錢點在手心內以指頭研如泥見手心青色將藥三五丸搓揉後以金箔約量攤碗內以藥丸在內搖動使金箔都在藥上密器收貯服時用乳香半錢水三小盞煎湯溫送下不嚼破服後第三日覺飢以乾麵和白茯苓末烙成煎餅食半飽以後藥在丹田可不飢渴久則交過五臟陰滓俱盡諸人得服並無所忌使人添氣力悅容顏身體康健百病皆除救貧拔苦實濟世之良方長生之妙法其間若欲飲食俱不妨事但七日之內吃食藥必隨下至半月藥在丹田永不出矣養元辟穀丹安五臟消百病和脾胃補虛損固元氣填精補髓能令瘦者肥老者健常服之為佳用黃健牛肉不拘多少去筋膜切作棋子大片用河水洗數遍令血味盡仍用河水浸一宿次日再洗一二遍水清為度用無灰好酒入瓦壇內黃泥封固桑柴文武火煮一夜取出焙乾為末如黃沙色者佳焦黑無用每牛末一斤加入後藥二斤為則人參四兩白朮去蘆陳土炒白茯苓去皮為末水浮去筋曬乾薏苡仁炒懷山藥水潤切片同蔥鹽炒黃去蔥鹽不用芡實仁去殼各半斤蓮子肉蔥鹽炒去心並蔥鹽不用小茴香炒四兩乾薑炒四兩白扁豆薑汁炒半斤砂仁炒二兩青鹽四兩甘草四兩烏梅肉二兩熬濃汁半瓶粳米炒黃取淨粉五斤末川椒去目二兩上藥為末與米粉末和勻外用小紅棗五升陳年醇酒五斤煮棗極爛去核加煉蜜二斤共和為丸如彈子大每服二丸不拘冷熱湯水任下嚼吃一日服三五次可不飢如渴只飲冷水灸法定例一定分寸取本人男左女右手中指相屈如環即以杆心從中節旁側量兩頭橫紋角即截斷為一寸用之不誤最為的當一點穴法皆要平正四體勿使歪斜灸時恐穴不正徒壞好肉矣若坐臥立並不得拳縮坐點則坐灸臥點則臥灸立點則立灸反此一動則不得其真穴矣然下火灸則先陽後陰先上後下先多後少先左後右宜審用之一論灸艾炷大小經云凡灸要艾根下廣三分若不及三分使火氣不得達病不能愈則是炷欲大惟頭與四肢欲小耳但去風邪而已小兒及體弱者如麥大一點艾火古忌松柏枳橘榆桑棗竹八木切宜避之今用清麻油點燈傳火於艾莖點發其艾是也兼滋潤灸瘡至愈仍不疼痛用蠟燭尤佳一著艾時宜正巳午時方可用火若午後未時氣盛不可下火並失飢傷飽憂愁恐怒怒罵喜笑天陰下雨風雷閃電並皆忌之一下艾時必先以蒜切片擦穴上然後安艾不然則動止之間其艾必落矣一著艾火痛不可忍預先以手指緊罩其穴處更以鐵物壓之即止一著火有眩暈者神氣虛也宜仍以冷物壓灸處其暈自蘇再停良久以稀粥或薑湯與飲之以壯其神復如前法以終其事一著艾火後須要瘡發所患即瘥不得瘡發其疾不愈若見灸瘡不發者用故鞋底令熱熨之三日而發仍以小雞鰱魚豆腐等熱毒者與之食謂以毒攻其瘡必發若氣血虛弱者調之以藥餌一灸後瘡未發宜柏樹葉貼之一灸後切宜避風冷節飲酒戒房事遠七情可擇幽靜之所養之為善一灸瘡痛不止用柏葉芙蓉葉端午午時採陰乾為細末每遇灸瘡黑蓋子脫了水調少許如膏貼紙上貼之即愈一灸瘡洗法以蔥艾薄荷等物煎水溫洗令逐風邪一灸瘡已發黑爛疼痛用桃枝楊柳枝胡荽黃連煎水溫洗一灸瘡出血用百草霜為末摻之即止一灸瘡已發可用膏藥貼之一二日一見使瘡膿出多而疾除也其膏必用真麻油入治病之藥或祛風除濕養氣滋血誠療損補虛之藥隨症入之為妙取穴法脊骨二十一節大椎三節至尾骶共二十四節合谷一名虎口手大指次指歧骨間陷中手陽明大腸脈所過為原虛實皆按之曲池肘外輔骨屈肘兩骨中以手按胸取之手陽明大腸脈所入為合谷頰車一名臼關耳下曲頰端近前陷中開口有空肺俞項後第三椎下兩旁相去各一寸五分千金對乳引繩度之或以搭手左取右右取左當中指末是正坐取之心俞五椎下兩旁相去脊各一寸五分正坐取之肝愈九椎下兩旁相去脊中各一寸五分正坐取之脾俞十一椎下兩旁相去脊中各一寸五分正坐取之腎愈十四椎下兩旁相去脊中各一寸五分與臍平正坐取之膏肓愈四椎下近五椎上兩旁相去脊中各三寸正坐曲脊伸兩手以臂著膝前令端直手大指與膝頭齊以物支肘毋令搖動取之銅人灸百壯多至五百壯如病人已困不能正坐當令側臥挽上臂令取穴灸之又當灸臍下氣海丹田關元中極四穴中取一穴又灸足三里以引火氣入內腰俞二十一椎節下間宛宛中以挺身伏地舒身兩手相重支額縱四體後乃取其穴百會前頂後一寸五分頂中央旋毛中可容豆直兩耳尖中脘臍上四寸居心蔽骨與臍之中胃之募手太陽少陽足陽明任脈之會上紀者中脘也丹田臍下二寸三焦募也關元臍下三寸小腸之募足三陰任脈之會下紀者關元也氣海臍下一寸半宛宛中男子生氣之海三里膝下三寸䯒骨外廉大筋內宛宛中兩筋肉分間舉足取之極重按之則跗上動脈止矣灸諸病法一論中風口噤不開牙關緊閉及中氣皆效人中一穴頰車二穴三里二穴合谷二穴一論卒中惡風心煩悶痛欲死秘穴立效取兩足大指下橫紋隨年壯灸之一論中風口噤不開機關二穴在耳下八分微前至五壯即止一論風中血脈則口眼喎斜中腑則肢體廢中臟則性命危凡治莫如發表調氣和血治痰諸法然後可扶持疾病若要收全功火艾為良也一論風中血脈口眼喎斜聽會二穴在耳前陷中張口得之有穴動脈應手頰車二穴在耳下二韭葉許陷者宛宛中開口得之地倉二穴在橫口吻旁四分外近下有脈微動者是凡喎向右者為左邊脈中風而緩也宜灸左喎陷中二七壯喎向左者為右邊脈中風而緩也宜灸右喎陷中二七壯一論風中腑手足不遂等症百會一穴在頂中央旋毛中肩髃二穴在肩端兩骨罅間陷者宛宛中舉臂取之曲池二穴在肘外輔骨屈肘橫紋頭陷中以手拱胸取之風市二穴在膝外兩肋骨平立舒下兩手著腿中指盡處宛宛中三里二穴在膝下三寸脛骨外廉大筋內筋骨之間陷者宛宛中絕骨二穴在足外踝上三寸動脈中凡覺手足癢或不仁痛良久乃止此將欲中腑之候宜灸此七穴病在左則灸右在右則灸左一論風中臟氣塞涎上不語昏危者下火立效百會一穴在頂中央旋毛中風池一穴在顳顱後髮際陷中大椎二穴在項後第一椎上陷者是肩井二穴在肩上陷中缺盆上大骨前一寸半以三指按取當中指下曲池二穴同前間使二穴在掌後三寸兩筋間足三里二穴同前凡覺心中憒亂神思不怡或手足麻痹此將中臟之候不問是風濕氣可速灸此七穴但以次第灸之各五七壯日別灸之隨年壯止妙素有風人尤須留意此灸法可保無虞此法能灸卒死凡人風發強忽怕痛不肯灸忽然卒死謂是何病風入臟故也一論暴啞不能言者速灸臍下四寸並小便陰毛際骨陷中各灸一七壯重者二七壯並男左女右手足中指頭盡處各灸三壯神效一論癲癇不拘五般以兩手中指相合灸之神效一治癇疾盡發灸陽蹺申脈在外踝下赤白肉際夜發灸陰蹺照海在內踝下赤白肉際各二七壯一癲狂諸般醫治不瘥者以兩手並兩足大拇指用軟繩急縛之灸三壯要四處著艾半在肉半在甲要四處盡燒則效矣此法神效一論魘死秘法凡夜夢魘死者皆由平日神氣不足致使睡臥神不守舍凡魘死者齧患人足踵即大指甲側即蘇又法用牙皂末吹入鼻中亦妙若經一二更者亦可灸之又一法灸大敦穴七壯即醒一論婦人月家得此不時舉發手足攣拳束如雞爪疼痛取左右膝骨兩旁各有一個小窩共四穴俗謂之鬼眼各灸三壯即愈一治陰毒腹痛脈欲絕者先以男左女右手足中指頭盡處各灸三壯又灸臍下一寸五分名氣海穴臍下三寸名關元穴各灸七壯極效一論真陰證四肢厥冷腹痛如錐刺急服大附薑桂如冰此中焦寒冷之甚宜急灸臍上二穴臍下二穴臍左右兩穴每七壯神效一論中寒陰症神法但手足溫暖脈至知人事無汗要有汗即生不暖不醒者死氣海穴在臍下一寸五分丹田在臍下二寸關元在臍下三寸艾灸三七壯一論哮吼神法胸中兩邊名郁中膻中百會一穴用艾灸之立已一論霍亂吐利及傷寒忽患咳逆連聲不絕乳根在正直乳下容一指許骨間陷中但婦人則屈乳頭度之乳頭齊處是穴艾炷如小麥大灸三壯男左女右火到即瘥只是三壯不可多灸一論呃逆咳逆灸氣海三五壯氣海直臍下一寸半一論灸瘧秘法無問新久令病人仰臥以線量兩乳中間折其半從乳至下頭盡處是穴男左女右灸之一治瘧如神令病人跣足於平正處並腳立用繩一條自腳板周匝截斷卻於項前般過背上兩頭繩盡處脊骨中是穴先點記待將發急以艾灸之三七壯其寒熱自止此法曾遇至人傳授妙不可言名曰背監穴也一論腹中有積及大便閉結心腹諸痛或腸鳴泄瀉以巴豆肉搗為餅填臍中灸三壯可至百壯以效為度一論灸遠年咳嗽不愈者將本人乳下大約離一指頭有其低陷之處與乳直對不偏者此名為直骨穴如婦人即按其乳頭直向下看其乳頭所到之處即是直骨穴之地位灸艾三炷其艾只可如赤豆大男灸左女灸右不可差錯其嗽即愈否則其病再不可治一論灸勞蟲於癸亥日灸兩腰眼低陷中之穴每穴灸艾七炷若灸十一炷尤妙須先隔一日前點穴方睡至半夜子時一交癸亥日期更灸其蟲俱由大便中出即用火焚之棄於江河中如蟲有黑嘴者則其在內已傷人腎臟矣此不可治蟲宜謹避瘵有數蟲如蜈蚣如小蛇如蝦蟆如馬尾如亂絲如爛面如蒼蠅如壁油蟲上紫下白形銳足細而有口或如白蟻孔竅中皆出此皆勞瘵根毒一論四花穴治骨蒸勞熱以稻杆心量口縫如何闊斷其多少以如此長裁紙四方當中剪小孔別用長稻杆踏腳下前取腳大指為止後取腳曲踿橫文中為止斷了卻還在結喉下垂向背後看稻杆止處即以前小孔紙當中安分為四花灸紙角也可灸七壯此四穴正合太陽行背二行膈俞膽俞四穴一論泄瀉三五年不愈者百會穴五七壯即愈有灸至二三十壯而愈者一論小兒大人吐瀉日久垂死者天樞二穴在臍旁各開二寸是氣海一穴在臍下一寸半中脘一穴在臍上四寸一論霍亂已死而腹中尚有暖氣者以鹽納臍中以艾灸不計其數一論翻胃垂死男左女右手拿棍一條伸手放在地上與肩一般高肩上有窩名肩井穴灸三壯即效一論翻胃噎膈神效膏肓二穴令病人兩手交在兩膊上則膊骨開以手指揣摸第四椎骨下兩旁各開三寸四肋三間之中按之痠痛是穴灸時手按則膊上不可放下灸至百壯為佳膻中一穴在膝部中行兩乳中間陷中仰肘取之灸七壯三里二穴在臍下三寸節外臁兩筋間灸七壯一論頭痛連齒時發時止連年不愈謂之厥逆頭痛曲鬢二穴在耳上將耳卷前正尖之上可灸五七壯左痛灸左右痛灸右一論牙疼痛隨左右所患肩尖微近後骨縫中小舉臂取之當骨解陷中灸五壯灸畢項大痛良久乃定永不發一論牙齒痛百藥不效用艾炷如麥大灸兩耳當門尖上三壯立已一論治心痛神法兩手肘後陷處痠痛是穴先用香油半鍾煮湯溫服即用艾入水粉揉爛為炷每處灸五壯其痛立止一論偏墜氣痛妙法蓖麻子一歲一粒去皮搗爛貼頭頂囟上卻令患人仰臥將兩腳掌相對以帶子綁住二中指於兩指合縫處艾麥粒大灸七壯立時止痛神效一論蠱病及痞塊中脘一穴或兩分三寸右關二穴分水一穴在右章門一穴在左再用線比患人五手指之長作朝圓賁以銅錢調下背至此錢所止脊骨處一論痞積妙法以雙線系開元舊錢一個懸於頸上適中處所錢胸前直垂而下孔對臍為率卻將頂上之線懸於喉上向背後垂下至錢孔對臍而止用墨點孔之中再錢之兩邊點處各灸一火至十餘壯更服他藥痞積即消其效甚速一論黃疸病人脊骨自上數至下第十三椎下兩旁各量一寸灸三壯即效一論衄血良法項後髮際兩筋間宛宛中灸三壯立止凡衄血自此入腦注法也一治衄秘法急用線一條纏足小指左孔取左右孔取右俱出則俱聽取於脂頭上灸三壯如綠豆大若衄多時不止者屈手大指就骨節尖上灸各三壯左取右右取左俱衄則俱取一論下血不止秘法命門一穴用篾二條自地至臍心截斷令患人平立取之取向後自地比至脊盡處是穴又須按其穴處疼方可灸不疼則不灸也灸可七壯止斷根永不發一論灸腸風臟毒便血久不止者以患人平立量脊骨與臍平處椎上灸七壯或年代深者更於椎上兩旁各一寸灸七壯無不除根一灸痔疾先以柳枝濃煎湯洗痔艾灸其上連灸三五壯忽覺一道氣轉入腸中因大轉瀉先血後穢一論脫肛秘法百會一穴尾骶一穴各灸三壯炷如小麥大當正午時用桃柳枝煎湯浴淨灸之立效灸諸瘡法一論一切瘡毒大痛或不痛或麻木如痛者灸至不痛不痛者灸至痛其毒隨火而散蓋火以暢達拔引郁毒此從治之法也有回生之功隔蒜灸法用大蒜頭去皮切三文錢厚安瘡上用艾炷於蒜上灸之三壯換蒜復灸未成者即消已成者亦殺其大勢不能為害如瘡大用蒜搗爛攤患處將艾鋪上燒之蒜敗再換如不痛或不作膿及不起發或陰瘡尤宜多灸而仍不痛不作膿不起發者不治此氣血虛之極也一論腦項後疽一名夭疽俗名對口男左女右腳中指下俯面第三紋正中用好蘄艾灸七壯一論發背癰疽初起未破用雞卵半截蓋瘡上四圍用麵餅敷上用艾灸卵殼尖上以病人覺癢或泡為度臭汗出即愈一灸疔瘡用大蒜搗爛成膏塗四圍留瘡頂以艾炷灸之以爆為度如不爆難愈宜多灸百餘壯無不愈者又灸痘疔蛇蠍蜈蚣犬咬瘰癧皆效一論灸痔神法用剋薄蟲其蟲圓而扁去足將此蟲令放痔上用艾炷灸七壯立效一論痔漏腫痛膿水黏痛不可忍用艾炷如梧子大灸尾閭骨尖上七壯全愈一論瘰癧已破以男左女右手搦拳後紋盡處豌豆大艾炷灸三壯三四日已一論瘰癧用養榮湯其癧皆消惟一二個不消者用癩蝦蟆一個剝取皮蓋瘰癧上又用艾灸皮上七壯立消一治兩腳俱是疙瘩腫毒骨痛用獨蒜切片鋪放癢痛處每蒜一片用艾灸二壯去蒜再換再灸至愈為效一論赤白汗斑神法或以針刺之出血亦已宜灸夾白穴先於兩乳頭上塗墨令兩手直伸夾之染黑處即是穴也一論破傷風及風犬咬傷此方最易而效良用胡桃殼半個填稠人糞滿仍用槐白皮襯扣傷處用艾灸之若遍身汗出其人大困則愈遠年者將傷處如前灸之亦效一論癲狗咬傷並治瘰癧用穿山甲銼黃土炒熟艾斑蝥上為末和勻作炷如黃豆大每一齒傷處用烏柏葉貼瘡口灸十四壯如無烏柏葉以幹人糞薄薄貼之一人被人打死或踢死急救百會穴在頭頂中艾灸三壯立蘇一論婦人難產及胞衣不下急於產婦右腳小指尖上灸三壯炷如小麥大立產一論婦人無子及經生子久不懷孕及懷孕不成者以女人右手中指節紋一寸反指向上量之用草一條量九寸舒足仰臥所量草自臍心直垂下至草盡處以筆點定此不是穴卻以原草平折以折處橫安前點處其草兩頭是穴按之有動脈各灸三壯如箸杪大神驗一論小兒初生三四日至七日口噤不吮乳多啼者是客風中於臍循流至心脾二經遂使舌強唇撮灸承漿一穴取法在唇稜下宛宛中是穴次灸頰車二穴各七壯在耳下曲頰骨後是穴一論小兒臍風以艾灸臍下即活又方用線比兩口角折中以墨記之放臍中四下灸七壯又方新針七個刺兩眉口圓圈一百餘下又方用四角草燃火將小兒在火上左右各轉三遭令出汗即已一論小兒慢驚慢脾危症藥力不到者但看兩腳面中間陷處有太衝脈即灸百會穴其穴直取前後髮際折中橫取兩耳尖折中在頭之中心端正旋毛處是也如有雙旋及旋毛不正者非艾炷約小麥許但三五壯而止灸後仍與醒脾散等補藥一論小兒雀目夜不見物灸手大指甲後一寸內臁橫文頭白肉際各一炷如小麥大一論小兒吼氣無名指頭灸之良愈一論小兒脫肛瀉血每廁臟腑撮痛不可忍者灸百會二壯一論小兒驚風男左乳黑肉上女右乳黑肉上周歲灸三壯二三歲兒灸五七壯神效一灸蛇毒人被蛇所傷用艾當咬處灸之引去其毒即瘥益府秘傳太乙真人熏臍法能補諸虛百病益壽延年麝香五分為末入臍內後用藥末放麝香上將面作團圍住上用槐皮灸一百二十壯不時須換槐皮龍骨虎骨蛇骨附子南木香雄黃硃砂乳香沒藥丁香胡椒夜明砂五靈脂小茴兩頭尖青鹽上各等分共為末入臍中用艾灸之夫肺為五臟之華蓋聲音之所出入皮毛以之滋潤腎水由之而生腠理不密則為風寒暑熱乘虛而入矣有七情當調抑之有鬱結當解利之或不審而傷於辛燥之藥則氣不散留滯於肺中多生黏痰而喘急咳嗽或傷於房勞飲食不節致使吐血咳血作寒作潮頭眩體倦精神怯弱飲食不思等症醫者治之無益則必用此急治其效可勝言哉用麝香以引透諸藥入五臟六腑之中大無不入小無不至丁香堅守其胃啟飲食之進青鹽入腎以實其子使肺無泄漏夜明砂以補其血散內傷之有餘乃伏翼之糞食蚊子蓋取其早餐雨露夜飲人血而得天人之氣故能補五勞七傷之病非此不能達也乳香沒藥木香小茴升降其氣不致咳嗽龍骨蛇骨硃砂雄黃以削病根兩頭尖巡視各經絡有推前拽後之功附子胡椒補其元氣使血行血室氣歸氣宅痰散為津液五靈脂連操其肺削有餘補不足用槐皮之漿閉押諸藥之性使無走竄之患用艾灸之有拔病除毒起死回生之功使其患勞瘵失血陰虛遺精白濁陽事不舉精神倦怠痰火等症婦人赤白帶下子宮冷極無子凡百重病無所不能療者用此灸法則接人性命延年益壽得盧扁之妙術矣其法先用面作一圈將藥一料分作三分先以麝香入臍後以面圈置藥在內按緊以槐皮蓋上以蘄艾灸之三十壯但覺熱氣自上而下或自下而上一身熱透其人必倦怠沉沉而睡矣至六十壯必大汗如淋上至泥丸下至湧泉骨髓內風寒暑濕臟腑中五勞七傷盡皆拔除至一百壯則病少有不冰釋者矣灸時慎風寒戒油膩生冷酒色其效難以盡述當珍藏之
