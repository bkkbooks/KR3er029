body:
  text: 卷十單品雜治食鹽治驗一凡覺胸中酒食停積或被人勸飲過多一切諸物心下脹滿只用鹽花擦牙齒溫水漱下不過二次如湯潑雪即時舒暢通暢也一用鹽揩擦牙齒少時吐水放掌中洗眼夜見小字此擦牙牙固洗眼眼明一小便卒不通炒鹽納臍中即下一干霍亂上不得吐下不得利出冷汗氣將絕炒鹽一大匙炒令紅童便一小碗二味溫和服之少頃吐下即愈俗名絞腸痧腹痛一肝臟氣虛風冷搏於筋遍體轉筋入腹不可忍熱湯三斗入鹽半斤乘熱漬之一齒齦宣露每旦捻鹽納口中以熱水含漱百遍不過五日即密緻堅固一眼生浮翳粟翳露膜遮睛取雪白鹽生研少許以大燈草蘸鹽輕手指定浮翳就點凡三次疼痛勿驚恐屢效一面上酒刺並酒齄鼻切忌手搔手擠只用無灰好鹽炒過如癢即將鹽擦之如出血出水即將鹽按在傷處止之久即除根一蠍螫痛不可忍以苦鹽點大眼角若螫左邊點左右邊點右或只以鹽湯漬傷處為妙一婦人陰戶極癢難忍以鹽塗之即已一寸白蟲上攻心痛用鹽煮馬齒莧一碗入醋半盞空心食之少時蟲出一腳氣作痛每用鹽塗擦腳膝至足甲淹少時卻用熱水泡洗即已一喉痹腫痛用鹽炒紅研末吹患處五七次吐出涎即愈香油治驗一中風不語或痰厥氣厥忽然倒僕不省人事急用香油三四兩入麝香末二三分攪勻將病人之口斡開灌下通其關竅即便甦醒如無麝香用生薑自然汁半盞同服亦可一中信石毒或因氣惱自服急用香油灌之一碗余或吐或行下即愈若以酒調服者難救其毒發散於周身也一癰疽癤毒並天泡楊梅等瘡用香油一斤入水半鍾煎煉油耗白煙起住火以瓷瓶收貯每早晚用熟油一鍾對好無灰酒一鍾溫服七日除根一心疼噤了牙關欲死者隔年老蔥白三五根搗如泥取汁將病人口斡開用茶匙送蔥汁入喉中用香油四兩灌下油不可少用但得蔥油下喉其人即蘇少時將腹中所停蟲積等物化為黃水從大小便出微利為佳永不再發若蔥干無汁加水在內搗汁一諸蟲入耳用香油灌之即出一產後生腸不收用香油煉熟以盆盛候溫卻令產婦坐油盆中約一頓飯時用皂角末少許吹鼻中即作嚏立上神效一傷寒三五日忽有黃用生香油一盞水半盞雞子白一枚和之令勻頓服之一蟲咬心痛香油鹽熬服一盞一中菌毒用香油一盞入甘草不拘多少煎一沸勿令黑冷服即解生薑治驗一嘔吐不止用生薑一大塊切薄片勿令折斷層層擦鹽在內用水濕苧麻布裹之外用紙裹水濕火煨令紙干取出苧麻布並紙將生薑搗爛和稀米湯呷服即止北方無苧麻用夏布亦可一咳嗽連咳四五十聲者用連皮生薑自然汁一合加白蜜二茶匙同放茶鍾內頓滾溫服三四次即愈一感冒風寒發熱頭疼腹痛用連皮生薑一大塊連根蔥白七根連殼核桃三枚打碎細茶一撮水三碗煎熱服被蓋出汗一痔瘡突出疼痛不止立坐不便先用韭菜洗淨以沸湯煎於瓦木器內熏之用手沃洗即愈如未消用生薑切薄片放於痔上痛甚處以熟艾作炷於上灸三壯黃水即出自消若肛門上有兩三個痔三五日後如前法逐一灸之屢效一老人咳嗽喘息煩熱不下食食即吐逆腹脹滿生薑汁十五合白砂糖四兩二味相和微火溫之一二十漱即止每度含半匙漸漸下汁一傷寒胸膈不寬一切寒結熱結水結食結痞結血結痰結支結大小結胸痞氣結者俱用生薑搗爛如泥去汁取渣炒熱絹包漸漸揉熨心胸脅下其滿痛豁然自愈如姜渣冷再入薑汁再炒再熨熱結不用炒蔥白治驗神效蔥熨法一虛怯人肢體患腫塊或作痛或不痛或風襲於經絡肢體疼痛或四肢筋攣骨痛而又治流注並跌撲損傷腫痛用蔥頭細切搗爛炒熱敷患處冷則易之再熨腫處即已此外補陽氣而逐散壅滯之法也一刀斧傷破血流不止痛苦難禁急將蔥白搗爛炒熱敷傷處痛與血隨止蔥冷再三易遂不復痛一小便不通小腹脹滿不急治即殺人急用連根蔥白一斤搗爛炒熱以帛裹分作兩處更替熨臍下即通加些麝香在內一婦人胎漏時時下血用蔥白一把濃煎汁飲之一婦人吹乳乳癰腫痛不可忍用連根蔥搗爛鋪乳患處上用瓦罐盛火蓋在蔥上一時蒸熱汗出立愈一白虎風走注痛癢用三年陳釅醋二碗蔥白一斤煮一沸濾出布帛熱裹當患處熨之一切腫瘡無名腫毒以蔥白共蜜搗如泥貼患處立愈一人因傷其拇指並爪甲劈裂索金創藥裹之其痛不止急取蔥白入糠灰火煨蒸熱剝皮劈開其間有涕取搽損處仍多煨取繼續易熱者凡三易之立愈又一人因誤截去一指亦用此法則血止痛消亦不潰良方也蘿蔔治驗一酒疾大便下血旬日不止用生蘿蔔揀稍大圓實者二十枚青葉寸余及下根用瓷瓶取井水煮令十分熟爛姜米淡醋空心任意食之立止用銀器重湯煮之尤佳一腹內初有積聚服此利下如鵝卵大即愈用蘿蔔切如麵條半盞熟香油半盞一處同炒黃色入水二盞煎至一盞連蘿蔔空心溫服通後以米飲養二三日一吐血並衄血用蘿蔔搗汁一鍾入鹽少許服之立止或以蘿蔔汁藕汁同飲及滴入鼻中亦妙一牙宣出血用白蘿蔔一碗加鹽一錢不時漱口即止一疥瘡搔癢不止用蘿蔔一個內剜取一孔納硫黃不拘多少仍塞口灰火中燒成汁取出搗研再加豬油同搗外加硫黃銀硃各少許搽疥效一聲音不出用蘿蔔三個切片入皂角一挺去皮子水一碗煎至半碗以下服之不過三服能語聲出大蒜治驗一蜈蚣咬傷痛不止用獨蒜擦螫處痛立止一切無名腫痛惡毒發背癰疽用蒜掐斷擦患處立消一痢疾用古墓中石灰大蒜搗為丸如梧子大米湯送下一心痛五月五日午時取獨蒜五個搗如泥入黃丹三兩為丸雞頭子大曬乾醋磨一丸服之一蒜味辛熱為陽中之物令人氣實悶亂而自吐若蛇蟲蠱瘕尤為宜之褚澄以蒜一升吐李道念之雞雛齊諧記云郭坦之兒食蒜一畦吐消食籠於頃刻蒜之妙用如此一治小兒白禿瘡凡頭上團團然白色以蒜揩白處早朝使之一治關格脹滿大小便不通用獨頭大蒜燒熟去皮棉裹納下部氣立通又治腹滿不能服藥以此導之冷則易之立效苦參治驗一時疫熱病狂言心躁結胸垂死苦參切片微炒每服五錢水煎溫服連進數服有汗無汗即瘥達齋以酒炒熱服一傷寒四五日頭痛壯熱胸中煩痛苦參五兩烏梅二十個銼片水二升煎一升分服一傷寒三四日已嘔吐更宜吐之苦參為末每服二錢酒調服得吐立瘥一天行時病四五日結胸滿痛身體壯熱苦參一兩銼以醋二升煮取一升二合盡飲食當吐即愈天行毒病非苦參醋藥不解用溫覆取汗愈一狂邪發惡或披頭大叫欲殺人不避水火苦參為末蜜丸如梧子大每服十丸薄荷湯送下一遍身風熱細疹癢痛不可忍連胸膛臍腹及近陰處皆然痰涎亦多夜不能臥苦參一兩皂角二兩水一升揉濾取汁銀石器熬成膏和苦參末為丸如梧子大食後溫水送下二十丸至三十丸次日便愈一瘡疥蓋能殺蟲苦參炒煙出為末米飲下一發背痔瘡疼痛疥癩瘙癢苦參炒為末水丸每服三錢酒送下一楊梅棉花等瘡苦參生搗汁飲之有效一腸風瀉血並血痢熱痢苦參炒帶煙出為末米飲下一方炒焦為末水丸梧子大每服五十丸米飲下一發黃谷疸食勞頭旋噁心怫鬱不安而發黃由失飢大食胃氣衝熏所致勞疸者因勞為名谷疸者因食而得苦參三兩龍膽草一合為末牛膽丸如梧子大生大麥湯下五丸日進三服勞疸加梔子仁三七個一治卒心痛又治飲食中毒魚肉菜等取吐愈苦參三兩好酒一升半煮八分分二次熱服一治酒㾴鼻苦參四兩當歸二兩為末酒糊丸茶下一治心肺積熱腎臟風毒攻於皮膚時生疥癩瘙癢難忍時有黃水及生大風手足爛壞眉毛脫落一切風疾並治苦參四兩荊芥一兩為末水糊丸如梧子大每服二十丸茶送下一治楊梅癘風等瘡能治內熱消瘡毒補心養氣苦參半斤洗淨銼碎分作二處將絹袋兜浸酒一罈春冬浸一月秋夏浸十日後早晚間服大治瘡科之聖藥平居無病服此藥能消一切風毒理脾胃常服每壇用半斤有瘡用一斤每壇用酒十五壺一苦參湯齊大夫病齲齒倉公為之作苦參湯日漱三升五六日病愈蓋取其苦能安齒蠹寒能去風熱也後人無風蠹有用苦參湯潔齒久而病腰重降多故也百草霜治驗一白痢肚腹疼痛百草霜為末每服二錢空心用酒調服米湯亦可一久瘧不愈百草霜二錢香附米三錢研末生蜜為丸每服三十丸空心烏梅湯下隔一日用一服不過三服立效一吐血下血百草霜末每服三錢米飲調下一吐血用糯米湯下一口鼻中出血用一字吹入鼻一皮破血出及灸瘡出血摻半錢立止一便血血痢男用公豬血女用雌豬血和百草霜為丸或以血蘸服一血崩用陳槐花一兩百草霜半兩為末每服二錢燒紅秤錘淬酒下一諸瘡並臁瘡百草霜末過江龍即驗船石灰燒過為末二味研細摻瘡上即出水斂瘡口神效一舌腫硬閉塞悶亂百草霜食鹽各等分為末水調塗舌上一治熱心氣疼百草霜末每服三錢用童子小便調下一治婦人產後下血不止雜草燒釜鏽二錢酒調服一治吐血及傷酒飽食低頭掬損吐血至多並血妄行口鼻俱出但聲未失者投之無不效百草霜每服三錢童便酒和服一治跌撲損傷惡血入腸胃下血溺如瘀血者百草霜研細好酒調服雜方法制芽茶魯府傳清火化痰消食止渴解酒芽茶一斤淨冷水洗過烘乾白檀香為末半兩白豆蔻為末五錢片腦一錢另研上用甘草熬膏與茶拌勻將三味藥末撒開曬乾不拘時嚼咽任意下法制枸杞子魯府傳補諸虛滋腎水延年益壽甘枸杞子紅者半斤白檀香為末五錢白豆蔻為末四錢片腦一錢另研上用甘草膏拌枸杞子三味末為衣任意取用法制人參膏魯府傳補元氣生津液輕身延年人參清河大而堅者四兩白檀香為末二錢白豆蔻為末錢半上用甘草膏同煎為膏上清丸龍腦薄荷二兩烏梅肉二兩孩兒茶五錢硼砂三錢百藥煎五錢真玄明粉五錢冰片三錢白砂糖三兩上為細末薄荷湯丸如彈子大噙化一方有訶子無玄明粉百藥煎梅酥餅清上焦潤咽膈生津液化痰降火止咳嗽南薄荷葉三兩紫蘇葉五錢白粉葛一兩白砂糖八兩烏梅肉一兩半另末上為細末入片腦一分半研細放入同研勻加煉蜜和成劑略帶硬些丸如櫻桃大每一丸噙化桂花餅清痰降火止咳生津桂花一兩孩兒茶五錢訶子七個甘草五分上銼末桂花水為餅每嚼一丸滾水下玉露霜真干綠豆粉一斤研細薄荷葉一斤以水微濕之用甑先將薄荷葉鋪底上用棉布隔住篩子篩豆粉於布上又用薄荷葉鋪上蓋住紙糊封固蒸一炷香為度取出去薄荷每豆粉一斤用白糖霜四兩和勻用之楂梨膏用鮮肥山楂十斤去核甜梨十斤去核共搗取自然汁入鍋煎熬如汁十斤入蜜四兩共熬成膏法制半夏大半夏一斤先用湯泡七次薑汁浸七日白礬水浸七日芒硝水浸七日皂角水浸三日再用白礬芒硝煎水浸一日一易至七日大者切片小者為末如霜露名半夏膏大者名法制半夏每一斤加薄荷葉六兩炙甘草三兩歌曰開膈屢臻實效止嘔未必虛談更能止嗽化涎痰蘊積胸中不散夏日能消暑渴冬天卻解沉寒隨時細嚼有餘甘利濟人生千萬上上合香油方排草末四兩檀香一兩甘松一兩零陵香三兩丁香三錢薄荷葉二錢真麝二錢白芷二兩五錢大黃二兩北細辛五錢荔枝殼二兩七錢蘇合香油二兩上為細末衣香方官桂二兩白芷三兩大黃三兩山柰一兩小茴香五錢細辛七錢薄荷葉一兩上為末用德州肥皂獨活五錢白芷三兩細辛七錢紅豆五錢上為末肥皂三斤磨為末淨糖一斤共搗爛為